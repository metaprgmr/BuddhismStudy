/xia:18:2-5/
<x>佛告阿難</x>。<x>譬如世間貧窮乞人在帝王邊</x>。<x>形貌容狀寧可類乎</x>。阿難白佛。假令此人在帝王邊。羸陋醜惡無以為喻。百千萬億不可計倍。所以然者。貧窮乞人底極廝下。衣不蔽形食趣支命。飢寒困苦人理殆盡。皆坐前世不殖德本。積財不施富有益慳。但欲唐得貪求無厭。不信修善犯惡山積。如是壽終財寶消散。苦身積聚為之憂惱。於己無益徒為他有。無善可怙無德可恃。是故死墮惡趣受此長苦。罪畢得出生為下賤。愚鄙斯極示同人類。所以世間帝王人中獨尊。皆由宿世積德所致。慈惠博施仁愛兼濟。履信修善無所違諍。是以壽終福應得昇善道。上生天上享茲福樂。積善餘慶今得為人。遇生王家自然尊貴。儀容端正眾所敬事。妙衣珍膳隨心服御。宿福所追故能致此。

佛告阿難。汝言是也。計如<x>帝王</x>。雖人中尊貴形色端正。<x>比之轉輪聖王</x>。甚<x>為鄙陋</x>。<x>猶彼乞人在帝王邊</x>。<x>轉輪聖王威相</x>殊妙天下<x>第一</x>。<x>比忉利天王</x>。<x>又復醜惡</x>不得相喻。萬億倍也。<x>假令天帝比第六天王</x>。<x>百千億倍不相類也</x>。設<x>第六天王</x>。<x>比<y>無量壽佛國</y>菩薩聲聞</x>。<x>光顏容色不相及逮</x>。百千<x>萬億<x>不可計<x>倍</x>。

/xia:31:5-9/
專樂<x>求法</x>心<x>無厭</x>足。常欲廣說志無疲<x>倦</x>。<x>擊法鼓</x>。<x>建法幢</x>。<x>曜慧日</x>。<x>除癡闇</x>。修六和敬。常行法施。志勇精進心不退弱。<x>為世燈明最勝福田</x>。常為師導等無憎愛。唯樂正道無餘欣慼。拔諸欲刺以安群生。功德殊勝莫不尊敬。滅三垢障遊諸神通。因力緣力。意力願力。方便之力。常力善力。定力慧力。多聞之力。施戒忍辱。精進禪定。智慧之力。正念止觀諸通明力。如法調伏諸眾生力。如是等力一切具足。<x>身色相好功德辯才</x>。<x>具足莊嚴無與等者</x>。恭敬供養無量諸佛。

/xia:31:10,11/
<x>常為諸佛所共稱歎</x>。<x>究竟菩薩諸波羅蜜</x>。修空無相無願三昧<x>不生不滅諸三</x><thru>昧門</thru><z>摩地</z>。<x>遠離</x><thru>聲聞緣覺之地</thru><z>二乘境</z>。<x>阿難</x>。<x>彼</x>諸<x>菩薩</x>。成就<x>如是</x>無量<x>功德</x>。我但為汝略言之耳。<x>若廣說者</x>。<x>百千萬劫不能窮盡</x>。

/xia:32:1-3/
<x>佛告彌勒菩薩諸天人等</x>。<x>無量壽國聲聞菩薩</x>。<x>功德智慧不可稱說</x>。<x>又其國土</x>。<x>微妙安樂清淨若此</x>。<x>何不力為善</x>。<x>念道之自然</x>。

/xia:32:11-14/
<x>著於無上下</x>。<x>洞達無邊際</x>。<x>宜各勤精進</x>。<x>努力自求之</x>。<x>必得超絕去</x>。<x>往生<y>安養</y>國</x>。<x>橫截五惡趣</x>。<x>惡趣自</x>然<x>閉</x>。<x>昇道無</x>窮<x>極</x>。<x>易往而無人</x>。<x>其國不逆違</x>。<x>自然之所牽</x>。<x>何</x>不棄<x>世事</x>。<x>勤行求道德</x>。<x>可獲極長生</x>。<x>壽樂無有極</x>。

/xia:33:1/
然<x>世人</x>薄俗。<x>共諍不急之</x><thru>事</thru><z>務</z>。<x>於此劇惡極苦之中</x>。<x>勤身營務以自給濟</x>。

/xia:33:2-4/
無<x>尊</x>無<x>卑</x>。無<x>貧</x>無<x>富</x>。<x>少長男女</x>共憂錢財。有無同然。憂思適等。屏營愁苦。<x>累念積慮</x>。<x>為心走使</x>無有安時。

有田憂田。有宅憂宅。牛馬六畜奴婢錢財衣食什物。復共<x>憂</x>之。重思累息憂念愁怖。橫為<x>非常</x>。<x>水火盜賊怨家債主</x>。<x>焚漂劫奪消散磨滅</x>。憂毒忪忪無有解時。結憤心中不離憂惱。<x>心堅意固</x>適<x>無縱捨</x>。或坐摧碎身亡命終。<x>棄捐</x>之去<x>莫誰隨者</x>。尊貴豪<x>富</x>亦有斯患。<x>憂</x>懼萬端勤<x>苦</x>若此。結眾寒熱與痛共俱。

貧窮下劣困乏常無。<x>無田</x>亦<x>憂</x>欲有<x>田</x>。<x>無宅</x>亦<x>憂</x>欲有<x>宅</x>。無牛馬六畜奴婢錢<x>財</x>衣食什物。亦<x>憂</x>欲有之。適<x>有一</x>復<x>少一</x>。有是<x>少</x>是。<x>思有齊等</x>。適欲具有便復糜散。如是<x>憂苦</x>當復求索。不能時得思想無益。身心俱勞坐起不安。<x>憂</x>念相隨勤<x>苦</x>若此。亦結眾寒熱與痛共俱。

或時坐之終身夭命。不肯為善行道進德壽終身死當獨遠去。有所趣向善惡之道莫能知者。

/xia:33:5,6/
<x>世間人民父子兄弟夫婦</x>家室中外<x>親屬</x>。<x>當相敬愛無相憎嫉</x>。<x>有無相通無得貪惜</x>。<x>言色常和莫相違戾</x>。<x>或時心諍有所恚怒</x>。今世恨意微相憎嫉。<x>後世轉劇至成大怨</x>。所以者何。<x>世間之事更相患害</x>。<x>雖不<thru>即</thru><z>臨</z>時應急相破</x>。然含毒畜怒結憤精神。自然剋識不得相離。皆當對生更相報復。

/xia:33:7,8/
<x>人在</x>世間<x>愛欲之中</x>。<x>獨生獨死獨去獨來</x>。當行至趣<x>苦樂</x>之地。身<x>自當</x>之<x>無有代者</x>。<x>善惡變化</x>殃福異處。宿豫嚴待當獨趣入。遠到他所莫能見者。善惡自然<x>追<thru>行</thru><z>逐</z>所生</x>。窈窈冥冥別離久長。<x>道路不同會見無期</x>。甚難甚難復得相值。

/xia:33:9/
<x>何不</x>棄眾事。各曼<x>強健時</x>。<x>努力</x>勤<x>修善</x>。精進願度世。可得極長生。如何不求道。安所須<x>待欲何</x>樂<x>乎</x>。

/xia:33:10-17/
如是<x>世人</x>。不信作善得善為道得道。不信人死更生惠施得福。<x>善惡</x>之事都不信之。謂之不然終無有是。但坐此故且自見之。<x>更相瞻視</x>先後同然。轉相承受父餘教令。<x>先人</x>祖父素<x>不</x>為<x>善不識道德</x>。<x>身愚神闇心塞意閉</x>。<x>死生之趣善惡之道</x>。<x>自不能見無有語者</x>。<x>吉凶禍福競各作之</x>。<x>無</x>一<x>怪也</x>。<x>生死</x>常<x>道</x>轉相嗣立。<x>或父哭子或子哭父</x>。<x>兄弟夫婦更相哭泣</x>。<x>顛倒</x>上下<x>無常根本</x>。皆當過去不可常保。

教語開導信之者少。是以生死流轉無有休止。如此之人。<x>曚冥抵突不信經法</x>。<x>心無遠慮各欲快意</x>。癡惑於愛欲。不達於道德。<x>迷</x>沒<x>於瞋</x>怒。<x>貪</x>狼<x>於財色</x>。坐之不得道。當更惡趣苦。生死無窮已。<x>哀哉</x>甚<x>可傷</x>。或時室家<x>父子兄弟夫婦</x>。<x>一死一生</x>更<x>相</x>哀愍。恩<x>愛</x>思慕<x>憂</x>念<x>結縛</x>。心意痛著迭相顧戀。窮日卒歲無有解已。教語道德心不開明。<x>思想恩好不離情欲</x>。惛曚閉塞愚惑所覆。<x>不能深思熟計</x>。心自端政<x>專精行道</x>。決斷世事。便<x>旋</x>至竟<x>年壽終</x>盡不能得道。<x>無可奈何</x>。總猥憒擾皆貪愛欲。<x>惑道者眾</x>。<x>悟之者</x><thru>寡</thru><z>少</z>。世間匆匆。無可聊賴。尊卑上下貧富貴賤。勤苦匆務各懷殺毒。惡氣窈冥<x>為妄興事</x>。<x>違逆天地</x>不從人心。自然非惡先隨與之。<x>恣</x>聽所<x>為</x>待其<x>罪極</x>。其<x>壽</x>未盡便<x>頓奪</x>之<x>下入惡道</x>。累世懟苦展轉其中。數千億劫<x>無有出期</x>。痛不可言甚可哀愍。

/xia:33:18-20/
佛告彌勒菩薩諸天人等。我今語汝世間之事。人用是故坐不得道。<x>當熟思計遠離眾惡</x>。<x>擇其善者勤而行之</x>。<x>愛欲榮華不可常保</x>。<x>皆當別離無可樂者</x>。曼佛在世<x>當勤精進</x>。其有至願<x>生安樂國</x>者。可得<x>智慧明達功德殊勝</x>。<x>勿得隨心所欲</x>。<x>虧負經戒在人後也</x>。儻有疑意不解經者。可具問佛當為說之。

/xia:34:1-3/
<x>彌勒</x>菩薩長跪<x>白言</x>。佛威神尊重。所說快善。聽佛經者貫心思之。世人實爾如佛所言。今佛慈愍顯示大道。耳目開明長得度脫。聞佛所說莫不歡喜。諸天人民蠕動之類。皆蒙慈恩解脫憂苦。<x>佛語教誡甚深甚善</x>。智慧明見八方上下去來今事莫不究暢。今我眾等。所以蒙得度脫。皆佛前世求道之時謙苦所致。恩德普覆福祿巍巍。<x>光明徹照達空無極</x>。開入泥洹。教授典攬威制消化。感動十方無窮無極。佛為法王尊超眾聖。<x>普為一切天人之師</x>。隨心所願皆令得道。<x>今得值佛</x>。<x>復聞無量壽聲</x>。<x>靡不歡喜</x>。<x>心得開明</x>。

/xia:34:4,5/
<x>佛告彌勒</x>。汝言是也。若有慈<x>敬於佛者</x>。<x>實為大善</x>。天下久久乃復有佛。今我於此世作佛。演說經法宣布道教。<x>斷</x>諸<x>疑網</x>。<x>拔愛欲</x>之本。<x>杜眾惡</x>之<x>源</x>。<x>遊步三界無所拘閡</x>。典攬智慧眾道之要。執持綱維昭然分明。<x>開示</x>五趣<x>度未度者</x>。決正生死泥洹之道。

/xia:34:6,7/
彌勒<x>當知</x>。汝從無數劫來修菩薩行。欲度眾生其已久遠。從汝得道至于泥洹。不可稱數。汝及<x>十方</x>諸天<x>人民</x>一切四眾。<x>永劫已來展轉五道</x>。<x>憂</x>畏勤<x>苦</x>不可具言。乃至今世<x>生死不絕</x>。

/xia:34:8-12/
與佛相值聽受經法。又復得聞無量壽佛。快哉甚善吾助爾喜。汝今亦可自厭生死老病痛苦。惡露不淨無可樂者。<x>宜自決斷</x>端身正行益作諸善。修己潔體<x>洗除心垢</x>。<x>言行忠信表裏相應</x>。<x>人能自度轉相拯濟</x>。精明<x>求願積累善本</x>。<x>雖一世勤苦須臾</x>之<x>間</x>。<x>後生無量壽佛國快樂無極</x>。長與道德合明。<x>永拔生死根本</x>。<x>無復<x>貪恚愚癡</x>苦惱之患</x>。欲<x>壽</x>一劫百劫<x>千</x>億<x>萬劫</x>。<x>自在隨意</x>皆可得之。無為自然。次於泥洹之道。汝等<x>宜各精進求心所願</x>。<x>無得疑惑中悔自為過咎</x>。<x>生彼邊地七寶宮殿</x>。<x>五百歲中受諸厄也</x>。<x>彌勒白</x>佛。<x>受佛<thru>重</thru><z>明</z>誨</x>。<x>專精修學</x>。<x>如教奉行不敢有疑</x>。

/xia:35:1-4/
<x>佛告彌勒</x>。<x>汝等能於此世</x>。<x>端心正意不作眾惡</x>。<x>甚為<thru>至</thru><z>大</z>德</x>。<x>十方世界</x>最無倫匹。所以者何。諸佛國土天人之類。自然作<x>善</x>不大為<x>惡</x>。<x>易可開化</x>。<x>今我於此世間作佛</x>。處於五惡五痛五燒之中。為最劇苦。<x>教化群生</x>。<x>令捨五惡</x>。令<x>去五痛</x>。令<x>離五燒</x>。<x>降化其意</x>。<x>令持五善</x>。<x>獲其福德</x>。度世長壽泥洹之道。佛言。<x>何等為五</x>惡。何等五痛。何等五燒。何等消化五惡。令持五善獲其福德度世長壽泥洹之道。

/xia:35:5-13,43-45/
<x>其一</x>惡<x>者</x>。諸天人民蠕動之類。<x>欲為眾惡</x>莫不皆然。<x>強者伏弱轉相剋賊</x>。<x>殘害殺戮迭相吞噬</x>。<x>不知<thru>修</thru><z>修</z>善</x>惡逆無道。<x>後受殃罰</x>自然趣向。神明記識犯者不赦。<x>故有</x>貧<x>窮</x>下賤<x>乞</x>丐<x>孤獨聾盲瘖啞愚</x>癡憋<x>惡</x>。至有<x>尪狂</x>不逮之屬。又<x>有尊貴豪富高才明達</x>。<x>皆由宿世慈孝修善積德所致</x>。世有常道王法牢獄。不肯畏慎。為惡入罪受其殃罰。求望解脫難得免出。<x>世間有此目前現事</x>。<x>壽終後世</x>尤深尤劇。<x>入其幽冥</x>轉生受身改形易道。<x>譬如</x>王<x>法</x>痛<x>苦極刑</x>。故有自然三塗無量苦惱。轉貿其身。<x>改形易道</x>。<x>所受壽命或長或短</x>。魂神精識自然趣之。當獨值向。<x>相從共生更相報</x><thru>復</thru><z>償</z>。無有止已。<x>殃惡未盡不得相離</x>。<x>展轉其中無有出期</x>。<x>難得解脫痛不可言</x>。<x>天地之間自然有是</x>。<x>雖不即時卒暴應至善惡之道會當歸之</x>。

<x>是</x>為一大<x>惡</x>一<x>痛</x>一<x>燒</x>。勤苦如是。<x>譬如大火焚燒人身</x>。人<x>能於中一心制意</x>。<x>端身正</x><thru>行</thru><z>念</z>。<x>獨作諸善</x>。<x>不為眾惡者</x>。<x>身獨度脫</x>。<x>獲其福德</x>。度世上天泥洹之道。<x>是為</x>一大<x>善也</x>。

/xia:35:14-20,43-45/
佛言。<x>其二</x>惡<x>者</x>。<x>世間人民</x>父子兄弟室家夫婦。都無義理<x>不順法度</x>。<x>奢婬憍縱</x>各欲快意。<x>任心自恣</x>更相欺惑。<x>心口各異</x>言念無實。佞諂不忠。巧言諛媚。嫉賢謗善。<x>陷人怨枉</x>。主<x>上不明</x>任用臣下。臣下自在<x>機偽多端</x>。踐度能行知其形勢。<x>在位不正</x>為其所欺。妄<x>損忠良</x>不當天心。臣欺其君。子欺其父。兄弟夫婦。<x>中外</x>知識。<x>更相欺誑</x>。各懷貪欲<x>瞋恚愚癡</x>。<x>欲自厚己</x>。<x>欲貪多有</x>。<x>尊卑</x>上下心俱同然。<x>破家亡身不顧前後</x>。親屬內外坐之滅族。或時室家知識鄉黨市里愚民野人。轉共從事。更相剝害。忿成怨結。<x>富有慳惜不肯施與</x>。<x>愛保貪重心勞身苦</x>。<x>如是至竟</x>無所恃怙。獨來獨去<x>無一隨者</x>。<x>善惡禍福追命所生</x>。<x>或在樂處</x>。<x>或入苦毒</x>。然後乃悔當復何及。世間人民。心愚少智。<x>見善憎謗不思慕及</x>。但欲為惡妄作非法。<x>常懷盜心悕望他利</x>。<x>消散</x>磨盡而<x>復</x>求索。邪心不正懼人有色。不豫思計事至乃悔。今世現有王法牢獄。隨罪趣向受其殃罰。因其前世不信道德不修善本。今復為惡。天<x>神剋識</x>別其名籍。壽終神逝下入惡道。故<x>有</x>自然<x>三塗無量苦惱</x>。<x>展轉其中</x>。世世<x>累劫</x>無有<x>出</x>期。難得解脫<x>痛不可言</x>。

<x>是</x>為二大<x>惡</x>二<x>痛</x>二<x>燒</x>。勤苦如是。<x>譬如大火焚燒人身</x>。人<x>能於中一心制意</x>。<x>端身正</x><thru>行</thru><z>念</z>。<x>獨作諸善</x>。<x>不為眾惡者</x>。<x>身獨度脫</x>。<x>獲其福德</x>。度世上天泥洹之道。<x>是為</x>二大<x>善也</x>。

/xia:35:21-24,43-45/
佛言。<x>其三</x>惡<x>者</x>。<x>世間人民</x>。<x>相因寄生</x>。共居天地之間。處年<x>壽命</x>無能<x>幾何</x>。上有賢明長者尊貴豪富。下有貧窮廝賤尪劣愚夫。中有不善之人。<x>常懷邪惡</x>。但<x>念婬劮</x>。<x>煩滿胸中</x>。愛欲交亂坐起不安。貪意守惜但欲唐得。眄睞細色<x>邪態外逸</x>。自妻厭憎私妄出入。<x>費損家財事為非法</x>。<x>交結聚會興師相伐</x>。<x>攻劫殺戮強奪</x>不道。惡心在外不自修業。盜竊趣得欲擊成事。恐勢迫脅<x>歸給妻子</x>。恣心快意<x>極身作樂</x>。或於親屬不避尊卑。家室中外<x>患而苦之</x>。亦復不畏王法禁令。<x>如是之惡著於人鬼</x>。日月照見<x>神明記識</x>。故有<x>自</x>然<x>三塗無量苦惱</x>。<x>展轉其中</x>。世世<x>累劫</x>無有<x>出期</x>。難得解脫<x>痛不可言</x>。

<x>是</x>為三大<x>惡</x>三<x>痛</x>三<x>燒</x>。勤苦如是。<x>譬如大火焚燒人身</x>。人<x>能於中一心制意</x>。<x>端身正</x><thru>行</thru><z>念</z>。<x>獨作諸善</x>。<x>不為眾惡者</x>。<x>身獨度脫</x>。<x>獲其福德</x>。度世上天泥洹之道。<x>是為</x>三大<x>善也</x>。

/xia:35:25-30,43-45/
佛言。<x>其四</x>惡<x>者</x>。<x>世間人民不念修善</x>。轉相教令共為眾惡。<x>兩舌惡口</x>。<x>妄言綺語</x>。讒賊鬥亂<x>憎嫉善人敗壞賢明</x>。於傍快喜<x>不孝二親</x>。<x>輕慢師長</x>。<x>朋友無信</x>。<x>難得誠實</x>。<x>尊貴自大謂己有道</x>。<x>橫行威勢侵易於人</x>。不能自知。為惡無恥。自以強健<x>欲人敬</x>難。不畏天地神明日月。不肯作善。難可降化。自用偃蹇謂可常爾。無所憂<x>懼</x>。<x>常懷憍慢</x>。如是眾惡天神記識。<x>賴其前世</x>頗作<x>福德</x>。小善扶接營護助之。<x>今世為惡福德盡滅</x>。諸善神鬼各去離之。身獨空立無所復依。<x>壽命終盡諸惡<thru>所</thru><z>繞</z>歸</x>。自然迫促共趣奪之。<x>又其名籍記在神明</x>。<x>殃咎牽引</x>當往趣向。罪報自然<x>無從捨離</x>。<x>但得前行入於火鑊</x>。<x>身心摧碎</x>精<x>神</x>痛<x>苦</x>。<x>當斯之時悔復何及</x>。

天道自然不得蹉跌。故有自然三塗無量苦惱。展轉其中。世世累劫無有出期。難得解脫痛不可言。

<x>是</x>為四大<x>惡</x>四<x>痛</x>四<x>燒</x>。勤苦如是。<x>譬如大火焚燒人身</x>。人<x>能於中一心制意</x>。<x>端身正<thru>行</thru><z>念</z></x>。<x>獨作諸善</x>。<x>不為眾惡者</x>。<x>身獨度脫</x>。<x>獲其福德</x>。度世上天泥洹之道。<x>是為</x>四大<x>善也</x>。

/xia:35:31-38/
佛言。<x>其五</x>惡<x>者</x>。<x>世間人民</x>。<x>徙倚懈惰不肯作善</x>。<x>治身修業</x>。家室眷屬飢寒困苦。<x>父母教誨</x>。瞋目怒譍。言令不和。<x>違戾反逆譬如怨家</x>。<x>不如無子</x>。取與無節。眾共患厭。<x>負恩違義</x>。<x>無有報償</x>之心。貧窮困乏不能復得。辜較縱奪<x>放恣遊散</x>。串數唐得用自賑給。<x>耽酒嗜美</x>。飲食無度。肆心蕩逸。<x>魯扈抵突</x>。<x>不識人情</x>。強欲抑制。見人有善。憎嫉惡之。<x>無義無禮</x>。無所顧錄。自用職當<x>不可諫曉</x>。<x>六親眷屬<thru>所資</thru><z>資用</z>有無</x>。<x>不能憂念</x>。<x>不惟父母之恩</x>。<x>不存師友之義</x>。<x>心</x>常念惡。<x>口</x>常言惡。<x>身</x>常行惡。<x>曾無一善</x>。<x>不信</x>先聖<x>諸佛經法</x>。<x>不信</x>行道可得度世。不信<x>死</x>後神明更生。不信作<x>善</x>得善為<x>惡</x>得惡。<x>欲殺真人鬥亂眾僧</x>。欲害父母兄弟眷屬。六親憎惡願令其死。如是世人心意俱然。<x>愚癡曚昧</x>。而<x>自<thru>以</thru><z>為</z>智慧</x>。<x>不知生所從來死所趣向</x>。<x>不仁不順</x>。逆惡天地。而於其中。<x>悕望</x>僥倖。欲求<x>長生</x>。會當歸死。<x>慈心教誨</x>令其念善。開示生死善惡之趣自然有是。而<x>不信</x>之。<x>苦心與語無益其人</x>。<x>心中閉塞意不開解</x>。<x>大命將終悔懼交至</x>。<x>不豫修善</x>。<x>臨</x>窮方<x>悔</x>。<x>悔之於後將何及乎</x>。

/xia:35:39-42/
<x>天地之間五道分明</x>。恢廓窈冥浩浩茫茫。<x>善惡報應禍福相承</x>。<x>身自當之無誰代者</x>。數之自然應其所行。殃咎追命無得縱捨。<x>善人行善從樂入樂從明入明</x>。<x>惡人行惡從苦入苦從冥入冥</x>。<x>誰能知者獨佛知耳</x>。<x>教語開示信用者少</x>。<x>生死不休惡道不絕</x>。<x>如是世人難可具盡</x>。<x>故有自然三塗無量苦惱</x>。<x>展轉其中</x>。<x>世世累劫無有出期</x>。<x>難得解脫痛不可言</x>。

/xia:35:43-45/
<x>是</x>為<x>五</x>大<x>惡五痛五燒</x>。勤苦如是。<x>譬如大火焚燒人身</x>。人<x>能於中一心制意</x>。<x>端身正念</x>。言行相副所作至誠。所語如語心口不轉。<x>獨作諸善</x>。<x>不為眾惡者</x>。<x>身獨度脫</x>。<x>獲其福德</x>。度世上天泥洹之道。<x>是為五大善也</x>。

/xia:36:1-3/
<x>佛告彌勒</x>。<x>吾語汝等是</x>世五惡勤苦若此。<x>五痛五燒展轉相生</x>。但作眾惡不修善本。皆悉自然<x>入</x><y>諸惡趣</y>。<x>或其今世先被殃病</x>。求<x>死</x>不得求<x>生不得</x>。罪惡所招示眾見之。身死隨行<x>入三惡道</x>。苦<x>毒</x>無量<x>自相燋然</x>。至其久後<x>共</x>作<x>怨</x>結。<x>從小微起</x>遂<x>成大</x><thru>惡</thru><z>困劇</z>。

/xia:36:4-6/
<x>皆由貪著財色不能施慧</x>。<x>癡欲所迫</x>隨心思想。煩惱結縛無有解已。<x>厚己諍利</x>無所省錄。<x>富貴榮華當時快意</x>。<x>不能忍辱不務修善</x>。<x>威勢無幾隨以磨滅</x>。身生勞苦久後大劇。<x>天道施張自然糾舉</x>。綱紀羅網上下相應。<x>煢煢忪忪當入其中</x>。<x>古今有是痛哉可傷</x>。

/xia:36:7,8/
佛語彌勒。世間如是佛皆<x>哀</x>之。以威神力摧滅眾惡。悉令就善棄捐所思。奉持經戒受行道法無所違失。終得度世泥洹之道。
佛言。汝今諸天人民及後世人。<x>得佛經語</x>當<x>熟思之</x>。能於其中端心正行。主上為善率化其下。轉相敕令<x>各自端守</x>。<x>尊聖敬善仁慈博愛</x>。佛語教誨無敢虧負。<x>當求度世拔斷生死眾惡之本</x>。永<x>離三塗無量憂畏苦痛之道</x>。

/xia:37:1-6/
<x>汝等</x>於是<x>廣殖德本</x>。布恩施慧勿犯道禁。<x>忍辱精進</x>一心智慧。轉相教化。為德立善正心正意。<x>齋戒清淨一日一夜</x>。<x>勝在無量壽國為善百歲</x>。<x>所以者何</x>。<x>彼佛國土</x>無為自然。<x>皆積眾善無毛髮之惡</x>。<x>於此修善十日十夜</x>。<x>勝於他方諸佛國中為善千歲</x>。<x>所以者何</x>。<x>他方佛國</x>為善者多為惡者少。<x>福德自然無造惡之地</x>。<x>唯此間多惡</x>無有自然。勤苦求欲轉相欺殆。心勞形困<x>飲苦食毒</x>。如是匆務<x>未嘗寧息</x>。

/xia:37:7-15/
<x>吾哀汝等天人之類</x>。<x>苦心誨喻教令修善</x>。隨器開導<x>授與經法</x>。莫不承用。在意所願皆令得道。<x>佛所</x>遊履。<x>國邑丘聚</x>。<x>靡不蒙化</x>。<x>天下和順</x>。<x>日月清明</x>。<x>風雨以時</x>。<x>災厲不起</x>。<x>國豐民安</x>。<x>兵戈無用</x>。<x>崇德興仁</x>。<x>務修禮讓</x>。佛言。<x>我哀愍汝等</x>諸天人民。<x>甚於父母念子</x>。今吾<x>於此世作佛</x>。降化五惡消除五痛。絕滅五燒。<x>以善攻惡</x>。<x>拔生死之苦</x>。<x>令獲五德昇無為之安</x>。<x>吾</x><thru>去世後</thru><z>般泥洹 </z><x>經道漸滅</x>。<x>人民諂偽復為眾惡</x>。<x>五燒五痛</x>還如前法。<x>久後轉劇</x>不可悉說。我但為汝略言之耳。佛告彌勒。汝等各善思之。<x>轉相教誡如佛經法無得犯也</x>。於是<x>彌勒菩薩合掌白言</x>。佛所說甚善世人實爾。如來普<x>慈哀愍</x>。<x>悉</x>令<x>度脫</x>。<x>受佛重誨不敢違失</x>。

/xia:38:1-3/
<x>佛告阿難</x>。汝起更整衣服合掌恭敬。禮<x>無量壽佛</x>。十方國土諸佛如來。常共稱揚讚歎彼佛無著無閡。於是<x>阿難起</x>整衣服。正身<x>西</x>向。恭敬<x>合掌</x>五體投地。禮無量壽佛。白言世尊。<x>願見</x>彼佛安樂國土及諸菩薩聲聞大眾。

/xia:38:8-13/
說是語已。即時<y>無量壽佛</y>。放大<x>光</x>明。<x>普照一切諸佛世界</x>。<x>金剛圍山</x>。須彌山王。<x>大小諸山</x>。<x>一切</x>所有<x>皆同一色</x>。譬<x>如劫水彌滿世界</x>。<x>其中萬物沈沒不現</x>。<x>滉瀁浩汗唯見大水</x>。<x>彼佛光明亦復如是</x>。<x>聲聞菩薩一切光明皆悉隱蔽</x>。<x>唯見佛光明耀顯赫</x>。

/xia:38:14,15,22/
爾時阿難即<x>見</x><y>無量壽佛</y>。<x>威德巍巍如須彌山王</x>。高出一切諸世界上。<x>相好光明</x>靡不<x>照耀</x>。此會四眾一時悉見。<x>彼見此土亦復如是</x>。

/xia:39:1-9/
<x>爾時佛告阿難及慈氏菩薩</x>。<x>汝見</x><y>彼國</y>。從地已上至淨居天。其中所有<x>微妙嚴淨</x>。自然之物為悉見不。<x>阿難對曰</x>。<x>唯然已見</x>。<x>汝</x>寧復<x>聞</x><y>無量壽佛</y><x>大音宣布一切世界化眾生不</x>。<x>阿難對曰</x>。<x>唯然已聞</x>。<x>彼國</x>人民。乘百千由旬七寶宮殿無所障閡。<x>遍至十方供養諸佛</x>。<x>汝復見不</x>。對曰已見。

/xia:39:10-12/
<x>彼國人民有胎生者</x>。<x>汝復見不</x>。對曰已見。其<x>胎</x>生<x>者所處宮殿</x>。或百由旬或五百由旬。各於其中受諸快樂。如忉利天亦皆自然。爾時慈氏菩薩白佛言。世尊。<x>何因何緣</x>。<x>彼國人民胎生化生</x>。

/xia:40/
<x>佛告慈氏</x>。<x>若有眾生</x>。<x>以疑惑心修諸功德</x>。<x>願生彼國</x>。<x>不了佛智</x>。<x>不思議智</x>。<x>不可稱智</x>。<x>大乘廣智</x>。<x>無等無倫最上勝智</x>。<x>於此諸智疑惑不信</x>。<x>然猶信罪福修習善本</x>。<x>願生其國</x>。此諸眾生生彼宮殿。壽<x>五百歲</x>。<x>常不見佛不聞經法</x>。<x>不見菩薩聲聞聖眾</x>。是故於彼國土。<x>謂之胎生</x>。<x>若有眾生</x>。<x>明信佛智乃至勝智</x>。作諸功德信心迴向。此諸眾生<x>於七寶華中自然化生加趺而坐</x>。<x>須臾之頃</x>。<x>身相光明智慧功德</x>。<x>如諸菩薩具足成就</x>。復次慈氏。他方諸大菩薩。發心欲見無量壽佛。恭敬供養及諸菩薩聲聞之眾。彼菩薩等。命終得生無量壽國。於七寶華中自然化生。<x>彌勒當知</x>。<x>彼化生者智慧勝故</x>。<x>其胎生者</x>皆無智慧。於<x>五百歲中</x>。常<x>不見佛</x>不聞經法。<x>不見菩薩諸聲聞眾</x>。<x>無</x>由供養於<x>佛</x>。<x>不知菩薩法式</x>。<x>不得修習功德</x>。<x>當知此人</x>。<x>宿世之時</x>。<x>無有智慧疑惑所致</x>。

/xia:41:1-8/
