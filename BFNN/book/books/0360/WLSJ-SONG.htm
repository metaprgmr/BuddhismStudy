/xia:5:1,7/
爾時世尊告阿難言。彼<y>作法</y><x>苾芻說</x>是<x>偈已</x>。<x>白</x>世自在王如來。<x>我今發阿耨多羅三藐三菩提心</x>。樂求無上正等正覺。唯<x>願世尊</x>。<x>說諸佛剎功德莊嚴</x>。<x>若我得聞</x>。恒自<x>修</x>持嚴土之行。

/xia:5:10-15/

/xia:8:1-10/

/xia:8:11-13/
<x>所生之處</x>。有<x>無量</x>無數百千俱胝那由他珍<x>寶</x>之<x>藏</x>。從地湧出。攝受無量無數百千俱胝那由他眾生。發阿耨多羅三藐三菩提心。<x>如是</x>之行無量無邊<x>說不能盡</x>。復次阿難。<y>作法</y>苾芻行菩薩行時。<x>於諸佛所尊重</x>恭敬。承事<x>供養未曾間斷</x>。為四大天王恒詣佛所。恭敬禮拜承事供養。為忉利天王恒詣佛所。恭敬禮拜承事供養。為夜摩天王。兜率天王。化樂天王。他化自在天王。乃至大梵天王等。恒詣佛所。恭敬禮拜承事供養。復次阿難。處閻浮提。為轉輪王受灌頂位。及大臣官族等。恒詣佛所。恭敬禮拜承事供養。為剎帝利婆羅門等。恒詣佛所。恭敬禮拜承事供養。如是經無量無數百千萬億劫。親近諸佛植眾德本。所集阿耨多羅三藐三菩提。

復次阿難。無量壽如來。有如是百千萬十萬百萬。一俱胝百俱胝千俱胝。緊迦囉數。頻婆囉數。那由他數。阿由他數。毘婆訶數。嚩娑那數。穰伽數。阿僧祇數。十阿僧祇數。百阿僧祇數。千阿僧祇數。百千阿僧祇數。阿摩儞野數。不可思議數。如是無量<x>無數聲聞之眾</x>。<x>譬喻算數數不能</x>及。阿難。彼<x>大目乾連神通第一</x>。<x>三千大千世界所有一切</x>童男童女。<x>於一晝夜悉知其數</x>。<x>假使</x>百千俱胝聲聞神通之力。<x>皆如大目乾連</x>。<x>又一一聲聞</x>。<x>壽</x>百千俱胝那由他<x>歲</x>。<x>盡其壽命</x>數。<x>彼聲聞百分之中</x>。<x>不及一分</x>。

復次阿難。<x>譬如大海</x>。<x>深</x>八萬四千由旬。<x>廣</x>闊<x>無邊</x>。假使有人出身<x>一毛</x>。<x>碎為</x>百俱胝細<x>如微塵</x>。以一<x>一塵</x>投海出水。水在塵上形量亦爾。如是投盡毛塵。於意云何。<x>毛塵水多海中水多</x>。阿難白佛言。世尊。毛塵出水未及半合。海水無量。佛言阿難。<x>彼目乾連等聲聞之眾</x>。<x>盡其形壽</x>。<x>數知數者如毛塵之水</x>。<x>數未盡者如海中水</x>。如是彼佛。有如是無量不可算數聲聞弟子。

又彼佛國土大富無量。唯受快樂無有眾苦。無地獄餓鬼畜生焰魔羅界及八難之報。唯有清淨菩薩摩訶薩及聲聞之眾。

復次阿難。彼佛國土。有種種寶柱。皆以百千珍寶。而用莊嚴。所謂金柱銀柱。琉璃柱。頗梨柱。真珠柱。硨磲柱。瑪瑙柱。復有金銀二寶柱。金銀琉璃三寶柱。金銀琉璃頗梨四寶柱。金銀琉璃頗梨真珠五寶柱。金銀琉璃頗梨真珠硨磲六寶柱。金銀琉璃頗梨真珠硨磲瑪瑙七寶柱。

爾時世尊。說此偈已。會中有觀自在菩薩。即從座起合掌向佛。而作是言。世尊。以何因緣。無量壽佛於其面門。放無量光照諸佛剎。唯願世尊方便解說。令諸眾生及他方菩薩。聞是語已生希有心。於佛菩提志樂趣求入不退位。

爾時世尊告觀自在菩薩言。汝今諦聽吾為汝說。彼佛如來。於過去無量無邊阿僧祇劫前。為菩薩時發大誓言。我於未來成正覺時。若有十方世界無量眾生。聞我名號或頂禮憶念。或稱讚歸依。或香花供養等。如是眾生速生我剎。見此光明即得解脫。若諸菩薩見此光明即得受記證不退位。手持香花及諸供具。往十方界無邊淨剎。供養諸佛而作佛事增益功德。經須臾間復還本土受諸快樂。是故光明而入佛頂。

/xia:15:1/
