佛語阿難。其世饒王佛。<x>知其高明</x>所願快善。<x>即為</x><y>法寶藏</y><x>菩薩說經言</x>。<x>譬如大海水</x>。<x>一人<thru>升</thru><z>斗</z>量</x>之。一劫不止。<x>尚可</x>枯盡。令海<x>空</x>竭得其<x>底</x>泥。<x>人至心求道</x>。<x>何</x>而當<x>不</x>可<x>得</x>乎。求索精進不休止者。會得心中所欲願耳。法寶藏菩薩。聞世饒王佛說經如是。則大歡喜踊躍。其佛<x>則為</x>選擇<x>二百一十億佛國</x>中諸天人民善惡國土之好醜。為選心中所願用與之。世饒王佛說經竟。<y>法寶藏</y><x>菩薩便一其心</x>。則得天眼徹視。悉自見二百一十億諸佛國中諸天人民之善惡國土之好醜。則<x>選</x>心<x>所欲</x>願。便<x>結得</x>是二十四<x>願</x>經。則奉行之。<x>精</x>進勇猛<x>勤</x>苦<x>求索</x>。如是無央數劫。所師事供養諸佛已。過去佛亦無央數。其法寶藏菩薩。至其然後。自致得作佛。名無量清淨覺最尊。智慧勇猛光明無比。今現在所居國甚快善。在他方異佛國教授八方上下無央數諸天人民。及蜎飛蠕動之類。莫不得過度解脫憂苦者。無量清淨佛為菩薩時。常奉行是二十四願。珍寶愛重保持恭順。精進禪行之。與眾超絕卓然有異。皆無有能及者。

/xia:12:4-6/「光明轉不同等。諸佛威神同等耳」這句別文無。重要
佛言。八方上下無央數諸佛。其項中光明所照。皆如是也。無量清淨佛項中光明。焰照千萬佛國。所以<x>諸佛光明所照</x>有<x>遠近</x>者何。<x>本前世</x>宿命。<x>求道</x>為菩薩時。<x>所願功德</x>。各自有大小。<x>至</x>其然後<x>作佛時</x>。悉各<x>自</x>得之。是故令光明轉不同等。諸佛威神同等耳。<x>自在</x>意<x>所</x>欲<x>作為不豫計</x>。無量清淨佛光明。所照最大。諸佛光明。皆所不能及也。

佛稱譽無量清淨佛光明。無量清淨佛光明極善。善中明好甚快無比。絕殊無極也。<y>無量清淨</y><x>佛光明<thru>殊</thru><z>善</z>好</x>。<x>勝於日月之明</x>。<x>百億萬倍</x>也。無量清淨佛光明。諸佛<x>光</x>明<x>中</x>之<x>極</x>明也。無量清淨佛光明。諸佛光明中之極好也。無量清淨佛光明。諸佛光明中之極雄傑也。無量清淨佛光明。諸佛光明中之快善也。無量清淨佛光明。諸<x>佛</x>光明<x>中之王</x>也。無量清淨佛光明。諸佛光明中之最極尊也。無量清淨佛光明。諸佛光明中之壽明無極。

無量清淨佛光明。焰照諸無央數天下幽冥之處皆常明。諸有人民蜎飛蠕動之類。莫不見無量清淨佛光明。見無量清淨佛光明。莫不慈心歡喜者。世間諸有婬姪瞋怒愚癡。見無量清淨佛光明。莫不作善者。諸泥犁禽獸薛荔。考掠勤苦之處。見無量清淨佛光明至。皆休止不得復治。死後莫不得解脫憂苦者也。無量清淨佛光明名聞八方上下無窮無極無央數佛國。諸天人民莫不聞知。聞知者莫不得過度者。

/xia:12:11/
佛言。我不獨稱譽無量清淨佛光明也。八方上下無央數諸佛。辟支佛菩薩阿羅漢。所稱譽皆如是佛言。其有人民善男子善女人。聞無量清淨佛聲。稱譽光明。如是朝暮。常稱譽其光明明好。至心不斷絕。在心所欲願往生無量清淨佛國。可得為諸菩薩阿羅漢所尊敬。智慧勇猛。若其然後作佛者。亦當復為八方上下無央數辟支佛菩薩阿羅漢。所稱譽光明。亦當復如是。則眾比丘僧諸菩薩阿羅漢。諸天帝王人民。聞之皆歡喜踊躍。莫不讚歎者。

佛言。我道無量清淨佛光明姝好巍巍稱譽快善。晝夜一劫尚未竟也。我但為若曹小說之耳。佛說無量清淨。為菩薩求索。得是二十四願。

/xia:10/
時<x>阿闍</x>世<x>王</x>太<x>子</x>。<x>與五百大長者</x>迦羅越子。<x>各持一金華蓋</x>。前<x>上佛已</x>。悉<x>卻坐一面聽經。</x>阿闍世王太子及五百長者子。聞無量清淨佛二十四願。皆大歡喜踊躍。<x>心中</x>俱<x>願言</x>。<x>令我等</x>後<x>作佛時</x>。<x>皆如</x><y>無量清淨佛</y>。<x>佛</x>則<x>知之</x>。<x>告諸比丘</x>僧。<x>是</x>阿闍世王太子。及五百長者子。卻<x>後</x>無央數劫。皆<x>當作佛</x>如無量清淨佛。佛言。是阿闍世王太子。五百長者子。作菩薩道已來。<x>無</x>央<x>數劫</x>。皆各<x>供養四百億佛</x>已。<x>今</x>復來<x>供養我</x>。是阿闍世王太子。及五百人等。皆前世<x>迦葉佛時</x>。<x>為我</x>作<x>弟子</x>。今皆復會是<thru>共</thru><z>復</z><x>相值也</x>。則<x>諸比丘</x>僧。<x>聞佛言</x>皆心踊躍。<x>莫不歡喜</x>者。

/xia:9:6,7/${XB}說十劫。
佛告阿難。無量清淨佛作佛已來。凡十八劫。所居國名須摩提。正在西方。去是閻浮利地界。千億萬須彌山佛國。

/xia:11:3,2,1/
其國<x>地</x>皆自然<x>七寶</x>。其一寶者名白銀。二寶者名黃金。三寶者水精。四寶者琉璃。五寶者珊瑚。六寶者虎珀。七寶者車磲。是七寶皆以自共為地。曠蕩甚<x>大無極</x>。皆自相參轉相入中。各自焜煌參光極明。自然軟甚姝好無比。如其七寶地。諸八方上下眾寶中精。都自然之合會共化生耳。其寶比如第六天上之七寶也。其國中<x>無</x>有<x>須彌山</x>。其日月星辰。第一四天王。第二忉利天。皆在虛空中。其國土<x>無</x>有大<x>海</x>水。亦無小海水。無<x>江</x>河洹水也。亦無山林溪谷。無有幽<x>冥</x>之處。其國<x>七寶地</x>皆<x>平正</x>。

<x>無</x>有泥犁禽獸餓鬼。蜎飛蠕動之類也。無阿須倫諸龍鬼神也。終<x>無</x>有大<x>雨</x>時。亦<x>無</x><y>春夏秋冬</y>也。亦<x>無</x>有大<x>寒</x>。亦不大<x>熱</x>。常和調中適甚快善無比。

/xia:19:2,3/
皆有萬種自然之物。<x>百味飲食</x>。意欲有所得。則<x>自然在前</x>。意不用者。則自然<x>化去</x>。比如第六天上自然之物。恣若自然則皆隨意。

/xia:13:3-8/
其國中悉諸菩薩阿羅漢。無有婦女。壽命極壽。壽亦無央數劫。女人往生者。則化生皆作男子。

但有菩薩阿羅漢無央數。

/xia:28:1,2/
/xia:30/
/xia:31/
<x>悉皆洞視徹聽</x>。悉遙相見。遙相瞻望。遙相聞語聲。悉皆求道善者。同一種類無有異人也。其諸菩薩阿羅漢。面目皆端正。清潔絕好。悉同一色。無有偏醜惡者。諸菩薩阿羅漢。皆才猛黠慧。其所衣服。皆衣自然之衣。

都心中所念。常念道德。其所欲語言。便皆豫相知意。其所念言道。常說五事。其國中諸菩薩阿羅漢。自共相與語言。輒說經道。終不說他餘之惡。其語言音響。如三百鍾聲。

皆相敬愛。無有相憎者。皆自以長幼上下。先後言之。都共往會以義而禮。轉相敬事如兄如弟。以仁履義。不妄動作。言語而誠。轉相教令。不相違戾。轉相承受。皆心潔淨無所貪慕。終無有婬劮瞋怒之心愚癡之態也。無有邪心念婦女意也。悉智慧勇猛。和心歡樂。好喜經道。皆自知其前世所從來生。億萬劫世時宿命善惡存亡。現在卻知無極。

/xia:16/
<y>無量清淨佛</y>所可教授<x>講堂精舍</x>。<x>皆</x>復<x>自然七寶</x>。金銀水精琉璃白玉虎珀車磲。自共轉相成也。甚姝明好絕姝無比。亦無有作者。亦不知所從來。亦無有持來者。亦無所從去。無量清淨佛所願德重。其人作善故。論經語義。說經行道。講會其中。自然化生耳。其講堂精舍。皆復有<x>七寶樓觀欄楯</x>。復以金銀水精琉璃白玉虎珀車磲為瓔珞。復以白珠明月珠摩尼珠為交絡。覆蓋其上。皆自作五音聲音聲甚姝無比。無量清淨佛國。<x>諸菩薩</x>阿羅漢<x>所居舍宅</x>。皆<x>復</x>以七寶金銀水精琉璃珊瑚虎珀車磲馬瑙。化生轉共相成也。其舍宅皆悉各有七寶樓觀欄楯。復以金銀水精琉璃白玉虎珀車磲為瓔珞。復以白珠明月珠摩尼珠為交絡。覆蓋其上。皆各復自作五音聲。

/xia:17:1-4/
無量清淨佛<x>講堂</x>精舍。及諸菩薩阿羅漢所居。七寶舍宅中外內處處。皆復自然流<x>泉</x>水浴<x>池</x>。其浴池者。皆<x>復</x>以自然<x>七寶</x>。七寶俱生金銀水精琉璃珊瑚虎珀車磲。轉共相成也。<x>水底沙</x>皆復以七寶金銀水精琉璃珊瑚虎珀事磲也。有純白銀池者。其底沙皆黃金也。

/xia:17:7,8/
佛言。無量清淨佛浴池。長四萬八千里。廣亦四萬八千里。其浴池皆七寶轉自共相成。其池水底沙。皆復以七寶白珠明月珠摩尼珠也。無量清淨佛。及諸菩薩阿羅漢浴池中水。皆清淨香潔。中皆有香華。悉自然生百種華。種種異色異香。華皆千葉。諸華甚香無比。香不可言也。其華香者。亦復非世間之華。復勝天上之華。是華香者。八方上下眾華香中精。自然生耳。池中水流行。轉相灌注。池中水流亦不遲亦不駃。皆復自作五音聲。

/xia:17:11/
佛言。八方上下。無央數佛國。諸天人民。及蜎飛蠕動之類。諸生無量清淨佛國者。都皆於是七寶水池蓮華中化生。便則自然長大。亦無乳養之者。皆食自然之飲食。其身體者。亦非世間人之身體也。亦非天上人之身體也。皆積眾善之德。悉受自然虛無之身體。甚姝好無比。

/xia:18:2/
佛語阿難。<x>如世間貧窮乞丐人</x>。令<x>在帝王邊</x>住者。其人<x>面</x>目形<x>貌</x>。何等<x>類乎</x>。寧類帝王面目形貌顏色不。阿難言。假令使子在帝王邊住者。其面目形狀甚醜惡不好。不如帝王面目形類姝好。百千億萬倍也。所以者何。見乞人貧窮困極。飲食未曾有美食時也。既惡食不能得飽食。食栽支命。骨節相撐拄。無所用自給。常乏無有儲。飢餓寒凍怔忪愁苦。但坐其前世宿命為人時。愚癡無智富益慳。有財不肯慈哀。仁賢為善博愛施與。但欲唐得。貪惜飲食獨食嗜美。不信施貸後得償報也。復不信作善後世得其福。蒙籠項佷益作眾惡。如是壽終財物盡索。素無恩德無所恃怙。入惡道中坐之適苦。然後得出解脫。今生為人。作於下賤貧家作子。強像人形。狀貌甚醜。衣被弊壞。單空獨立。不蔽形體。乞丐生活耳。飢寒因苦。面目羸劣。不類人色。坐其前世身之所作。受其殃罰。示眾見之莫誰哀者。棄捐市道暴露痟瘦。黑醜惡極不及人耳。所以帝王人中獨尊最好者何。皆其前世宿命為人時作善。信愛經道。布施恩德。博愛順義。慈仁喜與。不貪飲食。與眾共之。無所遺惜都無違諍。得其福德壽終德隨不更惡道。今生為人得生王家自然尊貴。獨王典主攬制人民為人雄傑。面目潔白和顏好色。身體端正眾共敬事。美食好衣隨心恣意。在樂所欲自然在前都無違諍。於人中姝好。無憂快樂面色光澤。故乃爾耳。

/xia:18:3-8/
佛告阿難若言是也。如帝王雖於人中好無<x>比</x>當令在<y>遮迦越王</y>邊住者。其面目形貌甚醜惡其狀不好。比如<x>乞人在帝王邊</x>住耳。帝王面醜。尚復不如遮迦越王面色姝好。百千億萬倍也。如<y>遮迦越王</y>。於天下絕好無比。當令在第二<x>忉利天</x><y>帝釋</y><x>邊</x>住者。其面甚醜不好。尚復不如天帝釋面貌端正姝好。百千億萬倍也。如<x>天帝釋</x>。令在<x>第六天王</x>邊住者。其面貌甚醜不好。尚復不如第六天王面貌端正姝好。百千億倍也。如<x>第六天王</x>。令在<y>無量清淨佛國</y>中。諸<x>菩薩阿羅漢邊</x>住者。其面甚醜。尚復不如無量清淨佛國中。諸菩薩阿羅漢面貌端正姝好。百千億萬倍也佛言。無量清淨佛諸菩薩阿羅漢面貌。悉皆端正絕好無比。次於泥洹之道也。

/xia:14:1-5/
佛告阿難。無量清淨佛及諸菩薩阿羅漢。講堂精舍。所居處舍宅。中外浴池上。皆有<x>七寶樹</x>。中有純銀樹。中有純金樹。中有純水精樹。中有純琉璃樹。中有純白玉樹。中有純珊瑚樹。中有純虎珀樹。中有純車磲樹。種種各自異行。

中復有兩寶共作一樹者。銀樹銀根金莖銀枝金葉銀華金實。金樹者。金根銀莖金枝銀葉金華銀實。是兩寶樹轉共相成。各自異行。

中復有三寶共作一樹者。銀樹。銀根金莖。水精枝銀葉。金華水精實。金樹者。金根銀莖。水精枝金葉。銀華水精實。水精樹者。水精根銀莖。金枝水精葉。銀華金實。是三寶樹轉共相成。各自異行中。

復有四寶共作一樹者。銀樹。銀根金莖。水精枝琉璃葉。銀華金實。金樹者。金根銀莖。水精枝琉璃葉金華銀實。水精樹者。水精根琉璃莖。銀枝金葉。水精華琉璃實。琉璃樹者。琉璃根水精莖。金枝銀葉。琉璃華水精實。是四寶樹轉共相成。各自異行中。

復有五寶共作一樹者。銀樹。銀根金莖。水精枝琉璃葉。珊瑚華金實。金樹者。金根銀莖。水精枝琉璃葉。珊瑚華銀實。水精樹者。水精根琉璃莖。珊瑚枝銀葉。金華琉璃實。琉璃樹者。琉璃根珊瑚莖。水精枝金葉。銀華珊瑚實。珊瑚樹者。珊瑚根琉璃莖水精枝金葉。銀華琉璃實。是五寶樹轉共相成。各自異行中。

復有六寶共作一樹者。銀樹。銀根金莖。水精枝琉璃葉珊瑚華虎珀實。金樹者。金根銀莖。水精枝琉璃葉。虎珀華珊瑚實。水精樹者。水精根琉璃莖。珊瑚枝銀葉。虎珀華金實。琉璃樹者。琉璃根珊瑚莖。虎珀枝水精葉。金華銀實。珊瑚樹者。珊瑚根虎珀莖。銀枝金葉。水精華琉璃實。虎珀樹者。虎珀根珊瑚莖。金枝銀葉。琉璃華水精實。是六寶樹轉共相成。各自異行中。

復有七寶共作一樹者。銀樹。銀根金莖。水精節琉璃枝珊瑚葉。虎珀華車磲實。金樹者。金根水精莖。琉璃節珊瑚枝虎珀葉。車磲華銀實。水精樹者。水精根琉璃莖。珊瑚節虎珀枝車磲葉。白玉華金實。琉璃樹者。琉璃根珊瑚莖。虎珀節白玉枝車磲葉。水精華銀實。珊瑚樹者。珊瑚根虎珀莖。白玉節銀枝明月珠葉。金華水精實。虎珀樹者。虎珀根白玉莖。珊瑚節琉璃枝車磲葉。水精華金實。白玉樹者。白玉根車磲莖。琉璃節珊瑚枝虎珀葉。金華摩尼珠實。是七寶樹轉共相成。種種各自異行。行行自相值。莖莖自相准。枝枝自相值。葉葉自相向。華華自相望。極自軟好。實實自相當。

/xia:14:6/
佛言。無量清淨佛。講堂精舍中。外內七寶浴池繞邊。上諸七寶樹。及諸菩薩阿羅漢。七寶舍宅中。外七寶浴池繞。池邊七寶樹。數千百重行。皆各各如是<x>行行</x>。自作<x>五音</x>。聲甚好無比。

佛語阿難。如世間帝王。萬種伎樂音聲。不如遮迦越王。諸伎樂一音聲好。百千億萬倍也。如遮迦越王。萬種伎樂音聲。尚復不如第二忉利天上。諸伎樂一音聲好。百千億萬倍也。如忉利天上。萬種伎樂之聲。尚復不如第六天上。諸伎樂一音聲好。百千億萬倍也。如第六天上。萬種音樂之聲。尚復不如無量清淨佛國中。七寶樹一音聲好。百千億萬倍也。無量清淨佛國。亦有萬種自然之伎樂無極也。

/xia:17:5,6/此處水池為洗浴用。此段即是洗浴場景。${XB}顯然沒有。
無量清淨佛。及諸菩薩阿羅漢欲浴時。便各自入其七寶池中浴。諸菩薩阿羅漢意欲令水沒<x>足</x>。水則沒足。意欲令水<x>至膝</x>。水則至膝。意欲令水<x>至腰</x>。水則至腰。意欲令水<x>至腋</x>。水則至腋。意欲令水<x>至頸</x>。水則至頸。意欲令水自<x>灌身</x>上。水則灌身上。意欲令水轉復還如故。水則轉還復如故。恣若隨意所欲好喜。

佛言。無量清淨佛。及諸菩薩阿羅漢皆浴已。悉自於一蓮華上坐。則四方自然亂風起。其亂風者。亦非世間之風也。亦復非天上之風也。是亂風者。都為八方上下眾風中之自然。都相合會共化生耳。其亂風亦不大寒。亦不大溫。常和調中適其涼好無比。亂風徐起。亦不遲亦不疾。適得中宜。吹國中七寶樹。七寶樹皆復自作五音聲。亂風吹華。悉覆蓋其國中。華皆自散無量清淨佛。及諸菩薩阿羅漢上。華適墮地。華皆厚四寸。極自軟好無比。華小萎。則自然亂風吹萎華。悉自然去。則復四方。復自然亂風起。吹七寶樹。七寶樹。皆復自作五音聲。亂風吹華。悉復自然散無量清淨佛。及諸菩薩阿羅漢上。華墮地則自然亂風。復吹萎華。悉自然去。則復四方自然亂風起。吹七寶樹華。如是者四反。諸菩薩阿羅漢中。有但欲聞經者。中有但欲聞音樂聲者。中有但欲聞華香者。中有不欲聞經者。中有不欲聞五音者。中有不欲聞華香者。其所欲聞者。輒則獨聞之。其所不欲聞者。了獨不聞也。則皆自然隨意在所欲喜樂。不違其心中所欲願也。無量清淨佛。及諸菩薩阿羅漢。皆浴訖已各自去。

/xia:16:3-6/
其諸菩薩阿羅漢。各自行道。<x>中有在地講經者</x>。中有在地<x>誦經者</x>。中有在地說經者。中有在地口<x>受經者</x>。中有在地<x>聽經者</x>。中有在地念經者。中有在地<x>思道者</x>。中有在地<x>坐禪</x>一心<x>者</x>。中有在地<x>經行者</x>。中<x>有在虛空中講經者</x>。中有在虛空中<x>誦經者</x>。中有在虛空中說經者。中有在虛空中口<x>受經者</x>。中有在虛空中<x>聽經者</x>。中有在虛空中<x>念經者</x>。中有在虛空中<x>思</x>念<x>道者</x>。中有在虛空中<x>坐禪</x>一心<x>者</x>。中有在虛空中<x>經行者</x>。中有<x>未得須陀洹道者</x>。<x>則得須陀洹道</x>。中有<x>未得斯陀含道者</x>。<x>則得斯陀含道</x>。中有<x>未得阿那含道者</x>。<x>則得阿那含道</x>。中有未得阿羅漢道者。則得阿羅漢道。中有<x>未得阿惟越致菩薩者</x>。<x>則得阿惟越致菩薩</x>。菩薩阿羅漢<x>各自說經行道</x>。皆悉得道。<x>莫不歡喜</x>踊躍者。

/xia:27:1/這裏提到菩薩先得到無量清淨佛允許方出去供養十方諸佛。別文無
諸菩薩中。有意欲供養八方上下無央數諸佛。即皆俱前。為無量清淨佛作禮。卻長跪叉手白佛辭行。欲供養八方上下諸無央數佛。無量清淨佛則然可之。則使其行供養諸菩薩等。皆大歡喜。數千億萬人。無央數不可復計。皆智慧勇猛。各自翻飛。等輩相追。俱共散飛則行。即到<thru>八方上下無央數</thru><z>十方無邊</z>諸佛所</x>。皆前為佛作禮。便則<x>供養諸佛</x>。

/xia:27:2/「其華香萬種自然之物者。亦非世間之物也。亦復非天上之物也。是萬種之物」，別文亦無
其諸菩薩。意欲得萬種自然之物在前。則自然百雜色華百種。自然雜繒幡綵百種物。自然劫波育衣。自然七寶。自然燈火。自然萬種伎樂。悉皆在前。其華香萬種自然之物者。亦非世間之物也。亦復非天上之物也。是萬種之物。都為八方上下眾物。自然共合會化生耳。意欲得者。則自然化生在前。意不用者。便則自化去。諸菩薩便共持供養諸佛及諸菩薩阿羅漢上。邊傍前後徊繞周匝。自在意所欲得。則輒皆至。當爾之時。快樂不可言也。

/xia:27:3-5/
諸菩薩意。各欲得四十里華。則自然四十里華在前。諸菩薩皆於虛空中共持華。則散諸佛及諸菩薩阿羅漢上。華皆在虛空中下向。華甚香好。華適小萎便自墮地。則自然亂風吹。萎華悉自然去。

諸菩薩意。各復欲得八十里華。則自然八十里華在前。諸菩薩皆復於虛空中。共持華散諸菩薩阿羅漢上。華皆復在虛空中下向。華小萎便自墮地。則自然亂風吹萎華去。

諸菩薩意。各復欲得百六十里華。則自然百六十里華在前。諸菩薩皆復於虛空中。共持華則散諸佛及諸菩薩阿羅漢上。華皆復於虛空中下向。華適小萎便自墮地。則自然亂風吹。華悉自然去。

諸菩薩意。各復欲得三百二十里華則自然三百二十里華在前。諸菩薩皆復於虛空共持華則散諸佛及諸菩薩阿羅漢上。華皆復在虛空中下向。華適小萎便自墮地。則自然亂風吹。華悉自然去。

諸菩薩意。各復欲得六百四十里華。則自然六百四十里華在前。諸菩薩皆復於虛空中。共持華散諸佛及諸菩薩阿羅漢上。華皆復在虛空中下向。華適小萎便自墮地。則自然亂風吹華悉自然去。諸菩薩意各復欲得千二百八十里華。則自然千二百八十里華在前。諸菩薩皆復於虛空中。共持華散諸佛及諸菩薩阿羅漢上。華皆復在虛空中下向。華適小萎便自墮地。則自然亂風吹。華悉自然去。

諸菩薩皆大歡喜。俱於虛空中。大共作眾音自然伎樂。樂佛及諸菩薩阿羅漢。當是之時。快樂不可言。

諸菩薩皆悉卻坐聽經。聽經竟則悉皆諷誦通利。重知經道益明智慧。其諸華香。小萎便自墮地。則自然亂風吹華。悉皆自然去。

/xia:26:8-10/
則諸佛國中。從第一四天王上。至三十六天上。諸菩薩阿羅漢天人。<x>皆</x>復於虛空中。大共作眾音<x>伎樂</x>。諸天人<x>前</x>來者。轉去避<x>後</x>來者。後來者轉復<x>供養</x>如前。更相開避。諸天人歡喜聽經。皆大共作音樂。當是之時。<x>快樂</x>無極。

諸菩薩供養聽經訖竟。便皆起為諸佛作禮而去。則復飛到八方上下。無央數諸佛所。則復供養聽經。皆各如前時悉遍。以後日未中時。諸菩薩則皆飛而去。則還其國。悉前為無量清淨佛作禮。皆卻坐一面聽經。聽經竟皆大歡喜佛言無量清淨佛。

/xia:19:3,4/
及諸菩薩阿羅漢<x>欲食時</x>。則自然七寶机。自然劫波育。自然罽㲲以為座。無量清淨佛。及諸菩薩阿羅漢皆坐已。前悉有<x>自然七寶缽</x>。中皆有自然<x>百味飲食</x>。飲食者。亦不類世間飲食之味也。亦復非天上飲食之味也。此百味飲食者。都為八方上下眾。自然之飲食中精味。甚香美無有比。都自然化生耳。其飲食自在所欲得味甜酢。缽自在所欲得。諸菩薩阿羅漢中有欲得銀缽者。中有欲得金缽者。中有欲得水精缽者。中有欲得琉璃缽者。中有欲得珊瑚缽者。中有欲得虎珀缽者。中有欲得白玉缽者。中有欲得車渠缽者。中有欲得瑪瑙缽者。中有欲得明月珠缽者。中有欲得摩尼珠缽者。中有欲得紫磨金缽者。皆滿其中百味飲食。自恣若隨意則至。亦無所從來。亦無有供作者。自然化生耳。諸菩薩阿羅漢皆食。食亦不多亦不少。悉自然平等。諸菩薩阿羅漢食。亦不言美惡。亦不以美故喜。食已諸飯具缽机坐。皆自然化去。欲食時乃復化生耳。諸菩薩阿羅漢。皆心清潔不慕飯食。但用作氣力耳。皆自然消散糜盡化去。

/xia:27:6,7/
佛告阿難。<x>阿彌陀佛</x>。為諸菩薩阿羅漢說法時。<x>都悉大會講堂</x>上。其國諸菩薩阿羅漢。及諸天人民無央數。都不可復計。皆飛到無量清淨佛所。悉前為無量清淨佛作禮。卻坐聽經。無量清淨佛。便則為諸比丘僧。諸菩薩阿羅漢。諸天人民。廣說道智大經。皆悉聞知經道。<x>莫不歡喜</x>踊躍<x>心</x>開<x>解</x>者。

/xia:26:1,2/
即四方自然亂風起。吹國中七寶樹。七寶樹皆復作五音聲。亂風吹七寶華華覆蓋其國。皆在虛空中下向。華甚香極自軟好。香遍國中。華皆自散無量清淨佛。及諸菩薩阿羅漢上。華墮地皆厚四寸。華適小萎。則自然亂風吹。萎華自然去。則四方俱復自然亂風起。吹七寶樹。七寶樹皆復自作五音聲。亂風吹七寶樹華。華復如前。皆自然散無量清淨佛及諸菩薩阿羅漢上。華墮地復厚四寸。華小萎。則自然亂風吹。萎華悉自然去。亂風吹華。如是四反。

則第一四天王諸天人。第二忉利天上諸天人。第三天上諸天人。第四天上諸天人。第五天上諸天人。第六天上諸天人。第七梵天上諸天人。上至第十六天上諸天人。上至三十六天上諸天人。皆持天上萬種自然之物。百種雜色華。百種雜香。百種雜繒綵。百種劫波育疊衣。萬種伎樂。轉倍好相勝。各持來下。為無量清淨佛作禮。

則供養無量清淨佛。及諸菩薩阿羅漢。諸天人皆復大作伎樂。樂無量清淨佛。及諸菩薩阿羅漢。當是之時。快樂不可言。諸天人前來者。轉去避後來者。後來者轉復供養如前。更相開避。

/xia:26:4/
則東方無央數佛國。不可復計。如恒水邊流沙。一沙一佛其數如是。諸佛各遣諸菩薩無央數。不可復計。皆飛到無量清淨佛所。則為無量清淨佛作禮。以頭面著佛足。悉卻坐一面聽經。聽經竟。諸菩薩皆大歡喜。悉起為無量清淨佛作禮而去。則西方無央數諸佛國。復如恒水邊流沙。一沙一佛其數如是。諸佛各復遣諸菩薩無央數。都不可復計。皆飛到無量清淨佛所。則前為無量清淨佛作禮。以頭面著佛足。悉卻坐一面聽經。聽經竟。諸菩薩皆大歡喜。起為無量清淨佛作禮而去。則北方無央數諸佛國。復如恒水邊流沙。一沙一佛其數如是。諸佛各復遣諸菩薩無央數。都不可復計。皆飛到無量清淨佛所。則前為無量清淨佛作禮。以頭面著佛足。悉卻坐一面聽經。聽經竟。諸菩薩皆大歡喜。起為無量清淨佛作禮而去。南方無央數諸佛國。復如恒水邊流沙。一沙一佛其數如是。諸佛各復遣諸菩薩無央數。都不可復計。皆飛到無量清淨佛所。則前為無量清淨佛作禮而去。則復四角無央數諸佛國。各復如恒水邊流沙。一沙一佛其數各如是。諸佛各復遣諸菩薩無央數。都不可復計。皆飛到無量清淨佛所。前為無量清淨佛作禮已。頭面著佛足。悉卻坐一面聽經。聽經竟。諸菩薩皆大歡喜。起為無量清淨佛作禮而去。

/xia:26:5/
佛言。八方上下諸無央數佛。更遣諸菩薩。飛到無量清淨佛所。聽經供養。轉更相開避。如是則下面。諸八方無央數佛國。一方者各復如恒水邊流沙。一沙一佛其數復如是。諸佛各遣諸菩薩無央數。都不可復計。皆飛到無量清淨佛所。前為阿彌陀佛作禮。以頭面著佛足。悉卻坐聽經。聽經竟。諸菩薩皆大歡喜。起為無量清淨佛作禮而去。上方諸佛。更遣諸菩薩。飛到無量清淨佛所。聽經供養相開避。前來者則去避後來者。後來者供養亦復如是。終無休絕極時。

佛語阿難。無量清淨佛。為諸菩薩阿羅漢說經竟。諸天人民中。有未得須陀洹道者。則得須陀洹道。中有未得斯陀含道者。則得斯陀含道。中有未得阿那含道者。則得阿那含道。中有未得阿羅漢道者。則得阿羅漢道。中有未得阿惟越致菩薩者。則得阿惟越致菩薩。阿彌陀佛。輒隨其本宿命求道時。心所喜願大小隨意。為說經輒授之。令其疾開解得道。皆悉明慧各自好喜。所願經道莫不喜樂誦習者。則各自諷誦經道。通利無厭無極也。諸菩薩阿羅漢中有誦經者。其音如雷聲。中有說經者。如疾風暴雨。

/xia:29:1-6/
時諸菩薩阿羅漢。說經行道皆各如是。盡一劫竟終無懈倦時也。皆悉智慧勇猛。身體皆輕。便終無有痛痒。極時行步坐起。皆悉才健勇猛。如師子中王。在深林中。當有所趣。向時無有敢當者。無量清淨佛國。諸菩薩阿羅漢。說經行道皆勇猛。無有疑難之意。則在心所作。為不豫計。百千億萬倍。是猛師子中王也。如是猛師子中王。百千億萬倍。尚復不如我第二弟子。摩訶目揵連勇猛。百千億萬倍也。無量清淨國。諸菩薩阿羅漢。皆勝我第二弟子摩訶目揵連也。佛言。如摩訶目揵連勇猛。於諸佛國諸阿羅漢中。最為無比。如摩訶目揵連。飛行進止。智慧勇猛。洞視徹聽。知八方上下去來現在之事。百千億萬倍都合為一智慧勇猛。當在無量清淨佛國。諸阿羅漢中者。其德尚復不如無量清淨佛國。一阿羅漢智慧勇猛者。千億萬倍也。

是時坐中有一菩薩。字阿逸菩薩。阿逸菩薩。則起前長跪叉手。問佛言。阿彌陀佛國中。諸阿羅漢。寧頗有般泥洹去者不。願欲聞之。佛告阿逸菩薩。若欲知者。如是四天下星。若見之不。阿逸菩薩言。唯然皆見之。

佛言。而我第二弟子。摩訶目揵連。飛行四天下。一日一夜遍數星。知有幾枚也。如是四天下。星甚眾多。不可得計。尚為百千億萬倍。是四天下星也。

/xia:29:7-10/
佛言。<x>如</x>天下<x>大海</x>水。減去一渧水。寧能令海水為減不。阿逸菩薩言。減大海水。百千億萬斗石。水尚復不能令海減少也。佛言。阿彌陀佛國。諸阿羅漢中。雖有般泥洹去者。如是大海。減一小水耳。不能令諸在阿羅漢為減知少也。

佛言。減大海水一溪水。寧能減海水不。阿逸菩薩言。減大海百千萬億溪水。尚復不能減海水。令知減少也。佛言。阿彌陀佛國。諸阿羅漢中。有般泥曰去者。如是大海減一溪水耳。不能減諸在阿羅漢。為減知少也。

佛言。而大海減一恒水。寧能減海水不。阿逸菩薩言。減大海水百千萬億恒水。尚復不能減大海水。令減知少也。佛言。阿彌陀佛國。諸阿羅漢。般泥曰去者無央數。其在者。新得阿羅漢者。亦無央數。都不為增減也。

阿逸菩薩則大歡喜。長跪叉手言。佛說無量清淨佛國。諸阿羅漢。般泥洹去者甚眾多。無央數國土快善之極。明好最姝無比。乃獨爾乎。

佛言。無量清淨佛國。諸菩薩阿羅漢所居。七寶舍宅中。有在虛空中居者。中有在地居者。中有意欲令舍宅最高者。舍宅則高。中有意欲令舍宅最大者。舍宅則大。中有意欲令舍宅在虛空中者。舍宅則在虛空中。皆自然隨意在所作為。中有殊不能令其舍宅。隨意所作為者。所以者何。中有能者。皆是前世宿命求道時。慈心精進益作諸善。德重所能致也。中有不能致者。皆是前世宿命求道時。不慈心精進。作善少德小。悉各自然得之。所衣被服飲食。俱自然平等耳。是故不同。德有大小別。知勇猛令眾見耳。

佛告阿逸菩薩。若見是第六天上天王所居處不耶。阿逸菩薩言。唯然皆見之。

佛言。無量清淨佛國土。講堂舍宅。倍復勝第六天王所居處。百千億萬倍也。

/xia:22/這部分專論無量壽的種種境界。難得！
佛告阿逸菩薩。無量清淨佛項中光明極大明。其日月星辰。皆在虛空中住止。亦不復迴轉運行。亦無有精光。其明皆蔽不復現。<y>無量清淨佛</y>光明照國中。及焰照他方佛國常大明。終<x>無有</x><thru>當冥時</thru><z>昏闇</z>也。其國中無有一日二日也。無有十五日一月也。無有五月十月也。無有五歲十歲也。無有百歲千歲也。無有萬歲億歲億萬歲十億萬歲也。無有百千億萬歲也。無有千億億萬歲也。無有一劫十劫也。無有百劫千劫也。無有萬劫十萬劫也。無有千萬劫也。無有百千億萬劫也。

佛言。無量清淨佛光明。光明無極。無量清淨佛光明。卻後無數劫。無數劫。重復無數劫。無數劫不可復計劫。劫無央數。終無有當冥時也。無量清淨國土及諸天。終無有壞敗時也。所以者何。無量清淨佛。壽命極長。國土甚好。故能爾耳。

佛言。無量清淨佛尊壽。劫後無數劫常無央。無般泥洹時也。無量清淨佛。於世間教授。意欲適度八方上下。諸無央數佛國。諸天人民。及蜎飛蠕動之類。皆欲使往生其國悉令得泥洹之道。其諸有作菩薩者。皆欲令悉作佛。作已悉令轉復教授八方上下。諸天人民。及蜎飛蠕動之類。皆復欲令悉得作佛。作佛時復教授無央數。諸天人民。蠕動之類。皆令得泥洹道去。諸所可教授弟子者。展轉復相教授轉相度脫。至令得須陀洹斯陀含阿那含阿羅漢辟支佛道。轉相度脫皆得泥洹之道悉如是。

無量清淨佛。常未欲般泥日也。無量清淨佛。所脫度展轉如是。復住無數劫。無數劫不可復計劫。終無有般泥洹時也。八方上下。無央數諸天人民。蜎飛蠕動之類。其生無量清淨佛國者。不可復勝數。諸作阿羅漢。得泥洹之道者。亦無央數。都不可復計也。無量清淨佛恩德。諸所布施。八方上下無窮無極。甚深大無量。快善不可言也。無量清淨佛智慧教授所出經道。布告八方上下。諸無央數。天上天下。甚多不原。其經卷數甚大眾。不可復計。都無極也。

佛告阿逸菩薩。若欲知無量清淨佛壽命無極時不也。阿逸菩薩言。願皆欲聞知之。佛言明聽。悉令八方上下。諸無央數佛國中。諸天人民。蜎飛蠕動之類。皆使得人道。悉令作辟支佛阿羅漢。共坐禪一心。都合其智慧。為一勇猛。共欲計知無量清淨佛壽命。知壽幾千億萬劫歲數。皆無有能計知極無量清淨佛壽者也。

佛言。復令他方面各千須彌山佛國中。諸天人民。及蜎飛蠕動之類。皆復得人道。悉令作辟支佛阿羅漢。皆令坐禪一心。共合其智慧。都為一勇猛。共欲數無量清淨佛國中。諸菩薩阿羅漢。計千億萬人。皆無有能數者也。

佛言。無量清淨佛。年壽甚長久浩浩。浩浩照明善甚深無極無底。誰當能信知其者乎。獨佛自知耳。阿逸菩薩聞佛言。即大歡喜。長跪叉手言。佛說無量清淨。佛壽命甚長。威神大智慧光明。巍巍快善。乃獨如是乎。

佛言。無量清淨佛。至其然後般泥洹者。其廅樓亘菩薩。便當作佛總領道智典主教授。世間八方上下。所過度諸天人民。蜎飛蠕動之類。皆令得佛泥洹之道。其善福德。當得復如大師無量清淨佛。住止無央數劫。無央數劫不可復計劫。不可復計劫。准法大師。爾乃般泥曰。其次摩訶那缽菩薩。當復作佛典主智慧都總教授。所過度福德。當復如大師無量清淨佛。止住無央數劫。常復不般泥洹。展轉相承。受經道甚明。國土極善。其法如是。終無有斷絕。不可極也。

佛言。我智慧所知見。諸已過去佛。如我名字釋迦文佛者。復如恒水邊流沙。一沙一佛。甫始諸來欲求作佛者。如我名字釋迦文佛者。復如恒水邊流沙。一沙一佛。佛正坐直南向。視見南方今現在佛。如我名字釋迦文佛者。復如恒水邊流沙。一沙一佛。八方上下。去來現在諸佛。如我名字釋迦文佛者。各如十恒水邊流沙。一沙一佛。其數如是。佛皆悉豫見知之。

佛言。往昔過去無央數劫已來。一劫十劫。百劫千劫。萬劫億劫。萬億劫億萬劫。劫中有佛。諸已過去佛。一佛十佛。百佛千佛。萬佛億佛。億萬佛中有佛佛。各各自有名字。名字不相同類。無有如我名字者。甫始當來劫。諸當來佛。一劫十劫。百劫千劫。萬劫億劫。萬億劫億萬劫。劫中有一佛十佛。百佛千佛。萬佛萬億佛。億萬佛中有佛。佛各自有名字。名字各異。不同諸佛名字。時乃有一佛。如我名字釋迦文佛耳。諸八方上下。無央數佛國。今現在佛。次他方異佛國。一佛國十佛國。百佛國千佛國。萬佛國億佛國。萬億佛國億萬佛國。佛國中有佛。各各自有名字。名字各異多多。復不可同。無有如我名字者。八方上下。無央數諸佛中。時時乃有如我名字釋迦文佛耳。八方上下去來現在。其中間曠絕甚遠悠悠。無窮無極。佛智亘然甚明。採古知今。前知無窮卻睹未然。豫知無極。都不可復計。甚無央數佛。威神尊明。皆悉知之。佛智慧道德合明。都無有能問佛經道窮極者。佛智慧終不可斗量盡也。

阿難聞佛言。則大恐怖衣毛皆起。阿難白佛言。我不敢有疑意於佛所也。所以問佛者。他方佛國皆有須彌山。其第一四王天。第二忉利天。皆依因之住止。我恐佛般泥曰後。儻有諸天人民。若比丘僧比丘尼優婆塞優婆夷。來問我無量清淨佛國。何以獨無須彌山。其第一四王天。第二忉利天。皆依因何等住止乎。我等應答之。今我不問佛者。佛去後。我當持何等語答報之乎。獨佛自知之耳。其餘人無有能為解之者。以是故問佛耳。

佛言。其人奉行施與。如是者。若其然後中復悔。心中狐疑。不信分檀布施作諸善後世得其福。不信有無量清淨佛國。不信往生其國中。雖爾其人續念不絕。暫信暫不信。意志猶豫無所專據。續結其善。願名本續得往生其人壽命病欲終時。無量清淨佛。則自化作形像。令其人目自見之。口不能復言。便心中歡喜踊躍。意念言。我悔不知益齋作善。今當生無量清淨佛國。其人則心中悔過。悔過者過差少。無所須及。其人壽命終盡。則生無量清淨佛國。不能得前至無量清淨佛所。便道見無量清淨佛國界邊自然七寶城。心中便大歡喜。道止其城中。則於七寶水池蓮華中化生。則受身自然長大。在城中於是間五百歲。其城廣縱各二千里。城中亦有七寶舍宅。舍宅中自然內外皆有七寶浴池。浴池中亦有自然華繞。浴池上亦有七寶樹重行。皆復作五音聲。其飲食時。前亦有自然食。具百味食。在所欲得。其人於城中快樂。其城中比如第二忉利天上自然之物。其人於城中不能得出。復不能得見無量清淨佛。但見其光明。心中自悔責。踊躍喜耳。亦復不能得聞經。亦復不能得見諸比丘僧。亦復不能得見知無量清淨佛國中諸菩薩阿羅漢狀貌何等類。其人若如是比而小適耳。佛亦不使爾身諸所作自然得之。皆心自趣向道入其城中。其人本宿命求道時。心口各異言念無誠。狐疑佛經。復不信向之。當自然入惡道中。無量清淨佛哀愍。威神引之去耳。其人於城中。五百歲乃得出。往至無量清淨佛所聞經。心不開解。亦復不得在諸菩薩阿羅漢比丘僧中聽經。以去所居處舍宅在地。不能令舍宅隨意高大在虛空中。復去無量清淨佛甚大遠。不能得近附無量清淨佛。其人智慧不明。知經復少。心不歡樂意不開解。其人久久。亦自當智慧開解知經。明健勇猛心當歡樂。次當復如上第一輩。所以者何。其人但坐其前世宿命求道時。不大持齋戒虧失經法。心意狐疑不信佛語。不信佛經深。不信分檀布施作善後世當得其福。復坐中悔。不信往生無量清淨佛國。作德不至心。用是故為第二中輩。

佛言。世間人欲以慕及賢明。居家修善為道者。與妻子共居。在恩好愛欲之中憂念。若多家事匆務。不暇大齋戒一心清淨。雖不能得離家。有空閒時自端正心。意念諸善專精行道。十日十夜殊使不能。爾自思惟熟計。欲度脫身者。下當絕念去憂。勿念家事。莫與女人同床。自端正身心斷愛欲。一心齋戒清淨。至意念生無量清淨佛國。一日一夜不斷絕者。<x>壽終皆得往生其國</x>。在七寶浴池蓮華中化生。可得智慧勇猛。所居七寶舍宅。自在其意所欲作為。可次如上第一輩。

佛語阿逸菩薩言。諸八方上下。無央數諸天人民。比丘僧比丘尼。優婆塞優婆夷。其往生無量清淨佛國眾等大會。皆共於七寶浴池中。都共人人。悉自於一大蓮華上坐。皆自陳道德善。人人各自說其前世宿命求道時。持經戒所作善法。所從來生本末。其所好喜經道。知經智慧。所施行功德。從上次下轉皆遍。以知經有明不明。有深淺大小。德有優劣厚薄。自然之道別知。才能智慧猛健。眾相觀照禮義和順。皆自歡喜踊躍。智慧有勇猛。各不相屬逮。

佛言。其人殊不豫益作德。為善輕虧。不信之然。徙倚懈怠。為用可爾。至時都集說經行道。自然迫促。應答遲晚。道智卓殊超絕。才妙高猛。獨於邊羸。臨事乃悔。悔者已出。其後當復何益。但心中悷悢慕及等耳。

/xia:32:4-11/
佛言。<y>無量清淨佛國</y>。諸<x>菩薩</x>阿羅漢眾等。大道聚會自都集。拘心制意端身正行。遊戲洞達。俱相隨飛行。幡輩<x>出入</x>。<x>供養</x>無極。歡心喜樂。樂共<x>觀經行道</x>。和好文習。<x>才猛智慧</x>。志若虛空。精進求願。心終不復中迴意終不復轉。終<x>無</x>有<x>懈</x>極<x>時</x>。雖求道<x>外若遲緩</x>。<x>內獨駃急</x><thru>疾</thru>。<x>容容虛空</x>中。<x>適得其中</x>。<x>中表相應</x>。<x>自然嚴整</x>。<x>撿斂端直</x>。<x>身心淨潔</x>。<x>無有愛</x>欲有所適<x>貪</x>。無有眾惡瑕穢。其<x>志願</x>皆<x>安定</x>殊好。<x>無增缺減</x>。<x>求道和正</x>。<x>不誤傾邪</x>。准望道法。<x>隨經約令</x>。<x>不敢</x>違失<x>蹉跌</x>。<x>若於繩墨</x>。遊於八方上下。無有邊幅。自在所欲。至到無窮無極。<x>咸</x>然<x>為道</x>。恢廓<x>慕</x>及<x>曠</x>蕩。念道<x>無他</x>之<x>念</x>。<x>無有憂思</x>。<x>自然無為</x>。<x>虛無空立</x>。<x>淡安無欲</x>。<x>作德善願</x>。<x>盡心求索</x>。<x>含哀慈愍</x>。精進中表。<x>禮義都合</x>。通洞無違。和順副稱。<x>苞羅表裏</x>。<x>過度解脫</x>。敢昇入於泥洹。長與道德合明。<x>自然</x>相<x>保守</x>。快意之滋滋真。<x>真</x>了<x>潔白</x>。<x>志願</x>高<x>無上</x>。清<x>淨定安</x>。靜<x>樂</x>之無有極。善好無有比。巍巍之燿照照。

<x>一旦開達明徹</x>。<x>自然中自然相</x>。<x>自然之有根本</x>。<x>自然</x>成五光至九色。五<x>光</x>至九<x>色參迴</x>轉。數百千更<x>變</x>。<x>最勝</x>之自然。<thru>自然</thru><z>鬱單</z><x>成七寶</x>。<x>橫攬成萬物</x>。<x>光精</x>參<x>明俱出</x>。<thru>好甚姝無有極</thru><z>善好殊無比。著於無上下。洞達無邊際</z>。

/xia:32:2-3/
<x>其國土</x>甚姝好<x>若此</x>。<x>何不力為善</x>。<x>念道之自然</x>。

/xia:32:12-15/
<x>著於無上下</x>。<x>洞達無邊幅</x>。<x>捐志虛空中</x>。<x>何不各精進</x>。<x>努力自求索</x>。<x>可得超絕去</x>。<x>往生無量清淨阿彌陀佛國</x>。<x>橫截於五道</x>。<x>惡道自閉塞</x>。<x>昇道之無極</x>。<x>易往無有人</x>。<x>其國<thru>土</thru>不逆違</x>。<x>自然<thru>之</thru><z>所</z>隨牽</x>。何不棄世事行求道德。<x>可得極長生</x>。<x>壽樂無有極</x>。<x>何為<thru>用</thru><z></z>世事</x>。<x>饒<z>饒</z><thru>共</thru>憂無<thru>有</thru>常</x>。

/xia:33:1/
<x>世人</x>薄俗。<x>共爭不急之</x><thru>事</thru><z>務</z>。共<x>於</x>是處<x>劇惡極苦之中</x>。<x>勤身</x><z>營務以自給濟</z><thru>治生用相給活</thru>。

/xia:33:2-4/
無<x>尊</x>無<x>卑</x>。無<x>富</x>無<x>貧</x>。無<x>老</x>無<x>少</x>。無<x>男</x>無<x>女</x>。皆當共憂錢財。有無同然。憂思適等。屏營愁苦。累念思慮。為之走使。無有安時。

有田憂田。有宅憂宅。有牛憂牛。有馬憂馬。有六畜憂六畜。有奴婢憂奴婢。衣被錢財金銀寶物。復共憂之。重思累息。憂念懷愁恐。橫為非常。<x>水火盜賊</x>。<x>怨家債主</x>。所<x>漂</x>燒繫唐突沒溺。憂毒怔忪無有解時。結憤心中慉氣毒怒。病在胸腹憂苦心離。<x>心堅意固</x>適<x>無縱捨</x>。或坐摧藏<x>終</x>亡身<x>命</x>。<x>棄捐</x>之去<x>莫誰隨者</x>。尊貴豪<x>富</x>有此<x>憂</x>懼。勤<x>苦</x>若此。結眾寒熱與痛共居。

小家貧者窮困乏無。<x>無田</x>亦<x>憂</x>欲有田。<x>無宅</x>亦<x>憂</x>欲有宅。無牛亦憂欲有牛。無馬亦憂欲有馬。無六畜亦憂欲有六畜。無奴婢亦憂欲有奴婢。無衣被錢財什物飯食之屬。亦憂欲有之。適有一少一。有是少是思有齊等。<x>適小具有</x>便復儩盡。如是苦生。當復求索。思想無益不能時得。身心俱勞坐起不安。<x>憂</x>念相隨勤<x>苦</x>若此。焦心不離恚恨獨怒。亦結眾寒熱與痛共居。

或時坐之終身夭命。亦不肯作善為道。壽命盡死。皆當獨遠去。有所趣向。善惡之道莫能知者。

/xia:33:5-9/
或時<x>世人父子兄弟</x>。<x>夫婦</x>家室中外<x>親屬</x>。居天地之間。<x>當相敬愛</x>。<x>不當相憎</x>。<x>有無</x>當<x>相</x>給<thru>與</thru><z>通</z>。<x>不當有貪</x>。<x>言色當和</x>。<x>莫相違戾</x>。或儻<x>心爭有所恚怒</x>。今世恨意微相嫉憎。<x>後世轉劇至成大怨</x>。所以者何。今<x>世之事</x>。<x>更</x>欲<x>相患害</x>。<x>雖不臨時應急相破</x>。殺之愁毒結憤精神。自然剋識不得相離。皆當對相生。值更相報復。

<x>人在</x>世間<x>愛欲之中</x>。<x>獨來獨去<z>獨</z>死<z>獨</z>生</x>。當行至趣<x>苦樂</x>之處。身<x>自當</x>之<x>無有代者</x>。<x>善惡變化</x>。殃咎異處。宿豫嚴待。當獨昇入遠到他處。莫能見者去在何所。善惡自然<x>追逐往生</x>。窈窈冥冥別離久長。<x>道路不同會見無期</x>。甚難甚難復得相值。<x>何不</x>棄眾事。各勱<x>強健時</x>。<x>努力</x>力<thru>為</thru><z>修</z><x>善</x>。力精進來度世。可得極長壽。殊不肯求於道。復<x>欲何</x>須<x>待</x>欲何樂<x>乎</x>。

/xia:33:10-15/
如是世人。不信作善得善。不信為道得道。不信死後世復生不信施與得其福德。都不信之。亦以謂之不然。言無有是。但坐是故且自見之。更相看視。前後轉相承受。父餘教令。先人祖父。素不作善。本不為道。<x>身愚神闇</x>。心塞意閉。不見天道。殊無有能。見人生死。有所趣向。亦莫能知者。適無有見善惡之道。復無有語者。為用作善惡福德。殃咎禍罰。各自競作為之用。殊無有怪也。至於生死之道轉相續。顛倒上下。無常根本。皆當過去不可常得。教語開導。信道者少。皆當生死無有休止。如是曹人。<x>朦冥抵突</x>。<x>不信經語</x>。<x>各欲快意</x>。<x>心</x><thru>不計慮</thru><z>無遠慮</z>。愚癡於愛欲。不解於道德。迷惑於瞋怒。貪猥於財色。坐之不得道。當更勤苦極。在於惡處生。終不得止休。息痛之甚可傷。或時家室中外。父子兄弟夫婦。至於生死之義。更相哭淚轉相思慕。憂念憤結恩愛繞續。心意痛著對相顧思。晝夜無有解時。

/xia:33:16,17/
教示道德心不開明。恩愛情欲不離。閉塞蒙蒙交錯覆蔽。不得思計。心自端正決斷世事。專精行道便旋至竟。年壽命盡不能得道。無可奈何。總猥憒譊皆貪愛欲。如是之法。不解道者多。得道者少。世間匆匆無可聊賴。尊卑上下豪貴貧富。男女大小各自匆務。勤苦躬身<x>各懷殺毒</x>。<x>惡氣</x>窈冥。莫不惆悵。<x>為妄作事</x>。惡<x>逆天地</x>。不從仁心。道德非惡。先隨與之。恣聽所為。其壽未至。<x>便頓奪</x>之。<x>下入惡道</x>。累世勤苦。展轉愁毒。數千萬億歲。<x>無有出期</x>。痛不可言。甚可憐愍。

/xia:33:18-20/
佛告阿逸菩薩等。諸天帝王人民。我皆語若曹。世間之事人用。是故坐不得道。<x>若曹熟思</x>惟之。<x>惡</x>者當縱捨<x>遠離</x>之。從<x>其善者</x>。當堅持之勿妄為非。益作諸善。大小多少<x>愛欲</x>之<x>榮</x>。皆不可常得。猶<x>當別離無可樂者</x>。勱佛世時。其有信愛佛經諸深。奉行道德。皆是我小弟也。其有甫欲學佛經戒者。皆是我弟子也。其有欲出身。去家捨妻子。絕去財色。欲來作沙門。為佛作比丘者。皆是我子孫。我世甚難得值。其有願欲生無量清淨佛國者。可得智慧勇猛。為眾所尊敬。<x>勿得隨心所欲</x>。<x>虧負經戒</x>。<x>在人後。</x>儻有疑意不解經者。復前問佛。佛當為若解之。

/xia:34:1-3/
<y>阿逸</y><x>菩薩</x>長跪叉手<x>言</x>。佛威神尊重。所說經快善。我曹聽佛經語。皆心貫思之。世人實爾。如佛所語無有異。今佛慈哀。我曹開視天道教語生路。耳目聰明長得度脫。若得更生。我曹聽佛經語。莫不慈心歡喜踊躍開解者。我曹及諸天帝王人民。蜎飛蠕動之類皆蒙佛恩。無不得解脫憂苦者。<x>佛</x>諸<x>教戒甚深</x>。無極無底。佛智慧所見知。八方上下去來現在之事無上無邊幅。佛甚難得值。經道甚難得聞。我曹皆慈心於佛所。今我曹得度脫者。皆是佛前世求道時。慊苦學問。精進所致。恩德普覆。所施行福德。相祿巍巍。<x>光明徹照</x>。<x>洞<thru>虛</thru><z>達</z>無極</x>。開入泥洹。教授經典。制威消化。愍動八方上下。無窮無極。佛為師法尊絕群聖。都無能及佛者。<x>佛為</x>八方上下諸<x>天</x>帝王<x>人</x>民作<x>師</x>。隨其心所欲願。大小皆令得道。<x>今</x>我曹<x>得</x>與<x>佛</x>相<x>見</x>。得<x>聞</x><y>無量清淨佛</y><x>聲</x>。我曹甚<x>喜</x>。莫不得黠慧開明者。

/xia:34:4,5/
<x>佛告</x><y>阿逸</y>菩薩。若言是實當爾。若有慈心於佛所者。大喜<x>實當念佛</x>。天下久久。乃復有佛耳。今我於苦世作佛所出經道。教授洞達。<x>截斷狐疑</x>。端心正行。<x>拔諸愛欲</x>。<thru>絕</thru><z>杜</z><x>眾惡</x>根本。<x>遊步</x>無拘。典總智慧。眾道表裏。攬持維綱。昭然分明<x>開示<thru>五</thru><z>正</z>道</x>。決正生死泥洹之道。

/xia:34:6-8/
佛言。若曹從無數劫以來。不可復計劫。若曹作菩薩道。欲過度諸天人民。及蜎飛蠕動之類。以來甚久遠。人從若得道度者無央數。至得泥洹之道者亦無央數。若曹及八方上下。諸天帝王<x>人民</x>。若比丘比丘尼優婆塞優婆夷。若曹宿命從無數劫以來。<x>展轉</x>是<x>五道</x>中。死生呼嗟。更相哭淚。轉相貪慕。<x>憂</x>思愁毒。痛<x>苦</x>不可言至今世死生<x>不絕</x>。乃至今日與佛相見共會值是。乃聞無量清淨佛聲甚快。善哉助汝曹喜。亦可自厭死生痛痒。<x>生時</x>甚<x>痛</x>甚<x>苦</x>甚極。至年長大亦苦亦極。<x>死時</x>亦<x>痛</x>亦<x>苦</x>亦極。甚<x>惡臭</x>處<x>不淨</x>潔。了<x>無</x>有<x>可<z>樂</z>者</x>。佛故悉語。若曹亦可自決斷臭處惡露。若曹亦可端心正身益作諸善。於是常端中外。潔淨身體。洗除心垢。自相約撿。表裏相應。言行忠信。

/xia:34:9-11/
<x>人能自度</x>脫。<x>轉相</x><thru>扶接</thru><z>拯濟</z>。拔諸愛欲。精明至心。求願不轉。<x>結</x>其<x>善</x>道根<x>本</x>。雖<x>精進</x>苦<x>一世</x>。<x>須臾間耳</x>。今世為善。<x>後</x>世<x>生</x><y>無量清淨佛國</y>。<x>快樂</x>甚<x>無極</x>。長與道合明。然善極相保守。長去離惡道痛痒之憂惱。拔勤苦諸惡根本。斷諸愛欲恩好。長生無量清淨佛國。亦無有諸痛痒。亦無復有諸惡臭處。亦無復有勤苦。亦無淫泆瞋怒愚癡。亦無有憂思愁毒。生於無量清淨佛國。欲壽一劫十劫。百劫千劫萬億劫。自恣若意。欲住止壽無央數劫。不可復計數劫。恣汝隨意皆可得之。欲食不食。恣若其意。都悉自然。皆可得之。次於泥洹之道。皆各自精明求索。心所欲願。勿得狐疑心中悔。欲往生者。無得坐其過失。在無量清淨佛國界<x>邊</x>。自然<x>七寶城中</x>。讁<x>五百歲</x>。

/xia:34:12/
阿逸菩薩言。<x>受佛</x>嚴<x>明</x>重<x>教</x>。皆當精進一心求索。請奉行之<x>不敢疑</x>怠。
/TEXT339R/佛說無量清淨平等覺經卷第三
/VOLSEP:a04/
/SECTION/佛說無量清淨平等覺經卷第四

/xia:35:1-4/
<x>佛告</x><y>阿逸</y>菩薩等。<x>若曹</x>於是世。能自制心正意。身不作惡者。是<x>為大德</x>善。都為八方上下最無有比。所以者何。八方上下無央數佛國中。諸天人民。皆自然作善。不大為惡易教化。<x>今我於是世間為佛</x>。於<x>五惡</x>五痛五燒之中作佛<x>為最劇</x>。教語人民。<x>令</x>絕<x>五惡</x>。令<x>去五痛</x>。令去<x>五燒</x>。<x>降化其心</x>。<x>令持五善</x>。得其福德</x>度世長壽泥洹之道。

佛言。何等為五惡。何等為五痛。何等為五燒中者。何等為消化五惡令持五善者。何等為持五善得其福德長壽度世泥洹之道。

/xia:35:5-13/
佛言。<x>其一</x>惡<x>者</x>。諸天人民下至禽獸蜎飛蠕動之類。<x>欲為眾惡</x>。強者伏弱。轉相剋賊。自相殺傷。更相食噉。不知為善。惡逆不道。受其殃罰。道之自然。當往趣向。神明記識。犯之不貰。轉相承續。故有貪窮下賤乞丐孤獨人。有聾盲瘖啞愚癡弊惡。下有尪狂不及逮之屬。其有尊貴豪富。高才明達智慧勇猛。皆其前世宿命。為善慈孝。布恩施德。故有官事王法牢獄。不肯畏慎作惡入法。受其過讁重罰致劇。求望解脫難得度出。今世有是目前現在。壽終尤劇。入其窈冥。受身更生。譬若王法劇苦極刑。故有自然泥犁禽獸薜荔。蜎飛蠕動之類屬。貿身形。改惡易道。壽命短長。魂神命精。自然入趣。受形寄胎。當獨值向。相從共生。轉相報償。當相還復。殃惡讁罰。眾事未盡。終不得離。展轉其中。世世累劫。無有出期。難得解脫。痛不可言天地之間自然有是。雖不臨時卒暴至。應時恒取自然之道。皆當善惡歸之。是為一大惡。為一痛。為一燒。勤苦如是。愁毒呼嗟。比如劇火起燒人身。

/xia:35:44/
人能自於其中。一心制意端身正行。獨作諸善。不為眾惡者。身獨度脫得其福德。可得長壽度世上天泥洹之道。是為一大善。

/xia:35:14-20/
佛言。<x>其二</x>惡<x>者</x>。世間帝王。長吏人民。父子兄弟。室家夫婦。略無義理。不從政令。轉淫奢驕慢。各欲快意。恣心自在。更相欺調。殊不懼死。心口各異。言念無實。佞諂不忠。諛媚巧辭。行不端正。更相嫉憎。轉相讒惡陷入惡枉。主上不明。心不察照。任用臣下。臣下存在。淺度能行。知其形勢。在位不正。為其所調。妄捐忠良。不當天心。甚違道理臣欺其君。子欺其父。弟欺其兄。婦欺其夫。室家中外。知識相紹。各懷貪婬。心獨恚怒。蒙聾愚癡欲益多。有尊卑上下。無男無女。無大無小。心俱同然。欲自厚己。破家亡身。不顧念前後。家室親屬。坐之破族。或時家中內外。知識朋友。鄉黨市里愚民。轉共從事。更相利害。爭錢財鬥。忿怒成仇轉爭勝負。慳富焦心。不肯施與。專專守惜。愛寶貪重。坐之思念。心勞身苦。如是至竟。無所恃怙。獨來獨去。無一隨者。善惡禍福。殃咎讁罰。追命所生。或在樂處。或入毒苦。然後乃悔。當復何及。或時世人。愚心少智。見善誹謗恚之。不肯慕及。但欲為惡。妄作非法。但欲盜竊。常懷毒心。欲得他人財物。用自供給。消散摩盡。賜復求索。邪心不正。常獨恐怖。畏人有色。臨時不計。事至乃悔。今世現在。長吏牢獄。自然趣向。受其殃咎。世間貧窮。乞丐孤獨。但坐前世宿命。不信道德。不肯為善。今世為惡。天神別籍。壽終入惡道。故有自然泥犁禽獸薜荔。蜎飛蠕動之類。展轉其中。世世累劫。無有出期。難得解脫。痛不可言。是為二大惡二痛二燒。勤苦如是。比如火起燒人身。

/xia:35:44/
人能自於其中。一心制意端身正行。獨作眾善。不為眾惡者。身獨度脫。得其福德。可得長壽度世上天泥洹之道。是為二大善。

/xia:35:21-24/
佛言。<x>其三</x>惡<x>者</x>。世間人民。寄生相因。共依居天地之間。處年壽命。無能幾歲。至有豪貴者。賢明善人。下有貧賤尪羸愚者。中有不良之人。但懷念毒惡。身心不正。常念婬泆。煩滿胸中。愛欲交錯。坐起不安。貪意慳惜。但欲唐得。眄睞細色。惡態婬泆。有婦厭憎。私妄出入。持家所有。相結為非。聚會飲食。自共作惡。興兵作賊。攻城格鬥。劫殺截斷。強奪不道。取人財物。偷竊趣得。不肯治生。所當求者。不肯為之。惡心在外。不能專作。欲擊成事。恐勢迫脅。持歸給家。共相生活。恣心快意。極身作樂。行亂他人婦女。或於其親屬不避。尊卑長老。眾共憎惡。家室中外。患而苦之。亦復不畏縣官法令無所避。錄如是之惡。自然牢獄。日月照識。神明記取。諸神攝錄。故有自然泥犁禽獸薜荔。蜎飛蠕動之類。展轉其中。世世累劫。無有出期。難得度脫。痛不可言。是為三大惡三痛三燒。勤苦如是。比若火起燒人身。

/xia:35:44/
人能自於其中。一心制意。端身正行。獨作眾善。不為眾惡者。身獨度脫。得其福德。可得長壽度世上天泥洹之道。是為三大善。

/xia:35:25-30/
佛言。<x>其四</x>惡<x>者</x>。諸惡人不能作善。自相壞敗。轉相教令。共作眾惡。主為傳言。但欲兩舌惡口。罵詈妄語。相嫉更相鬥亂。憎嫉善人。敗壞賢善。於傍快惡。復不孝順供養父母。輕易師父知識。無信難得誠實。自言尊貴有道。橫行威武。加捲力勢。侵剋易人。不能自知。為惡無自羞慚。自用頗健。令人承事敬畏。復不敬畏天地。神明日月。亦不可教令作善。不可降化。自用偃蹇。謂常當爾。亦復無憂哀心。亦不知恐懼。恣意憍慢如是。天神記識。賴其前世宿命。頗作福德。小善扶接。營護助之。今世作惡。福德盡儩。諸善鬼神各去離之身獨空立。無所復依。受重殃讁。壽命終身惡繞歸。自然迫促。當往追逐。不得止息。自然眾惡。共趣頓乏。其有名籍。在神明所。殃咎引牽。當值相得。當往趣向。受過讁罰。身心摧碎。神形苦極。不得離卻。但得前行。入於火鑊。當是時悔復何益。當復何及。天道自然。不得蹉跌。故有泥犁禽獸薜荔。蜎飛蠕動之屬。展轉其中。世世累劫。無有出期。難得解脫。痛不可言。是為四大惡四痛四燒。勤苦如是。比如火起燒人身。

/xia:35:44/
人能於其中。一心制意端身正行。獨作眾善。不為眾惡者。身獨度脫。得其福德。可得長壽度世上天泥洹之道。是為四大善。

/xia:35:31-38/
佛言。<x>其五</x>惡<x>者</x>。世人徙倚懈惰。不肯作善。不念治生。妻子飢寒。父母俱然。欲呵教其子。其子惡心。瞋目應怒。言令不和。違戾反逆劇於野人。比若怨家。不如無子。妄遍假貸。眾共患厭。尤無返復。無有報償之心。窮貧困乏。不能復得。辜較諧聲。放縱遊散。串數唐得。自用賑給。不畏防禁。飲食無極。喫酒嗜美。出入無有期度。魯扈抵突。不知人情。睢眄強制。見人有喜。憎嫉恚之。無義無禮。自用職當。不可諫曉。亦復不憂念父母妻子有無。又復不念卒報父母之德。亦復不念師父之恩。心常念惡。口常言惡。日不成就。不信道德。不信有賢明先聖。不信作善為道可得度世。不信世間有佛。欲殺羅漢鬥比丘僧。常欲殺人。欲殺父母兄弟妻子宗親朋友。父母兄弟妻子宗親朋友。憎惡見之。欲使之死。不信佛經語。不信人壽命終盡死。後世復生。不信作善得善。不信作惡得惡。如是曹人。男子女人。心意俱然。違戾反逆。愚癡濛澒。瞋怒嗜欲。無所識知。自用快善。為大智慧。亦不知所從來。生死所趣向。不肯慈孝。惡逆天地。於其中間。求望僥倖。欲得長生。躬得不死。會當歸就。生死勤苦善惡之道。身所作惡。殃咎眾趣。不得度脫。亦不可降化令作善。慈心教語。開導生死善惡所趣有是。復不信之。然苦心與語。欲令度脫。無益其人。心中閉塞。意不開解。大命將至。至時皆悔。其後乃悔。當復何及。不豫計善。臨窮何益。

/xia:35:39-43/
<x>天地之間</x>。<x>五道分明</x>。恢廓窈窕。浩浩茫茫。轉相承受。<x>善惡</x>毒痛。<x>身自當之</x>。<x>無有代者</x>。道之自然。隨其所行。追命所生。不得縱捨。<x>善人行善</x>。從善慈孝。<x>從樂入樂<x/>。<x>從明入明</x>。<x>惡人行惡</x>。<x>從苦入苦</x>。<x>從冥入冥</x>。<x>誰能知者</x>。<x>獨佛知</x>見<x>耳</x>。<x>教語</x>人民。<x>信</x>用<x>者少</x>。<x>生死不休</x>。<x>惡道不絕</x>。<x>如是世人</x>。不可悉道。<x>故有</x>自然泥犁禽獸薜荔。蜎飛蠕動之類。<x>展轉其中世世累劫</x>。<x>無有出期</x>。<x>難得解脫</x>。<x>痛不可言</x>。

是為五大惡五痛五燒。勤苦如是。比如火起燒人身。

/xia:35:44,45/
人能<x>自於其中</x>。<x>一心制意端身正行</x>。<x>言行相副</x>。<x>所作至誠</x>。所語如語。心口不轉。<x>獨作眾善</x>。<x>不為眾惡</x>者。<x>身獨度脫</x>。<x>得其福德</x>。<x>可得長壽</x>。度世上天<x>泥洹之道</x>。<x>是為五大善</x>。

/xia:36:1-6/
<x>佛告</x><y>阿逸</y>菩薩等。我皆語若曹。是世<x>五惡</x>。勤苦如是。令起<x>五痛</x>。令起<x>五燒</x>。<x>展轉相生</x>。世間人民。不肯為善。欲作眾惡。<x>敢有犯此</x>諸惡事者。皆悉自然。<x>當</x>更具<x>歷</x入<x>惡道</x>中。<x>或其今世</x>。<x>先被病殃</x>。<x>死生不得</x>。<x>示眾見之</x>。<x>壽終</x><z>惡</z>趣<x>入</x>至極大苦。<x>愁痛酷毒</x>。<x>自相焦然</x>。轉相燒滅。至其後<x>共</x>作<x>怨家</x>。<x>更相傷殺</x>。<x>從小微起至大困劇</x>。

<x>皆從貪</x>淫<x>財色</x>。<x>不肯</x>忍辱<x>施與</x>。<x>各欲自快</x>。<x>無復</x>有<x>曲直</x>。欲得健名。為<x>癡欲所迫</x>。隨心思想。不能得也。結憤胸中。財色縛束。無有解脫。不知厭足。<x>厚己諍</x>欲。無所省錄。都無義理。不隨正道。

<x>富貴榮華</x>。<x>當時快意</x>。<x>不能忍辱</x>。<x>不</x>知<x>施善</x>。<x>威勢無幾</x>。隨惡名焦。身坐勞苦。久後大劇自然隨逐。無有解已。王法<x>施張</x>。<x>自然糾舉</x>。上下相應。羅網綱紀。<x>㷀㷀忪忪</x>。<x>當入其中</x>。<x>古今有是</x>。<x>痛哉可傷</x>。

佛語阿逸菩薩等。若世有是佛。皆慈愍哀之。威神摧動。眾惡諸事。皆消化之。令得去惡就善。棄捐所思。奉持經戒。莫不承奉。施行經法。不敢違失度世無為泥洹之道。快善極樂。甚明無極。

/xia:36:7,8/
佛言。<x>若曹</x>諸天帝王人民。及後世人。<x>得佛經語熟思惟之</x>。能自於其中端心正行。其主上為善率化。撿御其下。教語人民。轉相敕令。轉共為善。轉相度脫。<x>各自端守</x>。慈仁愍哀。<x>終身不殆</x>。<x>尊聖敬孝</x>。通洞博愛。佛語教令。無敢虧負。<x>當</x>憂<x>度世</x>泥洹之道。當憂斷截生死痛痒。<x>拔惡根本</x>。<x>當憂</x>斷絕泥犁禽獸薜荔。蜎飛蠕動之類。<x>惡苦之道</x>。當勱佛世。堅持經道。無敢失也。

/xia:36:9-11/
佛言。<x>若曹</x>當<x>作善</x>者。<x>云何第一</x>急。<x>當自端身</x>。<x>當自端心</x>。<x>當自端目</x>。當自端<x>耳</x>。當自端<x>鼻</x>。當自端<x>口</x>。當自端手。當自端足。能自撿斂。莫妄動作。<x>身心淨潔</x>。<x>俱善相應</x>。中外約束。<x>勿隨嗜欲</x>。<x>不犯諸惡</x>。<x>言色常和</x>。<x>身行當專</x>。行步坐起不動。作事所為。當先熟思慮計之。揆度才能。<x>視瞻</x>圓規。<x>安定徐</x>作<x>為</x>之。<x>作事倉卒</x>。不豫熟計。<x>為之不諦</x>。<x>亡其功夫</x>。<x>敗悔在後</x>。唐苦亡身。至誠忠信。得道絕去。

/xia:37:1-3/
佛言。<x>若曹</x>於是。益作諸善。布恩施德。能<thru>不絕</thru><z>勿犯</z><x>道禁</x>。<x>忍辱精進</x>一心智慧。展轉復相教化。作善為德。如是經法。<x>慈心專一</x>。<x>齋戒清淨</x>。<x>一日一夜</x>者。<x>勝於無量清淨佛國</x>。<x>作善百歲</x>。<x>所以者何</x>。<x>無量清淨佛國</x>。<x>皆積德眾善</x>。無為自然。在所求索。<x>無</x>有諸<x>惡</x>大如毛髮。

/xia:37:4-6/
佛言。<x>於是作善</x>。<x>十日十夜</x>者。其得福。<x>勝於他方佛國中</x>人民。作<x>善千歲</x>。<x>所以者何</x>。他方佛國。皆悉作善。作善者多。為惡者少。皆有自然之物。不行求作便自得之。是間為<x>惡</x>者<x>多</x>。為<x>善</x>者<x>少</x>。不行求作不能得也。人能自端制作善。至心求道。故能爾耳。是間無有自然。不能自給。當行求索勤苦治生。轉相欺怠調作好惡。得其財物歸給妻子。<x>飲苦食毒</x>勞心苦身。如是至竟。心意不專周旋不安。人能自安靜為善。精進作德。故能爾耳。

/xia:37:7-9/
佛言。<x>我</x>皆<x>哀</x>若曹及諸天帝王人民。皆教令作諸善。不為眾惡。隨其所能輒<x>授與</x>道。教戒開導<x>悉奉行之</x>。則君率化為善。教令臣下。父教其子。兄教其弟。夫教其婦。室家內外親屬朋友。<x>轉相教語</x>作善為道。奉經持戒各自端守。上下相撿。無尊無卑。無男無女。齋戒清淨。莫不歡喜。和順義理。勸樂慈孝。<x>自相約檢</x>。其有得佛經語。悉持思之不當<x>所作</x>。<x>如犯</x>為之<x>則自悔過</x>。<x>去惡就善</x>。棄邪為正。<x>朝聞夕改</x>。<x>奉持經戒</x>。劇<x>如貧</x>人<x>得寶</x>。佛所行處。所在郡國。輒授與經戒。諸天日月星辰諸神。國王傍臣長吏人民。諸龍鬼神。泥犁禽獸。承奉行之。則君改化為善。齋戒精思。淨自湔洒。端心正行。居位嚴慓。教敕率眾為善。奉行道禁。令言令止。臣事其君。忠直受令。不敢違負。父子言令孝順承受。兄弟夫婦宗親朋友。上下相令順言和理。尊卑大小轉相敬事。以禮如義不相違負。莫不<x>改往修來</x>。<x>洒心易行</x>端正中表。<x>自然</x>作善<x>所願輒得</x>。<x>感</x>善<x>降</x>化自然之道。求欲不死則可得長壽。求欲度世則可得泥洹之道。

/xia:37:10-12/
佛言。佛威神尊重。消惡化善莫不度脫。今我出於天下。在是惡中。於苦世作佛。慈愍哀傷教語開道。諸天帝王。傍臣左右。長吏人民。隨其心所欲願樂。皆令得道。

<x>佛</x>諸<x>所行處</x>。所更過歷郡<x>國</x>縣<x>邑</x>。<x>丘聚</x>市里莫不豐熟。<x>天下</x>太平。<x>日月</x>運照。倍益明好。<x>風雨</x>時節。人<x>民安</x>寧。<x>強不凌弱</x>。<x>各得其所</x>。無惡歲疾疫。無病瘦者。<x>兵</x>革不起。<x>國無盜賊無有怨抂</x>。無有拘閉者。君臣人民莫不歡喜。忠慈至誠各自端守。皆自然守國。雍和孝順莫不歡樂。有無相與布恩施德。心歡樂與皆相敬愛。推財讓義。謙讓於先。前後以禮敬事。如父如子。如兄如弟。莫不仁賢。和順禮節都無違諍。快善無極。

佛言。<x>我哀</x>子曹欲度脫之。劇<x>父母念子</x>。今八方上下。諸天帝王人民。及蜎飛蠕動之類。得佛經戒奉行佛道。皆得明慧心悉開解。莫不得度過度脫憂苦者。今我作佛。在於五惡五痛五燒之中。降化五惡。消盡五痛。絕滅五燒。以善攻惡拔去毒苦。令得五善明好。燒惡不起。

/xia:37:13-15/
<x>我般泥洹</x>去後。<x>經道</x>稍稍斷絕。<x>人民</x>諛<x>諂</x>淳<x>為</x>眾惡。不復作善。<x>五燒</x>復起。<x>五痛劇苦</x>。復如前法。自然還復。<x>久後轉劇</x>不可悉說。我但為若曹。小道之耳。佛告阿逸菩薩等。若曹各思持之。展<x>轉相教戒</x>。<x>如佛經法無敢犯也</x>。

阿逸菩薩長跪叉手言。佛所說甚苦痛。<x>世人</x>為<x>惡</x>。甚劇<x>如是如是</x>。<x>佛皆慈哀悉度脫之</x>。皆言<x>受佛重教</x>。請展轉相承。<x>不敢</x>犯也。

/xia:38:1-19/
<x>佛告阿難</x>。我哀<x>若曹</x>。令悉<x>見無量清淨佛及諸菩薩阿羅漢</x>。<x>所居國土</x>。若欲見之不。阿難則大喜。長跪叉手言。願皆<x>欲見</x>之。佛言。若<x>起</x>更被袈裟<x>西向</x>拜。<x>當日沒處</x>。<x>為</x><y>無量清淨佛</y>作禮。以頭面著地言。<x>南無無量清淨平等覺</x>。

阿難言。諾受教。則<x>起</x>更被袈裟<x>西向</x>拜。<x>當日</x>所<x>沒處</x>。<x>為</x><y>無量清淨佛</y>作禮。以頭腦著地言。<x>南無</x><y>無量清淨平等覺</y>。阿難未起。<y>無量清淨佛</y>。便大<x>放</x><x>光明</x>威神。則遍八方上下。諸無央數佛國天地。則皆為大震動。諸天無央數天地。<x>須彌山</x>羅寶。摩訶須彌大山羅寶。諸<x>天地</x>大界小界。其中諸有大<x>泥犁</x>小泥犁。諸<x>山林溪谷幽冥之處</x>。皆則大明<x>悉</x>雨<x>大開闢</x>。則阿難諸菩薩阿羅漢等。諸天帝王人民。悉皆見無量清淨佛。及諸菩薩阿羅漢國土七寶已。心<x>皆大歡喜踊躍</x>。悉起為無量清淨佛<x>作禮</x>。以頭腦著地。皆言<x>南無無量清淨三藐三佛陀</x>。無量清淨佛。放光明威神已。<x>諸</x>無央數<x>天人民</x>。<x>及蜎飛蠕動</x>之類。皆悉見無量清淨佛<x>光</x>明。莫不慈心歡喜作善者。諸有泥犁禽獸薜荔。諸有考治勤苦之處。則皆休止不復治。莫不解脫憂苦者。諸有盲者則皆得視。諸跛躄蹇者則皆得走行。諸病者則皆愈起。諸尪者則皆強健。愚癡者則皆更黠慧。諸有婬泆瞋怒者皆悉慈心作善。諸有被毒者毒皆不行。鍾鼓琴瑟箜篌樂器。諸伎不鼓皆自作音聲。婦女珠環皆自作聲。百鳥畜獸皆自悲鳴。當是之時。莫不歡喜得過度者。則時爾日。<x>諸佛國</x>中<x>諸天人</x>莫不<x>持</x>天上<x>華香來</x>下。<x>於虛空</x>中悉皆<x>供養</x>。散諸佛及無量清淨佛上。諸天各共。大作萬種自然伎樂。樂諸佛及諸菩薩阿羅漢。當是之時。甚快樂不可言。

/xia:39/${XB}中世尊與二尊者問答更詳。
<x>佛告阿難阿逸菩薩等</x>。我說無量清淨佛及諸菩薩阿羅漢國土自然七寶。當無有異乎。阿難長跪叉手言。佛說無量清淨佛國土快善。<x>如佛所說</x>無有一異。佛言。我說無量清淨佛功德國土快善。晝夜一劫尚復未竟。我但為若曹小說之耳。

/xia:42:1-4/
<y>阿逸</y>菩薩則長跪叉手問<x>佛言</x>。<x>今</x>佛國從是間當有幾。<y>阿惟越致</y><x>菩薩</x>。<x>往生無量清淨佛國</x>。願聞之。

佛言。若欲知者明聽著心中。阿逸菩薩言受教。佛言。從我國當<x>有七百二十億</x>。阿惟越致菩薩。皆往生無量清淨佛國。一阿惟越致菩薩者。前後供養無央數諸佛。以次如彌勒皆當作佛。及其餘<x>諸小菩薩</x>輩者。無央數<x>不可<thru>復</thru><z>稱</z>計</x>。皆<x>當往生</x>無量清淨佛國。

/xia:42:5-13/
佛告阿逸菩薩。<x>不但</x>我國中諸菩薩當往生無量清淨佛國。<x>他方</x>異國復有佛<x>亦復</x>如是。
/L/第一佛名光遠炤。其國有百八十億菩薩。皆當往生無量清淨佛國。他方異國。
/L/第二佛佛名寶積。其國有九十億菩薩。皆當往生無量清淨佛國。他方異國。
/L/第三佛名儒無垢。有二百二十億菩薩。皆當往生阿彌陀佛國。他方異國。
/L/第四佛名無極光明。其國有二百五十億菩薩。皆當往生無量清淨佛國。他方異國。
/L/第五佛名於世無上。其國有六百億菩薩。皆當往生無量清淨佛國。他方異國。
/L/第六佛名勇光。其國有萬四千菩薩。皆當往生無量清淨佛國。他方異國。
/L/第七佛名具足交絡。其國有十四億菩薩。皆當往生無量清淨佛國。他方異國。

/L/第九佛名多力無過者。其國有八百一十億菩薩。皆當往生無量清淨佛國。他方異國。

/L/第十一佛名慧辯。其國有萬二千菩薩。皆當往生無量清淨佛國。他方異國。
/L/第十二佛名無上華。其國有諸菩薩無央數不可復計。皆阿惟越致。皆智慧勇猛。各供養無央數諸佛。以一時俱心願欲往生。皆當生無量清淨佛國。他方異國。
/L/第十三佛名樂大妙音。其國有七百九十億菩薩。皆當往生無量清淨佛國。

佛言。是諸菩薩。皆阿惟越致。諸比丘僧中。及小菩薩輩無央數。皆當往生無量清淨佛國。不獨是十四佛國中諸菩薩當往生也。都八方上下無央數佛國。諸菩薩輩。各各如是。皆當往生無量清淨佛國。其無央數。都共往會無量清淨佛國。大眾多不可復計。我但說八方上下無央數佛名字。晝夜一<x>劫</x>尚<thru>未</thru><z>不</z><x>竟</x>。我但復說佛國諸比丘僧眾菩薩。當往生無量清淨佛國人數。說之一劫不休止尚未竟。我但為若曹。總攬都小說之耳。

佛語阿難阿逸菩薩等。其世間帝王人民。善男子善女人。前世宿命行善所致相祿。迺當聞無量清淨佛聲。慈心歡喜我代之喜。

/xia:45:7,8/
佛言。其有善男子善女人。<x>聞</x>無量清淨<x>佛聲</x>。<x>慈心歡喜</x>。一時<x>踊躍</x>。心意清淨。<x>衣毛為起</x>拔出者。<x>皆前世</x>宿命<x>作佛道</x>。若他方佛<x>故</x>。菩薩<x>非凡人</x>。其有人民男子女人。<x>聞</x>無量清淨佛<x>聲</x>。不信有佛者。不信佛經語。不信有比丘僧。心中狐疑。<x>都無所信</x>者。<x>皆</x>故<x>從惡道中來</x>。生愚蒙不解宿命。<x>殃</x>惡<x>未盡</x>。<x>未當得度脫故</x>。<x>心</x>中<x>狐疑不信向耳</x>。

/xia:45:1-4/
佛言。我語若曹。若曹所當作善法。皆當奉行信之。無得以我般泥洹去後故。若曹及後世人。無得復言。我不信有無量清淨佛國。我故令若曹悉見無量清淨佛國土。所當為者若自求之。我具為汝曹。道說經戒順法。

若曹當如佛法持之。無得毀失。我持是經以累汝曹。汝曹當堅持之。無得為妄增減是經法。我般泥洹去後。經道留止千歲。千歲後經道斷絕。在心所願皆可得道。

/xia:46:4-7/
佛言。師開導人耳目。智慧明達。度脫人令得善。舍泥洹之道。常當慈孝。於佛如父母。常念師恩。當念不斷絕。則得道疾。

/xia:45:5,6/
佛言。天下有佛者甚難得值。人有信受師法經語深者。亦難得值。若有沙門。若師為人說佛經者。甚難得值。

/xia:48:1-3,10/
佛說是經時。則萬二千億諸天人民。皆得天眼徹視。悉一心皆為菩薩道。則二百二十億諸天人民。皆得阿那含道。則八百沙門。皆得阿羅漢道。則四十億菩薩。皆得阿惟越致。

佛說經已。諸菩薩阿羅漢。諸天帝王人民。皆大歡喜。前趣為佛作禮遶佛三匝。以頭面著佛足而去。
