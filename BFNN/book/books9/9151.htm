<script>
var QXL = new (class extends SeriesContainer {
  constructor() { super(); }

  loadJS(vol) { addjs(`9151/${to2d(vol||1)}.js`); }

  showPage() {
    var buf = new Buffer();
    new (class extends DocInfo {
      constructor() {
        super();
        this.setVolumesInJS(true, true).setXG().setBuffer(buf)
            .setGathaClass('gathaV')
            .reInit(9151, 34);
        this.volNum = QXL.volNum;
        this.writeStart(`大乘起信論講記|（第${zNumber(this.volNum)}集）`)
            .writeBody(`\n/TEXT030C/淨界法師 講\n${QXL.text}\n\n/VOLSEP/`)
            .writeEnd('《<a href="9150.htm">大乘起信論</a>》　' +
                      '《<a href="../books2/1148.htm">大乘起信論裂網疏</a>》　');
      }
    })(); // class extends DocInfo
    buf.render('stg');
  }
})(); // QXL

QXL.show(get('vol')); // 卷

</script>
