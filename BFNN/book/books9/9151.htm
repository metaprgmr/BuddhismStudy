<script>
const A123 = '<a href="?vol=6&loc=_123">';

new MyDialog(800, 'dlg').render('dlgPane');

new (class extends SeriesContainer {
  constructor() { super(); }

  loadJS(vol) {
    vol |= 0;
    switch (vol) {
    case 0: this.volNum = 0; return true;
    case 2:
    case 3:
      addjs("../../../util/lit-digests.js");
    case 4:
    case 5:
      addjs('9151/diagrams.js');
      break;
    case 6:
      addjs('../../../diagrams/GTR-甘台榮老師.js');
      break;
    }
    addjs(`9151/${to2d(vol)}.js`);
  }

  showPage() {
    var buf = new Buffer();
    new (class extends DocInfo {
      constructor() {
        super();
        this.setVolumesInJS(true, true).setXG().setBuffer(buf)
            .setGathaClass('gathaV')
            .reInit(9151, 34)
            .volNum = SC.volNum;
        if (!this.volNum) { // TOC
          var notes = get('notes');
          createGP('《大乘起信論講記》',      CAT_經論, 大乘起信論講記Creator(false,true));
          createGP('《大乘起信論講記•科判》', CAT_經論, 大乘起信論講記Creator(true,true));
          this.writeStart(`大乘起信論講記`)
              .writeBody(`
/TEXT030C/馬鳴菩薩 作論
/TEXT030C/淨界法師 南林精舍2004年啟講
/TEXT030C/信裹居士 製圖
/TEXT030C/截圖取自<a href="https://www.youtube.com/playlist?list=PLPM_W3SEIYsFMyAoumO-ybn4YKzRZVAFQ">同名YouTube系列</a>

/C/${notes ? '　　' : ''}【<a href="?notes=${notes ? '' : '1'}">${notes ? '僅科判' : '科判與筆記'}</a>】《${A123}教理示意圖</a>》
<html:diagram>《大乘起信論講記${notes?'':'•科判'}》</html:diagram>

/VOLSEP/`);
        } else
          this.writeStart(`大乘起信論講記|（第${zNumber(this.volNum)}集）`)
              .writeBody(`
/TEXT030C/馬鳴菩薩 作論<br>淨界法師 講解
${SC.text}

/VOLSEP/`);
        this.writeEnd('《大乘起信論》<a href="../books2/1146.htm">真諦</a>&nbsp;/&nbsp;<a href="9150.htm">實叉難陀</a>　' +
                      '《<a href="../books9/9148.htm" title="法藏大師《大乘起信論義記》">義記</a>》' +
                      '《<a href="../books2/1148.htm" title="蕅益大師《大乘起信論裂網疏》">裂網疏</a>》　');
      }
    })(); // class extends DocInfo
    buf.render('stg');
  }
})();

var a = get('vol'), b = get('loc');
SC.show(a,b);

</script>
