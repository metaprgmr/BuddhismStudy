/TEXT030C/于淩波居士著

淨空法師，俗名徐業鴻，一九二七年出生於中國安徽省廬江縣。先後追隨一代大哲方東美教授、藏傳高僧章嘉呼圖克圖及佛學大家李炳南老居士十三年，學習經史哲學以及佛法，獲得深刻啟發，不僅熟通佛教各派經論，對於儒學、道家和伊斯蘭教等其他宗教學說，也廣泛涉獵。於眾多典籍中，對佛教淨土宗著力最多，成就也最為輝煌。

一九五九年於臺北圓山臨濟寺剃度，法名覺淨、字淨空。受具戒後，於臺灣及世界各地弘經演教四十餘年，提出“佛教”乃“佛陀教育”的正名之說；先後講述《華嚴經》、《楞嚴經》、《圓覺經》、《淨土五經》等三藏典籍數十部。如今雖年近八旬，仍教學不輟。特別於近年來，為消弭戰亂衝突、恢復聖賢教育的理念於世界各處奔走，返回道場後，不顧旅途勞頓，立即恢復教學課程，不令間斷。法師這種慈悲教導眾生的精神誠令人感佩。

一九九八年，法師再度啟講《華嚴經》，至今保持每日四小時講席，不疲不厭，對於這部大經，已有超過二千五百多小時的講解。一九六零年，法師受聘任臺北十普寺三藏學院教師；六一年，應邀擔任中國佛教會弘法委員、文獻委員；六二年任中國佛教會大專佛學講座總主講；七三年任中華學術院佛學研究員，臺灣佛經注釋語譯會教授、編譯委員；七五年任中國文化大學哲學系教授，天主教東亞精神生活研習所教授；七七年任中國內學院院長；七九年任中國淨土宗實踐研究院院長。並先後創辦華藏法施會、華藏佛教視聽圖書館、佛陀教育基金會和華藏淨宗學會等佛教教育及淨土專修組織。

“真誠、清淨、平等、正覺、慈悲，看破、放下、自在、隨緣、念佛。”是法師總結數十年學佛經驗所提出的修行原則。首開風氣之先，透過網際網路、衛星電視，以遠端教學，二十四小時弘揚佛陀教育、聖賢理念，是其真實智慧所展現出的高瞻遠矚。祈願消弭戰亂衝突、落實世界和平，進而積極推廣宗教團結、種族和睦的多元文化理念，更流露出他老人家清淨平等心中的無盡慈悲。

自一九七七年始，法師應邀至海外弘法，極力宣導以“淨宗學會”、“淨宗學院”形式，為現代社會提供修學道場以及流通法寶、培養繼起人才的佛陀教育機構。現今，已有百餘所的淨宗學會分佈於世界各地，大體上都是以華人社群為基礎的純正佛教教育組織，並以法師為他們的導師或顧問。為培養佛教後繼人才，法師于一九九五年指導新加坡佛教居士林及淨宗學會創辦“弘法人才培訓班”。

二千零一年更于澳洲圖文巴成立“淨宗學院”。除講經教學，法師也大量制贈經論善書及光碟影片，免費流通世界各地，公開授權一切大眾；其內容皆是有關聖賢教育、昌明倫理道德之言論思想。數年來，更先後印製《大藏經》數千套及購置《四庫薈要》贈送世界各大圖書館、高級學府以及佛教單位。身負“學為人師，行為世範”的使命感，凡是法師所到之處，無不為團結種族、祥和社會、提升道德之理想盡心竭力。

一九八五年移居美國後，曾獲頒美國德州榮譽公民及達拉斯榮譽市民。西元二千年移居澳洲，兩年後（二千零二年）即獲頒澳洲格里菲斯大學榮譽博士，並獲聘任榮譽教授。同年，圖文巴市長頒發榮譽市民。次年（二千零三年），昆士蘭大學亦聘任法師為榮譽教授。

二千零四年，法師先後榮獲澳洲南昆士蘭大學及印尼伊斯蘭教州立大學頒發的榮譽博士學位。儘管，對於畢生淡泊名利的法師而言，世間的名聞利養猶如過眼雲煙，修道人絕無絲毫染著。但這些榮譽，卻顯示了世界各地的志士仁人，對於提倡多元文化教育以及重振倫理道德之刻不容緩，有著高度的共識。正是基於這份肯定與認知，法師在澳洲、印尼等地，與政、教各界人士都建立了真誠的友誼。

自一九九八年起，為真正落實《華嚴》教義，法師以“所有宗教都是神聖仁慈博愛的教育”、“一切神聖都是同一真神的化身”之理念，主動拜訪新加坡九大宗教，並邀請各宗教講師，于居士林講堂為大眾講課，介紹所學教義；獲得良好成績。同時也參加由澳洲昆士蘭少數民族事務局所主辦的“多元文化論壇”，並發表談話。

淨空法師多年在臺灣、美國、加拿大及東南亞各國專弘淨土法門。他是繼夏蓮居、李炳南二位老居士之後，弘揚念佛法門的法師，近年來他在各地成立“淨宗學會”，分會遍及臺灣及美加。

/VOLSEP/

淨師俗家姓徐，名業鴻，安徽省廬江縣人，一九二七年出生，他的父親擔任公職，所以幼年隨父母客居福建建甌，在建甌受小學教育。中日戰爭期間，就讀于國立第三中學。一九四五年抗戰勝利，四六年舉家遷居南京，就讀于南京市立第一中學。一九四七年他的父親病逝，家無恆產，淨師以此失學，因而參加軍旅，從事文職工作。一九四九年內戰熾烈，京滬撤退之際，淨師隨軍到臺灣，服務於實踐學社，擔任資料管理工作。

淨師天性好學，公餘研讀經史古文，努力不懈。一九五三年，安徽桐城方東美先生講學于實踐學社。淨師以鄉後學的身分，謁方教授于寓所，方先生為一代哲學大師，提攜後進不遺餘力，對這位年方二十七歲的小同鄉十分器重，答應每星期日為他講授哲學二小時。初講“理則學”，繼講東西方哲學，如是三年之久（爾後一九七七年方先生逝世，淨師照顧方夫人生活，直至終老）。在這段時間，講授到佛學部分時，方先生介紹他謁見佛教領袖嘉大師，大師亦允每週為之講課一次，如是亦受學二年。

一九五八年，淨師為進一步研究佛教理論，乃辭去工作，到台中入佛教大德李炳南老居士門下，依雪廬老人學佛（李炳南老居士號雪廬）。雪廬老人為淨師單獨開課，講授唯識學，淨土經論，特別於《大乘無量壽經》更是悉心傳授。時，淨師住於台中慈光圖書館的一間小閣樓上，為學佛法，不計物質生活之簡陋，如是又苦學十年。

在台中受學期間，因緣成熟，一九五九年北上臺北，於圓山臨濟寺，依白聖老法師剃度出家，法名淨空。一九六二年於海會寺受具足戒，與祥雲、聖嚴諸師為戒兄弟。出家後的淨師，仍回台中，依雪廬老人學《華嚴經》、《淨土三經》及法相唯識宗的經論，同時在南普陀寺佛學院任教授課。一九六七年，離開台中北上，任圓山臨濟寺書記、十普寺三藏學院教師，一九六九年，應星雲法師之聘，任佛光山東方佛教學院教師兼教務主任。後來返回臺北，任松山寺大專佛學講座講師。一九七六年，臺北三重市慈雲講寺創設“中國內學院”，禮聘淨師任院長。

學佛要一門深入，是淨空法師一貫的理念，一九六九年他在佛光山東方佛學院任教時，即建議星雲法師，讓每一個學生專學一部經。他對星雲法師說：“法師啊！如此，十年二十年之後，你的佛光普照全球啊。”星雲法師說：“好是好，但那就不像佛學院了。佛學院裏面開的課，要像一般學校一樣，各門都要有的。”這樣，淨空法師的理念就沒有實現。淨空法師何以有此種理念呢，因為他早年隨淨土大德李炳南老居士學佛，李老就是專弘揚淨土法門的。

淨師之于佛學，初於法相唯識之學用功甚勤，曾從雪廬老人學唯識有年。雪廬老人是民國初年唯識大家梅擷芸大士的入室弟子，淵源有自。由雪廬老人為《相宗綱要》再版所寫的一篇序文，可見淨師的師承關係：

相宗綱要正續篇合刊序三藏內典，世出世法軌範也。──余業師南昌孝廉，擷雲梅光羲大士，於遜清之際為秋官，皈佛治法相學，其精邃群倫，凡相宗學者皆崇之，是書之流通，即為後學不畏而作也。──徐蚌之役，（餘）避禍來台，居二十五稔，業未敢輟，故人淨空法師，以法相綱要見贈，笑卻之曰，此五十年前所熟讀者，淨師曰，書未若是之久也，受而流覽，乃為續編。愕然中，餘侍大士，幾二十年，其間流離烽煙燹火，十年無所安，時緣如是，故未之見也。茲獲覯於台島，小康使然與？淨師為述偶得之由，且擬正續合刊，餘稱善，極慫恿之......

淨師以唯識學之基礎，深入經藏，故於受具戒後，於國內外弘化期間，講《華嚴經》、《法華經》、《楞嚴經》、《圓覺經》、《金剛經》及淨土經典，垂三十年。他在臺灣先後創辦華藏法施會、華藏精舍、華藏佛教視聽圖書館、華藏講堂、佛陀教育基金會等弘法機構。並首開風氣之先，使用視聽教育方法，大量製作佛法講經錄音帶、錄影帶，分贈世界各地社團及信眾。近年來更以大量佛書運往大陸，協助大陸佛教復興。一九八二年，法師應美國信眾之請，到美國弘化。時，德州達拉斯學佛社聞知法師抵美，禮請法師到達拉斯講經。在此之前，出家法師到達拉斯弘法者，只有淨海、永惺、宏意三位元法師，淨師是最早由臺灣到達拉斯弘法的法師。他在達拉斯講《阿彌陀經要解》。淨師辯才無礙，使聽眾充滿法喜。這以後，應當地信眾之請，每年都到達拉斯弘化。

一九八五年，淨師第三度來美，首先應洛杉磯華嚴研習會之請，在中國文化服務中心、波爾萊昂文化中心等處，分別講《阿彌陀經要解研習報告》七次，新釋經義，精簡明瞭，使洛城聽眾讚歎不已。繼而又飛抵三藩市，在各寺院以同一經題再分別報告多次。八月飛抵達拉斯，仍講淨土經典，使聽眾深受感動。達拉斯學佛社社員，將原來社址改裝刷新，改為淨宗道場，禮聘淨師為名譽董事長及導師，懇留他長期駐錫領眾修持，法師為大眾誠意感動，允暫在社中駐錫一段時間，以後每年來達拉斯領眾共修。

一九八八年因緣成熟，達拉斯學佛社改組為“達拉斯佛教會·華藏蓮社”，禮請淨師為導師，主持會務。翌年，臺灣臺北的“華藏佛教圖書館”（淨空法師臺北的道場），同修蓮友組織“華藏淨宗學會”，仍由淨空法師領導主持。而達拉斯的華藏蓮社，也就易名為“美國達拉斯佛教會·淨宗學會”。淨空法師不時要到各地弘化，不能長駐學會，由淨師弟子悟塵法師代為駐會主持。
臺北華藏圖書館成立“淨宗學會”的因緣，見之于臺北華藏圖書館館長及淨宗學會董事長韓瑛居士撰寫的〈淨宗學會緣起〉一文中：

/SECTION/淨宗學會緣起：

大覺世尊，湣念有情，示成正覺，隨機演教，雖有大小權實之異，要皆為令眾生，開示悟入佛之知見，究竟成佛而已。然末世眾生，業障深重，智淺福薄，知識難遇，未能直下暢佛度生本懷。於是特開普度一切眾生，當生成就之淨土法門。昔南昌梅大士雲：果能受持，如說修行，不但拔將來之苦果，實已獲現前之福利，非真修淨業者，不覺其妙，非曾涉教海者，莫窺其深。

又云：欲弘佛法於今日，必須提倡淨土。

“淨宗學會”者，*蓮公大士於大戰後所宣導之專修淨土專弘淨土之組織。淨空法師弘揚大乘三十年，深知此宗所依，確是十方三世一切諸佛度生成佛之第一法門，是以近年來台、港、星、馬、美、加各地，極力宣揚，又印大經及注解三百余萬冊，流通十方，深望此一組織、能普遍推展至全球各處，願諸大善知識，皆能弘演正法，明三世因果，示六道輪回，表佛性真常，贊淨土超勝；讀誦大乘，勸進行者，求願往生，圓成佛道，誓志宣化，普令群萌，同歸淨域，為本會建立之唯一理想目的。

本會蓮友，修學理論，咸共遵修《淨土五經》、《淨土十要》、尤以《無量壽經》（夏居士會集本）、《彌陀要解》、《普賢行願品》三種為必修所依，行有餘力，始得研習與本宗相應之大乘經論。......黃念公無量壽經跋云：“苦樂忻厭，生佛感應之理，闡發盡致，顯密性相，事理因果之義，賅括無遺，是以志向大乘者志所必讀，有心救世者在所必弘也......”華藏同修蓮友，深感蓮大士念公之啟示，決定依教奉行，啟建“華藏淨宗學會”，禮請淨空法師主其事，常年共修淨業，共習大經，以資提倡，上報四恩，下濟三苦，是誠無量劫來稀有難逢之大事因緣也，敢不寶此際遇。願我緇素同修共勉之。已巳元旦淨業學人韓瑛和南于華藏佛教圖書館。

己巳年，是一九八九年，淨宗學會是一九八九年成立的。

當時的達拉斯的淨宗學會，最初仍設於達拉斯學佛會原址，即阿波羅路四二二號，一九九三年，在原址附近，即同一條路上的五〇一號，購得大建築物兩幢，總面積兩萬五千平方呎，成為一處規模完善的大道場。現在達拉斯的淨宗學會，有四位常住出家眾，他們是悟塵法師、悟行法師、悟千尼師、悟平尼師。悟塵法師，俗名曾憲瑋，臺灣海洋大學畢業，來美留學，獲碩士學位，在佛羅里達州工作時，曾組織“邁阿密佛學社”，後依淨空法師出家，是一位前途無限的佛門法將。

美國淨宗學會董事長韓瑛居士，是中國大陸東北大連人，一九二二年出生，一九四九年到臺灣，以經商致富，賺到的錢全用在護持三寶上。她一九六五年依淨空法師學佛，六八年護持淨師，在臺北市景美創立“華藏講堂”、“華藏圖書館”，多年慘澹經營，現在講堂及圖書館有一萬餘平方尺的面積，數萬冊圖書，二十多位出家常住眾。平時講經弘法，各種講座，念佛共修等活動，密集不斷。

十餘年來，淨師在美、加各地弘化，美、加兩國許多城市都成立淨宗學會，如三藩市、洛杉磯、華盛頓、亨城、亞特蘭大、麥迪生、加拿大等地，已有十餘處之多。近兩三年來，淨宗學會的組織遍及臺灣南北，且已擴及東南亞。行見未來，“家家觀世音，戶戶阿彌陀”之盛況，重見於今世矣！`);
