宣隆·西亞多大師<ail>（Sunlun Sayadaw，1878年3月—1952年5月17日）</ail>是緬甸上座部佛教僧侶、內觀禪修法導師。<br>俗名喬定<ail>（U Kyaw Din）</ail>，法號迦韋師<ail>（Shin Kavi）</ail>。出生於上緬甸敏建鎮南部的宣隆村，以村名為號。

1919年，喬定開始修習安那般那念，次年即證得聖果：
　　八月十二日星期四晚上大約十時，證得初果須陀洹。
　　九月十一日星期六晚上大約十時，證得二果斯陀含。
　　十月　十日星期日晚上大約十時，證得三果阿那含；同年十一月一日出家，法號迦韋師。
　十一月　九日星期二晚上大約十時，證得阿羅漢果。

證果後，宣隆大師聲名遠揚。雖幾未受教育，其見解令最博學之僧侶滿意。<br>大師廣受拜見，教導大眾修習其內觀禪法，令多人得證阿羅漢果。

宣隆大師於1952年5月17日下午4時22分入滅，滅後肉身不腐，被保存於宣隆寺當中。

宣隆大師問：各位善信！在生死中飄流，你們覺得沮喪、淒涼嗎？

弟子們回答：的確是啊！大師！

宣隆大師問：既然如是沮喪、煩惱，你們想不想擁有快樂？

弟子們回答：是的，大師！我們極之想擁有快樂。

宣隆大師跟著開示：若想擁有快樂，一定要殺死你們的父母，殺死兩位國王，還要殺死外六賊與內六賊。請留意！因父母對你們有莫大的好處，祗殺父母一次是不夠的，要殺足四次纔行。在此必须要知：我所說的父母是指「渴愛」與「我慢」；兩位國王是指「有見」與「無見」兩種邪惡見解；外六賊指「六塵」而內六賊則指「六根」。<ail>（此段開示，請參考《南傳法句經》<a href="../books3/2075.htm#s294">第294句</a>內容。）</ail>現在，請依下述方法進行：

/SECTION/內觀禪法

首先向佛陀致敬，然後受持戒律，並要宣稱：為了在此禪修期間能達致涅槃，願意奉獻自己的身心<ail>（五藴）</ail>給佛陀。向三界眾生散發你的慈心，以及你所累積到及即將獲得的功德。

不要規定你的禪修時間，能坐多久就坐多久。採用的坐姿，要能久坐亦無需移動。控制心意安住於禪修對象，不令散亂。你的禪修對象是出息與入息，用鼻孔呼吸，緊閉雙目有助心不散亂；呼吸時要强勁些，這樣做有助穩定心意，除了作刻意呼吸的心念外，不可讓任何别的念頭闖入。當氣息接觸到鼻孔的末端時，你將會覺察到那個接觸，要專註於那個對接觸的覺察；「接觸」、「覺察」與「專註」三者要同時發生。

這樣做禪修時，你的眼不會看任何東⻄，你的耳不會聽任何東⻄，你的鼻不會嗅任何東⻄，你的口不想喫任何東⻄，你的身體也不想去其它地方；於是，你的五根<ail>（眼、耳、鼻、舌、身）</ail>就得到很好的守護了。換言之，防護五根的戒律──根律儀<ail>（Indriya-Saṁvara-Sīla）</ail>便可成就了。這個成就可不小啊！根律儀要做的，就是要控制與克制五根，防止貪瞋癡在心內生起。要防護得妥，非練習禪修不可。

在連串不放逸的修習後，心得到很好的敎養，不再任意跟隨念想，祗安住於鼻孔末端。接著，一堆堆像珍珠、星星、月亮、太陽、⋯⋯等五彩繽紛、色彩斑駁、熟悉的與不熟悉的大小東⻄，會在你周圍相繼出現；它們有很大的誤導性，令你以為是禪修的進境，實際上，它們會成為禪修的障礙，甚至被人指為是開悟的敵人。你要訓練自心，令它安住於原先的禪修對象上。這奇特的經驗，大多數禪修者都會遇到的。

成就此能力時，即能防護自心，不令散亂，安住於鼻孔末端，專註著接觸和觸覺時，就相當於殺死了那外六賊<ail>（六塵或六境）</ail>。

若能持續練習，你會覺察到冷、熱、僵硬和各式各樣的疼痛感覺。當某個特别感覺出現時，禪修者即要覺察到它。如果是冷的感覺，就要覺察到冷，並要專註著對冷的那個覺察；那麼，當心能完全集中時，冷感覺與對那冷感覺的覺察就會一起同時消失；如果它是一個熱的感覺，那熱的感覺與對那熱感覺的覺察也會一起同時消失的<ail>（若出現的是其它僵硬或疼痛感覺，也應作如是的修習。）</ail>；但熱的感覺不會在冷的感覺後面逗留，同樣，冷的感覺也不會在熱的感覺後面逗留；每次發生的事件<ail>（指每個感覺的出現）</ail>都是一個相當獨立和獨特的事件，各有其自身的自然特色。這些感覺會在身體的任何地方出現，你不該註意它出現在身體上的那個特别地方，各種感覺都是會隨其本性出現的，你祗需持續地在感覺出現時即如實地覺察到它即可。這种與專註緊密結合之覺察就是所稱的「三法印智<ail>（Sammasana-Ñāṇa）</ail>」。

當覺察身體感覺的修習已成為習慣<ail>（你的第二天性）</ail>時，你的集中力<ail>（定力）</ail>已發展至一高水平，足可令你把捉到身內生起的心理過程，換言之，你將領悟到名色<ail>（身心）</ail>現象，本質上只不過是一種遷流不息的轉變過程。你若能奮發推進五力──信、精進、念、定、慧，你的集中力<ail>（定力）</ail>將會更為大大增强。

結果，將有光輝在體內生起，讓你看到自己身體的翻版，全身會在你面前展現，你會看到內髒的活動，時而有生肉分開、瘀腫、水泡爆發，時而有珠狀物體流出或像雨點般灑下來。

到時，你的集中力<ail>（定力）</ail>會變得堅强，由於熟悉身體感覺的生滅現象，「生滅隨觀智<ail>（Udayabbaya-Ñāṇa）</ail>」將會生起，感覺不再是一種想法之知<ail>（概念上的知識）</ail>，而是一種內觀智慧之知<ail>（非概念性的如實知識）</ail>。到此階段，你將看到毛孔有細小的火花噴出，像打火機擦出的火花一樣，你將可以「分别智」親身體驗到心、心所與色<ail>（肉體）</ail>等法的生滅真相。

接著，你了解到，實際上只有名色<ail>（身心）</ail>的綜合體，並無所謂手、腳、或身體的其它部份。而且，你會明白到，舊概念如人、天神、梵天等皆是盲目的世俗人境界，體驗真相後，一切皆是名稱而已。當一個人能如是地了悟時，他對三寶將會深信不疑。到此地步，禪修者已殺死那內六賊<ail>（六根）</ail>，並開始消除有見與無見的工作，但此時還未能完全把它們根除。

在這裏，對感覺維持著覺察之堅定專註力<ail>（念住力）</ail>是「戒<ail>（Sīla）</ail>，提供光芒之穩」固集中力是「定<ail>（Samādhi）</ail>，辨識到名色<ail>（由心、心所與色所構成）</ail>的實相之能力是「慧」<ail>（Paññā）</ail>。於是，戒定慧三學便得以成就。不過，此階段的智慧仍只是世俗諦的層次」。

/SECTION/宣隆大師所述的七清淨

當禪修者用心留意觀察著感覺時，他正全面地防護著六根，所以他有「戒清淨<ail>（Sīla-Visuddhi）</ail>」。

當時他的心正安住<ail>（固定）</ail>於感覺上，這就相當於「心清淨<ail>（Cittā-Visuddhi）</ail>。當有戒清淨」與心清淨時，禪修者便能如實地看到真相，那即是說，他能看到毛孔有細小的火花噴射出來，像打火機<ail>（lighter）</ail>擦出的火花一樣，跟著他了解到自己沒有手、腳或身體，只有名色<ail>（身心）</ail>的綜合現象而已，那意味著他具有「見清淨<ail>（Diṭṭhi-Visuddhi）</ail>」。

獲得見清淨後，他再無疑惑，對佛法僧三寶亦會堅信不疑。無疑惑即是「除疑清淨<ail>（Kaṅkhā-vitaraṇa-Visuddhi）</ail>」。

當禪修者能對感覺由概念上的知識轉為如實的知識<ail>（7）</ail>時，他會體驗到前所未有的光輝從身上散發出來，極之清純，且伴隨著深度的滿足與安寧。不要貪戀此經驗，若迷執此奇妙經驗，那表示你已陷入那「十種內觀智的危害」之中了，事實上，此經歷亦只有在長期的禪修奮進後始得。此迷執稱為「欲貪<ail>（Nikanti）</ail>」，是較為隱晦、微細的那种欲貪。

當你能捨棄它們時，心將會更為穩定；接著，在意根出現的覺知，令你能毫不動搖地覺知到强烈的感覺，也能敏銳地覺察到非常微弱的感覺；你自知內心不浮不沉、對緣生緣滅的現象能平等看待，不迎不拒。那就是「行舍智<ail>（Saṇkhārupekkhā-Ñāṇa）</ail>」。

包括「遍作或預作<ail>（Parikamma）</ail>」，「近行<ail>（Upacāra）</ail>」和「隨順<ail>（Anuloma）</ail>」等三個剎那心的「行舍智」把隱蔽的煩惱消除。隨即「<ail>（更改）</ail>種姓<ail>（Gotrabhū）</ail>」，剎那心指向涅槃，那時，禪修者一定要依<ail>（更改）</ail>「種姓」剎那心的訊息令自己傾向涅槃；就在那刻，<ail>（Maggañāṇa）</ail>道智即會生起，把所有潛伏的煩惱消滅。此消滅就是消滅上述的那兩位國王，即是有見<ail>（Sassata-Diṭṭthi）</ail>與無見<ail>（UcchedaDiṭṭhi）</ail>。至於喻為父母的渴愛<ail>（Taṇhā）</ail>與我慢<ail>（Māna）</ail>，由於他們與每個人的生命有著如此深厚和密切的關聯，必须被殺四次始得。做與不做，悉隨尊便。

/SECTION/宣隆大師勉勵精進

讓我說一個故事給你們聽：大病初愈的人。

假設有一個大病初愈的人，他很想喫點肉補身，可惜身無分文，於是他走到河邊碰碰運氣。不多久，他看到一隻大龜在河邊走動，於是便走上前想捉牠回家，然後大喫一餐，可是，他大病初愈的身子仍然很虛弱，氣力不及大龜，最後，竟被大龜拖著走向河心，他被拖入水中，越走越深，到水深及口時，他被迫要放手了，於是有些丟臉地向大龜說：「喂！龜老兄！今次我放過你，將來我不幸被你捉到時，記得要放過我十次啊！」說話間，就把大龜放走了。

這故事顯示了我一些弟子們的誓言。當弟子們前來熱誠地禪修，我們都很想他們能夠堅持到底，然而，對於那些未能堅持到底的弟子們，我們唯有讓他們回家，就像上述那位無力捉住大龜的人。

看到眾生在生死海中不斷浮沉漂蕩，我們必會盡力拯捄的，例如：我們會伸出援手、抛出繩索、捄生圈或竹竿等，好讓他們捉住，然後拉他們到安全之境。如果漂蕩的人無心把它們捉住或抓緊，我們實在沒有辦法，唯有讓他們自行決定自己的命運吧！

讓我再講一個故事給你們聽：喫象腳。

有兩位生活潦倒的朋友，他們正在旅途之中，身上一個錢也沒有，肚餓時，他們想出一個辦法來互相慰藉：

朋友甲首先說：「這裏有些咖哩雞，請拿來喫吧！」

朋友乙回答：「啊！好香，很好喫啊！」

朋友甲繼續說：「這裏還有些咖哩豬肉，請拿來喫吧！」

朋友乙回答：「美味極了！」

跟著，角色轉換了。

朋友乙說：「這裏有祗咖哩象腳，請拿來喫吧！」

朋友甲回答：「啊！很好喫！還有甚麼？快些拿來！」

朋友乙提醒甲說：「喂！老友！你還未喫完我給你的東⻄啊！記得我說嗎？那是一隻巨大的象腳呀！」

像上述兩位朋友的故事一樣，我給你們喫的是一隻巨大的象腳──接觸、覺察與專註，三者必须要同步。如果你能令三者同時發生，你將可洞悉有為法<ail>（因緣所生法）</ail>的三個根本特性──無常<ail>（Anicca）</ail>、苦<ail>（Dukkha）</ail>與非我<ail>（Anatta）</ail>；換言之，你即可成就「三法印智<ail>（Sammasana-Ñāṇa）</ail>。這种內觀智，正是佛陀與其聖弟子們」所有的正常心態。

因此，我給你們的忠告是：當我獻上那樣的一大塊肉給你們享用時，請不要藉詞回避，應用力咀嚼之、品嘗之、⻝用之，對你們會有真實利益的！`);
