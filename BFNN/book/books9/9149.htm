/TEXT030C/釋永真，彭殿清 撰集

漢明帝劉莊<ail>（公元28～75年）</ail>，初名劉陽，光武帝劉秀第四子，東漢第二位皇帝，母光烈皇後陰麗華。漢明帝在太子時的老師是博士桓榮，幼小即學《春秋》、《尚書》，後來繼位作了皇帝，非常尊師重道。曾親自到太常府<ail>（桓榮已封太常）</ail>去，讓桓榮坐東面，設置幾杖，像當年講學一樣，聆聽老師指教。同時將朝中百官和老師教過的學生數百人召到太常府，向桓榮行弟子禮。桓榮生病，明帝探望老師，一進街口便下車步行前往。進門後，往往拉著老師枯瘦的手，默默垂淚，良久乃去。

漢明帝公元57年即皇帝位，在位十九年，一切遵奉光武制度，提倡儒家經典，崇尚仁愛，注重刑名文法，為政苛察，總攬權柄，權不借下。期間吏治清明，社會安定。恢復對西域的控制，招撫流民，民安其業，戶口滋殖。由光武帝末年全國載於戶籍的人口僅為2100多萬，至明帝末年，人口激增至3400多萬。他嚴令後妃之家不得封侯與政，對貴戚功臣也多方防范，同時也致力消除北匈奴的威脅，為此命窦固征伐北匈奴。其後，又以班超出使西域，由是西域諸國皆遣子入侍。班超出使西域次年，又置西域都護。

據梁代慧皎《高僧傳》卷第一載：“漢永平中，明皇帝夜夢金人飛空而至。乃大集群臣，以占所夢，通人<ail>（學識淵博通達的人）</ail>傅毅奉答：‘臣聞西域有神，其名曰佛。’陛下所夢將必是乎，帝以為然。即遣郎中蔡愔，博士弟子秦景等，使往天竺尋訪佛法。於彼遇見摩騰，乃要還漢地。摩騰誓志弘通，不憚疲苦，冒涉流沙至乎雒邑<ail>（洛陽的古稱）</ail>。明帝甚加賞接，於城西門外立精捨以處之。”

又據《佛祖統紀》及我國其它史籍記載：佛法之東來，自漢明帝始。永平七年<ail>（公元65年）</ail>漢明帝夢見一個金人，金人有一丈六尺高，項佩日輪佛光，光芒四射，金人在金銮殿上飛行。第二天一早上朝，把自己的夢告訴群臣，問曰：“何神人也。”博學多才的傅毅<ail>（東漢辭賦家，司馬）</ail>進曰：“臣按《周書異記》雲：‘周昭王二十四年<ail>（甲寅年，公元前1027年）</ail>四月八日平旦時，大風起宮殿，民居震動。其夜有五色光，氣貫太微<ail>（太微，帝皇之居）</ail>，遍於四方，作青赤色。周昭王問太史蘇由<ail>（西周時的太史官，主管編寫史書，兼管國家典籍、天文歷法、祭祀等）</ail>曰：‘是何祥也？’蘇由對曰：‘西方有大聖人降生，後一千年聲教被此土。’周昭王使镌石記之，掩埋於南郊天祠前。以年計之，今一千一十年矣，陛下所夢即是。”漢明帝以為然，遣羽林郎中蔡愔、博士蔡景、王遵等人，西訪求道，至大月氏國遇迦葉摩騰、竺法蘭二梵僧，二梵僧誓志弘通佛法。三年後，永平十年<ail>（公元68年）</ail>遣使同兩位僧人冒涉流沙一起回到洛陽，以白馬馱經，帶回優填王<ail>（佛世時憍賞彌國之王，又稱嗢陀演那王、邬陀衍那王）</ail>所造佛像和四十二章經。漢明帝命立寺雍門外，名白馬寺，這是中國第一座佛教寺院。作為譯經場，迦葉摩騰、竺法蘭在此將四十二章經由印度文翻譯成中文《四十二章經》，是我國最早之佛教經典。自公元68年起佛教全面進入中國，佛教在中國流行，史稱“永平求法”。此後，譯經高僧安世高和支婁迦谶經由絲路也來到白馬寺，譯出《安般守意經》、《首楞嚴三昧經》、《般舟三昧經》等佛經。

在漢明帝之前，已有佛法東來的史跡，據隋代費長房撰《歷代三寶記》、宋代行霆撰《重編諸天傳》載，早在秦代公元前218年，阿育王派遣一批傳教師來到中國，印度沙門室利房等18人從西域入鹹陽，因禁制未行。又據《佛祖統記》載：“……及開西域，遣張骞使大夏，還，傳其旁有身毒國，一名天笠，始聞有浮屠之教。”可見中國與印度已經有了往來，尤其於絲路一帶的民間，傳教士們開展活動。宣化上人贊雲：“佛法東來，始漢明帝。夜夢金人，問是何意？西方有神普渡大地。請速迎接，同舟共濟。”《資治通鑒·漢紀三十七》卷第四十五記載：“明帝聞西域有神，其名曰佛，因遣使之天竺求其道，得其書及沙門。其書大抵以虛無為宗，貴慈悲不殺；以為人死，精神不滅，隨復受形；生時所行善惡，皆有報應，故所貴修練精神，以至為佛；善為宏闊勝大之言以勸誘愚俗。精於其道者，號曰沙門。於是中國始傳其術，圖其形像。”公元75年，漢明帝去世，時年四十八歲。廟號顯宗，谥號孝明皇帝，葬於顯節陵。

在佛教開始傳入中國的時期，佛法尚未盛行，其後有很多僧人和居士學修佛教並著書傳播佛教。知歸子<ail>（《居士傳》作者，清初彭際清）</ail>曰：“當牟子<ail>（牟融）</ail>之世，佛法未盛行。而牟子笃信其道，豈非獨往之士？安元、支恭明、竺叔蘭、竺長舒、阙公則，宏法扶戒導信化疑，亦甚為希有。”又曰：“何充<ail>（東晉重臣）</ail>笃信佛法，飯僧造寺所費不訾。……迨至晉宋之交，始有東林之盛，應化神靈繼此騰集矣。”
