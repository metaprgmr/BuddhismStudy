2018年初，加拿大蒙特利爾的同學們發心學習華嚴經，當時我們匯集了百餘篇小論文供大家做參考。這些論文文字不多，雖然大略闡述了華嚴經的諸多方面，但是很多材料並沒有做詳細說明。2019年夏天，根據大家的倡議，我們對華嚴經又做了一次講解。這次講解匯集起來一共二十八講，主要針對前面論文中所論述的問題，做進一步詳細說明。儘管不是對經本做消文註釋，但對很多修行者來說，這次的講解應該已經把這部經的主要義理說清楚了。

華嚴經是大乘佛教最重要的經典，是佛教經典的集大成。這部經不但涵蓋了從凡夫地到如來地所有的行法理論和行法次第，在文字上也幾乎涵蓋了所有經典的演說模式。通過學習這部經，如果能明瞭行法理論和行法次第，明了經典的集結模式和文字的解讀方法，並且能夠掌握如何從經典解讀生起確切的行法實踐，那麽從這部經走入佛教的各個方面都將清晰明確，不會迷失。可以說，華嚴經對修行者的行法實踐，具有實質上的指導意義。

淨土宗德高望重的淨空老法師對我們的學習提供了很大幫助。老法師贈送了一套大藏經，又不遠萬里從臺灣運到了北美。對於前輩寄予的厚望，今天的修行者果能深入經藏，依教奉行，那將是最好的報答。

這二十八篇講義中的前面六講，大部分內容是關於中國佛教發展歷史。這部分內容除了參考大藏經和中國儒家道家的經典與相關記載之外，不少地方還參考了當代學者們的論著，其中主要包括蔣維喬先生的《中國佛教史》、季羨林先生的論文集《季羨林講佛教》、馮友蘭先生的《中國哲學史》、以及北京大學哲學系教研室主編的《中國哲學史》等等。學者們在做出嚴謹論證的同時，還提供了各種詳實而豐富的材料。有了他們的辛勤付出和研究成果，才使得我們能夠按圖索驥，比較輕易地就能看清楚中國佛教的發展歷史。他們的研究成果為我們節省了很多時間和精力。學者們謹慎求實的治學態度，體現在著作的字裡行間，看到之後，確實令人肅然起敬。

幾年來，加拿大蒙特利爾淨宗學會一直積極組織學習華嚴經，很多參加學習的人都有明顯的進步，在修行道路上更加理性和堅定，這是非常令人歡喜的。二十八講文字寫好之後，學會還安排了不少同學參與整理和校對。這些同學都投入了非常多的心力。他們一絲不茍地認真付出，使得講義的文字更加流暢，所言說的內容更加鮮明。這份講義能得以盡快成文，可以供養更多有緣的人，裡面傾注了這些同學的熱忱。

非常感謝組織者的慈悲發心，沒有他們的護持和大力推動，就沒有大家一起學習這部經的難得機緣。也非常感謝參與整理和校對的同學們，如果沒有他們的參與，這份工作恐怕要持續很久才能完成。

華嚴經是佛教的根本法輪，其蘊含的義理深妙無窮，很難用有限的二十八講文字來完全說清。但是這樣的學習可以作為一個開端，一旦打開經典的大門，剩下的道路就會明朗得多。

佛法傳承離不開修行者的理性和參與，希望這二十八講的內容，能夠給更多人帶來啟發，乃至帶動更多的修行者深入經藏，以開顯佛教的真實法義。
