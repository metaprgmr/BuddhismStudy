<html>
<head>
<meta http-equiv=Content-Type content="text/html; charset=utf-8">
<title>高僧傳</title>
<link rel="stylesheet" href="../books/book.css">
<script src="../../../util/utils.js"></script>
<script src="../mybfnn.js"></script>
</head>
<body link=blue vlink=purple background="../books/textbackground.jpg" class="Normal">
<div id="stg"></div>
</body></html>

<script>
var JTSXL = new (class extends SeriesContainer {
  constructor() { super(); }

  loadJS(vol) { addjs(`9075/${to2d(vol||0)}.js`); }

  showPage() {
    var buf = new Buffer(), me = this;
    new (class extends DocInfo {
      constructor() {
        super();
        this.setVolumesInJS(true, true).setBuffer(buf).setXG().reInit(9075, 9);
        this.volNum = me.volNum;
        var ttl = '淨土聖賢錄', author = '淨業學人彭際清撰';
        if (!me.volNum) {
          this.writeStart(ttl)
              .writeBody(`\n/TEXT030C/${author}\n${me.text}\n/VOLSEP/`, true);
        } else {
          var zvol = zNumber(me.volNum), juan = `淨土聖賢錄卷${zvol}`;
          this.writeStart(`${ttl}|（卷${zvol}）`)
              .writeBody(`\n/TEXT030C/${author}\n` +
                         `/SECTION/${juan}\n${me.text}\n/TEXT339R/${juan}\n/VOLSEP/`, true);
        }
      }
    })(); // class extends DocInfo
    buf.render('stg');
  }

})()
.show(get('vol'), get('pin')); // 卷，品
</script>
