b { color:#339 }
</style>

<script>
docInfo.setXG().set('defaultClass','TEXTL').writeDoc('佛子行三十七頌', `
/TEXT030C/無著賢菩薩　造

/class TEXTC/
${COL_START}
<b>南無洛給秀惹亞</b>
誰見諸法無來去　唯一勤行利眾生
殊勝師及觀自在　恆以三門恭敬禮
正等覺佛利樂源　從修正法而出生
修法復依明行要　故當宣說佛子行
${COL_END}
${gatha37()}

${COL_START}
<b>迴向</b>
吾以此善願眾生　皆發真俗菩提心
不住有寂得自在　咸成怙主觀世音
${COL_END}
/_class/`);

function gatha37() {
  var gathas =
`此生幸得暇滿船 自他須渡生死海 故於晝夜恆不懈 聞思修是佛子行
親方貪心似水盪 怨方瞋心似火燃 痴昧取捨猶黒闇 離家鄉是佛子行
遠惡境故惑漸減 離散亂故善自增 心澄於法起定見 依靜處是佛子行
常伴親友還離別 勤聚財物終棄捐 識客且遺身舍去 捨此世為佛子行
交近彼而三毒長 且令聞思修退轉 能轉慈悲令喪失 遠惡友是佛子行
依彼若令惡漸盡 功德猶如初月增 當珍重彼更勝己 依善知識佛子行
自身猶陷輪迴獄 世間神祇誰能救 故應依止不欺者 皈依三寶佛子行
諸極難忍惡趣苦 能仁說為惡業果 是故縱遇命難緣 終不造罪佛子行
三界樂如草頭露 是須臾頃壞滅去 故於無轉解脫道 起希求是佛子行
無始以來慈我者 諸母若苦我何樂 為度無邊諸有情 發菩提心佛子行
諸苦源於欲自樂 諸佛利他心所生 故於自樂與他苦 如實交換佛子行
誰以大欲劫我財 一切奪取或令奪 猶將身財三世善 迴向於彼佛子行
吾雖無有稍過咎 他人竟來斷我頭 於彼還生難忍悲 代受其罪佛子行
何者於吾生毀謗 醜聞謠傳遍三千 吾猶深懷悲憫心 讚他德是佛子行
何者於眾集會中 揭吾隱私惡言向 於彼還生益友想 倍恭敬是佛子行
吾以如子養護人 彼若視我如怨仇 猶如母憐重病兒 倍悲憫是佛子行
與吾同等或下劣 雖懷傲慢屢欺凌 吾仍敬彼如上師 恒頂戴是佛子行
恆受貧苦為人欺 復遭重病及魔侵 眾生諸苦已代受 無怯弱是佛子行
美名四揚眾人敬 財物量等多聞天 然視世妙無實義 離驕慢是佛子行
倘若未伏內瞋敵 外敵雖伏旋增盛 故應速興慈悲軍 調伏自心佛子行
五欲品質如鹽滷 任幾受用渴轉增 於諸能生貪著物 頓捨卻是佛子行
諸所顯現唯自心 心體本離戲論邊 知已當於二取相 不作意是佛子行
設若會遇悅意境 應觀猶如夏時虹 雖現美妙然無實 離貪著是佛子行
諸苦猶如夢子死 妄執實有起憂惱 故於違緣會遇時 觀為虛幻佛子行
欲證菩提身尚捨 何況一切身外物 不望回報與異熟 行布施是佛子行
無戒自利尚不成 欲行利他豈可能 故於三有不希求 守護戒是佛子行
欲享福善之佛子 應觀怨家如寶藏 於諸眾生無怨心 修安忍是佛子行
唯求自利二乘人 見勤猶如救頭燃 為利眾生功德源 發精進是佛子行
甚深禪定生慧觀 能盡摧滅諸煩惱 故應遠離四無色 修禪定是佛子行
無慧善導前五度 不得圓滿菩提果 故具方便離三輪 修智慧是佛子行
若不細察己過失 以行者貌行非法 故當恆察自心續 斷己過是佛子行
因惑說他佛子過 徒然減損自功德 故於大乘諸行者 不道彼過佛子行
貪圖利敬互爭執 聞思修業將退失 故於親友施主家 離貪著是佛子行
粗言惡語惱人心 復傷佛子諸行儀 故於他人所不悅 絶惡言是佛子行
煩惱串習甚難除 勇執正念對治劍 貪等煩惱初萌時 即斬斷是佛子行
隨於何時行何事 應觀自心何相狀 恆具正念與正知 成辦利他佛子行
如是勤修所生善 為除眾生無邊苦 咸以三輪清淨慧 迴向菩提佛子行`.split('\n');

  var buf = new Buffer(COL_START);
  var div = colDiv(50);
  for (var i=0; i<3; i++) {
    buf.w('\n');
    for (var j=0; j<12; ++j)
      buf.w(`<b>第${zNumber(i+j*3+1)}偈</b>\n`, gathas[i+j*3].replaceAll(' ', '<br>'), '<br><br>');
    if (i == 1)
      buf.w(`<b>第${zNumber(37)}偈</b>\n`, gathas[36].replaceAll(' ', '<br>'));
    if (i < 2) buf.w(div);
  }
  return buf.w(COL_END).render();
}
</script>
