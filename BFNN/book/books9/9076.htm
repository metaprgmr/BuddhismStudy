<script>
var jieUri = '../../../淨土宗/《無量壽經》/Jie.html';
new (class extends SeriesContainer {
  constructor() { super(); }

  loadJS(vol) { addjs(`9076/${to2d(vol||1)}.js`); }

  showPage() {
    var me = this;
    new (class extends DocInfo {
      constructor() {
        super();
        this.setVolumesInJS(false, true).setBuffer().setXG().reInit(9076, 5);
        this.volNum = me.volNum;
        var ttl = '淨空法師是觀世音菩薩為新時代而來', zvol = zNumber(me.volNum),
            fn = me.footnotes || '';
        if (fn) fn = `${fn}\n`;
        this.writeStart(`${ttl}||第${zvol}篇 ${me.subttl}`, '觀音菩薩與新時代之'+zvol)
            .writeBody(`\n/TEXT030C/信裹居士 著於 丙午年觀世音菩薩聖誕\n\n${me.text}\n\n` +
                       `/END/第${zvol}篇 ${me.subttl}\n${fn}/VOLSEP/`, true);
      }
    })(); // class extends DocInfo
    docInfo.buf.render('stg');
  }

})()
.show(get('vol')); // 卷
</script>
