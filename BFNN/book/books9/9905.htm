<script>
function Yu() {
  var ret = '于凌波老師';
  if (arguments.length == 0) {
     ret += `的《<a href="../books/0115.htm">八識規矩頌講記</a>》`;
  } else {
    ret += '《講記》';
    for (var i=1; i<=arguments.length; ++i) {
      var anchor = arguments[i-1], znchor = zNumber(anchor);
      if (anchor < 10) anchor = `0${anchor}`;
      if (i>1) ret += '、';
      ret += `<a href="../books/0115.htm#a${anchor}">第${znchor}講</a>`;
    }
  }
  return ret;
}
function rubyfy() {
  var buf = new Buffer('<html>\n');
  for (var k in arguments) {
    buf.w('　　');
    var txt = arguments[k];
    var a = txt.split('/'), cnt = 1;
    for (var i in a) {
      var b = a[i].split('|');
      if (b.length == 2)
        buf.w(`<ruby>${b[0]}<rt>【${b[1]}】</rt></ruby>`);
      else
        buf.w(b[0]);
    }
    buf.w('<br>');
  }
  return buf.w('\n</html>').render();
}

function rb前五識頌() {
  return rubyfy(
    '性境|緣境/ /現量|識量/ /通三性|性別/，/眼耳身三二地居|界地/，/遍行別境善十一，中二大八貪嗔癡|相應/。',
    '五識同依淨色根，九緣七八好相鄰|依緣/，/合三離二觀塵世，愚者難分識與根|體用/。',
    '變相觀空唯後得，果中猶自不詮真|智力/，/圓明初發成無漏|轉依/，/三類分身息苦輪|果德/。');
}

function rb第六識頌() {
  return rubyfy(
    '三性|性別/ /三量|識量/ /通三境|緣境/，/三界輪時易可知|界地/，/相應心所五十一，善惡臨時別配之|相應/。',
    '性界受三恒轉易，根隨信等總相連|行相/，/動身發語獨為最，引滿能招業力牽|業用/。',
    '發起初心歡喜地，俱生猶自現纏眠|智力/，/遠行地後純無漏，觀察圓明照大千|轉依/。');
}

function rb第七識頌() {
  return rubyfy(
    '帶質|所緣/ /有覆通情本|性別/，/隨緣執我量為非|識量/，/八大遍行別境慧，貪癡我見慢相隨|相應/。',
    '恒審思量我相隨|行相/，/有情日夜鎮昏迷|業用/，/四惑八大相應起，六轉呼為染淨依|作依/。',
    '極喜初心平等性|智力/，/無功用行我恒摧|轉依/，/如來現起他受用，十地菩薩所被機|果德/。');
}

function rb第八識頌() {
  return rubyfy(
    '性唯無覆|性別/ /五遍行|相應心所/，/界地隨他業力生|界地定位/，/二乘不了因迷執，由此能興論主爭|理證/。',
    '浩浩三藏不可窮|體相/，/淵深七浪境為風|依緣/，受薰持種根身器，去後來先作主公|業用/。',
    '不動地前才舍藏|三位轉捨/，/金剛道後異熟空|智力斷障/，/大圓無垢同時發|轉依/，/普照十方塵剎中|果德/。');
}

docInfo.setXG().writeDoc('《八識規矩頌》內容', '八識規矩頌', `
/TEXT030C/信裹居士作

/BQKaiTi/《八識規矩頌》為唐代玄奘大師所造，是大師於翻譯得數百卷唯識經論之後，對於唯識學中的「八識」，提綱攜領所作出的總結。全部頌文，七言一句共四十八句，四句一頌分為十二頌，每三頌為一組，計四組，即前五識頌、第六識頌、第七識頌、第八識頌。八識的行相、業用、性別、識量、所緣、相應等，全包括在頌文之中。唯頌文辭約理著，言簡義豐，每一頌中都有許多佛學專有名詞，若不詳加講解，一般人很難瞭解。${Yu()}慈悲開示，先仔細解釋所有涉及的概念，最後詳解四頌。

/BQKaiTi/針對每一識的頌分為三個四句的小頌；每個小頌都涵蓋一定數量的主題。在此，將每一頌的各主題直接標註到頌文下，作為其講解的索引方便。

/BQKaiTi/相關概念，主要亦採於《八識規矩頌》，補充來自《唯識三十頌講記》等。
/VOLSEP/

${COL_START}
<a#a01>前五識頌</a>　　<a#a02>第六識頌</a>　　<a#a03>第七識頌</a>　　<a#a04>第八識頌</a>
<a#a05>五位百法</a>　<a#a06>三自性</a>　<a#a07>因緣果</a>　<a#a08>種子</a>　<a#a09>修行位</a>　<a#a10>五蘊、十八界</a>　<a#a11>其他概念</a>
${COL_END}
/VOLSEP:a01/

「唯識」二字，梵語Vijñapti-matrata，音譯毗若底摩坦喇多。梵語倒置。「五法事理唯識」束百法以五位：四事一理。

<html:diagram>五法事理唯識</html:diagram>

/SECTION:a06/三自性

一、三自性：為唯識宗一切法義的根本。《南海寄歸內法傳》曰：相宗以三性為宗。

<html:diagram>三自性</html:diagram>

二、三性中道：中道意為遠離空有二邊，無增無減。世間一切法，每一法都具足三性，即三性各具中道，也各具三性對望中道。

<html:diagram>三性中道</html:diagram>

詳解請參看${Yu(2)}。

/SECTION:a07/因緣果

一、六因、四緣、五果：「六因、四緣」為萬法生起之條件。有因有緣，必然生果：

<html:diagram>六因四緣五果</html:diagram>

二、八識具緣：八識生起，具緣不同，如下表：

/SECTION:a08/種子

一、種子是阿賴耶識中能親自生出不同果法的功能，有種種不同的分類方法：

<html:diagram>識體四分</html:diagram>

詳解請參看${Yu(5)}。

/SECTION:a09/修行位

一、菩薩修行五位：大乘因位菩薩，修唯識行，要經過三大阿僧祗劫的長時，斷得煩惱、所知二障，證得我二空，才獲致大菩提與大涅槃二勝果。其間要經過五位、四十一階。

二、四加行位：修行菩薩，進入加行位，修四尋思觀，生四如實智。其間要經過暖位、頂位、忍位、世第一四位，於前二位修四尋思觀，於後二位，修四如實智。
<html:diagram>大乘</html:diagram>

詳解請參看${Yu(8)}。

/SECTION:a10/五蘊、十八界

一、三境：八識緣境，能緣的是見分，所緣的是相分，即是境。此境就其性質分為三種。<br>
　　三量：有現量、比量、非量。<br>
　　三受：受是領納作用，有苦、樂、捨三受。如加憂喜二受，就成為五受了。<br>
　　三性：分為善、不善、無記三種。

<html:diagram>三境</html:diagram>
