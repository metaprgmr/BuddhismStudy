如是我聞：

一時佛在王舍城耆闍崛山，與大比丘眾千二百五十人俱，皆是阿羅漢眾所知識，諸漏已盡無復煩惱，心慧解脫自在無礙猶如大龍，所作已辦捨於重擔，逮得己利盡諸有結，正教通達到於彼岸；唯有阿難住於學地。爾時尊者舍利弗從座而起，偏袒右肩右膝著地，合掌向佛白言：「世尊！云何往昔諸菩薩摩訶薩發趣阿耨多羅三藐三菩提，修行遍清淨行，被精進甲功德莊嚴。是諸菩薩由被甲故，於阿耨多羅三藐三菩提得不退轉。世尊！如是行願及以發心，惟尊大慈開示演說。世尊！彼諸菩薩摩訶薩，為利益安樂天人世間，精勤修習遍清淨行被精進甲，由是利益安樂一切眾生，及為現在未來菩薩當作佛法光明，讚揚功德證獲善根故。使諸菩薩聞此法已，於真如法性精勤修學，當得阿耨多羅三藐三菩提。」

佛言：「善哉善哉！舍利弗！汝能問過去未來菩薩摩訶薩淨行光明廣大甲冑闡揚功德，為攝受未來菩薩摩訶薩故。諦聽諦聽，如理思惟，當為汝說。」

舍利弗言：「唯然世尊！願樂欲聞。」

佛告舍利弗：「從是東方過千世界，彼有佛剎名曰妙喜。昔廣目如來、應、正等覺出現於彼，與諸菩薩摩訶薩說微妙法，從六波羅蜜為首。舍利弗！彼時有一比丘從座而起，偏袒右肩右膝著地，向佛合掌白言：『世尊！如佛所說菩薩法教，志願修行。』佛言：『善男子！汝今當知，菩薩教法難可修習。何以故？菩薩於諸眾生不生瞋害心故。』時彼比丘白佛言：『世尊！我從今日發阿耨多羅三藐三菩提心，以無諂無誑實語不異語，求一切智智乃至未得無上菩提，若於眾生起瞋害心者，則為違背無量無數無邊世界中現在說法諸佛如來。世尊！我今發此一切智心如是迴向，於其中間若發聲聞獨覺心者，則為欺誑一切諸佛。世尊！我今發此一切智心如是迴向，乃至未得無上菩提，若於眾生起愛欲瞋癡之心，或與惛沈貢高惡作相應，則為欺誑一切諸佛。世尊！我今發此一切智心安住迴向，乃至未得無上菩提，若生疑惑心，如是或起殺害、不與取心，或起邪見及非梵行、妄語兩舌麁語相應，或與損害相應，則為欺誑一切諸佛。』舍利弗！時有異比丘作如是念：『此菩薩摩訶薩由初發心被精進甲，於一切眾生不為瞋等之所搖動。』舍利弗！時彼菩薩因此念故，妙喜國中號為不動。時廣目如來、應、正等覺見彼菩薩得不動名，隨喜讚善。四大天王、釋梵世主聞彼名已亦皆隨喜。

「舍利弗！彼不動菩薩摩訶薩於彼佛前作如是言：『世尊！我今發此一切智心，如是迴向阿耨多羅三藐三菩提，乃至未證無上正覺，所修行業或違此言者，則為欺誑無量無數世界諸佛如來安住說法者。世尊！我今發此大心如是迴向，乃至未證菩提，若於一一語言不與念佛及一切智相應，則為欺誑一切諸佛。世尊！我今如是發心迴向，乃至未證無上菩提，生生在家不出家者，則為違背一切諸佛。世尊！我今發此一切智心，乃至未得無上菩提，生生出家若不乞食、不一坐食、不節減食、再食不食、不持三衣、不著糞掃衣、不隨所而坐、不常坐、不住阿蘭若、不安止樹下、不露坐、不住塚間，則為欺誑一切諸佛。世尊！我今發此大菩提心如是迴向，乃至未得一切智智，若不成就無礙辯才說諸妙法，則為欺誑無數諸佛。世尊！我今如是發心，乃至未得無上菩提，若不住三威儀，或立或坐或復經行，則為欺誑無量諸佛。世尊！我今發如上心，乃至未得一切智智，或於眾生犯根本罪，或作妄語及餘世俗憒閙之言，或起摧伏他論相應之心，則為欺誑無數諸佛。世尊！我今發此一切智心，安住迴向阿耨多羅三藐三菩提，或與婦人說法，若不起無常苦空無我之相，而取彼相及露齒而笑，則為欺誑一切諸佛。世尊！若我發此一切智心，安住迴向阿耨多羅三藐三菩提，於說法時顧指輕躁，或見餘菩薩不生大師之想，則為欺誑無數諸佛。世尊！我今發此一切智心，乃至阿耨多羅三藐三菩提，若坐聽法及禮外道沙門婆羅門，唯除諸佛沙門弟子，則為欺誑一切諸佛。世尊！我今發此大心至無上覺，若行財法施時情有彼此，應供養所生簡異心，則為欺誑一切諸佛。世尊！我今發一切智心，乃至無上菩提，若見諸罪人將被刑罰，不捨身命而救護彼，則為欺誑一切諸佛。』舍利弗！時彼菩薩修此大行，乃至未證無上菩提，無一眾生將被刑罰不救護者。

「舍利弗！爾時有一比丘作如是念：『如來於此行者當為作證，彼天、人、阿修羅等亦為證見。』舍利弗！時廣目如來、應、正等覺知彼比丘心之所念，告言：『如是如是。如來、應、正等覺之所證見，彼諸世間天、人、阿修羅等亦為證見。比丘！若復有菩薩摩訶薩被如是等大精進甲，趣向阿耨多羅三藐三菩提，彼皆當成無上正覺。』

「舍利弗！時不動菩薩摩訶薩白佛言：『世尊！我今發此一切智心，乃至未證無上菩提，於其中間，若比丘、比丘尼、優婆塞、優婆夷有諸罪釁，若說其所犯，則為違背諸佛如來。世尊！我修是行，願成無上正等菩提，使我剎中廣大清淨，諸聲聞眾悉無過失。世尊！若我發此一切智心，若未證得無上菩提，乃至夢中若生欲想而有所泄，則為違背諸佛如來。世尊！我修是行證無上覺，使彼國中出家菩薩，彼於夢間亦無漏泄。世尊！若我發此一切智心，乃至證得無上菩提，我佛剎中若諸女人有女過失如餘土者，終不取正覺；若取正覺則為欺誑一切諸佛。』舍利弗！若菩薩以此大願種子成就者，念隨出生如是諸法，能為眾生說種種教。

「舍利弗！時有比丘白不動菩薩言：『大士！若此誠心不退至言無妄者，願以足指搖動大地。』時不動菩薩以佛威神及本願善根力故，令彼大地六種搖動，所謂動、大動、遍動，搖、大搖、遍搖。舍利弗！彼不動菩薩摩訶薩如昔所願今已成辦。是故菩薩摩訶薩欲證阿耨多羅三藐三菩提者，應學不動菩薩摩訶薩。若有菩薩善修其行，當獲如彼佛剎，及能速證阿耨多羅三藐三菩提。」

爾時舍利弗白佛言：「世尊！不動菩薩初發心時，幾何天子而來集會？」

佛告舍利弗：「彼時三千大千世界所有四大天王及與帝釋魔王、娑婆世界主梵天王等，皆歡喜合掌作如是言：『今此所聞被功德甲，我等昔未曾聞。世尊！彼不動菩薩當成佛時，於彼剎中所有眾生，不以下劣善根而得成就。』」

舍利弗白佛言：「世尊！如佛所說不動菩薩被甲功德，諸餘菩薩所未曾有。」

佛告舍利弗：「如是如是。諸餘菩薩被大甲冑，發趣無上菩提，無有如不動菩薩摩訶薩者。舍利弗！彼不動菩薩成就功德，於賢劫中一切菩薩皆悉無有。舍利弗！爾時廣目如來授不動菩薩摩訶薩阿耨多羅三藐三菩提記言：『善男子！汝於來世當得作佛，號曰不動如來、應、正等覺、明行圓滿、善逝、世間解、無上丈夫、調御士、天人師、佛、世尊。』如然燈佛與我授記。舍利弗！不動菩薩得授記時，有大光明普照世界，是時大地六種震動。如我往昔證一切智時，此大千界六動震動。

「復次舍利弗！彼時三千大千世界所有卉木叢林皆向菩薩傾靡，亦如我昔證菩提時一切草木傾向於我。

「復次舍利弗！不動菩薩蒙佛記時，彼大千界所有天、龍、夜叉、阿修羅、迦樓羅、緊那羅、摩睺羅伽，皆悉合掌頂禮菩薩。如我於此證大菩提，娑婆世界所有天龍等，皆悉合掌頂禮於我。

「復次舍利弗！彼不動菩薩摩訶薩得授記時，彼世界中所有女人懷孕，皆得安和分釋無諸苦難，盲者得視、聾者能聞。如我成佛時等無有異。

「復次舍利弗！彼不動菩薩摩訶薩發趣阿耨多羅三藐三菩提，及廣目如來、應、正等覺授菩提記，於彼二時一切眾生無橫死者。亦如我證一切智時無有異也。

「復次舍利弗！彼不動菩薩得授記時，有悅意香普熏世界。亦如我昔證大菩提，妙香遍聞適意無異。」

爾時舍利弗白佛言：「世尊！彼不動菩薩摩訶薩成就如是廣大功德。」

佛告舍利弗言：「彼不動菩薩蒙佛授記，非唯有此功德，又能到無邊功德彼岸。

「復次舍利弗！彼不動菩薩由廣目如來與授佛記，彼時天人世間阿修羅等，心皆悅慶柔順調善。亦如我證無上菩提，諸天人等皆同歡喜。

「復次舍利弗！彼不動菩薩獲授記時，有大夜叉手持金剛侍衛菩薩，如我無異。

「復次舍利弗！不動菩薩蒙佛記時，諸天及人散諸名花塗香末香於菩薩上，亦如我證大菩提時散諸香華。

「復次舍利弗！彼不動菩薩得授記時，有諸天人各二十億，皆發阿耨多羅三藐三菩提心，得廣目如來授佛菩提記。

「復次舍利弗！彼不動菩薩蒙佛記時，優鉢羅花，波頭摩華，紛陀利華遍滿大地。亦如我道場諸華遍覆。

「復次舍利弗！彼不動菩薩得授記時，有無量諸天在虛空中，散諸天衣覆菩薩上，咸作是言：『願此菩薩速證無上正等菩提。』亦如我昔得一切智，諸天散衣，無有異也。

「復次舍利弗！彼世間天人阿修羅等，見不動菩薩得授阿耨多羅三藐三菩提記，皆大歡喜甚於世間父母生子。猶如我證一切智時，諸天人等皆大歡悅。

「復次舍利弗！彼三千大千世界所有天人，以佛神力皆聞不動菩薩授菩提記，各施種種上服名衣珍奇美膳。譬如比丘加提月滿，一切諸人悉皆供養。舍利弗！彼不動菩薩得授記時，欲界眾生持諸上味并奏天樂而以供養。舍利弗！彼不動菩薩摩訶薩得授記已，有如是等功德成就。」

時尊者舍利弗白佛言：「世尊！如來、應、正等覺甚為希有，善說諸佛境界不可思議，如是禪定境界及諸龍境界不可思議，諸業果報不可思議。世尊！彼不動菩薩住初發心，攝受如是殊勝功德得如來記，又成此等不可思議諸大功德。」

佛告舍利弗：「如是如是，如汝所說。」

爾時尊者阿難白舍利弗言：「大德！彼初發心菩薩被精進甲冑，世尊略說少分功德猶故未盡。」

舍利弗言：「如是如是，如來略說。何以故？彼菩薩住初發心被精進甲，成就不可思議無量功德。」

時舍利弗復白佛言：「世尊！今已略讚不動菩薩被甲精進殊勝功德。唯願世尊為攝受現在未來諸菩薩故，廣為宣說。」

佛告舍利弗：「不動菩薩住初發心被精進甲，如是功德不可思議。吾今為汝說其少分，諦聽諦聽，善思念之。」

舍利弗言：「唯然世尊！願樂欲聞。」

佛言：「彼不動菩薩發如是願：『假使虛空而有變異，我之弘誓終無退轉。』由此願故，不動菩薩所有功德皆速成就。舍利弗！我不見有於賢劫中諸菩薩輩，被精進甲如不動菩薩者。舍利弗！寶幢菩薩所修之行，比於不動菩薩，於少分中乃至歌羅分亦不及一。舍利弗！不動菩薩所被精進甲冑，無量千菩薩悉無與等。舍利弗！不動菩薩摩訶薩以此堅固誓願，證得阿耨多羅三藐三菩提。今現住於妙喜世界，號為不動如來、應、正等覺。

「復次舍利弗！彼不動如來往昔行菩薩行時，諸有乞求頭目髓腦，手足支節，不逆其意悉皆施與。舍利弗！彼不動如來從初發心乃至未證無上菩提，由此因緣，無風黃痰及頭痛等和合諸病。舍利弗！彼不動如來往昔行菩薩道時，得如是等未曾有法。舍利弗！彼由往昔於生生處供養奉事諸佛如來，於彼佛所常修梵行，由是因緣生生之處還復本名號為不動，從一佛剎至一佛剎，生有佛世常見如來。舍利弗！譬如剎利灌頂大王於世間中得勝自在，從一宮殿至一宮殿，足不履地受五欲樂。彼不動菩薩往昔行菩薩行時，生生之處常修梵行供養諸佛，隨所說法示教利喜，皆與波羅蜜相應、少與聲聞地相應，能令諸菩薩趣入安住阿耨多羅三藐三菩提。由此發心於無上菩提故，獲此廣大功德利益。又以法施善根迴向菩提，發如是願：『願我成佛，於彼剎中一切菩薩，以佛威力聞我說法，受持讀誦，及能歷事諸佛如來，從一佛剎至一佛剎，乃至未證無上菩提，常不遠離諸佛世尊，譬如於我。唯除至兜率天宮補處之位。何以故？諸菩薩摩訶薩法爾如是，若從兜率天眾降神母胎，右脇生時大地震動。』舍利弗！最後身菩薩摩訶薩有如是瑞相。舍利弗！譬如比丘具諸神足，入宮殿內猶處虛空，住諸威儀皆無障礙。彼後身菩薩亦復如是，雖在母胎而住虛空，一切胎垢不淨不能污染，臭穢之氣彼亦不聞。舍利弗！彼不動如來往昔行菩薩道發如是願：『若我當證無上菩提，於彼佛剎行菩薩乘及聲聞乘者，皆斷諸魔業。諸眾生類於一切種於一切時，令諸魔眾不得其便。亦猶於我行菩薩行時斷一切魔業，而彼諸菩薩乃至未成諸大功德，常勤攝受修菩提行。』舍利弗！彼不動如來、應、正等覺往昔行菩薩行，演說諸法及聽聞時，身之與心不生疲倦。何以故？彼初發心修菩薩行時，得法身威力故。舍利弗！不動如來、應、正等覺往昔行菩薩行時作如是願：『我佛剎中所有菩薩摩訶薩皆得法身圓滿，如我無異。』」

${mvp.startInVol('佛剎功德莊嚴品第二', 'p02', '授記莊嚴品第一')}

爾時舍利弗白佛言：「世尊！如佛已說不動如來修菩薩行時所有功德。復願世尊開示廣說不動如來見今剎土功德嚴勝。何以故？使諸補特伽羅行菩薩乘者，聞彼功德生愛樂心，欲見彼佛禮拜供養。住聲聞地補特伽羅證無學者，聞彼剎土功德莊嚴，亦希瞻禮供養奉事。」

佛告舍利弗：「善哉善哉！汝今乃能問如是義。諦聽諦聽，善思念之，今當為汝分別解說。」

舍利弗言：「唯然世尊！願樂欲聞。」

佛告舍利弗：「彼不動如來、應、正等覺證一切智時，放大光明普照三千大千世界，是時大地六種震動。彼世界中所有眾生，知不動如來證無上覺，經七晝夜無有食想、無飢渴想，亦無疲倦宴處睡眠之想，唯有安樂歡喜愛樂善心。而於彼時，世界之中所有眾生及欲界天，無有婬欲。何以故？由彼如來本願力故，彼諸眾生現世攝受此諸功德。舍利弗！不動如來、應、正等覺證一切智時，彼世界中所有眾生皆至誠合掌向不動如來，由渴仰如來故，能於現世攝受如是無量功德。

「復次舍利弗！彼佛世界功德莊嚴，無量佛國悉無與等。舍利弗！由彼如來修菩薩行時發斯弘誓願，此佛剎殊勝莊嚴，如我於今本願成就。舍利弗！彼不動如來、應、正等覺證無上菩提時，於其剎那或須臾頃，三千世界所有眾生，若有天眼若無天眼，彼皆得見不動如來。舍利弗！此亦如來本願成就，令諸有情獲此功德。

「復次舍利弗！不動如來坐菩提道場證無上覺時，天魔波旬不生障礙之想。復有無數百千諸天，以諸香花及天伎樂供養如來，各持細末栴檀而散佛上；是諸香末及彼花鬘，於虛空中合而成蓋。舍利弗！此皆不動如來本願之力，今得成滿。

「復次舍利弗！彼佛得菩提時，大光普遍三千世界，日月諸天光悉不現。此亦不動如來昔願圓滿，今獲斯瑞。」

時舍利弗白佛言：「世尊！彼不動如來昔行菩薩道，誠有廣大精進甲冑，能發如是弘誓之心。」

「由彼往修菩薩行願，能令無數百千眾生殖諸善本於無上菩提，又以善根迴向阿耨多羅三藐三菩提清淨佛剎，如是如是迴向願力悉皆圓滿。

「復次舍利弗！彼佛剎中有菩提樹，成以七寶，高一由旬，樹身周圍半拘盧舍，條葉垂蔭周一由旬，下有基陛周四由旬，佛坐其上證菩提道。道樹四邊有多羅樹及蘇漫那樹周遍行列，微風吹動出和雅音，世間音樂所不能及。

「復次舍利弗！彼佛剎中無三惡趣。何等為三？所謂地獄、畜生、剡魔王界。一切眾生成就十善，地平如掌而作金色，無有溝坑荊棘瓦礫，其地柔軟如兜羅綿，足所履時其地即下，隨舉其足還復如初。舍利弗！彼佛剎中無三種病。云何為三？謂風、黃、痰所起之病。舍利弗！彼佛土中一切有情無虛妄語，亦無醜陋，身無臭穢，於貪瞋癡皆悉微薄，亦無牢獄囚繫眾生。舍利弗！彼佛剎中無有外道異學之眾。所生諸樹常有華果，復有奇樹時號劫波，上出名衣皆備五色，光花鮮潔異氣芬芳，於一切時常無變易。譬如天花種種芬馥，彼衣香氣亦復如是，諸服用者身所出香與衣無異。譬如此界富樂之人，名衣自豐服用如意。舍利弗！彼土眾生所須飲食，如三十三天應念而至，無有便利穢惡不淨。舍利弗！彼國所居宮殿樓閣，皆以七寶而嚴飾之。於其四邊多諸池沼，八功德水受用隨心。園觀又多，悉皆清淨。諸眾生輩多以法樂而居。舍利弗！彼剎人倫無有嫉妬，一切女人超諸女寶，獲天功德此無能比，假令況之，百分不及一、千分不及一、百千分不及一、百千俱胝那由他算數譬喻乃至鄔波尼殺曇分亦不及一。舍利弗！彼剎諸人隨其業報感諸床座，皆七寶成嚴麗具足，其所偃息以兜羅綿枕。此皆由不動如來往昔願力，成就如是種種嚴好。舍利弗！彼剎諸人所資飲食，色香味等不異諸天。譬如欝單越人無別王者，彼妙喜國亦復如是，唯有不動如來以為法主。又如三十三天奉事帝釋，彼諸人等咸事如來。舍利弗！汝應知彼不動佛剎功德莊嚴。舍利弗！彼土眾生心無放逸。何以故？亦由不動如來本願力故。」

時一比丘聞佛讚揚不動如來佛剎功德，心生貪著，而白佛言：「世尊！我今願生不動佛剎。」

佛告比丘：「汝之愚迷豈得生彼。何以故？不以愛著之心而得往生，唯有殖諸善本、修諸梵行得生彼故。

「復次舍利弗！彼土眾生隨其所樂，有清淨池應念而見，八功德水充滿其中，飲漱洗沐皆適人意；有不樂者即便不見。舍利弗！彼佛剎中香風和暢悅可眾心，而彼香風為諸天人作諸香事；曲從人心，有至不至。舍利弗！此皆不動如來本願力故功德莊嚴。

「復次舍利弗！彼佛剎中女人衣服及莊嚴具，從樹而生隨意受用。彼國女人無女過失，不如此界諸女等心多嫉妬兩舌惡口。又彼懷孕之時至於誕育，母子安適亦無穢污。何以故？此皆不動如來本願力故。舍利弗！彼佛剎中有如是等安隱快樂。舍利弗！彼不動如來、應、正等覺佛剎土中，無有市易商賈，亦無田業農作，常得快樂。舍利弗！彼佛剎中歌詠遊戲，無有婬欲相應，彼諸人等唯受法樂。舍利弗！彼佛剎中所有蘇漫那樹及多羅樹而為行列，微風吹動出和雅音，假使天人音樂不如彼樹。舍利弗！若菩薩摩訶薩欲攝佛土者，應當攝受如是功德，及淨修佛國，如不動如來行菩薩行攝受佛剎功德莊嚴。舍利弗！彼佛土中無諸黑闇，雖有日月不現暉光。何以故？不動如來常有光明普照佛剎故。舍利弗！譬如高大樓閣密閉戶牖，以摩尼寶置於室中，其內有情雖經晝夜常覩光耀。彼佛剎中諸眾生類，見如來光亦復如是。舍利弗！大樓閣者，彼方妙喜世界。摩尼寶者，此喻不動如來。摩尼寶光者，喻佛光明。閣中有情，譬妙國土諸群生等。舍利弗！不動如來隨所行住，有千葉蓮花自然承足，是華金色世無可喻。舍利弗！此亦不動如來應正等覺殊勝力之所成就。」

時舍利弗復白佛言：「世尊！彼不動如來若入室中，金色蓮花為承足不？」

佛告舍利弗言：「斯事微淺，何勤致問？彼佛世尊若入村坊舍宅，其千葉華即隨而現。若有善男子善女人作如是念：『若如來降尊入此室者，足下蓮花應聚一處。』隨其所念花則為聚。若復有人願花住空，即如彼念在空中住。由彼如來威神力故。舍利弗！彼承足蓮華與諸人等為塔供養。舍利弗！彼佛世尊為演法故，遍遊三千大千世界，隨所行處其花即現。又復如來隨所化現他方剎土，其金色花亦現於彼。以佛威力故，三千大千世界皆以金色千葉蓮花莊嚴其土。

${mvp.startInVol('聲聞眾品第三', 'p03', '佛剎功德莊嚴品第二')}

「復次舍利弗！彼不動如來於說法時，能善調伏無量眾生，皆令現證阿羅漢果，安住靜慮八解脫者其數甚多。舍利弗！彼不動如來、應、正等覺有無量無數諸聲聞眾，我不見若算師算師弟子有能算數彼聲聞眾爾許，頻婆羅、殑伽羅、波頭摩、阿羅吒、若干阿頻婆、阿部多，舍利弗！如此算數無有能知彼聲聞眾定其數量若干名者。舍利弗！如我此剎諸善男子獲預流果、斯陀含果、阿那含果則無其數，於彼剎中證阿羅漢亦復如是。舍利弗！譬如懈怠預流果入七返受生，為其說法方獲勝果，我說名為七返生人。舍利弗！若有於不動如來初說法時獲預流果，第二說法證斯陀含，第三說法證阿那含，第四說法證阿羅漢者，此諸人等非一坐定得盡諸漏，名懶惰人。舍利弗！彼佛剎中得預流者，於此現身而得漏盡，非如此界經七返生。斯陀含者即於現生能盡苦際，匪如此界經一往來名斯陀含。阿那含者彼於現身成阿羅漢，非如此界往上地生不還來此名阿那含。舍利弗！不動如來於彼剎中說諸聲聞行位差別，乃至安立如是聖果。若善男子善女人能了此法，不住諸識及於學地，而身歿亡住無學地方取滅度。舍利弗！無學地者是阿羅漢地假名建立，言無學者是阿羅漢假名建立。舍利弗！彼不動如來諸聲聞眾，清淨具足安住堅固。舍利子！此是不動如來諸聲聞眾假名建立，所謂大阿羅漢，諸漏已盡所作已辦，棄捨重擔逮得己利，盡諸有結正教解脫。是諸羅漢多住靜慮八解脫中。舍利弗！彼不動如來有如是等諸聲聞眾，具足功德之所莊嚴。

「復次舍利弗！彼佛剎中以金、銀、琉璃三寶為階，從閻浮提至忉利天。舍利弗，三十三天若欲樂見不動如來禮拜供養，彼諸天眾從寶階下至於佛所。時彼諸天見閻浮提人富盛具足，便生愛樂，作如是言：『我等諸天有天福報，彼閻浮提人有人福報。我今所見殊勝之福與我無異，然閻浮提復有勝福過於天者，謂不動如來演說正法。』是故天眾常樂人間。舍利弗！閻浮提人若昇天者了無愛樂。何以故？不動如來在於人間，常演正法饒益我等，然我之福報不異諸天。是故三十三天所不能及。舍利弗！彼界人天以佛神力互得相見，譬如此界閻浮提人見諸星月，舍利弗！彼諸人眾仰觀上界諸天宮殿亦復如是。舍利弗！此亦是不動如來本修菩薩行時願力成就。舍利弗！彼佛說法之聲普遍三千大千世界，聽法四眾間無空缺。舍利弗！彼聲聞眾唯希法食，無餘食想。於聽法時一心寂靜，若坐若立身心無倦。舍利弗！不動如來住虛空中為眾說法，彼聲聞眾若得神通及不得者，以佛威力皆住虛空，以三威儀而聽法要。何等為三？謂行、住、坐。是聲聞輩若欲涅槃，結加趺坐而便滅度，爾時大地為之震動。既滅度已，一切天人皆來供養。或有阿羅漢將欲滅度，身中出火而自闍維；或有自然化滅無遺舍利；或有於滅度時遊行空中如五色雲，須臾消散滅無遺迹；或住虛空如降時雨至地消盡。舍利弗！此亦不動如來、應、正等覺本修菩薩行時作如是願：『若我得證無上菩提，諸聲聞眾以三威儀而取滅度。』

「復次舍利弗！彼佛國中諸聲聞眾多獲四無所畏，得四神足者復多於此。舍利弗！彼剎土中諸聲聞眾，成就如是具足功德。」

時舍利弗白佛言：「世尊！彼不動如來、應、正等覺諸聲聞眾，功德熾盛廣大成就。」

${mvp.startAtVol('菩薩眾品第四', 'p04', 20, '聲聞眾品第三')}

爾時尊者舍利弗作如是念：「世尊今者已說聲聞功德，復願說諸菩薩具足功德。何以故？一切功德從此出生。」

爾時世尊知其所念，告舍利弗：「彼佛剎中有無量百千億諸菩薩眾皆來集會。所有出家菩薩，以佛神力隨所聽聞，皆能領悟受持讀誦。舍利弗！我於此界說法至少，比不動如來所說法藏，百分、千分、百千分、億百千分、算分、數分、迦羅分、鄔波尼殺曇分亦所不及。舍利弗！此皆不動如來、應、正等覺修菩薩行時發如是願：『願我成佛，彼剎土中所有菩薩，以我威力隨所聽聞，皆能領悟受持讀誦。』舍利弗！是諸菩薩由彼如來本願神力，於佛所聞悉能領受諷誦通利。

「復次舍利弗！若彼菩薩自心欲樂往異佛土，舉心便至，形服言音善同方俗。於彼如來禮拜供養，聽聞正法善為問難，能事已周還歸佛所。舍利弗！此賢劫中有九百九十六佛當出於世，若有菩薩樂見此如來者，應願生彼不動佛剎。舍利弗！若善男子善女人從此佛剎及餘佛剎於命終後，若已生、若今生、若當生不動如來佛剎中者，必不信住諸聲聞地。何以故？彼行佛道常遇如來，天魔波旬不得其便，於二乘地永斷相續，必定當得無上菩提，常在如來諸大集會。舍利弗！汝應當知，若住不動如來清淨佛剎者，彼諸眾生終不退墮，不可引攝亦不退還，住無上菩提，有大勢力不可搖動，永無退轉。舍利弗！若有善男子善女人於此世界或他世界，若命終後生於彼土，即於生時得如是念：『我已入如來室、住無畏城。』舍利弗！彼諸菩薩所有言議，皆與般若波羅蜜相應，互相遵敬起導師想。

「復次舍利弗！彼佛剎中諸菩薩眾，在家者少出家者多，皆以佛神力隨所聽聞，即能領悟受持諷誦。舍利弗！若在家菩薩摩訶薩雖不繫念，於法會中隨在方所若坐若立，以佛神力皆能聽聞，領悟受持讀誦通利。彼出家菩薩亦復如是，諸在異方乃至諷誦無別。是諸菩薩捨身受身，於所聞經終不忘失，於諸佛土隨願受生。舍利弗！彼亦是不動如來本願功德之所莊嚴。舍利弗！若菩薩於一生中欲見無量百千億那由他諸佛者，應當願生不動如來之所。若菩薩於彼生已，即見無量諸佛種諸善根，復能為無數百千眾生演說法要，令諸眾生增長善根。舍利弗，此賢劫中諸佛世尊當出於世，若諸菩薩以衣服飲食臥具醫藥種種資具供養如來，便即出家。既出家已，於諸佛所淨修梵行。以此善根，方餘菩薩於不動如來之所，於一生中與波羅蜜相應，所有福聚百分不及一、千分不及一，算分、迦羅分、數分、喻分、鄔波尼殺曇分亦不能及。舍利弗！此亦不動如來清淨佛剎功德莊嚴。舍利弗！若有菩薩從此世界或餘世界於壽終後，若已生、現生、當生不動如來佛剎者，一切皆得不退轉位。何以故？彼佛剎中天魔波旬不為障礙，亦無魔業之所嬈亂。舍利弗！譬如毒蛇，神呪所伏不能為害，一切諸蟲見彼毒蛇亦無憂懼。然此毒蛇雖無毒害，由本業故受此蛇身，故名毒蛇。舍利弗！彼魔波旬亦復如是，由不動如來往修菩薩行時本願善根如是迴向：『願我當證無上菩提，調伏諸魔不為障惱，彼諸菩薩、聲聞、凡夫乃至三千大千世界亦不為障惱。』然由先業所感受此魔身，生彼天中而自悔責，無始故業獲此身名，雖得自在常生厭患。於彼如來說法之時，諸魔眷屬常預聽聞聞已心淨，於聲聞眾而生愛樂：『云何當得住於寂靜少欲知足？』彼諸魔眾常起出家之心而無障礙之想故。彼國中聲聞菩薩及凡夫眾，皆由彼佛往昔精勤弘誓威力得安樂住。舍利弗！此亦不動佛剎殊勝莊嚴。」

時舍利弗白佛言：「世尊！若有善男子善女人，以七寶滿三千大千世界，持用布施願生彼國。由茲行願，此善男子善女人終不退墮聲聞、辟支佛地，從一佛剎至一佛剎，歷事供養諸佛如來，於諸佛所聽聞正法，雖未證得無上菩提，而能見彼無量百千乃至億那由他百千諸佛，於諸佛所種諸善根。世尊！若善男子善女人由此方便，以七寶滿三千大千世界持用布施，由茲善捨往生彼國。」

佛告舍利弗：「如是如是，彼善生善往，如是諸菩薩摩訶薩滿彼剎中。舍利弗！譬如金礦精加鑄鍊，除去砂礫唯有真金，造諸飾好嚴身之具。舍利弗！彼佛剎中菩薩摩訶薩，住於真實亦復如是。然彼菩薩摩訶薩清淨集會，汝今應知。

「復次舍利弗！彼佛剎中所有菩薩，若已生、若現生、若當生，如是菩薩皆行一行。所謂住如來行。舍利弗！云何如來行？所謂超過聲聞、辟支佛地。言行一行者是彼假名。是故舍利弗！若菩薩摩訶薩樂行一行者，應當願生彼佛剎土。舍利弗！我所授記得不退轉菩薩摩訶薩，此輩應生不動佛所。舍利弗！是諸菩薩生彼佛剎者，我不捨離。譬如剎利灌頂大王，有敵國來欲侵財位。王既聞已作是思惟：『我之妃后愛子不堪禦敵，及諸財寶收入宮城，不為怨敵之所侵害，王之國祚安靜無虞，威震強敵不憂災難。』舍利弗！我不捨離諸菩薩者亦復如是，如彼王之寶物愛子妃后，修菩薩行者應如是知。彼佛剎中無有畏懼猶如宮城，彼敵王者即魔波旬，於菩薩行人勤為障礙，如彼灌頂大王不被怨敵之所侵擾。如來亦復如是，不為天魔之所擾惱。舍利弗！譬如有人畏於債主遠適邊國，不為債主及於他人之所陵奪。何以故？由路遠險絕，債主家人不能達彼。彼諸菩薩生妙喜國者，波旬路絕亦復如是。舍利弗！此三千大千世界天魔波旬，常為菩薩聲聞作諸障礙。妙喜剎中諸天魔眾不為魔業，彼諸菩薩若已生、現生、當生，常無恐怖。何以故？由彼如來本行菩薩道時，所有善根如是迴向：『我證無上正等覺時，彼天魔眾不為障惱及作魔事。』舍利弗！譬如丈夫善服毒藥能使消化，方為食事無有諸毒。彼剎天魔亦復如是，常加利益不為損害。舍利弗，彼佛剎土成就如是無量功德。」

爾時舍利弗作是思惟：「我今欲見彼佛世界不動如來、應、正等覺及聲聞眾。」

爾時世尊知舍利弗心之所念，則以神力不起于座皆令得見。告舍利弗言：「汝今見不？」

答言：「已見。」

佛告舍利弗：「汝見彼諸天人微有勝劣殊異相不？」

答言：「不見。何以故？我見妙喜國人衣服飲食及諸珍玩，皆是諸天樂具。彼不動如來處眾說法，猶若金山光明赫奕，諸聲聞眾無量無邊。譬如有人遊於大海，中流四望涯際莫知，觀彼聲聞亦復如是。是諸聲聞隨所聽法，身心不動如入禪定，匪如此界入定之人時或搖動。世尊！若善男子善女人，以七寶滿三千大千世界持用布施，由茲善捨，彼諸菩薩善得往生妙喜世界。何以故？彼亦如是得不退轉。世尊！譬如王使遠適他國，執持符印經途來往，關防主司莫能為礙。何以故？以王印力人無遮止。彼諸菩薩摩訶薩亦復如是，或從此界若他世界壽命終後，於彼佛剎若已生、若現生、若當生，皆不退轉於阿耨多羅三藐三菩提，從一佛剎至一佛剎，常不遠離諸佛世尊，皆當速證無上菩提。」

時舍利弗復白佛言：「世尊！彼界所生菩薩摩訶薩，與此世界預流果人無有差別。何以故？如預流果人不墮惡趣，彼界菩薩若已生、現生、當生，亦皆斷諸惡趣及聲聞辟支佛地，乃至未證無上菩提，從一佛剎至一佛剎，不離諸佛及聲聞眾。」

佛告舍利弗：「如是如是。是諸菩薩摩訶薩受生彼國，不墮聲聞辟支佛地，及至未證無上菩提，從一佛土至一佛土，常得現前供養諸佛，及當證得佛菩提果。舍利弗！譬如預流果人，決定當得聲聞菩提，終不墮惡趣。是諸菩薩亦復如是，或從此世及以他世，命終之後受生彼剎，彼皆決定當證阿耨多羅三藐三菩提，從一佛剎至一佛剎，於諸佛所常不遠離阿耨多羅三藐三菩提。」

時舍利弗復白佛言：「世尊！於此世界所有一來向及一來果，乃至住阿羅漢向及羅漢果，與彼佛剎所生菩薩摩訶薩等無有異。」

佛告舍利弗：「汝勿作此言。何以故？於此佛剎菩薩摩訶薩佛授記者，與彼所生菩薩等無有異。復次舍利弗！於此世界坐道場菩薩，與彼所生菩薩等無有異。何以故？彼諸菩薩行如來行，不為天魔之所得便，於二乘地永斷相續，從一佛剎至一佛剎，常能供養一切如來，乃至證得無上正覺。」

爾時阿難作如是念：「我今應察長老須菩提辯才之力。」作是念已白須菩提言：「我等應觀不動如來及聲聞眾兼彼佛土。」

時須菩提告阿難言：「汝欲見彼如來者，今應且觀上方。」

爾時阿難觀上方已，白須菩提言：「我極觀上方，皆空寂靜。」

須菩提言：「彼不動如來諸聲聞眾及彼佛土，亦復如是，如見上方。」

爾時舍利弗白佛言：「世尊！如佛所說，此世獲記菩薩與彼所生菩薩等無有異。世尊！我今不知以何為等？」

佛告舍利弗：「以法界等故得無有異。」

${mvp.startInVol('涅槃功德品第五', 'p05', '菩薩眾品第四')}

爾時尊者舍利弗復作是念：「世尊已說不動如來、應、正等覺修菩薩道功德無邊，又說彼土及聲聞菩薩殊勝德業廣大莊嚴。復願世尊於茲開示彼佛滅度化迹如何。」

爾時世尊知舍利弗心之所念，告言：「舍利弗！不動如來般涅槃日，化身分布一切世界，於地獄中說諸妙法，以法調伏無量有情，皆當證得阿羅漢果，然此時獲果方滅度，前證無學人轉增其數。即於此日，授香象菩薩摩訶薩記云：『汝於我滅度後當得作佛，號曰金蓮如來、應、正等覺。』復次舍利弗！彼金蓮如來佛剎功德聲聞眾數，與不動如來等無有異。復次舍利弗！不動如來入般涅槃，是時大地普皆震動，一切三千大千世界震吼發聲，其聲上徹乃至阿迦尼吒天，諸天聞已即知彼佛入於涅槃。

「復次舍利弗！彼佛剎中所有叢林及諸藥草，皆悉傾向不動如來涅槃之處。是時天人悉以華鬘雜香及諸衣服而散佛上，所散香花周匝圍繞高一由旬。復次舍利弗！彼涅槃時，三千大千世界所有天、龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽等，皆向不動如來合掌作禮。他方諸天以佛神力，悉皆得見入般涅槃。是諸天人經七晝夜心懷悲惱，不受人天嬉戲娛樂亦無欲想，互相謂言：『不動如來為世光明作眾生眼，今取滅度一何速哉。』舍利弗！若菩薩摩訶薩從此世界或餘世界，於命終後生彼佛剎，若現生彼皆得授阿耨多羅三藐三菩提記，非可以百數而數，彼以千數及百千數。舍利弗！是百千菩薩摩訶薩數者，應知入如來數皆入佛數，皆入佛數入一切智性數。若有菩薩摩訶薩當生彼剎者，亦皆得入如來等數，舍利弗！除彼不退菩薩摩訶薩。所餘菩薩於此世界，若不聞稱讚不動如來功德法門者，皆為惡魔之所攝受。

「復次舍利弗！不動如來般涅槃後，乃至正法住世，彼佛剎中所生菩薩摩訶薩亦當入其數。所以者何？由彼如來本願力故。是諸菩薩若於後時受生彼者，應當讀誦百八法門，讀誦茲已方能受持彼一切法。不動如來之所安立一百八法門本性，我滅度後若有菩薩摩訶薩當生彼剎者，亦當讀誦一百八法門，及能受持一切法門。舍利弗！不動如來、應、正等覺善能攝受諸菩薩摩訶薩，佛雖滅度，其說法聲及莊嚴功德與佛在世等無有異。

「復次舍利弗！彼不動如來、應、正等覺從身出火而自闍維，舍利遺形皆作金色。譬如低彌羅樹隨分斷處皆有卍(音萬)字之文，如來舍利亦復如是。復次舍利弗！不動如來所有舍利分分周圓，表裏皆有吉祥之相(相表之文其狀如下)卍。舍利弗！譬如補羅迦樹，隨解之處中表皆有吉祥之文。彼佛舍利亦復如是。舍利弗！彼國眾生為供舍利起七寶塔，遍滿三千大千世界，又以金色千葉蓮華而為供養，其大千世界即以塔華而為嚴飾。

「復次舍利弗！若諸菩薩於不動佛國將滅度者，臨壽終時曾不失念，而見如是種種瑞相。或有菩薩見當生土，無有如來自方作佛，或見彼有佛當即奉事。或見菩薩入於母胎，或見菩薩被大甲冑，或見捨家趣於非家，或見坐於道場降伏魔軍，或見菩薩證一切智智，或見菩薩於某世界成等正覺轉於法輪。或有菩薩住虛空中，自身漸滅不遺少分。譬然濕草煙氣上騰，漸以消散至于滅盡。舍利弗！是諸菩薩既滅度已，一切天人備修供養。

「復次舍利弗！不動如來以大涅槃，般涅槃已正法住世經百千劫。」

時舍利弗白佛言：「世尊！不動如來正法所住，是何等劫？」

佛告舍利弗：「二十小劫以為一劫，彼住如是百千劫數。舍利弗！正法滅已，有大光明照十方界，地皆震動發大音聲。然彼非天魔之所能壞，亦非如來及聲聞眾而自沈隱。但由彼時人少有聽聞多無欲樂，能說法者皆悉遠之。既於正法寡聞轉增不信，不信增長則無精勤。知法比丘自當退靜，觀無樂欲不復弘宣，彼佛微言漸當隱沒。」

${mvp.startInVol('菩薩眾品第六', 'p06', '涅槃功德品第五')}

爾時尊者舍利弗白佛言：「世尊！菩薩摩訶薩以何因緣善根之力，於彼佛剎而得受生？」

佛告舍利弗：「若菩薩摩訶薩欲生妙喜世界者，應學不動如來往昔行菩薩行，發弘誓心願生其國，如是行願能作因緣生彼佛剎。

「復次舍利弗！菩薩摩訶薩行檀波羅蜜時，以此相應善根迴向無上菩提，願與不動如來共相會遇，舍利弗！以此因緣當生彼界。如是菩薩摩訶薩行尸波羅蜜，乃至般若波羅蜜亦復如是。

「復次舍利弗！不動如來光明普照三千大千佛之剎土，願於來世當見此光證無上覺，因見光已成大菩提，復以身光遍滿世界，舍利弗！菩薩以是因緣當生彼土。

「復次舍利弗！彼不動如來應正等覺諸聲聞眾無量無邊，願我當見，見已起如是行，證佛菩提。證菩提時，亦有如是無量無數諸聲聞眾。舍利弗！以是因緣故，菩薩摩訶薩於彼佛剎而得受生。

「復次舍利弗！彼佛剎中菩薩摩訶薩無量無邊，我當欲見此諸菩薩，行禪定行願當隨學，與諸菩薩處處結集，同學同乘同俱究竟。願當會遇欲求圓滿大慈悲者，欲求菩提及沙門者，捨離二乘心者，安住真實空性者，於佛如來一切智性及法僧名號念住相續者。舍利弗！若善男子善女人聞是色類菩薩名者，於彼佛剎當得受生；何況與般若波羅蜜相應善根，迴向不動如來應正等覺。舍利弗！以是因緣，是人於彼佛土決定當生。

「復次舍利弗！若菩薩摩訶薩願生彼佛剎者，於東方無量世界諸佛如來說微妙法及聲聞眾，應以其像隨念在前，願我當證菩提說微妙法，及聲聞眾皆如彼佛。舍利弗！是諸菩薩應修三種隨念善根，願與一切眾生平等共習，以此善根迴向阿耨多羅三藐三菩提。舍利弗！如是菩薩迴向善根無有限量。假使一切眾生各持一器量等虛空，作如是言：『丈夫！彼之善根分與於我。』舍利弗！此諸善根若有色相，給與眾生皆滿其器各各持去，而彼善根亦無窮盡。以迴向阿耨多羅三藐三菩提，無有限量不可移轉故。舍利弗！彼三隨念所成迴向一切種智，以此善根三寶隨轉。舍利弗！若有菩薩成此善根，應知不墮一切惡趣，而能摧伏波旬及諸魔眾，於彼彼佛剎隨樂受生。乃至南西北方四維上下亦復如是，皆得隨願受生。是故菩薩摩訶薩於此隨念善根應當積集，彼積集已應迴向不動如來，故於彼剎當得受生。

「復次舍利弗！不動如來佛剎功德廣大莊嚴，於無量佛剎中彼皆無有。是故菩薩摩訶薩應當發如是心，我以此善根願當見彼土，彼土莊嚴願當攝受，亦願當見彼諸菩薩。舍利弗！以此因緣，菩薩當生彼國。舍利弗！菩薩摩訶薩願生彼佛剎者，應發增上樂欲之心。舍利弗！若善男子善女人發增上心，我皆與記於彼佛剎而得受生。舍利弗！譬如有城，無有樓閣園林池沼，亦無象馬遊行之處。彼城之王雖有力安處，而城無樓閣諸功德故，則非莊嚴。舍利弗！我此佛剎亦復如是，無彼功德故則非嚴飾。舍利弗！我此剎中若有如是功德莊嚴，則如不動如來佛剎嚴勝。舍利弗！若菩薩摩訶薩願當攝受清淨佛剎者，應如不動如來往修菩薩行，植眾德本嚴淨佛剎已，及當如是攝取功德。

「復次舍利弗！如我今時得阿耨多羅三藐三菩提已，調伏無量眾生，於二乘道皆獲果證，及我聲聞所調伏者悉皆積聚，方彼如來諸聲聞眾，百分不及一、千分不及一，百千分、億百千分、數分、算分、喻分、鄔波尼殺曇分亦不及一。何以故？由數無量故；若言解脫則無有異。且止斯事。舍利弗！彼彌勒如來當出於世，諸聲聞眾及彼調伏所餘聲聞，以方不動如來聲聞之數，不及之分如上應知。舍利弗！由彼如來於一說法，善能調伏無量有情。然彼世尊之所攝受，無有能知其數量者。舍利弗！我之聲聞及彌勒如來諸聲聞眾，乃至賢劫諸佛世尊所有聲聞，及彼聲聞當所調伏餘聲聞眾，彼皆積聚比不動如來諸聲聞眾，百分不及一，乃至鄔波尼殺曇分亦不及一。何以故？其數多故；解脫無異故。」

時舍利弗白佛言：「世尊！如我解佛所說義者，應知彼阿羅漢剎非愚夫剎。何以故？彼佛剎中阿羅漢多故。」

佛告舍利弗：「如是如是，如汝所說，彼佛剎中多漏盡阿羅漢故。復次舍利弗！此三千大千世界星宿數量，不如彼佛聲聞眾多。由彼如來於一說法，無量有情得阿羅漢。舍利弗！此三千大千世界星宿猶有數量，彼一一會，無量有情得阿羅漢故，諸會聲聞無有數量。

「復次舍利弗！彼剎天人殖眾善本，餘界人天縱以天眼亦不能見。舍利弗！假令餘界諸天及人，往彼剎中善男子善女人所，盡其天眼亦不得見。若人聞此功德稱揚法門，聞已受持讀誦通利，彼善男子等皆於不動如來往昔行菩薩行時皆已見聞，是故聞此法門即得信心清淨。舍利弗！東方一切世界諸剎土中，若菩薩乘人或聲聞乘人，於此法門讀誦通利者，其數甚多。彼諸菩薩及聲聞人，由願力故於不動剎中，若已生、現生、當生，唯除不退菩薩，由彼菩薩於諸剎中當得阿耨多羅三藐三菩提故。南西北方四維上下亦復如是。舍利弗！彼不動如來於妙喜世界及他方剎土，在菩薩等乘中而為上首。舍利弗！若有善男子善女人聞不動如來功德法門，善能受持讀誦通利，願生彼剎者，乃至命終，不動如來常為護念，不使諸魔及魔眷屬退轉其心。舍利弗！應知是善男子或善女人乃至無上菩提，無有退轉之怖，亦無水火刀杖惡獸毒蟲之所損害，亦不為人非人等之所怖畏。何以故？由不動如來常加護念，於彼佛剎當受生故。

「舍利弗！譬如日輪雖復遙遠，與閻浮提眾生而作光明。不動如來亦復如是，雖在遙遠，能與他界諸菩薩眾而作光明。舍利弗！譬如比丘有天眼者，能見遠方諸善惡色。不動如來雖在彼剎，餘世界中諸菩薩眾所有形類等色皆悉能見。舍利弗！又如比丘得心自在，獲彼神通波羅蜜者，雖在遙遠了知一切有情之心。不動如來亦復如是，能知餘界諸菩薩心。舍利弗！譬如比丘證得天耳，身雖在遠能聞諸聲。不動如來亦復如是，餘世界中所住眾生作如是言：『我於彼剎願當生者。』彼佛皆聞。舍利弗！如是色類善男子善女人所有姓名，不動如來皆悉了知。若有受持讀誦通利此功德法門者，此諸人等皆為不動如來之所知見及已護念。」

時舍利弗白佛言：「希有世尊！乃至彼佛世尊護念彼諸菩薩摩訶薩。」如是白已。

佛告舍利弗：「如是如是，如汝所言。彼菩薩摩訶薩如來之所護念。何以故？由護念菩薩故，一切眾生皆得護念。舍利弗！譬如剎利灌頂大王多有倉廩盈儲穀豆，嚴誡主司善令監守。何以故？於饑饉世當濟群生。舍利弗！是諸菩薩於彼如來滅度之後，當證無上正等菩提，能於正法饑饉之時作大豐稔。如來亦復如是，善能覆護此諸菩薩。舍利弗！於此世界有諸菩薩，當聞不動如來功德法門，能善受持讀誦通利，於彼佛剎願欲受生，應知此人得不退轉。舍利弗！若餘菩薩於此法門，善能受持讀誦通利，為無量無數百千眾生開示演說，亦令諸有情如是殖眾善本，使當親近無上菩提。舍利弗！若菩薩願速證無上菩提者，應當受持讀誦通利如是法門，為諸眾生開示演說。何以故？菩薩摩訶薩應如是演說此功德門大智慧業，當如是如是發起積集。彼諸人等由發起積集故，於其現身諸漏當盡。舍利子！是故聲聞乘者若聞彼法門，應當受持讀誦通利，廣為眾生開示演說。何以故？此善男子善女人由受持如是正法，於其現身當證無學。舍利弗！若有淨信男子女人於此功德稱讚法門，應當為他時時演說。彼諸人等不越兩生，當於現身得盡諸漏。

「復次舍利弗！此不動如來所有功德稱讚法門，非愚淺者之所能受，其有智慧深廣方能受持。舍利弗！彼善男子善女人當見諸佛，於此功德稱讚法門必當身得。舍利弗！譬若無價寶珠從海持來。於意云何？此無價寶何人先得？」

舍利弗白佛言：「世尊！有諸國王、王子、大臣，此人先得。」

佛告舍利弗：「彼佛功德法門亦復如是，菩薩先得。是諸菩薩當不退轉，若聞此法必能受持讀誦通利，為無上菩提於真如性當勤修學。」

舍利弗白佛言：「世尊！若諸菩薩欲住不退地者，聞此稱讚法門，應當受持讀誦通利。何以故？菩薩摩訶薩住此法門，於法性中當不退轉。」

佛告舍利弗：「假使有人終以金寶滿閻浮提持用布施，冀聞此法終亦不聞。何以故？此功德法非薄福眾生當執持故。復次舍利弗！若聲聞乘人聞此功德法門受持讀誦，為無上菩提及真如相應故精勤修習，彼於後身當得成就，或於二生補處、或復三生，終不超過，當成正覺。彼若聞此稱讚法門讀誦通利，復為無量百千眾生開示演說。舍利弗！如轉輪王以先業感七寶見前。不動如來亦復如是，以本願力，我今說此功德法門。舍利弗！若諸菩薩摩訶薩於此稱讚法門，若已聞若當聞者，彼皆由不動如來往昔行菩薩行時慈悲願力，或當於賢劫中諸佛世尊之所預聞開示此之法門，如我於今演說開示，不增不減名數若干。舍利弗！是故菩薩摩訶薩欲速證無上菩提者，於此功德稱讚法門，應當受持讀誦通利為他廣說。

「復次舍利弗！若善男子善女人為求此法門故，於彼村落城邑，聽聞受持讀誦通利。雖出家菩薩居白衣家，我說無過，亦隨聽住。何以故？彼善男子善女人於命終後，欲令此法當不隱沒。舍利弗！若彼村邑在於遙遠，是諸菩薩亦當應往，及住彼中，受持讀誦開示演說。舍利弗！彼善男子善女人於已流布稱讚法門，或於他人有是經卷，應可詣彼而書寫之。彼人若有願求，汝當斷食，或使經行若坐若立等，應曲隨教命書寫是經。若於彼村求不能得，應詣隣境書寫，受持讀誦通利，復為他人開示演說。若往餘方勤求不獲，彼人應發如是誓心：『我於無上菩提不應生於退轉之相。由我已聞不動如來法門名號，是人於我欲為利益令我聽聞。』舍利弗！如是稱讚法門，有能演說及預聞者，皆由如來威神之力。」

時舍利弗白佛言：「世尊！如來滅後，由誰威力而當得聞？」

「舍利弗！我滅度後，由不動如來威神之力當復得聞。或由四大天王、釋提桓因等當勤加護，令諸法師宣揚此法。及彼菩薩本業成熟，四天王等威加策進，令諸菩薩而得聽聞。」

舍利弗白佛言：「世尊！如此法門能成就廣大功德。」

佛告舍利弗：「如是如是，如汝所言。舍利弗！若於國中雨雹為災，非時霹靂及餘種種可怖之事。彼善男子善女人等，應當專念不動如來及稱名號，是諸災害皆得消除。由彼如來往昔弘濟百千諸龍解脫眾苦，又由慈悲本願誠諦不虛，迴向善根要期圓滿故，稱彼名號憂患自消；唯除有情宿業成熟。」

舍利弗白佛言：「世尊！是諸菩薩現身欲證無上菩提者，應如不動如來往修願行。」

佛告舍利弗：「如是如是，如汝所言。舍利弗！少有菩薩摩訶薩已能如是具修淨剎及當淨修如不動如來者，舍利弗！彼諸菩薩皆當證得阿耨多羅三藐三菩提，而於佛性及一切智、攝受佛國悉皆同等。菩薩聲聞非無優劣，而於解脫則無有異。」

爾時欲界諸天及梵眾天等，皆向彼如來合掌頂禮而三唱言：「南無不動如來、應、正等覺甚為希有。」又歸命此界釋迦牟尼如來、應、正等覺，善能說彼稱讚法門。爾時欲界諸天以曼陀羅花及諸天香以散佛上，所散香華於虛空中合而成蓋；復以諸天花香遙散彼佛以為供養。時天帝釋作如是念：「我此四眾及欲界諸天，皆欲見彼不動如來、應、正等覺。」

爾時世尊知彼釋天心之所念，結加趺坐安處虛空。是諸大眾以佛神力亦住空中，皆遙見彼妙喜世界不動如來及聲聞眾。眾皆見已，右膝著地向不動如來、應、正等覺。爾時此界眾人皆作是念：「豈非三十三天為見彼佛而來集會禮拜供養？」

是時帝釋作如是念：「彼界諸天以人相而住，我見彼諸人等服玩資具與彼諸天無少優劣。」

爾時世尊攝神通已，告天帝言：「彼諸人民皆受天樂，汝應愛樂。是諸人等見彼如來及愛樂彼受天資具者，彼諸眾生從餘世界命終以後，皆得往生不動佛剎。」

爾時舍利弗告帝釋言：「汝見釋迦牟尼佛及不動如來，由此緣故，汝於此身得大善利，況汝已得過人之法。」

時天帝釋作如是念：「彼諸眾生聞此法門亦得善利，何況得生不動佛剎。」

爾時佛告天帝釋言：「彼菩薩乘人當生彼佛剎者亦得善利。何以故？彼諸菩薩皆應得住不退轉故。若餘菩薩於其現身願生彼佛國者，應知皆是住不退轉。」

佛說此法門時，五百比丘於無漏法心得解脫；五千菩薩、六千比丘尼、八千優婆塞、十千優婆夷及欲界中無量天子，於彼佛剎皆願受生。如來是時皆與授記，於彼佛剎當獲往生。若餘有情當願生者，如來亦當與記生彼佛剎。是時三千大千世界六種震動，所謂動、遍動、等遍動，搖、遍搖、等遍搖，震、遍震、等遍震，由此法門所加持故。

佛說此經已，舍利弗等，及諸世間天、人、阿修羅、乾闥婆、迦樓羅、緊那羅、摩睺羅伽，聞佛所說，皆大歡喜，信受奉行。
