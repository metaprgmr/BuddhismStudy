如是我聞：

一時婆伽婆住王舍城耆闍崛山內，與大比丘眾六萬二千人俱，皆是大德具足神通，諸大聲聞而為上首。

爾時復有四萬二千菩薩摩訶薩，其名曰：文殊師利菩薩、師子幢菩薩、彌勒菩薩、觀世音菩薩、大勢至菩薩、大辯聚王菩薩、陀羅尼自在王菩薩、善丈夫菩薩、須彌頂菩薩、須彌幢菩薩、不可動菩薩、善思義菩薩、善思義意菩薩、善思惟菩薩、思心菩薩、勇意菩薩、善思菩薩、寶髻菩薩、山相擊王菩薩、寶手菩薩、寶意菩薩、寶印手菩薩、常舉手菩薩、常下手菩薩、常精進菩薩、度眾生菩薩、上精進菩薩、如言行菩薩、上願菩薩、燈手菩薩、心平等菩薩、除惡道菩薩、除諸憂暗菩薩、不捨重擔菩薩、日藏菩薩、月藏菩薩、金剛步菩薩、無邊步菩薩、無量步菩薩、不動行步菩薩、虛空藏菩薩、勝意菩薩、益意菩薩、增上意菩薩、成行菩薩、持地菩薩、月光菩薩、月幢菩薩、光德菩薩、明照菩薩、勇步菩薩、師子奮迅吼音菩薩、無礙辯菩薩、相應辯菩薩、捷疾辯菩薩、最勝菩薩、翳日月光菩薩、無攀緣菩薩、無著意菩薩、常笑菩薩、喜根菩薩、除諸障蓋菩薩、轉女身菩薩、摩尼珠菩薩、燈明菩薩、毘盧遮那菩薩、火焰菩薩、眾勝王菩薩、深說者菩薩，如是等菩薩摩訶薩而為上首。

爾時復有四天大王、忉利天王、娑婆世界主大梵天王，如是等而為上首，與六萬諸天眾俱。復有善住意天子、善德天子、大自在天子，如是等而為上首，與三萬諸天眾俱，於菩薩道皆已久住。復有二萬阿修羅王，羅睺阿修羅王、須彌阿修羅王，如是等而為上首，亦皆已住於菩薩道。復有六萬諸大龍王，阿那婆達多龍王、勝月龍王，如是等而為上首，亦皆已住於菩薩道。并餘無量天、龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽億百千眾，乃至一切比丘、比丘尼、優婆塞、優婆夷，無量大眾皆來集會。

爾時世尊以如是等無量百千大眾圍遶於說法時，文殊師利菩薩摩訶薩即於己室入彼無諍除心三昧寂然不動。於是文殊師利一心安詳從三昧起，應時十方無量無邊諸佛世界六種振動。時文殊師利起三昧已，作如是念：「彼無量無邊諸世界中，乃有一佛、如來、應供、正遍覺出興於世，如優曇花希復現耳。如是諸如來、應供、正遍覺，世間希有出現甚難，所可說法盡諸有生寂滅涅槃，不可思量無有分別，甚深無譬難解難知。然以諸佛不出世故不可得聞，以不聞故諸眾生苦難可窮盡。我今應當詣於如來、正遍覺所諮問是義，問斯義故令諸眾生成就善根，亦令一切行菩薩者於彼甚深不可思議諸佛法中無復疑惑，皆得成滿佛菩提事。然此娑婆世界諸眾生等，多有貪欲、具足瞋恚、成就愚癡，斷除白法、頑鈍誑詐，無有慚愧、我慢貢高，遠離諸佛違背法僧，令彼眾生得聞如是甚深妙法獲淨智眼。」

爾時文殊師利復作是念：「我今應當大集十方諸菩薩眾，令皆得聞如來所說是妙法門，證深法忍。」爾時文殊師利如是念已，即入普光無垢莊嚴三昧。入此三昧已，放大光明照於東方如恒河沙等諸佛世界，普皆柔和潤澤清淨，明朗無垢微妙難稱。而此光明遍照南西北方四維上下十方世界，其間所有一切暗冥幽隱之處，山崖樹林大小諸山，目真隣陀山、摩訶目真隣陀山、鐵圍山、大鐵圍山，及餘黑山，須彌山、大須彌山，如是一切光明朗徹無有障礙。

爾時十方恒河沙世界所有諸佛現說法者，彼諸弟子各請其佛言：「世尊！何因緣故乃有如是大瑞光明現於世間？世尊！我從昔來初未聞見如是光明、如是清淨、如是微妙。世尊！此何光明？而令我等大喜遍身心得清淨，亦令眾生無復貪欲瞋恚愚癡，煩惱眾惡一切不行。世尊！今此光明誰之所作？誰所加持而來現此？」

彼諸侍者如是請已，彼諸世尊默然無報。當爾之時，十方世界一切所有諸種音聲，所謂若天聲、若龍聲、若夜叉聲、若乾闥婆聲、若阿修羅聲、若迦樓羅聲、若緊那羅聲、若摩睺羅伽聲、若人聲、若非人聲、若象馬聲、若諸獸聲，如是等聲咸皆止息。若風聲、若火聲、若水聲、若大海波聲、若音樂聲、若歌讚聲，當爾之時如是諸聲以佛力故，亦皆止息一切寂然。

時彼十方諸佛侍者復請彼佛言：「世尊！惟願大慈，憐愍一切諸天人故、安樂一切諸天人故、利益一切諸天人故，為我宣說如是光明所從來處，而能普照諸佛國土？」

爾時十方諸佛即以十方恒河沙數世界所有一切諸如來聲，悉同梵音，如一如來口業所說，其所說事亦無差殊，用是妙聲各皆報告己之侍者。當彼諸佛出聲告時，一切佛剎悉皆振動，百千樂音一時皆作，乃至一切天人阿修羅所有音樂不鼓自鳴。又彼樂音眾聲之中出諸法音，所謂無常聲、苦聲、無我聲、空聲、無相聲、無願聲、離欲聲、解脫聲、法界聲、如如聲、實際聲、檀波羅蜜聲、尸波羅蜜聲、羼提波羅蜜聲、毘梨耶波羅蜜聲、禪波羅蜜聲、般若波羅蜜聲、大慈聲、大悲聲、大喜聲、大捨聲、和合聲、利益聲、出離聲，出如是等種種百千諸法之聲。又彼種種諸聲出時，無量阿僧祇億那由他百千眾生，皆得住於不退轉阿耨多羅三藐三菩提。復有成就辟支佛者、成聲聞者，乃至得成大梵天王、天帝釋、轉輪王等。

爾時十方諸佛世尊咸各告其侍者弟子言：「諸善男子！汝今不應請問是事。何以故？此光明因緣，一切聲聞辟支佛等非其境界。我若說者，乃至世間天、人、阿修羅皆即迷沒，是故不應請問斯事。諸佛如來若說如是光明因緣，乃是能生成就不可思議諸勝善根，亦緣如是不思議諸勝善根而得出生，所謂布施、持戒、忍辱、精進、禪定、智慧諸度等行。如是諸行即是光明之所出生，亦為光明之所成就。是故我等諸佛如來，若於一劫若減一劫，讚說如是光明功德終不能盡。又以如是慈悲喜捨諸善根力共相熏修，令此光明能生歡喜。」

時彼十方諸佛侍者，各自殷勤再三啟請白言：「惟願世尊！憐愍一切諸天人故、安樂一切諸天人故、利益一切諸天人故、成熟菩薩諸善根故，為我等說光明因緣。」

彼諸菩薩如是請已，於是十方諸佛世尊復各告其侍者弟子言：「諸善男子！汝宜諦聽，吾為汝說。」

諸侍者言：「唯然世尊！願樂聽聞。」

爾時彼佛各各告其侍者言：「善男子！有世界名曰娑婆，其土有佛，號釋迦牟尼如來、應供、正遍覺、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、世尊，出五濁世。彼土眾生多有貪欲瞋恚愚癡，眾惱所迫。彼諸眾生無有恭敬，不識慚恥都無羞愧，所為行業多諸不善。能於如是濁惡世中，成就阿耨多羅三藐三菩提，然今現在處眾說法。善男子！彼世界中釋迦如來有一大弟子菩薩摩訶薩名文殊師利，有大功德，具足智慧精進勇猛，有大威神，能令菩薩咸得歡喜故、能令菩薩具足修行故、令諸菩薩增長威力故、令諸菩薩發勤勇猛故、能善分別一切法句故、能達無礙智慧彼岸故、能具足得無礙辯才故，又於諸陀羅尼得自在故、已具成滿一切菩薩不思議功德故，令彼菩薩將欲請問釋迦牟尼如來、應供、正遍覺甚深法門，為諸菩薩善根成就故、為行菩薩乘人得滿足彼不思議諸佛法故。善男子！又彼文殊師利放斯光明，欲令十方世界無量阿僧祇諸菩薩眾大集故、令彼諸菩薩得勝法故。以是因緣，彼文殊師利放大光明照諸佛土。」

爾時十方世界諸佛侍者復各請問彼諸佛言：「世尊！彼文殊師利住何三昧放此光明？」

爾時十方諸佛咸各告其侍者弟子言：「諸善男子！彼文殊師利入普明無垢莊嚴三昧故，放斯光明。」

侍者菩薩復白諸佛言：「世尊！我初未見如是光明、如是清淨、如是能令身心歡喜。」

諸佛復告諸菩薩曰：「彼將不欲教諸菩薩起修行耶？彼將不欲大集諸菩薩眾耶？彼將不欲集諸菩薩宣說如斯妙經典耶？」

爾時十方無量不可思議恒河沙等諸佛世界，一一世界中有無量阿僧祇諸菩薩眾，各自詣彼諸世尊所，頂禮佛足。禮已即復請白彼諸佛言：「世尊！誰有是光？誰有斯德？我等昔來未曾見聞，忽現是光照諸世界。」

時彼諸佛復告彼諸菩薩眾曰：「諸善男子！彼有世界名曰娑婆，其佛號釋迦牟尼如來、應供、正遍覺，今現說法。彼有菩薩名文殊師利，具大威德，其為大集一切菩薩摩訶薩眾故，放斯光明。」

時彼諸菩薩復白彼諸佛言：「世尊！我等今者願詣娑婆世界，意欲奉見釋迦如來，禮拜恭敬故、供養承事故、請問義理故，并欲見彼文殊師利及餘菩薩摩訶薩故。」

彼諸世尊即便告彼諸菩薩言：「諸善男子！欲往隨意。汝應知時。」

爾時十方無量阿僧祇不思議不可計不可稱不可量億那由他百千頻婆羅菩薩摩訶薩各禮佛足已，猶如壯士屈伸臂頃，各於彼世界沒，而來現此娑婆國土。是時十方諸來菩薩摩訶薩眾，皆詣世尊釋迦如來、應供、正遍覺所。其間或有能雨眾香，所謂塗香末香及以香鬘，來詣世尊釋迦如來、應供、正遍覺所。或有菩薩雨諸妙花，所謂優鉢羅花、鉢頭摩花、拘物頭花、分陀利花、瞻波迦花、波吒利花、陀奴迦利花、阿他目多迦花、蘇摩那花、婆利師迦花、曼陀羅花、摩訶曼陀羅花、波盧沙花、摩訶波盧沙花、旃陀羅花、摩訶旃陀羅花、微妙旃陀羅花、斫迦羅花、摩訶斫迦羅花、最妙斫迦羅花，雨如是等種種花鬘，來詣世尊釋迦如來、應供、正遍覺所。或有菩薩摩訶薩能出百千上妙諸音，來詣世尊釋迦如來、應供、正遍覺所。復有菩薩摩訶薩能以一音遍滿三千大千世界歌讚佛德，來詣世尊釋迦如來、應供、正遍覺所。以如是等種種莊嚴，咸詣世尊釋迦如來、應供、正遍覺所。

時彼十方諸來菩薩摩訶薩眾大集於此娑婆世界，而此三千大千世界所有眾生，地獄、畜生、餓鬼、若閻魔界，悉皆寂然身心安樂，無有貪欲瞋恚愚癡，遠離眾毒嫉妬諂誑我慢熱惱，一切眾生皆起慈心具足歡喜。何以故？以彼十方諸大菩薩威神力故，其事若是。

爾時十方無量百千億那由他諸大菩薩摩訶薩等，咸集世尊釋迦如來、應供、正遍覺所。到佛所已，頭面禮敬右遶三匝，住於虛空，即入菩薩隱身三昧。入三昧已，隨意所生無量百千種種妙色大蓮花座，結加而坐，悉皆隱身令不復現。

爾時尊者摩訶迦葉見彼殊特希有瑞相大神通事，復見彼眾大雨花香，亦見彼作無量樂音，又復見彼放大光明，又亦見此三千世界諸四天下皆雨妙花積至于膝，又復見彼一切大眾天、龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽、人及非人，乃至所有比丘、比丘尼、優婆塞、優婆夷等，一切皆悉具足成就金色相身。於是尊者摩訶迦葉從座而起正持威儀，偏袒右臂右膝著地，合掌恭敬，以偈讚曰：

/gatha/
「歡喜常與一切樂，　圓滿無垢清淨顏，　十力雄猛諸大人，　具足金剛百福相。
　遊於三界人天間，　一切無能如佛者，　不可思議難測度，　惟願除斷我疑心。
　過那由他百千劫，　常行布施攝世間，　遠離執著無所依，　淨持禁戒無倫比。
　具足修忍超世間，　一切力中十力最，　功德備滿無過者，　唯願永絕我疑心。
　過百千劫修眾行，　以見眾生受諸苦，　勇猛精進終無疲，　常生歡喜無有量。
　頭目髓腦持與人，　棄捨男女及妻妾，　厭離國城及眾具，　唯願除解我疑網。
　世尊往昔行施時，　象馬輦輿不可數，　過那由他上衣服，　常以歡喜惠世間。
　世尊常以先心施，　如是雜物及眾珍，　飲食湯藥并田宅，　是故今日我諮問。
　往昔割身及耳鼻，　內心無垢不生瞋，　若他詰問如法言，　猶能巧說忍辱力。
　以能通達深空法，　心意微妙難稱量，　能施他樂功德人，　是故今我問無垢。
　諸漏久盡患悉除，　深見眾生沒諸苦，　黑暗所覆愚癡者，　生於垢濁及我人。
　憐愍諸有起慈心，　過百千劫勤修行，　開發正覺菩提岸，　唯願除斷我今疑。
　善能出入神通門，　隱顯自在巧行住，　證得無我破我相，　毀壞諸法亦非空。
　佛於世中無染著，　真實正行及正思，　微妙寂滅離諸垢，　唯願為我決此疑。
　世尊昔日修行時，　施戒忍進無暫廢，　禪定智慧亦常修，　利益群生無有比。
　諸功德聚難思量，　深大如海無窮盡，　善能往來亦善住，　唯願為我作歸依。
　往昔無垢修大慈，　怖鴿歸投救不捨，　剜身割股血滂流，　稱肉與鷹而代之。
　全身上秤謂敵彼，　而鴿尚重身猶輕，　大明善巧以行慈，　唯願為我決疑惑。
　須彌動搖眾星落，　諸天宮殿盡破亡，　四大海水一朝枯，　阿修羅宮處天上。
　假使日輪墜於地，　明月處空忽暝冥，　諸佛正覺兩足尊，　所言真誠無有二。」
//

爾時尊者摩訶迦葉說偈讚已，復白佛言：「大德世尊！何因緣故世間有是微妙光明？復何因緣忽現如是未曾有瑞眾相明了？」

爾時世尊告大迦葉言：「迦葉！汝今不應諮問是事。何以故？如是境界非諸聲聞緣覺所知，若我說是光明義者，一切世間天、人、阿修羅皆當驚疑入迷沒處，是故汝今不應問也。」

時大迦葉復白佛言：「世尊！唯願大慈，憐愍一切諸天人故、利益一切諸天人故、安樂一切諸天人故，說此光明甚深因緣，令我開解。」

爾時世尊告迦葉言：「汝宜諦聽，善思念之，吾為汝說。」

大迦葉言：「善哉世尊！願樂欲聞，唯垂敷演。」

時佛復告大迦葉言：「迦葉！今我文殊師利入彼普明無垢莊嚴三昧，三昧力故放斯光明，遍照十方過恒沙等諸佛國土，為大集彼無量無邊不可數不可量阿僧祇諸大菩薩摩訶薩等而來至此娑婆世界。彼等皆已頂禮我足，右遶三匝，處在虛空高一多羅樹，皆各於彼大蓮花座結加而坐。」

爾時尊者大迦葉復白佛言：「世尊！今有何等菩薩摩訶薩威神德力而雨如是微妙花香，復出如是百千音樂不鼓自鳴？」

佛告大迦葉言：「迦葉！是為十方諸菩薩等威神力故而雨如是勝妙花香，乃至於上虛空之中無量樂音皆自鳴也。」

迦葉復言：「世尊！我於是中乃至不見彼一菩薩，云何世尊更言十方諸菩薩等？」

「迦葉！一切聲聞辟支佛等終不能見彼諸菩薩摩訶薩眾。何以故？迦葉！是中聲聞辟支佛等，於大慈悲非其所住故。若能住是慈悲地中，斯則能為利益他事，則亦能行布施、持戒、忍辱、精進、禪定、智慧諸波羅蜜等。若已受正位，終不能行此諸菩薩所行之處。迦葉！斯諸菩薩摩訶薩等一切皆入隱身三昧，是故一切聲聞辟支佛不能見彼諸菩薩等，唯除諸佛及大菩薩住斯地者乃能見耳。迦葉！初住大乘諸菩薩等尚不能見，何況一切聲聞辟支佛而能得見？若得見者無有是處。」

爾時大迦葉復白佛言：「世尊！菩薩摩訶薩具足幾法、修何善根、獲何功德而能入是隱身三昧？」

佛言：「迦葉！菩薩摩訶薩成就十法，即能獲是隱身三昧。何等為十？一者志性和柔深住正信；二者恒不捨離一切眾生；三者畢竟成滿大慈悲心；四者覺了一切不著眾相；五者雖復思求一切佛法終不妄取；六者亦不思想一切聲聞辟支佛智；七者世間所有盡皆能捨，乃至身命尚無悋惜，豈況餘物而不施者；八者雖行無量生死煩惱，而不染著諸有為行；九者常修無量布施、持戒、忍辱、精進、禪定、智慧，而不分別諸波羅蜜；十者常生是心，我當安立一切眾生於菩提已，然後方當坐佛樹下，不取菩提及眾生相。迦葉！是為菩薩摩訶薩具足十法，便能獲得隱身三昧。」

爾時尊者大迦葉復白佛言：「希有世尊！快說斯事。世尊乃能作如是說。世尊！一切聲聞辟支佛尚皆未曾一發是心，我當安置一切眾生於阿羅漢地，況佛法乎？」

佛言：「迦葉！如是如是。是故一切聲聞辟支佛，悉無能入菩薩所行隱身三昧。此三昧名尚自不知，云何能入？若能入者無有是處。」

爾時尊者大迦葉復白佛言：「世尊！我等今者深願見彼諸大菩薩摩訶薩等。所以者何？斯諸大士難可會遇。」

佛言：「迦葉！汝宜且住。當須待我文殊來者，彼諸菩薩當從定出，汝等然後乃見之耳。雖然，迦葉！汝亦得是無量百千諸三昧門，今當攝心求彼菩薩摩訶薩等為在何處？住何威儀？作何事業？」

時大迦葉蒙聖教已，承佛威神及己通力，即入二萬諸三昧門，如是思求彼諸菩薩今在何所？住何威儀？為行步耶？而竟不見為住立耶，而亦不見為倚臥耶，而亦不見為端坐耶，而亦不見乃至不知以何語言作何事業、來何所從去何所至。於是起定，前白佛言：「甚奇世尊！甚奇世尊！我已經歷二萬定門，求諸菩薩竟無所見。世尊！彼諸菩薩摩訶薩等尚未證知薩婆若處，已得如是微妙三昧，何況當證無上菩提。世尊！諸善男子善女人其有見聞如斯神變，而不疾發阿耨多羅三藐三菩提心者，無有是處。世尊！能得如是隱身三昧菩薩摩訶薩，為欲度彼一切眾生被精進鎧，然終不得離是妙定。」

佛告迦葉：「如是如是，如汝所說。是中一切聲聞辟支佛尚非境界，況餘眾生。」

爾時尊者舍利弗作如是念：「世尊稱我聲聞人中智慧第一，我今寧可求諸菩薩今在何所？住何威儀？作何事業？若得覩見不亦善乎。」時舍利弗如是念已，承佛威神及自力故，即入三萬諸三昧門，周旋觀察彼諸菩薩今為何所、住何威儀，乃至不知如毫釐相。

爾時尊者須菩提作如是念：「我今亦當求諸菩薩為何所在？住何威儀？造作何事？若覩見者不亦善乎。」時須菩提作是念已，承佛威神及自力故，即入四萬諸三昧門，周遍推求彼諸菩薩為何所在、住何威儀，乃至不見行住坐臥、從何所來去何所至。然後出定前至佛所，頭面禮足，白言：「世尊！世尊記我聲聞人中無諍三昧最為第一，是三昧門我亦已得。如是世尊！我若入定，正使有人具大神力，能以百億四天下為一大鼓，取須彌山為一大槌，於我定時令一大人住在我前，執彼大槌撾擊大鼓，無暫休廢乃至經劫，如是鼓聲尚不入耳，何況亂心能令我出。若彼鼓聲能為定患牽我起者，永無是處。世尊！我今所得無諍三昧，弘普若是。我向經歷四萬三昧，周遍推求彼諸菩薩終不能見，乃至不覩一人暫時往來之相。如是世尊！有諸菩薩摩訶薩輩念求如是不思議智，為一一眾生於恒河沙劫生地獄中備受眾苦。世尊！彼求菩薩道故，雖經眾苦而不捨離如是甚深不思議智。如是世尊！若我今日漏心未盡、未得解脫、於諸佛法有所未知者，令我當來常在生死，更不捨離彼不思議大妙乘也。」

於是世尊讚須菩提言：「善哉善哉，誠如汝言。汝以信故作如斯說。令汝此身不取涅槃者，以斯善根於當來世過恒沙劫，汝當得作轉輪聖王正法治世，然後乃成阿耨多羅三藐三菩提。又須菩提！今此三千大千世界眾生數類寧為多不？」

須菩提言：「甚多。世尊！甚多。世尊！」

佛言：「如是如是。須菩提！是諸世界所有眾生，成就智慧如舍利弗、解空第一如須菩提、苦行超倫如大迦葉，即令如是諸大聲聞共盡知見求彼菩薩，若於一劫、若於百劫、若於千劫，乃至無量恒河沙劫，亦不能見。若能見者，無有是處。何以故？須菩提！彼諸菩薩凡所為作，非是一切聲聞辟支佛所行境界，是故二乘終不能見。」

說此法時，是眾會中八萬四千天人皆發阿耨多羅三藐三菩提心，三千世界六種震動。

爾時文殊師利於己住室如是思惟：「今此十方億百千數諸大菩薩皆已集會。吾當復召諸天大眾咸令雲集。如是可乎？」時文殊師利既思惟已，即以神力如意化成八萬四千億那由他妙寶蓮花，大如車輪，純金為莖、白銀為葉，勝藏羅網毘瑠璃寶。是諸花中皆有化佛及諸菩薩，結加趺坐蓮花臺上，身紫金色，三十二相八十種好，威德巍巍光明普照。時彼蓮花上昇四天王天、三十三天、夜摩天、兜率天、化樂天、他化自在天，及諸梵天乃至有頂。如是略說，遍此三千大千世界，乃至百億須彌、百億四天下、欲界天宮、色界天宮，彼化蓮花無不遍至。是諸化處及菩薩眾，出大音聲遍告三千大千世界，而說偈言：

/gatha/
「世尊明慧日，　希有出世間，　譬如憂曇花，　難遇復過是。
　釋師子人雄，　今者現於世，　班宣深妙法，　永拔眾苦源。
　諸天雖快樂，　誰能保長久？　任業還三塗，　復受眾苦毒。
　所習諸欲事，　貪愛獨增長，　三界本無樂，　而愚耽著之。
　已獲最上難，　所謂諸佛出，　愚癡放逸人，　焉覺苦不斷？
　汝等當速求，　見佛聞正法，　若聖涅槃已，　雖悔難可追。
　魔網深可怖，　汝等為放逸，　既被羈羅已，　寧有解脫期？
　獨有求佛法，　汝為眾生資，　汝等但速求，　三十二妙相。
　佛能救世間，　餘無可依者，　世雄甚希有，　大慈難思量。
　無量億數劫，　所行不可量，　集功德智慧，　成就釋師子，
　闡揚微妙法，　甚深難覺知。　何處有眾生，　及我人壽命？
　如是破常見，　斷已自無餘，　放捨一切相，　為眾生說此。
　宣明真實際，　世間絕心行，　唯彼空無相，　無願亦無作。
　虛空本無形，　不起亦不滅，　無來亦無去，　智者之所說。
　無盡無所生，　本淨無所有，　無相貌可見，　無思想能說。
　眾生本無生，　云何得言死？　寂滅無眾生，　眾生在何處？
　言音為說法，　法不住言音，　亦不可文字，　世尊如斯說。
　諸處遍推求，　不見風水火，　地亦無分別，　慧眼之所宣。
　色受及與想，　行識同虛空，　假言彼五陰，　其實無積聚。
　眼耳鼻舌身，　心意等諸根，　雖說本性空，　空亦不可得。
　色聲香味觸，　及以種種法，　斯由分別生，　分別體空寂。
　欲界與色界，　及彼無色天，　皆說如幻化，　虛偽不真實。
　如是諸世尊，　為眾生說法，　欲求出眾苦，　速歸大導師。」

彼諸化佛說此偈時，於是三千大千世界咸得聞之。有九十六億欲色諸天遠塵離垢得法眼淨，二萬天子厭離眾欲，三萬二千天子皆發阿耨多羅三藐三菩提心，一萬行菩薩乘諸天子得無生法忍。爾時彼化如來所可勸召無量無邊阿僧祇億那由他百千諸天大眾，於須臾間悉皆雲集釋迦如來、應供、正遍覺所。稽首足下，右遶三匝退住一面。以天花香，所謂優鉢羅花、鉢頭摩花、拘物頭花、分陀利花、曼陀羅花、摩訶曼陀羅花，及諸花鬘末香塗香，奉散世尊及餘供養。復以種種天妙樂音，歌詠稱讚滿彼虛空。時大集眾其數甚多難可稱計，周遍充滿此四天下，無有空地如一杖頭而不遍者。是諸天人具大威德，所散諸花滿四天下積至于膝。

${mvp.startAtVol('開實義品第二', 'p02', 103, '緣起品第一')}

爾時大集眾中有上首天，所謂善住意天子、善寂天子、慚愧天子，與如是等九十六億諸天子俱，一切皆行菩薩之道，咸共往詣文殊師利所，至其門外右遶七匝。遶七匝已，然後雨天曼陀羅花。其所雨花遍覆虛空，高十由旬成花網臺形如寶塔。時文殊師利持此花臺供養世尊。供養已，即以神力令此三千大千世界一切國土虛空之中花網遍覆，是花光明普照三千大千世界皆大明盛，復雨天曼陀羅花。

爾時文殊師利菩薩摩訶薩閑雅安詳從精舍出，更以神力令所居地自然而有七寶妙座，其座巍巍具足莊嚴。文殊師利斂容整服昇此寶座。時善住意天子見文殊師利昇寶座已，即以頂禮文殊師利足，退住一面。一切諸天亦皆頂禮文殊師利足。爾時文殊師利如是思惟：「誰於今日堪任與我在世尊前對揚深法？誰為法器能受如是不思議句、甚難證句、無處所句、無所著句、無戲論句、不可得句、不可說句、甚深句、真實句、無礙句、不可壞句、空句、無相句、無願句、如如句、實際句、法界句、無形貌句、不取句、不捨句、佛句法句僧句、智慧滿足句、三界平等句、一切法無所得句、一切法無生句、師子句、勇猛句、無句句？如斯說已，誰聽者乎？」於是文殊師利復更思惟：「今此唯有善住意天子，已於過去供養多佛，入深法忍具足辯才，當能與我處世尊前共談實義。」

爾時文殊師利如是念已，即語善住意天子言：「天子！汝今已得甚深法忍，又能具足無礙辯才。今當與我詣世尊所，對論如是深妙義乎？」

時善住意天子報文殊師利言：「大士！我如是說，彼若於我無有語言、不為演說、不存諮問亦無報答，無佛法眾、斷滅三乘、無生死無涅槃、不合不散、不啟不發、不出聲音除諸文字，如是說者我當共談。」

文殊師利語善住意天子言：「天子！我如是說，彼能於我無聽無聞、無讀無誦、無受不持、不思不念、不取不捨、不覺不知，不聞我言、不為他說。所以者何？諸佛菩提本無文字、無心離心、無有覺悟，雖假名說其名亦空。」

善住又言：「大士！今者且為諸天子說，斯諸天子於大士說樂欲聽聞。」

文殊師利言：「天子！我終不為樂聽者說，又亦不為聞受者說。所以者何？凡有聽受則為取著。云何取著？所謂我著、人著、眾生著、壽命著、士夫著。以取著故便有聽受，如是聽受當知彼住三種縛中。何謂三縛？一見我縛，二見眾生縛，三見法縛。天子！若無如是三種見縛而聽法者，當知彼住三種淨中。何謂三淨？一不見自身、不分別、不思念、不證知，二不見說者、不分別、不思念、不證知，三不見所說、不分別、不思念、不證知。天子！是則名為三種淨也。天子！若有能作如是聽者，是平等聽，非不平等。」

爾時善住意天子讚文殊師利言：「善哉善哉，快作斯說。大士！若有能作如是說者，當知即是不退轉說。」

文殊師利言：「且止天子！汝今不應妄想分別菩薩退轉。何以故？若使菩薩有退轉者，彼終不能成等正覺。所以者何？是菩提中無退法故。」

善住復言：「大士！若如是者，當於何處有斯退轉？」

文殊師利言：「天子！當知從貪欲故有退轉，從瞋恚故有退轉，從愚癡故有退轉，從有愛故有退轉，從無明故有退轉，乃至從十二有分生死所生故有退轉。從因故有退轉，從見故有退轉，從名故有退轉，從色故有退轉，從欲界故有退轉，從色界故有退轉，從無色界故有退轉，從聲聞行故有退轉，從辟支佛行故有退轉，從分別故有退轉，從執著故有退轉，從相故有退轉，從取相故有退轉，從斷見故有退轉，從常見故有退轉，從取故有退轉，從捨故有退轉，從我想故有退轉，從眾生想故有退轉，從壽命想故有退轉，從士夫想故有退轉，從福伽羅想故有退轉，從思想故有退轉，從繫縛故有退轉，從顛倒故有退轉。從我見故有退轉，從我見為根本六十二見故有退轉，從諸蓋故有退轉，從諸陰故有退轉，從諸入故有退轉，從諸界故有退轉。從佛想故有退轉，從法想故有退轉，從僧想故有退轉。如是乃至，我當成佛、我當說法、我度眾生、我當破魔、我得智慧，從是諸想故有退轉。如是天子！若能不分別如來十力，不分別四無所畏，不分別十八不共法，不分別一切根、力、覺、道，不分別諸相好，不分別莊嚴佛國，不分別聲聞，不分別菩薩，乃至不分別一切分別退轉者，是名不退轉。」

爾時善住意天子復白文殊師利言：「大士！若如是者，當於何處得不退轉？」

文殊師利言：「天子當知，從通達佛慧故得不退轉，從空故不退轉，從無相故不退轉，從無願故不退轉，從如如故不退轉，從法性故不退轉，從實際故不退轉，從平等故不退轉。」

善住意言：「大士！若如是說，一切諸分別、無分別二俱不異。所以者何？皆從思惟分別生故，是故得言彼有退轉。」又問：「如是退轉，為有法耶？為無法乎？」

文殊師利言：「非有非無如是退轉。」

善住意言：「大士！若爾，何處退轉？」

文殊師利言：「若有若無，是虛妄取、是顛倒取、是不如取，彼則不取亦非不取，以是義故得言退轉。而彼退法不可說有、不可說無。何以故？若有無中有退轉者，彼即為過。所以者何？若有法退轉則墮常邊，無法退轉則墮斷邊。然世尊說不住常中、不住斷中，非斷非常世尊所說。天子！若彼於先不真實想，而彼證知，則名非斷非常。天子！是為菩薩退轉法門。」說是法時，十千天子得無生法忍。

${mvp.startInVol('文殊神變品第三', 'p03', '開實義品第二')}

爾時善住意天子白文殊師利言

「大士！今可俱行詣如來所，奉見頂禮諮受未聞，亦因此時如法問難。」

文殊師利言：「天子！汝莫分別取著如來。」

善住意言：「大士！如來何在而言莫著？」

文殊師利言：「即在現前。」

善住意言：「若如是者，我何不見？」

文殊師利言：「天子！汝今若能一切不見，是則名為真見如來。」

善住意言：「若現前者，云何誡我莫取如來？」

文殊師利言：「天子！汝謂今者現前何有？」

善住意言：「有虛空界。」

文殊師利言：「如是天子！言如來者即虛空界。何以故？諸法平等如虛空故。是故虛空即是如來，如來即是虛空，虛空如來無二無別。天子！以是義故，若人欲求見如來者，當作斯觀。如實真際覺了，是中無有一物可分別者。」

爾時文殊師利菩薩摩訶薩復以神力化作三十二所重閣寶堂，輦軒具足，四面正方四角有柱，周匝欄楯寶網交絡，殊特妙好高顯巍巍，具足莊嚴甚可愛樂。諸堂閣內咸有勝床，眾寶所成天衣覆上。其床各有化菩薩坐，具三十二大人之相。爾時文殊師利普現如是莊嚴事已，遂更與彼蓮花化佛并化菩薩，及此寶輦重閣殿堂諸菩薩眾，俱往佛所繞佛七匝，并亦圍遶比丘眾已，踊在虛空，光明普照眾會道場，四面而住。

爾時文殊師利後善住發，忽然在前先至佛所。善住意天子反更後到，白言：「大士！吾發在前，更在後至。仁從何路乃至於斯？」

文殊師利言：「天子！假使供養滿恒河沙諸如來等，稽首為禮，終不見吾往來進止。」

爾時花臺諸化菩薩及寶堂中諸菩薩眾，同聲說偈讚嘆如來：

/gatha/
「已曾供養過恒河，　不可思議諸世尊，　熾然修行求菩提，　是故超出天人上。
　光明妙色三界雄，　牟尼眾相實奇特，　為眾宣說甚深法，　無有壽命及人我。
　世尊行施持淨戒，　忍辱精進具修禪，　智慧清淨三界表，　我禮彼岸最勝尊。
　其有發意求菩提，　則受天人妙供養，　若於深空無疑惑，　當紹出世大法王。
　過去諸佛等正覺，　現在一切兩足尊，　常說如是諸法空，　本來無相亦無作。
　眾生體性不可得，　何有生者及死滅？　本既無來亦無去，　一切諸法如虛空。
　如彼化人觀眾事，　雖復示現而無真，　世尊說法亦如是，　斯皆虛誑同幻夢。
　恒沙世界滿中寶，　持以布施一切人，　若能修忍善說空，　如是行施超於彼。
　復於恒沙諸劫中，　供養諸佛天人上，　奉獻香花及眾具，　為求菩提離世間。
　得聞如是甚深法，　無有眾生及命人，　當知彼得明淨忍，　是為供養十方佛。
　於無數劫行布施，　衣食象馬及眾珍，　當知彼非解脫因，　以有我人眾生想。
　歸命滅度人中尊，　救濟眾生無量數，　諸法皆空本清淨，　如是解脫智莊嚴。
　諸佛出世甚難值，　得聞正法生信難，　人身難得今已獲，　善哉佛法汝順行。
　已得蠲除斯八難，　永絕迫窄處空閑，　於諸正法得信行，　應當勇猛發精進。
　若聞法已應正思，　不可聞聲即取著，　汝等常行阿蘭若，　必當速疾成人雄。
　近善知識及法師，　應速遠離諸惡友，　汝於眾生平等想，　慎勿妄起我人心。
　常樂多聞持禁戒，　捐棄舍宅坐林間，　腐藥治病莫詐善，　亦恒乞食受糞衣。
　一切有為即無為，　等同一相如陽焰，　若了實際見真如，　疾成無上菩提道。
　當觀五陰猶如幻，　內外諸入如空舍，　世尊常說如斯法，　法等於彼莫生著。
　貪欲瞋恚性自空，　愚癡我慢分別起，　彼法已滅今亦無，　如是知者得成佛。」
//

如是諸化菩薩說是偈時。彼會眾中二萬二千眾生皆發阿耨多羅三藐三菩提心。五百比丘漏盡意解心得解脫。三百比丘尼遠塵離垢得法眼淨。七千優婆塞優婆夷、二萬五千諸天子亦離塵垢法眼清淨，三百菩薩得無生法忍。於是三千大千世界大地六種振動，所謂動、遍動、等遍動，震、遍震、等遍震，涌、遍涌、等遍涌，乃至吼、起、覺等亦復如是。

${mvp.startInVol('破魔品第四', 'p04', '文殊神變品第三')}

爾時尊者舍利弗白佛言：「世尊！今此瑞相誰之所為？能令如是三千大千世界大地六種振動。又是寶輦殿堂蓮花座上諸菩薩等，放大光明照斯眾會，演說如是微妙深法。復令如是無量億數諸天子眾皆來集會，復有億數諸菩薩等亦來集也。」

爾時佛告舍利弗：「斯乃文殊師利威神之力，故現如是妙莊嚴事，亦令菩薩諸天雲集。所以者何？舍利弗！是文殊師利與善住意天子將諸大眾欲來我所，請問如是破散諸魔三昧法門，具足成就諸不思議甚深佛法故。」

時舍利弗復白佛言：「世尊！若如是者，何因緣故我觀此眾，竟不見彼文殊師利？」

佛告舍利弗：「汝宜且待。今文殊師利已與一切魔王、一切魔眾、一切魔宮作大衰耗，所為神變極妙莊嚴，將至我所汝當自見。」

於是文殊師利即入破散諸魔三昧。三昧力故，即時三千大千世界百億魔宮朽故暗冥若將毀壞，其變已現無復威光，令一切魔不樂其所，各自見身惛耄羸瘠柱杖而行，諸天女輩變成老母。一切眾魔見是事故，心大憂愁身毛皆竪，惶怖思念：「是何變怪令吾內外不祥若斯，將無死沒時至果報離散耶？為是世間將壞劫災事乎？」

彼諸魔眾如是念時，文殊師利復以神力即現百億天子住在魔前，告魔眾曰：「汝勿憂懼。此非汝災亦非劫盡。所以者何？今此適有住不退轉菩薩大士名文殊師利，有大威神道德超世，即時正入破散諸魔三昧法門。以彼大士三昧威神其事若此，非有他也。」

諸化天子說是語時，一切魔王及諸魔眾聞諸化天說文殊師利大士名號，更增惶恐戰悼不安，一切魔宮皆大震動。時諸魔王答化天曰：「唯願仁慈救我危厄。」

諸化天子復語魔言：「勿怖勿怖。汝等今宜速疾往詣釋迦牟尼佛世尊所。所以者何？彼佛如來有大慈悲。若諸眾生憂恐煎迫，但往歸依，皆蒙安樂除諸憂苦。」時諸化天如是語已，即於其處忽然不現。爾時一切魔王及諸魔眾聞化天教莫不歡欣，皆共同心於須臾頃羸弊柱杖皆來住於釋迦牟尼佛前，同聲白言：「大德世尊！願見救護願見救護，免茲變怪困苦大厄。世尊！我等寧受百千萬億諸佛名號，不願聞彼文殊師利一菩薩名。何以故？我即聞是文殊師利菩薩名時便大驚恐，若喪自身。」

爾時世尊告諸魔言：「波旬！汝今何忽發如是言？所以者何？是文殊大士凡所開導利益眾生，億百千佛昔所未作，今亦不作當亦不作。唯此文殊師利去來現在常為眾生建斯大事，眾生熟已置解脫中，是故汝等雖復聞彼百千佛名不生苦惱亦無驚怖。云何而言我今忽聞一文殊師利名皆大驚恐？」

時彼魔眾。白言：「世尊！我誠慚恥此弊老身，加以惶懼發斯言耳。世尊！我等從今歸依正覺，唯願哀愍復我本形。」

佛告之曰：「且待須臾。文殊師利亦既來已，自除汝恥。」

於是文殊師利從三昧起，遂與無量百千天眾，復與無量百千諸大菩薩摩訶薩等，及無量百千諸龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽等，前後圍遶，復作無量百千微妙樂音，復雨如是無量妙花，所謂優鉢羅花、鉢頭摩花、拘物頭花、分陀利花，具大莊嚴、有大神通、威德無極，俱來佛所，頭面禮敬右遶三匝，退住一面。

爾時世尊告文殊師利言：「文殊師利！汝入如是破散諸魔三昧耶？」

文殊師利白言：「世尊！唯然已入。」

佛言：「文殊師利！汝從何佛聞是三昧？修經幾時而得成滿？」

文殊師利言：「世尊！我本未發菩提心時，從佛得聞如是三昧。」

又問：「文殊師利！彼佛世尊名號何等，說是三昧令汝得聞？」

文殊師利白言：「世尊！我憶過去無量無邊不可思議阿僧祇劫，爾時有佛，號曼陀羅花香如來、應供、正遍知、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、世尊，出現世時，宣說如是破散諸魔三昧。我於彼時初得聽聞。」

佛告文殊師利：「如是三昧云何修得？」

文殊師利白言：「世尊！若菩薩摩訶薩具足成就二十種法，則能得是破魔三昧。何等二十？所謂一者訶毀貪欲破壞貪心，二者訶毀瞋怒破壞瞋心，三者訶毀愚癡破壞癡心，四者訶毀嫉妬破壞妬心，五者訶毀憍慢破壞慢心，六者訶毀諸蓋破壞蓋心，七者訶毀熱惱破壞惱心，八者訶毀想念破壞想心，九者訶毀諸見破壞見心，十者呵毀分別破分別心，十一呵毀取事破壞取心，十二訶毀執著破壞執心，十三訶毀諸相破壞相心，十四訶毀有法破壞有心，十五呵毀常法破壞常心，十六訶毀斷法破壞斷心，十七訶毀諸陰破壞陰心，十八訶毀諸入破壞入心，十九訶毀諸界破壞界心，二十訶毀三界壞三界心。世尊！是為菩薩摩訶薩具二十法，畢竟成就如是三昧。世尊！菩薩摩訶薩復有四法，具足修行得是三昧。何等為四？一者建立心行清淨調柔，二者心性淳直無諸諂曲，三者心無攀緣入深法忍，四者外內所有一切能施。是為菩薩摩訶薩具足四法成就三昧。世尊！菩薩摩訶薩復有四法能得三昧。何等為四？一者畢竟深信，二者成就實語，三者常樂空閑，四者不取諸相。是為菩薩具足四法成就三昧。復有四法菩薩成就得是三昧。何等為四？一者親近善友，二者常知止足，三者獨坐思惟，四者不樂諠猥。是為菩薩具足四法成就三昧。復有四法，菩薩成就，得是三昧。何等為四？一者不破壞戒，二者不缺犯戒，三者無所依戒，四者不望報戒。是為菩薩具足四法成就三昧。復有四法，菩薩成就，得是三昧。何等為四？一者捨聲聞心，二者離緣覺心，三者住菩薩忍，四者不捨眾生。是為菩薩具足四法成就三昧。復有四法，菩薩成就，得是三昧。何等為四？一者修空捨我，二者無相離相，三者無願除願，四者捨諸所有。是為菩薩具足四法能得三昧。

「世尊！時彼曼陀羅花香如來、應供、正遍覺說此破散諸魔法門，我從彼佛聞已初修。次復有佛，號一切寶電蔽日月光如來、應供、正遍覺，我時於彼具足成就。彼佛世尊說此門時，彼眾會中十千菩薩皆得成就此三昧門。」

爾時尊者舍利弗白佛言：「希有世尊！今此文殊師利乃能久遠成就如是降魔三昧。三昧力故，能令波旬及諸魔眾髮白老耄形志俱衰，一至斯也。」

佛告舍利弗：「於意云何？汝今言此文殊師利，獨是三千大千世界變此眾魔如斯老耄耶？舍利弗！汝今不應作如是見。所以者何？舍利弗！今者十方如恒河沙等諸佛世界所有諸魔，一切皆悉如是變壞，盡是文殊師利威力所為。」於是世尊告文殊師利言：「文殊師利！汝今當且攝汝神力，令彼眾魔得復本形。」

爾時文殊師利受佛教已，告諸魔曰：「眾仁者！實為厭患此身儀耶？」

諸魔報曰：「唯然。大士！」

文殊師利言：「若如是者，汝今亦當厭患貪欲，勿著三界。」

諸魔報曰：「善哉大士！敬聞嘉誨豈敢有違。唯願少假威神除此慚苦。」文殊師利遂攝神力，令一切魔復彼天形莊嚴如故。

爾時文殊師利告諸魔言：「波旬！汝所有眼，何者為眼？何者眼想？如是，何處是眼著是眼相？是眼攀緣、是眼障礙、是眼思、是眼我、是眼依止、是眼喜樂、是眼戲論、是眼我所、是眼護、是眼念、是眼取、是眼捨、是眼分別、是眼思量、是眼成就、是眼生、是眼滅，乃至是眼來去。如是等法，為汝境界魔業障礙。如眼，乃至身意亦如是。又如色乃至觸法，為汝境界魔業障礙，亦復如是。汝等皆應如實了知。復次波旬！汝所有眼，即為非眼，亦為無眼。為無眼想、無眼著、無眼相、無眼攀緣、無眼障礙、無眼思、無眼我、無眼依止、無眼愛、無眼戲論、無眼我所、無眼護、無眼念、無眼取、無眼捨、無眼分別、無眼思量、無眼決定、無眼生、無眼滅、無眼去、無眼來。如是等法非汝境界，汝於是中不能為主，無法無力、不得自在，亦無取著。如眼，乃至身意亦如是。又如色乃至觸法亦如是。汝等皆應如實了知。」文殊師利說是法時，眾中一萬魔王波旬皆發阿耨多羅三藐三菩提心，八萬四千諸魔眷屬遠塵離垢得法眼淨。

爾時尊者摩訶迦葉白佛言：「世尊！我等願請文殊師利令我覩見彼諸菩薩摩訶薩等。所以者何？世尊！斯諸大士難可值遇。」

爾時世尊即告文殊師利言：「汝應當知，今此大眾咸皆渴仰，思願覩見十方所有諸來菩薩摩訶薩身。今正是時，汝應顯現。」

於是文殊師利蒙聖教已，即便告彼法輪菩薩、月光菩薩、除魔菩薩、妙音菩薩、離垢菩薩、寂滅菩薩、選擇菩薩、法王吼菩薩，如是等無量菩薩摩訶薩言：「諸大士！汝等今宜各於宮殿自顯其身，分明現汝本國形狀也。」

文殊師利發斯語已，於是諸菩薩眾從三昧起，各現本身，令諸大眾一切咸見。或有菩薩其身高大若須彌山王，或有菩薩身大八萬四千由旬，或有身大百千由旬、或九十千，乃至五十、四十、三十、二十千者。或有身大十千由旬，乃至或有五千、四千、三千、二千者。或有身大一千由旬，乃至或有五百、四百、三百、二百者。或有身大一百由旬，乃至或有五十、四十、三十、二十者。或有身大十由旬者，乃至或有五、四、三、二、一由旬者。如是乃至或有菩薩，身量大小長短寬狹如此娑婆世界人身無異。當爾之時，此三千大千世界大眾充滿，無有空處如杖頭許。其中所有諸大菩薩摩訶薩眾，一切多是功德巍巍智慧深遠，具足威力成就神通，放大光明遍照十方無量百千諸佛世界，乃至一切大威德天及諸天、龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽、人非人等，大小諸王，皆悉充滿。

爾時文殊師利從座而起，整理衣服偏袒右髆，右膝著地合掌向佛，白言：「世尊！我於今者欲少諮問如來、應供、正遍覺所有心疑。未審世尊見垂聽不？」

佛告文殊師利：「如來、應供、正遍覺恣汝所問，當為汝釋，決汝所疑令汝心喜。」

文殊師利言：「唯然世尊！願為宣說，我當聽受。」文殊師利言：「世尊！云何名為菩薩摩訶薩？言菩薩者，義何謂也？」

佛告文殊師利：「汝問『云何為菩薩？菩薩有何義？』者，以能覺了一切法故，名為菩薩摩訶薩也。文殊師利！彼一切法，菩薩覺者，所謂言說。文殊師利！菩薩云何覺一切法？所謂覺眼、覺耳、覺鼻、覺舌、覺身、覺意。文殊師利！云何菩薩覺眼覺耳乃至覺意？文殊師利！所謂菩薩覺彼眼法本性空故。如是覺已，終不生念我能覺知。如是覺耳乃至覺意，皆本性空。如是覺已，亦不生念我能覺知。菩薩如是覺眼等已，復覺彼色本性自空。如是覺已，亦不分別我能覺知。如是覺聲乃至覺法，皆本性空，亦不分別我能覺知。是為菩薩覺一切法也。

「復次文殊師利！云何菩薩覺彼五陰？所謂菩薩觀見陰體本性自空，如斯覺故觀無相，如斯覺故觀無願，如斯覺故觀無欲，如斯覺故觀寂靜，如斯覺故觀遠離，如斯覺故觀無所有，如斯覺故觀無實，如斯覺故觀無動，如斯覺故觀無生，如斯覺故觀無來，如斯覺故觀無去，如斯覺故觀無真，如斯覺故觀無主，如斯覺故觀無證，如斯覺故觀無知，如斯覺故觀無見，如斯覺故觀無人，如斯覺故觀無想，如斯覺故觀不可說。如斯覺故覺但有名，如斯覺故觀無我，如斯覺故觀分別起，如斯覺故觀從緣生，如斯覺故觀如幻，如斯覺故觀如化，如斯覺故觀如夢，如斯覺故觀如鏡像，如斯覺故觀如聲響，如斯覺故觀如芭蕉，如斯覺故觀不久住，如斯覺故觀不牢固，如斯覺故觀虛妄，如斯覺故觀無物。如斯覺故，是為菩薩覺一切法。

「復次文殊師利！云何菩薩摩訶薩覺貪恚癡？所謂覺彼貪欲因分別起故，覺彼瞋恚因分別起故，覺彼愚癡因分別起故，而亦覺彼分別空無所有，無物無戲論、不可說不可證故。是為菩薩覺一切法。

「復次文殊師利！云何菩薩摩訶薩覺於三界？所謂覺彼欲界無我人故，覺彼色界無所作故，覺無色界空無有故，覺彼三界皆遠離故。是為菩薩覺一切法。

「復次文殊師利！云何菩薩摩訶薩覺眾生行？所謂覺是眾生貪欲行故，覺是眾生瞋恚行故，覺是眾生愚癡行故，覺是眾生等分行故。如是覺已，如是證知、如是為說、如是教化眾生、如是令得解脫。是為菩薩覺一切法。

「復次文殊師利！云何菩薩摩訶薩覺一切眾生？所謂覺一切眾生但有其名，離彼名已無別眾生。是故一切眾生即一眾生，彼一眾生即一切眾生，如是眾生即非眾生。若能如是無分別者，是為菩薩摩訶薩覺一切法。又復云何覺一切法？能如是覺菩薩道故，是為菩薩摩訶薩覺一切法。」

爾時世尊重明此義以偈頌曰：

/gatha/
「覺眼及與耳，　自體常空寂，　不言我能覺，　是名為菩薩。
　觀鼻及與舌，　本性無所有，　不分別我覺，　是名為菩薩。
　智慧觀察身，　亦覺意自然，　覺已為他說，　是名為菩薩。
　色聲香味觸，　意所樂諸塵，　覺知本性空，　是名為菩薩。
　覺色及受想，　諸行與識心，　一切斯同幻，　是名為菩薩。
　五陰聚如夢，　覺彼無一相，　不分別我知，　是名為菩薩。
　不生亦不出，　無作復無言，　如是說唯名，　彼名亦非物。
　覺貪欲瞋恚，　斯由分別起，　彼分別無體，　畢竟終自空。
　癡亦分別生，　分別因緣生，　緣此生諸見，　諸見不可得。
　覺察三界空，　一切無真實，　於彼不可動，　故名為菩薩。

　能以利智刀，　斷除諸見縛，　觀察法界性，　無割亦無傷。

爾時文殊師利白佛言：「世尊！如佛所說，菩薩摩訶薩初發心者，以何義故名初發心？」

佛告文殊師利：「若有菩薩等觀三界一切想生，如是得言最初發心。文殊師利！是名菩薩初發心也。」

文殊師利復白佛言：「世尊！如我所解佛說義者，若有菩薩貪欲心生是初發心、瞋恚心生是初發心、愚癡心生是初發心。世尊所說，將無謂是為初發心。」

爾時善住意天子問文殊師利言：「大士！若諸菩薩起貪恚癡名初發心者，所有一切具縛凡夫皆即名為發心菩薩。所以者何？彼諸凡夫從昔至今常發如是貪恚癡等三毒心故。」

文殊師利語善住意言：「天子！汝言一切凡夫從昔已來常能發是三毒心者，是義不然。何以故？一切凡夫心力羸劣，不能發起是貪恚癡。唯有諸佛世尊、一切阿羅漢辟支佛、不退轉地諸菩薩等，乃能發是貪恚癡耳，是故凡夫不能得發。」

善住意言：「大士！仁今何故作如斯說？令此會眾不識不知，陷諸疑網深可怖畏。」

爾時文殊師利語善住意言：「天子！於意云何？如彼飛鳥往來空中，彼鳥足跡在虛空中。有發行乎？無發行也？」

善住意言：「非無發行。」

文殊師利言：「如是如是。天子！以是義故我作此說。若有能發貪欲恚癡，唯彼諸佛、聲聞、緣覺、不退菩薩乃能發耳。天子當知！無有依處是名為發、無有取著是名為發；既無依處又無取著，是即無句斯謂為發，是無分別句斯謂為發，是不可生句斯謂為發，是不實句斯謂為發，是非物句斯謂為發，是不來句斯謂為發，是不去句斯謂為發，是無生句斯謂為發，是無攀緣句斯謂為發，是無證句斯謂為發，是不諍句斯謂為發，是不思句斯謂為發，是不壞句斯謂為發，是無言句斯謂為發，是不破句斯謂為發，是無字句斯謂為發，是無執句斯謂為發，是無住句斯謂為發，是不取句斯謂為發，是不捨句斯謂為發，是不拔句斯謂為發。天子當知，是為菩薩初發心也。天子！發心菩薩若於如是一切諸法，不愛著、不思想、不見不知、不聞不識、不取不捨、不生不滅，是則名為真發心也。天子！是菩薩摩訶薩若能依止如是法界、如是平等、如是實際、如是方便，則彼貪欲瞋恚愚癡等發。又若決能如是依止，則彼眼耳及意等發，則彼色取乃至識取等發。如是則一切諸見發，無明有愛發，乃至十二因緣有分發，五欲眾事發，愛著三界發，我見發，我所見發，我見為根本六十二見發，佛想發，法想發，僧想發，自想發，他想發，地想發，水想發，火想發，風想發，空想發，識想發，四顛倒發，四識住發，五蓋發，八邪發，九惱發，十惡業道發。天子當知，我今舉要言之，一切分別、一切分別處、一切語言、一切諸相、一切進趣、一切希求、一切取著、一切思想、一切意念、一切障礙，菩薩皆當發。汝應如實知，天子！以是義故，汝今若能於此諸法不愛著不思想者，是則名為真實發也。」

爾時世尊讚文殊師利言：「善哉善哉。文殊師利！汝今乃能為諸菩薩具宣如是初發心義。文殊師利！汝於往昔已曾供養無量無邊過恒沙數諸佛世尊，能說斯耳。」

爾時尊者舍利弗白佛言：「世尊！今此文殊師利所說菩薩最初發心及獲無生法忍，先後二事平等無差耶？」

佛告舍利弗：「如是如是，如汝所說。舍利弗！昔然燈世尊授我記言：『摩那婆！汝於未來過阿僧祇劫當得成佛，號釋迦牟尼如來、應供、正遍覺。』舍利弗！我於彼時亦不離此心得無生忍。如是舍利弗！汝當知彼一切菩薩初發心義，如文殊師利所言無有異也。」

爾時文殊師利白佛言：「世尊！如我解佛所說義者，皆是初發。何以故？如世尊說，一切初發皆是不發，其不發者即是菩薩最初發心。」說是法時，二萬三千菩薩證無生忍，五千比丘於諸法中漏盡解脫，六十億諸天子遠塵離垢得法眼淨。

爾時尊者大迦葉白佛言：「世尊！今此文殊師利乃更為斯能作難作，宣說如是甚深法門，令諸眾生多所利益。」

文殊師利謂迦葉言：「大德迦葉！我實不為難作之事。所以者何？一切諸法皆無所作，亦復無有已作今作當作。唯大迦葉！我於諸法非作不作，其義亦爾。又大迦葉！我於眾生無有度脫亦無繫縛。所以者何？一切諸法無所有故。迦葉！云何於世尊前發如是言能作難作。又大迦葉！我無所作，慎勿言我能作難作。又大迦葉！我實不作。非獨我不作，如來亦不作、辟支佛亦不作、阿羅漢亦不作。又大迦葉！有何等人能作難作？若欲正言能作難作，但彼一切嬰兒凡夫。如斯說者是名善說。所以者何？如諸如來皆悉無有已得今得當得，乃至一切聲聞辟支佛亦無所得，唯彼凡夫一切皆得。」

時大迦葉復白文殊師利言：「大士！一切諸佛不得何等？」

文殊師利言：「一切諸佛不得我、不得福伽羅、不得眾生、不得壽命、不得士夫、不得斷、不得常、不得諸陰、不得諸入、不得諸界、不得諸名色、不得欲界、不得色界、不得無色界、不得分別、不得思惟、不得念處、不得因生、不得顛倒、不得貪恚癡、不得此世、不得彼世、不得我、不得我所，乃至不得一切諸法。大德迦葉！如是一切諸法次第不得亦復不失，不縛不解、不取不捨、不近不遠。是故迦葉！應當覺了如是法門，若諸佛世尊皆不得者，則彼等非法無聞。凡夫一切斯得，是故凡夫能作難作，非諸佛作、非辟支佛作、非阿羅漢作，是乃名為凡夫作也。」

迦葉復問：「作何等也？」

文殊師利言：「作斷作常、作染著作依止、作憶念作取捨、乃至作彼一切戲論、分別隨順高下等事。是故大德迦葉！如是諸法，諸佛世尊皆無所作，無有已作今作當作，唯彼凡夫能作難作。」

爾時文殊師利復白佛言：「世尊！所言無生忍者，云何名為無生忍也？世尊！復以何義而更名為法無生忍？菩薩云何得斯忍法？」

佛告文殊師利言：「實無有人於生法中得無生忍。所言得者，但有語言名字。何以故？以無生法不可得故、離攀緣故，不得法忍。得無所得、無得無失，是故言得無生法忍。復次文殊師利！彼無生法忍者，所謂一切法無生如是忍故，一切法無來如是忍故，一切法無去如是忍故，一切法無我如是忍故，一切法無主如是忍故，一切法無取如是忍故，一切法無捨如是忍故，一切法無所有如是忍故，一切法無實如是忍故，一切法無等如是忍故，一切法無等等如是忍故，一切法無比如是忍故，一切法無染如虛空如是忍故，一切法無破壞如是忍故，一切法無斷如是忍故，一切法無垢如是忍故，一切法無淨如是忍故，一切法空如是忍故，一切法無相如是忍故，一切法無願如是忍故，一切法離貪恚癡如是忍故，一切法如如如是忍故，一切法法性如是忍故，一切法實際如是忍故。如是一切法，無分別、無相應、無憶念、無戲論、無思惟、無作無力、羸劣虛誑，如幻如夢、如響如影、如鏡像如芭蕉、如聚沫如水泡，如是忍故。所可忍者亦無可忍，非法非非法，但以名字說斯法耳，然彼名字亦不可得，本性自離。如是言忍，信解樂入、無惑無疑、無驚無怖、無動無沒，遍滿身已正受而行，不得其身亦無住處。文殊師利！是為菩薩摩訶薩於諸法中得無生忍，乃至不行一切想故。」

爾時文殊師利復白佛言：「世尊！所謂忍者，云何為忍？乃至不為境界所壞，故名為忍。」

時彼善住意天子問文殊師利言：「大士！何等不為境界所壞？」

文殊師利言：「天子！所謂眼，何法壞眼？謂彼善色惡色是能壞眼。如色壞眼，彼聲壞耳乃至法壞意亦如是。天子！若菩薩眼見色，不取相不耽好、不分別不思惟、不愛不厭，知本性空無有念想，不為眾色之所傷敗；乃至意法亦如是。天子！若其六情無著無縛無壞無傷，如是菩薩住於法忍。住法忍故，於一切法無所分別，無生不生、無漏不漏、無善不善、無為不為，不念世法及出世法，不分別不思惟，是則名為無生法忍。」說此法時，有六萬三千眾生發阿耨多羅三藐三菩提心，一萬二千菩薩得無生法忍。

爾時善住意天子復白文殊師利言：「大士！云何菩薩摩訶薩發起勝行，超越轉增入諸地也？」

文殊師利言：「天子！誰於其間能發勝行，而言諸地有超轉者？」

善住意言：「大士！仁豈不知諸菩薩等所行殊勝彼彼轉增，乃至超越能滿十地乎？」

文殊師利語善住意言：「不然。天子！我聞佛說，一切諸法猶如幻化。汝不信耶？」

善住意言：「大士！世尊誠言，誰敢不信？」

文殊師利言：「天子！如彼幻人及幻，豈有勝行超越轉入，乃至具足十地耶？」

善住意言：「不也。大士！」

文殊師利言：「如是天子！若使幻人及幻能有超行轉入者，則吾等亦當如是超越轉入。何以故？如世尊說，一切諸法皆如幻化，故無轉入。天子！是故若說諸地有轉入者，即非轉入。我亦不言地有轉入。所以者何？一切諸法無轉入故。是故法於法中不得轉入，所謂色於受中不得轉入，受於色中不得轉入，想於行中不得轉入，行於想中不得轉入，識於色中不得轉入，色於識中不得轉入。天子！如是乃至於一切法，皆應如是作四句說。

「又眼不於耳中轉入，耳不於眼中轉入。鼻不於舌中轉入，舌不於鼻中轉入。身不於意中轉入，意不於身中轉入。所以者何？一切諸法其性各異行自境界，頑癡無知無有覺識，亦如草木牆壁瓦石、如鏡中像、如幻如化，不可證觸，一相無相。以是義故，一切諸法無有超轉，不出不入、無去無來。天子當知，若諸菩薩如是解知彼一切法無超轉者，不復更有諸地分別，亦無入道、無有捨地亦無退轉，於彼菩提超轉之中無有失滅。何以故？若人見彼陰界諸入是真實者，彼無超轉。所以者何？以一切法性本淨故。天子！是名菩薩超越道地。天子！譬如幻師化作十重輦輿宮閣，即令化人居處其內。天子！於意云何？彼人宮閣有定所不？」

善住意言：「無也。大士！」

文殊師利言：「如是如是。天子！見菩薩地有超轉者，其事若此。」

${mvp.startInVol('破二乘相品第七第一', 'p07a', '破菩薩相品第六')}

爾時善住意天子復問文殊師利言：「大士！或時有人至大士所求出家者，大士爾時當云何答？云何為說出家度法？云何授戒及教持戒？」

文殊師利言：「天子！若其有人來至我所求出家者，我當教彼如是言曰：『諸善男子！汝今不應發出家心。汝若不發出家心者，我當教汝真出家法。』所以者何？天子！若求出家，則求欲界，亦求色界、求無色界，復求世間五欲之樂，及求未來果報諸事。若善男子有所求者彼不證法，不證法故彼則見心。是故天子！若無所取，彼為證法。以證法故則不見心，不見心故則不出家，不出家故則無出家心，無出家心故彼則不發，以不發故則無有生，以無生故彼則盡苦，以盡苦故則畢竟盡，畢竟盡故彼則無盡，以無盡故則不可盡，不可盡者則是虛空。天子！我時於彼善男子所作如是教。復次天子！若復有人來詣我所求出家者，我復教彼如是言曰：『諸善男子！汝今莫發出家之心。所以者何？彼心無生不可得發，汝莫為異而保此心。』復次天子！若更有人來詣我所求出家者，我復教彼如是言曰：『諸善男子！汝今若不斷除鬚髮，如是汝則真實出家。』」

爾時善住意天子復白文殊師利言：「大士！以何義故作如斯說？」

文殊師利言：「天子！世尊說法無所斷除。」

善住意復問言：「何等不斷亦復不除？」

文殊師利言：「天子！色法不斷亦不除，受想行識不斷亦不除。天子！若復有人作如是念：『我除鬚髮乃為出家。』當知彼人則住我相，住我相故則不見平等。又見我故則見眾生，見眾生故則見鬚髮，見鬚髮故生剃除想。天子！彼若不見有我相者則不見他相，無他相故則無我慢，無我慢故則無吾我，無吾我故則無分別，無分別故則無動搖，無動搖故則無戲論，無戲論故則無取捨，無取捨故無作不作、無斷不斷、無離無合、無減無增、無集無散、無思無念、無說無言，如是則名安住真實。」

善住意言：「大士！實義云何？」

文殊師利言：「天子！所言實者即是虛空，如是虛空得名為實。無起無盡、無減無增，以是故言虛空為實、性空為實、如如為實、法界為實、實際為實。如是實者則亦不實。何以故？以彼實中不可得故名為不實。」

爾時文殊師利語善住意言：「天子！若復有人來詣我所求出家者，我當教彼如是言曰：『諸善男子！汝今若能不取著彼袈裟衣者，吾則以汝為真出家。』」

善住意言：「大士！以何義故復如斯說？」

文殊師利言：「天子！諸佛世尊無有取法，凡所宣說不為取著。」

善住意言：「不取何等？」

文殊師利言：「天子！謂不取色若常無常，乃至不取識若常無常；不取眼若常無常，乃至不取意若常無常；不取色乃至不取法；不取貪欲不取瞋恚不取愚癡不取顛倒。天子！如是乃至一切諸法皆悉不取而亦不捨、不合不離。天子！若取袈裟，當知彼即大有見相。天子！是故我說不以取著袈裟而得清淨及得解脫。所以者何？天子！諸佛世尊大菩提處無有袈裟。」

善住意言：「大士！何法是袈裟？」

文殊師利言：「天子！汝問何法為袈裟者，貪欲是袈裟、瞋恚是袈裟、愚癡是袈裟、因是袈裟、諸見是袈裟、名色是袈裟、妄想是袈裟、執著是袈裟、取相是袈裟、語言是袈裟，如是乃至戲論一切諸法皆是袈裟。若知諸法無善不善，無思無念，是名無袈裟。若無袈裟則無所有，若無所有則無垢濁，若無垢濁則無障礙，無障礙故亦無有作——是謂思量。」

善住意言：「大士！所言思量，思量者以何義故名曰思量？」

文殊師利言：「天子！彼思量者，於法平等無有增減、無作不作，故言思量。天子！若能於法不作增減，如世尊說不應復起想念分別，故言思量。」

善住意言：「何等名為不作增減？」

文殊師利言：「天子！過於平等。過平等已法不可得，所謂過去不可得、未來不可得、現在不可得。彼法非如，無增減作、無吾我作、無有人作、無眾生作、無壽命作、無有斷作、無有常作、無有分別陰入界作、無有分別佛法僧作，亦無有念是持戒作、是破戒作、是煩惱作、是清淨作、是得果作、是須陀洹作、是斯陀含作、是阿那含作、是阿羅漢作、是辟支佛作，乃至此是空作、是無相作、是無願作、是明解脫作、是離欲作。如是天子！此皆為彼無聞凡夫思量分別說斯法耳。汝應當知，此是最下癡人求欲得法妄想取著，是故如來為斷彼著而演說是思量分別作不作事。」

於是善住意天子讚文殊師利言：「善哉大士！快說如是甚深法門。」

爾時世尊亦復讚可文殊師利言：「善哉善哉。文殊師利！汝今乃能作如是說。」

爾時文殊師利復語善住意言：「天子！若復有人來詣我所求出家者，我當教彼作如是言：『諸善男子！汝今若能不受具戒，如是則名真出家也。』」

善住意言：「大士！以何義故作如是語？」

文殊師利言：「天子！如世尊說，唯有二種受具戒法。何等為二？一受正平等戒，二受邪不等戒。是中何者邪不等戒？謂墮我見、墮人見墮、眾生見、墮壽命見、墮士夫見、墮斷見、墮常見、墮邪見、墮憍慢、墮貪欲、墮瞋恚、墮愚癡、墮欲界、墮色界、墮無色界、墮取著分別。天子！是為略說墮於一切不善法中、墮逐惡知識妄取一切法、墮不知出要解脫之處。天子當知，是名受邪不等戒也。天子！是處何者是受正平等戒？謂空是平等、無相是平等、無願是平等。天子！若能如是入三解脫門，如實覺知，不分別不思念，於一切法無有退轉，天子！是名受正平等戒也。復次天子！若貪欲發、若瞋恚發、若愚癡發、若愛無明發、我見發、我見為根本六十二見發、三邪行發、四顛倒發，乃至八邪、九惱、十不善業道等發，故名受正戒也。天子！譬如一切種子草木樹林，皆依大地而得生長，其地平等無心念作。如是天子！若佛法中正受戒故具足成就。天子！譬如一切草木種子，依大地住而得增長。天子！當應如是具受正戒。所以者何？住於戒故道法增長，如彼種子戒亦復然。又如種子增長得名成就。如是住於戒故，所有一切助菩提分法出生增長得名成就，天子！是為過去未來現在諸佛世尊一切聲聞受正戒也，所謂入彼三解脫門，一切戲論語言滅處。天子當知，若能如是受具戒者，是名受正，非不正也。」

爾時文殊師利復語善住意天子言：「天子！我今更於如是出家、如是受具，如是教曰：『諸善男子！汝今若能不持禁戒，如是則為真實持也。』」

善住意言：「大士！以何義故作如斯說？」

文殊師利言：「天子！一切諸法悉無所取故無可持。云何此戒而獨有持？天子！戒若可持則持三界。天子！於汝意者以何為戒？」

善住意言：「大士！若能具足波羅提木叉者，是名為戒。」

文殊師利言：「天子！云何名為波羅提木叉？」

善住意言：「大士！所謂持身及以口意，三業具足，是則名為波羅提木叉也。」

文殊師利言：「天子！於意云何？今是現前何處有是身業可作？如是過去未來亦無有作。彼皆無作、無有像貌，可得言有或青或黃或赤或白及頗梨色耶？」

善住意言：「不也。大士！」

文殊師利言：「天子！彼名何等？云何而說？」

善住意言：「彼名無為，實不可說，如是乃至意作亦然。」

文殊師利言：「天子！於意云何？彼無為者可作有為乎？」

善住意言：「不也。大士！」

文殊師利言：「天子！以是義故我如斯說，彼若不持名真持戒。天子！若言增上戒學、增上心學、增上慧學者，為學實際。當如是知，無所持故言增上戒學，無所知故言增上心學，無所見故言增上慧學。如是心不分別故、不憶念故、不生殊異故，名最上心學。如心學，戒慧亦爾。天子！若不得心則不念戒，若不念戒則不思慧，若不思慧則無復起一切疑惑，既無疑惑則不持戒，若不持戒是則名為真持戒也。天子當知，彼持戒者則無所欲，無所欲故則無退還，無退還故彼則清淨，彼清淨故則得解脫，彼解脫故則得精進，彼精進故則無有漏，彼無漏故則住正行，住正行故則無像貌，無像貌故即是虛空。何以故？以彼虛空無形相故。是故天子！若有人能如是學者則為不學，彼無學故則為真學。於何處學謂無處學？云何無處？謂空平等。天子！若能正住空平等者，是則名為真住戒學。」

爾時文殊師利復語善住意天子言：「天子！若人能作如是出家、如是受具，我復教彼如是言曰：『諸善男子！汝今若能受彼一切三千大千世界篤信檀越供養眾具，而能於中不起分別、不念報恩，是乃名為清淨持戒。』」

善住意言：「大士！以何義故作如斯說？」

文殊師利言：「天子！所謂若人取彼施者、受者、財物三事故，是為報恩。又若見彼是為報恩，若思惟彼是為報恩，若分別彼是為報恩。天子！若不見彼不取彼、不思惟彼、不分別彼者，有何可報？何以故？以從本來畢竟清淨，如是報故。天子！彼若取若見、若思惟、若分別及念報者，是謂凡夫，非阿羅漢。所以者何？是諸凡夫於一切時常行取著，思量分別此受彼與、彼垢此淨，以是分別故有報恩。云何報恩？謂諸凡夫於生死有取後生身，是故於彼欲行報恩。天子！諸阿羅漢不受後有，畢竟不見、不思量、不分別，無有此彼，更不受身，當於何處而報恩也？天子！若受彼施，當行三淨然後乃受。何謂三淨？一不見己身即無施者，二不見他人即無受者，三不見財物即無施事。天子！如是三淨則畢竟淨，如斯淨已復何用報？天子！以是義故我如是說，若受三千大千世界篤信檀越一切眾具，不分別、不念報者，是名世間真勝福田，是真出家、是淨持戒。」

爾時文殊師利復語善住意天子言：「天子！我與彼人如是出家、如是戒已，當復教言：『諸善男子！汝今若能不行阿蘭拏不在聚落、不處近不住遠、不獨坐不眾居、不多言不杜默、不乞食不受請、不事糞掃衣不受他衣鉢、不多貪不少欲、不多求不知足、不樹下不露地、不服腐爛藥不受肉與蘇，善男子！汝若能於一切頭陀不起分別如是行者，則名具足行頭陀也。』何以故？若以憶念分別行者，即是我慢心見諸相。天子！若如是行則如是念，我受糞掃衣、我行乞食、我住樹下、我坐露地、我行阿蘭拏、我服腐爛藥、我少欲、我知足、我行頭陀。天子！若正行者不生如是念。所以者何？為彼無有一切分別故。彼於爾時尚不見我，況當計有頭陀功德？若見有者，無有是處。天子！是故若有如是行頭陀，不憶念、不分別，我則說為真頭陀也。何以故？天子！若斯人者，拂去貪欲、拂去瞋恚、拂去愚癡、拂去三界、拂去五陰、拂去十二入、拂去十八界，如是我說為真頭陀。何以故？以彼頭陀，不取不捨、不思不念、不修不行、非法非非法，是故我說真頭陀也。」

爾時文殊師利復語善住意天子言：「天子！我與彼人如是出家、如是行已，當復教言：『諸善男子！汝今若能不觀四聖諦、不修四念處、不修四正勤、不修四如意足、不修五根、不修五力、不修七覺分、不修八聖道，不修三十七助菩提法、莫證三解脫門。』何以故？天子！彼聖諦者入無生相，不可念知、不可修證。所以者何？彼無生中云何言證？天子！是故我言，夫念處者非念非思一切諸法，故言念處。天子！若比丘不住欲界、不住色界、不住無色界，故言比丘不住四念處思修四念處。云何思修？如彼不思不修故言思修。如是次第乃至三十七種助菩提法，應如是知。天子！若彼禪行比丘於一切法悉無所得，無所得故不思念、不分別、不修不證。何以故？天子！彼諸法但有名。如三十七助菩提法，彼雖有名而不可得，唯以分別因緣故生。一相無相，以如是名故如是說，其說亦無。故彼雖復名字證知，終不可得，是則名為如實覺知三十七種助菩提法。」

時彼善住意天子復白文殊師利言：「大士！所言禪行比丘，何等名為禪行比丘耶？」

文殊師利言：「天子！若彼比丘於一切法但取一行極隨順者——所謂無生——是為禪行。又復無有少法可取，是為禪行。又不取何法？所謂不取此世彼世、不取三界，乃至不取一切諸法。如是平等，是為禪行。天子！如禪行者，乃至無有一法相應，無合無散是為禪行。」

爾時彼會大眾多有無量百千眾生，咸有疑心：「今此文殊師利所說如是，云何得與聖說相應？所以者何？世尊恒說，若人能入三解脫門名為涅槃。又如佛說，若有修行三十七種助菩提法便證涅槃。然而今者文殊師利更如是說，不應修是助菩提行，亦莫入彼三解脫門。將非文殊師利虛妄說耶？」

於是文殊師利知諸比丘及以眾會咸皆有疑，即語尊者舍利弗言：「大德！汝於今者最可證信，世尊記汝智慧第一。大德！汝於何時證離欲法？且當證法時，豈不見四諦耶？」

舍利弗言：「不也。」

「豈不修三十七助菩提分法耶？」

曰：「不也。」

「豈不入三解脫門耶？」

曰：「不也。大士！我於爾時乃至無有一法可見可除、可修可證、可選擇者。所以者何？一切諸法無為、無生、無言、是空。若是空者，有何可證？」說此法時，眾中有三萬比丘於法漏盡心得解脫。

${mvp.startAtVol('破二乘相品第七第二', 'p07b', 105)}

爾時善住意天子讚文殊師利言：「善哉善哉。大士！仁今真是聰辯利智，快說如斯甚深空忍。」

文殊師利言：「天子！我非如是聰辯利智。夫利智者則是一切嬰兒凡夫。何以故？天子！一切凡夫是名利智。何等利智？所謂地獄利智、畜生利智、餓鬼利智、閻摩利智，乃至三界一切利智。如是取著相應，得言利智。所以者何？不知生死煩惱先際故。天子！是故彼諸凡夫，著貪欲利、著瞋恚利、著愚癡利，乃至與彼諸見名色取著相應，故言利智。非謂諸佛世尊及聲聞緣覺得忍菩薩有斯利智，是乃名為一切凡夫取相利智也。」

於是善住意天子復問文殊師利言：「大士！仁今所說，欲顯智耶？」

文殊師利言不也。善住意言。欲隨行耶。文殊師利言：「不也。」

善住意言：「欲隨句耶？」

文殊師利言：「如是如是。天子！我由字句。」

善住意言：「大士！仁今何故如斯說耶？」

文殊師利言：「天子！若諸菩薩於一字一句初不移動，然彼字句義門處所近遠淺深皆如實知，謂知空處、知無相處、知無願處、知遠離處、知無所有處、知無生處、知如如處，而於其間無受無作、無解無知，是故得言唯字句耳。」

爾時世尊讚文殊師利言：「善哉善哉。文殊師利！汝今已得陀羅尼故，乃能如是分別說也。」

文殊師利白佛言：「世尊！我實不得彼陀羅尼。何以故？世尊！若有得是陀羅尼者，斯則名為愚癡凡夫。非佛世尊及諸菩薩得陀羅尼。所以者何？世尊！彼諸凡夫癡眾生等有取著故得陀羅尼。取著何等？所謂取著我故得陀羅尼、取著人故得陀羅尼、取著壽命故得陀羅尼、取著丈夫故得陀羅尼、取著斷滅故得陀羅尼、取著常恒故得陀羅尼、取著貪欲故得陀羅尼、取著瞋恚故得陀羅尼、取著愚癡故得陀羅尼、取著無明故得陀羅尼、取著有愛故得陀羅尼、取著身見故得陀羅尼、取著五陰故得陀羅尼、取著十二入故得陀羅尼、取著十八界故得陀羅尼、取著憶念故得陀羅尼、取著分別故得陀羅尼、取著六十二見故得陀羅尼，如是乃至取著一切諸行故得陀羅尼，是故凡夫得陀羅尼。所以者何？若法為彼愚癡取著，是則凡夫所得，非謂佛得、非聲聞得、非辟支佛得、非菩薩得，以是義故唯彼凡夫得陀羅尼。何以故？彼諸凡夫以愚癡故言有取得，非佛世尊及菩薩等。」

爾時善住意天子復白文殊師利言：「大士！仁若不得陀羅尼者，將無墮彼頑鈍位乎？」

文殊師利言：「如是天子！我真頑鈍。何以故？夫頑鈍者謂無所知，我所行處不可知故。是故一切諸佛世尊及諸聲聞緣覺菩薩皆墮頑鈍，非諸凡夫。所以者何？一切凡夫在於數中，諸餘智人盡入頑鈍。如須陀洹障礙行故，貪欲心行尚墮數中，何況愚癡諸凡夫等而非數也。天子！是故得言我為頑鈍。我實不得彼陀羅尼。何以故？乃至一法我無所得故。」說是法時，彼大眾中有五百比丘聞此法門不能信受，生大恐怖起誹謗心，發惡心已棄捨而去，即自見身墮大地獄。

爾時尊者舍利弗白文殊師利言：「大士！仁今且住，勿說如此甚深經典。所以者何？今此會中五百比丘聞此法門不能信受，生大怖畏起誹謗心，即自見身已處地獄。」

文殊師利語舍利弗言：「舍利弗！汝今不當妄起分別。何以故？乃至無有一法墮地獄者。所以者何？一切諸法無所生故。汝今云何忽發斯言，令我休止勿宣是法。舍利弗！若善男子善女人依止我見、依止人見、依眾生見、依壽者見、依諸見已，雖復供養恒沙如來、應供、正遍覺及比丘僧，一切眾具隨須奉給，如是供養盡其形壽無有休廢。若復有人聞我所說甚深法門，一切世間所不能信，謂空無相無願無作、寬大寂靜、無生無滅、無我無人無眾生無壽命、無常苦無我，如是諸法聞已誹謗墮於地獄。然舍利弗！即此善男子善女人得聞如是甚深法已，雖墮地獄，從地獄出速得涅槃。若善男子善女人雖復供養恒沙數如來、應供、正遍覺，以取著我不聞如是甚深經法，終不解脫速證涅槃。」

爾時世尊讚文殊師利言：「善哉善哉。文殊師利！如是如是，誠如汝言。若有得聞如是甚深微妙經典，與值佛出世等無有異。何以故？若有欲證須陀洹果，要由此經；欲證斯陀含、欲證阿那含及阿羅漢，要聞此經。所以者何？以不著我乃能證法。證此法時無有所見，無所得故。」

爾時世尊告尊者舍利弗言：「舍利弗！汝當知此五百比丘雖墮地獄，後從獄出速證涅槃。非彼愚癡凡夫之人沒於見得墮墜疑心，供養如來能得解脫。舍利弗！是諸比丘還復因此乃至解脫速得涅槃，非是餘人能速解脫。所以者何？以不聞此深法門故。舍利弗！若有善男子善女人得聞如是甚深法門一經於耳，雖不信受墮於地獄，然速解脫。其有墮見入地獄者，未能解脫。」

${mvp.startInVol('破凡夫相品第八', 'p08', '破二乘相品第七第二')}

爾時善住意天子復白文殊師利言：「大士！仁今許我修梵行乎？」

文殊師利言：「如是天子！汝今若能不念作求、不思進趣，如是吾將許汝梵行。」

善住意言：「大士！以何義故如斯說耶？」

文殊師利言：「天子！若有為作可名梵行，若無為作何名梵行？又復天子！若有見得可名梵行，若無見得何名梵行？」

善住意言：「大士！仁今寧當無梵行耶？」

文殊師利言：「如是如是。天子！我無梵行。所以者何？夫梵行者則非梵行，非梵行故我名梵行。」

時善住意天子讚文殊師利言：「善哉善哉。大士！仁以具足樂說辯才，能作如是無障礙說。」

文殊師利言：「天子！若吾具足無礙辯者，即成障礙。何以故？凡是取著我及我所，皆由分別。一切分別無非障礙故。」

爾時文殊師利復語善住意天子言：「天子！汝今若能斷除一切眾生命根，然不執刀、不持杖、不把棓、不捉塊而行事者，吾當同汝修於梵行。」

善住意言：「大士！復以何義如斯說耶？」

文殊師利言：「天子！言眾生者，於意云何？」

善住意言：「大士！我言眾生，眾生者乃至一切，但有名字，皆想取故。」

文殊師利言：「天子！是故我言，汝今當須殺害我想、殺害人想、殺眾生想、殺壽命想，乃至滅除名字等想，如斯殺也。」

善住意言：「大士！當以何殺具而行殺乎？」

文殊師利言：「天子！吾常用彼利智慧刀而行殺害。當行殺時，彼利智刀應如是執、當如是害，然亦無有執持之想及以害想。天子！以是義故，汝當善知殺害我想及眾生想，是名真殺一切眾生，如是吾當許汝梵行。」

爾時文殊師利復語善住意天子言：「天子！我復語汝，汝若修行十惡業道，復能成就黑濁垢法，放損一切十善業道，破壞離散清白法者，我當共汝修於梵行。」

善住意言：「大士！以何義故復如是說？」

文殊師利言：「天子！所有一切染濁清白皆悉平等。彼平等者，我得如此，同汝梵行。天子！於意云何？汝以何法為染濁平等？」

善住意言：「以不貪不作不退不墮，是謂染濁平等。」

文殊師利言：「天子！復以何法為白淨平等？」

善住意言：「以如、法性及與實際三解脫門，是謂白淨平等。」

文殊師利言：「天子！吾即令汝真法界中具足修行周旋往返，其事可乎？」

善住意言：「不也。大士！」

文殊師利言：「天子！以是義故我作斯說，染濁清白一切等者，然後方可共修梵行。」

爾時文殊師利復語善住意天子言：「天子！汝今若能取應死人，手執利刀斬其頭者，吾當許汝如是梵行。」

善住意言：「大士！以何義故復作此說？」

文殊師利言：「天子！可殺者誰？何者是頭？誰能行殺？天子！汝今當知，須殺貪欲、須殺瞋恚、須殺愚癡，如是乃至我慢嫉妬、欺誑諂曲、執著取相及受想等，天子！是為可殺。天子！若人一心專精自守，貪欲心發即應覺知，方便散除還令寂靜。云何散除？應作是念：『此是空、此不淨。求此欲心生處滅處，從何所來？去至何所？是中誰染、誰受染者、誰為染法？』如是觀時，不見能染、不見所染、不見染事，以不見故則無有取，以不取故則無有捨，以不捨故則無有受，不捨不受則名離欲寂滅涅槃。如是乃至一切受心，亦如是說。天子當知，如是殺法即殺即生，是故得言彼行殺時先斬其頭是為真殺，以是義故我如此說。」

爾時文殊師利復語善住意天子言：「天子！汝今若能違背諸佛、毀謗法僧，吾將同汝如是梵行。」

善住意言：「大士！仁今何故復如是說？」

文殊師利言：「天子！如汝意者，以何為佛？」

善住意言：「大士！如如法界，我言是佛。」

文殊師利言：「天子！於意云何？如如法界可染著乎？」

善住意言：「不也。大士！」

文殊師利言：「天子！以是義故我如是說，汝今若能毀謗諸佛，吾將同汝如是梵行。」

文殊師利言：「天子！如汝意者，以何為法？」

善住意言：「大士！離欲寂靜，我名為法。」

文殊師利言：「天子！於意云何？彼寂靜法可染著乎？」

善住意言：「不也。大士！」

文殊師利言：「如是天子！以此義故我如是說，汝今若能誹謗正法，吾將同汝如是梵行。」

文殊師利言：「天子！如汝意者以何為僧？」

善住意言：「大士！無為法者是名聖僧。如世尊說，一切聖人以無為得名，故無為法名聲聞僧。」

文殊師利言：「天子！於意云何？是無為法可執著乎？」

善住意言：「不也。大士！」

文殊師利言：「如是天子！以此義故我如是說，汝今若能破壞聖僧，吾將同汝如是梵行。」

文殊師利言：「天子！若人見佛彼則著佛，若人見法彼則著法，若人見僧彼為著僧。何以故？以佛法僧非可得故。天子！若人不見佛、不聞法、不識僧者，彼為不背佛、不謗法、不破僧。何以故？以其不得佛、法、僧故。天子！若人愛佛、愛法、愛僧，彼為染著佛、法及僧。天子當知，若人不著佛、法、僧者，是則名為離欲寂滅。天子！以此義故我如是說，汝今若能於佛法僧不染著者，我則同汝如是梵行。」

爾時善住意天子復白文殊師利言：「大士！希有希有！今日乃能宣說如是甚深義處。我於大士以何報恩？」

文殊師利言：「天子！汝莫報恩。」

善住意言：「大士！我今云何得不報也？」

文殊師利言：「天子！汝莫報恩。所以者何？天子！汝能如是不報恩者，即為報也。」

善住意言：「大士！仁今寧可無報恩乎？」

文殊師利言：「天子！如是如是，我不報恩亦非不報。」

善住意言：「大士！仁以何義更作是說？」

文殊師利言：「天子！凡愚之人造種種法、起種種見、行種種行。以作如是種種見行，是故念言我當報恩。天子！此非正行善男子也。其有正行善男子者，乃至無有少作、或作不作，彼終不言我念報恩。又復天子！不報恩者，如佛世尊宣說平等，謂一切法悉無所作、無有作處、皆入平等、無有轉還，亦無超越、非自非他、無作不作，是故我為無報恩也。」

爾時善住意天子復白文殊師利言：「大士！仁住何處作如是說？住忍說乎？住法說也？」

文殊師利言：「天子！我所住者非忍非法。」

善住意言：「大士！實住何處故如是說？」

文殊師利言：「天子！我無所住。如化人身，我如是住。」

善住意言：「大士！彼化人者復依何住？」

文殊師利言：「天子！如如如住，化如是住。天子！若如是者，汝云何言，住在何處？為忍為法？如斯問也。天子！是故我所言忍，但有其名名無住處。法亦如是無有住處，無有動轉亦無分別。天子當知，一切諸法悉無住處，而言住者，是謂如來為諸眾生作如是說。所以者何？如佛所說，如來住彼如如法中。一切眾生亦復如是，住於如如初不移動。如眾生如即如來如，如來如即眾生如，眾生如來無二無別。」

爾時善住意天子復白文殊師利言：「大士！所言沙門那，沙門那者義何謂也？」文殊師利言：「天子！若非沙門、非婆羅門，是則名為真沙門也。所以者何？以彼不著欲界、不著色界、不著無色界，是故我言真沙門也。天子！若眼不漏、耳不漏、鼻不漏、舌不漏、身不漏、意不漏者，我復說為真沙門也。天子！若不依止說、不依止證、不依止處者，我復說為真沙門也。天子！若無去處、無來處、無傷無瘡者，我復說為真沙門也。天子！是以彼句非沙門、非婆羅門，我乃說為真沙門也。」

爾時善住意天子讚文殊師利言：「善哉善哉。大士！實未曾有。仁者志若金剛，其所宣說無有章句亦無處所，心咸了達無所遺餘。」

文殊師利言：「天子！我心不剛。所以者何？吾自放意心安柔忍，是故不剛。」

善住意言：「大士！是義云何？」

文殊師利言：「天子！吾以恣心入聲聞地、處緣覺境，是謂放心。吾又恣心入諸塵勞生死之內，而亦不惡貪恚癡等煩惱過患，是謂放心。」

時善住意天子復讚文殊師利言：「善哉善哉。希有大士！仁由過去久供諸佛殖眾德本，故能宣說妙若斯也。」

文殊師利言：「天子！吾無供佛、不殖善根。所以者何？吾初不見宿昔所更，又亦不知當來所作，雖有所作亦無有作。於諸佛法未曾建立，云何能有殖眾德本？」

${mvp.startInVol('神通證說品第九', 'p09', '破凡夫相品第八')}

爾時善住意天子復白文殊師利言：「大士！我昔曾聞如幻三昧，唯願垂慈顯此正受。」

文殊師利言：「天子！汝欲見聞如幻三昧甚深境界乎？」

善住意言：「大士！我誠願見。」

時文殊師利如言即入如幻三昧。應時十方如恒沙等諸佛國土，一切境界自然現前。於是善住意天子悉見東方恒沙佛土，其中所有種種眾事，或見比丘稱揚宣說如是經典，或見比丘尼像，或見優婆塞優婆夷像，或見大梵天王、天帝釋、四天大王，或見人間轉輪聖王，或見一切天、龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽，乃至或見一切鳥獸種類若干形貌好醜，皆為說法。如此東方，南西北方四維上下一切十方，咸有如是恒河沙等諸佛國土所有事業，亦皆如是等無有異；盡是文殊師利威神力也。

時善住意天子既見如是十方佛土一切境界，歡喜踊躍不能自持。於是文殊師利從三昧起，善住意天子一心敬仰，白文殊師利言：「大士！向見十方諸佛國土無量境界，佛事亦殊，而各宣說如斯經典。」

爾時文殊師利問善住意天子言：「天子！於意云何？汝向所見東方所有一切境界，可謂實乎？」

善住意言：「不也。大士！」

文殊師利言：「如此東方及餘九方，如是十方所有境界，復為實乎？」

善住意言：「大士！一切皆虛無有實也。所以者何？一切諸法本無有生，其猶幻化欺誑世間。一切諸法轉變推移無常存者，皆是虛妄顯現所為。窮其體實了不可得，不作不生不起不滅。」

於是文殊師利讚善住意言：「善哉善哉。天子！誠如汝言。」

爾時會中有五百菩薩，已得四禪成就五通。然是菩薩依禪坐起，雖未得法忍亦不誹謗。時諸菩薩宿命通故，自見往昔所行惡業，或殺父殺母殺阿羅漢，或毀佛寺破塔壞僧。彼等明見如是餘業，深生憂悔常不離心，於甚深法不能證入。我心分別彼罪未忘，是故不能獲深法忍。

爾時世尊為欲除彼五百菩薩分別心故，即以威神覺悟文殊師利。文殊師利承佛神力從座而起，整理衣服偏袒右髆，手執利劍直趣世尊。欲行逆害時，佛遽告文殊師利言：「汝住汝住。不應造逆，勿得害我。我必被害，為善被害。何以故？文殊師利！從本已來無我無人無有丈夫，但是內心見有我人。內心起時，彼已害我，即名為害。」

時諸菩薩聞佛說已，咸作是念：「一切諸法悉如幻化，是中無我、無人、無眾生、無壽命、無丈夫、無摩奴闍、無摩那婆、無父無母、無阿羅漢、無佛無法無僧、無有是逆、無作逆者，豈有墮逆？所以者何？今此文殊師利聰明聖達智慧超倫，諸佛世尊稱讚。此等已得無礙甚深法忍，已曾供養無量百千億那由他諸佛世尊，於諸佛法巧分別知，能說如是真實之法，於諸如來等念恭敬，而忽提劍欲逼如來。世尊遽告：『且住且住。文殊師利！汝無害我。若必害者，應當善害。』所以者何？是中若有一法和合集聚，決定成就得名為佛名法名僧、名父名母名阿羅漢，定可取者則不應盡。然而今此一切諸法，無體無實、非有非真、虛妄顛倒、空如幻化，是故於中無人得罪、無罪可得。誰為殺者而得受殃？」彼諸菩薩如是觀察明了知已，即時獲得無生法忍，歡喜踊躍，身昇虛空高七多羅樹，以偈歎曰：

/gatha/
「諸法如幻化，　斯由分別起，　是中無所有，　一切法皆空。
　顛倒虛妄想，　愚癡取我心，　計念我昔愆，　所作業中甚。
　過去為大逆，　殺父母良田，　殺羅漢比丘，　是為極重惡。
　以彼惡業故，　我當受大苦，　沒疑網眾生，　聞法悔或除。
　大名拔我毒，　破散我疑心，　我已覺法界，　眾惡無所有。
　諸佛巧方便，　善知我等意，　方便度眾生，　為解諸疑縛。
　何處有諸佛？　法僧亦復然，　父母本自無，　阿羅漢空寂。
　是處無有殺，　云何有業果？　如幻無所生，　諸法性如是。
　文殊大智人，　深達法源底，　自手握利劍，　馳逼如來身。
　如劍佛亦爾，　一相無有二，　無相無所生，　是中云何殺？」
//

說此執劍妙法門時，十方如恒沙等諸佛世界六種振動。時彼十方諸佛世界一切諸佛現前說法，彼佛侍者各於本國大眾會中從座而起，咸請其佛言：「世尊！今此神變是誰威德而令世間大地振動？」時十方諸佛各各告其弟子曰：「諸善男子！今有世界名曰娑婆，彼土有佛，號釋迦牟尼如來、應供、正遍覺，現在說法。然彼世界有一上首菩薩摩訶薩名文殊師利，久已不退於阿耨多羅三藐三菩提。為欲破壞新學菩薩執著心故，躬秉利劍馳走趣彼釋迦如來，顯發深法。以是因緣故，令大地如是振動。彼佛世尊因智劍故說甚深法，復令無量無邊阿僧祇眾生法眼清淨、心得解脫、證深法忍、安住菩提。」

爾時世尊建立如是大神變時，以方便力令彼眾中一切諸來新學菩薩——善根微少、未離分別取相眾生——皆悉不覩彼執劍事，亦不得聞其所說法。

爾時尊者舍利弗白文殊師利言：「大士！仁今已造極猛惡業，欲害如是天人大師。是業若熟，當於何受？」

時文殊師利告舍利弗言：「如是大德！如汝所說，我今唯能造作如是極重惡業，而實不知於何處受？然舍利弗！如吾見者，當若化人幻業熟時，我如斯受。所以者何，彼幻化人無心分別、無有念想，一切諸法皆幻化故。又舍利弗！我今問汝，隨汝意答。於意云何？如汝意者實見劍耶？」

舍利弗言：「不也。」

文殊師利曰：「又定見彼惡業可得耶？」

舍利弗言：「不也。」

文殊師利曰：「又定見彼受果報耶？」舍利弗言：「不也。」

文殊師利言：「如是舍利弗！彼劍既無、復無業報，誰造斯業？誰受報者？而反問我受報處乎？」

舍利弗言：「大士！以何義故復如是說？」

文殊師利言：「如我所見，實無有法業報熟者。所以者何？一切諸法無業無報，無業報熟故。」

爾時十方世界諸來菩薩摩訶薩等，同請佛言：「世尊！唯願世尊以威德力，加是文殊師利，令至十方諸佛世界說如斯法，令彼眾生咸得聽聞，如我無異。」

於是文殊師利菩薩摩訶薩語彼十方諸菩薩言：「諸善男子！汝今宜各一心觀察自佛世界也。」

時彼十方諸菩薩眾從文殊師利聞是語已，即各觀本自佛世界，皆覩文殊師利處其佛前，為諸大眾說如斯法，復各見彼皆有善住意天子問是法門。又各見彼十方佛國諸菩薩等悉皆大集，又皆見彼諸天子眾其數多少與此不殊，又各見彼佛界清淨莊嚴微妙與此無異。彼諸菩薩摩訶薩眾如是見已，生殊特心得未曾有，同聲讚言：「甚奇甚特。今此文殊師利道德巍巍，處斯世界安住不動而能普現十方佛前。」

爾時文殊師利告彼十方菩薩眾言：「諸善男子！汝今當聽。譬如幻師既善學已，不離本座而能幻作種種色像。菩薩摩訶薩亦復如是，既能善學般若波羅蜜如幻法已，即於一切如幻法中，隨其十方諸佛國土欲現形像作諸佛事，如意即能。所以者何？一切諸法皆如幻化，以是義故所作隨心。譬如日月宮輪住虛空處，初不曾下入諸器中，其光普照靡不周遍。菩薩如是安住不動，隨心普現十方佛前，或現聲聞緣覺等身、或現梵王帝釋等像、或現四天轉輪王事、或現國主大臣政化，如是乃至示現一切惡趣眾生形類隨意即能，而亦初無興作之想。」

${mvp.startInVol('稱讚付法品第十', 'p10', '神通證說品第九')}

爾時世尊告文殊師利言：「文殊師利！若有得聞此修多羅甚深法門，與值佛興世等無有異。文殊師利！若聞此經，與證須陀洹無異、與證斯陀含無異、與證阿那含無異、與證阿羅漢無異。何以故？以彼如如無異故。文殊師利！又若聞此經心生信解，與彼後身菩薩菩提樹下坐於道場必成正覺一等無異。何以故？如斯法門即是三世諸佛世尊之要道故。」

於是文殊師利白佛言：「世尊！如是如是，如佛所說，如空無異、如無相無異、如無願無異、如如如無異、如法界無異、如實際無異、如平等無異、如解脫無異、如離欲無異。」

爾時文殊師利白佛言：「世尊！唯願如來護持如是甚深法門，於後末世五百歲時，當使此經於閻浮提遍行流布，令諸善男子善女人等咸得聞之。」文殊師利作是請時，即令三千大千世界一切音樂不鼓自鳴、一切諸樹自然欝茂、一切眾花咸悉開敷。又此三千大千世界六反振動，放大光明遍照三千大千世界，奪日月光令不復現。百千億天歡喜踊躍，得未曾有，住於虛空雨天花香，種種諸花及諸花鬘、塗香末香如雨而下，香氣氛馥充滿十方，作天樂音其聲和雅，一切咸共叉手合掌同聲稱讚：「希有希有奇特法門。今此文殊師利大士所說，令我等聞。我為福會，從生至今再遇閻浮轉大法輪。有諸眾生具足善根，然後乃得聞此深法。若諸眾生聞已信行，當知是人已曾供養一切諸佛，亦為已得甚深法忍。若有眾生聞此經典，不驚不怖、不退不沒、深心愛樂，當知是人不經二乘善根中來。」

爾時文殊師利白佛言：「世尊！今此奇瑞，將無為是法門於未來世閻浮提中遍行流布住持不滅耶？」

佛言：「如是如是。向所現瑞，唯為是經於閻浮提遍行流布住持不滅故。」

文殊師利言：「世尊！唯願世尊更建誠實，令此經典後世流行熾然不滅。」

佛言：「文殊師利！若三解脫門能證涅槃是誠實者，於後末世五百歲時，此經法門弘閻浮提熾然不滅，為誠實語。文殊師利！若苦無常、若空無我是實言者，於後末世五百歲時，此經法門弘閻浮提熾然不滅，為誠實語。」

文殊師利言：「世尊！如世尊說，無我、無人、無眾生、無壽命、無丈夫、無摩奴闍、無摩那婆、無煩惱、無清淨是實言者，於後末世五百歲時，此經法門弘閻浮提熾然不滅，是誠實語。如世尊說，無生死、無涅槃、無貪欲、無瞋恚、無愚癡、無名無色、無因無果、無有無知、無身無身證、無心無心果、無念無念處、無發無發處、無色無受無想無行無識、無眼無色、無耳無聲、無鼻無香、無舌無味、無身無觸、無意無法、無欲界、無色界、無無色界、無斷無常，如是等法是實言者，於後末世五百歲時，此經法門弘閻浮提熾然不滅，是誠實語。如世尊說，無須陀洹、無須陀洹果、無斯陀含、無斯陀含果、無阿那含、無阿那含果、無阿羅漢、無阿羅漢諸法、無辟支佛、無辟支佛諸法、無如來、無如來諸法、無證平等、無力無畏、無智果、無聖證、無空無無相無無願、無離欲處、無得本性、無有平等、無有餘處、無暗無明、無縛無解、無彼岸、無此岸、無中間、無念無覺，如此等法是實言者，於後末世五百歲時，此經法門弘閻浮提遍行流布熾然不滅，是誠實語。如世尊說，於此法門無有眾生信解脫得果、相應不相應、不合不散，如是等法為實言者，於後末世五百歲時，此經法門弘閻浮提遍行流布熾然不滅，是真實語。如世尊說，過去諸如來應供正遍覺作如斯說，無有一法能令眾生於生死中滅除煩惱解脫涅槃，亦無眾生有法生滅，乃至無有過失、無出無動。如過去佛所說，如是未來現在所說亦然。若此等法是實言者，於後末世五百歲時，此經法門弘閻浮提遍行流布，是真實語。又如世尊說此法時，無有菩薩得是三昧諸陀羅尼門，亦復無彼諸佛所說語言句義，乃至不說一文字句，無人聽聞、無人得解、無人成佛，如此等法是實言者，於後末世五百歲時，此經法門弘閻浮提遍行流布熾然不滅，是真實語。如世尊說，無有戒身、無有三昧、無有智慧、無有解脫、無有解脫知見，如此等法是實言者，於後末世五百歲時，此經法門弘閻浮提普宣流布熾然不滅，是真實語。如世尊說，諸菩薩等不行布施、不持禁戒、不修忍辱、不發精進、不入禪定、不得般若、不求菩提、不轉諸地、不得佛道、不得諸力、不得無畏、不得諸相、不獲諸辯、不轉法輪、不度眾生令取正覺，如此等法是實言者，於後末世五百歲時，此經法門弘閻浮提普宣流布熾然不滅，為真實語。」文殊師利宣此誠實誓時，三千大千世界大地六種振動。

爾時彌勒菩薩摩訶薩白佛言：「世尊！有何因緣，今此世界如是大動？」

佛告彌勒菩薩言：「彌勒！汝今不應問如是事。所以者何？來世眾生鈍根少信聞不能解，墮於疑慢長夜不安。」

於是彌勒菩薩復白佛言：「世尊！唯願說之。世尊若說，能多利益一切世間天人大眾故。」

佛告彌勒：「如是經典，往昔已有七十四億百千那由他諸佛世尊於此方所稱揚讚說，皆因文殊師利及善住意天子等問答諮論也。」

彌勒菩薩復白佛言：「世尊！是文殊師利及善住意天子，聞此法門其久近耶？」

佛告彌勒：「乃往過七阿僧祇劫，有佛世尊號普花最上師子遊步勝功德聚如來、應供、正遍覺所，是善男子等從彼佛所初聞此經也。」

說是經時，眾中有若干恒河沙眾生皆發阿耨多羅三藐三菩提心，復倍前數眾生得住不退轉忍，復倍前數眾生遠塵離垢得法眼淨。

爾時世尊說此經已，於是文殊師利與善住意天子，及彼十方諸菩薩眾，及彼一切諸天子眾，及尊者舍利弗、尊者摩訶迦葉，諸比丘眾乃至所有天、人、阿修羅、諸龍、鬼神一切眾等，聞佛所說，皆大歡喜，信受奉行。
