如是我聞：

一時婆伽婆在舍婆提城祇樹給孤獨園，與大比丘僧五千人俱，菩薩摩訶薩八千人俱。

其名曰：文殊師利菩薩、觀世音菩薩、大勢至菩薩、德藏菩薩、彌勒菩薩，如是等菩薩摩訶薩而為上首。

爾時世尊與百千大眾恭敬圍遶而為說法。爾時摩訶迦葉在大眾中，從坐而起，偏袒右肩右膝著地，合掌恭敬白佛言：「世尊！我欲少問如來、應、正遍知，若佛聽許乃敢諮問。」

佛告迦葉：「恣汝所問。如來悉能為汝分別，斷汝疑心令得歡喜。」

爾時摩訶迦葉白佛言：「世尊！若有善男子善女人欲求涅槃，於正法中出家，當云何學？云何行？云何修觀？」

爾時世尊告摩訶迦葉：「善哉善哉。迦葉！汝今善能問於如來如是之義。如汝所問，為利一切諸天世人令得安樂。汝今諦聽善思念之，吾當為汝分別解說。」

爾時摩訶迦葉白佛言：「世尊！如是。願樂欲聞。」

佛告迦葉：「善男子善女人欲求涅槃，於正法中出家，應學淨戒，具律儀戒，具正法教，於清淨戒微細不犯，應如是學。隨順正法離諂曲心，遠離貪欲具足慚愧，常畏生死樂求遠離，厭離生死常念涅槃。若在樹下、若山巖間、若在靜室、若在窟中，初修正意，念於如來、應、正遍知、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、婆伽婆，生具足種姓、具足善根，具足無量淨戒、無量三昧、無量智慧、無量解脫、無量解脫知見，具足一切無邊佛法不可思議，具足無等無邊功德。實語真語，所言無二不誑眾生。為大醫王能拔毒箭，為不請友具大慈悲，為大導師說甚深法令入甚深，說寂滅法令得寂滅。空無眾生、無相斷相、無願離願、無有戲論離諸戲論，甚深難見難覺。其性遠離，離於有無，無行斷行、無說離說。無相平等，離垢清淨無取無捨，能滅諸苦、能斷渴愛令至涅槃。迦葉！比丘如是一日若過一日，在於靜室心念如來，作是思念：『我得人身，得出家道，得比丘法，親近如來，不應懈怠。所以者何？於此修戒當得道果。以是因緣於未來世，若佛出世當得見佛，佛出世難如優曇花。』迦葉！比丘修行應學慧命須菩提之所修行。

「迦葉！如來、應、正遍知難得見聞，於正法中而得出家，具比丘戒甚為希有。善男子善女人於正法中出家者，為二事故。何等為二？一者為現得道果故，二者為見未來佛故。迦葉！有諸癡人，受著袈裟違背如來，自謂我得道果聖人。是人若在靜室、若在窟中，貪心思念：『一切施主施我衣鉢。』作如是念：『如來不知我、不覺我、不見我。』迦葉！比丘若在靜室、若在窟中，若行若坐若臥，若念貪欲、若念瞋恚及餘種種諸惡覺觀。隨所住處，其中諸神知彼比丘，心生愁憂作如是念：『此諸比丘非法非宜。於正法中得出家已，思惟如是不善之法。』迦葉！彼諸神等知彼比丘，各作方便令不安隱。迦葉！彼諸天神以少善根得少智慧尚知他心，況復如來百千萬億阿僧祇劫具行智慧？迦葉！如來無所不知、無所不見、無所不覺、無所不證。迦葉！如來具足無礙智慧，於三世法皆悉了知。是故迦葉！善男子善女人於正法中得出家者，應作是念：『諸佛如來悉知我心，十方世界現在諸佛亦知我心，莫於佛法作沙門賊。』迦葉！云何名沙門賊？沙門賊有四種。何等為四？迦葉！若有比丘整理法服，似像比丘而破禁戒作不善法，是名第一沙門之賊。二者於日暮後其心思惟不善之法，是名第二沙門之賊。三者未得聖果，自知凡夫，為利養故自稱我得阿羅漢果，是名第三沙門之賊。四者自讚毀他，是名第四沙門之賊。迦葉！是名四種沙門之賊。迦葉！譬如有人具大勢力，於閻浮提一切眾生所有珍寶，金銀琉璃真珠珊瑚虎珀等寶，刀杖加害皆悉奪取。迦葉！於汝意云何？此人得罪寧為多不？」

迦葉白佛言：「甚多。世尊！」

佛告迦葉：「若有凡夫未得聖果，自知凡夫，為利養故自稱我得須陀洹果，若受一食，罪多於彼。」

爾時摩訶迦葉白佛言：「希有世尊！如來說此律儀之法，誰聞此法未得聖果自說得道受一盞水。」

佛告迦葉：「如是如是，如汝所說。若欲離生死者，應如是行，如救頭燃。迦葉！若復有人身具大力，於四天下眾生資身之具，加以刀杖悉皆奪取。迦葉！於意云何？彼人以此劫奪因緣，得罪多不？」

迦葉白佛：「甚多。世尊！甚多。善逝！」

佛告迦葉：「若凡夫人未得聖果，為利養故自稱我得斯陀含果，受一食施，罪多於彼。迦葉！若復有人於千世界所有眾生一切資具，金銀琉璃真珠珂貝虎珀珊瑚種種諸寶，無價寶衣騎乘宮殿飲食之具，刀杖加害悉皆劫奪。迦葉！於意云何？彼人以是劫害因緣，得罪多不？」

迦葉白佛：「甚多。世尊！甚多。善逝！」

佛告迦葉：「若有眾生未得聖果，自知凡夫，為利養故自稱我得阿那含果，受人信施乃至一食，罪多於彼。迦葉！若復有人身具大力，於中千世界一切眾生，若天、龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽、人非人等一切樂具，刀杖加害悉皆劫奪。迦葉！於意云何？彼人以是加害因緣，得罪多不？」

迦葉白佛：「甚多。世尊！甚多。善逝！」

佛告迦葉：「若有眾生未得聖果，自知凡夫，為利養故自稱我得阿羅漢果，受人信施乃至一食，罪多於彼。迦葉！寧奪三千大千世界眾生一切樂具，不應自稱我得聖果，受人信施乃至一食。迦葉！我觀沙門法中，更無有罪重於妄稱得聖果者。

「迦葉！聲聞之人有四惡欲。何等為四？一者求見未來世佛，二者求作轉輪聖王，三者願生剎利大姓，四者願生婆羅門大姓。是名四種惡欲。若有所求乃至涅槃，亦名惡欲，是名如來祕密之說。迦葉！聲聞之人有四種性，於一切時一切事所不應作。何等為四？一者著我，二者著人，三者犯戒，四者求未來佛法。此四種性，聲聞之人於一切時一切事所不應作。迦葉！若有沙門婆羅門持淨戒者，我為彼說阿耨多羅三藐三菩提，終不為彼惡欲人說。為持戒人心不諂曲求涅槃者，令其安隱是故為說。迦葉！我今更說，令諸行者聞已歡喜。迦葉！若復有人以一切樂具供養四天下一切眾生，若一劫若減一劫。迦葉！若復有人以一器水施於持戒正命之人。彼善男子善女人，所得功德勝前布施無量無邊。迦葉！是惡欲人若受人施，傷害於人過於一切惡友怨敵。迦葉！出家之人微細煩惱，復有四種。具彼煩惱，如負重擔入於地獄。何等為四？一者見他得利心生嫉妬，二者聞經禁戒而反毀犯，三者違反佛語覆藏不悔，四者自知犯戒受他信施。迦葉！是名四種微細煩惱。出家之人具此煩惱，如負重擔入於地獄。迦葉！有四種相似沙門。何等為四？一者惡戒，二者我見，三者誹謗正法，四者斷見。是名四種相似沙門。迦葉！出家之人有四放逸，入於地獄。何等為四？一者多聞放逸，自恃多聞而生放逸。二者利養放逸，得利養故而生放逸。三者親友放逸，依恃親友而生放逸。四者頭陀放逸，自恃頭陀自高毀人。是則名曰四種放逸。迦葉！出家之人具四放逸，墮於地獄。」

爾時摩訶迦葉白佛言：「世尊！當來末世後五百歲，有相似沙門，身被袈裟，毀滅如來無量阿僧祇劫所修集阿耨多羅三藐三菩提。」

爾時世尊告摩訶迦葉：「汝莫以此問於如來。何以故？迦葉！彼愚癡人實有過惡，如來不說。以惡欲故，其心妄執邪行諂曲，一切魔事皆悉信受。彼愚癡人實有過惡，如來不說。」

爾時摩訶迦葉白佛言：「世尊！唯願如來久住世間為我說法。」

佛告迦葉：「如來不久當般涅槃。」

迦葉白佛言：「世尊！唯願世尊住世一劫、若減一劫，守護正法。」

爾時世尊告摩訶迦葉：「彼諸癡人，假使千佛出興於世，種種神通說法教化彼愚癡人，於彼惡欲不可令息。迦葉！當來末世後五百歲，有諸眾生具足善根其心清淨，能報佛恩守護我法。」

爾時摩訶迦葉白佛言：「世尊！我寧頂戴四大天下一切眾生、山河石壁城邑聚落，滿於一劫若減一劫，不能聞彼愚癡眾生不信之音。世尊！我寧坐於一胡麻上，滿於一劫若減一劫，不能聞彼不信癡人破戒之音。世尊！我寧在於大劫火中，若行若立若坐若臥百千億歲，不能聞彼不信癡人破戒之音。世尊！我寧受於一切眾生瞋恚罵辱撾打加害，不能聞彼不信癡人偷法大賊毀禁之聲。世尊！我修少行智慧微淺，如是重擔我不能堪。世尊！唯有菩薩堪能荷負如斯重擔。世尊！我於此中欲說譬喻。世尊！譬如有人年耆極老年百二十，身癭長病臥在床席不能起止。時有一人巨富饒財，齎持珍寶至病人所，而語之言：『我有緣事當至他方。以寶相寄，為我守護。或十年還、若二十年，待我還時，汝當歸我。』彼老病人臥在床席，無有子息唯獨一身。彼人去已未久之間，時彼病人困至命終，所寄財物悉皆散失，彼人行還求索無所。世尊！聲聞之人亦復如是，智慧微淺修行甚少又無伴侶，不能久住在於世間。若付正法，不久散滅。」

爾時世尊讚迦葉言：「善哉善哉。迦葉！我已了知而故付汝，令彼癡人得聞此已，生於悔心。」

爾時摩訶迦葉白佛言：「世尊！我今更欲說第二喻。世尊！譬如有人身力盛壯無諸患苦離一切病，壽命無量百千萬歲，生大種姓具足財寶，善持淨戒、有大慈悲、內懷歡喜，能捨一切眾生煩惱。其心勇猛，利益多人令得安樂，利益天人。時有一人齎持寶物來至其所，而語之言：『我有緣事當至他方。以寶相寄，當好守護。若十年還、若二十年，待我來時，當見相還。』其人得寶藏積守護，彼人行還即便歸之。世尊！菩薩摩訶薩亦復如是，若以法寶付諸菩薩，無量千億那由他劫終無失壞，利益無量無邊眾生，不斷佛種、不斷法輪、僧寶具足。世尊！如是之事我不能持，唯有菩薩乃能堪受。世尊！此彌勒菩薩摩訶薩俱在此會，如來付之，於當來世後五百歲法欲滅時，如來無量阿僧祇劫所集阿耨多羅三藐三菩提法，悉能守護流演廣說。何以故？世尊！此彌勒菩薩摩訶薩，於當來世當證如來阿耨多羅三藐三菩提。世尊！譬如國王第一太子灌頂受位，當為王事如法治世，王諸群臣悉皆朝宗。世尊！彌勒菩薩摩訶薩亦復如是，治法王位守護正法。」

爾時世尊讚摩訶迦葉：「善哉善哉。如汝所說。」

爾時世尊即申右手，猶如金色微妙光明，無量阿僧祇劫善根所集，其指掌色猶如蓮花，以摩彌勒菩薩摩訶薩頂。作如是言：「彌勒！我付囑汝，當來末世後五百歲正法滅時，汝當守護佛法僧寶，莫令斷絕。」

爾時如來申金色手摩彌勒菩薩頂時，於此三千大千世界六種震動，光明遍滿三千大千世界。爾時地天及虛空天，上至阿迦膩吒天，悉皆合掌白彌勒菩薩摩訶薩言：「如來以法付囑聖者，唯願聖者為利一切諸天人故受此正法。」

爾時彌勒菩薩從坐而起，偏袒右肩右膝著地，合掌恭敬白佛言：「世尊！我為利益一一眾生，尚受無量億劫之苦，況復如來付我正法而當不受？世尊！我今受持，於當來世演說如來無量阿僧祇劫所集阿耨多羅三藐三菩提。」彌勒菩薩說此語時，三千大千世界六種震動。

爾時彌勒菩薩摩訶薩復白佛言：「世尊！不應於餘眾生而起諍論及增上慢。何以故？世尊！正事業者，謂護正法。世尊！若聲聞辟支佛，不能荷負菩薩重擔。」

爾時世尊讚彌勒菩薩摩訶薩言：「善哉善哉。彌勒！如汝今日至於我前作師子吼，受持守護如來正法。如是恒河沙等過去諸佛前諸大菩薩，亦復如是作師子吼守護正法。」

爾時彌勒菩薩摩訶薩白佛言：「世尊！唯願世尊說當來世愚癡人輩，自稱菩薩、自稱沙門，為名利故惱亂施主知識親屬。唯願世尊說其過惡。何以故？若世尊說其過惡，我得聞已自攝心行。彼愚癡人聞如來說，或得信解如來知我、如來覺我。」

爾時世尊告彌勒言：「善哉！諦聽，善思念之，當為汝說彼癡人過。彌勒！當來末世後五百歲，有諸眾生自稱說言我是菩薩。彼諸惡欲我今說之。彌勒！具四法者自稱菩薩。何等為四？一者求利養，二者求名聞，三者諂曲，四者邪命。彌勒！具此四法，是故自稱我是菩薩。」

佛告彌勒：「當來末世後五百歲，自稱菩薩而行狗法。彌勒！譬如有狗前至他家，見後狗來，心生瞋嫉嘊喍吠之，內心起想謂是我家。」

佛告彌勒：「當來末世後五百歲，亦復如是。自稱菩薩行於狗法，至他施主家中生己家想，既起此想便生貪著。前至他家見後比丘，瞋目視之心生嫉恚，而起鬪諍互相誹謗言：『某甲比丘有如是過。某甲比丘有如是過。汝莫親近某甲比丘。汝若親近某甲比丘，則為眾人之所輕賤，增長罪垢。』如是之人心生嫉妬，行餓鬼因貧賤之因。為自活故，妄稱己身以為菩薩。為衣食故，讚歎如來智慧功德，令餘眾生生於信仰，內自犯戒惡欲惡行。」

佛告彌勒：「汝觀來世，有如是等大怖畏事。師子之獸應師子吼作師子業，非野干鳴作野干業，讚歎能捨一切財物而自慳悋不能離貪，讚歎慈愍自行瞋恚，讚歎忍辱自行不忍，讚歎四攝自不能行布施愛語利益同事，但有言語而不能學樂精進菩薩之行。

「彌勒！往昔過去無量無邊不可稱計不可思議阿僧祇劫，爾時有佛，號曰智上如來、應供、正遍知、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、婆伽婆。彌勒！彼佛出於五濁惡世。時佛法中有一菩薩比丘名樂精進，具足念慧，少欲知足順如來教，遊諸村邑為人說法，國王大臣一切人民之所知識尊重恭敬。時彼比丘欲入城邑先自觀察，若得尊重愛語讚歎，然後入城。復遊邪見不信之處，於彼不得善語供養，唯得瞋恚罵詈撾打。而彼比丘被忍辱鎧，安住大悲不捨眾生，亦不瞋恚不生悔心。彌勒！樂精進菩薩所化眾生，悉為比丘而作施主，奉施衣食臥具湯藥。」

佛告彌勒：「於意云何？時彼比丘不至餘家。有嫉妬不？」

彌勒白佛：「不也。世尊！」

佛告彌勒：「汝觀樂精進菩薩利益之心，少欲知足大悲觀察，城邑聚落不得食處則止不入。化邪見人，為餘比丘而作檀越，更不重入。化諸邪見不信之處，令其正信，瞋恚打罵心不瞋恨。如是彌勒！過去之世諸大菩薩入於村邑，為化眾生不為自活。彌勒！莫作異觀。爾時樂精進菩薩豈異人乎？我身是也。彌勒！是故菩薩若入村邑欲化眾生，當學樂精進菩薩摩訶薩。復應學餘大菩薩行，莫學狗法。」

佛告彌勒：「當來末世後五百歲，有諸比丘自言菩薩，為衣食故入於聚落，不為教化眾生入於聚落，唯為財物遞相誹謗。自得便喜，見他得利愁憂瞋恚。自求不得便生愁憂，見他不得便生歡喜。彌勒！汝觀彼人如是顛倒。為菩薩法，所有樂具應悉捨與一切眾生。何以故？以大悲心故發廣大願，令諸眾生悉得樂故。彌勒！譬如長者居士唯有一子，顏貌端正，敬順父命，愛之甚重。以少因緣繫在牢獄。父時聞之親自入獄。彌勒！於汝意云何？如是長者入於牢獄為何事故？」

彌勒菩薩白佛言：「世尊！為見子故入於獄中求出解脫。」

佛告彌勒：「言牢獄者，即是生死。長者居士，喻諸菩薩。言一子者，如諸菩薩摩訶薩於諸眾生如一子想。彌勒！如彼長者居士入於牢獄為見其子愍而救之。菩薩摩訶薩亦復如是，入於聚落，不為飲食衣服臥具，為化眾生令得解脫。」

佛告彌勒：「當來末世後五百歲，有諸比丘，不修身、不修心、不修戒、不修慧。彼諸比丘入於聚落，持諸香花與人作信，以求衣服臥具飲食。」

佛告彌勒：「比丘之法，不應如是作下賤業入於村邑。若入村邑，應為求法、求善知識，莫懷諂曲、莫起憍慢，應作法語，莫說世事、莫說田宅苦樂得失、王事賊事、城邑聚落軍眾之事、莫說男女婚會之事，唯應說法，讚佛功德、歎說正法、歎說聖僧，說於布施持戒忍辱精進禪定智慧之法。」

佛告彌勒：「若滿三千大千世界珍寶樂具，若善男子善女人以此珍寶樂具施諸眾生。若有善男子善女人為他人說一四句偈，令其得聞。彼善男子善女人所得功德，勝前功德無量無邊阿僧祇數。」

佛告彌勒：「觀此比丘入於村邑有大利益。彌勒！若入城邑，勿得遠離讚歎三寶論說世事。何以故？彌勒！若金銀琉璃真珠馬瑙珊瑚諸寶及諸樂具，不能令人離於生老病死憂悲苦惱。彌勒！唯有正法能大利益，離於生老病死憂悲苦惱，是名如來微密之法。」

爾時世尊而說頌曰：

/gatha/
「三千大千界，　珍寶滿其中，　以此用布施，　所得功德少；　若說一偈法，　功德為甚多。
　三界諸樂具，　盡持施一人，　不如一偈施，　功德為最勝；　此功德勝彼，　能離諸苦惱。」
//

佛告彌勒：「若有菩薩摩訶薩以滿無邊世界珍寶施諸佛如來。若有菩薩以大悲心為一眾生說四句偈，功德勝彼。」

爾時世尊而說頌曰：

/gatha/
「若恒沙世界，　珍寶滿其中，　以施諸如來，　不如一法施。
　施寶福雖多，　不及一法施，　一偈福尚勝，　況多難思議。」
//

爾時世尊告彌勒菩薩言：「彌勒！如來有光，名曰一切功德莊嚴，在右掌中。我以此光，能令三千大千世界眾生所須一切樂具悉皆充足，須食與食、須飲與飲、須衣與衣、須乘與乘、須寶與寶，如是等事我悉能與。彌勒！一切眾生雖得此樂，於生死中不能解脫。彌勒！是故如來不施眾生世間樂具，但與出世無上法寶，眾生聞已畢竟離苦。是故彌勒！汝等悉應學於如來無上法施，莫重世間資生施也。彌勒！當來末世後五百歲正法滅時，有諸比丘自稱菩薩，身作不善、口作不善、意作不善，身犯禁戒、口犯禁戒、意犯禁戒，造不善業，無沙門果。彌勒！我為發菩提心善男子善女人說菩薩善根，不墮地獄、畜生、餓鬼及餘難處。善男子善女人應勤精進，具足慚愧，常畏生死，諸有生處常懷怖畏，我當云何令諸三界六道眾生速得解脫？何以故？彌勒！菩薩摩訶薩發願許度三界六道一切眾生令得解脫，不安隱者令得安隱，未涅槃者令得涅槃。彌勒！我觀一切世界，若天若人若魔若梵、若沙門婆羅門中，不見一人有能荷負如是重擔如菩薩者。彌勒！譬如有人頂戴三千大千世界山河石壁。有人告言：『善男子！汝今以此三千大千世界，頂戴一劫、若減一劫、若百千劫，頂戴不息。』彌勒！於汝意云何？如是之人為大力不？」

彌勒白佛言：「世尊！甚大。世尊！甚大。善逝！」

佛告彌勒：「菩薩摩訶薩精進之力復勝於彼。菩薩發願許度一切眾生，皆令得住涅槃之樂。彌勒！譬如有人於三千大千世界一切眾生所有作業，彼人一時悉能成就。彌勒！於汝意云何？此人所作事業寧為大不？」

彌勒白佛：「甚大。世尊！」

佛告彌勒：「菩薩所作事業復過於此。菩薩發言：『三界眾生受苦惱者，我令解脫。』彌勒！譬如長者唯有一子，容顏端正，年在幼稚，孝順父母。長者及子妻妾眷屬奴婢財物悉入王獄。爾時大王語長者言：『去此一百由旬，有城名某，汝去七日令至彼城，復行七日還至我所。汝能如是，捨汝妻子眷屬財物悉皆還汝及賜官物。若過七日從於彼城不至此者，當斷汝命及汝一子，親屬財物悉入於官。』」佛告彌勒：「於意云何？如是長者勉力勤進，為愛自身為愛一子，為惜妻妾奴婢財物，而從彼城勤苦至此。」

彌勒菩薩白佛言：「世尊！如我解佛所說義者，彼人不念飲食睡眠，唯念速行。何以故？世尊！如是之人自惜命故，是故速行。」

佛告彌勒：「若一切眾生勤行精進悉如彼人。一切眾生如是精進，欲比菩薩精進，百分不及一、千分不及一、百千分不及一、億分不及一、百千億分不及一、百千億那由他乃至不可數分不及一。何以故？彌勒！一切眾生順生死流，菩薩逆生死流令其住於不動涅槃。彌勒！譬如有人勇猛大力轉勝於前，取四大海及諸河水悉還置於阿耨大池。彌勒！於意云何？是人所作為希有不？」

彌勒菩薩白佛言：「世尊！如是之事甚為希有。」

佛告彌勒：「菩薩精進難作希有復過於此。菩薩以大悲心化一切眾生，令住阿耨多羅三藐三菩提，是事為難。若能信有佛法及僧，此事為難。若有能信善惡業果，此事為難。貪瞋癡起能令滅者，是事為難。能捨親屬發少欲心而求出家行至七步，此事為難。身披袈裟，於正法中正信出家離於欲火，此事為難。不犯禁戒，此事為難。能離憒閙修遠離行，此事為難。信諸法空，此事為難。於深法中得柔順忍，此事為難。證三解脫門，此事為難。證須陀洹果乃至阿羅漢果，此事亦難。何以故？彌勒！所謂難者，於正法中以信出家得沙門果。彌勒！當來末世後五百歲，有諸眾生發菩薩心，於正法中出家學道空無所得，捨菩薩業作凡愚行。彌勒！何等是菩薩業？彌勒！菩薩業者有二十法。若有菩薩不成就此二十法者，則不能得坐於道場。何等二十？一者離慳心，二者修布施，三者離熱惱，四者修淨戒，五者離瞋恚，六者修忍辱，七者離懈怠，八者大精進，九者離亂心，十者念慧修無依定，十一者修甚深忍，十二者具足般若波羅蜜，十三者行無相行，十四者行空行，十五者行無願行，十六者成無願境界，十七者不捨一切眾生，十八者修行大悲，十九者不念聲聞緣覺之乘，二十者心樂成就如來智慧。是名菩薩摩訶薩二十種業。菩薩成就此二十業，能坐道場。彌勒！菩薩摩訶薩有四種畢定誓。何等為四？一者畢定成佛轉於法輪，二者生死眾生令得解脫，三者令無量眾生住阿耨多羅三藐三菩提，四者捨自身樂令諸眾生得無漏樂。是名四種畢定之誓。」

佛告彌勒：「譬如二人，善解醫方、善解呪術、善別毒藥、善識甘露。爾時一人於大眾中即取毒藥而自食之，現希有相，食已受苦身不安隱，復求甘露呪術望除毒氣。爾時彼人求不能得，毒氣熾盛遂便命終。時第二人作如是言：『我今不能食於毒藥，不食毒藥不須甘露，不欲處眾作希有想令身苦惱。』彌勒！當來末世後五百歲，有諸在家出家菩薩亦復如是，作如是言：『如我說法能除諸罪。』如是語已轉集惡業，復作是言：『我還懺悔。』我說彼人於正法中名為死人。何故名死？謂於正法墮落退沒，是名為死。彌勒！復有菩薩其心清淨，作如是言：『我不作罪不須懺悔。我當懺悔過去未來一切諸罪，現在不作。亦如彼人不食毒藥不須甘露。』彌勒！所言毒者，於正法中犯於戒律，是名為毒。彌勒！汝等莫作食毒之人。」

佛告彌勒：「復有四法，能令菩薩離薩婆若離聲聞果，況薩婆若。何等為四？一者不知恩，二者諂曲，三者妄語，四者犯戒。彌勒！此四種法，能令菩薩離薩婆若，亦離聲聞，況薩婆若。彌勒！復有四法，菩薩應急走捨離過百由旬。何等為四？一者利養；二者惡友；三者惡眾；四者同在一處，或作戲笑、或瞋或鬪。當速捨離過百由旬。菩薩於餘菩薩不應惡心。彌勒！若有菩薩打罵割截三千大千世界一切眾生。彌勒！於汝意云何？菩薩以是打罵割截一切眾生，得罪多不？」

彌勒菩薩白佛言：「世尊！打一眾生得罪尚多，何況三千大千世界一切眾生。何以故？世尊！一切菩薩於眾生不應起於瞋恚之心。」

爾時世尊告彌勒言：「若有菩薩打罵割截三千大千世界一切眾生，得罪尚少。若有菩薩於餘菩薩起瞋恚心，退於菩提復爾所劫。彌勒！譬如木柱，若以草土不能斬截，必以利斧乃能斬之。菩薩善根亦復如是，餘不能盡，若於菩薩起瞋恚心能滅諸善。彌勒！是故菩薩應學恭敬於初發心諸菩薩等，心生尊重如世尊想。」

爾時彌勒菩薩摩訶薩白佛言：「世尊！我當修行尊重恭敬一切眾生，何況菩薩。何以故？世尊！應捨瞋恚行於忍辱，離於諂曲行清淨心，遠離有為，行於無我無取之行，不貴財寶當重法行，不求衣食當求法財。捨離嫉妬，見人巨富心助歡喜。非唯求名以為沙門，當學沙門一切功德。我非口說當修實行，捨於利養少欲知足，求佛功德，不為財利入於聚落，念薩婆若入於聚落。不為衣食入於村邑行諂曲行，當行正行讚四聖種。不學凡夫下劣之心，當學佛行不觀他過但自調伏。修奢摩他、毘婆舍那。離三業惡，常修三業清淨之行。離於破戒，當學波羅提木叉。不依佛法僧而自活命，讚歎如來真實功德，不為求施為求法故。常讚正法修如法行，讚歎聖僧。依不退僧，不依世間有為之僧。不求一切世間資身之具，唯求正法不求世事。求出世法離於諂曲，行真實行不樂一處。當如野鹿無所依止，離世間樂求佛功德。當離睡眠，初夜後夜讀誦經典。捨於憒閙當行遠離，於諸功德不生厭想，求諸功德心不暫息。當離狗法，當行師子所吼之法。為究竟友不應暫友，捨無反復當行報恩，不以財利而作親友，當以淨心而作親友。捨虛誑心行真實行，捨下劣法當求成就無上佛身。於如來所當行恭敬，不起憍慢。捨於兩舌心口相違，當行誠實無二之言，不作菩薩而行諂曲。當以淨心行奢摩他毘婆舍那。捨於我慢當行恭敬。離不淨食，當淨持戒。食人之施，當捨邪念念諸佛法。離於人見行於空行，離於妄覺行無相行。離身諂曲，當行三業清淨之行。不求財利而演說法，以大悲心而說正法。不以財物而作親友，以法親友。不為自利，為利他人令不損害。行阿蘭若離於諂曲，不作諂曲而行乞食，不行諂曲著糞掃衣。所以者何？具十二頭陀者，不求一切世間利養。」

爾時世尊讚彌勒菩薩摩訶薩言：「善哉善哉。彌勒！汝求佛功德心無厭足，作師子吼。已於過去佛所種諸善根，能說此法、說此功德。」

爾時彌勒菩薩摩訶薩說此法時，眾中五百比丘從坐起去。爾時摩訶迦葉問諸比丘：「今聽說法，汝等比丘欲詣何所？」

諸比丘言：「大德迦葉！如彌勒菩薩摩訶薩所說之法，甚深難得。我等作如是念：『我等不能修得此法，欲還歸俗。何以故？信施之食難可消故。』」

爾時文殊師利菩薩讚諸比丘：「善哉善哉。善男子！是汝所應。若不能消信施之食，寧可一日百數歸俗，不應破戒受人信施。」

爾時文殊師利白佛言：「世尊！何等之人應受信施？」

爾時世尊告文殊師利菩薩：「善男子！若有修禪解脫者，我聽彼人受信施食。」

爾時文殊師利告五百比丘：「汝等今者應速修行。佛世難值，當住佛法。」

爾時五百比丘問文殊師利言：「文殊師利！我等云何修行？」

文殊師利告諸比丘言：「汝等應如是觀，無一法合、無一法散，無一法生、無一法滅，不受一法、不捨一法，不增一法、不減一法。若如是行於法無得，無得則無去，無去故無來，無來則無去。比丘！是名無來無去、無住無不住。」爾時文殊師利說是法時，五百比丘於諸漏中心得解脫。

${mvp.MID()}

爾時摩訶迦葉白佛言：「世尊！當來末世後五百歲，何等菩薩行於諂曲？」

爾時世尊告迦葉言：「迦葉！多有眾人行於諂曲，親近惡友，少讀誦經，為求衣食。」

爾時摩訶迦葉白佛言：「善哉世尊！唯願世尊利益多人，說彼諂曲不勤修行菩薩之過。令彼菩薩聞此過已，自攝心行令得清淨。」

爾時世尊告摩訶迦葉言：「迦葉！當來末世後五百歲，有諸菩薩親近惡友、少讀誦經，唯作供養舍利之業，以香花瓔珞幡蓋燈明供養如來舍利塔廟。迦葉！我為在家無智眾生令種善根，說供養舍利。彼諸癡人不解我意，但作此業。迦葉！我於一切天人之中常說此法，修奢摩他、毘婆舍那以自調伏，世間當有信樂婆羅門居士供養舍利。迦葉！彼諸癡人捨於讀誦修禪智慧，供養舍利因之活命。迦葉！若有菩薩以滿三千大千世界上至梵天香花燈明，一一燈炷如須彌山，以如是等供養如來。若有菩薩淨心持戒，於師尊所受持讀誦一四句偈，淨心修行乃至七步，功德勝彼無量無邊。迦葉！若有菩薩以滿三千大千世界花香末香，於百千歲晝夜六時供養如來。若有菩薩捨於憒閙深畏三界，為利眾生發心趣向阿蘭若處，舉足七步，勝前功德無量無邊。迦葉！於意云何？如來化眾生故作是說耶？迦葉！莫作此見，如來實說。所以者何？如來現見明了知故。」

佛告迦葉：「過去無量無邊不可思議無數阿僧祇劫，爾時有佛，號妙華如來、應供、正遍知、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、婆伽婆，其劫亦名妙花。迦葉！妙花如來有九十六億百千聲聞大眾。爾時有轉輪聖王名曰尼彌，如法治世主四天下。迦葉！時尼彌大王千子具足，勇健威猛。迦葉！爾時大王具千子已，復有二子結加趺坐忽然化生：一名達摩，二名善法。迦葉！爾時大王請妙花如來及比丘僧，滿八萬四千歲供養衣服臥具飲食湯藥，捨諸家事唯修供養。七日之後，一切比丘各施新衣種種飲食隨心所樂，廣造精舍隨心樂住。一一比丘給使七人，施百味食。迦葉！爾時大王造立精舍方八十由旬，彩畫微妙出過世間。妙花如來及比丘僧坐彼精舍，從於地下出眾妙花，令彼精舍華至於膝。迦葉！爾時大王於不思議功德精舍供養妙花如來，滿八萬四千歲，恭敬供養尊重讚歎。迦葉！爾時大王供養如來滿八萬四千歲已，最後一日妙花如來飯食之後，達摩、善法二子眷屬及諸四眾，至妙花如來正遍知所，頭面作禮白佛言：『世尊！頗有布施功德善根，勝此尼彌大王功德善根者不？』迦葉！時二王子禮如來時，大千世界悉皆震動。迦葉！爾時妙花如來侍者弟子名通達法，從坐而起頂禮佛足，白佛言：『世尊！何因緣故大地震動？以何因緣此二王子禮佛而住？』

「爾時妙花如來告通達法：『善男子！何用此問。若佛如來說此王子淨心深忍大悲之心禮如來足，一切天人皆當迷沒。』迦葉！爾時妙花如來告一聲聞神足弟子那羅延言：『善男子！汝示神力起二童子。』迦葉！爾時那羅延比丘從坐而起，即以右手捉一童子，復以左手捉一童子，欲扶令起而不能動。時那羅延盡大神通，扶二童子欲令其起，不能動彼。如分一毛為千萬分，不動一分。迦葉！爾時三千大千世界地皆震動，山河石壁悉亦大動，而不能動彼二童子。迦葉！爾時那羅延以妙花如來威神力故，令於下方恒河沙等諸佛世界悉皆震動，而亦不動彼二童子毛之一分。迦葉！爾時那羅延比丘禮妙花佛白言：『世尊！我將不失神通力耶？何以故？世尊！此二童子生來未久，在於佛前頭面著地，我盡神力不能令起。』

「爾時妙花如來告那羅延比丘言：『善男子！汝不失通。善男子！菩薩境界不可思議，一切聲聞緣覺所不能動、不能思量。善男子！若滿三千大千世界一切眾生，具大神力如汝不異，至於億劫不能動此二童子起。』迦葉！爾時妙花如來說此語時，眾中四百二十萬眾生發阿耨多羅三藐三菩提心。彼諸眾生作如是念：『菩薩神力甚為希有。未得一切智神力乃爾，大聲聞神力不能令動，況成佛道。是故我等應行菩薩道，願證如來無上智慧。』

「迦葉！爾時四百二十萬眾生作是念已，於無上菩提心得堅住。迦葉！爾時彼眾有一菩薩名曰善慧，在大眾中從坐而起偏袒右肩，頂禮佛足白妙花如來言：『世尊！唯願世尊起二童子，如彼所問願佛解說。』」

佛告迦葉：「爾時妙花如來從虛空中出大音聲，其聲遍滿乃至十方恒河沙等諸佛世界。聲至之處世界地皆六種震動，放大光明遍照十方。迦葉！時二童子聞此聲已從地而起。迦葉！童子起時，於此三千大千世界人天伎樂不鼓自鳴，於虛空中雨眾妙花。迦葉！時二童子從地起已，至如來所，右遶三匝頂禮佛足，合掌恭敬瞻仰如來。迦葉！爾時妙花如來告善慧菩薩言：『善男子！此二童子禮我足已作如是問：「世尊！頗有布施福德善根，勝此尼彌大王功德善根者？」此二童子禮我足已發問而住。』迦葉！爾時善慧菩薩白妙花如來言：『世尊！願佛解說二童子問，令諸天人得安樂故。』

「爾時妙花如來告善慧菩薩：『善男子！汝今諦聽，當為汝說。善男子！尼彌國王所作功德，若有菩薩住阿蘭若行、遠離行，少知諸法得無生忍，功德勝彼無量無邊。善男子！若三千大千世界一切眾生，一一眾生所作功德如尼彌王。如是三千大千世界一切眾生所有福德，不如菩薩修行遠離住於淨心，正念相應解諸法空無來無去，如是少忍功德，勝前功德，百分不及一、千分不及一、億分不及一、百億分不及一、千億分不及一、百千億分不及一、百千那由他億分不及一，乃至算數不及其一。善男子！如恒河沙等一切世界所有眾生，一一眾生悉作福德如尼彌王。彼諸眾生所作福德，至恒河沙劫常修福德。善男子！於意云何？彼善男子得福多不？』迦葉！爾時善慧菩薩白妙花如來言：『希有世尊！如來說喻不可思議，如此善根不可思議。』迦葉！爾時妙花如來告善慧菩薩：『善男子！我今告汝，有智慧人成就深忍能信此語。彼一切眾生所集善根，不如此二童子以淨心故禮如來足，勝前一切眾生善根，百分不及一、千分不及一、百千分不及一、億分不及一、百億分不及一、千億分不及一、百千億分不及一、百千億那由他分不及一，乃至算數譬喻所不能及。』迦葉！爾時妙花如來大眾之中，八萬四千比丘同聲發言：『世尊！我等隨喜彼人功德，成就深法忍、信諸法空、心樂遠離、趣阿蘭若舉足七步，發阿耨多羅三藐三菩提心成就智慧。我等隨喜。』迦葉！爾時妙花如來讚諸比丘：『善哉善哉。諸善男子！汝等以此隨喜之業不思議善根，當作恒河沙等轉輪聖王，然後得成阿耨多羅三藐三菩提。』」

爾時摩訶迦葉及諸大眾，一時同聲白佛言：「世尊！我等隨喜彼人發心，成就深忍、信諸法空、遠離寂滅自性清淨。」

爾時世尊告摩訶迦葉言：「迦葉！爾時達摩善法二童子白妙花如來言：『世尊！菩薩具何等法，施不望報、不生嫉妬、心不慳悋、不生貪著，見人行施心不希望，成就如來無上之行，得深法忍成無上智？』迦葉！爾時妙花如來告善法二童子言：『善男子！菩薩具足四法，施不望報、不嫉妬、不慳悋、不生貪，見人施不希望，成就如來無上之行，得甚深忍見無上智。何等為四？一者信諸法空，二者遠離，三者深忍，四者正念。善男子！菩薩具此四法，施不望報、心不嫉妬、不慳悋、不生貪，見人施不悕望，成就如來無上之行，成就深忍具無上智。善男子！復有四法，若菩薩具此四法，施不望報、心不嫉妬、不慳悋、不生貪，見人施不希望，成就如來無上之行，成就深忍滿無上智。何等為四？善男子！菩薩求多聞，得多聞已遊於城邑聚落，說法無所希望，乃至不受一言善讚，心無所貪。諸佛所說一切施中法施第一，住第一施其心歡喜，不求世間財物布施。何以故？善男子！十方無數阿僧祇諸佛世界，諸佛如來及比丘僧，不求世間資生之具。若有菩薩住清淨戒修於正法，具大悲心不求利養，一切諸佛之所憶念。若有能說一四句偈，說偈文字皆自性空，一切諸法亦復如是皆自性空。此善男子善根功德，勝前善根，百分不及一、千分不及一、百千分不及一、億分不及一、百億分不及一、千億分不及一、百千億分不及一、百千那由他億分不及一，乃至阿僧祇分亦不及一。』迦葉！爾時妙花如來告二童子：『善男子菩薩具足四法，得成如來無上之行。何等為四？一者行無上處，二者說無上法，三者施無上物，四者信無上法。善男子！是名四法。菩薩成就此四法者，得成如來無上之行。』迦葉！時妙花如來為二童子說是法時，彼二童子聞此法已，踊在空中高七多羅樹，同聲讚佛：

/gatha/
「『如來知諸行，　教眾生行施，　而不著於施，　此施無上施。
　　能成無上忍，　此中無有我，　眾生命及人，　希有大精進。
　　演說如是法，　成就甚深忍，　及得無上行，　得無上菩提。
　　永滅諸欲惱，　大智慧清淨，　更不受後有，　說於遠離行。
　　令住阿蘭若，　修於空解脫，　亦不生分別，　常勤行布施。
　　不生於分別，　此是無垢際，　遠離諸名字，　說清淨尸羅。
　　令行寂滅處，　此是第一戒，　覺知寂滅處，　常修行於忍。
　　不分別眾生，　此是清淨忍，　離一切分別，　修堅固精進。
　　離一切有為，　佛說此精進，　能成遠離法，　焚燒一切事。
　　斷於諸有無，　此無分別禪，　不起諸煩惱，　非此亦非彼。
　　中間亦不住，　此第一智慧，　遠離於三世，　修習寂滅想。
　　復觀於此想，　此想何處生？　是故知無想，　讚歎佛功德。
　　演說第一法，　其心不異念，　聽受於正法，　說名字無盡。
　　自性體不成，　觀境界無實，　其心則解脫。
　　若起如是想，　我為說法者，　彼則被魔縛，　不知於法相。
　　若欲得菩提，　及求聲聞者，　求緣覺菩提，　當修學此法。
　　說於一解脫，　智慧無邊量，　勿作下劣願，　當願上菩提。
　　若求如是身，　相好自莊嚴，　如佛金色身，　當求上菩提。
　　作生一切法，　作者不可得，　諸法從緣生，　無自性自性。』
//

「迦葉！時二童子在虛空中說此偈時，尼彌大王從城而出，及諸地神虛空諸神皆悉來集。爾時眾中八萬四千眾生發阿耨多羅三藐三菩提心，阿僧祇眾生種於善根。迦葉！爾時達摩善法二童子等從空中下，詣妙花如來所白言：『世尊！我等歸依佛、歸依法、歸依僧，發阿耨多羅三藐三菩提心，以比丘形行菩薩道。世尊！真發心者信一切法無生。世尊！真發心者不著諸法。何以故？世尊！若有著則法不生。是故世尊說離著心得彼無生。世尊！此無生亦不應說是無生。何以故？有言說者則有生滅。若具淨智則無生滅，無生滅處是畢竟盡。是故世尊！以平等際發阿耨多羅三藐三菩提心，不念於法，亦無法得亦無不得，如是得平等——無得平等。何以故？一切諸法本性淨故。』迦葉！爾時妙花如來為二童子說此法時，眾中十千眾生得無生法忍。尼彌大王并及千子五千大臣，悉發阿耨多羅三藐三菩提心。」

佛告迦葉：「爾時妙花如來飯食既訖，澡洗鉢已，於大眾中告大王言：『尼彌大王！我今說法。』王及大眾聞佛說法，踊躍歡喜。迦葉！爾時達摩、善法二童子聞佛說法，以淨信心離於欲火，欲求出家，從城而出來至佛所。至佛所已而說頌曰：

/gatha/
「『一切諸如來，　讚歎出家法，　在家多垢穢，　壞滅白淨法。
　增長不善法，　毀滅於善法，　在家多過失，　出家離染污。
　設使百億劫，　受欲無厭足，　受欲無厭足，　在家而死滅。
　如海受眾流，　而無有厭足，　凡夫亦如是，　受欲無厭足。
　如火燒乾草，　而無厭足時，　凡夫亦如是，　受欲無厭足。
　貪欲網所縛，　滅壞於世間，　是故應離縛，　為發出家故。
　在家具眾過，　不得無上道，　出家修遠離，　爾乃得菩提。
　過去諸如來，　已入於涅槃，　住阿蘭若法，　獲得大菩提。
　是故學諸佛，　趣向阿蘭若，　捨愛離居家，　然後得安隱。
　一切三千界，　珍寶滿其中，　以此珍寶聚，　在家施諸佛。
　若以無惱心，　知於在家過，　學諸佛如來，　出家求智慧。
　既求出家已，　遠離諸欲火，　舉足行七步，　勝以三千施。
　三千之功德，　不如此一分，　是故出家者，　如來之所讚。
　成就大智慧，　遠離諸繫縛，　離一切諸著，　乃證無上道。
　速住寂靜處，　斷除諸欲愛，　一切毒熾心，　悉滅無有餘。
　學諸佛如來，　如實知諸法，　速遠離在家，　住阿蘭若法。
　若欲求佛道，　修於遠離行，　應學阿蘭若，　不應樂在家。
　此是諸佛境，　聖人所住處，　能住此道者，　則能得菩提。
　欲等惱眾生，　若求遠離者，　應離在家法，　修習阿蘭若。
　欲證甘露法，　轉無上法輪，　摧伏諸魔怨，　當習阿蘭若。』
//

「迦葉！爾時達摩、善法二童子說此頌已，從城而出，往詣妙花如來所住之處。到已頭面禮足右遶三匝，白言：『世尊！我等今者於如來所欲求出家。唯願世尊！哀愍聽許令得出家。』迦葉！爾時妙花如來知二童子信心清淨求出家法，是時如來即聽出家住比丘法。迦葉！爾時大王聞二童子得出家已，即以太子令紹王位，王與九百九十九子、八萬四千夫人、五千大臣及諸人民，以淨信心離於欲火，捨家出家，一切俱往詣妙花佛。到已頂禮佛足，白妙花佛言：『世尊！我等欲求出家，願佛聽許令得出家。』迦葉！時妙花佛知諸大眾信心清淨，悉聽出家住比丘法。迦葉！爾時大王第一太子，登位七日內自思惟：『我終不捨薩婆若心。何用如是王位寶財、為欲所縛。我終不捨無上菩提。』作是念已發心出家，於十五日遊四天下，說此偈言：

/gatha/
「『我父及親屬，　皆悉已出家，　無量億眾生，　為法亦出家。
　　我今樂出家，　不樂住五欲，　一心求出道，　欲詣導師所。
　　若發心出家，　離諸欲火者，　應速隨我法，　離難甚難得。
　　不發出家心，　不遠離欲火，　安心在居家，　安住於實法。』
//

「迦葉！時彼童子說此偈時，四天下中無一眾生樂在家者，皆悉發心願求出家。迦葉！時妙花如來知諸眾生心信清淨求出家已，妙花如來於四天下一切城邑村落悉作化佛及比丘僧。迦葉！時四天下一切眾生，無有一人住在家者，以淨信心離於欲火，悉得出家。彼諸眾生既出家已，不須種殖，其地自然生諸粳米，諸樹自然生諸衣服，一切諸天供侍給使。迦葉！爾時達摩、善法二比丘，勇猛精進，於其六十三億歲中不坐不臥，但勤精進求薩婆若、念薩婆若。於六十三億歲勤精進已，得遍至三昧，所坐之地名金剛處，其地皆是金剛所成。十方一切諸佛說法悉聞受持，聞已復能為他解說。迦葉！時四天下一切眾生，若有修學聲聞乘者，無一眾生凡身命終，極懈怠者得阿那含，從此命終生淨居天。共彼同行求緣覺者，從此命終，當生他方無佛之處，生大種姓諸根具足。以過去世善根力故，離於欲火而行出家，七日之後成緣覺道，利益無量無邊眾生，入般涅槃。菩薩乘者成就五通，具四無量無礙辯才，得陀羅尼。迦葉！莫作異念。爾時尼彌大王豈異人乎？則我身是。時太子者，今彌勒菩薩是。迦葉！莫作異見。何以故？達摩童子，今文殊師利是。善法童子者，虛空藏菩薩是。迦葉！汝觀彼佛國土清淨如是，善根眾生之所住處。」

爾時摩訶迦葉白佛言：「世尊！妙花如來壽命幾時？」

佛告迦葉：「妙花如來壽命八劫。迦葉！妙花如來般涅槃後，正法住世滿足一劫。一切諸天供養舍利，無在家人。迦葉！時二比丘少欲知足，不供舍利不禮佛塔。迦葉！爾時諸天、新學比丘百千大眾各相謂言：『此二比丘邪見，不信於佛舍利，不興供養、不禮佛塔。』迦葉！爾時諸天及諸比丘百千大眾說此語時，達摩、善法二比丘問眾人言：『於汝意云何？云何供養是真供養如來？以何事故，如來舍利而得供養？』諸比丘言：『修戒、定、智慧、解脫、解脫知見故，舍利得供養。』二比丘言：『修戒、定、慧、解脫、解脫知見，是真供養；非供舍利。』諸比丘言：『如是如是，如汝所言。云何戒相？禪定、智慧、解脫、解脫知見，復何等相？』達摩、善法二比丘言：『無作相是戒相，乃至解脫知見無作相是知見相。』迦葉！時二比丘語眾人言：『於意云何？無作能供養無作不？』諸比丘言：『不也。』達摩、善法二比丘言：『真供養者，無佛想、無見佛，何況供養。若供養佛，當供養自身。』諸比丘言：『云何供養自身？』二比丘言：『應如如來、應、正遍知供養自身，一切眾生之所供養。如佛所學，應如是學。護持禁戒集諸善法，思惟諸法莫取法相。若能如是自供養者，當得天人之所供養。若欲供養佛舍利者，當自供養。如佛如來具諸功德，舍利得供養。若能成就如是功德，名供養佛。不起想相，名供養佛。若多若少不生分別，名供養佛。非後世去、非今世來，非彼岸，非常非斷、非取非捨，是則名曰供養如來。非增非減、非生非滅、非盡非不盡，是則名曰供養如來。非心非心數法、非憶想、非我非取非受、非諍論非不諍論、非毀非讚、非二非入，是則名曰供養如來。亦非有為亦非無為，是則名曰供養如來。身無所作、口無所作、意無所作，於身口意求不可得，是則名曰供養如來。無過去想，未來現在想不可得，無依無著、無所求想亦不分別，是則名曰供養如來。無佛想、無法想、無僧想，無人、無自、無他想，是則名曰供養如來。真如來身無生無相，不可以生而修供養。真如來身名無作相，不以作相而修供養。真如來身名無二相，不應二相而修供養。真如來身名無漏相，不以有漏而修供養。真如來身名曰空相，不以身見命見、斷見常見、我見我所見、有見無見供養如來。真如來身名無相相，不可以相而修供養。真如來身名無願相，不可以願而修供養。真如來身名無有相，不可以有而修供養。真如來身名不動相，不可動相而修供養。真如來身名無行相，不可以行而修供養。真如來身名離貪相，不可以貪而修供養。真如來身名離瞋相，不可以瞋而修供養。真如來身名離癡相，不可以癡而修供養。真如來身具戒、定、慧、解脫、解脫知見，不可以破戒亂心愚癡而修供養。真如來身慈悲喜捨，不可以瞋心惱心妬心散心而修供養。真如來身具施、持戒、忍辱、精進、禪定、智慧，不可以慳破戒瞋恚懈怠亂癡而修供養。』迦葉！達摩、善法於大眾中說此法時，四百二十萬眾生得無生法忍，八萬四千眾生得清淨智阿那含果，二百三十萬眾生發阿耨多羅三藐三菩提心。

「迦葉！汝觀達摩、善法二比丘等如是淨心。迦葉！汝應學彼正士甚深之忍及巧方便。迦葉！彼二比丘於大眾中說此法時！諸比丘聞此法已皆住深忍！悉行少欲知足之行！不供養舍利及佛塔廟。何以故？彼諸比丘悉樂深法。迦葉！彼七日後，一切佛塔悉皆隱沒，及諸舍利所在器中亦悉隱沒。迦葉！汝應如是學彼正士甚深之忍。」

佛告迦葉：「當知末世後五百歲，有諸菩薩及諸比丘，不修身不修心、不修戒不修慧，為活命故，供養佛塔及佛舍利，不為涅槃不為離欲而修供養，自犯禁戒愚癡無智，如來舍利具戒、定、慧、解脫、解脫知見之所勳修，為活命故供養尊重。具貪瞋癡，於佛如來、應、正遍知離貪瞋癡所有舍利，為活命故而興供養，自身具足慳貪嫉妬瞋恚懈怠亂心愚癡，若大施主正住一心，為活命故化令供養如來舍利。迦葉！我為教化初始發心諸善男子善女人等，以神通力留此舍利，令供養者受人天樂、為未來因乃至涅槃。彼愚癡人於我法中雖得出家，不解我法，捨出家行而但供養塔廟舍利，為自活故、為得衣鉢、為利養故、為名聞故，為此事故供養舍利。何等名為比丘之業？迦葉！如上所說沙門之業則有二種：一者修禪，二者習誦。如是說者，為入道故非究竟說。迦葉！若有作業能盡業者，名沙門業。無作無誦無禪、無作無無作、無念無不念、無盡無生、證三脫門不住三界、無來無去，是沙門業。彼眾生等離斯正業更習餘業。彼福業者為化在家人，如是在家順如來教，當得阿那含果。彼愚人輩於我法中而行出家，尚不修行隨順之法，況復能得。若有得者，無有是處。

「迦葉！於當來世後五百歲有相似沙門，衣服形貌似像沙門，戒不相似、定不相似、慧不相似。迦葉！譬如有人善知醫方及諸呪術，即以呪術呪一袈裟與人令著，彼見生貪即便著之。若至七日若至八日，其身熾然猶如火聚。如彼呪已取之與人，彼人見已便生貪著；比丘亦爾，見好衣服受取而著，若至七日若至八日，若在舍內、若在巷中、若在林中，彼所著衣熾然如火燒人善根。迦葉！於汝意云何？彼著袈裟有利益不？」

迦葉白佛言：「世尊！無所益也。」

佛告迦葉：「如是如是。我袈裟者，戒、定、智慧、解脫、解脫知見，無量阿僧祇善根所集。迦葉！於當來世有愚癡人，著聖人衣似像沙門，入於村邑中。有信心婆羅門長者居士，見被法服謂為沙門，皆共尊重供養讚歎。彼愚癡人因袈裟故而得供養便生歡喜，身壞命終墮於地獄。生地獄已，大熱鐵鍱以為衣服，吞噉鐵丸、飲洋沸鐵、坐熱鐵床。迦葉！汝觀袈裟威德如是。彼愚癡人著於袈裟，受樂放逸自作惡業，身壞命終墮於地獄。迦葉！我常說言，寧以燒熱鐵鍱為衣，不以破戒之身而著袈裟。寧吞熱鐵，不以破戒之身食人信施。迦葉！汝觀破戒之人食他信施有如是過，是故汝等應當修學清淨戒法。迦葉！於汝意云何？若天、若龍、若夜叉、若乾闥婆、若阿修羅、若迦樓羅、若緊那羅、若摩睺羅伽、若人若非人，能作如來色身像不？」

迦葉白佛言：「不也。世尊！如來色像不可思議，無色像故。是故此等皆不能作。」

佛告迦葉：「於當來世後五百歲有諸比丘，不修身、不修心、不修戒、不修慧，若於疊上牆壁之下造如來像因之自活，以此業故自高慢人。」

爾時摩訶迦葉白佛言：「世尊！波斯匿王造如來像得福多不？」

佛言：「迦葉！得福甚多。波斯匿王造如來像、施無價衣，不求衣服飯食之報。迦葉！彼愚癡人為活命故造立形像。迦葉！若賣畜生猶尚不善，況彼癡人作如來像，於白衣前而衒賣之以自活命。迦葉！譬如有人幼小無知，捨棄甘露而飲毒藥。迦葉！彼愚癡人亦復如是，造如來像為資生故而便賣之，是名為毒。迦葉！所言毒者，於正法中貪是其毒。迦葉！彼愚癡人以貪心故而起瞋恚，遞相鬪諍、互相誹謗，各言我行供養，因彼諍論墮於地獄。迦葉！譬如有人無巧方便入敵戰時，所持刀劍而反自傷。迦葉！愚癡之人亦復如是，無方便故因於法故而墮地獄。迦葉！若有善男子善女人以七寶造如來塔，莊嚴成就，一一寶塔高廣嚴好如須彌山，遍滿恒沙諸佛世界，譬如甘蔗竹葦。迦葉！於汝意云何？彼善男子善女人得福多不？」

迦葉白佛言：「世尊！造如來像如四指者，得福無量。況復造像如須彌山，所得功德不可思議。」

佛告迦葉：「若有菩薩內觀佛身得深法忍，功德勝彼無量無邊。迦葉！若復有人住於淨戒，以四句偈為他人說解其義趣，所得福德無量無邊。迦葉！云何觀於如來之身？迦葉！若菩薩欲觀如來者，當學大精進菩薩。迦葉！乃往古昔無數阿僧祇劫，有佛世尊，號曰光明如來、應供、正遍知、明行足、善逝、世間解、無上士、可化丈夫調御師、天人師、佛、婆伽婆。迦葉！光明如來般涅槃後，有一菩薩名大精進，婆羅門種，端正無比。迦葉！光明如來正法之中，有諸比丘少欲知足住如法行。迦葉！彼諸比丘皆悉造立如來形像。爾時有一比丘於白疊上畫如來像，眾彩莊嚴悉皆具足，持至大精進菩薩所。爾時大精進菩薩見此畫像，心大歡喜作如是言：『如來形像妙好乃爾，況復如來正遍知身。願我來世得成如是妙色之身。』爾時大精進菩薩作如是念：『我今不能住在居家。若在家者，不能成就如是之身。』迦葉！爾時大精進菩薩年始十六諸根具足，至父母所頭面敬禮，白父母言：『我今欲於如來正法出家學道，願為隨喜。』父母答言：『莫作是說。何以故？我今年老唯汝一子，汝若出家我等當死。』大精進言：『我當方便令父母存，我得出家。』父母問言：『欲作何業？』子白父母：『我從今日不食諸味、不昇床坐、不食蘇油、不飲漿水，若善若惡口不言說，乃至得出家。』迦葉！大精進菩薩如是誓已默然而住，如是默然一日不食。爾時父母誦諸呪術、持百味食而授與之，亦不肯食、亦不言說。迦葉！大精進菩薩如是默然過第二日。爾時父母與母知識五百人等，持百味食來至其所，誦諸呪術望其飡設；尚不顧視，況復食之。迦葉！時大精進於第三日，父親五百，持種種食勸之令食，亦復如是默然不語，不飲不食亦不顧視。於第四日，五百同友持百味食誦諸呪術令從己志。時大精進默然而住。於第五日，爾時父母悉出寶藏金銀琉璃種種寶物，及諸婇女八萬四千上妙嚴飾，將至其所。父親母親及其同友各五百人，勸大精進作如是言：『汝當在家，以此財寶布施自恣作福，與諸婇女共相娛樂。』時大精進於大眾中默然而住曾不瞻眄。於第六日，斷諸憶想不起食念，但念如來、應、正遍知。迦葉！爾時父母及其知識、八萬四千諸妙婇女，同時悲泣禮大精進。時大精進亦不顧視。迦葉！爾時大精進菩薩所住之處有一宅神，於虛空中現大神力而說頌曰：

/gatha/
「『精進心堅固，　難動如須彌，　不捨出家心，　為得菩提故。
　　大地可傾動，　火可在水居，　如是等可轉，　菩薩不可動。
　　汝等莫勤苦，　而作不善業，　眾生無慧眼，　久遠處生死。
　　為利諸群生，　是故求菩提，　其心樂出離，　必成無上道。
　　不為世間報，　而行菩薩道，　願成大覺智，　救濟苦眾生。
　　三千大千界，　珍寶滿其中，　及諸上妙土，　其心不貪著。
　　汝等愚癡心，　所作不善業，　汝當自悔過，　菩薩不處俗。』
//

「迦葉！時大精進菩薩父母、眷屬、知識及諸婇女，聞天神語悉皆悔過，告菩薩言：『隨意出家。汝當飲食，勿令殞絕。』迦葉！時大精進不食七日，光明暉悅顏色不變，唯心憶念正遍知身，一切諸天散花供養。時大精進過七日已，捨諸家業如棄涕唾。爾時父母、同友、知識及諸婇女八萬四千，皆悉悲泣隨而送之。爾時大精進菩薩持畫疊像，入於深山寂靜無人禽獸之間，開現畫像取草為坐，在畫像前結加趺坐，正身正念觀於如來。諦觀察已作如是念：『如來如是希有微妙，畫像尚爾端嚴微妙，況復如來正遍知身。』復作是念：『云何觀佛？』爾時林神知彼菩薩心之所念，白菩薩言：『善男子！汝如是念云何觀佛？若欲觀佛當觀畫像，觀此畫像不異如來，是名觀佛。如是觀者名為善觀。』時大精進作如是念：『我今云何觀此畫像與如來等？』復作是念：『如來像者非覺非知，一切諸法亦復如是非覺非知。如是像者但有名字，一切諸法亦復如是但有名字，如是名字自性空寂無所有。如來之身其相如是。如此畫像，非證、非得、非果，非證者、非得者、非得果者。非住者、非去非來、非生非滅、非垢非淨、非色非非色、非貪盡、非瞋盡、非癡盡、非陰界入、非初非中非後。一切諸法亦復如是，如來身相亦復如是。如此畫像非覺非作，一切諸法亦復如是，如來身相亦復如是。如此畫像，非見非聞非嗅非甞非觸非知、非出息非入息，一切諸法亦復如是無有知者。如此畫像非欲界攝、非色無色界攝，一切諸法亦復如是。如此畫像非初非中非後、非此非彼、非行非非行、非取非捨、非作非誦、非實非虛、非生死非涅槃，一切諸法亦復如是，如來身相亦復如是。』菩薩如是觀如來身，結加趺坐經於日夜，成就五通，具足無量，得無礙辯、得普光三昧，具大光明。成就天眼過於人眼，以此天眼見於東方阿僧祇佛。得淨天耳，諸佛世尊所說之法悉能聽受。天耳淨故，一一諸佛所說之法，聽聞受持不相障礙。迦葉！時大精進勤行精進滿足七日，以智為食不食世供，一切諸天散花供養。迦葉，時大精進不被袈裟亦不見佛，不受禁戒，心但憶念學薩婆若。迦葉！菩薩應如是觀如來身，非觀非非觀。迦葉！菩薩應如是觀如來畫像，如大精進菩薩摩訶薩觀如來像，如是觀已成大智慧，以此智慧悉見十方阿僧祇佛，聞佛說法。迦葉！爾時大精進菩薩從山而出，來至村落為人說法，一會說法二萬眾生住阿耨多羅三藐三菩提，無量阿僧祇眾生住於聲聞緣覺功德，父母親屬皆住不退阿耨多羅三藐三菩提。迦葉！莫作異念。爾時大精進菩薩摩訶薩者，豈異人乎？我身是也。迦葉？是故菩薩摩訶薩應學大精進菩薩摩訶薩，亦應學餘諸大菩薩。迦葉，當來末世後五百歲，有求菩薩諸善男子，無方便心、多諸貪著，於牆壁下畫如來像而求利養。彼作是說：『我獨供養，人無供養。』以修少善自高慢人，因此供養以自活命。迦葉！彼時眾生不修三昧、不誦正典，但作此業。因此業故，於施主邊獲得衣服飲食臥具湯藥，以自活命。迦葉！汝觀彼破戒菩薩，住不淨戒自稱多聞。迦葉！彼破戒人不誦經典，供養形像因而自活。」

爾時摩訶迦葉白佛言：「世尊！希有世尊！希有善逝！世尊廣說愚癡凡夫諂曲之失。世尊！若有善男子善女人聞如是說，何有不住清淨之戒？世尊！願於未來此法久住，令彼善男子善女人聞已慚愧，如來知我、如來覺我。所作邪法，永令休息。」

爾時世尊告摩訶迦葉：「如來所說為善男子，聞我此法修行離惡，我為此人說如是法。」

爾時世尊說此經已，摩訶迦葉、彌帝隷菩薩、文殊師利童子，一切世間天、人、阿修羅、乾闥婆等，聞佛所說，皆大歡喜。
