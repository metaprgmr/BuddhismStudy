var mvp = new MultiVolumePage('淨信童女會第四十', null, 111, PART_FIRST);

docInfo.writeDBJJ(mvp.ttl, `
${mvp.START(1)}

如是我聞：

一時佛在舍衛國祇樹給孤獨園，與大比丘眾五百人俱。菩薩摩訶薩八千人，一切皆是眾所知識，得陀羅尼辯才無礙，具足諸忍降伏魔怨，逮諸如來所得之法。其名曰：持世菩薩、持道菩薩、持地菩薩、持大地菩薩、樂慧菩薩、令信樂菩薩、妙色莊嚴菩薩、寶焰菩薩、寶幢菩薩、寶思菩薩、寶處菩薩、寶慧菩薩、寶德菩薩、寶光菩薩，復有賢劫諸菩薩等，彌勒菩薩而為上首。復有六十無等喻心諸菩薩等，文殊師利而為上首。復有十六大士，賢護菩薩而為上首。復有二萬兜率天子俱在會中。

是時世尊處大莊嚴藏師子之座，無量百千大眾圍繞，光明照曜猶如日月，威德殊勝如釋梵王，高出眾表如須彌山，光焰猛盛猶大火炬，顧視安詳如大象王，說法無畏如師子吼，蓋諸大眾如羅睺羅王，相好莊嚴威光熾盛，出梵音聲遍滿三千大千世界，為欲覺悟一切眾生普令安住決定勝義，於大眾中而演說法。

時波斯匿王所生愛女名曰淨信，年在幼稚顏貌端嚴，為諸眾生之所樂見。宿植善本修習大乘，與五百童女前後圍繞，各持金鬘出舍衛城詣祇陀林。至如來所頂禮佛足，右遶三匝却住一面，即於佛前而說偈言：

/gatha/
「久積福善清淨業，　滿足無邊功德海，　令眾信樂皆歡喜，　故我頂禮牟尼尊。
　顯現威光相奇特，　開示法門眾寶處，　身光一尋常照曜，　我禮大慧清涼池。
　功德大樹福無盡，　人中最尊世所讚，　本願戒行已圓滿，　故我頂禮應供尊。
　安住妙法常寂然，　等心世間如一子，　智慧善巧知諸行，　示平坦路如導師。
　若有堅固勇進者，　慈悲利益眾生類，　如是菩薩正修行，　唯願如來為宣說。
　云何當得堅固力，　安住生死降魔眾？　云何當得平等法？　云何成熟諸眾生？
　云何如地如虛空，　如風如水亦如火？　云何得信住於法，　如彼須彌師子王？
　云何遠離憎愛心，　淨意質直無諛諂？　云何出生施戒忍，　精進禪定及解脫，
　智慧破諸煩惱闇，　而常安住大方便，　三昧總持無礙辯，　住四無量五神通？
　云何得在諸佛前，　常受化生知宿命？　頭陀無諍住蘭若，　調伏其心滅煩惱，
　持戒修習菩提道，　證甘露滅降魔怨，　施眾安樂轉法輪，　如是正道願宣說。」
//

爾時世尊告淨信童女言：「菩薩若能成就八力，於生死中堅固勇猛而無疲倦。何等為八？一志樂力無諂誑故，二勝解力離諸惡故，三加行力常修善故，四淨信力深信業報故，五菩提心力不求小乘故，六大慈力不害眾生故，七大悲力堪忍諸惡故，八善友力時時警覺故。童女！是名八力。菩薩成就如是力故，堅固勇猛於生死中無所染著。」

爾時世尊重說偈言：

/gatha/
「志樂勇猛，　離諸諂誑，　常行質直，　正趣菩提。　
　以勝解力，　遠離眾惡，　純修善行，　住於正勤。　
　加行具足，　恒善觀察，　精進堅固，　安樂眾生。
　淨信力故，　了知業報，　信於佛智，　攝受世間。　
　菩提心力，　遠離小乘，　不斷佛種，　安住法性。　
　大慈力故，　等觀眾生，　無愛無憎，　不生恚害。
　大悲力故，　堪忍眾惡，　不染生死，　亦無疲厭。　
　以善友力，　常相警悟，　心不退沒，　安住菩提。　
　彼勇進者，　得是八力，　當坐道場，　破諸魔眾。
//

「復次童女！菩薩成就八種法故，住於平等。何等為八？一者一切眾生平等本無我故，二者一切法平等諸法寂靜故，三者一切剎平等入空界故，四者一切智平等平等說法故，五者一切行平等因緣無性故，六者一切乘平等等無為故，七者心平等心如幻故，八者諸魔平等煩惱為先不可得故。是為八法住於平等。」

爾時世尊重說偈言：

/gatha/
「眾生本無我，　念念不可得，　住於平等者，　應當如是觀。
　一切法平等，　本性常空寂，　文字有分別，　諸法本無差。
　十方諸剎土，　邊際不可得，　其性如虛空，　佛國常平等。
　三世諸如來，　住法界平等，　無邊智解脫，　佛佛皆如是。
　眾生本緣起，　一切皆平等，　善知其所行，　如應為開悟。
　眾生若干種，　了知如幻化，　內外無所取，　自性常清淨。
　諸乘種種說，　無為性平等，　導師善方便，　分別說三乘。
　現住煩惱魔，　煩惱無所有，　天魔及蘊死，　境界悉皆空。
//

「復次童女！菩薩成就八種法故，離諸憎愛。何者為八？一慈，二悲，三者常行利益，四者不染世法，五者不著自身，六者常修定心，七者捨離身命，八者觀察煩惱。修此八法能離憎愛。」

爾時世尊重說偈言：

/gatha/
「堅被慈心鎧，　哀悲於一切，　安住平等心，　則不生憎愛。
　智人行利益，　常施他安樂，　得利不自高，　輕毀不生恨，
　不為八風動，　則不生憎愛。　於己若於他，　不生憎愛想，
　諸想悉捨離，　境界無所著。　常自觀其身，　不惜於軀命，
　智者於苦樂，　不動如虛空。　善觀察煩惱，　我我所俱離，
　持行恒如地，　則不生憎愛。
//

「復次童女！菩薩成就八種法故，於生死中無有疲倦。何等為八？一者善根廣大故，二者觀察眾生故，三者常得見佛修供養故，四者得見無量諸佛剎故，五者常求佛智故，六者了知生死猶如夢故，七者於殊勝法無怯弱故，八者觀察前際及以後際如實際故。」

爾時世尊重說偈言：

/gatha/
「若諸行道者，　修善無瑕垢，　如空月清淨，　度脫苦眾生，
　攝諸功德故，　生死無疲倦。　觀察眾生性，　堅固行精進，
　於無量佛剎，　恭敬供養佛，　是故十力者，　生死無疲倦。
　無量無邊世，　說不思議法，　不斷三寶種，　當成於法王，
　堅持禁戒者，　生死無疲倦。　了知生死性，　如夢如雲電，
　於法得解脫，　生死無疲倦。　安住於菩提，　喜心常悅豫，
　度於方便岸，　生死無疲倦。　常修殊勝法，　如空月增長，
　愛樂佛功德，　生死無疲倦。　生死無邊際，　常住於實際，
　一念慧相應，　生死無疲倦。
//

「復次童女！成就八法心界平等。何者為八？一者心如地故，二者心如水故，三者心如火故，四者心如風故，五者心如虛空故，六者心等法界故，七者心等解脫故，八者心等涅槃故。是名八種心界平等。」

爾時世尊重說偈言：

/gatha/
「等心如地，　荷負一切，　於善於惡，　無所增減。　
　等心如水，　洗諸垢穢，　養育世間，　除煩惱渴。　
　等心如火，　燒滅煩惱，　大炬光明，　無所不燎。
　等心如風，　無處無依，　飃戒聞香，　流遍三世。　
　等心如空，　離見清淨，　遍入一切，　而不隨魔。　
　等心法界，　善得安住，　不增不減，　常入平等。
　聲聞緣覺，　所得解脫，　無有縛者，　亦無解者。　
　生死涅槃，　無來無去，　安住寂靜，　遍遊三世。
//

「復次童女！有八種法，菩薩成就出生菩提。何等為八？一者施出生捨諸有故，二者戒出生無所犯故，三者忍出生無瞋恚故，四者精進出生不懈退故，五者禪出生行方便故，六者慧出生持戒多聞故，七者梵住出生解脫寂靜故，八者神通出生常在定故。」

爾時世尊重說偈言：

/gatha/
「常修行施者，　離諸貪熱惱，　不希求果報，　迴向佛菩提。
　持戒為大乘，　割截無瞋恨，　志求大安樂，　除習證真滅。
　菩薩行精進，　多劫為眾生，　忍苦遊世間，　精進力增長。
　修行禪定者，　遠離諸戲論，　到諸禪彼岸，　而不隨禪生。
　大慧無等倫，　永離諸邊見，　了知世空寂，　癡闇滅無餘。
　寂靜修梵住，　淨除諸惡道，　常為釋梵王，　勤修諸義利。
　神通遊佛剎，　侍佛聽聞法，　善知諸性欲，　說法度眾生。
//

「復次童女！菩薩成就八種法故，得陀羅尼辯才無礙。何等為八？一者尊重法故，二者承事和上阿闍梨故，三者求法無厭故，四者如聞演說故，五者不慳悋法故，六者不揚他惡故，七者愛敬法師如和上故，八者不見他過勸離過故。是名八法，菩薩成就具足總持辯才無礙。」

爾時世尊重說偈言：

/gatha/
「志樂常求法，　事師親善友，　遠離惡知識，　得無盡藏持。
　多聞無厭足，　勇猛勤求法，　如聞而演說，　不希求利養，
　得清淨辯才。　能令眾歡喜，　欣樂行法施，　遠離於慳嫉，
　行法無所著，　獲得陀羅尼。　護戒自觀身，　不求他過失，
　慈悲為依止，　發語不非時，　當得無礙辯。　度言說彼岸，
　於善說法者，　愛敬如師想，　隱過勸離惡，　獲無盡海持。
//

「復次童女！菩薩成就八種法故，於諸佛前蓮花化生。何者為八？一者乃至失命不說他過，二者勸化眾生令歸三寶，三者安置一切於菩提心，四者梵行無染，五者造立佛像置蓮花座，六者憂惱眾生令除憂惱，七者於貢高人常自謙下，八者不惱他人。」

爾時世尊重說偈言：

/gatha/
「假令苦逼身，　終不說他過，　常稱歎三寶，　化生諸佛前。
　勸發菩提心，　令求一切智，　常修於梵行，　化生諸佛前。
　黃金嚴佛像，　坐寶蓮花座，　除眾生憂惱，　化生諸佛前。
　於彼憍慢人，　謙卑如弟子，　不令他生惱，　化生諸佛前。
//

「復次童女！有八種法，菩薩成就頭陀功德，常樂住於阿蘭若處。何等為八？一者少欲，二者知足，三者滿足善法，四者以善自養，五者常持聖種，六者見生死患心常厭離，七者恒觀無常苦空無我，八者深信堅固不隨他教。」

爾時世尊重說偈言：

/gatha/
「少欲知足不放逸，　法喜眾善為資養，　愛樂常修於聖種，　見生死患生怖心，
　由是常樂行頭陀，　如犀一角獨無侶。　有為之法苦無我，　慧心深信住正勤，
　自見於法不隨他，　常處空閑佛所讚，　頭陀遠離無惱患，　無諸諍論眾過失，
　遠離眷屬絕稱譽，　由是樂住阿蘭若。
//

「復次童女！菩薩成就八種法故，摧伏魔怨。何等為八？一者入於性空，二者信於無相，三者信於無願，四者了知無作，五者內無疑惑，六者忍於無生，七者決了無性，八者於一切法方便觀察不壞於如。」

爾時世尊重說偈言：

/gatha/
「於空無相及無願，　得三解脫降魔怨。　有為無為無二相，　證於無生得解脫，
　諸法無生如是忍，　彼等降伏諸魔怨。　於此無生無滅中，　蘊界無我猶如幻，
　決定了知法無性，　不壞於如巧方便，　分別諸法為魔業，　捨離分別則降魔。
　智慧方便二俱行，　若有若空無所住，　修習如是殊勝法，　得善方便妙色身。
//

「復次童女！菩薩成就八種法故，不離菩提。何者為八？一者正見，成熟邪見眾生故；二者正念，悲愍邪念眾生故；三者正語，愍諸邪語故；四者正業，攝諸邪業故；五者正精進，度邪勤者故；六者正命，不捨邪命眾生故；七者正思惟，令離邪思惟故；八者正定，發起增進邪定者故。」

爾時世尊重說偈言：

/gatha/
「成就正見者，　化彼諸邪見；　常修行正念，　哀悲邪念者；
　清淨正言說，　愍諸邪語者；　安住於正業，　攝諸邪業者；
　常修於正勤，　不捨邪勤者；　相應正淨命，　攝諸邪命者；
　智者正思惟，　哀愍邪思者；　常住於正定，　攝諸邪定者。
　無上八正道，　安隱度暴流，　復渡漂流者，　是大菩提道。
　聲聞及緣覺，　草筏唯自渡，　菩薩廣運濟，　如彼大船師。
//

「復次童女！菩薩成就八種法故，證甘露道。何等為八？一者住於無諍之法，二者善守無障礙心，三者常觀如實之義，四者住菩提心修習六念，五者精勤修習諸波羅蜜，六者積集善根成熟眾生，七者住於大悲攝受正法，八者得無生忍住不退轉。」

爾時世尊重說偈言：

/gatha/
「常修無諍行，　住大沙門法，　遠離瞋恚過，　積集諸善根。
　善觀如實義，　得諸無盡辯，　安住菩提心，　常念於無念。
　一切波羅蜜，　勤修無退轉，　得諸方便力，　由是度眾生。
　能以法王財，　悲心施一切，　速證無生忍，　不退轉菩提。
　若能如是行，　佛法不難得，　不久降魔眾，　證最上菩提。」
//

爾時淨信童女聞是法已歡喜踊躍，白佛言：「世尊！成熟幾法能轉女身？」

佛告童女：「成就八法當轉女身。何等為八？一者不嫉，二者不慳，三者不諂，四者不瞋，五者實語，六者不惡口，七者捨離貪欲，八者離諸邪見。童女！修此八法速轉女身。」

爾時世尊重說偈言：

/gatha/
「不嫉妬他人，　離慳常樂法，　不行於諂誑，　厭患女人身。
　慈心捨離瞋，　常修於實語，　除貪離惡口，　安住正見中。
　若厭女人身，　應修如是法，　便當速得轉，　受善丈夫身。
//

「復次童女！成就八法能轉女身。何者為八？一者尊重於佛深樂於法，二者恭敬供養戒忍多聞沙門婆羅門，三者於夫男女及以居家不生愛著，四者受持禁戒無所缺犯，五者於一切人不生邪念，六者增上意樂厭離女身，七者住菩提心大丈夫法，八者觀世家業如幻如夢。」

爾時世尊重說偈言：

/gatha/
「敬佛深樂法，　尊重戒多聞，　不生貪愛心，　女身速當轉。
　持戒具慚愧，　不妄念他人，　安住菩提心，　不樂餘乘法，
　由是速能轉，　不淨女人身。　勝志得厭心，　一切皆如幻，
　諸法本無動，　因緣性空寂，　勤修如實法，　速得丈夫身。」
//

爾時淨信童女以所持金鬘散於佛上，於虛空中變成真金宮殿樓閣，於宮殿中有化如來坐於金座。時五百童女各各解身莊嚴之具散彼佛上，亦於空中變金樓閣，寶帳寶蓋種種莊嚴。爾時五百童女見大神變，異口同音而說偈言：

/gatha/
「世尊人中最殊勝，　哀愍利益諸眾生，　我今已發菩提心，　志樂相應住調伏，
　為世導師施安樂，　我當供養人中尊。　聞法已離於塵垢，　我等無復諸疑惑，
　方離女身眾染污，　永破煩惱降魔怨。　十方無量俱胝佛，　我當歡喜常供養，
　安住施戒勤精進，　忍辱禪定善調心，　智慧方便攝眾生，　當證最上菩提道。
　利益無量人天眾，　悉令發起大乘心，　我等當能師子吼，　我等當作人天師。」
//

爾時世尊便現微笑，諸佛常法種種色光，青黃赤白紅紫頗梨從佛口出，遍照無量無邊世界乃至梵世，遶佛三匝還從頂入。爾時長老阿難從座而起，白佛言：「世尊！何因何緣現此微笑？」

佛告阿難：「汝見淨信童女不？」

阿難白言：「唯然已見。」

佛言：「阿難！是淨信等五百童女人中壽盡，當捨女身生兜率陀天，承事供養彌勒世尊及賢劫中一切如來。是淨信童女過八萬四千俱胝那由他劫，於電光世界當得作佛，號光明莊嚴王如來。劫名常光。其佛壽命如兜率陀天十二千歲，其國純以無量無邊大菩薩眾而為眷屬，是五百童女於此眾中最為上首；猶如我今六十菩薩，文殊師利而為上首。阿難！若有女人得聞此經，受持讀誦，盡此女身後不復受，速證阿耨多羅三藐三菩提。」

佛說此經已，淨信等五百童女，及一切世間天、人、阿脩羅，聞佛所說，皆大歡喜，信受奉行。
