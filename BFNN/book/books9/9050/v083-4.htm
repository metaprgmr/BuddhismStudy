docInfo.writeDBJJ(mvp.ttl, `
${mvp.START()}

如是我聞：

一時佛在王舍城耆闍崛山，與大比丘眾一千人俱，皆悉成就殊勝功德能師子吼。菩薩摩訶薩五百人，一切皆得陀羅尼門辯才無礙，證無生忍住不退轉，具諸三昧遊戲神通，善知眾生心行所趣，其名曰：日幢菩薩、月幢菩薩、普光菩薩、月王菩薩、照高峯菩薩、毘盧遮那菩薩、師子慧菩薩、功德寶光菩薩、一切義成菩薩、成就宿緣菩薩、成就願行菩薩、空慧菩薩、等心菩薩、喜愛菩薩、樂眾菩薩、戰勝菩薩、慧行菩薩、電得菩薩、勝辯菩薩、師子吼菩薩、妙言音菩薩、能警覺菩薩、巧轉行菩薩、寂滅行菩薩，如是等菩薩摩訶薩而為上首。復有釋提桓因、四大天王、娑婆世界主梵天王，及大威德諸天龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽，如是等無量諸大眾俱。

爾時電得菩薩見諸大眾寂然清淨，諸大龍象皆悉已集，即從座起，偏袒右肩右膝著地，合掌向佛白言：「世尊！我有少疑今欲諮問，唯願如來見垂聽許。」

爾時世尊告電得菩薩言：「如來、應、正等覺恣汝所問，當為汝說。」

電得菩薩白佛言：「世尊！菩薩摩訶薩成就何法，能滿眾生一切所欲，不為諸過之所染著，隨其根性方便引導，令彼眾生身壞命終不墮惡趣，決定當得證於平等，處世無染猶如蓮花，不動法界遊諸佛剎，常不離佛不見色身，住三解脫不入正位，隨眾生欲嚴淨佛土，於剎那頃速能成就阿耨多羅三藐三菩提？」

爾時電得菩薩摩訶薩即於佛前以偈問曰：

/gatha/
「無上人中尊，　無邊知見者，　安住於共法，　利益諸世間。
　等心視眾生，　為世所依怙，　示諸邪正道，　令畢竟安樂。
　積集勝功德，　猶如眾寶聚，　世間智慧日，　三界應供尊。
　願說最上乘，　成就菩薩道，　面相如滿月，　具足奢摩他。
　開示寂靜法，　能滅諸煩惱，　願說菩薩行，　饒益諸眾生。
　佛剎并壽命，　色身與眷屬，　三業及諸法，　一切皆清淨。
　唯願如來說，　清淨菩薩行，　云何降伏魔？　云何而說法？
　云何不忘失，　唯願為宣說，　云何勇進者，　遍入於生死，
　安住一相中，　於法常無動？
　云何諸佛所，　親近而供養，　常觀佛色身，　畢竟離諸相？
　雖證三解脫，　如鳥飛空界，　未具諸功德，　終不入涅槃？
　知諸根性欲，　隨順無所畏，　亦不生染著，　成熟彼眾生？
　先施世間樂，　後令發淨心，　具足殊勝智，　證無上菩提？
　如是深妙義，　唯願如來說。」
//

爾時世尊告電得菩薩摩訶薩言：「善哉善哉！善男子！乃能問佛如是之義，利益安樂無量眾生，攝受現在世間天人，及未來世諸菩薩等。是故電得！應當諦聽善思念之，當為汝說。」

電得菩薩言：「唯然世尊！願樂欲聞。」

佛告電得：「菩薩摩訶薩有五種伏藏，大伏藏、無盡伏藏、遍無盡伏藏、無邊伏藏。菩薩具足如是伏藏，永離貧窮，即能成就如上所說殊勝功德，以少功力速疾當得阿耨多羅三藐三菩提。云何為五？所謂貪行伏藏、瞋行伏藏、癡行伏藏、等分行伏藏、諸法伏藏。電得！云何名為菩薩摩訶薩貪行伏藏？謂諸眾生貪行相應顛倒繫縛，隨行諸相種種分別，於色聲香味觸法等諸境界中，執著堅固耽樂昏迷。菩薩於彼諸眾生等種種心行應如實知，彼諸眾生何所樂欲？於何境界染習增強？具足成就何等信解？往昔曾種何等善根？於何乘中當得發趣？所有善根久如成熟？菩薩為斷諸眾生等一切欲故，令彼善心常相續故，審諦觀察而為療治。電得當知，眾生根行差別難識，一切聲聞辟支佛所不能知，何況凡夫及諸外道。是故電得！或有眾生雖著諸欲，亦能成熟阿耨多羅三藐三菩提。或有眾生纔觸欲境，或以染心發於語言，便得成熟無上明脫。或有眾生覩諸妙色心生欲染，彼色變壞即便覺知，欲惱便息深念無常，則能成熟無上明脫。或有眾生雖見女人不生貪著，於後思念方起染心，想彼形容而生愛戀。或有眾生於其夢中見可意色，心生貪著繫念追求。或有眾生聞女人聲便生貪愛，有時暫見離貪染心，便得成熟無上明脫。是故電得！菩薩於是種種貪病及以貪藥善巧了知，而於法界無有二相，於此迷惑法界眾生起大悲心。電得！若貪瞋癡、若法界智，無有少法而可得者，菩薩作是念言：『如我所見，是諸眾生於此無相自性空寂假名安立和合法中，起於貪欲瞋恚愚癡。我當於此如實觀察，為彼迷惑貪欲眾生，住於大悲成滿昔願，不動法界以無功用智而成熟之。』若有丈夫於彼女人妄生淨想起重貪染，菩薩即便示現女身，端正殊妙色相具足，珍寶瓔珞種種莊嚴，猶如天女昔所未見，隨彼眾生令其愛著。極貪戀已量彼堪任，方便拔其貪欲毒箭。以自在力還變女身，現其人前而為說法，令彼眾生通達法界，便沒不現。若有女人於彼丈夫心生愛染，菩薩便為現丈夫身，乃至拔其貪欲毒箭，而為說法令入法界，便沒不現。電得！是諸貪行二萬一千，及彼諸行八萬四千，菩薩無功用智出生無量億千法門，開曉眾生悉令解脫，而亦不念我為眾生如是說法，亦無眾生得解脫者。電得！譬如無熱龍王以業力故於其宮內出四大河，為諸眾生水陸住者，夏時熱惱而作清涼，潤澤花果滋實五穀，令諸眾生安隱快樂。而彼龍王不作是念：『我今令此河水流出，已出、當出。』然於四河常自汎滿為眾生用。菩薩亦復如是成就昔願，以無功用智說四聖諦，滅除一切生死熱惱，普施人天聖解脫樂。而是菩薩亦不念言：『我今說法，已說、當說。』任運住於大悲之心，觀察眾生隨應說法。

「復次電得！譬如帝釋有十二那由他諸天女等，以彼帝釋自在力故現其多身，令諸天女於彼欲樂皆得滿足，各自念言：『我今獨與帝釋歡娛。』而是帝釋實無所染。菩薩亦復如是，於諸眾生應可度者，隨其意樂而成熟之，然是菩薩亦無染著。復次電得！譬如日輪出山峯時，光明普遍照閻浮提，所照之處青黃赤白種種形色皆悉顯現，而彼日輪一色一光無差別相。菩薩亦復如是，智慧日輪照於法界，出彼眾生執著山峯，所緣一相隨其意樂而為說法，然於法界無有二相。電得！是名菩薩摩訶薩貪行伏藏。菩薩證得此伏藏已，或於一劫或過一劫，隨諸眾生種種意樂現無量身，以種種言詞而為說法，然於法界亦無二相。復次電得！譬如真金，由工巧力隨意所作種種瓔珞莊嚴之具，其相各異而彼金性無有差別。菩薩亦復如是，善觀法界，隨諸眾生種種意樂現無量身，以種種言詞而為說法，然於法界亦無二相，是為常入法界一相。菩薩獲得如是伏藏，能為眾生種種說法。彼聞法已，具足富有無盡聖財，生死貧窮悉皆永斷。

「復次電得！云何名為菩薩摩訶薩瞋行伏藏？謂諸眾生憍慢相應，計我我所住自他相，從久遠來不修慈忍，瞋恚熱惱自壞其心，於佛法僧不生憶念，瞋毒所覆迷惑於法。菩薩於彼多瞋眾生終不起於損害傷惱，唯作是念：『奇哉眾生愚癡迷惑，乃於諸法本性寂靜無垢濁無和合無違諍遠離法中，顛倒相應妄生瞋恨。』如是念已，住大悲心常自懇惻，設有支解其身分者，為欲調伏瞋行眾生，安住忍辱。若彼無量瞋行眾生，互相違背心懷恚恨，是業成已當墮毒蛇惡趣之中。住忍菩薩以慈念力化此眾生，能令不受惡趣之報，決定當得證於平等。是名菩薩善巧方便，滅除眾生瞋恚之行。

「復次電得！菩薩若見瞋惱眾生，作是念言：『一切諸法本性清淨，此諸眾生隨相而行妄生分別，於此平等無違法中而起瞋心。彼諸眾生於法界性不能了知。若此眾生見法性者，終不於他而生忿害，以不了知法界本性是故生瞋。』菩薩於彼多瞋眾生，倍增慈愍住於大悲，成滿昔願，以無功用智為壞眾生瞋恚行故，開示演說種種法門，而亦不念我為眾生除瞋說法。何以故？菩薩善觀法界相故。是為菩薩安住法界無差別相滅煩惱行。電得！譬如不除黑闇得現光明，亦非無能除黑闇者。如是黑闇及光明性，皆如虛空無有差別。菩薩亦復如是，依此法界無差別智，善巧說法摧滅種種瞋行眾生，不於法界而作差別。電得！譬如日輪所出光明，隨所照處皆日輪攝。菩薩亦復如是，為欲調伏滅除瞋行，所有言說皆是法輪，不於法界而作差別。如是瞋行二萬一千，及彼諸行八萬四千，菩薩成就無功用智，隨彼眾生種種瞋行而為說法，不作是念：『我為眾生今現說法，已說、當說。』是名菩薩摩訶薩瞋行伏藏。菩薩證得此伏藏已，若於一劫若過一劫，隨諸眾生種種意樂，以種種文字語言方便演說，不能得其瞋行邊際，而是菩薩智慧辯才亦不可盡。是名菩薩善說法界無差別相，獲得如是瞋行伏藏。

「復次電得！云何名為菩薩摩訶薩癡行伏藏？電得！諸菩薩等如是之行甚為難事，謂諸眾生隨惑行者、惱害他者、無明胎㲉所纏裹者、如蠶處繭自繫縛者、於法界中無方便者、不善觀察所應行者、著我見者、行邪道者、住鈍行者、難出離者，為如是等迷惑眾生，從初發心起大加行，不生疲苦亦無懈怠。如是思惟：『應以何緣、何等勝解、云何說法，令此眾生入菩薩行而得解脫？』菩薩往昔善觀法界，以無功用智住於大悲，知彼眾生迷法界已，隨力所堪而為說法，悉令調伏。亦不念言：『我今說法，已說、當說。』以彼往昔誓願力故，善觀緣起自然演出百千法門，斷除眾生無明業行令得解脫。電得！譬如良醫善療眾病，先善綜習醫方諸論，纔見病相皆悉了知，呪藥所施無不除愈。菩薩亦復如是，善觀法界以無功用智，為彼積集癡行眾生，隨其根性開示演說百千法門悉令明了。電得！是名菩薩摩訶薩癡行伏藏。菩薩證得此伏藏已，善觀緣起，為如是等癡行眾生，若於一劫若過一劫，隨其性欲以種種文字語言善巧演說，不能得其癡行邊際，而是菩薩智慧辯才亦不可盡。是名菩薩於一切法無差別相善巧宣說，獲得如是癡行伏藏。如是癡行二萬一千，及彼諸行八萬四千，菩薩為斷如是行故，開示演說百千法門。是名菩薩癡行伏藏。

「復次電得！云何名為菩薩摩訶薩等分行伏藏？譬如四面鏡輪，清徹明淨無諸垢翳，懸於四衢，所對色像皆於中現無有增減。而此明鏡亦不念言：『我能現此種種色像。』然善磨瑩此鏡輪已，一切諸相自然而現。菩薩亦復如是，法界鏡輪善磨瑩已，住無功用三昧，隨諸眾生心行差別，開示演說百千法門，悉令了知皆得解脫，不起法相及眾生相。何以故？菩薩善觀法界相故，於此四行相應眾生如實了知，隨其根性而為說法，而於法界及眾生界，如實觀察無有二相。爾所法界及眾生界，明見無二無差別故。電得！譬如虛空，無有種種差別之相亦無建立。菩薩亦復如是，善觀法界，了一切法入於一相。亦由往昔誓願力故，隨眾生行種種說法，而於法界無有差別。電得！此等分行二萬一千，及彼諸行八萬四千，菩薩觀察悉皆明了。譬如良醫知病授藥，以無功用智種種說法，是名菩薩摩訶薩等分行伏藏。菩薩證得此伏藏已，為諸眾生若一劫若過一劫，隨其志樂以種種言詞善巧宣說，不能得其諸行邊際，菩薩智慧辯才亦不可盡。是名菩薩善說法界無差別相，獲得如是等分行伏藏。

「復次電得！菩薩成就如是智已，於諸眾生根行意樂善巧了知。若見多貪眾生，為欲調伏療其病故，示同凡夫現受諸欲，具有妻子家業資生，猶如蓮花而不染著。有諸眾生癡無智慧，不知菩薩善巧方便而作是念：『何有智者貪受諸欲？不異凡夫。』便謂菩薩遠離菩提。如是眾生心不淨故，起大瞋忿不生敬信，由此業故身壞命終墮大地獄。復以菩薩密化因緣罪報畢已，決定當得入於平等。電得！譬如猛火隨投草木，一切熾然悉成於火。菩薩亦復如是，智火熾然，所有眾生若貪瞋癡、若善不善，菩薩於彼與之同行，一切熾然皆成智慧。是名菩薩不共之法。又如須彌山王不共之相，所謂四面四寶所成。隨諸眾生青黃赤白種種色相，彼若往詣瑠璃面者，皆同一色如彼琉璃，詣金色面皆如金色，銀、頗梨色悉皆同等。菩薩亦復如是，得不共法，隨諸眾生若貪瞋癡，若善不善，至菩薩所與之同行，一切皆令入菩薩智。彼心不淨自惡業故，或墮地獄、餓鬼、畜生、閻摩羅界。以是菩薩不共功德及願力故，罪報畢已決定當得阿耨多羅三藐三菩提。

「電得！過去無量無邊阿僧祇劫五濁世時，有佛出現，號曰寶聚功德聲如來、應供、正遍知、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、世尊。時世壽命百二十歲，如我今日。彼諸眾生極重貪欲瞋恚愚癡煩惱覆蔽，違逆父母兄弟朋友，不順和上及阿闍梨，不知恩德。常懷毒害姦詐賊心，互相破壞非理而行，於佛法僧不生敬信，慳悋鄙弊行餓鬼法。彼佛剎中有如是等諸惡眾生難可調伏。時彼世尊亦以往昔誓願力故，於此惡世得阿耨多羅三藐三菩提。其佛復有二萬二千大聲聞眾。彼時有王名曰廣授，自在王化統閻浮提，於佛法中信心清淨，請彼如來及比丘眾於夏安居廣設供養。爾時有一法師比丘名為無垢，具足辯才善巧說法眾所樂聞，開示眾生常不疲倦。凡所說法無有希求，容相熙怡先言問訊，色力具足顏貌端嚴，為諸眾生之所樂見，供養恭敬尊重讚歎。復有新學年少比丘，常隨無垢出入王宮無有障礙，種種供養衣服飲食臥具醫藥。時彼眾中多有比丘，不知修習身戒心慧，不敬佛法及以眾僧，常見斷見及我見等，謗於佛法輕躁難調。不攝諸根住於非法，無沙門行自稱沙門，身口意業悉皆邪僻。時彼世尊過安居已便入涅槃。其王廣授以赤栴檀闍維供養，造立八十俱胝寶塔，以赤栴檀而為欄楯，四面皆有金色蓮花。無垢比丘，佛所記別多聞第一，於佛滅後弘宣正法。隨所遊行城邑聚落，教化無量百千眾生，皆令住於阿耨多羅三藐三菩提。爾時多有諸惡比丘，不知修行常懷嫉妬，為魔所惑，詣彼王所而作是言：『王所師敬無垢比丘，出入王宮無有禁制。而彼比丘未離貪欲，非時而食香鬘嚴身，實非梵行不應供養。我為此事來告於王，莫於過後佛正法中而生不信。』時有一魔名為極惡，即自變身作比丘像，復詣王所如前重說。時廣授王數聞此語，即作是念：『無垢比丘精勤有智我所尊重，若有此事終無是處。』作是念已，爾時魔眾於虛空中便現半身，向彼王所而說偈言：

/gatha/
「『王應學伎藝，　善識於機宜，　廣授不能知，　非是人王相。
　　佛羅漢弟子，　已具於大智，　如是語不依，　云何隨斷見？
　　比丘為利益，　告汝以誠言，　斷見惡趣人，　實非修梵行。
　　彼人於宮內，　共婇女娛樂，　王應與侍從，　親覩離疑心。』
　　王聞如是事，　心生大驚怖，　即便將侍從，　速疾詣宮中。
　　無垢時在宮，　演說第一義，　諸法自性空，　無我無壽者。
　　王與諸兵眾，　俱為魔所惑，　見宮中婇女，　圍遶於比丘，
　　瞋猛如醉象，　便勅旃陀羅：『比丘污我宮，　當治以苦法。』
　　臣佐及眷屬，　皆為魔所持，　於無罪比丘，　隨忿而生害。
　　魁膾持刀進，　無垢便悲泣。王語：『汝非法，何故而復悲？』
　　無垢白王言：『是事難自表，　且待須臾間，　我當有明證。』
　　王聞比丘言，　即止於魁膾，『當試作何事，　汝應速宣說。』
　　成就勝意樂，　行慈利世者，　合十指爪掌，　而發於誓言：
　『大王汝當知，　若實無此事，　願地六種動，　空中雨妙花。』
　　當發如是言，　大地六種動，　空界雨天花，　魔眾懷憂惱。
　　王時生淨信，　禮足求歡喜：『我當墮地獄，　無依願覆護。
　　咄哉遇此惡，　如何起毒心？　無覆無所依，　所從唯惡友；
　　十方我無護，　唯有於大師。　我當捨王位，　盡壽歸依住。』
　　比丘知彼王，　及眷屬志樂，　為說第一義，　王聞得正信。
　　與百億眷屬，　捨王位出家，　修習頭陀行，　不受他人請。
　　時王後宮內，　婇女八萬人，　聞說第一義，　皆住不退轉。
　　王依於佛教，　二十四年中，　日夜常懺悔，　罪業猶不盡。
　　百俱胝眷屬，　惡心向法師，　由此命終後，　墮於無間獄。
　　多億年受苦，　罪畢遇如來，　以昔恐怖因，　餘報常羸劣。
　　次第轉修習，　供養千億佛，　各於餘國中，　悉皆成正覺，
　　俱同一名字，　號功德名稱。　時彼廣授王，　慈忍比丘所，
　　由起毒害意，　於多億歲中，　受昔惡業對，　墮大叫地獄。
　　畢此業報已，　還得於人身，　值普眼如來，　親近常供養。
　　由此轉奉事，　八十俱胝佛，　然後成正覺，　今則我身是。
　　彼比丘欲害，　無罪法師者，　當來得作佛，　彌勒菩薩是。
　　時彼王宮內，　八萬諸婇女，　淨信植眾德，　承事無量佛。
　　於今復發行，　大願利眾生，　當奉千億佛，　各成等正覺。
　　我今告汝等，　一切勿生害，　修慈佛所讚，　速得大菩提。
//

「是故電得！於諸眾生根性志樂不能善知，應一切時勿生害心。電得！譬如諸山，須彌為最。如來智慧亦復如是，於諸智中最尊無上。譬如一切諸水之中，海為最勝。如來智慧亦復如是，於諸智中最為深大。又如諸國王中，轉輪聖王最為尊上。如來智慧亦復如是，於諸智中為無上上。電得，如來成就如是智故，一切眾生貪瞋癡行心心轉變，如來悉知，一彈指頃皆能攝受。電得！如來成就一切種智，如明眼人自觀掌中五菴羅果，不用功力明了無疑。如來亦爾，了知一切眾生心行，於大眾中種種說法。無量無數佛世界中貪行相應諸眾生等，為貪熱惱晝夜尋思虛過於時，我悉知見。為貪熱惱起於身口種種之業，我悉知見。瞋行眾生瞋忿覆心互相憎嫉，以毒害故墮無間處，我悉知見。癡行相應諸眾生等，無明闇迷惑執著樂隨邪見，我悉了知。有堪任者、不堪任者，有增進者、有退失者，於如來乘種善根者、於緣覺乘種善根者、於聲聞乘種善根者，我悉了知。如來成就如是智慧，處大眾中能了眾生心行差別，知非時故默然捨住，但作是念：『此諸眾生於法迷惑不能解了。』如來具足殊勝根力善知時故，堪調伏者、勝志樂者、能堪忍者、受善言者，我悉了知。如是知已，於彼眾生攝受利益。是故電得！初業菩薩未入正位，於諸眾生勝志樂行不能善知，若在家若出家皆不應起嫌害之心，勿於長夜自致衰惱。是故菩薩從初發心，當於一切住大乘者生於佛想，於餘眾生雖復見彼作諸惡業，而亦不起損害之心。何以故？如來常說，若諸眾生於白淨法有少缺減，終不能得入於涅槃。菩薩若見貪行眾生，應作是念：『彼為貪欲熱惱所燒，是我過咎。』見彼瞋恚及以愚癡熱惱燒者，皆悉念言是我之罪。何以故？我見一切眾生病苦，應為求藥方便療治。我先誓願除眾生病，而今捨置，是我過咎。菩薩成就如是意樂，自省其過，於諸眾生深起慈心。若遇殺害割截身分，於彼怨所生反報心，無有是處。電得！菩薩如是正修行時，過去所有不善之業永盡無餘，未來不善終不更起。

「電得！乃往古昔無量阿僧祇劫然燈佛前，有佛名勝生如來、應供、正遍知、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、世尊，出現於世。世界名光明。在安隱王城林中而住。爾時有旃陀羅名為可畏，兇險好殺安忍無慈，手塗於血見者皆懼。時旃陀羅繫牛其舍方入欲殺，牛見驚怖掣繩奔走，往於勝生如來林所。時旃陀羅持刀隨逐，彼牛惶怖墜於深坑，其命將終楚痛號吼。時旃陀羅見是牛已更增忿怒，便入坑中持刀欲殺。未下之頃，爾時勝生如來於彼林中，無量百千大眾圍遶，廣為分別緣起法門，所謂無明緣行、行緣識、識緣名色、名色緣六入、六入緣觸、觸緣受、受緣愛、愛緣取、取緣有、有緣生、生緣老死憂悲苦惱，如是因緣一切皆是純大苦集。電得！於此緣中，無明於行無思無覺，行於無明亦無思無覺，乃至生於老死無思無覺，老死於生亦無思無覺。如是諸法性不可得，無行無念無我我所，本性清淨各不相知。凡夫不聞如是法故，執色是我、我有諸色、色屬於我，乃至受想行識亦復如是。由此執著我我所故，無常計常、苦計為樂、不淨計淨、無我計我，生四顛倒。顛倒見故，無明迷惑不正思惟，隨心染著不能破壞，有愛繫縛生死輪迴相續不斷。智者善觀法界相故，不見有少我人眾生乃至壽命生老病死、繫縛殺害而可得者。電得！爾時可畏旃陀羅於是時中，遙聞如來說法之聲，即便覺悟尋止殺心，棄所持刀從坑而出。往詣佛所頂禮雙足却住一面，白言：『世尊！我今願欲於佛法中出家為道。』佛言：『可爾。善來比丘。』即成沙門得具足戒。爾時勝生如來知彼意樂漸已成熟，廣為演說諸菩薩行。可畏聞已證無生忍，於佛法中永不退轉。彼牛得聞如來所說緣起法句，其聲微妙心生喜悅，命終之後生兜率天，得見彌勒成就正信。如是電得！諸眾生行甚深微密難識難知。是故電得！菩薩欲求阿耨多羅三藐三菩提者，應當善知眾生根行，於一切眾生中住平等心無礙之心，於一切法常無染著，捨諸所有、修持淨戒、安住忍辱、發起精進、入諸禪定、如實觀察一切法性。電得！菩薩圓滿如是六法，速能證得阿耨多羅三藐三菩提。云何圓滿？所謂依止一切智智而修行故。

「電得！何者是諸菩薩法伏藏？所謂菩薩見一切色，如實了知本來不生自性清淨。菩薩於色得善巧故，則能成就四無礙辯。何等為四？所謂義無礙、法無礙、詞無礙、樂說無礙。義無礙者，於諸色義無罣礙故。云何色義？謂第一義。云何第一義？謂色不可得故。成就如是第一義智，名義無礙。法無礙者，於諸色法如實觀察、如實了知，名法無礙。詞無礙者，謂於諸色以無礙智善巧言詞種種分別，名詞無礙。樂說無礙者，謂於諸色隨眾生機開示演說，無染無著，名樂說無礙。菩薩成就如是智已，普於一切迷惑執著色法眾生，隨其性欲，以無功用智如應說法，而於法界不作二相；廣說乃至香味觸法亦復如是。電得！是名諸菩薩摩訶薩法伏藏。菩薩證得此伏藏已，為欲調伏於如是等諸境界中迷惑眾生，隨其意樂於一一處，若一劫若過一劫，以種種言詞善巧宣說，亦不能得諸處邊際，菩薩智慧亦無損減，不離法界隨順無二無差別故，是名菩薩善巧演說一切諸法無差別相。獲得如是法伏藏已，能為眾生如應說法，令得具足無盡法財，生死貧窮悉令永斷。電得！是名菩薩摩訶薩五種伏藏，大伏藏、無盡伏藏、遍無盡伏藏、無邊伏藏。菩薩成就如是伏藏，圓滿殊勝諸功德故，少用功力速得阿耨多羅三藐三菩提。」

說此伏藏法門時，電得菩薩得陀羅尼，五百菩薩得電光明三昧，三萬六千天子發阿耨多羅三藐三菩提心。

爾時月幢菩薩白佛言：「世尊！如佛所說：『無功用智。』是義云何？」

佛告月幢：「若有菩薩於善法中身心相應攀緣造作，是名功用。若有菩薩身心調柔、無念、無依、離修行相，以彼成就往昔願智，億千佛剎所可施為種種示現，而於法界亦無所動；常演說法，無少法相；以四攝法成熟眾生，亦無眾生而可度者；嚴淨一切諸佛剎土，而亦不見不淨佛剎；常念諸佛，不觀色相；遊諸佛剎，不離法界。是名菩薩無功用智。菩薩成就如是智故，滿足眾生一切希望，而於所作亦無染著。」

爾時世尊說此無功用智時，三千大千世界六種震動，釋提桓因與忉利天，於上空中雨曼陀羅花、優鉢羅花、拘物頭花、波頭摩花、分陀利花、栴檀末香而散佛上。天鼓自鳴，大光遍照，昔未曾見，眾生遇者身得清涼。

爾時世尊告電得菩薩言：「過去如來、應、正等覺，皆於此處開示演說如是法門。未來諸佛當出於世，亦於此處開示演說如是法門。現在無量阿僧祇世界中諸佛如來，為此法門不斷絕故，放大光明。」

爾時長老阿難從座而起，偏袒右肩右膝著地，合掌向佛白言：「世尊！當何名此經？我當云何奉持？」

佛告阿難：「此經名為『無盡伏藏』，亦名『說一切法無差別相』，以是名字汝當奉持。」

佛說此經已，電得菩薩、長老阿難，及諸四眾，一切世間天、人、阿修羅、乾闥婆等，聞佛所說，皆大歡喜，信受奉行。
