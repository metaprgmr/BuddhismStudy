聞如是：

一時佛在羅閱祇靈鷲山，與大比丘眾四萬二千，菩薩八萬四千俱，各從十方諸佛世界而來集會，皆已通達一生補處，得無所著無所罣礙，從勇猛伏三昧出生，獲上蓮花三昧、金剛道場三昧、善堅住三昧、淳淑修三昧、幢英王三昧、金剛三昧、淨德事三昧，分別權行，皆得親近諸佛之法。在佛樹下多所降伏度諸魔界，而得建立諸佛之土。逮成無盡所說總持，得知眾生一切根原，以妙辯才可悅諸心，為師子步猛無所畏。若入眾會，應順時宜宣文字句成就諸行，則以威相而自嚴飾。捨於世財棄諸外道，功勳顯布聲徹十方。諸佛諮嗟德不可量，悉從布施持戒忍辱精進一心智慧而成，從無數劫百千那術修治道業。覩見一切眾生之疾，應病與藥皆令瘳愈。入於深妙明緣起法，以捨斷滅有常之事。其行清淨志無瑕穢，心性鮮明開化群生，各各攝護令得其所，曉了教誨意得自在。勢力堅強不毀慈心，信、戒、聞、施、慚、愧、智慧，具足七財欲化眾生，以善方便現處閑居。所用修力善誓諸願，聖德無量心如虛空。其名曰：光觀菩薩、常明曜菩薩、光世音菩薩、大勢至菩薩、師子意菩薩、師子步菩薩、師子雷音菩薩、尊意菩薩、金剛意菩薩、金剛步菩薩、金剛幢菩薩、金剛志菩薩、步不動迹菩薩、獨步世菩薩、善明菩薩、蓮花目菩薩、蓮花淨菩薩、寶淨菩薩、鈎鎖菩薩、寶幢菩薩、寶事菩薩、寶印手菩薩、德曜王菩薩、淨王菩薩、執離意王菩薩、電光嚴菩薩、虛空藏菩薩、濡音菩薩、雨音菩薩、不離音菩薩、意淨菩薩、電音菩薩、解縛菩薩等，十六正士溥首之等，六十聖士眾香首等，三十有二清淨行士慈氏之等，皆是賢劫諸菩薩也。降魔天子、淨復淨天子、善妙天子、賢護天子、獲勝天子、意勝天子、寂化音天子、善思天子，等類二萬，皆悉大乘。四天王天、帝釋、忍迹梵天、魔子導師、濡美天子，并餘諸天、龍神、揵沓惒、阿須倫、迦留羅、真陀羅、摩睺勒等及人非人，不可稱計。

彼時世尊與無央數百千之眾眷屬圍遶而為說經，坐大清淨師子之床，勇猛無畏為師子吼，如日普照若月盛明如火消冥。其座暉赫威光巍巍，超踰釋梵。佛身特顯，猶須彌山現于大海。所說經典上中意語靡不妙善，義美具足究竟清淨，常修梵行廣演恩慈。宣菩薩行講菩薩法，所當遵修名曰淨行。

爾時東方去此佛國九百二十萬佛土，世界名善變，其佛號淨住如來、至真、等正覺，現在說法。時佛左右有一菩薩，名羅陀隣那朱(晉曰寶髻)，與八千菩薩俱，於其佛土忽然不現，至此忍界住于梵天。以一寶蓋覆斯三千大千忍土，普雨天華其色若干。在於梵天而說頌曰：

/gatha/
「諸天人民獲善利，　心願見佛釋師子，　為消惱熱諸俗事，　心願堅固志佛道。
　無數菩薩如江沙，　以精進力行超越，　降伏魔眾億百千，　得成佛道離垢憂。
　吾從東方而發來，　其世界名曰善變，　在彼淨住佛左右，　欲得稽首釋師子。
　假使有人欲聽法，　若覩十方諸菩薩，　設欲歸禮彼世尊，　速疾來到靈鷲山。
　諸導師眾難得遇，　經典之要甚難值，　人身難得及閑暇，　篤信禁戒誠亦難。
　假使今時造德本，　則見眾生處邪冥，　便能開心令滅度，　速行俱詣於最勝。
　若欲解棄三惡道，　獲致安隱天人處，　逮得無為消生死，　則當往詣無等倫。
　為良醫王施甘露，　尊猶導師示正路，　彼為法王執尊寶，　降伏一切眾生趣。」
//

於時寶髻說斯頌已，以此頌音告于三千大千世界。賢者舍利弗聞說斯頌，前白佛言：「唯然世尊！此妙頌義為從何出？」

佛言：「東方去此九百二十萬佛界名善變，佛號淨住如來、至真、等正覺，現在說法。其佛左右有菩薩名寶髻，與八千菩薩俱到此忍界欲來見佛，稽首問訊咨受經典，并欲見十方諸會菩薩，故住梵天說此頌耳。斯頌之音普聞三千大千世界，令無央數眾生之類殖眾德本，俱來詣佛。」

於是寶髻與八千菩薩及無央數諸天子眾周匝圍遶，鼓百千伎、雨諸妙花、演大光明動三千界，往詣佛所稽首足下，各遶七匝正住佛前，八千菩薩亦復如是，諸天子眾悉皆侍從。寶髻菩薩前白佛言：「唯然世尊！淨住如來敬問無量，所志康寧，住於輕便，勢力安乎？蒙天中天鄙身詣此，願垂恩慈，為諸菩薩大士之眾，班宣道教所當應行。菩薩住此，得究竟成具足清淨，而普被服一切德鎧，積累眾善平等之行，淨修其身。皆見一切群生所念，觀其相行而隨開化，則以智慧為淫怒癡而講說法，令致妙行。若有眾人住於邪法，便為演示平等之教。為諸如來所見覆蓋，眾生之類皆得蒙賴，一切諸魔不能得便，逮覩諸佛無所罣礙。敢可遵修皆成如來清淨之行。如此之義何因致乎？」

佛告寶髻：「善哉善哉。族姓子！乃問如來如此之義。諦聽諦聽善思念之，吾當解說諸菩薩等所行清淨。」寶髻菩薩與諸大眾受教而聽。

佛告族姓子：「菩薩有四事法，所行清淨。何謂為四？一曰行度無極，二曰常當遵修諸佛道品，三曰具足神通，四曰開化眾生；是為四。行度無極，所可勸助靡不周普入眾德本。道品法者，遊于大慈，曉了應時慧之所入。具神通者，分別人民心念所行善惡之業。化眾生者，大哀堅固，明識志性之所歸趣。」

佛告族姓子：「何謂菩薩施度無極所行清淨？謂所可習慳貪之心，皆棄捐之習布施心。已能放捨壞於貪懿瑕穢之事，興勸布施，一切所有惠而不悋。彼行施已，而於四事不造若干。何謂為四？一曰眾生之類無有若干，二曰一切經法不各各異，三曰所可勸助亦無差別，四曰志性所施亦無若干。彼何謂於諸眾生無有若干？不興此念：『吾當施某、不施於甲。施某福多、施甲福少。厚施於某、薄施於甲。好供施某、趣施於甲。常當施某、時一施甲。親自斟酌授與於某、不自勞身授與於甲。盡用施某、粗施於甲。此人奉戒、斯人毀禁。此人眾祐、斯人寡祐。此人能畢眾祐之德、斯人不能。此人修正、斯人行邪。此人奉行平等之業、斯人墮落反邪之業。』」

佛言：「如是族姓子！菩薩布施，皆當棄捐如是輩心，修平等志不懷若干。常念眾生等心應之，而以開化平意識戒，慈悲喜護無所遺忘。所謂等者，猶如虛空都無增減，是謂眾生無有若干。」

佛告寶髻：「何謂諸法不各各異？假使說法而宣平等，亦不念言：『奉修法者吾當與經、不能順法則不授也。若使普備一切法者吾當與之、不能具法吾不與也。』欲興道教行法施者，施於凡夫不謂損耗、施於聖賢不謂長益。又計諸法本悉清淨等無差特，以是之故所施當等。是於諸法不各各異。彼所施與供養之具，有所勸助亦無若干。若布施時不作此念：『吾當獲福，望於帝釋梵天人位。』不願國主豪尊長者，亦不慕求色聲香味細滑之法，不志饒財珍寶重貨眷屬侍從，亦不貪羨五趣生死。所周旋處，不求聲聞緣覺之乘。敢可所施則用志求無上正真之道。是謂勸助而不差別。諸可放捨，志性在道無差特心，合會別離初無增減，不望相報，唯欲開度諸不及者越于彼岸。其心質朴而無諛諂，懷抱篤信內性淳淑，未曾悔變。施所珍愛其心歡喜，若有來求意能惠與益用悅豫。是族姓子志性所施亦不別異，斯謂菩薩施度無極無有若干。」

佛言：「復有八事，棄捐邪徑行布施業。何謂為八？不見吾我、不見有人、不見有壽、不見斷滅、不覩有常、不住三處、不見無處。若布施者，則當嚴淨於是八事。菩薩布施，棄四住業。何謂為四？一曰捨於非法，則以經典開化凡夫；二曰捨聲聞意，志于大道；三曰捨緣覺法，修於平等；四曰遠於止處諸所倚著。是為四。當復離於四事思想。何謂為四？一曰常想，二曰安想，三曰淨想，四曰我想；是為四。復有四事，為清淨施。何謂為四？一曰身淨，二曰言淨，三曰心淨，四曰性淨；是為四。復有三事施，越諸罣礙。何謂為三？一曰捨於悕望，二曰棄捐懷恨，三曰離於小乘；是為三。復有三事，捨於應施離諸恐懼。何謂為三？一曰貢高，二曰輕慢，三曰魔業；是為三。復有四施以法見印。何謂為四？一曰內空，二曰外空，三曰人空，四曰道空；是為四。復有四施專惟精進。何謂為四？一曰飽滿眾生，二曰具足諸佛之法，三曰備悉成就相好嚴容，四曰淨治佛土；是為四事。復有四施心常不捨。何謂為四？一曰意常念道，二曰常欲見佛，三曰修于大慈，四曰滅除眾生塵勞之穢；是為四。復有三施嚴淨道場。何謂為三？一曰淨我，二曰淨人，三曰至道場淨；是為三。復有四施所與清淨。何謂為四？一曰以慧布施，二曰則能可悅眾生之心，三曰曉了勸助，四曰明解觀察經典；是為四。」佛告族姓子：「是為菩薩所可修法，施度無極致清淨行。」

佛告族姓子：「菩薩行戒度無極，有一事致于清淨。何謂為一？解菩薩心而無等倫，其心超過一切世間最尊無比，越諸聲聞緣覺之意，心能降伏一切諸魔，入於眾生所至名德為無量寶，諸遵習法普有所護心未曾忘；是為一。復有二事，戒度無極為清淨行。何謂為二？一曰常懷慈愍無害眾生，二曰心志於道調柔性行；是為二。復有三事戒無極淨。何謂為三？一曰身淨，淨身三事戒無闕漏究竟備悉；二曰言淨，一切所說無有諛諂；三曰意淨，蠲除諸穢貪欲危害。是為三。復有四事戒無極淨。何謂為四？一曰其戒清淨，二曰奉禁不毀，三曰以此戒法教化眾生，四曰見持戒人敬之如佛；是為四。復有五事戒無極淨。何謂為五；一曰不歎己身，二曰不毀他人，三曰捨聲聞志，四曰離緣覺意，五曰無所貪著；是為五。復有六事戒無極淨。何謂為六？一曰常念於佛不毀禁戒，二曰常念經法順修其行，三曰常念聖眾不違佛教，四曰常念於施普捨塵欲，五曰常念禁戒不復貪慕一切五趣，六曰常念諸天宣眾德本；是為六。復有七事戒無極淨。何謂為七？一曰篤信樂諸佛法，二曰常自念慚為眾重任，三曰念愧思道品法而不自大，四曰仁和不惱彼我，五曰無害畏於後世殃罪之患，六曰不煩擾人止心憂慼，七曰見諸眾生在苦惱者而愍哀之；是為七。復有八事戒無極淨。何謂為八？一曰無有諛諂，二曰無希冀心，三曰不貪利養，四曰捨於慳懿無所依倚，五曰己身所有而知止足，六曰行賢聖禪具足澹怕，七曰處於閑居不惜身命，八曰樂於獨處遠離眾會好於道法、畏懼三界不取無為；是為八。復有九事戒無極淨。何謂為九？一曰無所趣律教化眾生而令得度，二曰稍漸習定修治其原，三曰令心究竟不懷惱熱，四曰求於靜漠止心所念，五曰習行威儀禮節之正，六曰超度禁戒不見己身，七曰未曾欺惑愍哀群生具足大乘，八曰究竟成就戒法之業使不缺漏，九曰心常懷念勸助德本；是為九。復有十事戒無極淨。何謂為十？一曰淨身三事；二曰淨口四事；三曰淨意三事；四曰念棄諛諂；志性質直而不細碎；五曰心性普入靡不蒙度；六曰一切所覺而知節限，愍哀為本悉解諸結；七曰心無剛鞕，教化眾生悉調和業；八曰常修己身，見諸等類恂恂恭敬；九曰於諸眾祐勸示法事；十曰奉以衣食使離世業。是為十。復有二事戒無極淨。何謂為二？一曰有毀辱者，寧失身命終不毀戒，不興想念、不慕財業；二曰無所周旋亦不貪求，一切諸法戒空無像。復有二事。何謂為二？一曰內淨，除諸衰入；二曰外淨，捨諸境界。是為二。復有二事：一曰淨其道心，解自然相故；二曰戒品清淨，無諸相故。」佛告族姓子：「是為菩薩戒度無極清淨之行。」

佛告族姓子：「何謂菩薩忍度無極所行清淨？若罵詈者默而不報，是口清淨。若撾捶者受而不校，是身清淨。若瞋恚者哀而不慍，是心清淨。若毀辱者而不懷恨，是性清淨。又若聞人發麁獷辭，以護眾生不興忿恨。設有刀杖加身瓦石打擲，護於後世而不懷害。節節解身不以憂慼，將順道故。見人求乞不起瞋恚，濟四恩故。發于慈心不惱恚者，親佛道故。造悲哀心，具足願故。功勳流布莫不奉命，多所愍故。仁心德稱所可布施，為道法行棄魔天故。又念佛道而行忍辱，成佛身故。若念覺意而行忍辱，具十力故。若念於惠而行忍辱，欲備三達無罣礙故。設念愍傷而行忍辱，成大慈故。念度虛妄而行忍辱，究大哀故。念如師子無恐懼者而行忍辱，無所畏故。念無見頂而行忍辱處於眾生，不自大故。念具相好而行忍辱，普欲救濟一切世故。具諸佛法而行忍辱，成通慧故。」

佛告族姓子：「有二事法淨忍辱力：一曰精修道業，二曰合集義力。彼所可言，若能忍辱身心無倚，是集義力。於一切法而無所著行忍辱者，是修道義。有淨忍者能忍眾生，了知無人堪任諸法，悉為澹怕，是為淨忍。所以者何？於彼亦無可忍及與非忍，於一切法無所逮得，乃名曰忍。計於忍者亦不可獲，於一切法無所著者，乃名曰忍。其無所倚忍無處所，不受諸法是曰為忍，不以所取為忍辱也。其有不計我人壽命之法，是曰忍辱。不著身命，察如牆壁瓦石之數，乃曰為忍也。」

佛告族姓子：「菩薩有二忍：一曰曉了身分散事，二曰明識諸法皆悉本無乃成忍辱。是為菩薩忍度無極行清淨也。」

佛告族姓子：「何謂菩薩進度無極為清淨行？不捨道心，所可興業未曾怯弱，常遵勤修而不睡寐，不離德本積累功德，不以退還於度無極。若造行者方便求法，堪任為人講說經典，護于正法多所度脫，不厭大慧開化眾生，嚴淨佛土度于小乘，具足本願究竟聖慧。未曾違失施戒博聞，親近權慧已至福家，當以何意勉濟群生令無憍慢，是謂精進。彼何謂淨？若曉了身猶如影響，所言柔軟識不以倦，其慧究竟而心淨寂，明於所行永不可盡，分別諸滅以慧消化，而成一心慧無所起。彼以三事離於精進：一曰倚著因緣，二曰行顛倒事，三曰望想之滅。若於三界無所倚著，是為精進。復有三事。何謂為三？眼無所著，不倚於色不貪於識。耳聲識、鼻香識、舌味識、身煖識、意法識，亦復如是悉無所著。彼無所受亦無所習，故曰精進。無施不慳、無戒不犯、無忍不諍、無進不殆、無禪不亂、無智不愚，不造德本亦無不善，不求佛道不得聲聞緣覺之地，其無所行亦無不行，則便逮成二精進淨。何謂二？一曰內無所住興諸因緣，二曰捨於外見眾想諸識；是為二精進。復有二淨。何謂二淨？一曰於內寂定，二曰不遊於外亦無放逸；是為二淨。其根精進，於諸所行而無所行亦不輕戲，是為菩薩進度無極清淨之行。」

佛告族姓子：「何謂菩薩寂度無極清淨之行？慇懃合集一心之事，觀所應察而以正受。彼若一心禪不著色，棄捐痛痒思想生死識。彼若禪者，不著眼耳鼻舌身意識。彼若禪者，不貪色聲香味細軟法。彼若禪者，不著地水火風空，不著帝釋日月梵天尊豪之位，不著欲色無色之界，不倚今世及與後世，不住於身亦無所處，不倚言辭心不疲懈，悉無所住無卒無暴，不住邊際得無所念。彼若禪者，不計有身、不興諸見、不貪我人壽命、不見微妙可不可事、不見斷滅不覩無常、不見生滅有處無處。彼若禪者，亦不永盡眾漏之源，不著諸佛，不入寂滅果證之跡，亦不長處於無所行。若行禪者，一心解空不以空為證，求於無相無願，不以無相無願為證。被大德鎧行無極慈住於大哀，一切具足奉行空事。何謂具足行空？不想布施持戒忍辱精進一心智慧，不想善權諸所開化，不想慈悲喜護，亦不悕望入於聖慧。不想道心有所觀察，不想志性意有所應，不想四恩慧施仁愛，利人等利一切救濟。不想其意安詳而有所存，不想意止、意斷、神足、根、力、覺意及八由行。不想寂默而觀察法，不想調定柔濡之行，不想慚愧有所羞恥，常住佛道未曾斷絕。隨法眼教執於炬曜，從聖眾戒常修鮮潔，立觀眾生成就佛身，以德莊嚴而從世雄，聞具足音奉佛三昧，獲於正覺神足之辯，受十種力住無所畏，逮於微妙十八不共諸佛之法，不與聲聞緣覺合同。拔去止處諸欲塵穢，不離神通開導眾生，四分別辯精進明了，現世度世之法教化眾生。與眾超異質直出家，度於駛水而過泛流，斷諸所有所可住處，自然靜寞法教澹怕，觀於身法無所貪愛，志於佛法了自然想。越諸住行默口言辭，有所說者常宣佛語，以此至誠消滅常然開化眾生。是曰具足行空。」

佛告族姓子：「譬若三千大千世界所有人民悉為畫師，各有所習，巧能不同、所善不等，或工畫屋宅不工畫體，或便摸者不能博彩，或工於手足巧於耳目，或頭首不端身形姝好，或有不能。所習各異，或能可人或不可人，所知殊別容貌不同。王盡召畫師，應時皆至。王令畫作三界諸形，而告之曰：『各自畫像以持示吾。』皆合眾師聚於一處，各各畫形。一師最上悉得其體。族姓子！所憶云何？為能普備諸所能不？」

答曰：「唯能。」

佛言：「借引為喻，當解斯義。如一畫師悉圖諸形，各各得體不失其旨。其學此法亦復如是，慇懃精進淨修梵行逮成佛法，以一正行悉具眾事。由此之故，具足空行靡所不達，便得成就一切佛道，皆除塵欲顛倒眾想，貢高自大不樂放逸，雖處眾穢不與合同，是謂菩薩具足空行。」說是語時，八千菩薩普備空行。逮得法忍。「是為菩薩寂度無極清淨之行。」

佛告族姓子：「何謂菩薩智度無極清淨之行？有十二事為清淨行。何等十二？見於過去慧無罣礙，見於當來慧無罣礙，見於現在慧無罣礙，有為無為皆能曉了，一切世間所有術藝，當可造業明解度世，分別說於真諦之義。知其所習宣其本末，一切眾生諸根所趣，柔劣明達中容之人，去來之慧無所罣礙，其聖巍巍超逾世智。悉見眾生志性所行、形色變異，難解難逮深奧之義，消化諸見。離於眾邪諸所住處罣礙之事，入于聖慧普周眾生入於法慧。明解聖藏義之所歸，了真所入。其明所照無所錯亂亦無所礙，觀察時節所樂無量，所見諸事咸皆了了無所違失。覺識誠諦實不滅盡，彼所觀察一切無拒，以用一行而無所行。皆見眾生之所奉行威儀禮節，世間人民心志所趣菩薩悉見。不離於世而皆超度諸世境界，尚未成就佛之土地皆越一切所作因緣，開化眾生過於諸行而普究竟眾德之行，廣度一切因緣心行。皆見眾生心之所念，護世間法莫不周遍，不捨世俗所行信入眾生之念，計其智慧無有卒暴，不犯巇嶮諸根寂定，未曾疲懈不以為亂。永觀聖慧常與德合，詣於佛樹而坐道場，降伏眾魔捨於外道，行有所受聖曜普徹亦無所取。大聖所逮得諸佛住可悅眾生，悉見定慧普入眾義，一切諸法皆為同味，執權方便智度無極，越於彼岸不可限量。此乃名曰智度無極。皆能曉了一切因緣，所興眾想、瑞應怪變、心行所念，令得過度，是則名曰度於彼岸。又計此慧有二清淨：一曰無礙慧想清淨之行，二曰嚴淨，莫能有人當其慧相。復有二淨：一曰淨除顛倒，二曰淨去諸見。又彼菩薩所行智慧靡不普入，聖明備悉，曉了眾生達識經典。其菩薩者以此智慧解無所有，皆入勞塵親化愛欲。在諸所生處于諸界，建立智慧遊諸境土皆了境界，誠諦智慧不度彼此不處中間。其慧普入，見於十方無所罣礙，用無蔭蔽致無邊際。見誠諦慧，明曉一切諸法本末部黨時節，已能識別真諦智慧，義之所歸無應不應、無合無別、無懈無進、不雙不隻，計於諸法亦無應合。

「又族姓子！菩薩若行智慧事者，以慧為舍則成福堂，篤信名德道法之室，住於總持分別智辯，一切備悉具足慧事。是族姓子！菩薩奉修智度無極清淨之行。」說此語已，彼時會中二萬二千人皆發無上正真道意，八千菩薩逮得無所從生法忍，五千比丘漏盡意解，一萬天子遠塵離垢諸法眼淨。時諸天子舉聲歎曰：「若有眾生逮得聞是諸度無極清淨之行道法門者，則為諸佛所見授記。何況有聞能奉受持諷讀誦，行如上教乎！」

佛告寶髻：「何謂菩薩佛道品法清淨之行？自觀其身知本無身是為意止，則以二事而立其志。何謂為二？一曰察於荒穢，二曰觀清淨行。何謂荒穢？此身無常積滿不淨，是身薄力劣而無勢，是身化立如傾危屋。何謂觀淨？吾當以此不淨之身精勤解空，得如來身法身。法身巍巍德身無限，為諸眾生示現色像悅可一切。是族姓子！觀身二事以立其意。又族姓子！菩薩觀身了無身已，得淨二法。何謂為二？一見無常，二察有常。是身無常不得久立，老病俱合會當歸死。已達此義，不用身故而造邪業，以不會身則修堅要、行三堅法：一曰身要，二曰命要，三曰財要。此身無常，一切眾生以為貴重，何所益乎？當行愍傷。何謂身要？身不犯惡，謙卑恭順稽首博智。何謂命要？歸命三寶，奉修十德六度四等。何謂財要？捐已布施給諸貧乏。身非我有，口之所言皆多有失，從致諛諂麁辭不正。用是之故，悉棄此行不復為非。已見無身不保壽命，假使被害不犯惡事。曉身非常為分離法，不犯非宜，一切所有施無所貪。已解無身，所獲善德功勳顯著不可稱限。何謂有常？設使觀身了無身者，以時攝取心所了慧，勸一切智不違佛教，不失法言不壞聖眾，勸化群黎執御人民，是謂有常。所以言常，不可盡故。所言無盡，謂無為也。與道合同，無終無始玄妙永存，此謂無為。其無為者乃為常耳。菩薩在彼，以諸德本觀諸通慧至於無為，是謂有常。所以言常，以空無相無願之故。修菩薩道常奉空行，觀於無相不著無願，普具一切精進之行，是謂有常。所言常者謂如虛空。菩薩等心如空無異無有思想，如是行者乃為菩薩是謂有常無上正真。」

佛告族姓子：「菩薩觀身了本無身，則曰意止。一切人身皆悉本空，以解身空意無所著，觀眾生身立在佛身。當作是觀，若如來身無有諸漏，吾身亦然。察於諸法，奉行道義不失佛教。得無漏身而觀眾生分別諸相，以無漏身無漏清淨本際亦淨。如其德本興立諸行，勸助德本亦無諸漏，以能逮成無漏法者能住諸漏。何謂諸漏？一曰欲漏，二曰有漏，三曰見漏。彼斷欲漏，設生欲界開化眾生。若斷有漏，遊在生死於諸所受教授人民。又見漏者，則是無明癡冥之漏。菩薩於彼精進不懈，究竟精進拔其根原。彼若觀身奉修意止，超度往古諸不應行，離於眾穢而遵澹怕，乃為觀身便無所度，亦無所生則無所為，乃為觀身。假使觀已不見有身亦無所察，捨於貪身不計吾我，已無吾我則無所貪，已無所貪則無所諍，已無所諍則無殃釁，已無殃釁逮得法忍，已得法忍則無所歸，已無所歸則無卒暴，已無卒暴不住自大則住於法，已住法者不行非法。順法行者常與法俱，修道法者則逮法慈，已受法慈則聞法音，已行法音不聞界音，已寂界音便逮三昧，而已正受則觀審諦，已觀審諦則無所想，已無所想則無所作，已無所作則無非作，已於諸作無作非作致正真法便等諸法。已等諸法，便逮通慧一切之智。是族姓子！菩薩觀身了本無身意止行淨。」

佛告族姓子：「何謂菩薩痛痒意止？謂觀痛痒本無痛痒，乃為意止。覩諸苦痛，皆見眾生諸在患難，為之雨淚逮成大哀。作是惟念：『眾人在惱，若得安者乃無痛痒。』則為斷除一切危害。乃致觀痛知本無痛，意止所行已滅痛痒，為諸群生被大德鎧，先自消身非法之行，亦不想念滅已痛痒。若有遭痛，普為一切執御大哀，為示永安長消眾患。為貪欲人興發大哀，先除己貪不為欲縛，設身遇苦不以為難。為瞋恚人興發大哀斷己恚結，彼則觀見不苦不樂之痛痒也。為愚行人興發大哀滅已癡縛，彼觀痛樂則無所著，消壞諸結而自由安。若得苦痛不以憂慼，捨諸有為，則能遵修令無苦樂以壞愚癡。若遇樂痛無所積聚，若遭眾患了身非常，觀苦痛痒察痛無我。彼觀樂痛修行安隱，其觀苦痛則為瘡病，以是之故名曰不樂不苦。設使觀見諸所有安皆歸無常。其有眾苦，計於苦者不苦不樂，則亦無我。菩薩若見諸安樂事，明識一切本則無安，是觀痛痒。知痛無本適起尋滅，曉了諸法不得久存，察於萬物焰生忽沒，視一切法所生如影，從何所來而尋散滅？觀諸法本如瞻手掌，從何所來去至何所？即便了之，無所從來去無所至。以觀諸法不以為患，普見一切篤信休息，因此成道。以成於道，亦無所得不復退還。所以者何？以能逮見一切眾人根本所興則求滅盡，不為己身而求滅也。是族姓子！菩薩大士善權方便，執御大哀觀於痛痒，了本無痛意止之行。消諸所見，明識於此，不以遇於三界諸痛滅取證際也。彼於眾痛觀佛歎本，曉了諸痛寂默恬澹，本無所有亦無遭患永無遭患。諸法皆空離於吾我，徒見合會依於因緣，悉無有主亦無吾我，捨諸所見無所長育。彼觀如是則真諦見。因緣所合皆不可得，已不可得便作是察如因緣空，從是興立諸法亦空。已達空義，乃為觀痛本無痛痒，為意止也。所謂寂寞，身澹怕故，選擇諸義道聖慧，是族姓子！菩薩觀身痛痒了本無痛意止淨行。」

佛告族姓子：「菩薩觀心了本無心為意止行，立於道心以得立心，以己意慧求其心本，不見內心不見外心不住內外。察其心本不見五陰，無諸種無諸入，其心寂定。求其持處從何所起？則更思惟心從緣起。尋復思惟其心為異，因緣異乎？即復自了。設因緣異其心異者，則有二心；設使因緣是心、心是因緣，以是之故心不見心。計於心者非不見心，猶如虛偽，無實諸塵住於虛空。利刀傷指本時為瘡，指瘡已差無所患苦。如是族姓子！心亦如是，由是之故心不見心。心所見者則無所見，應觀如是心所住處，亦不起罪不見斷滅，不念常存亦無有身。身如牆壁，因緣不亂不離愍傷，亦不有是亦不有異，是為心也。持心如是。心動為法，心無所住亦無所行，心不可見心相自然。作是曉了，所見若茲不離所見，其心寂然明識無本，是為菩薩觀心無心為意止也。

「又族姓子！設心不起而不可見，則無有想無應不應，亦無輕慢則不放逸，是為觀心知本無心為意止也。又如心無色，其因緣合及與辯才亦復如是。德本無色，如心無為德亦無色，所勸道心亦復無色。設使道心及與勸助無有形色，道亦如是悉無所有，是故言曰如其心者行亦如之。計若勸助道心亦如，如其道心人心本淨亦復如是。道心本淨，一切諸法亦復如斯。如此心者曉了普入，是為菩薩觀心無心為意止也。眾患所惱未曾停住，猶如獼猴及河駛水，亦若油燈光曜所出忽然遠遊，無有身形而易退轉，貪悋諸界六情之患以為屋宅，須臾變異各隨所應。心無有處而獨遊行，無有堅要亦無不要寂然獨觀，是謂觀心無心意止清淨。心所入慧心之法界，慧心所住其明本淨鮮潔無穢。知心真諦心了現在，目之所見心法平等，慧亦如心心等三世，已能平等便知真正，心慧自然無能護持觀不可見，是謂觀心無心為意止也。計其本淨則為自然，心亦本淨了眾生心，以心淨故開化人民為其說法，以能解知己心自然，一切眾生亦復自然。若能分別心如是者，見其心相而為說法。如心相自然，眾生心相自然如此，若能達斯相者，為其說法己心則空，眾生之心亦復為空。已解此空為其說法，等御己心。若能等御而為說法己身則等，已等己心則等眾生，已等眾生則等諸法，已等諸法則等諸佛。曉此真諦，不令其心離於貪欲不處於欲。心已止者，則入法界趣於自然，心無所住於法無動。是謂菩薩觀心無心意止清淨。」

佛告族姓子：「菩薩觀法知本無法為意止行，即自念言：『法起則起、法滅則滅，計於本末亦無我身，人壽有命人與非人生老病死終沒所趣，於此諸法諸法合會。因其合會而為習俗，設無緣合則無有此，從其習樂因成緣會，則興善本及與惡本，以歸無常無有緣會，不從無習而起諸法。』彼觀如是曉了諸法，見所歸趣亦無所有，空無相無願所作功德及無功德，彼諸所行如幻無常，當奉精進設興因緣。有十尊行極上無蓋，除去因緣志于大法。何謂為十？身淨無穢，諸相種好無能見頂。超度一切諸所侵枉，志性清淨具足十事。其心清淨具足正行，六十億音口之所說可悅眾生。其心淨者常懷慈仁，愍念一切無所加害。其意常定未曾有亂，辯才清淨，有所講說應于法義，辯不可盡。大慈清淨，勸化眾生一切令樂泥洹之界。大哀清淨，無央數劫不厭生死。淨十種力，曉了眾生根原所念各各不同。清淨無畏分別執御，無央數法眾生積聚，欲具諸佛不共之法。去來今慧三世無礙，諸佛法淨用能自在，歸聖慧故；是為十。彼已逮此尊妙極上無蓋大法十事之行，稱量思惟不以厭倦，積累功勳而不毀墮，無德之行慇懃精進。何謂諸法根原所來令無處所？度於所住諸宿塵勞，已曉萬物一切無常，便能興成無常三昧。得是定者無堅要想不亂三昧，從其本願示所向生，來有所入而復出生，則以班宣功德之行開化眾生。是族姓子！菩薩大士善權方便，普說經典觀於諸法，達本無法為意止也。其有致道遵修經典，若能曉了道品之法，不作眾善不見有常，亦無所著不除惡法，道心所見所在無斷，亦不計常不墮斷滅。若有菩薩棄捐見常斷滅之事，執心平等而無所住處於中間。何謂中間？不應念行，無明眾冥悉除去此，是謂中間。無有教令無可誨授，無言無說，是謂中間。取要言之，無明、行、識、名色、六入、觸、痛、愛、取、有、生、老病死憂慼之患，惱無可會皆已除盡，是謂中間。其所教者無有智慧亦無處所，是謂中間。其中間者，無有驛使亦無遣者。如是宿處計彼所有，無有教令無訓誨者，計是本末不可決了，未有所處不可捉持則無所著，寂寞澹怕忽然已滅，是謂中間。譬族姓子！呼響所出無有處所，其趣親近音生於對，若見諦者墮於真偽，是為中間。無言無說，彼則無見亦無所處。如是族姓子！所因興發識色之事及所教令，所因合成從二緣對，其中間者無教無說，是謂中間。因緣合成不用義理，其義理者則不可得，其不可得則不重來，其不重來是謂中間。又計我者則了無我滅寂於此，於我不我自然清淨，是處中間計人壽命，於人壽命而無所見清淨自然，是謂中間。於想無想而無想樂，是謂中間。所興顛倒所得之事而無所有，是為中間。虛妄愚癡至誠之教悉不可得，是謂中間。此岸彼際消化己身令無所著，有為無為不行諸習，是謂中間。蠲除生死而去泥洹悉無言教，是處中間。」

佛告族姓子：「其觀於法了法本無為意止者，不壞法界其意自然而得意止。彼導法界曉了諸法，計其法界及與人界，於彼法界亦無所壞不毀人界，人界法界此二事者等如空界。彼以一界普見諸法，以慧眼見，則用法界觀佛所行。假使有人不選擇法彼則無見，以是之故諸法若干，見無本法不觀若干。若以觀法見本無者，不肉眼見、不天眼見、不慧眼見。所以者何？計使眼者，不受於想不肉眼見，彼眼不墮生死之行。若以天眼無所見者，不用彼眼行於放逸。若以慧眼無所見者，彼為觀法了法本無，普見諸法無有處所法無所住，已見諸法無所住者則行法意，便不違失往古所誓，是為菩薩隨諸佛教而自立意，敢可觀察深妙之法不捨道心諸通慧矣。是為族姓子菩薩大士觀本無法意止淨行。」

佛告族姓子：「是四意止行四精進。何謂為四？觀身無身，棄捐計實不淨為淨顛倒之想。觀痛無痛，棄苦為樂顛倒之想。觀心無心，蠲除無常計有常想。觀法無法，捨遠無我為我想者。於四顛倒而修平等則無所著。菩薩若能行平等者，則能清淨一切諸行。菩薩奉此平等清淨微妙行者便逮法忍，名四意斷亦得法忍。何謂意斷清淨？行者講說道法，以此因緣善本法行自然隨順，不從惡本不發瑕穢，諸不善本萌牙未生不令興起，為奉精進。諸惡適起非法之事尋便滅之，為修精進。諸善法事未興起者，勸令發生。以興善法益加精進，令其具足不使忘失，為行精進。又復菩薩本行淨業能自制護，不失善法得自在住，漸稍長育顯揚善法，善法已興不復忘失。彼族姓子如是行淨此四意斷，其菩薩行心得自在不亂精進，其淨垢濁不與俱合，清淨無垢不違佛慧，則從道教行于大哀，心心相見覩其所念，不失精進已行平等，曰得意斷。所以者何？從等安祥不用反邪，以因安祥不從反邪，便逮意斷平等三昧。已得三昧，名曰平等四意斷也。」

佛告族姓子：「若能修行此四意斷，則能奉行具四神足。斷除貪欲奉行精進，則令道心靜然無穢所思薄尠，已去非法則逮輕便，致成大哀精進輕舉。獲權方便已誡輕舉，因是之故成四神足，昇于道堂得四自在。何謂為四？於壽自在，已得長命由已無限，在短命中具無量壽勸化眾生，在長命中聽省說法，或有厭倦現於短命，使渴仰法慇懃求義，在在所生天上人間，各得自在於其壽命。是為第一逮得自在。又族姓子！身口自在，其人身口逮致由己，心不倚身逮意現形，隨其容貌而示色像，因其眾生威儀禮節體之好醜長短善惡，思惟正定以何律儀而可開化？菩薩則從變其形貌，坐起進止發意之頃，化一切人蚑行喘息人物之士，身形顏色皆為一類而為說法。是為第二而得自在。又復於法而得自在，在於三界執御度世之正典不行俗法，則隨習俗普現變化，亦不捨遠度世之慧，亦無所失至無礙慧深奧之道、十二緣起因緣之法而見迷惑。若生天上及與世間，隨其語言令無數人皆隨律教，從其所好上中下願各得其所，所得自在巍巍如斯。是為第三而得自在。又有菩薩建立其心使得由已，其自在者攝三千大千世界諸有大海合入一海而建立之，亦無往來而現變化。三千世界諸須彌山立為一山，使四天王及忉利天不知合散去來所趣。因而現變三千世界，而為建立諸有民人計皆知數樹木華實，令虛空中滿其水火，或化眾寶，從其所變而建立之。已能建立，發意之頃靡不蒙度，忽然如故。是為第四而得自在。又族姓子！菩薩以是四神足行而自修立，與十方佛共俱言談，坐起經行不離左右，與諸釋梵及四天王、天、龍、鬼神、揵沓惒、阿須倫、迦留羅、真陀羅、摩休勒、人與非人一切眾生，俱共相隨談言說事，坐起行步。所以者何？菩薩神足微妙巍巍卓然有異。往古修行善法之義，無有缺漏因獲致此。何謂神足往古修行善法之義？輕便其身恭敬尊長，奉事眾祐趨走給使不以為難，謙卑下意不懷自大，口說善言悅可眾人莫不敬愛，自歸稽首禮節備悉，言行相應其心輕便，不懷慢恣無危害意。彼修謙恭自伏其意，聽受尊言順教跪拜，執心柔軟而制其志，精進修行未曾捨離。其人具足戒之禮節，身所造行與眾殊特，心不懈慢亦不放逸。從其貪欲而起瑕穢瞋恚愚癡心，蠲除此已無有貪嫉。饕餮自除，志性不起，則病瘳愈度於眾事。所負重擔由因羸劣而致此患，陰蓋眾事為去其擔。五事所受施以恩惠依橋道度，以大船度四瀆具，度一切眾生之類越於泛流。有所開化超然有異，亂者正之、逸者定之、癖者立之、毀者笑之，不礙迴波決諸狐疑，所說殊異安諸動搖。救念諸界覺諸不寤，所可愛重每以惠施後無所悔。將濟眾生勸助道意，若見他人積累德本代其歡喜。未曾歎己為身獲安，見他人安歡悅善之。易養知足不望他利，愛樂出家勸人出學。修大弘慈常懷道心，等怨親友樂如虛空。見疲極者設以車乘，則以無畏加於眾生。見學問者敬之如佛，其未學者不以輕慢。其貧匱者施以財業，若疾病者救以醫藥令得濟命。見救護者為行恩報而以孝順，行禁戒者能自修慎。供養事之不失其意，無恭恪者勸救濟之度於世法。所經遊行不犯諸惡，於諸世事而無所著奉行諸德。是族姓子！修諸神足微妙巍巍，持行如是不失神足，常與其俱至成佛道。是為菩薩神足淨行。」

寶髻菩薩會第四十七之二

佛告族姓子：「何謂菩薩五根淨行？不受諸法而修道義，是為信根。願度彼岸不須御人，為精進根。不捨道意為一切故，是為意根。執御大哀欲濟危厄，是為定根。若能奉受一切諸法而修寂寞，是智慧根。又族姓子！篤信一切諸佛之法順從道跡，是為信根。奉諸佛法未曾懈倦，是精進根。念諸佛法聖義存心未曾忘捨，是為意根。修習佛定初不懈廢，是為定根。能除一切眾生疑結無所念願，是為慧根。又慕佛道不懷猶豫，是為信根。其性調柔順修精進無有退還，是精進根。勸助德本長而無損，是為意根。等演光明照於眾生救脫憒亂，是為定根。分別一切人之原本而為說法，是為慧根。超越一切諸所罣礙而無所著，是為信根。解眾生結令無諸縛，是精進根。志所奉行而無所著，獨步三界卓然有異，是為意根。知諸罣礙因緣所由，是為定根。了諸著猗智靡不達，是為慧根。又使所遵而無所惑，是為信根。化人不惑捨於非時常懷悅豫，是精進根。所從法教常行清澄，微妙之法不迷眾穢，不忘道義日日增修，是為意根。其心清淨奉行平等，而以正受聖慧均平而得度矣，是為定根。若於法界了無所礙，去諸非時住解明法，是智慧根。滅除一切諸非善本修行眾德，是為信根。遵諸善本順從經典，是精進根。積累眾善不違失法，是為意根。定意歡悅不貪樂安，分別眾生諸德之本，是為定根。奉行眾善從其方便等修道法，是為慧根。又信勤修捨諸懈廢，意無所求無所忘失，將護定意令不迷惑，奉行智慧開化愚癡。又行信者棄捐邪法，行精進者放捨吾我，其心專一度於貪身。以能行定，裂壞諸網六十二見。其慧智者，蠲除一切猗著恩愛。是族姓子！菩薩所修五根淨行。」

佛告族姓子：「何謂菩薩行五力淨？若計於此能立五根，奉行不捨降棄四魔，不從聲聞緣覺之乘，從於大乘未曾退還，消眾愛欲塵勞之穢，其願堅固心得自在志存勇猛，其身康寧強而有勢，諸根澹泊不壞篤信。是族姓子！名曰信力。所不當作而不為之，制御其性而令均調，是精進力。所當修者而皆行之，其意勢強，是為意力。所造道業未曾忘失以度一切，是為定力。不為色聲香味細滑眾念所危，超度一切猶豫眾結意之所住，是為慧力。又信力者，不從他教而有所受。精進力者，所當執持而不忘捨。其意力者，逮得總持不共道意。其定力者，說法平等不從偏黨。其慧力者，決諸狐疑解散眾生結網之縛。又信力者，則能具足誠信之勢。精進力者，解脫堅強度未度者。其意力者，具足解慧度知見力。其定力者，具足究竟志性之力。其慧力者，具足一切眾行之原。又信力者，能制慳貪垢穢之難。精進力者，皆能放捨一切所有。其意力者，所顯德本勸助道心。其定力者，等心遵行捨諸所求。其慧力者，諸可修行未曾望報。又信力者，釋除一切毀戒之聚。精進力者，慇懃修禁未曾違失。其意力者，具足道心令不闕漏。其定力者，輒得歸趣仁和之地。其慧力者，於諸所行皆斷生死。又信力者，離於諍訟瞋恚之本。精進力者，正念所行遵修忍辱。其意力者，具足道行亦不毀法。其定力者，先自制心令不放逸，擁護一切眾生之類。其慧力者，不計吾我亦無人想。又信力者，棄捐懈怠眾穢塵垢。精進力者，皆得超度一切因緣，不為惡事之所見迷。其意力者，修行於道而令具足。其定力者，身得休息能諧降魔。其慧力者，於諸所作無不作。又信力者，消化諸垢眾邪之行。精進力者，合會眾生而開化之。其意力者，常一其志而勸助之。其定力者，常行靜寂未曾憒亂。其慧力者，曉了諸人所行之法。又信力者，棄於諸見所識眾垢。精進力者，常勤修行求於博聞。其意力者，嚴淨思念所行如應。其定力者，心無所生乃能逮得。其慧力者，精學堪任令致成就。又信力者，常得至誠七財之貨。精進力者，曉了分別致七覺意。其意力者，心常整齊未曾憒亂。其定力者，則致超度七識之住。其慧力者，過於八邪而無著也。無能破壞心常清淨，是為信力。奉行清淨而不退還，無淨不淨、無應不應，是精進力。清淨其意合集群類道品之法，無意無念，是為意力。其心精進修於寂寞乃為正受，是為定力。若能清淨，不為諸見之所迷惑，奉諸德本，是為慧力。是族姓子！菩薩所行五力清淨。」

佛告族姓子：「何謂菩薩七覺品淨？彼以發顯意覺品者，而得自在不共道慧。法覺品者，觀察所行則隨應時而無所著。精進覺品，所勤修行至無罣礙。歡悅覺品者，心成無所樂。信覺品者，身意休息得至究竟。定覺品者，離於志味而得達至。觀覺品者，所可造業而悉成辦。又求道心亦無所得亦無所失，是意覺品。若將護法精進日新，是法覺品。開化眾生不以厭倦，是精進覺品。設樂法樂慇懃思議，是悅覺品。若化人民滅除塵勞建立於道，是信覺品。若住等意心不懷亂，是定覺品。若能察行聖賢之慧建立眾人，是觀覺品。無憂不念若如師子，過於聲聞緣覺之乘，是意覺品。一切諸法皆悉清淨，曉了此者是法覺品。其行清淨，護身口意而無所犯，是精進覺品。淨無所著離於危害，是悅覺品。嚴修所行，所當為者而悉成辦，是信覺品。未曾順從世之同塵，平等色像，是定覺品。未曾住於二法之行，離於漂流，常見將護救於眾生，是觀覺品。」

佛告族姓子：「所以名曰覺品者何？了了曉諸法靡所不達，分別稱量識知所趣，解其威儀禮節所歸開化眾生，彼所住處己身勤修廣行道義，除去結縛諸所拘綴，是意覺品。斯則為是賢聖之行，非是愚夫所修。說其聖行非魔所行，非是貢高自大所行，聖賢行者，此則非是外道異學之所及逮。賢聖所行，不行色聲香味細滑之法。賢聖行者，則無眾想因緣之著。賢聖行者，便無選擇處所方面有所忘失。賢聖行者，無心意識念言之行。賢聖行者，離於見聞念知識法。賢聖行者，無有泥洹造念思想。於一切法無所行者，是賢聖行。修於經典，一切無有應與不應念與不念亦無他想，是賢聖行。於一切法悉無所住，不慕尊處所，是賢者行。於一切法而不錯亂，順行正義各令得所，是賢聖行。於一切法未曾諍訟，和同止住，是賢聖行。奉行諸法無諸法想，不失道意，是賢聖行。此族姓子！修七覺品聖賢淨之行。」

佛告族姓子：「何謂菩薩修八道法清淨之行？所謂八道行者，一曰正見。何謂正見？若能奉行一切諸法，於我不我不住空觀。所以者何？察身吾我等無差特，亦復不住觀身人空。所以者何？身人及空亦復等耳。亦復不住觀人壽命與空別也。所以者何？人壽命空。觀心平等，亦復不觀所有生死，離於終始空無之義。所以者何？所有生死及終始患，所見空者悉亦等耳。不住觀空斷滅常見有吾有我。所以者何？斷滅常見悉亦等矣。亦不計身及所觀空亦不住此。所以者何？身吾我空悉亦等耳。亦復不住見佛法眾觀空之行。所以者何？見佛法眾及所觀空悉亦等矣。是族姓子！有彼此見觀至滅度，是為正見見佛法眾，其邪見者不離顛倒也。若於諸見無所想念上妙中間，是謂正見。所以者何？如彼等觀則亦無邪。以何為見？其見者當觀平等。見凡夫法以為卑賤，所學法者以為尊高，如是觀者則為邪觀。見凡夫法穢行未消，菩薩法者無有塵勞，如是觀者則為邪見。見凡夫法以為是漏，無所學法以為無漏，如是觀者則為邪見。見凡夫法有求衣食，緣覺之法不望供養，如是觀者則為邪見。見有小意有所悕望，菩薩之意無所悕望，如是觀者則為邪見。見凡夫法以為放逸，菩薩之法以為無欲，如是觀者則為邪見。見凡夫法悉有為事，佛之正法是無為道，如是觀者則為邪見。」

佛告族姓子：「有能察凡夫法、一切法皆本淨，其學法亦本淨，觀諸法悉自然，乃為正見也。凡夫法所學法亦空，了學法空，乃為正見。凡夫法者等於因緣，曉了如此緣覺之法因緣亦等，乃為正見。凡夫法者則為靜默，菩薩之法亦為澹泊，乃為正見。凡夫之法無所成就，諸佛之法亦無究竟，乃為正見。其正見者，心不入二不見二者，人亦無二不見吾我，則為正見。無若干見，不以若干為異見者，為平等觀，則不想念一切諸法有上中下，於一切法無所想見，乃為正見。其正見者，無若干見亦無所見，無所見者乃為正見。所可察者無有形色，以見諸法無形色者，乃為正見。是族姓子！觀一切法曉如是者，斯乃名曰班宣法律。」說是語時，五百比丘漏盡意解。

佛告寶髻菩薩：「所謂正念，蠲除諸念與不念俱合集寂然，而觀智德至澹泊法，曉了所觀見於諸法。所念信者，何謂為法？何謂非法？解知諸法各各別異不相親近，以曉了是不念平等，況于信邪未之有也。於一切念無念不念，無所復思無應不應，是為正念。」

佛告族姓子：「所謂正言，其所說者不自見身，不見他人不著彼我，不危己身亦不危他，是謂正言。又正言者，等解諸法，知一切法至於滅盡，知一切法歸賢聖法及與解脫，是謂正言。奉行慈心重加愍哀親仇無別，正言亦空等演諸法，無相不願悉無所作不生不起，諸法言等，一切諸法無常苦空非身之教。其正言者，一切諸法無人壽命，等說諸法從意緣起，如其所種各得其實，菩薩等示眾生宣其經法令行佛道。其正言淨，則為一切十方諸佛之所擁護，是為正言。」

佛告族姓子：「所謂正業，消化一切諸所造業，未曾復作諸所原基，所修業者滅眾苦惱，諸可常業悉令立虛，不興邪業離於塵勞無有穢濁，是謂正業。若有菩薩曉了此業及與諸法，於諸善本而無所造以修德行，是謂無作則為造行，為虛無要空虛之宅，是謂菩薩行上尊道為正業也。」

佛告族姓子：「所謂正命，不計有我不計有人，是謂正命。其正命者，亦不積聚一切塵勞。菩薩正命，則能淨修眾生志性，已淨志性不自計身亦無壽命等，為彼我及與法故行清淨義，是謂正命。」

佛告族姓子：「所謂正便，於此不為非法之事，心不捨德所作方便安無怯弱，修於正行淳淑近之，是謂正便。其正便者不為邪便，所作方便如其所言，不計諸法等與不等，無作不作如諸法住，順其所行而設方便。計如此法，諸佛之法亦復如是，如其寂然因為方便，諸法平等無有差特所行亦等，為諸眾生除其邪便，則以勸助於諸通慧，是為菩薩所行正便。」

佛告族姓子：「所謂正意，謂憶佛道，念施、持戒、忍辱、精進、一心、智慧、慈悲喜護，是謂正意。念於慇懃，不聽一切塵勞之穢，不從魔便。其所念者，在所向生不墮邪見，工御其意制其所念，如監門者知閉開時。除去一切諸不善念所思想，不聽邪念，是謂正意。菩薩已處於此正意，不於此中寂滅道性而取果證，是為菩薩正意淨行。」

佛告族姓子：「所謂菩薩正定，隨賢聖行，知於苦諦、斷集諦種、證盡諦種、奉道諦種，是為正定。彼若正受，等於己身亦等諸法。己身清淨諸法亦淨，己身則空諸法亦空。定意正受能如是者，則入平等不墮滅盡，是為菩薩正定淨行。發心之頃所行平等，具足智慧一切聖福覺了諸法，是為菩薩正定淨行。」佛說是正定覺時，千六百天與人弟子行者，好樂小乘已入其法，改發無上正真道意。

佛告族姓子：「何謂菩薩護覺意？將養其心令不起生，除婬怒癡去於色著痛想行識，在於三處而無所著，獨步三界過三脫門至三達智，覩去來今無所罣礙，開度眾生除諸穢垢，猶如日明無所不曜。善權智慧隨時示現，遊於三世如水蓮花，開化一切使發道意，是為菩薩護覺道意清淨之行。」

佛告寶髻：「何謂菩薩成就神通為清淨行？又以五事具備徹視。何謂為五？逮得光明名曰天眼，普照十方消盡窈冥靡不覩燿，見一切佛所可開化多所度脫，故曰天眼。遙覩眾生終始所趣莊嚴其志，名曰天眼。皆見十方一切形色像貌種類好醜長短，其天眼者無所罣礙，意念寂滅其相無為，過諸天、龍、神及揵沓惒、聲聞、緣覺，見其本末靡所不達。是族姓子！如是比類致五神通，逮此天眼為菩薩眼。是為菩薩天眼之淨。」

佛告族姓子：「復以五事成其徹聽靡所不聞。何謂為五？聞於人聲，亦復徹聞非人之聲，亦聞地獄餓鬼畜生辛苦之音，一切十方諸佛說法悉亦聞之，一切十方諸有言語音辭不同，各各別異億萬種音皆能聽了。是為五事菩薩神通徹聽清淨。」

佛告族姓子：「復以五事知人心念。何謂為五？悉能逮知諸天人民地獄餓鬼畜生之類，本末所因心念善惡，方當來世若更受身。知去來今心念所趣，決定來處歸於邪業，眾生心念善惡所行皆了知之。察其心意，或懷貪婬瞋恚愚癡，隨其本行如應說法。是為菩薩知諸心念清淨之行。」

佛告族姓子：「何謂菩薩知過去神通清淨？謂以五事了知古世。其有受於婬怒癡者，悉自然受不熟思惟致此事耳。復解己身無央數世便更專，惟布施、持戒、忍辱、精進、一心、智慧、慈悲喜護。緣其定意而逮得此，亦從已致其受吾我，念心因緣諸相之觀。其相因緣亦從已為而自然受，思惟其心自觀其志。其入癡門亦自然受，念識此已，隨其色像眷屬勢力名稱豪貴貧賤苦樂，亦己身為皆自然行而受此患。是為菩薩知往心念清淨神通。」

佛告族姓子：「何謂菩薩具備神足？則以五事而逮神足。何謂為五？示現色身神通自在，神識音響神足悉達，心意所行神足普周。一切眾生心所娛樂神足皆別，親近所見神足咸至。坐見十方無數國土，周遍一切諸佛境界，隨其習俗現其形體，身遍一切十方眾生為其說法，令得開解發大道意。是族姓子！菩薩所行神足清淨。」

佛告族姓子：「菩薩慧眼具天眼淨。其天眼者，住於神識亦無所著，則致天耳本末清淨。住無罣礙，尋即知眾生心念靡不通達，悉知過去當來處所，悉能證明。住無所行，皆盡諸漏生死之行，便淨神足諸通明徹。所謂神通，則諸漏盡聖慧之門。菩薩於彼以此五通而自娛樂，其心不住盡諸漏慧。」

佛告族姓子：「譬如去於居邑百千俞旬玄逈之路有大國城，其路艱險眾難難計，阻邃曲隘寇賊抄掠，師子虎狼還相食噉。若出此路能到彼國，入大城者悉脫眾患安隱無量。時有一人聞彼國城恩德功勳快樂遠著，其人生年唯有一子，甚愛重念視之無厭，聞彼國名捨子而往，盡力勤行忍諸艱苦眾難之患，晝夜不懈得值陰涼，六藝備體執持五兵便得越度。到其城門住門梱上，稍復進前至第二門，開其城門而獨住立，即便憶念：『所生一子獨不得來。』以子恩情不入大城，尋更還反將其子來共至樂國。」

佛告族姓子：「菩薩如是被無極鎧，以大精進堅固志性，精誠所致顯發大道，淨治心業淳淑之行，諸漏得盡興大哀心，開化眾生為其說法，慧斷生死得至無漏究竟成就。哀愍眾生欲救護故，則復來還現凡夫地。」

佛告族姓子：「其城者喻聖慧巍巍諸漏已盡。涉難遠行百千俞旬玄逈路者，謂遊無量生死諸難，救脫眾生不以為拘。盜賊虎狼者，謂眾魔邪見非法之難。相食噉者，謂三界中陰衰之患。值陰涼者，謂平等行。六藝五兵，謂六度無極五神通也。其人者，菩薩也。到其城住門梱上，從外門稍復進至中門住不前者，謂菩薩而從有為至於無為，諸漏已盡其心明徹，不捨本願欲度十方，如念一子也。不入城還反者，菩薩愍傷一切眾生，中心念之如一子父，滅除生死諸漏之難，超住法頂雖出生死，不盡諸漏尋復來還，在於五趣開化眾生。是為菩薩善權方便大哀之行。」

爾時寶髻菩薩前白佛言：「至未曾有天中天！菩薩大士志懷大哀不樂解脫，欲度眾生如觀己掌，反還生死而不惡厭。」復問佛言：「菩薩遵修何法不厭生死？」

佛告族姓子：「菩薩有二十事不厭生死。何謂二十事？奉行德本至無極慈，執持大慈以攝大危，懷抱大哀攝不弘愍，開化眾生度脫一切，常以精進攝諸怯劣，以和調性攝諸懷結，以權方便攝不知節，則以智慧攝諸愚冥，而以一心攝諸放逸，能以神通攝諸不暢，能以聖明攝諸闇塞，能以隨時攝諸無義，其意專惟攝諸煩憒，遵奉道心攝諸不學，而行四恩攝諸無護，以布施攝貧窮，以敬戒攝無禮，以博聞攝少智，以總持攝喜忘，以辯才攝頑訥，以上德攝少福；由是之故乃成大慧。是族姓子！菩薩所行二十事不厭生死也。」

寶髻菩薩復問佛言：「何謂菩薩宜於生死，為無數人而有加益？」

佛告族姓子：「若使菩薩以德莊嚴宜於生死，以福潤澤窮乏危厄。博聞莊嚴宜於生死，則以辯才多所饒益。能執其意而不忽忘，逮得總持宜於生死，令一切人各各聞慧。逮得寶掌以好布施，而自莊嚴財不耗減，用此財寶多所饒益。又不放逸宜於生死，講法不倦多所饒益於一切人。又等集諸相宜於生死，修慧莊嚴於諸眾生。言行相應宜於生死，所為應時不失其節，多所饒益於諸眾生。一切所有施而不悋宜於生死，隨時開化各得其所。施度無極多所饒益於諸眾生，奉清淨戒宜於生死，莊嚴持戒多所饒益於諸眾生。忍辱精進一心智慧宜於生死，六度無極多所饒益於諸眾生。」

佛告族姓子：「乃去往古無央數劫長遠無量，爾時有佛，名普壞世如來、至真、等正覺、明行成為、善逝、世間解、無上士、道法御、天人師，號佛、世尊。世界名曰天觀，劫名欣豫。何故其劫名曰欣豫？於彼劫中六萬佛興，時淨居天聞無數音班宣佛德。於是劫中有六萬佛，時天世人皆共歌頌，此諮嗟聲其有聞之靡不歡喜善心生焉，以是之故劫名欣豫。」

佛告族姓子：「其佛世界安隱快樂，其德巍巍，諸天人民觀之無厭，以故世界名曰天觀。其土微妙至誠莊嚴，以雜種香而成其地，堪任執本於千世界。又其佛土所出香熏，則能周遍十方無量無數之國。栴檀煙陰於其土地，自然生起無極蓮花名光明曜。其蓮花光，常以大暉照彼世界。人民大小皆有神足，宿德所居香為樓觀、講堂精舍，軒戶窓牖床榻茵蓐微妙綩綖。其佛之土亦無國邑郡縣村落，又彼人民悉得神通經行虛空，樓閣講堂亦處于空，坐斯樓堂專精念道諷誦講論。彼無女人亦無胞胎，人皆化生不聞女名，亦無三塗惡趣之名，又無眾惱勤苦之患。一切眾人禪定歡悅以為飲食，篤信微妙志求大乘，彼無異乘聲聞緣覺之名也。其土人民皆著冠幘，衣服顏色猶如天人。假使出學，塵勞愛欲尋皆捨離，無有憂累。又彼如來亦不勅告諸菩薩等使被法服。所以者何？其人不生穢濁心故。而彼如來形體威顏現如梵天，諸菩薩眾威儀禮節靡不備悉，坐起安詳講說經道。設使十方諸佛之土有無極變神通菩薩詣天觀世界者，通過諸國來覲如來，稽首歸命聽說經典，見彼佛土無有倫匹，其德超殊巍巍無量，怪未曾有舉聲嗟歎爾乃捨去。」佛告族姓子：「若彼如來為諸菩薩班宣道化，踊昇虛空去地六十六丈，坐於微妙清淨莊嚴師子之座，為諸菩薩論上法教粗舉其要，不廣分別屢練中義，如吾於此多說慇懃。所以者何？斯諸正士悉入聖慧，以一章句輒能解入百千之義，是故如來約宣經教不以多言。其佛為說四清淨行：度無極淨，道品法淨，神通行淨，化眾生淨；是為四也。」

佛告寶髻：「時彼佛土有一菩薩名曰珍寶，即自啟問壞世如來：『何謂菩薩宜在生死，多所饒益於諸眾生？』於時如來便為菩薩廣分別說此兩句義，於斯大慧道莫能當，菩薩所行恒在生死，逮得慧曜多所潤益。佛適說是，六萬菩薩得柔順忍。」

佛告寶髻：「珍寶菩薩復問：『何謂菩薩嚴淨道場坐於佛樹？』壞世如來告珍寶曰：『以無放逸嚴淨道場坐於佛樹。』於彼何謂無放逸者，其佛告曰：『奉行經典。』又問：『何謂奉行經典？』告曰：『言行相應是無放逸，又無放逸不自馳騁，修於無量大德之鎧，不與陰合越於五陰；布施無量，不可盡故；持戒無量，為未學故；忍辱無量，堪眾苦故；精進無量，正士業故；禪定無量，無退落故；智慧無量，無罣礙故；慈心無量，開化眾生不可限故；悲哀無量，愍傷眾生濟匱乏故；行喜無量，以法歡悅眾生之故；行護無量，救濟將養群生之故；生死無量，長育一切佛道法故；化無量人，安彼我故；正法無量，將順隨時堅精進故；德慧無量，執權方便等應時故；奉無量佛，具足慧故；求無量聞，智卓然故。心入無量，覩見眾生志性行故；節德無量，志存閑靜有限之故；閑居無量，將順心故；寂默無量，所察廣普速疾具成諸通慧故。』

「佛告珍寶：『是無放逸所當遵法，菩薩行此無放逸者，嚴淨道場坐於佛樹則其義也。又族姓子！其無放逸諸道品法所立之本，致無放逸聖慧之原。逮堅要法，以無放逸積累德本。能不放逸，未曾忘失往古久遠所聽聞法，普能執懷一切經典，消化塵勞無量陰蓋。於諸道義無所罣礙。無放逸者，則能燒盡曠野積聚愚癡之冥，悉能將護一切經法，滅除眾相抑制諸根。無放逸者，退捨邪徑奉行眾善，力勢超殊具足十力，力如虛空而無等雙。無放逸者，得無所畏具足成就一切佛法，歸其原頂。無放逸者，便能獲致佛諸通慧。』」

佛告族姓子：「彼佛說此無放逸時，萬二千菩薩逮得無所從生法忍。於族姓子所憶云何？時珍寶菩薩豈異人乎？莫作是觀。所以者何？則汝身是。由斯緣故，當作此觀，若使菩薩無放逸者，乃為應宜嚴淨道場坐佛樹下入如來道不可限量。」

佛復告寶髻菩薩：「所謂菩薩開化眾生，若菩薩行清淨者，見眾生行心懷善惡，便能開化無量難限不可思議眾生之類，各使奉行無極之法。其菩薩者志性調柔入於審詳，自在開化幾何人民。彼族姓子！人根不同所見各異，是故菩薩隨時示現而誘進之。或能有人堅正禁戒乃成開化，或從毀戒因得受教，或以衣物往來交接緣受道化，或以柔軟，或以麁獷，或懷毒心，或以恐怖，或以苦惱，或以安隱而受開化。或在言語，或從得勝，或從因生，或從志性，或從逼惱，或從順意，或從所有，或從無所有，或從興盛，或從所受，或無所受，或從財業治生，或從靜然無所易取，或從貪慕求妙顏容，或從惡色，或從色聲香味細滑之法而致開化。或從瞋罵臭氣惡味麁堅穢法而得開解。或從共居宿止受化，或從往來數數相見，或從聞佛法聖眾，或從歡喜，或從憂慼，或從無我，或從寂音，或從布施持戒忍辱精進一心智慧之音而受開化。或從眾生有為之惱，或從聽聞天上世間所遭安隱而受開化。或聽聲聞所說乘教或緣覺乘，或聞大乘而受開化。或從常喜不以憂惱，或從愁慼不因欣豫，或從貨利，或從踊躍不見愛敬，或從得利，或因衰耗，或復有人而從四恩因而開化。或從內業，或從外業，或從眼耳鼻口身體手足而受開化。或以娛樂歌戲，或以花香而受開化。或從其身專遭苦患，或從常樂而受開化。或從其心得靜方便，或從化作比丘形像，或復變現比丘尼、優婆塞、優婆夷像而受開化。或復現作佛像容貌而開化之。或如釋梵轉輪聖王像貌而開化之。」

佛告族姓子：「若使不現若干種變，觀其性行行其心念而開化者，不能度之。當曉了知眾生性行，應病與藥所度乃廣，設令菩薩行度無極，則能奉受佛道品法，亦能明了神通之慧，然後寂然開化眾生。

「菩薩有四事法，開化眾生。何謂為四？一曰不厭終始之患導示未及，二曰不貪安己願安一切，三曰常以時宜宣示道教，四曰分別眾類心性所行；是為四。復有四：一曰所說柔和言辭可敬，二曰奉戒清淨猶如日明，三曰顏色常悅未曾懷恨，四曰常懷慈心。復有四：一曰心不懷害，二曰志於大哀，三曰意多愍傷，四曰常調其心。復有四：一曰性行清淨，二曰無有諛諂，三曰精進堅強，四曰忍於苦樂善惡。是為菩薩四法開化眾生，當作此觀，乃能堪任救濟一切。」

佛告族姓子：「往昔過去無央數劫，長遠無量不可思議，爾時有佛，名離垢光如來、至真、等正覺、明行成為、善逝、世間解、無上士、道法御、天人師，號佛、世尊。世界曰寂然，劫名愛敬。寂然世界豐樂安隱，五穀平賤快樂難量，天人孳盛。離垢光佛其聲聞眾九十六億，菩薩八萬四千。其佛壽三十三萬六千歲。時有梵志為大國王，王有太子名曰業首，端正姝好見者無厭。厥年十六，惑於顏貌迷於豪貴荒亂自大，不肯往詣離垢光佛，不修恭敬稽首為禮。佛心念言：『太子業首云何忽失無上正真道意勸助德本，不識宿本而計吾我，荒迷容色財業豪貴，及懷自大不數詣佛。既來至此不肯歸命，違失禮節。設為慇懃宣其本行者，必識宿命，數詣如來稽首受教。』於時離垢光如來皆悉請會八萬四千菩薩，使行法籌，誰能堪任詣太子業首所八萬四千歲教化說法者，而不患厭一切苦惱所見逼迫。雖往教彼不見接待，座席言談但得罵詈毀辱誹謗耳？」

佛告族姓子：「時雖行此籌，八萬四千諸菩薩中無一菩薩肯受法籌。時彼會中有一菩薩名極妙精進，即從坐起，偏露右肩長跪叉手，前白佛言：『我能堪任八萬四千歲往來太子業首數數相見，捨一切安皆忍眾苦，雖遭諸厄不以為患。』極妙精進適發此言，三千大千世界應時六反震動，百千天人住於虛空舉聲歎曰：『善哉善哉。無極精進被弘誓鎧。』於時極妙精進菩薩往詣業首太子門前而住。太子方見，罵詈毀辱瞋恚誹謗，言語衝口無有其限，撮土坌之、瓦石打之、刀杖加之。於時菩薩被辱如是，不懷瞋恚、不以為恨亦不悔還，遂堅其心被精進鎧，智力益增興發大哀而愍傷之。如是千歲，乃得自前入第一門。從所苦困輕毀之難，不以患厭至于萬歲，轉復進至王宮第一之庭。又二萬歲至第二庭。如是之比，八萬四千歲至第七庭。七日七夜，太子業首時復見之，尋便質問：『比丘何來，詣此所求？』菩薩答曰：『故來相詣，相稱名勳。』於時太子心自念言：『怪未曾有。今此比丘戒德難量無能逮者，被諸毀辱未曾懈恥。』極妙精進歡悅業首，尋說頌曰：

/gatha/
「『太子吾今無所求，　不用飲食及衣服，　宜當顯發無怖心，　吾以法來故至此。
　　人中尊號離垢光，　大聖現世多所益，　講說經法除苦患，　若有人聞逮甘露。
　　諸佛興出甚難值，　無數千劫難可遇，　執御眾人令受法，　則為世間之炬曜。
　　反以欲得而放逸，　貪於財色自娛樂，　迷荒豪貴及王位，　不肯往詣見法王。
　　財業無常命難保，　佛說人壽如朝露，　太子自察亦常然，　云何聞佛復放逸？
　　仁者以曾志佛道，　召請眾生欲度脫，　於今何因為欲使，　放逸安可度眾生？
　　吾且欲還詣最勝，　當降伏心滅塵欲，　仁興精進愍一切，　將無後恨懷憂惱。』

　　時國王子聞斯頌，　即自下意發恭敬，　禮極精進稽首足：『吾今自悔辱仁罪，
　　我當棄捨一切士，　不慕豪貴貪國土，　吾當往至安住所，　棄捐瑕穢求見益。』

　　即與一億八萬人，　各執眾花擎諸香，　俱往詣於最勝所，　見離垢光人中上。
　　已皆悉到安住所，　前稽首足而供養，　退在一面住佛邊。　於時太子說此言：
　『極妙精進是我師，　心不患厭和顏勸，　此之恩德無以加，　如是供養不足報。
　　歸悔首過救護世，　違失法王之教命，　我今都悉自歸誠，　願佛納受所首情。
　　於是發意悉求佛，　用一切故興愍傷，　不復造邪為放逸，　今我立德成佛道。』

　　爾時太子棄榮位，　與人一億八萬四，　於最勝所作沙門，　發意志求於佛道。
　　時佛知其所志願，　為說最上佛道業，　諸聞淨法逮柔順，　諸高士住無我法。」
//

佛告寶髻菩薩：「欲知爾時極妙精進，我身是。太子業首，彌勒是。族姓子！過去菩薩開化眾生不以懈倦，威德巍巍無量如此，所學日深精進無侶。是故菩薩欲度眾生，當念修學如彼往世極妙精進菩薩之德。」

佛告族姓子：「菩薩有四業而得自在，以此四業攝取諸佛道法。何謂為四？一曰超越諸魔靡不歸伏，二曰念淨佛土令修淨教，三曰嚴身口意順開士本，四曰合集一切諸佛道品；是為四法自在之業。復有四事為菩薩業。何謂為四？一曰其慧曉了所入志性，二曰普見眾生根原所歸，三曰分別一切諸趣所由應病與藥，四曰明識一切徑路所行令得寂寞不懷瞋恚；是為四事菩薩所行自在道業。」

於是寶髻菩薩，從無數劫殖於難限百千德本髻中明月珠，其價當此三千佛土，以奉如來，口宣此言：「以頂上寶貢獻如來，因是德本，致無能覩其頂相者，逮成諸佛不可思議聖慧之頂。」

佛即時笑，五色光明從其口出，照無央數諸佛國土，尋即來還繞佛三匝，忽沒頂上。於是會中有菩薩名曰捷辯，從坐而起，偏露右肩長跪叉手，讚歎世尊，以頌問曰：

/gatha/
「最尊無等倫，　超世俗之上，　無垢以離穢，　三界稱其德。
　其慈無儔匹，　超越須彌山，　今者何欣笑？　願慧為我說。
　真諦戒調定，　執性人敬言，　令我志趣安，　善修快寂然。
　天人尊在此，　其志甚堅妙，　為以何感應，　哀愍而今笑？
　十方總勢強，　光明福曜威，　勇師子壞冥，　遊眾無所畏。
　三界無有侶，　何能有殊者，　法宅為解說，　何故而欣笑？
　離垢性遊安，　顏色常和悅，　名德通虛空，　馳逸不可限。
　消除諸窈冥，　光明靡不照，　安住唯為解，　何故而欣笑？
　修德心清淨，　願如金寶山，　常訓誨不及，　世人普供養。
　則為最良田，　眾祐聖超世，　釋師子現要，　所演如虛空。
　諸天及人民，　無與妙等者，　等心甚堅強，　慚愧祥豐盛。
　巍巍德百千，　相如花茂盛，　最勝能仁笑，　願為發遣之。
　其慧無罣礙，　流布於三世，　處若干身意，　其心無所著。
　一時悉曉了，　如應當行化，　仁師子屬笑，　其義為何義？
　諸天住空中，　意內懷悅豫，　地上諸人民，　叉手而自歸。
　能仁勝唯說，　殊特甘露味，　諸天神人聞，　消滅塵勞冥。」
//

佛告捷辯菩薩：「汝為豈見寶髻不乎？以此寶髻珠奉上如來，志願無上正真道意，則為供養佛之原慧。」

對曰：「唯然已見。世尊！」

佛言：「是族姓子寶髻菩薩！於恒河沙劫供養恒沙如來至真，常修梵行，開化無數眾生之類，立於三乘。過十阿僧祇劫當得作佛，號曰寶成如來、至真、等正覺、明行成為、善逝、世間解、無上士、道法御、天人師，號佛、世尊。世界名離垢光，劫曰無垢。其離垢光世界七寶合成，咸出光明照於十方無量佛土。其光紫金，假使眾生值此光者，一切塵勞悉蒙消滅。其土豐樂，皆諸菩薩悉無所著，無有異學相發起者，普修道寶，以故如來名曰寶成。此諸菩薩皆得神通咸有辯才，其土諸天人民悉當淳淑遵平等覺，無有不及無智之名。其土亦無君主，唯以世尊為無上法王。諸天人民自然化生，無有女人無愛欲名。其土人民皆殖德本無無福者，諸根悉具，皆以相好莊嚴其身。爾時如來諸菩薩眾不可稱數。佛壽十四劫。初無異談，所說唯宣菩薩之慧諸度無極，辯才大哀淳一品教。是諸菩薩皆曾被訓，諸根明達，能以一句普入一切諸佛之道。如來為說總持言教，慈心如地。何謂總持言教？以一絕句普入諸章。何謂一句？謂妙聖句不可究盡道品之法。何謂無盡句？謂於佛道不可窮盡。何謂無盡？論於無者謂無盡句。已能入無普入文字，是為一句。一切文字而不可盡，復有二字本所未聞亦未行也，而宣說言出於一字。其一字者，不與二字而同勢也，是以一字而宣訓誨。設使宣布斯訓誨者，無念不念、無應不應，此句無念亦無不念。以無念句而成開化，是為族姓子入總持教。寶成如來為諸菩薩說總持言句，於彼學入此一句者，便得普入一切佛意。我於一劫若復過劫，分別諮嗟離垢光世界功德之稱，不能究盡得其邊際。寶成如來講說經道德稱之慧，不可思議亦不可賜。其佛大德國土清淨，巍巍超絕上不可及。」

寶髻菩薩聞佛授決，歡喜踊躍，以頌讚佛：

/gatha/
「普知悉能見，　度諸法無極，　如來皆超越，　一切諸瑕穢。
　大慧未曾有，　皆知我往古，　供養諸佛數，　佛悉具說之。
　去來今現在，　本末為如是，　復知鄙末世，　及與一切人。
　為佛所授決，　不復懷狐疑，　開化度世間，　諸根之本末。
　於是一切地，　日月尚可墮，　佛口所可宣，　終不有改變。
　佛出至誠言，　所演無有虛，　授以尊覺道，　成佛人中上。
　如我志所願，　嚴淨於佛土，　所言亦如是，　悉知我心念。
　彼聞此教已，　悅顏無猶豫，　所修行為尊，　欲度眾生故。
　如我之所行，　當復增無量，　嚴治其本際，　我身奉淨行。
　興發行得佛，　度諸法無極，　勤力無怯弱，　由從精進至。
　堪任所布施，　皆知我往古，　未曾捨精進，　至大哀如來。
　為以諸眾生，　本末為如是，　吾當悉開化，　得佛度異學。」
//

寶髻菩薩說此偈時，七萬二千人皆發無上正真道意，悉願生彼離垢光世界，同時發聲俱說是言：「寶成如來得佛道時，普令吾等生彼佛土。」佛皆記說當生其國。

爾時世尊告賢者阿難：「受是經典持諷誦說，廣為眾人宣傳其旨，慇懃勸助是經典要，天上世間之所歸伏而共供養。所以者何？其聞此經我悉授決。其不信者本宿德薄，其受是經德本非凡。趣聞此經世世值佛，何況聞持而奉行說，功勳無限。族姓子族姓女若以七寶滿此三千大千世界，隨時布施，如是比類於百千歲。其聞此經歡喜信持，功德踰彼。」

阿難白佛：「此經名何？云何奉持？」

佛言：「名曰『菩薩淨行寶髻所問』，當奉持之。」

佛說如是。寶髻及十方諸會菩薩，賢者阿難，天、龍、鬼神、揵沓惒、阿須倫、世人，聞佛所說，莫不歡喜。
