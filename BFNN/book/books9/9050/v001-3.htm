如是我聞：

一時佛住王舍城耆闍崛山。其山高峻嚴麗可觀，持諸雜種猶如大地，眾華卉木悉皆茂盛。其中復有天、龍、夜叉、毘舍闍、緊那羅等常所遊止。復有種種異類諸獸，所謂師子虎狼、麒麟象馬、熊羆之屬止住其中。復有無量百千眾鳥，所謂孔雀鸚鵡、鴝𩿦羅鳥、鳧鴈鴛鴦、命命等類依之而住。是諸眾生，以佛威力，不為貪欲瞋癡所惱，不相茹食；共相親愛猶如母子。是山王中多諸雜樹，叢林蓊欝枝葉繁榮，謂天木香樹、菴摩羅樹、甄叔迦樹、尼俱陀樹、栴檀沈水，如是等樹無不備有。復有水陸無量雜華，所謂阿提目多華、瞻婆香華、波吒羅華、婆師迦華、蘇曼那華、由提迦華、優鉢羅華、波頭摩華、俱物頭華、芬陀利華、迦羅娑華、摩訶迦羅娑華，如是等類諸雜名華，光飾山王處處充遍。是山王中常於夜半興大密雲，輕雷細雨，從初至末漸遍其山，八功德水流滋普洽，如𤛓乳頃廓然消散，涼風微動適悅身心。是山王中所住眾生及諸卉木，滋潤光澤如妙華鬘，微加水灑，光色鮮明倍更增勝。此山王中眾生草木，含滋發暉亦復如是。而此山中生諸軟草，靃靡右旋色香具足，青綠暉映如孔雀咽，其香喻若婆師迦華，其觸又類輕兜羅綿，枝葉華果繁榮茂盛，未甞有一不具足者。山地柔軟無傷趾步，下足之時陷深四指，舉足之時還復如故。其中多有陂泉池沼，清冷盈滿生雜蓮華，青黃赤白紅紫頗梨金火等色，大如車輪，香氣普熏一踰繕那。是山王頂生於大妙寶蓮華座，無降伏寶帝青金剛以為其莖，大吠琉璃為諸寶鐸，贍部檀金為廣淨葉，順時清淨栴檀為臺，瑪瑙寶王以為其鬚。其華縱廣猶如大海，十億阿修羅王常所執持，十億雜色摩尼寶網彌覆其上，十億龍王雨妙香雨，十億金翅鳥王口銜繒綵，十億緊那羅王至誠瞻仰，十億摩睺羅伽王虔恭俯視，十億乾闥婆王歌詠讚歎，十億百千諸大天帝興布瑞雲，而雨末香燒香、衣服華鬘、幢幡寶蓋，十億梵王曲躬恭敬，十億淨居天眾合掌頂禮，十億轉輪人王七寶侍從來至其所，十億海王從大海出而敬禮之，十億光明摩尼寶以為照曜，十億淨福摩尼寶珠為勝莊嚴，十億遍照摩尼寶為無垢藏，十億妙光摩尼寶為大照明，十億雜色摩尼藏寶而為遍照、贍部幢寶為善安持，十億金剛師子摩尼寶難勝莊嚴，十億日藏摩尼寶間錯廁填廣大嚴飾，十億不思議摩尼寶出種種色為妙莊嚴，十億如意寶出無盡莊嚴。是大蓮華從於如來超過世間善根所生，菩薩志意之所愛慕。遍現諸方，從如幻法出、善法業生，以無諍法性理趣莊嚴如夢法性，無行法印順無着理，遍滿十方一切法界，是順佛境功德所致。若於無量阿僧祇劫歎其色相功德莊嚴，不可窮盡。

爾時世尊於其華上結跏趺坐，與大比丘眾八千人俱，其名曰：尊者阿若憍陳如、尊者阿濕婆氏多、尊者摩史波、摩訶男、優陀夷、耶舍、富那、無垢、善臂、憍梵鉢提、優樓頻螺迦葉、那提迦葉、摩訶迦葉、舍利弗、大目乾連、阿那律、須菩提、離波多、富樓那彌多羅尼子、優波離、羅睺羅、難陀等而為上首，悉皆覺悟自性諦理，現證實際，入法本性，度諸有海。行於如來虛空之行，悉能永斷隨眠結縛，而於攝藏住無所住行空寂靜。於如來所永斷疑惑，入佛智海勝信道中，利益世間為不請友，常能衛護一切眾生，與諸有情為不捨友。通達佛法，所行境界守護聖法，誓願受持諸佛正教，現前得生如來種性，善能趣向一切智智。

復有菩薩摩訶薩眾八千人俱，普賢菩薩、文殊師利菩薩等而為上首，所謂最上智智菩薩、最上寶智菩薩、一切語言智菩薩、無著智菩薩、花上智菩薩、日上智菩薩、月上智菩薩、無垢上智菩薩、金剛智菩薩、遠塵智菩薩、光幢菩薩、妙高幢菩薩、寶幢菩薩、無礙幢菩薩、華幢菩薩、淨幢菩薩、日幢菩薩、端嚴幢菩薩、離垢幢菩薩、遍照幢菩薩、陀羅尼威德菩薩、寶威德菩薩、大威德菩薩、金剛智威德菩薩、無垢威德菩薩、日威德菩薩、月威德菩薩、福山威德菩薩、智照威德菩薩、普勝威德菩薩、地藏菩薩、虛空藏菩薩、蓮華藏菩薩、寶藏菩薩、日藏菩薩、清淨功德藏菩薩、法海藏菩薩、遍照藏菩薩、齊藏菩薩、勝蓮華藏菩薩、日眼菩薩、淨眼菩薩、無垢眼菩薩、無礙眼菩薩、普明眼菩薩、善利智眼菩薩、金剛眼菩薩、寶眼菩薩、虛空眼菩薩、普眼菩薩、天冠菩薩、照法界摩尼冠菩薩、妙菩提摩尼冠菩薩、照十方冠菩薩、出現一切佛藏冠菩薩、超一切世間冠菩薩、普照冠菩薩、無映蔽冠菩薩、執持一切如來師子座冠菩薩、普照法界虛空冠菩薩、梵王髻菩薩、龍王髻菩薩、一切佛變化影像髻菩薩、妙菩提髻菩薩、一切願海音聲摩尼王髻菩薩、放一切如來圓光摩尼寶雷聲髻菩薩、一切虛空無差別表示摩尼寶網覆髻菩薩、一切如來法輪聲髻菩薩、一切三世名輪聲髻菩薩、大光菩薩、無垢光菩薩、寶光菩薩、離塵光菩薩、法光菩薩、寂靜光菩薩、日光菩薩、神變光菩薩、天光菩薩、福光菩薩、智光菩薩、法光明菩薩、神通光菩薩、光照菩薩、華光菩薩、寶光菩薩、覺光明菩薩、梵光菩薩、普照光菩薩、梵音菩薩、海音菩薩、地吼音菩薩、世間王音菩薩、山王音菩薩、山王相擊音菩薩、遍法界音菩薩、一切法海雷音菩薩、摧伏諸魔音菩薩、大悲理趣雲雷音菩薩、遍息一切世間苦惱音菩薩、法勝涌菩薩、殊勝涌菩薩、智勝涌菩薩、福須彌勝涌菩薩、功德最勝涌菩薩、名聞勝涌菩薩、普光勝涌菩薩、大慈勝涌菩薩、智照勝涌菩薩、如來種姓勝涌菩薩、光德菩薩、勝德菩薩、法涌德菩薩、遍照德菩薩、法德菩薩、月德菩薩、虛空德菩薩、寶德菩薩、光德菩薩、智德菩薩、婆羅帝王菩薩、法帝王菩薩、象帝王菩薩、梵帝王菩薩、山帝王菩薩、眾帝王菩薩、天帝王菩薩、寂靜帝王菩薩、不動帝王菩薩、最勝帝王菩薩、菩提寂靜聲菩薩、無著聲菩薩、地聲菩薩、大海聲菩薩、音聲菩薩、照法聲菩薩、虛空聲菩薩、一切聲菩薩、善根雷聲菩薩、發悟本願聲菩薩、摧一切魔軍聲菩薩、智須彌覺菩薩、虛空覺菩薩、清淨覺菩薩、無礙覺菩薩、開寤覺菩薩、照三世覺菩薩、寶覺菩薩、廣大覺菩薩、普光覺菩薩、法界理趣照覺菩薩，如是等菩薩摩訶薩八千人俱。皆悉安住普賢願行，所行無著者，普遍一切諸佛剎故。變無邊身者，親近一切佛如來故。所緣無際限境界清淨者，了知一切佛神變故。趣無量者，往詣諸佛現等覺處無休息故。無邊光明者，於一切法實相海中得無邊智光明故。無邊劫中說功德無盡者，辯才清淨故。等虛空界者，智所行境清淨故。無所依者，隨世意樂現色身故。能離翳者，了知無有眾生界故。虛空智慧者，放光明網遍法界故。究竟寂靜者，最寂靜心故。一切陀羅尼種性智境界者、於三摩地勇猛無畏者、眼住法界盡其際者、於一切法住無所得者、遊無邊智海者、已度智彼岸者、般若波羅蜜多者、般若波羅蜜多到一切世間波羅蜜者、於三摩地彼岸得自在者。

復有五百比丘尼俱，其名曰摩訶波闍波提比丘尼、瞿曇彌比丘尼、安隱比丘尼、優鉢羅華比丘尼、瘦瞿曇彌比丘尼、耶輸陀羅比丘尼等而為上首。

復有五百優婆塞俱，其名曰善威德優婆塞、天威德優婆塞、慧光優婆塞、名稱威德優婆塞、超名稱威德優婆塞、善慧優婆塞、月德優婆塞、月歡喜優婆塞、大歡喜優婆塞、羅睺賢優婆塞、大賢優婆塞等而為上首。

復有五百優婆夷俱，其名曰大光優婆夷、善光優婆夷、善身優婆夷、可樂身優婆夷、賢德優婆夷、月光優婆夷、光明優婆夷、勝光優婆夷、善眼優婆夷等而為上首。及餘無量天、龍、夜叉、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽等圍繞恭敬，而為說法。所謂廣說三律儀品一切如來毘奈耶法，開現一切諸菩薩行，明照法界入諸法門，能淨莊嚴一切佛剎，摧諸邪論降伏魔怨，令眾生界心得歡喜。開曉有情稠林之心，隨眾生意而為宣說，開示照曜眾生諸根，令其轉趣。

爾時尊者摩訶迦葉從坐而起，偏袒右肩右膝著地，合掌向佛，白佛言：「世尊！若諸眾生求於佛法力無畏者，攝受何法而修行之？攝受何法增長成熟諸如來道？攝受何法取諸功德，增長證入阿耨多羅三藐三菩提，得不退轉？」

佛告大迦葉言：「善哉善哉！迦葉！汝今所問，多所安隱哀愍世間，義利饒益安樂人天，乃能問佛如是之事。汝今諦聽，善思念之。吾當為汝分別解說。」時大迦葉及諸大眾受教而聽。

佛告迦葉：「若諸眾生求佛智慧力無畏者，是等眾生無有少法為其可得，無所依倚種諸善根。迦葉！菩薩乃至求於阿耨多羅三藐三菩提時有所得者，即為著想。若著想者，於佛法外起有為想、於有為外起無為想，即於佛法而生想著及起解執，起解執時於佛法中堅住不捨。當知是人不名為向無上佛道。何以故？以於佛法起想執我而作勤修，則與我執數相應故而不捨離，則分別所分別。由是分別所分別處則為所害，若為所害則便馳騁，若馳騁者則有流轉，若流轉者則有貫穿，有貫穿者則有妄想，有妄想者則有分別，有分別者則增妄想，若增妄想則有遍計，若有遍計則離寂靜，若離寂靜則有隨逐，若有隨逐則有遊行，若有遊行則便失壞。云何失壞？謂失安隱。云何安隱？謂無分別。若失壞者則便常入，若常入者則便親近，若親近者則有隨眠，若有隨眠則有相續，若有相續則增相續，若增相續則遍相續，若遍相續語則狂亂，語若狂亂則便誑惑，若有誑惑則便憂惱，有憂惱者則有悔恨，若有悔恨則依倚無明為憂喜損害。而於是中無有少法可為依倚，然從妄想流澍生故為想繫縛，從想繫縛則想相續故名想縛。無有實處，一切貪處忿瞋癡處，皆是虛妄遍計分別增分別、計度增計度，是故彼人不能速得阿耨多羅三藐三菩提。迦葉！是名愛處。何名愛處？無有定法名之為愛；名為愛者，名愛處所。然有愛者但由堅著，若堅著時為虛空愛，若虛空愛生執著者，彼人即當得愛執著：我愛執著者、眾生愛執著者、善不善愛執著者。迦葉！是人則於一切空法起非空分別，則於非物而生物想。何謂為物？謂以菩提若以菩提為其物者，彼彼眾生由我想故而有我想，即非菩薩。於是中想若不可得，彼中想者亦不可得，是名我想無真實句，此即增語。所謂我想？若復有能圓滿薩埵則圓滿菩提。何謂菩提？所謂圓滿猶如於幻。云何如幻？謂說大我想者、大命想者，若復以想依止想者，則由非想依止非想。若以非想依非想者，則由狂醉故醉。若由狂醉故醉，則以苦逐苦。若以苦逐苦者，則彼彼如來皆說安住狂言馳騁者。何故名住狂言馳騁者？謂增作意。若增作意則有貢高，若有貢高則有言說，若有言說則便增說，若有增說如來記之是言說者、教授者、所持者。是故諸法皆從作意而得生長。迦葉！如上空中有雲聚起，不從東西南北四維上下而來。是故如來名實語者，知是雲聚非十方來，如實說之，以其義說、理相應說、以實理說。言雲聚者，則為非聚，故名雲聚。何名雲聚？以其各別起相狀故。云何種類各別相狀？以種種相皆是廣大迷惑相續，而於其中無少大相以為可得。汝觀雲聚起廣大相，則為非相。若非想者，但由畢竟廣大之相非實雲聚。迦葉！譬如有人語他人曰：『可共往詣蔭處坐耶？』智者言曰：『我不往坐。』彼作是言：『我於今者不作是說，但言是蔭。』爾時智者復語彼言：『汝言蔭者即是非蔭。』迦葉！汝觀彼人乃至隨俗猶能覺了。如是如是，迦葉！如來如實了知諸法真實理性，於大眾中正師子吼。

「復次迦葉！如來樂欲於隨順法住非順想，於諸眾生所有我想，於如來所是第一義。何以故？如來今者已知彼想，悉知一切眾生想者即為非想，此是最勝祕密之言。或有愚夫而生違背與如來諍，是故我言『世與我諍，我不與世諍』。云何名世？所謂眾生。何故眾生名之為世？如來了知如是世間，是故眾生名之為世。如彼愚夫異生之解，則便壞滅、極為所害。此是彼等常得信住，隨其世俗所謂無明。何以故？彼居大闇名住世者，若住世者則便有貪，若有貪者則便有瞋，若有瞋者則便有癡，若有癡者則為不淨，若不淨者則便相違。與誰相違？所謂如來及聲聞眾。若相違者則便乖背，若乖背者則重相違，重相違者則樂於有，樂於有者心則求之，求於有者則便遍求，若遍求者則不知足，不知足者則多所作，多所作者則便多欲，若多欲者彼則隨眠於三界中，若隨眠三界則令他隨眠，令他隨眠者彼則隨流亦隨流行者，若是隨流隨流行者則趣於死，若趣死者則不趣涅槃，不趣涅槃者則至非行處，至非行處者則趣地獄。如是迦葉！由不祥法與之相應，瞋忿毒心及不覆蔽，不覆蔽者不觀我想，不觀察者作一合想，不能銷滅我及我所。何名為我執？不實故住種種想造諸世業。若如是者，彼執我相以為其我。何名我所？謂貪欲，故名為我所。以於諸欲與身和合即起貪心，起貪著已能壞戒蘊，便於他所生不善心，由瞋覆蔽互相輕毀，及於財物攝為己有親近守護，是名我所。有我所者則有流轉，有流轉者則有迷惑，有迷惑者則有誹謗，有誹謗者則便有瞋，有瞋恚者則有吞害，有吞害者則為所燒，為所燒者則便遍燒，如是等過皆由貪欲。起男女想及以命想是我所有，名為我所。以是義故，說我所者則罵己身。一切愚夫以我隨眠為愚夫法，是故說之以為我所。迦葉！若有眾生不聞此法，而說菩提及菩薩行，則為非行。言菩薩行者，實無所行是菩薩行。

「復次迦葉！若諸菩薩得行圓滿無有缺減，清淨極清淨遍清淨者，是人則能說此大法，名有勢力勇猛精進，其所說法等於虛空而無積聚，為如理者、有功德者、能修行者，終不為彼不如理者、無功德者、不修行者。汝等應當受持此法，於是法中勿生執著。何以故？如來所說最為第一，為於最上應供有情而發問故，我以勝法而為解說。云何勝法？謂無法想。迦葉！如是菩薩具足護持最初淨戒，心不貢高、不造無間業、不犯比丘尼，亦不親近諸俗人家，遠離殺生及不與取欲邪行法，離虛誑語離間麁惡雜穢語言，遠離欲貪瞋恚邪見，既不自惱亦不惱他，不與欲俱亦不受欲，不為博戲亦不教化，終不親近不男之人，不往婬女寡婦處女之家、不近他妻，亦不親近羅捕魚鳥畋獵魁膾旃荼羅等，於飲酒人不執其手而與鬪諍。離此諸事，如避惡狗旃荼羅輩。由住慈心，於彼一切所遠離者乃至不起一念惡心。有二十處應當遠離。何等二十？謂離女人，亦不與他調戲麁言論義諍訟。於父母處及佛法僧，離不恭敬。若諸女人減二十眾，不為說法。除有男子，終不往詣比丘尼尼僧說法會處。不應問訊諸比丘尼。不與女人作其書疏。或為他人傳書送彼。應付丈夫勿付婦女。於一切時親族別請終不受之。不以欲心經須臾頃住女人前。又亦不應捨離本居，往其屏處而與女人共為談說。不得隨逐比丘尼行。若比丘尼所施衣服不應受用，除在四眾演說法時為說法故有施衣者。應生是心猶如大地，然後受之，不應別觀施者之面。若聞有尼勸導施衣，不應受用。若比丘尼勸請受食，設令病苦終不受之，況復無病。若有寡婦而來請食，僧數不滿亦不受之。又亦不應入尼眾內。不應喚彼比丘尼來。若比丘尼來喚菩薩，應離住處拱手仰頭背而捨去。若說法時有比丘尼來禮其足，無令足動，但應目視雙手掌中。善男子！不應唯身修習精進，亦當勤心正念一處，於諸境界勿起貪瞋，為求一切智故起堅牢誓。聞是法已，成就信心應當修學。迦葉！若有趣菩薩乘善男子善女人等適聞此法，不能生於如實深信，終不能得阿耨多羅三藐三菩提。何以故？由修學故證彼菩提，非不修學而能得證。若不修習得菩提者，猫兔等類亦應證得無上菩提。何以故？不正行者不能證得無上覺故。何以故？若不正行得菩提者，音聲言說亦應證得無上菩提，作如是言：『我當作佛！我當作佛！』以此證故，無邊眾生應成正覺。迦葉！若有眾生修學此行，甚為難有，猶尚不能經一晝夜專念在心，何況一劫乃至千劫。是故如來出現於世，甚為難事。迦葉！假使三千大千世界一切眾生，若經一劫百劫千劫乃至億百千劫，為一眾生同唱是言：『汝應作佛！汝應作佛！』是諸眾生悉共圍遶相續唱言：『當得成佛！當得成佛！』如是次第，出息入息猶可斷絕，彼所發言曾無間斷。如是之言，尚不能熟初菩提心，何況能證無上佛果？若能證者，無有是處。

「迦葉！我滅度後末法之時，及與汝等已般涅槃，不為諸天之所信護。當於爾時，多有眾生聞我功德發菩提心。於中或有諸比丘等，雖發無上菩提心已，而便安住二十法中。何等二十？所謂親附諸比丘尼，受不淨食，貪著美味，受比丘尼勸化飲食。迦葉！譬如今世多聞比丘住阿蘭若或聚落中勤修習法。於當來世諸比丘等亦復如是，於聚落間或阿蘭若，與比丘尼聚集言談問答法義。彼諸比丘及比丘尼，多生染心少生法心。迦葉！汝觀是輩得菩薩名，墮大危險取於惡趣。當於爾時初為法緣而相親附，互相見已欲火燒心，動於脣口表其欲念。彼相近時初為弟子，以阿闍梨法而申禮敬，自此之後當漸遣使，通致語言道路期會，或於街衢或在寺內遙相瞻視，於出入時問其所由，互稱親族結為姊妹。彼等由是數相見故而相習住，既習住已生於染心，生染心已共為穢事，為穢事已更以非梵行名而相呼召。由行非法退失菩提及以善趣，遠離涅槃棄捨如來，違背正法厭惡於僧。在於屏處，起欲恚害諸惡尋思，是人無有菩薩勝業四淨梵行，譬如今時勤修梵行諸菩薩眾，於未來世起欲恚害惡尋思者亦復如是。迦葉！當於爾時住是種類，所謂惡行賊行矯行。汝觀爾時毀禁戒者，聞是等經便生誹謗。若有已能住戒布施，生於歡喜發菩提心，後聞是經復生謗毀。汝觀爾時有此相貌，可為記驗。若聞是經而生誹謗，於中智者、修淨戒者、持正法者，知是經內說此比丘名不知法，即應捨離如是等人，此輩無心愛敬法故。

「復次迦葉！當於爾時，有人詐現修菩薩行，便自顯揚生於放逸。生放逸已，謂勝獨覺及阿羅漢，住於非理，名不可治，當墮惡趣。復次迦葉！未來有人住於非業作非業故，取眾生相為說法故，處處遊行唯修似行，極似布施、持戒、安忍、精進、靜慮、般若波羅蜜熾盛流布。若有如實說是經者，則為他人憎嫌捨棄，於是經中起邪見想；是愚癡人不知此經呵責破戒，迦葉！當於爾時，皆為賊行之所穢污，是故彼人不思己過，能甚破壞正等菩提，由覆藏故懷羞而謗無上佛果。

「復次迦葉！當爾之際，不隨順僧、不知恩報而行開發。云何開發？謂開發他心。如來說彼數以語言誑惑他故，招致飲食。迦葉！當於爾時不護語言，訶毀如來別解脫戒，復與不護語人同其事業，不攝威儀住不淨處，為住不淨處者說諸法門，此法漸當為人輕賤。如是漸漸多有女人棄捨丈夫入於寺舍，為聞法故而便就坐。時有比丘即為宣說相似涅槃。迦葉！我觀爾時，有五百數非法之門，不修行人常當隨順，五百煩惱悉無所減，諸有所為與俗無別。當有如是大可畏事，而復於中希望利益，是故求菩提者不應親近諸比丘尼，亦不應行如是之行。常當捨離一切交遊，應一切時捨諸利養，受行乞食，捨所愛服受糞掃衣，棄捨一切樓閣房宇床鋪臥具，應住谿㵎巖窟樹下，捨離一切病緣醫藥資具所須，依陳棄藥，知諸眾生昔為親屬行大慈心，常應忍受捶打呵罵，終不捶打毀罵他人。捨離一切知友施主諸眷屬家，應當隨順自業行智，不應同彼在家俗人。常應順奉波羅提木叉教。

「迦葉！世若有人於別解脫起違背想，則為於佛力無所畏而生違背。彼若於佛力無所畏生違背者，則於去來現在諸佛而生違背，由此未來所受異熟無量大苦。假使三千大千世界一切眾生受地獄苦，比前眾生所受苦毒，百分不及一千分不及一，百千俱胝乃至算數、譬喻、優波尼沙曇分亦不及一。若欲遠離如是苦惱，應當遠離如是種類惡行。比丘縱遠相去千踰繕那亦應遙避，何況近耶。若但聞名尚應棄捨，何況見聞而不遠離？是故應當親近一法。何等一法？謂一切法悉無所有。若得諸法無所有忍，則不親近供養承事如是惡人。是人復應親近二法。云何為二？謂求諸法本無所有及求諸法性，而亦不應起於求心。應云何求？如所求者都不可得，不可得中不應起無所得心猶如邪見，如是離一切三界心，順菩提行；離一切相心，順菩薩行。菩薩行者，謂前所說為菩薩行。是故聞此法已應捨離之，則於來世親得奉事彌勒世尊，心不貢高亦不卑劣，作是唱言：『快哉安樂。我得解脫魔之羂網及諸惡趣。』

「迦葉！若於後時聞是經典，不驚不怖，及見己身於中隨順，復能發心受持此教，佛知是人定當守護我之正法。迦葉！譬如長者財寶無量，子於家中乃至見一盛水之器，起父財想。彼於異時，其父喪亡資財散失，忽見其器尋自念言：『是我父物。』將置身邊或時藏舉。迦葉！當於爾時，諸比丘輩亦復如是，聞此經已作是念言：『此是如來柔軟微妙大梵音聲之所演說。』復有比丘聞已誹謗，持法比丘作如是言：『此最真實如來所說。』彼持法者人眾微少住處劣弱，將如是經晝夜藏舉極遭誹謗。如是等人我亦知見，悉皆付囑彌勒世尊，於最後時當為衛護如來法城，次後當為無礙大施。

「復次迦葉！若善男子聞是法已，隨其智慧而修行之，成就深信正見眾生，於當來世遇彌勒佛。初會之中具修梵行，於最後時亦當衛護如來法城。迦葉！我今普觀，乃至不見一人不親近我，於當來世五十年中，聞是經典不生誹謗，則能受持讀誦之者，無有是處。若於此時得見我身，及以奉事供養之者，彼於來世五十年中，當得讀誦受持是經。不待於我歎其功德，彼等自成一切智智同一體時，隨念於我心生歡喜，作如是言：『希有奇特釋迦牟尼佛！善能攝受護念我等。』是故迦葉！應學此法。學此法者，隨所樂求，一切功德皆不難證。」

爾時大迦葉白佛言：「世尊！我已究竟無復志求。於此法中，退於阿耨多羅三藐三菩提。我於是中極為知足，終不能成一切智智。世尊！無上菩提是希有事，於我聲聞難為證得。」

佛告大迦葉言：「我不為汝說，然今因汝為他敷演。汝今勿於如是大事而生疑惑，汝等亦當速證無上正等菩提。復次迦葉！若諸眾生成渴法心、成求法心，漸次皆證無上菩提。既證得已，為斷一切希求心故，與諸眾生宣說正法。迦葉！菩薩應當成就四法發大精進。何等為四？云何精進？所謂不求色受想行識，求無漏法。謂無地界，無水火風界。不說地界，不說水火風界。所有言說悉名表示，是表示法皆非實有，菩薩不應取表示法以為堅實。」

時大迦葉白佛言：「世尊！我等於如來所實無疑惑。若他問言：『是表示法非真實者，佛之音聲言說表示，為虛妄耶？』若有此問，當云何答？」

佛告大迦葉言：「於未來世有諸比丘，不修身戒、心不識義理，瞋恚熾盛言辭麁獷，於是經典不能受持如法讀誦。何以故？彼住色受想行識生心故。未來比丘住是經典表示法中，如住色受想行識生故。復有一類諸比丘等住在家法，於勝義諦無復志求，如生盲人以金華鬘冠飾其首而不自見。當於爾時，諸比丘輩亦復如是，聞是等經言說文字尚不受持，況復能入所修勝義。譬如幼童若男若女，為大丈夫之所訶叱。此幼男女於後異時，聞是人名驚恐怖畏。當於爾時，諸比丘等亦復如是，聞此等經如實說過，知已不悔樂好衣服，返於是經而生怖畏。迦葉！如繫蝦蟇在獼猴手，而此獼猴面不迴顧。當於爾時，諸比丘等亦復如是，聞此等經違背不顧，不住其前。迦葉！譬如野干為狗所逐，走趣塚間窟穴深坑。當於爾時，諸比丘輩亦復如是，聞說此經如野干走。野干走者，謂犯禁戒、誹謗是經，聞是經已退道還家，馳求欲境趣向女人，趣於鬪諍諠雜醫術及以斷事，而於其中多犯禁戒，我說此等如趣塚間；身壞命終墮於惡趣，如趣窟穴；馳騁劍葉刀刃槍林諸大地獄，如趣深坑。迦葉！當於爾時，諸比丘輩成就如是野干之法，不能悟入如是等經，但能毀謗稱揚過失，身壞命終墮大地獄。

「復次迦葉！若有比丘作如是言：『若表示法非真實者，如來言說亦非實耶？』彼若說言：『佛之表示名為真實，諸表示法亦應名實。』有智比丘應問之曰：『大德！今者為執何事？為執空耶？為表示耶？』彼若說言：『我執表示。』應報之曰：『汝即是佛。何以故？汝有言說表示法故。』彼若說言：『我執於空。』應問彼言：『當為我說執何等空。何以故？不可言說名之為空。若執表示以為空者，或於我我所眾生壽者非空執空。』又問彼言：『汝意云何，樂一切法空不？』彼若答言：『我不喜樂一切法空。』智者言曰：『汝久忘失沙門釋子。何以故？佛說一切空無我故，不說有我眾生壽者數取趣故。』彼若說言：『一切法空，我樂空性。』應語彼言：『汝心尚樂一切法空，況復如來、應、正等覺。復次尊者！為眼是如來？耳鼻舌身意是如來？』彼若說言：『眼是如來，耳鼻舌身意是如來。』應語彼言：『汝於今者亦是如來。』彼若說言：『眼非如來，耳鼻舌身意亦非如來。』應語彼言：『仁者！汝作是言，眼表示非如來，乃至意表示非如來；即非表示是如來也，我於此處豈不悟耶！』彼若說言：『眼非如來亦不離眼而有如來，乃至意非如來亦不離意而有如來。』應語彼言：『如來所說十二處有，謂眼處色處乃至意處法處，此即眾生及眾生名字。仁者！為眼是如來非如來耶？乃至法是如來非如來耶？』彼若答言：『眼是如來乃至法是如來。』應告之曰：『如仁者言，一切眾生及山林大地應是如來。』彼若答言：『眼非如來乃至意非如來。』復應告曰：『如仁者言，如來即法及以非法。』彼若說言：『色非如來乃至法非如來。』應告彼言：『若如是者，豈以非法為如來乎？』彼若說言：『即以非法以為如來。』應告之曰：『若如是者，所有眾生，不孝父母、不敬沙門婆羅門及諸尊宿，殺害生命，犯不與取，行欲邪行，虛誑離間，麁惡雜穢，貪瞋邪見，應是如來。』彼若說言：『非非法而是如來。』應告之曰：『非法非非法應是如來。若非法非非法是如來者，則無表示。仁者！無可表示是如來耶！』迦葉！應當如是折伏愚人。我不見有世間人天能與如是如法說者而共對論，唯除瞋恚愚癡之人不堪忍者，雖為開示不生信心，毀呰空法棄捨而去。

「迦葉！汝等應當受持是經。於未來世有諸比丘持是經者，當得三名而為表示。何等為三？謂說斷滅、無物無蘊及無恭敬。當爾之時，如是經典為他誹謗。汝觀爾時，不恭敬佛、不恭敬法，但依表示名字語言虛荷僧名而無實德。雖稱佛號，於他開示而不能解，云何可得瞻奉如來？雖說佛法，而不能知如來意趣，云何得名為善說法？四雙八輩是佛弟子、聲聞之僧，但知其名，於彼功德不知其義，不能領受依名實德，為於衣服飲食臥具病藥緣故毀謗於法。菩薩於中應勤精進，於是等經深生希有樂欲之心，受持讀誦。何以故？是人來世為護法城。

「迦葉！我念過去九十一劫空無法時，如是等經不復流布。又念過去超於千劫有佛出世，號休息熱惱，住世八萬四千劫，成熟菩薩利益世間。又念過去，復有如來號無邊力，住世二十億劫。於二十億劫行菩薩道，然後證阿耨多羅三藐三菩提。迦葉！汝觀於佛，修習幾何難作之行攝諸眾生？

「復次迦葉！劫濁盡世，我等不應輕賤己身。何以故？於劫濁中，乃至一人能於我所信解此法，甚為希有。一切眾生不持刀杖追逐我等，亦為希有。何以故？此法即是善丈夫法，謂於諸行為無行想，難了知故。若有我見、眾生見、命見、數取趣見、有見，若依諸蘊起於戒見，若多聞見、佛見、法見、涅槃見，若有起於涅槃見者，如來悉知見為邪見。何以故？佛於涅槃而無分別亦無所得。若於涅槃起於分別及有所得，如來盡說名為邪見。若邪見者則名無智，若無智者名為損害，若損害者名曰愚夫，名愚夫者於大菩提則無樂欲，乃至遠離生天勝道。迦葉！於未來世當有比丘，年紀二十三十四十乃至百歲，為老所侵莊嚴衣服，雖剃鬚髮毀壞威儀，老病衰朽無有威光，趣向邪法。臨命終時，由罪意樂之所障蔽，熟思已犯懈怠不修，而於三處示現證得。何等為三？或矯現威儀，或復詐現修持淨行，或舉手自稱言我無與等。以此三處示現有證，斯人咸墮增上慢中，臨命終時心生追悔，既命終已生地獄中。是故迦葉！我今分明宣告汝等，我為汝等真善知識，樂欲利益哀愍汝輩，不令於後受大熱惱，如慕理迦(唐言尾宿)、畔地迦(唐言路生)、波利婆羅理迦(唐言女梵志)受諸苦毒。迦葉！我終不聽執著我見、眾生見、壽者見、補特伽羅見者於我法中而得出家。我若不許，強出家者，皆為是賊。食重信施，亦不成就真比丘戒。迦葉！寧當絕食至於六日，不於我法得出家已食重信施，起於我見、眾生壽者數取趣見乃至涅槃見。是故菩薩應發精勤，不應執著我眾生壽數取趣見、有見涅槃見，為斷一切見故應當說法。迦葉！如是等經，我今付囑諸菩薩等。何以故？彼等意樂同於我故。若彼意樂同於我者是我伴侶，我伴侶者則便堪能受我付囑。」

爾時世尊而說頌曰：

/gatha/
「眾苦所逼迫，　都無能救護，　唯除世導師，　無有戲論者。
　諸苦惱眾生，　修下劣邪道，　漸增諸欲貪，　由斯墮惡趣。
　無導無救護，　住之嶮曠遠，　趣向邪道中，　終無安隱處。
　譬如人持財，　求利行遠道，　於中群賊起，　劫盡諸貲財。
　失財已空歸，　為利增熱惱，　所貸他人財，　被債倍生苦。
　斯等亦如是，　為法故出家，　本所持法財，　白業皆銷滅。
　唯淨剃鬚髮，　愚墮諸見中，　執著我眾生，　補特伽羅想。
　說空法比丘，　不著數取趣，　於此起謗心，　速墮於地獄。
　以瞋恚因緣，　遞互相誹謗，　自犯畏人知，　妄宣他過失。
　身惡及口惡，　意業多諛諂，　顛倒隨見流，　斯人生惡趣。
　造諸惡業已，　速疾往三塗，　眾苦所燒然，　無能救護者。
　未來有比丘，　卒暴多瞋恚，　逼惱諸出家，　趣向菩提者。
　此諸可畏眾，　誹謗如是經，　不復能信受，　釋師子之教。
　互起瞋恚心，　遞共相苦切，　更相揚過失，　惡名遍十方。
　虛加惡唱他，　於己便生恥，　柔和者劣弱，　邪友勢力增。
　是知正法衰，　惡人多勢力，　我之所愛子，　謂諸善比丘。
　應趣向餘方，　往求安隱處，　從惡得解脫，　於此起悲心。
　宜於是經中，　當自審思念，　佛有如是教，　當樂住餘方。
　正法滅壞時，　柔和者難得，　相隨俱往詣，　如來稱歎所。
　或有言此處，　可離不可居，　當詣大仙人，　得大菩提地。
　復有稱仁者，　汝實善為言，　繞塔以求真，　是名世尊教。
　寧當至於彼，　悅意菩提地，　不可恒此居，　沒於瞋迫所。
　比丘當詣彼，　為我故應行，　見佛所遊方，　昔曾安止處。
　經行宴坐地，　若石及空閑，　集已共諮嗟，　為之數啼泣。
　言是彼大仙，　經行受用處，　昔日曾遊止，　轉無上法輪。
　有為悉無常，　我等今不見，　人及非人等，　天龍皆會集，
　善化令歡喜，　何乃見空虛？
　時往道場中，　最勝菩提地，　同來集會已，　當如理思惟。
　世尊於是處，　成無上佛果，　驚怖惡魔軍，　猶如野干眾。
　是為道場地，　大覺所端居，　過去及未來，　一切諸佛座，
　安處大雄尊，　億天所敬禮。　七日加趺坐，　諦視菩提樹，
　瞻觀供養畢，　次往鹿林中，　言此轉法輪，　聲聞於梵世。
　彼諸比丘等，　當為數悲啼，　為欲調五人，　導師來至此。
　五人初見佛，　各起憂惱心，　立制自相要，　我等勿為起。
　時大悲世尊，　哀愍群生類，　為五比丘說，　甘露果時成。
　禮轉法輪方，　心悲數啼泣，　次往涅槃處，　感佛最後身。
　於此雙林下，　利益群生類，　碎身分支節，　於茲般涅槃。
　嗚呼大聖尊，　釋迦大寂滅，　今但聞其名，　惜哉我不見。
　大師復於此，　最後度善賢，　能以智先知，　此為最後度。
　或修時壽盡，　或發趣命終，　或修已身亡，　彼皆生善趣。
　從於彼時後，　深廣法沈淪，　持戒毀禁人，　皆當得供養。
　受他重信施，　速墮惡趣中，　汝觀諸比丘，　有如是差別。
　智者修雖後，　速受人天身。
　是等照世燈，　憐愍世間者，　大智諸菩薩，　慈心利眾生，
　常作勤修事，　勇躍心歡喜，　當成大覺尊，　亦逢事彌勒，
　供養彼如來，　眾中蒙授記，　隨心所憶念，　為彼大威神。
　我說誠實言，　安慰如是輩，　彼雖不見佛，　而與見佛同。
　我昔求菩提，　禮敬於諸佛，　若諸女人等，　趣無上菩提，
　我及無量佛，　皆當安慰彼，　速成男子身，　得見於彌勒，
　供養彼如來，　所求悉如意。　應學諸智者，　淨信而出家，
　堅固樂欲心，　多聞學持戒，　於彌勒佛前，　得受其記莂。
　是故聞勝利，　起信修善賢，　安住堅固心，　攝諸眾生類。
　誰於如是處，　求而不得之？　有慧及精勤，　菩提不難證。
　修習慈悲念，　捨離諂曲心，　常樂在空閑，　是則菩提道。
　若人於是法，　空說不能行，　眾皆禮敬之，　此為可畏賊。
　若人為飲食，　及諸利養事，　受持正法門，　互共相傳說，
　斯惡活命人，　名為空過世。
　於此捨人身，　惡趣受眾苦，　或於佛法內，　假名為比丘。
　誹謗於契經，　善說解脫禁，　言我具弘宣，　所有木叉教，
　雖為比丘像，　終失人天身。
　若誹謗人天，　及毀一切智，　如是謗法人，　得罪復過彼。
　善防身語意，　令不起諸惡，　能除此三行，　必當得涅槃。
//

「復次迦葉！如來滅後，昔於佛所深種善根諸比丘等悉般涅槃，具勝意樂諸眾生類命終復盡。後五十歲正法滅時，當有比丘性懷貪著，猛利貪欲映蔽其心，樂離間語毒害於他，言詞麁獷慘勵顰蹙，住三法中。何等為三？所謂醫道、販易、親近女人。住此三法，退失四事。何等為四？謂退戒蘊、善趣、果證、如實見佛。由退此四，復成四法，不生厭離熾盛增長。云何為四？所謂嫉妬增長熾盛、瞋恚惡心增長熾盛、耽著種族增長熾盛、貪著飲食積聚眾味。愛樂衣服映蔽心故置之篋笥，專行此事以為常業，於沙門法空無所獲，亦不發生沙門證道。聞是等經當墮四處。何等為四？謂墮謗法，佛所不許而反說之；獨為女人宣說法要；毀謗如來別解脫戒；聞是等經轉加壞法，而墮生長惡業之中。迦葉！譬如惡狗以苦膽灌鼻。於意云何？彼狗倍生凶惡心不？」

迦葉白佛言：「世尊！如是如是。」

佛告迦葉：「彼等惡人猶如惡狗及毘舍遮，見有比丘住淨意樂持是法者、說是法者、住於真實少欲之者、歎少欲者，於是人所不生歡喜而起厭背，心懷怯劣復生熱惱，以其瞋恚障蔽心故，作是念言：『我等住在非時非處，於非時中而為他人輕毀我等。』是故聞說如是等經，起於誹謗面加毀辱，瞋恚麁言此非佛教，此輩受用多欲因緣，非少欲者。迦葉！我種種名讚歎少欲及以喜足，名為易養亦名易滿，名淨除者、行頭陀者、極端嚴者。我亦讚歎住阿蘭若者、發精進者、遍淨命者。汝等不應多修貯聚箱篋等法。何以故？應當修習如是法故。汝等不應猶如銅鈸空有其聲，應順如來修行此法。又亦不應起重瞋恚，亦復不應攝取事物，應當住於無事無物。勿於處所生住著心，應無所住。不應自讚，亦不應畜牛驢等類，不應成就住懈怠處，應當發起殊勝精進，捨離不善攝受善法。迦葉！我種種名讚歎寂靜住阿蘭若不處憒閙，今於是中種種名說極淨除行。若有不住極淨除者、具大欲者、成罪惡者，即當誹謗諸有安住極淨除者。迦葉！譬如愚夫於四月中服蘇患渴，尋詣池所求水而飲。他人謂曰：『汝已服蘇，勿復飲水而致命終。』是時愚夫瞋蔽心故，毀呰罵詈不順他言，飲水而死。迦葉！如是如是，未來比丘貪著有見住不善行，有持法者作是教言：『此是應作；此不應作。』彼惡比丘瞋蔽心故，毀呰罵詈謗是經典。迦葉！今時尚有於如來所多興諍競，何況未來。汝且觀是賢護比丘，如來制戒令諸比丘受一坐食。瞋蔽心故，於夏三月不至我所。迦葉！今於我前尚有如是輕梵行者，況佛滅後，貪著飲食衣鉢病藥，睡眠所覆瞋恚猛利，如是比丘聞是法已，尚不恭敬如來大師，豈能敬彼持法比丘？迦葉！名為不善亦名極惡，如是法寶即當隱沒。於中若有求大利益善男子善女人信我教者，後滓濁世極覆藏時善人難得，時聞如是等甚深法已，應為如理者說、不為不如理者，為信者說、非不信者。我今亦為如理者說、非不如理者，為信者說、非不信者。迦葉！譬如惡馬不受被甲，若同良馬為被甲者反生驚怖，何況更聞螺貝鼓聲，能堪受者無有是處。如是如是，破戒比丘無有時分堪能忍受善丈夫法，猶如惡馬反生驚怖。迦葉！破戒比丘乃至聞說一言諸法無我，執我想故於中便生怖畏諍競，何況聞說被善甲耶？若被甲已，即能降伏百億魔軍，而令畢竟不生鬪諍。諸善比丘被精進甲，不破根本頭陀功德，淨除根本，無貪恚癡根本、無嫉妬根本，離欲根本、獨處性根本、𭔋寤根本，於一切時一切種中，不應發起恚貪之心，於種種物無所希求，如是被甲名無根本。若被如是種種甲已，應發無上菩提之心，於一切處不應執著況起我想，是故不應起於我想、眾生想、壽者想、數取趣想、女想男想、地水火風想、欲界色界無色界想、持戒想破戒想、空性想。取要言之，一切諸想皆不應起，以一切想無所得故。

「迦葉！貪若實有則應了知，近之令滅貪愛之心，非住一處無住可得，唯除妄語，是故如來名實語者。如來說之諸所有貪皆為非我，如是諸法是沙門法，諸沙門法皆無所得。若復有人著此想者，是人則為著我想等如須彌山，退失聖教，諸沙門法少不可生，亦復不能住沙門法。如是廣大最勝之法，於彼愚夫癡所衰損，少不應說。何以故？若執少法則當攝受極怖畏處，大地獄中住之一劫。迦葉！汝觀俱迦利比丘<ail>（唐言惡時者）</ail>、提婆達多比丘<ail>（唐言天授）</ail>、騫荼達羅比丘<ail>（唐言鈌財）</ail>、迦盧底輸比丘<ail>（唐言器鬼宿）</ail>、母達羅多比丘<ail>（唐言海授）</ail>、阿濕繁比丘<ail>（唐言馬騰）</ail>、布那婆蘇比丘<ail>（唐言柳宿）</ail>、蘇氣怛羅比丘<ail>（唐言善星）</ail>，是我給侍親對我前，聞我說法、見我經行、見我端坐、見我神足遊處虛空、見我降伏多千外道於大眾中摧彼邪法。如是等人尚於我所不生信樂，於步步間恒欲毀我，由是步步漸增其惡。復次，若說佛名信為實者，應持上器如須彌山，盛栴檀末而散其上。應作繖蓋猶如三千大千世界，持在空中而覆其上。何以故？為信佛故。何況信已捨欲出家，無所依倚修諸靜慮。迦葉！如是眾生於中忍可極為希有，能善護持佛所制戒，則能了知彼甘露法。如大眾中以其皮革及餘臭穢共製人像，或造種種諸雜面相，彩畫莊飾令極端嚴。有人持之置於面上，或以衣物纏裹遊行。豈以相貌謂為好耶？審知穢惡便生厭離。如是如是諸惡比丘，以如來威德容儀嚴整審諦觀察，方知極惡由自他我想而生貪愛。若人了知我想非實，聞是等經不生瞋恚。何以故？由為他人毀呰違逆，聞此等經倍增厭離。若有眾生心懷執著，當知即是邪見之人。若起邪見，於是等經如實教誨即生瞋恚。何以故？有我想者有瞋恚故。

「若有比丘、比丘尼、優婆塞、優婆夷，聞是等經瞋恚毀壞誹謗之者，即非沙門。雖復說有沙門名字，非我聲聞、我非彼師。何以故？是我聲聞則不妄語，我非妄語之師。何以故？如來是實語者，能如實說一切法空者。迦葉！如來能破我執、與之鬪諍，若與如來諍者名為惡魔，如來不許魔眾出家受具足戒。如有人言：『青雀小鳥生大龍象。』於意云何？如是之言為可信不？」

迦葉白言：「不也。世尊！」

佛告迦葉：「於意云何？為等類不？」

迦葉白言：「非為等類。」

「復次迦葉！又如說言：『妙翅鳥王生於飛鳥。』於意云何？為可信不？為等類不？」

迦葉白言：「不也。世尊！亦為非類。」

「復次迦葉！又如說言：『螢火小蟲負須彌山飛空而去。』於意云何？為可信不？為等類不？」

迦葉白言：「不也。世尊！亦為非類。」

佛告迦葉：「如是惡人，若住我想乃至涅槃想者，稱我為師，轉為非類。迦葉！如有帝王安住國界，撫育群生快樂無極，種種飲食自然成辦，傍有侍臣奉王正化。時有一人眾未曾識，為財利故隨學臣法，不稟王命，自於大臣王等眾中詐宣王制，作如是言：『汝等應當止住於此。』或言：『汝等作如是事。』迦葉！如來法王亦復如是，王大千界，攝化一切三乘眾生，十力功德圓滿成就，作諸佛事安樂無邊，飲食供養自然豐足。於中一類眾未曾識，為活命故說我眾生乃至涅槃，不受如來無我聖教，作如是言：『如來所說，此事應作、此不應作。』於中有人信佛順教不誹謗者，聞其所說，謂是勝妙清淨福田，輟己資財及妻子分，殷重信心如法施與，乃至未覺諸過已來初無斷絕。如是惡人，同於眾人所未識者，飲食既終，於聚閙處日日談說王事、賊事、食事、婬事、女人事、醫方事、飲酒事、日月博蝕事、王者來去事、種族事等，或言吉日應行他所，當得飲食。如是等類種種言談推度晝夜，還僧伽藍，或經二宿乃至六夜，隨所住處亦常談說如是等事，無正念慧失壞威儀，昏癡睡眠涎唾流溢，隨所想像睡夢中見，或見己身往詣他所，疾行緩行種種諸事。既𭔋寤已互相向說，或夢汝身如是行坐，從如是處有得不得。復有說言：『此夢吉祥，宜時速往村邑王城。』至他家處出入往來搖動面目，苦逼惱故心不安和，無等引定貢高自舉，諸根穢雜與俗無殊，言不應時心多馳散，樂遊俗里諸族姓家，不能奉持別解脫戒，獨為女人宣說法要，於說法時心住貪染，而於是中增獲利養，染著之心猶如噬齧，愚癡耽愛增住增著，不生悔故，於別離時啼泣而去。又於二處開示他人。云何為二？得淨好施便讚歎之，得非淨好即便毀呰。相會遇時互看所得，復相問言：『施主今者為施何物？為施與誰？飲食資財幾多幾少？』迦葉！當知是謂不修行者。乃至命終之所言說，不修行者復有餘過，生惡意樂謂謗正法。迦葉！應於如是諸比丘輩生憐愍心。何以故？以其當受苦惱果故。」

爾時世尊而說頌曰：

/gatha/
「愚夫緣活命，　隨學帝王臣，　故往詣餘處，　詐宣王制令，
　至彼傳密言，　勿致王瞋罰。　愚人於此處，　亦以活命緣，
　何況最勝佛，　於多百劫中，　捨身支節等，　及作多難事。
　我非法王家，　僮僕被謫罰，　亦無問者能，　為作為不作。
　施與比丘房，　上妙美珍饌，　及施上妙衣，　一切恭敬與。
　勤苦求財物，　奉施持戒人，　不以自供身，　亦不將供子，
　不如法住者，　食之便捨去，　共相會遇時，　言我快意噉。
　所在聚集處，　說王事賊事，　關邏鎮守事，　種種飲食論，　說日月博蝕，　及王來去事。
　或言當得勝，　或說當敗亡，　此非所應言，　常共數論說。
　極妙臥具上，　晝夜耽睡眠，　晝往善人家，　求多富有處。
　言此施非少，　亦非為最上，　尋思是事已，　安敷空坐談，　愚惰不勤修，　如驢恒負重。
　而於眠夢中，　見所分別相，　覺已宣示他，　相向益談說。
　言勿憂勿笑，　汝當得安樂，　此事宜速成，　勿復生憂惱。
　數往於村邑，　動止無威儀，　喻若行獼猴，　迴轉於面目。
　入於聚落內，　為女說法言，　棄捨佛契經，　及善別解脫。
　既從施家出，　觀其物少多，　見少則罵他，　亦毀他眷屬。
　於相會遇時，　發言互相問，　得何物何食？　相問答何事？
　略說如是事，　經於百年中，　如是所尋思，　以為自活命。
　爭蒲桃酒味，　及以香華等，　為藥療其身，　求之少病惱。
　假令有百佛，　無能奈彼何，　棄捨所修行，　與在家無異，　於身生保愛，　不離於我人。
　彼作是修行，　由斯墮惡趣，　若人謗正法，　重苦所燒然，　無覺慧愚夫，　與在家無別。
　若諸釋師子，　修實行聲聞，　不以活命緣，　毀犯微少戒。
　智者不貪食，　常生重檐想，　不淨觀修心，　以還施主債。
　捨離欲漏故，　了知一切想，　我聽如是等，　此教中出家。
　智人不誹法，　於所說空性，　數數起勤求，　不可得堅實。
　勇健大智人，　了知空性理，　能怖畏魔軍，　彼堪銷供養。
　若能離貪染，　不毀於空性，　佛子勇健人，　兩足中應供。
　正法不久住，　生世多愚癡，　少柔和比丘，　求不放逸者，　智者應生憂，　不久自磨滅。
　後於晝夜間，　談說曾有我，　世間無救護，　唯除兩足尊，　修行學處人，　悉皆當滅沒。
　彼不了如是，　所有密意言，　則不恭敬佛，　及無上正法。
　正法當盡滅，　應速發精勤，　乃至少時間，　聽聞當不久。」

爾時尊者摩訶迦葉白佛言：「甚奇世尊！如是人等聞此等經不生厭離。」

佛告大迦葉言：「若有眾生成就四法，聞說此經不生厭離。云何為四？多放逸故不能深信、業異熟故亦不深信、大地獄故不能審信、我當死故。若人成就如是四法，不生厭離。迦葉！復有眾生成就四法，不生厭離。何等為四？年盛壯時自恃強力、耽著欲樂、貪嗜諸酒、不能了知明思惟觀。若人成就如是四法，不生厭離。迦葉！若有比丘成就四法，謗佛菩提。何等為四？本造惡業已成就故，毀壞正法，如是比丘不自發露不善異熟諸惡業故。於比丘尼行穢欲故。彼有和上或阿闍梨多人所敬，謗佛菩提，如是弟子隨學於師亦生誹謗。是寡聞者，由嫉妬故謗毀諸佛。比丘成就如是四法，謗佛菩提。

「迦葉！若有一法，得成沙門及婆羅門。何者為一？於一切法心無所住。如是一法，得成沙門及婆羅門。譬如有人墮高山頂，謂無大地樹木叢林，唯起空想出入息斷。迦葉！著諸法者亦復如是，若執眼想及以眼相，執耳鼻舌身意想乃至意相，若執色受想行識想，執淨持戒多聞慚愧經行往來得菩提想，如此等法皆悉非作沙門婆羅門。若起想者則為所害。為誰所害？謂貪瞋癡。若執眼相，由著可愛不可愛色相故，為眼所害。如是執著耳鼻舌身意相，乃至由著可愛不可愛法相故，乃至為意所害。若被害者，則於地獄、畜生、餓鬼、人、天界中極為所害。何緣被害？由想執著。何名想著？謂執我想及我所想、女想男想、地水火風想、骨想壞想青瘀想血塗想色變想離散想勝解脫想。彼有少分得勝解脫想，此有少分不得勝解脫想。有無量種宿住隨念現證作想，我隨念想異於過去異於現在，我是過去我是現在。於諸法中起想執著，乃至涅槃想、我得涅槃想。迦葉！以要言之，諸執著者處處起想，乃至於空性中起一切想，皆悉非作沙門婆羅門法，非沙門行、非婆羅門行。迦葉！如來說言沙門婆羅門法者，譬如虛空及以大地。何以故？虛空之法終不念言我是虛空。如是迦葉！沙門婆羅門者終不自謂我是沙門是婆羅門，是故諸法亦不自謂是作沙門婆羅門法。沙門法者不作不除，是為沙門及婆羅門。迦葉！譬如有人於夜闇中掉弄手臂搖動面目，作如是言：『我弄世間。我弄世間。』於意云何？彼為弄誰？」

迦葉白言：「世尊！是人自弄。何以故？於中無人為可弄故。」

佛告大迦葉言：「如是如是。若有比丘至阿蘭若，或至樹下空室露處，作如是想：『眼是無常，耳鼻舌身意悉是無常。』復作思惟：『色是無常，聲香味觸法亦悉無常。』作是思惟：『我趣涅槃。』如是等類為自劬勞，非沙門行。何以故？以有若干諸邪執故。知眼相已，為滅眼故勤勞修習。如是能知耳鼻舌身意相已，乃至為滅意故勤修習之。若於三處了知信受，則於三處而生分別。若於諸見起分別者，云何能得心一境性？迦葉！甚深菩提難入難趣、難具資糧。心一境性者，為以幾何名心一境性？周遍推求乃至一法亦不可得。所謂於眼不可得實，於耳鼻舌身意亦不得實，於一切法皆不得實。何以故？本性如是，心性不生，一切諸法無實可得，是故彼心不可得也。若過去未來現在無所得故、無所作故，是謂無所作。何名無所作？若新若故俱不可作，名無所作。是中過去心不解脫、現在心不解脫、未來心不解脫，隨所有心無所得者，是為心一境性。此即名入心之數也。

「迦葉！未來當有比丘、比丘尼、優婆塞、優婆夷，執著眼等說為滅壞，於諸蘊中起於物想。如來說蘊猶如於夢，然彼說言夢為實有，由世間中說有是夢，若無夢者我等不應有夢想事。以有表示，是故我等於其眠夢起於夢想。如是如是，蘊有所因故說如夢，若無蘊者不應說蘊猶如於夢。彼諸愚夫謂夢為實，聞是等經便生誹謗。於中當有比丘尼等，於施主家妄稱我是阿羅漢果，或依淺智說現證得。若優婆塞、優婆夷等，聞經律頌說我現證。

「迦葉！當於爾時。若有比丘或二十年三十年中常樂居止阿蘭若處精勤修習，為佛法故來詣初信一日優婆塞邊，唯以空言互相唱說，言空空故，我已遍知我已遍知。或有比丘聞是經等相向談說，有人聞之便生怖畏，復作是言：『若諸在家出家人等不應親近，應當遠離，此非教師。何以故？彼等所知不相親附。』復有宣說甚深法者，為諸在家出家人等棄捨輕賤。何以故？我今宣說勝妙梵行尚少知者，況未來世乃至最少知者亦皆滅沒。當爾之世，說法比丘千人之中，能如實解信入法者一亦難有；乃至二千亦復如是。於中或有餘比丘等，下至不能暫發言詞，況能解了。

「迦葉！當於爾時，在家出家共輕此教。若有比丘發勤精進為滅不善生善法故，初夜後夜減省睡眠精進修學，則為他人譏嫌棄捨，或斷命根。如是等經即當毀滅，住法比丘亦皆滅盡。於中智者深勝無染解了之者，應當尊重深心恭敬，共集會已住阿蘭若。」

爾時世尊而說頌曰：

/gatha/
「我所說善法，　第一義相應，　言蘊無堅實，　應觀察如夢。
　爾時諸比丘，　鬪諍心紛擾，　無禮別尊卑，　唯有空名相。
　比丘所發言，　俗亦如是說，　如斯之教法，　道俗語皆同。
　比丘謂俗言，　汝解法希有，　是謂佛菩提，　已發初地果。
　彼心謂見法，　親近在家人，　數奉施比丘，　與其最上供。
　如斯比丘說，　無異語皆真，　與彼共相親，　言我能見法。
　生於彼時者，　為施故出家，　不住正法中，　毀壞菩提道。
　我示汝道者，　近我勿親餘，　不久汝得之，　還如我所得，
　此最寂靜位，　共汝相向言。　和合大眾中，　毀壞我教法，
　猶如劫村賊，　性懷兇險心，　破壞諸國城，　及以大聚落。
　比丘亦如是，　無智多愚癡，　少慧起諸非，　著命數取趣。
　離我所說教，　依止諸見心，　說是羅漢人，　盡懷增上慢。
　於大和合會，　諸比丘眾前，　說已慧名聞，　於中一難得。
　或時有比丘，　安住如實者，　被說惡名聞，　言非佛弟子。
　法王大菩提，　于時被誹謗，　天眾懷憂慼，　相向數悲啼。
　對彼信心天，　身自投于地，　觀斯釋師子，　無上法輪摧。
　嗟歎佛如來，　快哉所說法，　奇特福田僧，　佛之所愛子。
　我等不復聞，　法王之所說，　牟尼今滅度，　無覺抱迷心。
　地居天次後，　出于大音聲，　唱令告諸天，　法炬今將滅。
　汝等得聞佛，　不親近如來，　勿致後天龍，　而當懷悔恨。
　經於無數劫，　為自及為他，　遍受於眾苦，　爾乃方成佛。
　此是諸世尊，　為諸眾生類，　所說善法門，　今皆當隱沒。
　矯亂人興世，　可畏造諸非，　魔使及惡魔，　恣情惡言說。
　諂詐多癡鈍，　誑惑劣愚夫，　若瞋與不瞋，　毀師及勝教。
　聞地天聲已，　上天皆慘然，　人及四王天，　悉亦懷憂惱。
　夜叉眾來集，　阿吒筏底城，　皆發可畏聲，　滿面流悲淚。
　天居眾寶飾，　城郭妙莊嚴，　皆悉失光暉，　猶如於聚土。
　國城非似本，　堪生愛樂心，　今見寶嚴城，　須臾不可樂。
　諸天同詣彼，　善逝本生國，　躄踊而號咷，　轉增大悲苦。
　我從天降地，　往詣諸國城，　真法盡沈淪，　遍觀皆不見。
　下至閻浮境，　見法大崩摧，　逼惱諸出家，　發聲大號哭。
　勝城七日內，　處處失光暉，　天亦七日中，　數悲數啼泣。
　嗚呼大雄健，　昔曾親面奉，　何期今不見，　言說亦成空。
　曾住舍衛城，　來已皆恭敬，　於其地界內，　數悲而數啼。
　見佛所坐林，　言佛曾於此，　轉四諦法輪，　我等親聞聽。
　世間還黑闇，　更互不相尊，　己造諸罪因，　往生三惡趣。
　天眾多宮殿，　今者悉空虛，　贍部諸眾生，　無主無救護。
　言佛經行處，　毀壞悉荒蕪，　法王已涅槃，　世間不可樂。
　三十三天主，　帝釋立其中，　苦惱發憂愁，　高聲大悲慟。
　諸忉利天等，　舉手共哀號，　適聞園苑中，　其次便馳走。
　是等諸天眾，　恒歎佛如來，　自嗟離世尊，　曾為說法者。
　不能食甘露，　亦絕歌樂聲，　如是等諸天，　心憂經六月。
　阿修羅聞說，　教法空無主，　於是即相呼，　興師伐忉利。
　贍部諸王等，　毀壞佛制多，　當於爾時中，　天與修羅戰。
　多有諸比丘，　及多比丘尼，　生諸惡趣中，　備受眾苦毒。
　在家犯諸罪，　近事壞尸羅，　互相揚惡名，　以之生苦趣。
　女人行不善，　皆亦入三塗，　如是事興時，　世間不安靜。
　或時行聚落，　或投竄山林，　人眾以波逃，　壽命便殀促。
　多有賊盜起，　亦復有飢荒，　苗稼不時登，　蝗蟲起災暴。
　若於飢饉世，　人有壽命終，　便生餓鬼中，　具受多辛苦。
　所有施塔廟，　及與四方僧，　爾時諸比丘，　悉共分張取。
　於我滅度後，　如是眾苦興，　應速發精勤，　勿復更迴顧。
　諸有愚夫類，　而無智慧人，　愚夫業已成，　速生諸惡趣。
　應樂讀誦說，　智慧從此生，　人修智慧心，　速能昇善趣。
　常以智慧觀，　如我如是學，　永離眾繫縛，　速至於涅槃。
　正法不久留，　應發堅精進，　我已如是說，　宜速正思惟。
　此劫過去已，　滿於六十劫？　當不聞佛名，　何能生信樂。
　若人相會遇，　饑餓苦所侵，　母子是時中，　互相食其肉。
　彼時所生子，　慞惶行不安，　住在己家中，　猶生大怖畏。
　見聞此事已，　知其生死燒，　誰有智慧人，　於中生愛樂？
　無明是生根，　女人是欲根，　蘊為苦惱根，　是故應捨苦。
　世有愚眾生，　耽著於女欲，　人能離癡者，　疾當得涅槃。
　宣暢此法時，　不遭於惡果，　不說果有漏，　故墮惡趣中。
　所有無漏法，　空空無所有，　寂靜本無堅，　宜應速了悟。
//

「復次迦葉！若有比丘或餘眾生，由能成就此第一法求無漏者，應作是言，於一切法心無所住。

「復次迦葉！菩薩應為堅固修習。云何堅固？云何修習？言堅固者，謂堅固心、堅固精進。何者名為堅固之心？菩薩念言：『乃至供養恒河沙佛，然後乃發一念之心而求佛道。次後復經恒河沙劫一佛現世，以發恒河沙等心故，一得人身，以恒河沙等人身聞一句法智慧光明，於阿耨多羅三藐三菩提作大利益。』應發如是堅固之心。又以種種方便攝佛智慧，種種苦行以為希求，種種苦行攝受佛智。復有如是堅固之心。

「復次迦葉！我今為汝宣說譬喻，由此喻故諸有智人而能解了爾所說義。由是種種難行苦行能得菩提，於恒河沙劫不應休廢。若於恒河沙劫學不休廢，則能現證無上菩提。應發如是堅固之心，以為勢力以作策勤，終不捨離阿耨多羅三藐三菩提。復有如是堅固之心。迦葉！若有菩薩發是心者，何以攝受？謂不取處不取非處。何故不取處非處耶？若有取於處非處者，於無上覺則為障礙；以不取於處非處故，速得無上正等菩提。迦葉！譬如有人以滿三千大千世界珍寶持用布施，若有如是種種經典如來所說，隨順菩提受持教法以信安住，所生福聚倍多於彼。迦葉！菩薩復有堅固之心，乃至堅固心亦不可得，是故修行不可休廢。言修習者，謂多修行。有幾多耶？隨有若干多修習法，若起一心不能解了。何以故？彼法不可為表示故。然是最勝修習之法，謂堅固心性。」

爾時世尊即說頌曰：

/gatha/
「無心起心想，　當有大怖畏，　我當成不成？　是事為云何？
　而常起尋伺，　住在於一邊，　誹謗於正道，　不可得菩提，　此是懈怠心，　非是菩提相。
　斯人疑一切，　諸佛及聲聞，　不行而希望，　賢聖諸佛法。
　非但由言說，　能成安樂果，　要有信樂心，　能成廣大法。
　亦非唯心量，　能獲勝堪任，　由一法能成，　諸有所作事，　知其殊勝已，　為佛故應修。
//

「復次迦葉！菩薩以能成就此法，亦不親近供養諸佛，而自記言：『我當得作如來、應、正等覺。』迦葉！在家菩薩有三種修，能於菩提而作利益。何等為三？為一切智故深生愛樂、不墮本業、堅持五戒。具此三支能成六法。何等為六？謂得聖處、不瘂不吃不聾不失聰聽、身變端嚴、速得深信於甚深法不生怖畏、隨所聞法不用功勞而能領解、速得不退；於此六法應當善知。有五障轉。何等為五？謂離間語、一切妄語、意樂不成、心懷嫉妬、耽著諸欲；如是五法為障礙轉。復有三法應當修行。何等為三？謂常興心欲出家故、於持戒沙門婆羅門所尊重恭敬、若非同類說法之者應遠離之。何以故？菩薩不應修學彼法，若修學者如負芻草。何以故？非佛道故。若擔負者即為執著，同諸愚癡，是故不應修學彼法。

「復次迦葉！菩薩又應受學三法。何等為三？謂常隨順諸佛如來、為他演說勤自修行、於眾生所修習慈心。於此三處受已應學。復次應當親近三法。何等為三？謂離捶打、不毀他人說云卑賤、於怖畏者施其無畏。應當親近如是三法。」

爾時世尊而說頌曰：

/gatha/
「不親下劣人，　見不正直者，　見已當遠離，　猶如避毒蛇，　不應隨學他，
　不禮應遠離，　猶如見惡狗，　以生惡趣中，　有懷執著人，　學之同惡趣。
　聞說勝空法，　應生愛樂心，　及樂空比丘，　亦應起尊敬，　增長多聞道，　而生利智心。
　親近勝菩提，　有情應敬禮，　疾行受其教，　速生諸善根，　增長智慧心，　如蓮生在水。
　宜多聽受法，　所增善速增，　以增智慧心，　能斷於諸漏。
　大威德無畏，　大智大精勤，　為欲利益他，　自身盛利益。

　在家應捨離，　捶楚打眾生，　發趣求菩提，　於法得不退，　無病最端正，　人皆愛敬之。
　若修習慈心，　捨離諸惡道，　三十三天上，　五欲自歡娛。
　從天若命終，　不墮於三惡，　生處於人世，　種族豪貴家，
　形貌最端嚴，　人無能毀者，　天龍所守護，　隨法正修行。
　受於勝妙處，　為人所愛重，　善得安隱眠，　寤亦心安隱，
　以為天擁護，　終無怖畏心，　此之廣大法，　有如是勝相。

　在家或出家，　更有大饒益，　令發悟憶念，　多人諸善根。
　怖者以施安，　趣向菩提果，　更不事餘天，　唯除一切智，　是人得正道，　諸智共相應。
　以此諸善根，　捨離三惡趣，　得智獲三明，　善學於三學。
　如所作功德，　如其所禮敬，　獨為眾生尊，　人多恭敬禮，　禮敬如來者，　眾中為最上。
　住於在家地，　若發菩提心，　為彼說法言，　及餘汝當聽。
//

「復次迦葉！在家菩薩應成三法。何等為三？應離世間嬉戲放逸互相贈遺及以選擇良日吉辰、應常清潔離多納受、復當精進修學多聞。菩薩應成如是三法。復有三法應受修行。何等為三？於說法者不為障礙、應當勸請說法之人、恒然燈燭。常應作是三種之行。復次迦葉！有三種法終不應作。若有作者則受女身。何等為三？不應障母聽聞正法及見比丘、不應障妻見諸比丘及聞正法、乃至不應於己妻所犯其非路。如是三法終不應作，若有作者便受女身。」

爾時世尊而說頌曰：

/gatha/
「常應以信心，　燃燈燭光曜，　便獲無塵垢，　清淨之佛眼，　由依此眼故，　了諸所知法。
　若能了所知，　以知過去法，　知現在亦然，　不分別未來，　無有三種相。　
　有斯二種相，　捨離於第三，　相即名無相，　皆同為一義。　
　佛所說諸根，　然法無根本，　於斯起分別，　便失勝菩提。　
　淨修佛眼已，　現證一切法，　此句即菩提，　如上所開示。　
　法無有能示，　亦無能毀者，　諸法如虛空，　是故說開示。　
　導師宣此義，　以為在家人，　常燃燈燭光，　得佛眼明了。　
　不斷他說法，　釋師子之教，　終不往三塗，　不受生盲果。　
　能常勸請他，　宣揚最勝教，　以此善根力，　轉無上法輪。　

　若人於母所，　為作法留難，　受鄙陋女身，　盲傴多眾罪，　
　不曾覩眾色，　亦不少聞聲，　住於幽闇間，　猶如蝙蝠類。　
　於妻生妬忌，　與作障法緣，　從茲速命終，　當為極陋女，　
　髮黃眼睛綠，　黧黯目盲冥，　足跛懷毒心，　耳聾多口舌。　
　如斯種類處，　速受眾惡身，　常為欲因緣，　丈夫生嫉妬。
//

「復次迦葉！在家菩薩有三種法所不應作。何等為三？若他施物，設有微少蘇醍醐等乃至或多難施之物，主若不請不應行施；他欲出家不應留難，未出家者應當勸喻令使出家；見有建立如來塔廟當助修營，不應緣此取其財物。如是三法在家菩薩所不應作。」

爾時世尊而說頌曰：

/gatha/
「他施功德財，　不應與非處，　於重便獲罪，　所施不能遮。
　信者詣施前，　合掌儼然立，　於中人力少，　樂欲給侍僧。
　應隨施主言，　助其少人力，　水漿湯飲等，　及餘輕物類，　無違施主心，　不令他怨恨。

　若有欲出家，　或子或親屬，　菩薩於是中，　不應作留難。
　願有情安樂，　願得證涅槃，　我勝意樂然，　願說無上法。
　知其過失已，　不應穢自身，　勿長夜憂嗟，　為煩惱所染。
//

「復次迦葉！在家菩薩有三種法不應修行。何等為三？不應販賣男子女人、又亦不應與他非藥、若有作者不應親近。」

爾時世尊而說頌曰：

/gatha/
「應離販賣男，　亦離販賣女，　非藥勿與他，　若與者應離。
　為苦眾生故，　天等所同訶，　隨趣諸方維，　憂箭所中害。
　長夜增憂惱，　眾苦逼其身，　殀壽自銷亡，　是故不應作。
　此過及餘失，　我悉了其因，　為諸菩薩等，　略說其少分。
//

「復次迦葉！在家菩薩有三種法所不應作。何等為三？不應往彼婬女之家、不應親近諸媒媾者、不住屠殺牛羊等處。如是三法所不應作。」

爾時世尊而說頌曰：

/gatha/
「不至婬女家，　專行穢欲者，　速致世譏嫌，　親近下欲故。
　尊者知其往，　便即起嫌訶，　招疾害其身，　以之令壽盡。
　常不應親近，　媒媾男女人，　他娶女為婚，　近之被誹謗。
　亦不應往詣，　諸為屠宰家，　菩薩勝依人，　皆所不稱讚。
　此諸深過患，　如來悉了知，　為不正行人，　我今如實說。
　世尊所有教，　我弟子能知，　斯人於佛前，　能詣所行處。
　眾生住聖道，　將速至涅槃，　佛為如是人，　非為惡行說。
//

「復次迦葉！在家菩薩應成三法。何等為三？住在家中觀己身命如客使想、於已施物起積聚想、於未施者如遠離我百由旬想、不為妻子作積聚想。在家菩薩應當成就如是三法。」

爾時世尊而說頌曰：

/gatha/
「常修於死想，　我命速當終，　於其所積財，　應修取堅實。
　財不為妻子，　亦不為己身，　速疾得堅牢，　身命及財物。
　慇重求佛道，　不起貢高心，　若捨饒益門，　常遭諸損害。
　猶如於戲童，　少嘗非飽足，　法味尚輕微，　雖信非堪保。
　修行非猛勵，　相去實全遙，　弘揚若不休，　名為究竟法。
　迦葉我今說，　如斯諸法門，　人能解了之，　名為一切智。
　以智善觀察，　於身生厭離，　常自正思惟，　想之如對我。
//

「復次迦葉！在家菩薩成就三法，得不退轉於阿耨多羅三藐三菩提。何等為三？父母不信令其住信、父母毀戒勸令住戒、父母慳貪勸令住捨，讚歎無上正等菩提，為他說法；是為第一得不退轉無上菩提。復次迦葉！在家菩薩。知可供養不可供養，可供養者而供養之，若不可者即不供養，然於彼所修習慈心；由成如是第二法故，得不退轉無上菩提。復次迦葉！在家菩薩勤苦積財。不令虛費無令散失！不浪與他宜堅舉置，而於淨戒沙門婆羅門諸眾生所平等施之，與同法者無所障礙；由成如是第三法故，得不退轉無上菩提。」

爾時世尊而說頌曰：

/gatha/
「若在家菩薩，　求無上菩提，　生三根本慧，　此為最上覺。
　若父及與母，　惡慧無信心，　勸令生信樂，　令其住勝法。
　慳犯住戒捨，　無慧教令慧，　亦常勸於是，　為菩提勝法。
　應往於四方，　遍求說法者，　法施以教人，　由斯增智慧。
　犯戒令住戒，　無信令信心，　無慧教令慧，　得成不退轉。
　若逢慧比丘，　持戒多聞者，　恭敬親近之，　數往而諮問，　在家由此法，　得不退菩提。
　知彼勝德人，　多聞具諸智，　慧解堪尊重，　可持身肉施。
　此為信心相，　如我前所言，　無信則不能，　發大菩提意。
　聰明見勝事，　速成深利益，　於諸殊妙法，　取證不為難。
　知自及與他，　如斯勝饒益，　與出離相應，　是故增智慧。
　本來恒積集，　所有諸資財，　為與持戒俱，　共貯當來物。
　是無有異語，　彼亦不虛言，　勇進堅施成，　當證如來果。
　持戒易共住，　勇健獲深慈，　布施攝眾生，　如先後無異。
　清淨最上施，　無所有希求，　若金若與銀，　無有不施者。
　勇猛施一切，　宿世所行檀，　希求無上乘，　甚深最勝位。
　非法而供養，　一切諸天人，　不如能順法，　供養一眾生。
　勇健為法求，　以法能了法，　聰明由勝道，　獲無上菩提。
//

「復次迦葉！在家菩薩發阿耨多羅三藐三菩提心已，成就三法於聲聞乘而般涅槃。何等為三？此有一類怖三惡道，於大菩提起重擔想，已集善根不專思念，不好善求，為心所害便生苦想；以成如是第一法故退失菩提，於聲聞乘而般涅槃。復次迦葉！此有一類，於所行施不生喜心，行布施已便生追悔，復不迴向佛之智慧；由成如是第二法故退失菩提，速於聲聞乘而般涅槃。復次迦葉！此有一類，不勤精進專求多聞，以下劣善根速般涅槃；由成如是第三法故退失菩提，速趣聲聞乘而般涅槃。」

爾時世尊而說頌曰：

/gatha/
「發菩提心已，　不正隨順行，　退失於佛乘，　入於聲聞道。
　菩提非不信，　及以懈怠心，　無智守慳貪，　則為有障礙。
　知恩住淨戒，　常樂廣行檀，　菩提不難得。
　由心造諸惡，　心亦善行檀，　眾生心若堅，　當為世間塔。
　若能離三法，　心趣大菩提，　當為世間尊，　成無上應供。
//

「復次迦葉！在家菩薩由成三法退失菩提，於獨覺乘而般涅槃。何等為三？此有一類，雖已發趣大菩提心，於法慳悋。復有一類，耽著觀望，及取世間吉凶之相。復有一類，發菩提心，以懈怠故不能遍求菩提分法。由成如是三種法故，一一皆能退失菩提，於獨覺乘而般涅槃。」

爾時世尊而說頌曰：

/gatha/
「慳悋於正法，　不教誨他人，　得獨覺菩提，　退失無上道。
　由斯二種義，　失利眾苦生，　親近而修行，　疑惑菩提道。
　思惟大乘法，　就吉以避凶，　此非正信心，　為佛所棄捨。
　有能專意樂，　堅固向菩提，　終不禮餘尊，　唯除世間塔。
　若有淨信心，　不事餘天等，　是為成最上，　號曰天中天。
　若有樂菩提，　不事餘天等，　在在所生中，　色力恒具足。
//

「復次迦葉！在家菩薩由成三法受身黑闇。何等為三？如來塔所取其燈明，於他諍訟而現瞋恚，於他黑人不預己事橫加毀呰。由此三法其身黑闇。」

爾時世尊而說頌曰：

/gatha/
「塔所燃燈明，　斷取是光焰，　身便為黑闇，　猶如烏毯毛。
　毀呰於黑人，　我白汝身黑，　由其輕毀他，　受身便黑闇。
　宜善護其語，　業終不敗亡，　隨其所造業，　當為彼業器。
//

「復次迦葉！在家菩薩由成三業生工匠家。何等為三？菩薩自身能持五戒，若有親屬從遠而來與酒令飲，或勸他人而令飲酒，即當生彼工匠之家；名第一法。復次迦葉！在家菩薩自修梵行，和合他人令行穢欲，緣造此業積集成故，而當生彼工匠之家；名第二法。復次迦葉！菩薩見他精勤讀誦，然己家內起作興功，尋語彼言：『汝且休廢讀誦之業，宜時為我營辦所成。』以是業緣積集成故，而當生彼工匠之家；名第三法。」

爾時世尊而說頌曰：

/gatha/
「持酒勸他人，　及與諸親屬，　以成狂飲故，　便為饒語匠。
　不解作刀鍼，　及餘工巧處，　唯能坐搖手，　爐前鼓槖囊。
　自能修梵行，　為他稱讚婬，　此業異熟時，　當為饒語匠。
　不解作刀鍼，　不能鼓風槖，　唯解奮長槌，　碪前而鍛鐵。
　令他棄捨法，　從茲而命終，　速生工巧家，　稟識常愚闇。
　初不見囊槖，　亦不見鉗槌，　其業報應然，　悉破壞眾器。
　迦葉應防意，　及善護其言，　永勿教他人，　一切不善法。
　輪迴生死苦，　由愛故增生，　善法可勤修，　應訶諸不善。
//

「復次迦葉！在家菩薩成就三法，當生剎利豪族之家眾同分中，顏貌端嚴人所愛敬，聰慧巧便不為嬾惰。何等為三？謂覩未曾見沙門婆羅門，即生信心供養禮敬，言是福田，以清淨心延請供養衣服飲食臥具醫藥一切所須。在家菩薩成此初法，當生剎利豪族之家眾同分中。復次迦葉！在家菩薩堅住本誓，如說修行終不妄語。成就如是第二法故，當生剎利豪族之家眾同分中。復次迦葉！在家菩薩於具戒蘊沙門婆羅門所修供養時，而能攝受堅固之法。由成如是第三法故，當生剎利豪族之家眾同分中。」

爾時世尊而說頌曰：

/gatha/
「諸有智慧等，　見持戒多聞，　應生歡喜心，　往彼而請命。
　既為請命已，　如法供養之，　無有厭悔心，　所施無罣閡。
　是取堅牢法，　所為親近者，　種種智相應，　於難而速得。
　如斯深信意，　趣向大菩提，　是智之所行，　佛道非難證。
　恒為上活命，　應受最勝財，　希求殊妙法，　證無上涅槃。
　當生豪族家，　顏貌甚端嚴，　得上妙衣服，　證最上涅槃，　如佛所稱譽。
　行於最上乘，　以佛乘能證，　清涼妙涅槃，　是為最勝果。
　如其所造業，　獲果亦等流，　設經百億劫，　是業終無壞。
//

「復次迦葉！在家菩薩成就三法種諸善根，乃至證得無上菩提，終不受於五欲世樂。何等為三？在家菩薩受持五戒，不向他人讚五欲樂，勤修自業不使女人，及發是心：『我止親近一切女人，乃至證得無上菩提，願我不逢五欲世樂。』由成如是最初法故，乃至菩提不受五欲。復次迦葉！在家菩薩聞是等經而生深信求趣涅槃，雖復受持如是等教隱蔽不行，有能演說及發起者，若人聞已即當捨離諸惡作處。以此善根得無礙辯、得無著辯，若於現在及命終時速得見佛。命終之後往生天上，不久證得阿耨多羅三藐三菩提。由成如是第二法故，乃至菩提不受五欲。復次迦葉！在家菩薩所有善根悉皆迴向無上菩提，不樂色聲香味觸法財封尊貴，不愛眷屬，以無為心、無為果報速證無上正等菩提。由成如是第三法故，乃至菩提不受五欲。」

爾時世尊而說頌曰：

/gatha/
「在家修五戒，　堅守善護持，　不親近女人，　於中生厭惡，
　如是等法門，　勤求無厭足，　所有惡作處，　應速捨離之。
　一切諸善法，　悉迴向菩提，　以此諸善根，　速離於五欲。
　常獲勝多聞，　為眾生說法，　發生大慈意，　求無上菩提。
　是故聞此利，　應生賢善心，　不近於諸欲，　速疾轉法輪。」
//

爾時大迦葉白佛言：「世尊！今此經法以何為名？我等今者云何奉持？」

佛告迦葉：「是經名曰『說三律儀』，亦名『宣說菩薩禁戒』，亦名『同入一切諸法』。」

佛說此經已，尊者大迦葉及諸大眾，一切世間天、人、阿修羅、乾闥婆等，聞佛所說，皆大歡喜，信受奉行。
