docInfo.writeDBJJ(mvp.ttl, `
${mvp.START()}

如是我聞：

一時婆伽婆在王舍城耆闍崛山中，與大比丘眾千二百五十人俱；菩薩摩訶薩五千人，一切皆得無礙辯才，大忍成就降伏魔怨，近於佛智一生補處，皆得陀羅尼無邊辯才、力、無所畏、自在神通，乃至一切功德皆悉具足，其名曰普賢菩薩、普眼菩薩、普明菩薩、普光菩薩、圓光菩薩、上意菩薩、無邊意菩薩、廣意菩薩、無盡意菩薩、持地菩薩、持世菩薩、益意菩薩、呪手菩薩、文殊師利等六十不思議菩薩，賢護等十六菩薩，如是等菩薩摩訶薩五千人俱。

復有娑婆世界主梵天王，及釋提桓因、護世四王、功德天子、正意天子，一切天王、一切龍王、一切緊那羅王、一切乾闥婆王、一切夜叉王、一切阿修羅王、一切迦樓羅王，如是等王

各各皆與百千眷屬俱悉來集會。

爾時世尊坐功德藏師子寶座，於大眾中色象顯現如須彌山，普照世間如日天子，顯現世界如月天子，其德寂靜如梵天王，威德難瞻如天帝釋，七菩提分皆悉具足如轉輪王，宣說無相空無願法心無所畏如師子王，身光照耀如大火聚，又放光明猶如諸天最勝無上摩尼寶珠普照三千大千世界，以大梵音令諸眾生悉得歡喜。於一切法解其深義，於大眾中而為說法，初中後善其義微妙，具足無雜清淨梵行。爾時眾中有一菩薩摩訶薩名曰喜王在眾中坐，覩見如來坐師子座放大光明，如百千日普照一切，令天人光隱蔽不現。見是事已踊躍歡喜，遍滿身心不能自勝，即從座起合掌向佛，以偈讚曰：

/gatha/
「世尊覆蔽此大眾，　天龍修羅乾闥婆，　菩薩聲聞無威德，　普照一切如金山。
　猶如須彌諸天俱，　處於大海佛亦然，　世尊住於慈悲海，　放大光明百千種。
　住於梵行猶梵王，　光明威德過諸天，　安住禪定解脫中，　照耀世間勝眾生。
　猶如帝釋在天眾，　色象光明最為勝，　佛過世間亦復然，　諸相莊嚴功德具。
　猶如輪王典四域，　照耀世間說法時，　令諸眾生入聖道，　世尊顯現慈悲意。
　光明障蔽火摩尼，　猶如秋日行虛空，　佛比千日最為勝，　佛日普照於世間。
　如夜闇時秋滿月，　佛光清淨亦復然，　面部圓滿猶如月，　覆翳一切天人光。
　猶如山頂夜火聚，　清淨顯現無邊界，　能滅一切無明闇，　世尊智慧光普照。
　佛音遍滿山谷中，　能伏外道猶師子，　宣說無我空無願，　令諸外道皆恐怖。
　威光猶如摩尼王，　映奪一切摩尼光，　如來軀體真金色，　普照世間勝諸光。
　如來世間無與等，　況復有勝世尊者，　福智精進方便等，　一切功德無能過。
　救護世間大丈夫，　我今覩見功德海，　令我歡喜生尊重，　是故頂禮世尊足。
　我已讚歎勝調御，　功德圓滿世間燈，　我今所有諸功德，　令諸眾生證菩提。」
//

爾時喜王菩薩摩訶薩偈讚佛已，合十指掌諦觀佛身目不暫捨，觀察法界甚深難解難行難入，不可思惟難知寂靜微細之法，不可思量諸佛境界。內心觀察周遍法界，觀如來智世尊境界無有等等。作是觀已，入如來智不思議境方便行中，諸佛世尊同一法性而無有異。思惟觀察諸佛世尊無所染著猶如虛空。作是觀時，入於實證真如體性，一切諸法性皆如是。生如是信，愛樂諸佛如來無礙解脫之門，知常樂我淨、知佛之身，作是思惟：「如來之身遍一切剎現眾生前，諸佛功德於無量劫說不可盡。」喜王菩薩作是念已，默然而住觀於法界。

爾時有一慧命菩薩比丘名曰護國，在舍婆提城受夏安居三月過已，執持衣鉢共諸年少初學比丘遊行諸國，至王舍城耆闍崛山。爾時慧命護國菩薩到世尊前，頂禮佛足，右遶三匝却住一面，合掌向佛以偈讚曰：

/gatha/
「敬禮最勝放光者，　敬禮意如虛空者，　敬禮能決他疑網，　敬禮超過三界尊。
　十方無數剎土中，　聞讚如來功德事，　彼國所有諸菩薩，　歡喜皆來供養佛。
　菩薩如法供養已，　一心聽佛所說法，　聞法歡喜還本土，　讚歎如來諸功德。
　如來積行為眾生，　經於無量無邊劫，　為他求於菩提時，　其心初無有疲惓。
　世尊行檀持戒堅，　羼提精進遊諸禪，　智慧方便皆具足，　是故稽首大聖尊。
　如來具足四如意，　諸根諸力諸解脫，　又知眾生心意識，　是故頂禮大智海。
　知諸眾生心所念，　身口所作善惡業，　亦知解脫方便等，　世尊知已為說法。
　貪欲恚癡迷眾生，　能令入於三惡道，　如來知已教斷除，　令彼眾生生善趣。
　過去一切諸世尊，　天人魔梵所恭敬，　未來功德具足者，　世尊皆悉了了知。
　諸佛淨土所生處，　菩薩聲聞及緣覺，　天人眷屬與種姓，　壽命長短皆悉知。
　滅度已後正法住，　供養舍利起廟塔，　受法藏人若干種，　調御丈夫皆悉知。
　十力智慧無障礙，　悉能了達三世事，　入於一切法智中，　故我稽首大智海。
　佛無等等況有過，　諸相莊嚴如來身，　譬如星宿在虛空，　是故我禮勝丈夫。
　如來妙色無與等，　映蔽大會天人光，　釋梵威德在佛邊，　一切隱沒皆不現。
　身如金山無垢穢，　紺髮柔軟而右旋，　佛頂顯現如須彌，　無量功德光明聚。
　眉間毫相放大光，　無量無邊無有數，　佛眼修廣如青蓮，　以大慈悲視眾生。
　如秋滿月行虛空，　如來面部亦復爾，　眾生觀者無厭足，　是故我禮面中王。
　猶如師子鵝孔雀，　安行徐步如象王，　遊止震動於大地，　敬禮十力大苦行。
　手指𦟛纖無不愛，　網縵珊瑚赤銅色，　臂肘修長立過膝，　敬禮如來金色身。
　足下輪相羅網具，　行時足跡猶采畫，　若有頂禮世尊者，　佛光照耀得生天。
　法王具足七財寶，　常以法施調伏心，　教照眾生以法行，　我今頂禮於法王。
　慈悲為鎧念為刀，　持戒為弓智慧箭，　以此能破煩惱怨，　生死有愛增長種。
　自度度他億眾生，　解脫一切諸繫縛，　能示無畏安隱路，　令其得至常樂道。
　行此乘者斷生死，　無有恩愛別離苦，　得至微妙無為處，　慈心說法為眾生。
　讚歎最勝世尊已，　一切法中自在者，　以此讚歎勝善根，　令諸眾生證菩提。」
//
　
爾時護國菩薩偈讚佛已，合十指掌而白佛言：「世尊！我心有疑，欲問如來，唯願聽許。」

爾時佛告護國菩薩比丘：「恣汝所問，我當為汝分別解說，斷汝所疑令汝歡喜。」

爾時護國既蒙聽許，即白佛言：「菩薩摩訶薩修行何等，於一切法增長功德，到究竟處而得自在，證捷疾智、得決定智，於法明了入一切智，教化眾生能決疑網，解一切智以巧方便濟度眾生，如言而行常宣真實，得念佛三昧，善能諮問一切深義，聞已能持，速疾證得一切種智？」

爾時護國菩薩欲重宣此義而說偈言：

/gatha/
「菩薩行行常決定，　真實決定從何生？　智慧大海分別處，　願勝丈夫為我說。
　佛身微妙猶真金，　人天中勝大福聚，　慈愍我等大歸依，　清淨之行為我說。
　云何而得無盡利，　覺道總持甘露生？　云何清淨智慧海，　而斷眾生諸疑惑？
　無量億劫在生死，　而無疲倦悔厭心，　觀諸眾生逼切苦，　常為眾生作利益。
　清淨剎土佛眷屬，　最勝國土及壽命，　一切眾事微妙處，　願說清淨菩提行。
　降伏眾魔破邪見，　枯竭愛海得解脫，　法行相續無絕斷，　無上最勝為我說。
　色力財寶及四辯，　哀愍軟言令眾喜，　慈悲雲雨潤一切，　願為我說佛境界。
　願出迦陵頻伽聲，　大梵雷音破邪見，　眾會渴仰為法來，　願施解脫甘露漿。
　我今欲成微妙道，　若不樂法則不請，　聞法時至恭敬待，　唯願為說大法寶。
　世尊我願成菩提，　如來深知我志樂，　非為惱亂故問佛，　善哉願說最勝行。」
//

爾時世尊告護國菩薩言：「善哉護國！汝今乃能問如是義，利益多人安樂天人，亦大饒益於未來世，攝諸菩薩。諦聽諦受，當為汝說。」

護國白言：「善哉世尊！願為我說。」

佛言：「護國！菩薩有四法，能成如上清淨之事。何等為四？一者真實心無諂曲，二者於諸眾生行於平等，三者心念行空，四者如言而行。護國當知，如此四種能得菩薩清淨之法。」

爾時世尊欲重宣此義而說偈曰。

/gatha/
「若有菩薩心無諂，　而常不退菩提道，　亦無佷戾貢高意，　彼則名為無邊智。
　見諸眾生無救護，　生老病死所逼切，　發心欲度於有海，　能為一切作法船。
　調伏平等於眾生，　觀諸眾生如一子，　皆當救度令解脫，　最勝丈夫發此心。
　行住坐臥念空門，　壽者我想皆悉無，　一切世間都如幻，　眾生愚癡所迷惑。
　大智菩薩所言說，　依之行行無違失，　調伏寂靜離諸過，　能求菩提名佛子。」
//

佛說偈已，告護國菩薩言：「善男子！菩薩摩訶薩復有四種無畏之法。何等為四？一者所謂得陀羅尼，二者值善知識，三者得深法忍，四者戒行清淨。是名菩薩四無畏法。」

爾時世尊欲重宣此義而說偈言。

/gatha/
「菩薩大名稱，　由得總持故，　受持最妙法，　如來所宣說，
　恒常無忘失，　增長於智慧，　彼等智無礙，　超過一切法。
　常遇善知識，　增於助道法，　常說於菩提，　諸佛所行處，
　惡知識如火，　畏燒故遠離，　若聞空相法，　勇猛堅其心。
　菩薩離我人，　一切諸見等，　持戒無缺漏，　其心調寂靜，
　教化諸眾生，　安住於佛戒。」
//

佛說偈已，復告護國：「諸菩薩眾行圓滿到究竟處，有四功德令心歡喜。何等為四？一者菩薩見佛而生歡喜，二者聞正法而生歡喜，三者捨一切而生歡喜，四者順法忍而生歡喜。是為四法生於歡喜。」

爾時世尊重說偈言：

/gatha/
「菩薩所生處，　常見最勝人，　威光遍一切，　照曜於世間。
　見已心恭敬，　如天奉帝釋，　為度眾生故，　求於菩提時。
　從佛聞正法，　不怖而歡喜，　一心信敬已，　隨順於佛教。
　聞於隨順法，　得忍心無疑，　諸法無眾生，　我想亦復爾。
　常觀如是已，　捨相生歡喜，　既不取我相，　見乞心踊躍。
　城邑與大地，　妻子及壽命，　一切布施時，　其心初無悔。」
//

佛說偈已，復告護國：「菩薩作如是言，有四種法應當棄捨。何等為四？一者菩薩棄捨居家，二者既出家已不貪利養，三者離諸檀越，四者不惜身命。是為四法應當棄捨。」

爾時世尊重說偈言：

/gatha/
「菩薩見家過，　捨之而出家，　遊止於山林，　無人寂靜處。
　遠離男與女，　眷屬及大眾，　單己無等侶，　譬如犀一角。
　專意求淨道，　得失心無憂，　少欲及知足，　離諂除憍慢。
　精進為眾生，　布施調伏心，　苦行修禪定，　一心求佛智。
　不惜身與命，　遠離愛眷屬，　堅心求菩提，　其志猶金剛。
　若人來割截，　無有恚恨想，　勇猛心增長，　求於一切智。」
//

佛說偈已，復告護國：「菩薩有四種無悔之法。何等為四？一者不破禁戒無悔之法，二者住阿蘭若處無悔之法，三者行四聖種無悔之法，四者多聞無悔之法。是為四種無悔之法。」

爾時世尊重說偈言：

/gatha/
「持戒淨無垢，　猶如摩尼珠，　不生貢高心，　言我能持戒。
　復以此戒善，　轉教於多人，　常懷如是望，　成就於佛戒。
　彼等住空閑，　清淨蘭若處，　亦不生我想，　及以壽者想。
　觀察男女色，　猶如於草木，　不生男女想，　及以吾我想。
　彼住四聖種，　無懈怠諂曲，　至心恒修行，　遠離於放逸。
　求多聞功德，　精勤常修習，　願成一切智，　最上功德處。
　眾生處牢獄，　無有救護者，　輪轉於生死，　求財以自給。
　我當求法船，　濟度彼生死，　煩惱海眾生，　令其至彼岸。
　眾生無歸依，　亦無救護者，　眾生在有為，　無能令其出。
　我當作導師，　救之令解脫，　是故我發心，　求於菩提道。」
//

佛說偈已，復告護國：「菩薩有四種調伏之行，應當行之。何等為四？一者願生善處常值諸佛，二者供養師長而不求報，三者常樂空閑棄捨利養，四者得無礙辯頭陀忍法。是為四種調伏之法。」

爾時世尊重說偈言：

/gatha/
「菩薩勇猛樂山林，　常不從人求利養，　恒得深智無礙辯，　善能通達諸法相。
　常當供養諸師長，　隨順師教無違背，　隨所生處值諸佛，　供養恭敬求菩提。
　常生勝處名高遠，　若生天上天中尊，　又得成就菩提道，　教諸眾生行十善。
　念佛功德常歡喜，　我亦不久成佛道，　既成正覺功德滿，　度脫眾生生死苦。」
//

佛說偈已，復告護國：「菩薩有四種法，淨菩薩行。何等為四？一者行菩提時心無瞋恨，二者棄捨眷屬宮殿財寶樂處山林亦不稱說己之功德，三者雖行布施不求果報，四者精勤樂法不見師過。是為四法淨菩提行。」

爾時世尊重說偈言：

/gatha/
「其心清淨無怨恨，　亦不求人之過罪，　自不諂曲無染著，　行於大道求菩提。
　深觀居家是苦本，　親近惡友無正念，　是故棄捨行出家，　處於山林求解脫。
　遊行空閑寂靜樂，　永斷眷屬恩愛念，　不惜於身及壽命，　獨步無畏猶師子。
　乞食支身常知足，　猶如飛禽無儲積，　不樂生天及人中，　唯求無上菩提道。
　獨行無侶唯一己，　恒不恐怖如師子，　畏諸煩惱如野獸，　若得利養心不喜。
　觀諸眾生恒放逸，　慈悲誓願為破之，　我為救護諸眾生，　常當熾然勤精進。
　凡所出言恒哀愍，　於憎愛人常含笑，　不著一切亦如風，　唯當求於丈夫行。
　常樂行於空無相，　觀有為法如幻化，　調伏諸根意廣大，　行住常樂甘露法。
　常依佛教行大道，　恒當清淨於內心，　求陀羅尼及辯才，　荷負諸苦求菩提。
　菩薩常觀如是行，　見前利益生歡喜，　若不愛樂於菩提，　是人無惡而不造。」
//

佛說偈已，復告護國：「菩薩有四種墮落之法。何等為四？一者不恭敬他，二者背恩諂曲，三者多求利養名聞，四者詐善揚德。是為四種墮落之法。」

爾時世尊重說偈言：

/gatha/
「彼於父母及師長，　常懷憍慢不恭敬，　違背恩養心諂曲，　諸根散亂多愚癡。
　常念利養不休息，　諂曲詐現精進相，　自謂持戒及苦行，　一切無有如己者。
　惡口麁言喜鬪諍，　常求人過不休息。　彼恒違離沙門行，　營理田作及販賣。
　未來世中諸比丘，　棄捨功德及戒行，　以懷嫉妬鬪諍故，　覆滅損壞我正法。
　彼去菩提甚懸遠，　亦復遠離七聖財，　違背解脫八正路，　流轉五道生死中。」
//

爾時世尊說此偈已，復告護國：「菩薩有四種障道之法。何等為四？一者懈怠，二者不信，三者我慢，四者瞋恚。是為四種障道之法。」

爾時世尊重說偈言：

/gatha/
「懈怠不信闇鈍心，　常為我慢及瞋恚，　見有忍辱諸比丘，　驅逐儐出於塔寺。
　若得利養心歡喜，　各言我是常住者，　恒作方便求人短，　何人有過我治罰。
　如是等人去法遠，　憎嫉功德墜三塗，　厭惡諸佛微妙法，　是人當入猛火中。
　彼人造惡不休息，　必當具受苦中苦，　是故汝等求菩提，　無令後悔墮惡道。
　無量億劫佛乃出，　為諸眾生作利益，　汝等既得善趣身，　應捨放逸求解脫。」
//

爾時世尊說此偈已，復告護國：「菩薩須捨四種福伽羅，不得親近。何等為四？一者不得親近惡知識，二者不得親近執見之人，三者不得親近謗法之人，四者不得親近貪利養人。是謂四種之人不得親近。」

爾時世尊重說偈言：

/gatha/
「能捨惡知識，　親近善知識，　菩提道增長，　猶月漸圓滿。
遠離執見人，　及捨我壽等，　為求佛道故，　棄之如毒器。
誹謗於佛法，　寂靜甘露味，　若欲求菩提，　應避如糞穢。
遠離貪利養，　亦捨惡行人，　是等不應近，　猶如避火坑。
若欲降眾魔，　轉無上法輪，　欲求第一利，　速遠惡知識。
捨愛及憎惡，　利譽亦嫉妬，　若求無上道，　常修於佛智。」
//

爾時世尊說此偈已，復告護國：「菩薩有四種法受未來苦。何等為四？一者輕慢有智之人，二者常懷嫉妬之心，三者於一切法無有信心，四者於淨智法常疑無忍而求利養。是謂四法受未來苦。」

爾時世尊重說偈言：

/gatha/
「侍佛之人有智者，　一切天人應供養，　而反貢高懷憍慢，　是故彼受無邊苦。
　於淨法中心無忍，　所求利養皆非法，　常懷憍慢而貢高，　見有智者不恭敬。
　於佛法中無信解，　於賢聖眾亦復然，　此人常遊三惡道，　若在人中多愚癡。
　彼捨人間壽命已，　在大地獄受劇苦，　若此劫盡生餘方，　畜生餓鬼亦復然。
　若欲求作世間燈，　能盡諸苦勝丈夫，　常當遠離三塗業，　修諸功德成菩提。」
//

爾時世尊說此偈已，復告護國：「菩薩有四繫縛。何等為四？一者輕慢於他，是菩薩繫縛。二者於世俗定其心樂著不求究竟，是菩薩繫縛。三者不守自心智慧未成而行放逸，是菩薩繫縛。四者為求利養而入他家，是菩薩繫縛。護國！當知是謂菩薩四種繫縛。」

爾時世尊重說偈言：

/gatha/
「恒常輕慢他，　樂住世間善，　貪著諸見纏，　如象沒深泥。
　樂入白衣家，　常懷於放逸，　暗鈍無智慧，　此行名繫縛。
　欲斷諸有苦，　遠離老病死，　當捨於憍慢，　常行菩薩道。
　受於無邊苦，　棄捨諸樂事，　亦離於憎愛，　成佛無染著。

「汝等常應行六度，　諸地諸智諸力等，　一切功德若成就，　常得解脫死羅網。
　我於往昔無量劫，　為諸眾生求菩提，　常行布施以調伏，　捨離恩愛住正道。
　恒不捨離阿蘭若，　苦行羸瘦求菩提，　熾然精進無懈怠，　求於最勝丈夫智。
　見諸眾生在有獄，　輪轉生死五道中，　慈念一切起大悲，　是故求於菩提道。
　捨於愛子及妻妾，　亦捨資財七寶等，　壽命國土及大地，　為求菩提佛智故。
　我昔處於勝山林，　時作仙人名忍辱，　為王歌利截鼻耳，　血變為乳無恚恨。
　往昔亦曾作睒子，　慈孝供養於二親，　時被迦夷箭所中，　爾時亦無瞋恚想。
　不惜身命投高巖，　為求諸佛善言故，　爾時亦無身命想，　為成菩提大事故。
　往昔慈愍於飢獸，　身肉充濟於八虎，　爾時空中諸天眾，　讚言善哉大丈夫。
　往昔樂行大布施，　曾作淨行婆羅門，　憐愍眾生貧苦故，　入海求於如意珠。
　還為海神所盜竊，　我時勇猛抒大海，　尋時得珠還閻浮，　用濟貧苦諸群生。
　亦曾作王名蘇摩，　乃至失命不妄語，　諸王因我皆解脫，　名聞廣流於十方。
　我昔曾見貧窮人，　時我為王以身施，　令彼巨富多財寶，　是故號我一切施。
　我昔曾為尸毘王，　有鴿恐怖來投我，　我以身肉代彼命，　令彼得離於恐怖。
　我昔作王名師子，　身遇重病醫授藥，　時有病人乞此藥，　我不愛命先施與。
　我昔修行為眾生，　曾作王子蘇達拏，　時有人來乞妻子，　我不愛惜盡施與。
　曾作菩薩名嚴熾，　為化才德國王故，　經於八萬四千年，　勤行精進始受化。
　亦作王子名淨威，　於佛塔前自然身，　恭敬供養於十方，　無上最勝兩足尊。
　曾作國王名月光，　時有梵志名可畏，　從我求索於身首，　我無愛惜以頭施。
　又作國王名福德，　於諸聚落街巷中，　積滿醫藥及飲食，　擬施一切諸眾生。
　曾作大王名日淨，　端正伎女有千人，　七寶瓔珞莊嚴體，　心不愛惜用布施。
　又作國王名寶髻，　七寶天冠莊嚴首，　最妙花香而嚴飾，　亦用布施一切人。
　又作國王名知足，　手脚柔軟如兜羅，　色妙清淨如蓮花，　亦以布施眾生等。
　又作商主名師子，　有羅剎女欲害人，　能以方便驅遣彼，　安置商人於洲渚。
　又作商主名善眼，　將眾五百採七寶，　有諸羅剎像美女，　亦令商人脫彼難。
　曾作王子名福焰，　妻妾妓女有數億，　端正殊妙猶天女，　捨之出家無愛戀。
　又作商主名金色，　時有如來號無垢，　於彼佛前然十指，　供養最勝兩足尊。
　又作國王號花眼，　一切瞻仰心無厭，　如是妙眼用布施，　憐愍一切眾生故。
　又作菩薩名多髮，　見有婦人喪其夫，　晝夜思念不能捨，　纏綿裸形心發狂。
　菩薩爾時生慈悲，　化作死女言喪妻，　漸漸教化彼狂婦，　還令醒悟得本心。
　又作菩薩名普瞻，　見有一人病羸困，　我於爾時生慈悲，　以己血肉用施彼。
　又作國王名花敷，　見有一人病困篤，　我於彼人起慈心，　破於骨髓療彼病。
　又作國王名成利，　見有一人甚貧窮，　施以一切諸財寶，　及捨愛命心無戀。
　又作國王名信幢，　兩手柔軟具輪相，　時有人來乞我手，　為求菩提用施彼。
　又作國王名普現，　有四天下多財寶，　豐樂安隱男女盛，　為求菩提用布施。
　又作王女名智意，　其身白淨甚柔軟，　慈悲歡喜割股肉，　及以血施心無悔。
　又作女人名銀色，　金色城中有婦女，　新產飢渴欲食子，　我割兩乳用施之。
　又作國王名聞德，　多饒最勝諸瓔珞，　金銀七寶諸車乘，　世間難捨皆能施。
　又作王子名知恩，　有人墮海名無恩，　無恩為寶壞我眼，　我於爾時心不恨。
　又念過去作戰夫，　在大陣中心無殺，　寧自喪身不害人，　乃至蟻子無殺想。
　又念過去曾作雉，　恭敬供養於尊者，　同類老小皆給恤，　爾時亦無傲慢心。
　又念過去作猨猴，　在山逢值於獵師，　諸獼猴眾皆歸我，　我懷慈心救彼命。
　又念過去作象王，　時被國王所執縛，　我念父母盲無目，　分捨身命飢不飡。
　又念過去受羆身，　有人失道我救養，　彼將獵師反害我，　我於爾時亦無恨。
　又念過去作象王，　時被獵者箭所著，　我求菩提功德故，　以牙奉施於彼人。
　又念過去作雉身，　在於曠野缺林裏，　彼林為火所焚燎，　時我救林天雨花。
　我昔曾作九色鹿，　飲水食草恒河邊，　其水深廣漂流急，　有人墮河我救之。
　其人貪財受王募，　多將兵眾來害我，　我求菩提行慈悲，　於彼人所亦無恨。
　又念過去曾作龜，　濟度商人令過海，　五百商人食我肉，　我時亦無瞋恨想。
　我念過去行菩提，　曾作魚身遊水裏，　憐愍一切捨身命，　百千眾生來食我。
　我見百千眾生病，　化身為藥猶如山，　欲令眾生除病苦，　變作蟲身名為月。
　又念曾作師子王，　巨身大力仍有慈，　時被毒箭所中射，　於彼人所起慈愍。
　又念過去作馬王，　身色白淨猶珂雪，　常在大海高山頂，　度諸商人羅剎難。
　又念過去求菩提，　曾作國王名居邪，　見於五欲多諸患，　不隨婬女諂誑言。
　又念過去曾作兔，　常化諸兔以善事，　時與仙人同居處，　捨身投火救仙飢。
　又念過去作鸚鵡，　常處多饒花果林，　報枯樹恩不捨離，　釋變枯樹生花果。
　又念曾作獼猴王，　見諸獼猴被龍害，　遂教獼猴竹筒飲，　獼猴悉免諸龍難。
　又復重念作鸚鵡，　取人稻穀養二親，　稻主執我生瞋恚：　『云何盜我熟苗稼？』
　我即報言：『汝種時，　云施一切眾生等。　我今取以養父母，　是故不名為偷盜。』
　稻主即時生歡喜：　『我是禽獸汝為人。　善哉鸚鵡有智慧，　能懷孝養供父母，
　我從今去以稻施，　任汝供養於二親。』
　如是過去無量事，　無有苦行而不作，　未曾有懷疲倦意，　以求無上清淨道。
　若內若外所有物，　無有一種而不起，　持戒忍辱精進禪，　無量方便及智慧。
　皮肉骨髓及以血，　以施一切諸眾生，　往昔住於山林中，　勇猛精進身枯竭，
　為求佛說大小乘，　教示眾生令入道。　常樂在於頭陀所，　曾所修行無棄捨，
　如是一切難苦行，　我於往昔無不行。　我說未來眾生等，　聞我此等生輕笑，
　不信受行一句偈，　反更毀謗如是法。　斯由貪著衣食等，　心常覺觀多睡眠，
　諂曲毀法無慚愧，　破壞正教無功德，　聞此微妙寂靜法，　各共相諍非佛語：
『我師多聞猶如海，　能講能說最第一，　彼亦不行如此法，　決定非是佛所說。
　次前亦有耆老等，　從昔已來諸名德，　亦未受行如是法，　汝等勿求虛妄事。
　於中無我無壽命，　亦不說有富伽羅，　唐自疲勞無福祐，　徒修精勤苦行等。
　既言有法名大乘，　云何復言空無我？　以無眾生無作者，　是故於中不須求。
　此等文句假設作，　亦如外道邪意說，　如來不說如是事。』呵罵毀辱諸比丘。
　此等不善無羞恥，　姧偽欺誑無不作，　來世於我教法中，　而作形相諸比丘。
　內懷嫉妬慢覆心，　手足擾動失威儀，　袈裟恒常垂兩角，　身被法服常在村，
　遊於俗間恒酒醉，　身著法衣親俗人，　棄捨正教功德聚，　樂為俗人通信使，
　畜養牛馬諸畜等，　奴婢作人不淨物，　種蒔田園恒亂心，　心樂諸惡無善行，
　亦不親近善知識，　口恒不擇於語言。
　身中惡行無不作，　貪取佛塔眾僧物，　何況己物而肯施？　
　見他持戒諸比丘，　謗毀言非真梵行；　不護禁戒無威德，　樂處俗家侵他妻。　
　白衣畜婦猶懷愧，　彼惡比丘貪轉甚，　畜養妻子求不厭，　與諸俗人無有別。　
　若有檀越請供養，　施與衣食湯藥等，　受他信施無善念，　唯增貪欲侵彼妻。　
　心常繫念女色邊，　隨順煩惱無聖行，　方便誘誑諸婦女。　教化俗人令斷欲，　
　謂貪欲者墮惡道，　地獄及以畜生等，　然於自身不依教，　云何傳欲教化他？　
　此人三業不如法，　所有眷屬亦復爾，　晝夜聚語無休息，　唯論五欲諸世事。　
　受畜門徒唯驅使，　終無教誨以善道，　多受弟子自圍遶，　顯己德大招名利，　
　外現異相詐慈悲，　攝諸徒眾不求利。　
　門徒眷屬多疾患，　乾枯病癩癬瘡等，　唯是雜類下人輩，　終不教示聖種等。　
　戒聞定慧悉棄捨，　不行比丘所作事，　非道非俗無所名，　猶如爛壞腐朽木。　
　於諸律儀生輕賤，　布薩毘尼亦復然，　自在遊行背師教，　搪揬如象醉無鉤。　
　或時詐現在山林，　心常念於聚落事，　三毒煩惱恒熾然，　暫時不能寂靜住。　
　忘失諸佛教誡事，　及以頭陀功德等，　我慢貢高滿身中，　墮於可畏阿鼻獄。　
　晝夜恒論國土事，　亦復論說於賊盜，　身心專營親緣事，　捨離禪定及智慧。　
　設有所作樂麁事，　心存自安故營造，　假使營理僧伽藍，　貪著房舍眉恒蹴。　
　自身口意不調柔，　徒眾相學亦復爾，　彼惡比丘設造寺，　專為己身及眷屬。　
　若有比丘順從彼，　即便安置攝受住；
　　若有持戒諸大德，　方便善能說法利，　自能調伏亦調他，　如是比丘終不受。　
　此房現今我受用，　餘房是我弟子住，　自外己屬諸同學，　汝去此中無處停。　
　現今所有床鋪者，　各以付他有所屬，　更無剩長可相容，　亦無衣食汝須去。　
　暫時所須尚不與，　況借房舍及諸物？　如是不行僧次法，　彼惡比丘如俗人，　
　多畜錢財眷屬等。　我諸弟子如法者，　處處驅遣不聽住，　彼時憶念我所說，　
　各懷悲傷入山林，　嗚呼我師微妙法，　不久悉滅不復現。
　現有比丘求多利，　身無法行疾有德，　設有具戒功德者，　為彼惡賤無利養，
　皆自傷歎去城邑，　常住空靜山林中。　癡慢貢高諸惡行，　常行鬪諍兩舌者，
　欺誑世人得利養，　自謂與聖等無異。　我此法教功德藏，　具足一切妙功德，
　來世破壞不復現，　以無持戒我慢故。
　又如寶藏為他壞，　又如花池枯乾竭，　猶如寶輿自摧折，　我法未來亦復然。
　彼惡比丘難調伏，　滅我法行無有餘，　未來如是惡世中，　破壞我法甚可畏。
　如是樂喜諸惡者，　遠離天人及善行，　從於此身捨命已，　墮於地獄畜生中。
　於彼無量億千歲，　具受一切諸苦惱，　於後假使得人身，　多苦穢惡恒不淨。
　若盲若聾若眼瞎，　恒常身體懷疾病，　顏色醜惡見不喜，　常懷畏懼承事他。
　難得心意無親愛，　所說語言無信受，　若有如是惡行者，　在所呵責驅出眾。
　彼人多饒諸病苦，　常被杖石打驅逐，　常為飢渴惱其身，　他人見者常輕賤。
　若聞如是眾多苦，　應捨諸惡心調伏，　於諸眾生行善行，　勿令於後生悔心。
　若有愛敬佛世尊，　聖眾持戒頭陀法，　汝應勤求如是行，　應捨眷屬及名利。
　此皆顛倒如幻化，　應觀有為如泡夢，　恩愛合會必別離，　一切有為不久住。
　莫捨正勤諸力等，　勤求諸地波羅蜜，　乃至未覺妙菩提，　常應修集一切行。」
//

爾時佛復告護國菩薩言：「善男子！於未來世行大乘菩薩富伽羅等有如是等過患，應自遠離，自不勤求，而與此人共相習近，不勤正行，自行諂曲、親近行諂曲者，自無智慧、隨順無智慧者，貪求世利恒無厭足，慳惜他家嫉妬勝己，諂曲詐偽無羞無慚，詐現聖相自尊自重，徒眾眷屬各相譽讚以求名利，求利養故常入聚落。既不憐愍一切眾生，亦不為教化諸眾生故，常自說言我有平等。恒作是念：『云何他知我是眾生真善知識、知我多聞。』實於佛法無恭敬心無求法心，猶如破器無所復用，如懈怠人無有成辦。相求過失行於方便，無智懈怠唯惡覺觀。各各論說破法等事，固執惡心至死不悔。多集慳貪，所畜眷屬亦學是師，以自圍遶在我法中。如是行者凡所作事，不問明哲不求佛法，以無精進行故生貧窮家。從貧窮家而得出家，於我教中得少利養，心生歡喜而無慚愧。彼等尚無懺悔之心，何能自覺勝智？彼等棄捨諸佛功德而取現在名利，以得現在利故，自言我是沙門也。護國！我於如是富伽羅、如是人等，我不說其有隨順俗忍，何況能有諸佛大智？彼等遠於人天道，況成佛道？護國！如是等人，我說有八種法障礙於菩提。何等為八？一者當生三惡道，二者當生邊地下賤，三者當生貧窮，四者顏色不正，五者愚癡無智，六者常與惡知識相會，七者多諸病患，八者得大惡病以取命終。護國！此等八法是障礙菩提。所以者何？護國！我亦不說但以有言說而得菩提，我亦不說詐現聖者有清淨行也，我亦不說有諂曲者有菩提行也，我亦不說多貪利養者有供養佛行也，我亦不說有我慢者有清淨般若行也，我亦不說無智慧者能決他疑行也，我亦不說有妬嫉者有淨心行也，我亦不說不精進者能得諸陀羅尼行也，我亦不說不樂功德者而得善道行也，我亦不說慳惜他家者有身心清淨行也，我亦不說詐現威儀者能值遇佛會也，我亦不說樂在俗家者有清淨口業行也，我亦不說不恭敬者有心清淨行也，我亦不說有不知足者有樂法行也，我亦不說惜身命者有求法行也。護國！我雖呵罵毀呰六師，然彼諸外道在我法外入我法中作諸惡業，我若毀辱，過患倍彼六師。何以故？彼等但為自口言我是比丘，而以無行欺誑一切天人世間故。」

爾時世尊欲重宣此義而說偈言：

/gatha/
「威儀濁亂無恭敬，　唯增我慢貪名譽，　煩惱覆蔽心迷醉，　此等遠離妙菩提。
　耽著名利及懈怠，　懈怠增長失正念，　若無正念失持戒，　若無持戒失善道。
　彼人生在貧窮家，　得出家已著利養，　如人棄捨於真金，　擔負草穢以為寶。
　為求名利住山林，　至彼更求諸等侶，　棄捨神通辯才智，　求現名利及眷屬。
　若彼命終墮惡道，　或生貧窮下賤中，　懈怠惡色無威德，　斯等皆由我慢受。
　彼既遠離諸善行，　亦由放逸失正念，　在於長遠大惡道，　億千劫中未能脫。
　若求名利得菩提，　提婆達多應是佛，　毘嵐猛風吹壞物，　懈怠無戒亦復然。
　自無善行貪女色，　戒行不淨失功德，　於我法中無所用，　無智猶如朽爛木。
　若為菩提求佛法，　何得不依解脫行？　猶如黐膠縛獼猴，　我慢求道亦復然。
　我昔為求一句法，　棄捨身命為菩提，　彼人懈怠捨我教，　如是無利於我法。
　我昔為求善教故，　投身高崖及火聚，　我得聞已如法行，　棄捨一切愛憎等。
　彼人聞我功德法，　曾不愛樂於一句，　無法云何得菩提，　猶如盲前說道路。」
//

爾時佛復告護國言：「護國！我念往昔過無量阿僧祇劫復過阿僧祇，不可稱量、不可思惟、無有譬喻、不可計算、不可得說。是時有佛出世，名曰成利慧多陀阿伽度、阿羅訶、三藐三佛陀、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、世尊。爾時有王名曰焰意。護國！彼焰意王治化之時，此閻浮提縱廣一萬六千由旬。護國！彼時此閻浮提內有二萬諸城，彼一一城有千俱致家。護國！時彼焰意王自所住城名曰寶光明，東西十二由旬，南北七由旬，七寶所成。寶牆七重以為圍遶，一一牆間相去八步，牢固難壞。護國！彼國眾生壽命十俱致那由他歲。護國！爾時彼焰意王初生一子名曰福焰，端正殊特身色具足，世間無雙瞻者無厭。護國！時彼王子初生之日，於其生處有七寶藏自然出現，其王宮內亦有七寶藏自然出現上高七人。護國！彼王子生時，閻浮提內一切眾生皆大歡喜踊躍無量，若有眾生被繫閉牢獄枷鎖著身者自然解脫。護國！彼福焰王子世間所有工巧術藝，於七日內皆悉學成。護國！彼福焰王子於日初分，時有淨居諸天來告彼王子言：『童子！汝莫放逸，應善觀無常。童子！命不久停，至於後世如是速疾，恒須觀察生大怖畏，造業必受如影隨形。』時淨居諸天復為童子說此偈言：

/gatha/
「『童子謹慎莫放逸，　亦莫隨順放逸者，　棄捨放逸佛所讚，　若受放逸諸佛訶。
　　常自調順不放逸，　一切能施無妬嫉，　慈悲念於諸眾生，　彼人不久當作佛。

「『過去無量佛，　現在及未來，　一切從善起，　住不放逸道。
　　飲食及衣服，　金銀瓔珞等，　俱致劫布施，　為求無上道。
　　手足耳鼻等，　求者歡喜施，　真心求功德，　不久得成佛。
　　王位威勢力，　妻子及眷屬，　有為如幻化，　速捨莫戀著。
　　壽命不久停，　如坏器易壞，　假借世不久，　此亦無常定。
　　父母及眷屬，　惡道無能救，　眾生造善惡，　如影恒逐形。
　　多求於欲海，　相害不為利，　而無濟拔者，　虛受疲勞苦。
　　今欲作他利，　求寂無上道，　乾枯皮肉髓，　汝莫以為苦。
　　諸佛出世難，　寂滅法難聞，　勤事善知識，　能破諸魔眾。
　　捨離惡知識，　能住於正道，　遮蔽惡邪徑，　善哉精進住。
　　汝莫惜身命，　持心如金剛，　正問諸師道，　莫捨正信意。
　　一切過去佛，　常樂阿蘭若，　汝應順彼學，　應樂在空閑。
　　棄捨於恩愛，　妻子眷屬等，　己身及壽命，　以求廣大智。』」
//

爾時世尊復告護國菩薩言：「善男子！其福焰王子從彼諸天聞此偈已，於十年內未曾睡眠、未曾戲笑、未曾歌舞、未曾喜樂、未曾踊躍、未曾放逸，不入園苑、不樂眷屬、不貪王位，於資財城郭不生樂心，如是一切內外諸物皆悉棄捨，唯入禪定住於靜室而自思惟：『一切法無常、無強無力、無有堅牢，暫現而滅。王位無味、無有自在，恩愛別離，怨憎相會，無可貪著，妄生愛樂皆由愚癡，虛妄誑惑無一實也，唯有解脫寂滅為樂。而諸凡夫愚癡所醉常樂處之，橫生優劣之相。我今在此凡愚眾中，應住默然思不放逸。』護國！爾時彼焰意大王為此童子更別立城名勝喜樂，有七重寶牆以為圍遶。其城南北有七百街巷，其街牆壁七寶所成，金鈴羅網以覆其上，更以真珠眾寶羅網重覆其上。一一巷首皆有八萬四千寶柱，於諸寶柱上繫六萬寶繩共相鉤連，諸寶繩間懸十四俱致寶多羅樹，微風吹動出妙音聲，猶如百千音樂不鼓自鳴。一一諸街巷首安置五百童女、盛壯少年善解歌舞，為一切眾生愛樂之故。其焰意王復更告令一切，汝等諸人從今已去，晝夜莫作餘事，唯作歌舞嬉戲，令諸眾生歡喜受樂。四方來者悉令歡喜，乃至不聽出一麁言，欲令王子心生愛樂。復於巷首安置種種布施之具，所謂衣服、飲食、瓔珞、床敷氈褥、車乘輦輿、象馬牛羊、五行之具，金銀琉璃、車𤦲馬瑙、珊瑚虎魄、真珠等寶，塗香末香、燒香薰香、種種花鬘等。若須衣者與衣，須食與食，須飲與飲，須乘與乘，隨其所須而施與之。更於處處安諸珍寶等聚，擬諸眾人之所受用。又於城中造作宮殿，擬為王子遊戲之處。其地皆以眾寶間錯，於其城上起大高樓眾寶莊嚴。於城中央造一大殿，殿內安置千萬床敷。於殿四邊造諸園苑，其園苑內有諸樹木，一切花果諸喜樂樹具足充滿。

「護國！彼園苑中造七寶池，其池四面有四寶階道。何等為四？所謂金、銀、瑠璃、頗梨。於一方面有二師子，百寶所成。彼二師子各吐香水入彼池內。其池四邊復各有二寶師子，各各引水而出其池，常有優鉢羅花、波頭摩花、俱物頭花、奔陀利花。其池四岸寶樹圍遶，復有樹木諸花果等周匝遍滿。復有八百寶樹，是諸寶樹以諸寶繩共相連繫，一一寶樹各懸繒幡。其池四面復有億數寶多羅樹，於其樹間繫以寶繩懸諸金鈴，微風吹動出微妙音，如百千樂不鼓自鳴。恐諸埃塵，以大寶網彌覆地上。於彼殿內安置千萬七寶床敷，諸寶床上各敷五百種褥。於殿中間敷一高座，其座七寶所成高於七人，復於座上敷八萬俱致微妙衣服。其高座前置寶香鑪燒沈水香，夜三晝三散諸名花。以金羅網彌覆殿上，其羅網邊懸金蓮花，復以真珠羅網覆金網上，復有八萬明淨珍寶以為光明。於其園內又置九百萬寶聚，一一寶聚高一由旬，出大光明照彼世界。

「護國！於彼園內復有諸鳥，所謂鸚鵡、鸜鵒鴻鶴、俱繫羅鳥、孔雀鵝鴈，及以鴛鴦、俱那羅鳥、迦陵頻伽鳥、命命鳥。彼等諸鳥若欲鳴時，皆作人聲微妙和雅，猶如諸天歡喜園內諸鳥之音，凡所出聲皆欲令王子生歡喜故。又復別為王子建立厨饍，日別辦具五百種味以供王子。爾時大王。又勅國內諸城邑一切童子普告令集，童子之數凡有八十俱致。其諸童子，或年始二十或有過者，悉能善解一切工巧伎藝嚴飾鮮潔，皆令入於勝喜樂城。而彼童子等各有父母，復將千萬俱致婇女擬諸童子驅馳使役，童子眷屬亦皆奉獻千萬童女以為給使，乃至國內大富長者及以人民亦各送千萬俱致婇女。是諸婇女年始十六，不長不短、不白不黑、不麁不細，皆悉端正世間無比，善解音樂及以歌舞，善於戲笑言語調柔顏色和悅，若老若少皆能慰喻，一切伎能悉善通達身相具足，其口香氣如優鉢羅花，身諸毛孔出栴檀香，微妙清潔猶如天女。福焰王子處此宮內，婇女眾等常作音樂種種供養。爾時王子聞此音樂已作如是念。今者此等為我作大怨讐奪我善法。我應棄捨。

「王子爾時見諸樂事不喜不樂，譬如丈夫臨被刑戮，雖見色欲不生歡喜。如是如是，福焰王子在彼女眾之時心無歡喜，在彼城內與諸眷屬同會聚集亦不歡喜。從是已來經於十年，不取色相、不取聲香味觸等相，唯作是念：『我今何時脫此怨讐？我於何時行不放逸當得解脫？』爾時諸女白焰意王言：『大天當知，今此王子共我等聚，不相喜樂亦不受樂。』」

佛言：「護國！爾時焰意王與八萬小王前後圍遶，詣向福焰王子所。到已流淚滿面遍身，戰掉不能自勝，憂愁苦惱迷悶躄地。須臾復起，起向福焰王子而說偈言：

/gatha/
「『汝有最妙大果報，　有誰為汝作不善，　而不受於最勝樂，　汝不受樂我憂苦，
　　願汝受樂施我喜，　若有觸擾向我說，　我能與彼極重罪。　
　　汝觀此城妙蓮花，　是我思惟為汝作，　世間所少速當說，　我能示現如帝釋。　
　　汝今面目如青蓮，　云何顰眉不暢適？　
　　今此婇女甚殊特，　微妙清淨等諸天，　各各善解諸伎術，　歌舞音樂悉能通。　
　　汝應與此相娛樂，　云何憂愁如毒箭？　
　　汝今應當快受樂，　非是憂愁苦惱時。　園林池苑甚茂盛，　花果枝葉欝扶疎，　寬博如天妙果林。
　　汝今正是上年時，　顏色憔悴如枯花，　但應受樂莫憂苦。　
　　流泉浴池猶如天，　微妙香水洗浴身，　諸花開敷群蜂遶，　汝今云何不愛樂？　
　　鵝鴈鸚鵡及鴻鶴，　命命俱那微妙聲，　香山雪山無有異，　誰有見聞不愛樂？　
　　眾寶勝殿真珠網，　琉璃嚴淨如天宮，　寶座莊嚴妙衣覆，　金鈴羅網出妙音，　種種音聲甚殊特。
　　街衢道路及巷首，　千數婇女作音樂，　猶如喜園天玉女，　何故迷亂不受樂？
　　童子婇女如天身，　為汝受樂故聚集，　父母為汝泣墮淚，　我如喪失所愛子，　愁憂悵怏何可住。』
//

「爾時福焰王子以偈報父王言：

/gatha/
「『如彼具足功德者，　觀諸有為生死苦，　厭離煩惱欲求脫，　棄捨一切世間欲。
　　見諸眾生沒死網，　常求解脫遠欲樂，　思惟菩提最為勝，　唯願父王聽我說。
　　無人為我作惡事，　我自不樂諸欲樂，　一切恩愛如怨讐，　增長煩惱向惡趣。
　　此諸婇女愚人樂，　增長魔業繫縛纏，　遠離功德增不善，　又令未來墮惡趣。
　　諸聖呵責此五欲，　我今云何樂苦本？
　　如此婇女假外色，　唯有皮囊盛筋骨，　肉血𡱁尿內不淨，　此真死屍云何樂？
　　歌舞音樂伎術等，　如幻如夢誑愚癡，　愚癡分別失正道，　我豈隨順作愛業？
　　園林花果至冬時，　枯顇萎黃皆墮落，　無常散壞不久留，　壽命無定癡放逸。
　　心如大海不知足，　恩愛增長求無厭，　常為諸欲相殘害，　我如須彌風不動。
　　父母兄弟姊妹等，　妻子朋友諸眷屬，　王位百官及勢力，　若墮惡道無能救。
　　我等今者如草露，　亦如電光不暫停，　心意散亂無定所，　思惟見是不放逸。
　　咄哉少年不久住，　咄哉壽命如濬流，　咄哉有為如浮雲，　咄哉三界求王位。
　　智者來教莫放逸，　無有菩薩貪世間，　若欲作佛救拔他，　父王放逸不作佛。
　　若隨諸欲為愛奴，　彼失功德無善路，　若於今身貪殺生，　如鳥在網欲求活。
　　境界猶如惡毒蛇，　諸陰猶如怨害賊，　其心著有無利益，　猶如空村無依怙。
　　父王園林如毒樹，　無常瀑水悉漂沒，　我今云何而可樂？　我見世間無正行，
　　猶如劫盡盛火燃，　眾生於中受大苦，　我為是等解脫故，　當速成辦如法船。
　　眾生久睡無自覺，　病來長久我欲治，　為拔毒箭令安樂，　除彼邪徑住正道。
　　繫縛三界無能出，　我為說法令脫免，　眾生貧窮無法財，　我施善教令其富。
　　惡趣道中迷沒者，　我當教示以善導，　我欲摧拔諸愛樹，　行諸慈悲燃智燈，
　　令見三界大火聚，　又興慈悲起大雲。
　　如波羅蜜普遍覆，　利益眾生如電光，　道品總持以為雨，　清涼能滅熱惱焰。
　　我為是故生王家，　在於有為不樂欲，　我為利益眾生故，　隨世受生求菩提。
　　一向不樂諸有樂，　父王我在怨讐中，　智者云何樂此路？　有眼不墮於高岸。
　　若求菩提捨放逸，　一切世間順諸趣，　唯我當欲逆彼行。　大王我言終不虛，
　　唯願父王還本宮。　願捨世間王位等，　隨彼須者所受用，　若受放逸貪王位，
　　億數王位我不欲，　若處宮內無得道，　唯當寂靜無畏處，　若樂五欲無能辦。
　　我向山林處寂靜，　至於彼所求菩提，　三世如來在蘭若，　正覺菩提不在欲。』」
//

爾時世尊說此偈已，告護國菩薩言：「善男子！爾時彼福焰王子為父王說偈已，在於宮殿與諸婇女相隨經行而心不安，唯住三種威儀而住。何謂為三？所謂若行若住若坐，而不眠臥。處在高樓第八重上，夜半時間於上空中見淨居諸天在空而行，讚佛功德乃至法僧功德。護國！時彼福焰王子聞彼諸天讚歎佛已，身毛皆竪遍體戰慄，合十指掌，以偈告彼諸天言：

/gatha/
「『善哉諸天輩，　憐愍我等苦，　莫生疲倦心，　我欲有所問。
　　汝行於虛空，　讚歎誰功德？　我聞此讚聲，　心生大歡喜。』」
//

佛告護國：「爾時彼天以偈報福焰王子言：

/gatha/
「『童子汝不聞，　如來出興世，　佛名吉利意，　無歸為作歸。
　　能知人心行，　福智具足滿，　聖眾具禪定，　百千那由他。』
//

「爾時福焰王子復以偈告彼諸天言：

/gatha/
「『我未覩彼色，　汝為我說相，　我若得見聞，　問彼菩提道。
　　云何化眾生？　云何當來世，　於眾生中尊？　為我解說之。』
//

「爾時淨居諸天以偈報福焰王子言：

/gatha/
「『世尊髮潤澤，　右旋而青色，　頂高如雪山，　白毫等淨日，　清淨如琉璃，　妙色而右旋。
　　耳目甚脩廣，　色如青蓮花。　方頰如師子，　脣如頻婆果。
　　口齒甚齊密，　清淨如珂雪，　具足滿四十。　四牙甚鋒利，　舌長能覆面。
　　威德大自在，　為諸眾生等，　放億數光明，　遍滿三千界，　乾竭諸惡道。
　　無上最勝尊，　妙聲覆真實，　能令聞者喜，　滿諸眾生願。
　　勝彼如意珠，　不缺減功德，　隨順於道分，　莊嚴於法鬘。
　　音聲百千種，　演暢無虛說，　勝於一切天，　過諸梵天音。
　　他聞發歡喜，　勝諸緊那羅，　迦陵俱翅羅，　鴛鴦及鴻鶴，
　　俱那羅梵聲，　和合種種聲，　音詞不雜亂，　能令義顯現。
　　妙淨如琉璃，　能令智者樂，　教令發道心，　心淨生踊躍，
　　隨順他心智，　能決疑者問。
　　彼尊法王者，　自在大世尊，　有是勝法音，　項直肩圓滿。
　　肘臂𦟛過膝，　指掌縵網長，　七處皆平滿，　慈悲舉勝手，　安慰諸眾生，　身色如真金。
　　一一毛右旋，　臍輪深且密，　陰藏如馬王，　髀如象王鼻。
　　鹿王纖長𨄔，　足下蓮花文，　千輻網具足。　迴顧如象王，　遊步如師子，　舉身皆相稱。
　　猶如釋天杖，　空中雨天花，　於上變成蓋，　去住恒隨逐。
　　法王希有事，　若得利無利，　若得樂及苦，　若得名不名。
　　若讚若毀呰，　一切無染著，　猶如花在水，　亦如師子王，　眾生中無比。』」

爾時世尊告護國菩薩言：「護國！爾時福焰王子從彼諸天聞說歎佛功德乃至法僧功德已，歡喜踊躍不能自勝。護國！爾時福焰王子復作是念：『如是諸佛世尊有如是大眾，成就如是覺證最勝妙法，如是聖眾弟子成就我不得見。我今值遇生死諸惡苦惱，如是生死無有義利。諸凡夫輩執著我見，在家多諸過患，貪欲無厭智者呵毀，放逸無明黑暗之所覆蔽。如是諸行難可穿徹，如是識心甚難降伏，如是名色甚深難覺，如是六入而不自在，如是惡觸果報受持，如是愚癡多諸過患，如是渴愛堅縛不捨，如是諸取甚難捨離，如是諸有無有聖道，如是生者甚難解脫，如是老者能壞少年，如是病者損減壯色，如是死者無有潤澤，如是生者多諸衰惱，如是往來無有利益。如是微妙如來正教甚可愛樂。何可以愛好故，為諸煩惱迷惑其心，為諸惡覺濁亂不淨。心常放逸，常與愚癡等輩而為朋友；不善思惟，心常染著煩惱生死；樂惡知識，常與如是諸惡俱者。尚不能辦世間淨善，何況能得阿耨多羅三藐三菩提也。如我今者即於此樓東面投身而去，若從門出恐諸眷屬為作障礙。』」

佛告護國：「爾時福焰王子欲向吉利意如來邊，即向彼如來方面絕身。復作是言：『若彼如來是一切知見者，亦應念我。』護國！爾時吉利意如來、阿羅呵、三藐三佛陀，即伸右手放大光明照福焰王子。即於光中出一蓮花，大如車輪有百千葉。然彼蓮花放百千光明，其光明盛照福焰王子身。爾時福焰王子即自見身處彼蓮花。既住花中，合十指掌曲躬向吉利意如來、多陀阿伽度、阿羅呵、三藐三佛陀，口三唱言南無佛陀耶、南無佛陀耶。護國！爾時吉利意如來還攝光明，福焰王子即乘佛光至如來前，舉身投地如大樹倒，禮彼如來一千拜已。護國！爾時福焰王子以偈白世尊言：

/gatha/
「『我久得重病，　今值大醫王，　於苦厄難中，　世尊濟拔我。
　　願尊為我說，　云何住法中，　當得大福利？　唯願尊顯說。
　　世尊我於先，　夜半諸天來，　教我莫放逸。　
　　聞此天教已，　恐怖來此處，　今問大世尊，　云何不放逸？　
　　我今失正道，　願為作商主；　我今如生盲，　願為我作眼；　我今臨險岸，　願尊救濟度。　
　　唯願大慈悲，　令我生正信，　如病困篤者，　願尊速療治。　
　　我今如貧人，　願尊見攝受；　我今被繫縛，　願尊能為解；　我心大疑惑，　願決我癡網。
　　示我修行處，　云何得菩提？
　　我今沒大水，　願示度濟我；　我處大闇中，　願燃大法炬；　我身有大瘡，　願治速令差；　
　　我身有毒箭，　願尊能為拔；　常墮諸惡道，　願慈救濟我。　
　　諸有執著者，　迴邪住正道，　我沒憂慼河，　願度至彼岸，　得住八聖道。
　　我壽命短促，　求善多障礙，　願從今去後，　得住真如命。
　　我今身閑靜，　已離於諸難，　作福必獲報，　願為我決疑。
　　世尊為我說，　菩薩不放逸，　而向無上道，　未來證菩提，　能解諸有縛。』」
//

爾時佛告護國菩薩言：「護國！爾時吉利意如來知福焰王子心已，為其廣說諸菩薩行。其福焰王子聞此法已，即得陀羅尼名曰解脫，亦得五神通。即時上昇虛空，化作眾花以散佛上，如是重散。護國！爾時福焰王子從空下已，即以偈讚彼吉利意如來言：

/gatha/
「『敬禮金色尊，　面淨如滿月，　敬禮智無比，　離垢三界尊。
　　髮淨光潤澤，　頂高如須彌，　觀者無厭足，　眉間白毫相。
　　清淨妙光明，　目如青蓮花，　微妙甚殊特，　慈悲心哀愍，
　　觀示諸世間。　如來廣長舌，　軟薄如赤銅，　出能遍覆面，
　　說法教道眾，　敬禮微妙聲。
　　齒白如珂雪，　堅實如金剛，　齊密具四十。　
　　熈怡微笑時，　教化無量眾，　敬禮美實言，　尊色世無比。　
　　放光照諸剎，　梵天及護世，　彼光悉不現。　鹿王纖𦟛膊，　
　　行步如象王，　亦復如師子，　安祥遊步時，　地動諸山震。　
　　世尊具身相，　皮膚軟妙澤，　身如紫金色，　威光無與比，　觀者無厭足。
　　苦行無數劫，　樂施無疲倦，　慈心向眾生，　故禮大悲父。
　　尊常樂施戒，　堅住忍精進，　禪定及般若，　總持智無比，　是故我敬禮。　
　　世尊說法時，　降伏諸外道，　處眾如師子，　醫王除三垢，　聞者皆歡喜，　是故我今禮。　
　　身口意清淨，　三界無染著，　如蓮花處水。
　　尊聲如梵天，　如迦陵伽音，　度過三界岸，　是故我敬禮。
　　尊觀諸世間，　如幻亦如夢，　復如伎兒戲，　說諸法無我。
　　眾生及命者，　亦如水中月，　空寂無生處。　
　　如是知世已，　為彼作方便，　百千諸法門，　慈悲攝教眾。　
　　眾生多諸患，　諸毒常熾然，　觀察熱惱已，　猶如大醫王，　
　　常行於世間，　拔濟無數眾，　生老病死苦，　愛離怨憎會，　憂悲苦惱等。
　　觀世苦惱已，　慈悲能度脫，　常行於世間。　
　　世界如車輪，　天人或畜生，　地獄餓鬼中，　迷惑無導師。　世尊為彼等，　示現最勝導。　
　　過去有諸佛，　法王離世間，　亦說此聖道，　如今世尊說。　
　　清淨無穢濁，　勝於大梵天，　亦勝揵闥婆，　及與諸天女。　
　　如是等諸音，　如來聲最勝，　為世間解說，　真實潤益忍。　
　　種種方便說，　具足諸功德，　百千那由數，　諸眾生聞已，　證三乘寂滅。
　　若有供養彼，　得勝上妙樂，　無量天人等，　當得正真道。
　　或得於人王，　大富長者等，　或領一天下，　二三四天下，
　　轉輪聖帝王，　十善化眾生，　七寶具足樂，　皆由供養佛。
　　或作釋梵王，　四天大王處，　兜率化樂天，　他化須夜摩，　斯由供養佛，　來世作正覺。
　　如是供養佛，　或見或聞聲，　無有空過者，　除多眾生苦，　得證甘露處，　最妙無老病。
　　世尊知正道，　善說正道處，　能斷諸惡道，　令住無畏路。
　　無垢大聖道，　能為眾生依，　若人求福德，　須於佛邊種。
　　以是因緣故，　當得無盡藏，　多數俱致劫，　彼福不可盡，
　　乃至未成佛，　當得清淨剎，　微妙如他化，　得已大歡喜。
　　彼妙剎土中，　所有眾生輩，　身口意清淨。　如是等功德，　斯由供養佛。　
　　若彼眾生輩，　求天及涅槃，　及以人中樂，　福報等無量，　斯皆不可盡。
　　大名勝供養，　復於百剎中，　無量百千眾，　當說大名稱。
　　斯由歎佛德，　如來除熱惱，　能令眾解脫，　慈悲見歡喜。
　　諸根寂清淨，　人中最勝王，　無量功德聚，　是故我頂禮。
　　我已得五通，　虛空能飛上，　聽尊妙音聲。　未來若作佛，　為眾宣微妙，　度脫無量眾。
　　我讚功德聚，　無垢清淨福，　天人諸龍等，　夜叉乾闥婆，　雜類眾生輩，　來世願成佛。』」
//

爾時世尊說此偈已，復告護國菩薩言：「護國！爾時焰意大王過彼夜已，聞彼童子宮內哭聲，聞已馳向勝喜樂城。到已問諸綵女輩言：『汝等今者為何哭耶？』時彼諸女白大王言：『大王當知，福焰王子於今夜中忽然不見。』護國！爾時焰意王聞此語已，迷悶躄地如大樹倒，須臾乃起。大聲悲泣啼哭懊惱，巡遶彼城經百千匝。護國！爾時彼處護城天神告焰意王言：『大王當知，東方去此有佛世尊名曰成利慧。大王！王子今在彼處，頂禮承事供養彼佛世尊。』爾時焰意王聞天告已，即時與童子宮內諸綵女等，及王部從八萬四千俱致百千那由他眾，向於東方往詣成利慧如來、阿羅呵、三藐三佛陀所。到已頂禮佛足，却住一面，以偈歎佛：

/gatha/
「『敬禮功德智慧海，　人中丈夫無等等，　三界最勝無有比，　天王修羅皆供養。
　　眾中殊特最極尊，　觀佛色相無厭足，　三十二相莊嚴身，　猶如須彌寶清淨。
　　佛身微妙紫金色，　見者無厭我頂禮，　無量百千億數劫，　如來苦行無厭倦。
　　無量劫數供養佛，　百千俱致不可數，　往昔布施難思議，　是故身光甚嚴淨。
　　布施持戒禪定慧，　忍辱精進善方便，　世尊身色甚清淨，　勝於日月摩尼光，　釋梵光明隱不現。
　　佛現妙色為世間，　或現在於兜率天，　或復示現欲下生，　或現清淨白象身，
　　夢中右脇入母胎，　佛身現處如虛空，　如影水月夢幻化，　佛身應現亦如是。
　　又復示現初生時，　或行七步示丈夫，　唱言天人我最上，　我能救脫諸苦眾。　
　　於諸法中無疑惑，　為眾示現始學書，　成就禪定寂靜處。
　　示現在於婇女中，　捨於父母及妻子，　眷屬宗親戀慕啼，　捨家處林恒獨步，　俱致數天恒圍遶，
　　恒常讚歎不生厭，　久已降伏四種魔，　此剎示現始降伏，　久已轉於無始輪，　今以慈悲示初轉。
　　觀於世間著常想，　在眾唱言我涅槃，　見諸世間樂生死，　世尊為說寂滅處，
　　福智方便無比喻，　身放光明照多剎。
　　諸方菩薩尋光來，　頂禮世尊不思議，　法王為說微妙法，　心生歡喜證清淨。
　　為眾現身同世間，　佛身無來亦無去，　如來住法如幻化，　是故頂禮大丈夫。
　　善哉世尊說妙道，　為眾顯於菩提路，　為我顯示勝法門，　是故我今證此法。
　　如來為我所示現，　我證皆為眾生說，　佛智無惱三界尊，　我今歎佛證功德。
　　願共世間諸眾生，　速證寂滅無上道。』」
//

爾時世尊說此偈已，復告護國菩薩言：「護國！爾時彼成利慧如來知焰意王深信心已，如應說法，令住不退轉地於阿耨多羅三藐三菩提中。護國！爾時彼福焰王子白成利慧如來言：『世尊！我今欲請如來及比丘僧入我城內，唯願世尊慈愍聽許。』爾時成利慧如來憐愍王子故默然受請。護國！爾時福焰王子知佛許已，白其父母、告諸眷屬并婇女等言：『尊等當知，我今以勝喜樂城并莊嚴具悉以奉施彼如來及比丘僧，終無悔也。唯願父母及諸眷屬生隨喜心。』爾時父母眷屬一時同聲唱言：『善哉善哉。我皆隨喜。』護國！爾時福焰王子即時更好莊嚴勝喜樂城，奉施如來。爾時王子為佛及僧日別辦具五百種味上妙飲食供佛及僧。復為比丘造僧伽藍，皆以七寶莊嚴其房，舍內敷置雜色種種繒褥數百千重。又為比丘僧日別造新淨衣，布施眾僧隨意所樂。復更為造經行之處，皆以眾寶莊嚴其地，上覆寶網經行兩邊，種諸樹木花果種種諸花，謂憂鉢花、波頭摩花、分陀利等，一切眾花無不具足。時彼王子如是供養佛及眾僧經三億俱致歲，於其中間未曾睡眠不愛身命，唯念供養佛及眾僧。其間無貪欲心、無瞋害心，於王位處不生樂心，於一切處棄捨身命，況復餘物。復於如來有所說法，皆悉受持終無忘失，乃至一句未曾重問如來。於其時間亦不洗浴，亦不以蘇油塗摩其身，亦不洗足亦不坐臥，唯除食時及大小便利，乃至終無疲倦之想。而彼如來涅槃時，自取赤真檀為積聚闍毘如來身。於闍毘如來身處，以種種上妙供具供養舍利。又於閻浮提內處處，以諸華鬘名香種種音樂，乃至旛蓋寶幢供養舍利。如是供養已，為其舍利復更別造九十九俱致寶塔。彼諸塔等七寶所成，復以雜寶真珠羅網以覆塔上。又為諸塔造七寶蓋，彼一一塔奉施五百寶蓋，又於一一塔所奉施音樂數百千種。於閻浮提內處處悉令種諸妙花樹，於一一塔所前然百千燈，一一燈器盛千斛油。又復更以一切諸香，塗香末香燒香及諸花鬘等，供養彼塔。爾時福焰王子如是供養經俱致歲已，於後出家。既出家已，唯畜三衣常行乞食，樂於頭陀恒坐不臥，於餘時間未曾睡眠，亦不從人有所求索，施與一切心不望報，常為他人解說正法。如是經四俱致歲，乃至若有以一善言讚歎者心尚不受，何況受人利養之物。若聽法時無疲倦想，常有諸天承事供養。爾時彼國土內王與大臣夫人婇女，一切人民并諸眷屬，悉皆隨從學彼王子出家修道。

「護國！爾時淨居諸天子等見是事已，作如是念：『今此國內一切人民並學王子出家，今此國內盡是三寶，我等今者應作檀越供養彼等，即是供養三寶利益世間。』彼如來涅槃後，正法住世經六萬四俱致歲，皆是福焰比丘之所住持。其福焰比丘從此已來常如是供養，如是次第供養九十四俱致諸佛，彼一一佛悉皆如上供養之行。護國！於汝意云何？其焰意王豈異人乎？莫作異見，則今無量壽如來是也。護國！於汝意云何？彼福焰王子豈異人乎？莫作異見，則我身是也。爾時其守護城天神者豈異人乎？則阿閦佛是也。」

爾時世尊復告護國菩薩言：「護國！是故若諸菩薩摩訶薩，若欲得阿耨多羅三藐三菩提者，應當學彼福焰王子深心至誠所修諸行，能捨一切憎愛心。是故我常勤修如是苦行故，得成於阿耨多羅三藐三菩提。然未來世有諸比丘，愛重名利貪著眷屬，於諸善法自然損減，常為我慢怨賊之所損害，甚可憐愍。以貪利故遠離正法，虛然出家污沙門行。但有口言我是菩薩，然其內心純行諂曲，身心昏濁沒煩惱泥，纔有形相違於本道。捨已誓願，貪著衣服飲食、房舍臥具湯藥等事，心無慚愧，不避恥辱無有威儀。離佛境界，心恒貪著。護國！若有得聞如是法者，應當覺知彼惡知識。惡知識者求名貪利，不應親近。」

爾時世尊欲重宣此義，以偈頌曰：

/gatha/
「多行於放逸，　遠離十力處。
　心常貪利養，　及諸眷屬等，　棄捨佛菩提，　千種諸功德。
　詐聖求名利，　惡性無慚恥，　姦諂無羞愧。
　彼專為利事，　入於佛法中，　隨順諸煩惱，　速疾墮惡趣。　
　口言我大德，　勝在阿蘭若，　心恒念聚落。
　彼等為貪故，　心多諸覺觀，　彼人遠解脫，　猶如天與地，　行者應遠離，　如畏惡毒蛇。
　彼不樂佛法，　并諸功德僧，　棄捨離善道，　常行於邪徑，　失於無量善，　為諸有覆蔽。
　聞我往昔行，　真實誠心信，　應當學我行，　多俱致劫數。
　如是法難得，　應發大忍心，　我有所說處，　勤劬當奉行。
　若當欲成佛，　妙勝大乘中，　應念彼王行，　諸功德無量。
　思惟真實已，　應住彼教中，　如是菩提道，　當見如佛說。
　深思諸功德，　聖人種性處，　當應如教行。　
　若捨如是教，　則失功德味，　當生惡趣中，　愚癡無有別，　生彼已當悔。
　勸住山林者，　慎莫自讚譽，　亦勿毀他行，　寧常自呵責。
　昔背億數佛，　斯由我慢心，　莫惜己身命，　恩愛處悉捨。
　如我說此經，　法中生敬心，　若能如說行，　菩提不為難。
　此乘大仙說，　聞已莫生疑，　是故佛法中，　應住如聖教。
　精勤捨身命，　如我教莫違，　若不信此教，　於後悔無益。」
//

爾時世尊說此偈已，復告護國菩薩言：「護國！若有菩薩常行五波羅蜜無有休息，若有菩薩於此經中能如法行能如教住，復自唱言：『我如教住、我如教行。』於前行五波羅蜜功德者，欲比此功德，百分不及一，百千分不及一，百千俱致分不及一，算數過算數分不及一，哥羅分不及一，譬喻分不及一，憂波尼沙陀分不及一。」

佛說此經時，三十那由他天及人阿修羅等，未曾發阿耨多羅三藐三菩提心者皆悉發心，得不退轉於阿耨多羅三藐三菩提。復有七千比丘，盡諸有漏心得解脫。

爾時長老護國菩薩白佛言：「世尊！此法本有何名？我等云何奉持？」作是請已，爾時佛告護國菩薩：「善男子！言此法本名『不空誓清淨行』，如是受持。亦名『善丈夫遊戲菩薩行決定毘尼』，如是受持。亦名『真實義具足』，如是受持。亦名『福焰菩薩大士往昔本行』，如是受持。」

佛說是法已，長老護國菩薩及諸天、人、阿修羅、乾闥婆等，聞佛所說，歡喜奉行。
