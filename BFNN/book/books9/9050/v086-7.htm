docInfo.writeDBJJ(mvp.ttl, `
${mvp.START()}

如是我聞：

一時佛在舍衛國祇樹給孤獨園，與大比丘眾千二百五十人俱，菩薩摩訶薩八千人，文殊師利與商主天子俱在會中。

爾時商主天子白佛言：「世尊！如來常以幾種神變調伏眾生？」

佛告天子：「我以三種神變調伏眾生：一者說法，二者教誡，三者神通。云何名為說法神變？所謂如來無礙大智，見未來世一切眾生心行差別，於三寶所有信不信，及業果報皆悉了知。如佛所說，若現在世所行惡因當墮惡趣，隨業受報決定無差。若彼眾生善業因緣誓願力故，從惡趣出生人天中，或以聲聞辟支佛乘及以大乘而得解脫，經爾所劫受苦受樂當得涅槃，當得值遇若干諸佛，如是等業決定無差。若彼眾生善業因緣誓願力故，當生欲界色界無色界，經爾所劫以如是乘而得解脫，以如是行當得見佛承事供養。如是一切上中下品善不善業，乃至一念，如來悉知而為說法，是名說法神變。云何名為教誡神變？若如是教諸持戒者，是應作是不應作，是應信是不應信，是應親近是不應親近，是法雜染是法清淨，乃至攝受一切功德善道資糧，行如是道得聲聞乘辟支佛乘、行如是道成就大乘，非法應離、如法應住，如佛所教決定無差。是地獄業、是傍生業，是餓鬼業、是人天業，不善應捨、善法應修，此是聖道應如是學。此等眾生人天往返漸入涅槃，如是示教終不空過，是名教誡神變。云何名為神通神變？若為調伏憍慢眾生，或現一身而作多身，或現多身而作一身，山崖牆壁出入無礙，身上出火身下出水，身下出火身上出水，入地如水履水如地，日月威德以手捫摩，或現大身至於梵世乃至廣大遍覆三千大千世界。隨所應現調伏眾生，是名神通神變。」

爾時商主天子白佛言：「世尊！頗有神變能過此耶？」

佛告天子：「如來復有殊勝神變。」即語文殊師利：「汝可演說，令諸菩薩得深法忍摧伏眾魔，亦令如來菩提之法久住於世。」

文殊師利白佛言：「世尊！如來若以三千世界四大海水置於掌中，水性眾生無所嬈動，如是神變未為殊勝。若如來於一切法不可言說、無名無相、無色無聲、無行無作、無文字、無戲論、無表示、離心意識、一切語言道斷寂靜照明，而以文字語言分別顯示。一切世間所不能解，沙門婆羅門聞者驚怖，是名諸佛最大神變。復次如來若以三千大千世界內於口中，於四天下無所障礙，日月光明亦不隱蔽如本而住，其中眾生亦不覺知往來方所。世尊！如是神變未為殊勝。若如來於一切法不可說、無文字、無名相，乃至離心意識、一切語言道斷寂靜照明，而以文字語言宣說顯示，是名諸佛最大神變。復次如來不共之身神通力故，隨諸眾生種種示現悉令歡喜。如是神變未為殊勝。所謂如來大神變者，無我說我、無眾生說眾生、無人說人、無養育說養育、無名說名、無色說色、無受想行識說受想行識、無處說處、無界說界，雖說眼空眼不言空、雖說色空色不言空、說眼識空識不言空，乃至意空及以法空、意識空等亦復如是。說如是等無名無相、無動無知、無言之法，摧滅一切生滅之相，是則如來最大神變。如是神變，不與眼相應、不與色相應、不與眼識相應，不與耳聲耳識、鼻香鼻識、舌味舌識、身觸身識、意法意識相應。如是神變，不與身合、不與心合，無行無作離諸境界，一切世間所不能信。何以故？言世間者，名為五蘊。凡夫於此妄生執著，或說蘊常、或說無常。以是義故，一切世間妄見蘊常，聞說無常不能生信；妄見蘊樂，聞說蘊苦不能生信；妄見蘊我，聞說無我不能生信；妄見蘊淨，聞說不淨不能生信；計蘊我所，說無我所不能生信；計五蘊實，聞說不實不能生信。以是義故，如來神變出過心相，聞者不欣，一切世間所不能信。復次超眼境界非色法故，是名神變。超耳境界非聲法故，乃至超意境界非意法故，不可顯示非智所知，是名神變。復次空無相願不可言說，而說於空無相無願，是名神變。無起無作、無性無相、無生無滅、本來涅槃不可言說，而說涅槃，是名神變。復次布施清淨，淨三輪故，是名神變。何等為三？謂離我相及眾生相，不念菩提，持戒清淨，是名神變。所謂身口意業無所作故，忍辱清淨，是名神變。剎那壞滅無所著故，精進清淨，是名神變。無去無來身心不動故，禪定清淨，是名神變。心無所依內外寂靜故，智慧清淨，是名神變。照明諸法，滅一切見故。復次法無出相說出離法，是名神變。法無差別文字分別，是名神變。法無所行說有修行，是名神變。法無來去說有來去，是名神變。於一道證建立諸果，是名神變。於一味法分別三乘，是名神變。一切諸佛唯是一佛，說無量佛，是名神變。一切佛土唯一佛土，說無量土，是名神變。無量眾生即一眾生，說無量眾生，是名神變。一切佛法唯一佛法，說無量法，是名神變。法不可示，顯示諸法，是名神變。法無所得，修習作證，是名神變。」

爾時商主天子白文殊師利言：「如我所解仁所說義，於一切法所有言說悉名神變。」

文殊師利言：「如是如是。一切言說實無所說，名大神變。」說是法時，一萬二千天子發阿耨多羅三藐三菩提心，五百菩薩得無生法忍。

爾時長老舍利弗語商主天子言：「汝聞此神變不驚怖耶？」

天子答言：「我即神變，云何驚怖？」

舍利弗言：「天子以何密意而作是言？」

天曰：「一切諸法，若善不善無動而動，名大神變。是故舍利弗！作善業者生於天上有大威德，如是善業不可思議。一切眾生往來生死亦不可思議，不可思議者名大神變。如佛所說，四種境界不可思議：一者業境界不可思議，二者龍境界不可思議，三者禪境界不可思議，四者佛境界不可思議。以是義故，說一切法名大神變不應驚怖。復次舍利弗！若如來說此神變，虛空界寧有怖耶？」

答言：「不也。」

天曰：「若虛空不怖，云何問言汝不驚怖？」

舍利弗言：「汝豈同虛空耶？」

天曰：「如佛所說，若內空外空，是虛空不？」

答言：「如是。」

天曰：「是故一切眾生是虛空性。」

舍利弗言：「天子！如汝所說，不久亦當現此神變。何以故？超過一切境界是大神變故。」

爾時舍利弗白佛言：「世尊！此商主天子往昔供養諸佛世尊及文殊師利，乃能成就如是辯才。」

佛告舍利弗：「如是如是，如汝所說，是文殊師利之所成熟。舍利弗！乃往古世過無量劫，有佛名等須彌如來、應供、正遍知、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、世尊，出現於世。國名安樂，劫名歡喜。舍利弗！彼佛世界一切眾生具足安樂，乃至無有少苦惱聲。彼佛國土四寶所成，金、銀、琉璃及以頗梨，地平如掌，清淨柔軟如天妙衣，無諸難處。天人充滿，安隱熾盛快樂無量，是故名為安樂世界。彼佛法中純是菩薩，精進勇猛智慧光明，得修多羅王陀羅尼，辯才無盡善巧方便，分別說法神通智慧，摧破惡魔解脫無礙，成就定忍，善知根性應病與藥，具大福德智慧資糧，為諸眾生不請之友。以神通力遍遊佛剎，入智行海，安住施戒智慧多聞，無邊善根方便迴向，住於十力四無所畏一切佛法，遊戲三昧諸禪解脫。彼佛世尊以如是等諸大菩薩而為眷屬。於彼世界有轉輪王名淨莊嚴，正法化世王四天下，七寶具足。王有千子，悉發阿耨多羅三藐三菩提心。淨莊嚴王及其後宮，亦皆已發阿耨多羅三藐三菩提心。彼等須彌如來壽七十俱胝歲，爾時淨莊嚴王於百千歲中承事供養彼佛如來及菩薩眾，衣服飲食一切樂具。王與千子及其後宮得清淨信，愛法歡喜更無異心，常於佛前手自供養，親近聽法過百千歲已。時王千子及以內宮獲得四念。何者為四？一者念佛菩薩，二者念施，三者念戒，四者不忘菩提之心。得此念故，若晝若夜常得見佛及諸菩薩。後於一時，淨莊嚴王及其眷屬為聽法故往至佛所。時彼如來為欲教化諸菩薩故，於大眾中現種種神變。爾時淨莊嚴王前白佛言：『世尊！頗有神變能過此耶？』佛告大王：『如來復有殊勝神變，所謂了知過去已滅、現在不住、未來未生，無心心所而說三世心心所法，於一味中說三解脫，於一滅證說四聖諦，開示諸法空無相願，成熟顛倒苦惱眾生，說無相無為成就菩提。於不取不捨說檀波羅蜜，於無住無作說尸波羅蜜，於無我法說羼提波羅蜜，身心寂靜說毘離耶波羅蜜，不亂不攝說禪波羅蜜，離彼此岸說般若波羅蜜，無所動念而行方便，離依怙相修習於慈，以無作法修習於悲，以離欣悅而修於喜，以不住法而修於捨。以無所見起於天眼，無所聞故起於天耳，無所攀緣起他心智，離於前際起宿命智，身心不動起於神足。不住於法修於念處，以無生滅修四正勤，非根說根，非力說力，諸法寂靜說菩提分法，無差別修八聖道，不住寂靜修奢摩他，遠離法相修毘鉢舍那，本來寂滅而說涅槃。』彼佛世尊為淨莊嚴王千子眷屬說此神變法時，八萬四千眾生發阿耨多羅三藐三菩提心。淨莊嚴王及以千子證於法忍，以佛神力即於佛前以偈讚曰：

/gatha/
「『如須彌山，　映于大海，　如來威光，　蔽諸大眾。
　　如日初出，　破一切闇，　世尊毫相，　遍照佛剎。
　　如月圓滿，　光明熾盛，　佛德圓滿，　慧光普照。
　　譬如蓮花，　不著於水，　佛處于世，　無所染著。
　　如師子王，　吼於林野，　人中師子，　吼於性空。
　　說一切法，　非有非無，　令離邊見，　名師子吼。
　　於一切相，　若生若滅，　說無生滅，　名師子吼。
　　分別此岸，　或示彼岸，　不住諸法，　名師子吼。
　　分別二相，　是染是淨，　諸法性淨，　名師子吼。
　　貪瞋癡行，　從分別生，　不起分別，　名師子吼。
　　說生死法，　無常無我，　從顛倒起，　名師子吼。
　　生死涅槃，　本來寂靜，　是大菩提，　名師子吼。
　　諸見所縛，　流轉世間，　開示性空，　名師子吼。
　　如來導師，　所現神變，　悉能開示，　名師子吼。
　　
「『於一切違順，　其心不傾動，　常住於平等，　名隨順法忍。
　　隨順佛所說，　甚深寂靜法，　亦不於中證，　名隨順法忍。
　　遠離諸過惡，　增長於善法，　於中無所著，　名隨順法忍。
　　說諸法空聲，　及一切見聲，　二俱無所著，　名隨順法忍。
　　無邊佛法聲，　種種煩惱聲，　不起聲分別，　名隨順法忍。
　　於施戒多聞，　精進及定慧，　如法而修行，　名隨順法忍。
　　不捨菩提心，　平等觀一切，　清淨菩提道，　名隨順法忍。
　　如來自意語，　開示諸佛法，　於此無疑惑，　名隨順法忍。
　　若我證菩提，　當大師子吼，　演說此神變，　如今佛所說。
　　我於不思議，　無上大福田，　已植於種子，　終無有退轉。
　　假令大地壞，　大海悉枯竭，　我所種善根，　永無有退失。
　　了知眾生心，　其性如虛空，　深植菩提種，　得無邊福德。
　　如我今志樂，　唯佛能證知，　天人乾闥婆，　無有能知者。
　　我今終不求，　諸天勝妙報，　我當得智慧，　如佛人中尊。
　　我於百千歲，　親近供養佛，　發趣菩提故，　修此無邊業。
　　我今與千子，　及後宮眷屬，　願常供養佛，　為成熟菩提。
　　我今得善利，　善見於諸佛，　善得聞此法，　愛樂於菩提。
　　若愛樂菩提，　則為愛樂法，　憐愍眾生故，　不捨於佛乘。』
//

「爾時眾中有菩薩名法速疾，語淨莊嚴王言：『大王！汝不隨順如來神變，亦非發趣無上菩提。何以故？大王！菩提者住於法界，不來不去、無知無行、非色非相、不取不捨，如畫虛空無所觸礙，本性清淨。大王！菩提者入一切處，諸法平等故。菩提無分別，離諸相故。菩提寂靜，止息相故。菩提性淨，離計著故。菩提不動，無雜亂故。大王！菩提者名心平等，無所起故。菩提者名眾生平等，本無生故。菩提者名不生生，因緣無性故。菩提者不可顯示，離心意識故。大王！菩提無所行，過諸境界故。菩提無戲論，離尋思相故。菩提為空，性相空故。菩提無相，離一切相故。菩提無願，無所住故。菩提無作，無業報故。菩提無為，離三相故。大王！菩提者性相如是。若於此法有所願求，徒自疲勞。何以故？如菩提性菩薩應行，能如是行名為正行。』

「爾時淨莊嚴王白法速疾菩薩言：『願為我說菩薩正行。』法速疾言：『大王！捨諸所有是菩薩行，眾生平等無分別故。頭陀學戒是菩薩行，戒性平等無所行故。離瞋熱惱是菩薩行，忍性平等無心相故。堅固勇猛是菩薩行，精進平等離心行故。三昧解脫是菩薩行，禪定平等無所緣故。聞慧資糧是菩薩行，慧性平等無所念故。生於梵住是菩薩行，染淨平等二俱離故。起諸神通是菩薩行，神通平等不生念故。具足辯才是菩薩行，法義平等離心相故。成就勝解是菩薩行，法界平等無所動故。修七覺分是菩薩行，觀照平等不懈怠故。起四攝法是菩薩行，諸法平等同其事故。等心眾生是菩薩行，心性平等無分別故。莊嚴佛土是菩薩行，清淨平等如虛空故。三十二相是菩薩行，觀法無相入平等故。淨身口意是菩薩行，離於三業性平等故。隨喜眾生是菩薩行，一切眾生等無我故。不厭生死是菩薩行，了知如夢性平等故。常修善業是菩薩行，知業平等無業報故。堅固修行是菩薩行，觀一切法如幻化故。安忍眾苦是菩薩行，了知平等苦不生故。親近善友是菩薩行，於友非友心平等故。勤修深心是菩薩行，果報平等無所求故。多聞無厭是菩薩行，說法聽法俱平等故。不慳悋法是菩薩行，平等說法不希求故。攝受正法是菩薩行，平等成熟諸佛法故。常求實智是菩薩行，第一義諦性平等故。謙下其心是菩薩行，等心謙下諸眾生故。普攝一切諸善功德是菩薩行，功德平等無所念故。』

「爾時淨莊嚴王聞說如是諸菩薩行，歡喜踊躍生愛樂心，即脫衣服嚴身之具與法速疾菩薩。時王千子亦各脫身莊嚴之具，用上菩薩，作如是言：『願令一切眾生成菩薩行，得是辯才。我等今者快得善利，得見如是真善知識恭敬供養。』爾時速疾菩薩告淨莊嚴王：『汝所供養甚為下劣，當知復有殊勝供養。』時法速疾菩薩以偈頌曰：

/gatha/
「『大千界眾生，　皆發趣菩提，　假令盡一劫，　男女以奉施；
　　若人發道意，　以信而出家，　隨佛而修學，　其福勝於彼。
　　過去未來世，　一切諸如來，　無有不捨家，　得成無上道。
　　三世一切佛，　稱讚出家法，　若樂供養佛，　當依佛出家。
　　設滿恒沙界，　珍寶供養佛，　不如一日中，　出家修寂靜。
　　彼則近菩提，　摧破魔軍眾，　出家不放逸，　白法恒增長。
　　不壞眾善根，　遠離諸煩惱，　捨於家業累，　順道聖所讚。
　　捨家離惱縛，　除惱離魔縛，　心解行無染，　不久證菩提。』
//

「爾時淨莊嚴王聞此偈已，於自在王位、一切愛欲皆悉捨離，即白佛言：『世尊！我願於佛善法律中出家受戒。』時等須彌如來告言：『大王！出家無患我常勸讚，樂著居家非我所許。汝於王位猶有愛者，我當教汝如法而住。』爾時淨莊嚴王告千子言：『汝等誰能紹繼王業？』諸子咸言：『我等亦樂出家，願垂聽許。』父王告言：『汝等若悉出家，此四天下國土人民誰當養育？若汝等大悲堅固，應為作王，普令眾生安住善法。』時千子中有一王子名念大悲，即以偈頌答父王言：　/gatha/

/gatha/
「『父王於佛法，　所得諸功德，　我悲受王位，　亦當如是學。
　　我常修梵行，　盡形持八戒，　我當不飲酒，　不塗飾香花，
　　身去莊嚴具，　不臥金床座，　足不躡金屣，　首不飾寶冠，
　　不著天妙衣，　不觀諸妓樂，　不翫奇鳥獸，　不從宮女人。
　　周巡四天下，　宣行十善道，　呵責家過患，　讚歎出家法。
　　捨自在憍慢，　親近佛法僧，　不退菩提心，　常厭於三界。
　　以施愛利益，　同事攝眾生，　普令於大乘，　悉當得成熟。
　　晝夜六時分，　當往於佛所，　為聽聞法故，　供養彼如來。』
//

「爾時等須彌如來讚念大悲王子言：『善哉善哉。善男子！汝見平等法故，住於大悲出家正信，於在家菩薩最為殊勝，與出家功德等無有異。』爾時淨莊嚴王即立念大悲紹於王位，與九百九十九王子從佛出家。既出家已，等須彌如來為說如是神變之法，於後不久獲五神通，得念總持多聞智慧。時念大悲於十五日受灌頂位，亦以是法為四天下一切眾生宣示教化。九十二俱胝眾生發阿耨多羅三藐三菩提心，悉於等須彌如來法中出家修道，住於大乘得不退轉。舍利弗！汝觀是法無量功德，成熟一切善根眾生。舍利弗！彼淨莊嚴王者豈異人乎？今商主天子是也。法速疾菩薩者，今文殊師利是也。彼千子者，此賢劫中千佛是也。念大悲王子者，我身是也。舍利弗！是諸菩薩深心正行不放逸故，得阿耨多羅三藐三菩提。」說此往昔修行法時，三萬二千天人發阿耨多羅三藐三菩提心。

爾時舍利弗語文殊師利言：「仁與商主天子久修梵行，多供養佛種諸善根。」

文殊師利言：「大德！夫梵行者名八聖道，是有為法，我即無為，是故我不久修梵行。夫梵行者名有所行，我無所行，是故我不久修梵行。又梵行者名為二相，我無二相，是故我不久修梵行。又梵行者名滅煩惱，我無煩惱亦無所滅，是故我不久修梵行。馳騁五欲說於梵行，我於五欲本無所行，是故我不久修梵行。超過魔道名為梵行，我常安住諸魔道中，是故我不久修梵行。成就善法名為梵行，我於善惡都無所得，是故我不久修梵行。聲聞緣覺所住正位名為梵行，我無所證，是故我不久修梵行。修涅槃道名為梵行，我於涅槃無所願求，是故我不久修梵行。復次舍利子！汝所說我多供養佛。汝謂如來可供養耶？所以者何？如來非色亦不可見，云何而得供養如來？如來非受息一切受，如來非想離一切結，如來非行畢竟無作，如來非識出過心意，云何可得供養如來？復次，如來行於性空非眼色界，住無相際非耳聲界，離於二相非鼻香界，無可知相非舌味界，無障礙相非身觸界，入於平等非意法界，云何可得供養如來？又如來者名為法界，名曰如如，入於實際、住於大空、不動本性、斷諸戲論、無所攀緣，不住於識、不依三界，亦不住於今世後世，常寂極寂，離身口意、無形無相、無毀無譽、無漏無失，猶如虛空遍一切處，云何可得供養如來？復次舍利弗！如汝所說種諸善根，此善根者非身見根、非貪瞋根、非顛倒根、非五蘊六入七識住根、非八邪九惱十不善根。彼善根者，非戒學根、非心學根、非慧學根、非正趣道根、非明解脫根、非四諦六通根、非九次第定、十無學根、非五根、五力、七菩提分、八聖道根。又善根者，非結使根、非障礙根、非惡作根、非生滅見根、非斷常見根、非我見、人見、眾生見、壽者見根、非蘊魔、煩惱魔、死魔、天魔根。彼善根者，非妄念根、非無明根、非行、識、名色、六入、觸、受、愛、取、有、生、老死憂惱根。彼善根者，非欲界、色界、無色界根、非布施、持戒、忍辱、精進、禪定、智慧根、非慈悲喜捨根、非聲聞緣覺所證之根。菩薩善根者，所謂心無所住一切智根、無自作他作根、忍辱調伏根、莊嚴身口意根、大慈大悲根、成熟一切眾生根、攝受一切法根、成就一切佛法根、不斷三寶種根、捨一切所有不求果報根、積集眾善不求釋梵根、發大精進不樂小乘根、修習禪定不味著根、以無所捨行智慧根、遍入諸行修方便根、具足十力四無畏根、得陀羅尼無礙辯根、獲神通力淨佛土根、趣菩提樹轉法輪根。」

時文殊師利說此三種決定義已，一切大眾咸稱善哉，以種種花散於世尊及文殊師利上，作如是言：「若佛剎中無文殊師利，佛不出世。非文殊師利，不能成熟一切眾生廣大善根。若有得聞文殊師利所說法門，不驚不怪，遠離一切魔業障礙，於此大乘得清淨光明。」

爾時世尊於大眾中讚商主天子：「善哉善哉，如汝所言。天子！汝聞文殊師利所說神變，而能了知於餘神變，更無驚怖。何以故？一切世間大驚怖者，所謂於常想中說無常想，於樂想中說於苦想，於我想中說無我想，於淨想中說不淨想，於有想中說於無想，於諸見中而說空想，寂靜想中說於無想，於三界中說無願想，於我我所說無著想。若於是中不驚不怖，是則名為住正調伏。何以故？若生驚怖則於是法不能受持，所謂執著於我及以我所。若無執著則無所住，無所住則無所動，無所動則無來去，無來去則無所受，無所受則無所取，無所取則無顛倒，無顛倒則無邪見，無邪見則無正信，無正信則無正見，無正見則無正定，無正定則無亂心，無亂心則無住處，無住處則無建立，無建立則無識相，無識相則無思惟，無思惟則無所得，無所得則無攀緣，無攀緣則無分別，無分別則不見自他，不見自他故則無相續，無相續故則無熱惱，無熱惱故則無煩惱因，無煩惱因故得見光明，見光明故則得智慧，得智慧故得廣大心，得廣大心故魔不得便，摧伏魔故則無障礙，無障礙故則為現前得一切佛法。如是天子！於一切法無生無作開示演說，是則名為說大神變。」

爾時舍利弗白文殊師利言：「如我所問，仁者皆以祕密說耶？」

文殊師利言：「舍利弗！一切諸法，文字合集假名安立，文字無盡隨樂而說，諸法無性如應得解。舍利弗！一切法自性離，無積集、無所見，但隨樂欲如應演說。而此法者，無所從來亦無所去，不在方不離方，無集無散。若以文字說一切佛法、一切眾生法，不從身出、不從心出，從因緣生。如彼文字無有積集，心心所法亦無積集。如心心所無有積集，一切煩惱障礙亦無積集。如煩惱障礙無有積集，智慧亦無所積集。是故煩惱智慧二俱捨離，煩惱智慧無所住故。是則名為說大神變。」

爾時商主天子白文殊師利言：「何等是菩薩智？」

文殊師利言：「苦智，不厭諸蘊故。集智，積集善根故。滅智，示有生故。道智，離惡道故。因智，所作不壞故。緣智，斷生死故。佛智，令入證故。緣生智，無所著故。蘊智，除蘊魔故。界智，法界平等故。處智，善觀空聚故。施智，無非時故。戒智，攝諸破戒故。忍智，守護眾生故。精進智，作善業故。禪定智，不離定心故。智慧智，了知諸法故。方便智，成熟眾生故。慈智，拔諸有故。悲智，無疲倦故。喜智，愛樂法故。捨智，成就佛法故。觀察智，住念處故。正勤智，順平等故。神足智，無作用故。信根力智，離一切著故。精進根力智，摧破一切煩惱故。念根力智，不失念故。定根力智，一切法平等故。慧根力智，知諸根性故。菩提分智，自然覺故。道智，拔諸惡趣故。盡智，善根無盡故。無生智，得無生忍故。念佛智，成就佛身故。念法智，轉法輪故。念僧智，入平等眾故。念捨智，不捨一切眾生故。念戒智，圓滿一切願故。念天智，離一切惡故。眾生根智，了知無量故。圓滿智，於戒無缺故。眾生藥智，如實相應故。處非處智，不見處故。十力智，攝諸聲聞緣覺故。無畏智，了知障非障故。過去世無礙智，無所著故。未來世無礙智，一切法無所趣故。現在世無礙智，無所住故。一切眾生受無量身智，從語言生故。一切眾生言音差別智，從心生故。一切眾生心所動智，能覺了故。無過失智，了知一切眾生過失故。無卒暴智，能息一切諸鬪諍故。不失念智，安住亂心眾生故。攝眾生智，攝諸懈怠故。佛不共智，知應化故。大方便智，依般若故。天子！是名諸菩薩智。以是智故，當得如來無礙大智。」

爾時商主天子白文殊師利言：「希有希有。是菩薩智於三界中最為殊勝，不可以少莊嚴而能成就。若能發生是智慧者，為大神變。文殊師利！云何菩薩能於此法具足莊嚴？」

文殊師利言：「天子！若聞一切眾生本來寂滅，不生驚怖，是名菩薩具足莊嚴。」

天子言：「文殊師利！云何名菩薩？」

答言：「若行菩提而無所住，是名菩薩。」

又問：「云何名摩訶薩？」

答曰：「已度諸行圓滿大智，為摩訶薩。」

又問：「云何說為殊勝眾生？」

答曰：「以智慧故不著於法，以方便力攝受一切，是故說為殊勝眾生。」

又問：「云何名為清淨眾生？」

答曰：「不與一切煩惱住故、為除眾生煩惱病故，發大精進，是名清淨眾生。」

又問：「云何名為極清淨眾生？」

答言：「若為度脫一切眾生淨修道品，是名極清淨眾生。」

又問：「云何菩薩為世導師？」

答曰：「若能安住所行之道，成熟無量無邊眾生，是名導師。」

又問：「云何菩薩住於調伏？」

答曰：「若於所應調伏眾生，能令安住究竟調伏，是名調伏。」

又問：「云何菩薩而得勇猛？」

答曰：「若能成熟一切眾生，摧破魔怨令出生死，是名勇猛。」

又問：「云何菩薩難可沮壞？」

答曰：「若能成滿往昔誓願，不求聲聞緣覺道證，是名菩薩難可沮壞。」

又問：「云何菩薩勝出一切？」

答曰：「以智方便護持正法，成熟眾生，一切天人靡不瞻仰，是名勝出。」

又問：「云何說法？」

答曰：「依佛所說摧滅一切眾邪異論，是名說法。」

又問：「云何說律？」

答曰：「自住於戒，能斷眾生煩惱惡業，是名說律。」

又問：「云何具足利益眾生？」

答曰：「所集善根迴向一切，是名具足利益眾生。」

又問：「云何直心？」

答曰：「於貪恚癡諂曲眾生不生恚礙。」

又問：「云何不諂？」

答曰：「所言誠實。」

又問：「云何離誑？」

答曰：「諦思後言。」

又問：「云何離慢？」

答曰：「於一切眾生不起貢高。」

又問：「云何大施？」

答曰：「所集難得無上菩提猶施眾生，何況世間所有之物。」

又問：「云何具戒？」

答曰：「乃至失命終不捨於菩提之心。」

又問：「云何為忍？」

答曰：「能忍逼迫，不逼惱他。」

又問：「云何精進？」

答曰：「簡擇諸法，無少可得。」

又問：「云何禪定？」

答曰：「不見欲界。」

又問：「云何智慧？」

答曰：「無所分別。」

又問：「云何住慈？」

答曰：「觀眾生界空無所有。」

「云何住悲？」

答曰：「知諸法空而不捨精進。」

「云何住喜？」

答曰：「住大寂樂求法無厭。」

「云何住捨？」

答曰：「不染世法能救世間。」

「云何身清淨？」

答曰：「隨意生身，於一切眾生平等示現。」

「云何語清淨？」

答曰：「凡所說法終不空過，悉能滿足一切眾生。」

「云何意清淨？」

答曰：「一切眾生所有心念，於一心中悉能了知。」

「云何天眼？」

答曰：「能見一切色相光明而無所著。」

「云何天耳？」

答曰：「聞一切聲離諸聲相。」

「云何他心？」

答曰：「了知諸心生滅流注。」

「云何宿命？」

答曰：「不動實際了知前際。」

「云何神通？」

答曰：「不動魔業摧破諸魔。」

「云何調伏？」

答曰：「能調一切難調伏者。」

「云何為護？」

答曰：「不為諸根之所擾亂。」

「云何調順？」

答曰：「一切諸法所不能動。」

「云何寂靜？」

答曰：「處煩惱火而不為燒，度煩惱者而演說法。」

「云何淨信？」

答曰：「若說佛身是色相法，終不信受不為所壞。」

「云何菩薩善巧方便？」

答曰：「若見眾生煩惱過失等於菩提，是名菩薩善巧方便。」說此法時，萬二千眾生發阿耨多羅三藐三菩提心，五百菩薩得無生法忍。

爾時世尊讚言：「善哉善哉。文殊師利！善能演說諸菩薩行，則為已攝一切菩薩無量功德。」

爾時商主天子白文殊師利言：「仁於往昔恭敬供養幾佛世尊得是辯才？」

文殊師利言：「譬如幻人心數已滅。」

天曰：「眾生心相尚不可得，何況幻人而有心滅？」

答曰：「諸佛如來性相如是，我依是法供養如來。」

天曰：「仁者行檀波羅蜜為久近耶？」

答曰：「如佛所化人，若有問言久近行檀波羅蜜，當云何答？」

天曰：「無可答也。」

文殊師利言：「我亦如是。云何乃問久近行耶？」

天曰：「汝住慳耶？」

答言：「如是。」

又問：「汝意云何？」

答曰：「我不捨佛法及一切眾生，是故為慳。」

天曰：「如文殊師利所說義者，亦破戒耶？」

答言：「如是。」

天曰：「汝意云何？」

答曰：「夫破戒者則墮惡趣，我為度脫苦眾生故入惡趣中，故名破戒。」

又問：「汝起害心耶？」

答言：「如是。」

天曰：「汝意云何？」

答曰：「夫害心者名為不愛。我於煩惱及以二乘都無所愛，故名害心。」

又問：「汝懈怠耶？」

答言：「如是。」

又問：「汝意云何？」

答曰：「我不起身口意業，無所進求、不取不捨，故名懈怠。」

又問：「汝散亂耶？」

答言：「如是。」

天曰：「汝意云何？」

答曰：「夫散亂者，非謂不住解脫心耶？」

天曰：「如是。」

答曰：「我為成熟一切眾生，不住解脫，故名亂心。」

又問：「汝無智耶？」

答曰：「如是。」

又問：「汝意云何？」

答曰：「夫無智者，同諸愚惑不怖生死，豈不爾耶？」

天曰：「如是。」

答曰：「我於生死不驚不怖，為欲成熟愚惑眾生，同其事業，故名無智。」

天曰：「汝為世間堪供養者？」

答曰：「我於一切生殺害心。」

又問：「汝意云何？」

答曰：「我殺害彼貪欲瞋癡故，為世間堪供養者。」

天曰：「如汝所說，令諸世間悉當驚怖。」

答言：「天子！若實際驚怖則世間驚怖。何以故？一切世間即實際故。」

又問：「若復有人謗毀此說，當何所至？」

答曰：「當至涅槃。」

又問：「以何意耶？」

答曰：「聖解脫中無有文字，是故毀於言說得至涅槃。以是義故，一切諸法本來解脫，不復解脫。」

又問：「是義云何？」

答曰：「已解脫者寧更解脫？」

又問：「謗正法者豈不入地獄耶？」

答曰：「若已解脫則離諸垢，云何趣地獄耶？」

天曰：「文殊師利！如汝所說無讚助者。」

答曰：「空無相願中何所讚助？」

又問：「修空行者當何所住？」

答曰：「當住於慈。所以者何？眾生如幻，自性空故。」

天曰：「文殊師利！云何了知諸眾生界？」

答曰：「見一切眾生從因緣起不斷不常，是故遍知眾生界也。」

又問：「眾生界者為何義耶？」

答曰：「眾生界者即是法界。」

又問：「云何法界？」

答曰：「自性空界名為法界。」

又問：「何謂空界？」

答曰：「超過一切境界是虛空界。」

又問：「何等是超過界？」

答曰：「是佛境界。」

又問：「何謂佛境界？」

答曰：「眼界是佛境界，然佛境界非眼、眼色、眼識境界故。耳界是佛境界，然佛境界非耳、耳聲、耳識境界故。乃至意界是佛境界，然佛境界非意、意法、意識境界故。色界是佛境界，然佛境界非色境界故。受想行識界是佛境界，然佛境界非受想行識境界故。無明界是佛境界，然佛境界非無明界故。乃至老病死界是佛境界，然佛境界非老病死境界故。欲界是佛境界，無貪相故。色界是佛境界，非對除貪故。無色界是佛境界，非無明見故。無為界是佛境界，無二相故。有為界是佛境界，非三相故。天子！是名佛境界。如是境界入一切界，若邊無邊皆悉攝受。菩薩善入是境界故，常行世間一切境界，超過魔界。佛界魔界如實了知寂靜平等，是則名為最大神變。復次菩薩不住平等，以平等法成熟眾生。云何平等及非平等？一切諸法自性空寂，如是了知名住平等。不能入於諸法性空，名非平等。菩薩成熟如是眾生，而亦不住空平等故。一切諸法，無願平等、無作平等、無生平等、無滅平等、離染平等、寂靜平等、無性平等、滅平等、涅槃平等。彼不了知是平等法，菩薩成熟如是眾生，而亦不住於平等故。是故菩薩不住平等、不離平等，是菩薩行。」

爾時商主天子白文殊師利言：「願為我說諸菩薩行。」

文殊師利言：「天子！菩薩行者不可思議。」

天子言：「云何菩薩行不可思議？」

文殊師利言：「貪行是菩薩行，貪不可思議故。瞋行是菩薩行，瞋不可思議故。癡行是菩薩行，癡不可思議故。慳悋是菩薩行，無施想故。不毀戒是菩薩行，不取戒相故。不恚害是菩薩行，無忍想故。不懈怠是菩薩行，離精進念故。不散亂是菩薩行，不住定故。離愚癡是菩薩行，不作智想故。無煩惱是菩薩行，無所斷故。無貪愛是菩薩行，離身相故。悲愍心是菩薩行，捨女人慈故。無染污是菩薩行，呵責五欲故。離非法是菩薩行，積集善根故。無悋惜是菩薩行，捨身命故。滅諸惡是菩薩行，無熱惱故。無所著是菩薩行，離愛非愛故。無所壞是菩薩行，正觀煩惱故。不怖畏是菩薩行，入無邊生死故。大精進是菩薩行，荷負一切眾生故。不退轉是菩薩行，成滿昔願故。眾寶行是菩薩行，攝三寶故。一切行是菩薩行，勤修助道法故。無障礙是菩薩行，離二邊故。無過失是菩薩行，智者所讚故。安住心是菩薩行，念一切眾生故。無分別是菩薩行，等觀一切故。善丈夫是菩薩行，荷擔無倦故。勇猛是菩薩行，摧破一切煩惱故。堅固是菩薩行，所作不中廢故。勝出是菩薩行，精進不退故。隨順是菩薩行，於諸同侶無違逆故。歡喜是菩薩行，於行惡者令歡喜故。信樂是菩薩行，見佛聞法事師欣悅故。金剛甲冑是菩薩行，不毀律儀故。莊嚴佛土是菩薩行，淨其心故。超過一切是菩薩行，入最上乘故。知恩報恩是菩薩行，不斷佛種故。智慧方便是菩薩行，攝受無斷故。」說此菩薩行時，五百菩薩得無生法忍。

爾時商主天子白文殊師利言：「快哉！善說此菩薩行。若諸菩薩能如是行，則為已受如來記別。」

佛告天子：「如是如是，如汝所言。我昔得此行時，然燈世尊與我授記。我時獲得無生法忍，是名如來最大神變。若久成就清淨業者，乃能修習此菩薩行。」

爾時商主天子白佛言：「世尊！云何名無生？云何當得此無生忍？」

佛言：「無生者，非先有生後說無生，本自不生故名無生。非先有起後說無起，本來不起故名無起。非先有相後說無相，本來無相故名無相。非先有作後說無作，本自無作故名無作。非先有眾生後說於空，眾生性空故說為空。如是了知無生無滅本無所染，是名無生。云何為忍？如是忍可一切眾生、一切剎土本來不生，是名為忍。如是忍可一切聲聞、辟支佛本來不生，是名為忍。如是忍可一切菩薩、一切諸佛本來不生，是名為忍。如是忍可一切諸法本來不生，是名為忍。天子！以諸法不生故剎那剎那空，以剎那空故名為無相，剎那無相故色剎那空，色剎那空故受想行識剎那空，識剎那空故界剎那空，界剎那空故處剎那空。若剎那空則無所有，無所有故則無所染，無所染故則自性離，自性離故是名一切法本來寂靜。能如是忍，入於平等，是則名為得無生忍受菩提記。得此忍者為無所得。云何名為有所得者？見我我所二相可得，名有所得。見眾生壽者養育我人二相可得，名有所得。何謂無所得？見我自性及我所性了知無二，名無所得，是則名為成就於忍。天子！菩薩於無數劫修行此忍，是名如來最大神變。」

說此忍時，三千大千世界六種震動，大光遍照一切世界，百千音樂不鼓自鳴，於虛空中雨眾妙花。四萬二千眾生皆發阿耨多羅三藐三菩提心，九萬菩薩得隨順法忍。以佛神力，令此娑婆世界如然燈佛入蓮花城時等無有異。

爾時世尊即便微笑，無量百千種種色光從佛口出，遍照無量無邊世界乃至梵世，日月光明悉不復現，遶佛三匝還從頂入。

爾時慧命阿難即從座起，偏袒右肩右膝著地，合掌恭敬，即於佛前而說偈言：

/gatha/
「我問光莊嚴，　光明無與等，　破諸煩惱闇，　微笑何因緣？
　摧破眾魔怨，　降伏諸外道，　我問十力者，　何緣現微笑？
　如來殊妙色，　具三十二相，　十方所尊敬，　微笑何因緣？
　智海智慧樹，　開導諸群生，　功德無有邊，　何緣現微笑？
　名稱遍三世，　離垢具三明，　已度三解脫，　何緣現微笑？
　破生死醫王，　足下輞輪具，　金剛身不壞，　微笑何因緣？
　誰能具此忍？　誰修此淨行，　志求佛功德？　由是尊微笑。
　導師所示現，　是必有因緣，　善哉演梵音，　令眾咸歡喜。」
//

佛告阿難：「我說此法門時，七萬二千眾生發阿耨多羅三藐三菩提心，三萬二千菩薩獲無生忍。阿難！汝見是商主天子不？」

阿難白言：「唯然已見。」

佛言：「阿難！此商主天子已曾供養無數諸佛，勸發無量眾生於阿耨多羅三藐三菩提。阿難！此商主天子過三百阿僧祇劫，當得阿耨多羅三藐三菩提，號功德王光明如來、應、正等覺、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、世尊。國名清淨，劫名無垢。其土皆以七寶所成，地平如掌，有八階道寶網彌覆種種莊嚴。彼佛剎土無有聲聞辟支佛名，及餘外道勒迦波利羅、婆若迦等。無諸魔事壞正法者，亦無八難及諸非法苦惱之聲。隨心所念飲食自然。彼土眾生衣服珍玩，猶如他化自在諸天。身皆金色三十二相，住阿耨多羅三藐三菩提。是故名為清淨世界。彼功德王光明如來壽四十小劫。彼佛法中有六十二俱胝菩薩，以願力故隨佛涅槃。阿難！若有菩薩發阿耨多羅三藐三菩提心、得如是忍，一切當生清淨世界，為功德王光明如來授阿耨多羅三藐三菩提記。」

爾時會中有天子名曰觀察，以天曼陀羅花散如來上，作如是言：「若功德王光明如來成無上道時，我當生彼清淨世界為轉輪王，承事供養彼佛世尊諸菩薩眾，次補佛處，得阿耨多羅三藐三菩提。」

佛告阿難：「此觀察天子當於彼功德王光明如來法中作轉輪王，名曰善見。以無量供具恭敬供養彼佛如來，具足圓滿助菩提法，當於彼土成阿耨多羅三藐三菩提，號普光明如來、應、正等覺。阿難！彼善見王立其長子紹王位已，於彼佛所出家修道。彼佛世尊臨涅槃時，便與授記：『此善見菩薩於我滅後，次當得成阿耨多羅三藐三菩提。』佛授記已便入涅槃。」

爾時舍利子告商主天子言：「如來已授汝菩提記。」

天子言：「大德！如佛所化人而與授記，我亦如是。如真如性不增不減，如來授記亦無增減。」

爾時世尊告阿難言：「如是法門，汝當受持廣為人說，利益安樂無量眾生，攝受未來諸菩薩故。」

阿難白佛言：「世尊！我已頂受。當何名之？云何奉持？」

佛告阿難：「此經名為『說大神變』，亦名『文殊師利所說密語』，亦名『商主天子所問』，如是受持。阿難！若善男子善女人能於此經信受讀誦為他廣說，則為已攝一切功德。」

佛說此經已，慧命阿難并餘比丘、商主天子，及無量無邊阿僧祇那由他諸天子等，文殊師利及無量阿僧祇十方世界諸來集會菩薩摩訶薩眾，及一切世間天、人、阿修羅等，聞佛所說，歡喜奉行。
