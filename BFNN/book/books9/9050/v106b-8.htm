如是我聞：

一時佛在舍衛國祇樹給孤獨園精舍，與大比丘八千人俱，皆學無學大聲聞眾。菩薩摩訶薩萬二千人，皆得神通眾所知識，得陀羅尼無礙辯才，得諸法忍，無量功德皆悉成就。

爾時如來從三昧起，無量百千萬億眾生恭敬圍遶而為說法。爾時眾中有菩薩摩訶薩名曰智勝，即從座起，偏袒右肩右膝著地，合掌向佛而白佛言：「世尊！欲問一事，唯願聽許。若佛聽者乃敢諮請。」

佛告智勝菩薩：「善男子！恣汝所問。當為汝說，斷汝所疑。」

爾時智勝菩薩白佛言：「世尊！所言方便，何等為菩薩方便？世尊！云何菩薩摩訶薩行於方便？」

如是問已，佛讚智勝菩薩言：「善哉善哉。善男子！汝為諸菩薩摩訶薩故問方便義，多所利益多所安樂，愍念世間利益安樂諸天世人，為攝未來諸菩薩智慧及去來現在諸佛法故。善男子！當為汝說。諦聽諦聽，善思念之。」智勝菩薩受教而聽。

「善男子！行方便菩薩，以一摶食給施一切眾生。何以故？行方便菩薩以一摶食施與，下至畜生，願求一切智，以是菩薩與一切眾生共之，迴向阿耨多羅三藐三菩提。以是二因緣攝取一切眾生，所謂求一切智心及願方便。善男子！是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩行於方便，若見行施之人生隨喜心，以此隨喜善根願與一切眾生共之，迴向阿耨多羅三藐三菩提。是方便菩薩亦願施者受者不離一切智心。假令受者是二乘人，亦願不離一切智心。是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩行於方便，若見十方世界中無主花樹及種種香，合集願以供養諸佛。若見十方世界中有主花香若香若葉，風所吹者一切合集，願以供養十方諸佛。以是善根若自為若為一切眾生具一切智心。以是善根因緣故，得無量戒、定、慧、解脫、解脫知見。是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩行於方便，若見十方世界眾生受諸樂報，見已作如是念：『願一切眾生得一切智樂。』若見十方世界眾生受諸苦報，為諸眾生懺悔諸罪作是大莊嚴：『如是眾生所受苦惱，我悉代受令彼得樂。以是善根願成一切智，除一切眾生苦惱。』以是因緣故，畢竟不受一切諸苦純受諸樂。是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩行於方便，若禮一佛恭敬供養尊重讚歎，作是念：『一切如來同一法界，一法身，一戒、一定、一慧、一解脫、一解脫知見。』作是念已，當知若禮一佛，恭敬供養尊重讚歎，即是禮拜供養恭敬尊重讚歎一切諸佛。若供養一佛，即是供養十方諸佛。如是供養十方佛已。是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩行於方便，若鈍根者不應自輕，乃至若能通利一四句偈，作是念：『若解一四句偈義，即知一切佛法。一切佛法皆攝在此一偈義中。』如是通達已心不懈怠，若至諸國城邑聚落，以慈悲心廣為人說，不求利養名聞讚歎，作如是願：『此四句偈願令他聞。以是善根因緣方便，願已令一切眾生多聞皆如阿難，及得如來辯。』是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩行於方便，若生貧窮家，是菩薩乃至乞食，若得一摶食用施僧。若施一人不以為愧，應作是念：『如佛所說，心增廣大勝以財施。我財施雖少，以一切智心，願是善根成一切智，令諸眾生悉得寶手猶如如來。』以是緣故，具足施戒禪定福處。是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩行於方便，若見聲聞緣覺多得利養尊重讚歎，是菩薩自以二緣慰喻其心。何等為二？所謂因菩薩故有諸如來，因如來故有聲聞緣覺。如是思惟：『二乘之人雖得利養，我猶勝彼。彼所食者是我父物，云何於中而生希望？』是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩行於方便，行施之時具六波羅蜜。何等為六？善男子！菩薩行方便時，若見乞兒除慳惜心，具足大施，是名檀波羅蜜。自持禁戒施持戒者，見破戒人勸令持戒，勸持戒已然後給施，是名尸波羅蜜。自除瞋恚行於慈愍，心無穢濁利益眾生等心而施，是名羼提波羅蜜。若施飲食湯藥，即時具足身心精進，去來進止屈伸俯仰，是名毘梨耶波羅蜜。若行施已其心得定，歡喜悅預專念不亂，是名禪波羅蜜。如是施已分別諸法，施者是誰？誰為受者？誰受報者？如是觀已無有一法名為施者、若受施人及受報者，是名般若波羅蜜。善男子！是名菩薩摩訶薩行於方便具六波羅蜜。」

爾時智勝菩薩白佛言：「世尊！未曾有也。菩薩摩訶薩行於方便，即於施時以此施故攝一切佛法及諸眾生。」

佛告智勝菩薩：「善男子！如汝所說。菩薩摩訶薩行於方便，以方便力故雖行少施，所得福德無量無邊阿僧祇。」

佛復告智勝菩薩：「善男子！菩薩摩訶薩雖至不退轉地，亦以方便而行於施，是名菩薩行於方便。善男子！有時惡知識教菩薩言：『汝何用久處生死？可於此身早入涅槃。』菩薩知已即應離之。『我如是大莊嚴教化一切眾生，是人為我作諸留難。若我不在生死中者，何能教化無量眾生？』」

智勝菩薩白佛言：「世尊！若有眾生以妄想故犯四重罪。」

佛告智勝菩薩：「善男子！若出家菩薩以妄想故犯四重罪，行方便菩薩能盡除滅。我今亦說無有犯罪及受報者。」

智勝菩薩白佛言：「世尊！云何菩薩犯罪？」

佛告智勝菩薩：「善男子！菩薩雖行解脫戒，於百千劫中噉果食草，能忍眾生善惡之語。若與聲聞緣覺共思惟法，善男子！是名菩薩摩訶薩犯於重罪。善男子！如聲聞人犯於重禁，非即此身得入涅槃。善男子！菩薩如是不除聲聞緣覺共思惟法，不捨不悔者，終不得成阿耨多羅三藐三菩提；若得佛法，無有是處。」

爾時尊者阿難白佛言：「世尊！我今晨朝入舍衛城次第乞食，見眾尊王菩薩與一女人同一床坐。」

阿難說是語已，即時大地六種震動。眾尊王菩薩於大眾中，上昇虛空高七多羅樹，語阿難言：「尊者！何有犯罪能住空耶？阿難！可以此事問於世尊，云何罪法？云何非罪？」

爾時阿難憂愁向佛，右膝著地手執佛足：「世尊！我今悔過。如是大龍，我說犯罪。如是菩薩，我求其過。世尊！我今悔過，唯願聽許。」

佛告阿難：「汝不應於大乘大士求覓其罪。阿難！汝聲聞人，於障處行寂滅定，無有留難斷一切結。阿難！行方便菩薩如是成就一切智心，雖在中宮婇女共相娛樂，不起魔事及諸留難，而得阿耨多羅三藐三菩提。何以故？阿難！行方便菩薩無有受如是眾生不以三寶勸化，若阿耨多羅三藐三菩提。阿難！若學大乘善男子善女人不離一切智心，若見可意五欲，即便在中共相娛樂。阿難！汝應作是念：『如此菩薩即是能成如來根本。』」

佛告阿難：「汝今諦聽諦聽。以何緣故，眾尊王菩薩摩訶薩與此女人同一床坐？阿難！彼女人者曾於過去五百世中，為眾尊王菩薩作婦。彼女人本習氣故，見眾尊王菩薩心生愛著繫縛不捨。此眾尊王菩薩威德端正持戒力故，見已歡喜踊躍在一獨處生如是心：『若眾尊王菩薩能與我共一床坐者，我當發阿耨多羅三藐三菩提心。』阿難！爾時眾尊王菩薩知彼女人心之所念，如是知已即於晨朝著衣持鉢入舍衛城次第乞食，至彼女家即入其舍。尋時思惟如是法門：『若內地大、若外地大，是一地大。以地大心執女人手共一床坐，眾尊王菩薩即於坐上而說偈言：

/gatha/
「『如來不讚歎，　凡夫所行欲；　離欲及貪愛，　乃成天人師。』」
//

佛告阿難：「時彼女人聞此偈已，心大歡喜踊躍無量，即從坐起向眾尊王菩薩接足敬禮，說是偈言：

/gatha/
「『我不貪愛欲，　貪欲佛所呵。　離欲及貪愛，　乃成天人師。』
//

「說是偈已作如是言：『我先所生惡欲之心，今當悔過。』即生善欲發菩提心，願欲利益一切眾生。」

佛告阿難：「爾時眾尊王菩薩勸彼女人令發阿耨多羅三藐三菩提心已，即從坐去。阿難！汝觀是女人專心福報。我今以正遍知記彼女人，於此命終得轉女身當成男子。於將來世九十九劫，供養百千無量阿僧祇諸佛，具足一切佛法，得成為佛，號無垢煩惱如來、應供、正遍知。彼佛成道已，當是世時無有一人起不善心。阿難當知，行方便菩薩所攝眷屬，終不墮三惡道。」

爾時眾尊王菩薩從空中下，頂禮佛足。禮已白佛言：「世尊！菩薩行於方便，若為一人起大悲心合集善法，若似犯罪、若實犯罪，於百千劫墮大地獄。世尊！此菩薩堪受諸惡及地獄苦，以此善根願不捨一人。」

爾時世尊讚眾尊王菩薩言：「善哉善哉。善男子！菩薩成就如是悲心，雖受五欲不犯重罪，離於諸罪及遠一切墮惡道業。善男子！我念過去阿僧祇劫復過是數，時有梵志名曰樹提，於四十二億歲在空林中常修梵行。彼時梵志過是歲已，從林中出入極樂城，入彼城已見有一女。彼時女人見此梵志儀容端嚴，即起欲心，尋趣梵志以手執足，即時躄地。善男子！爾時梵志告女人曰：『姊何所求？』女曰：『我求梵志。』梵志言：『姊！我不行欲。』女曰：『若不從我，我今當死。』善男子！爾時樹提梵志如是思惟：『此非我法亦非我時。我於四十二億歲修淨梵行，云何於今而當毀壞？』彼時梵志強自頓抴得離七步，離七步已生哀愍心，如是思惟：『我雖犯戒墮於惡道，我能堪忍地獄之苦。我今不忍見是女人受此苦惱，不令是人以我致死。』善男子！爾時梵志又如是思惟已，還至女所，以右手捉作如是言：『姊起，恣汝所欲。』善男子！爾時梵志於十二年中共為家室，過十二年已尋復出家，即時還具四無量心，具已命終生梵天中。善男子！汝勿有疑。爾時梵志即我身是，彼女人者今瞿夷是。善男子！我於爾時為彼女欲暫起悲心，即得超越十百千劫生死之苦。善男子！汝如是觀，若餘眾生由愛欲故墮於地獄，行方便菩薩由生梵天。是名菩薩摩訶薩行於方便。」

佛復告智勝菩薩：「善男子！若舍利弗、大目犍連等行方便者，不令瞿伽離墮於地獄。何以故？善男子！我念過去世鳩留孫佛時，有一比丘名曰無垢，在空林野止住窟中。去窟不遠有五仙人。當爾之時卒起大雲而降大雨，時有貧女道遇暴雨寒裸恐怖，即入無垢所住窟中。時雨既止，無垢比丘共此女人從窟而出。時五仙人見此事已心生荒穢，各相謂言：『無垢比丘心懷奸諂作不淨行。』時無垢比丘知彼仙人心之所念，即踊身虛空高七多羅樹。時五仙人見無垢比丘上昇虛空，見已復相謂言：『我等所見書記經論，若人作不淨行，不能如是飛昇虛空；若修淨行則能如是。』彼時仙人即向無垢五體投地合掌悔過，不敢覆藏。」

佛告智勝菩薩：「善男子！爾時無垢比丘若不作如是方便飛昇虛空者，此五仙人即此生身入於地獄。善男子，爾時比丘豈異人乎？即彌勒菩薩是。善男子！汝今當知，舍利弗、目犍連若作如是方便飛昇虛空者，瞿伽離比丘不墮地獄。善男子！汝今當知，如諸菩薩摩訶薩所行方便，聲聞緣覺之所無有。善男子！譬如婬女善知六十四態，為財寶故媚言誘他詐許捨身，所重之物無所匱惜，後得彼物。得彼物已，驅逐令去不生悔心。善男子！行方便菩薩能知隨宜行於方便，如是教化一切眾生，隨其所欲而為現身，於所須物心無悋惜，乃至捨身為眾生故，愛樂善根不求果報。知諸眾生作善根已心無退轉，即於爾時心生捨離，所現五欲永無戀著。善男子！譬如黑蜂在畜生中，於一切花雖經香味，而於其中無依止想無所愛著，於花葉莖香不持而去。善男子！菩薩摩訶薩行於方便亦得如是，為化眾生處於五欲見法無常，不以常想而起於愛，又不自害亦不害他。善男子！如小種子雖生於牙，然其本色無所虧損不生異物。善男子，如是空、無相、無作、無我智慧種子，菩薩雖有煩惱於五欲娛樂，不生三惡道牙，不損善根之色亦不退轉。善男子！譬如魚師以食塗網投之深淵，既滿所求即尋牽出。善男子！行方便菩薩亦復如是，以空、無相、無作、無我智慧勳修其心結以為網，一切智心以為塗食，雖投五欲污泥之中，如其所願牽出欲界，命終之後生於梵世。善男子！譬如有人善知呪術，為官所執被五繫縛，此人自以呪術力故即斷五縛隨願而去。善男子！如是菩薩摩訶薩行於方便，雖處五欲共相娛樂，為化眾生如其所求，以一切智呪斷五欲縛生於梵世。善男子！譬如士夫善知戰法，藏一利刀衛送行人。而彼眾中無有一人能知此人密懷奇謀而反輕之，更生憐愍無敬重心，各相謂言：『彼人既無器仗亦無伴黨，此非健士復無勢力，自身不救何能濟人？此若壞賊無有是處。彼人必當受諸困厄。』時彼士夫遂至空澤，群賊俱發。爾時士夫牢自莊嚴，尋時即出所藏之刀，始一擲刀群賊喪命，諸賊既壞復還藏刀。善男子！行方便菩薩善藏智刀，而以方便處於五欲共相娛樂，為化眾生。聲聞見此方便菩薩處於五欲共相娛樂，不知方便故生濁心，或復憐愍謂為放逸：『如是之人尚不自度，況能救度一切眾生？若能壞魔無有是處。』爾時菩薩善用方便智慧之刀，如其所求斷諸煩惱盡令摧滅，以智慧刀至淨佛土，無諸女人乃至無有一念欲想。」

爾時有菩薩名曰愛作，入舍衛城次第乞食，漸漸遂至一長者家。長者有女名曰德增，住高樓上。彼時女人聞菩薩聲，尋持食出向愛作菩薩。女見菩薩取其形容相好音聲，欲心即起為欲所燒，即時命終骨節解散。愛作菩薩見德增女，亦起惡覺婬欲之心。于時愛作菩薩即自思惟：「云何彼法？法者為著。云何彼眼？何者此眼？眼性非知，但是肉團，不愛不知、不思不覺、無所分別、其性本空。耳鼻舌身意法亦復如是。」薄皮厚皮、血肉脂肪、髮毛爪齒、骨髓筋脈，從足至頂如是觀已，若內若外無有一法而可愛著、若瞋若癡。於一切法如實觀，即離欲心得無生忍。得無生忍已，其心歡喜踊躍無量，即昇虛空高一多羅樹，遶舍衛城七匝。

爾時世尊見愛作菩薩飛騰虛空，猶如鵝王無所罣礙。佛見是已告阿難言：「阿難！汝見愛作菩薩飛騰虛空，猶如鵝王無所礙不？」

阿難言：「唯然已見。」

佛告阿難：「是愛作菩薩因起欲心推求諸法，即壞魔眾當轉法輪。」

時德增女命終之後生三十三天，轉于女身得成男子，自然處於七寶宮殿，縱廣正等十二由旬，有萬四千諸天婇女以為侍衛。是德增天子得識宿命推先業行：「以何業緣而來生此？」如是思惟已，見舍衛城中作長者女，因見愛作菩薩生婬欲心，欲心熾盛即身命終，便轉女身得成男子。「我以是事得無量神力。」爾時德增天子如是思惟：「因起婬欲得如是報。今我於愛作菩薩心甚清淨禮敬供養。我今若住先受五欲，此非我宜。」如是思惟已，當詣如來并欲見於愛作菩薩禮敬供養。時德增天子與其眷屬，持天花香塗香末香，即於初夜來至佛所，自以光明普照祇洹，入覲世尊及見愛作，即以天花末香塗香供養於佛，頂禮佛足及愛作菩薩、一切大眾，右遶三匝，合掌向佛即說偈言：

/gatha/
「天人之尊，　不可思議，　菩薩所行，　亦不可議。　
　如來之法，　不可思議，　大名稱者，　亦不可議。　
　我昔舍衛，　曾為童女，　在長者家，　名曰德增。
　其年幼少，　顏貌端正，　父母愛念，　為作遮護。　
　如來世尊，　無有輕戲，　有子愛作，　有大威德。　
　入舍衛城，　而行乞食，　漸到我父，　所止之舍。
　我時聞其，　好妙音聲，　心大歡喜，　即持食出。　
　尋時向於，　行大心者，　如來之子，　愛作菩薩。　
　見菩薩時，　已在我心，　觀其淨妙，　心生染欲。
　我若不得，　內心所願，　便當即時，　身命殞沒。　
　我於爾時，　口不能言，　手所持食，　不能與之。　
　內心懷熱，　而發婬欲，　是時身熱，　尋便命終。
　我時命終，　經一念頃，　尋得上生，　三十三天。　
　離於最下，　女人之身，　得成男子，　為人所讚。　
　勝妙宮殿，　自然而出，　種種妙寶，　人之所珍。
　具足一萬，　四千婇女，　如是眷屬，　是我所有。　
　我以此緣，　尋觀宿命，　而自思惟，　即知往因。　
　因發欲心，　得如是報，　我以染心，　視於愛作，
　由見菩薩，　得喜光明。

　我身所出，　光明之焰，　因彼業緣，　得如是報。
　我終不願，　求於二乘，　所願之處，　唯佛知之。　
　婬欲之心，　得報尚爾，　何況能作，　善心供養。　
　如我於今，　向於世尊，　發如是願，　求一切智。
　假使所行，　劫如恒沙，　終不退轉，　於佛智慧。　
　遇善知識，　愛作菩薩，　今我當以。　真法供養，　
　若餘供養，　非為供養，　唯發菩提，　是真供養。
　行於菩提，　最勝最尊。　

　更不以欲，　視諸女人，　我願如是，　離於女身。
　向諸佛說，　四無所畏，　我之父母，　尋曉見我，　
　身壞碎爛，　悲號啼哭。　父母謂之，　比丘所為，　
　稱怨啼哭，　呵罵比丘。」

　佛之神力，　令彼天子，　至父母所，　呵責諫喻：　
「於此比丘，　勿生瞋恚，　莫於長夜，　受諸苦惱。
　德增女人，　先命終已，　即得上生，　三十三天。　
　離於女身，　得成男子，　為天人身，　光明遠照。　
　父母今當，　詣世尊所，　先不善心，　今應悔過。
　若除如來，　諸佛世尊，　更無有人，　可歸依者。」　

　以無畏心，　勸喻父母，　即時父母，　得聞佛名。　
　尋共和合，　至於釋迦，　牟尼佛所。　
　至佛所已，　頭頂敬禮，　二足之尊。　

「今者悔過，　本瞋恚心；　恭敬尊重，　人中之尊。
　今者應問，　如來自知。
　云何供養，　佛法及僧？　云何修習，　行於善行？
　如是所問，　願為說之，　若得聞已，　專心修行。」　
　佛知父母，　其心決定，　天人之師，　說如是言：　

「若欲供養，　一切諸佛，　專心堅固，　發菩提心。」
　德增父母，　及諸眷屬，　其數具足，　滿五百人。　
　聞天人師，　如是之言，　發菩提心，　而作大願。　
　爾時佛告，　賢者阿難：「汝今善聽，　我之所說。
　菩薩所行，　不可思議，　無上智慧，　及以方便。　
　愛作菩薩，　數數發願，　女人見我，　若發欲心，　
　尋時得離，　於女人身，　得成男子，　為人所尊。
　阿難汝觀，　德力如是，　若犯非法，　應墮惡道。　
　健士行之，　得壞魔眾，　令彼生天，　得為天人。　
　今此天子，　供養於我，　其心恭敬，　正向菩提。
　彼當供養，　無量世尊，　來世成佛，　號曰善見。　
　此五百人，　向菩提者，　亦當作佛，　為天人師。　
　佛有是德，　誰不供養？　是處深信，　得無量樂。
　非一女人、　非二非三，　無量百千，　那由他億，　
　見於愛作，　發婬欲心，　尋即命終，　得為男子。　
　大醫藥王，　有大名稱，　如是菩薩，　誰不尊敬？
　雖生欲心，　更得快樂，　況於菩薩，　生恭敬心。」

爾時尊者阿難白佛言：「世尊！譬如須彌山，若諸雜色至其邊者同一金色。世尊！若有眾生至菩薩邊者，若瞋心、若淨心、若欲[1]染心，如是一切悉皆同一薩婆若色。世尊！我從今日於諸菩薩生尊重心如須彌山。世尊！如有藥王名曰悉見，若有瞋心及清淨心服此藥者皆得除愈，彼藥能除一切諸毒。世尊！菩薩亦如是，若有瞋心淨心至菩薩所者，菩薩悉能為除一切貪恚癡病。」

爾時世尊讚阿難言：「善哉善哉，如汝所說。」

爾時摩訶迦葉白佛言：「世尊！未曾有也。菩薩摩訶薩最尊第一。若菩薩摩訶薩修諸禪定，修禪定已還入欲界教化眾生，雖行空無相無作用化眾生令成聲聞緣覺，以大慈悲自終不離薩婆若心。世尊！菩薩摩訶薩所行方便不可思議，如是雖受色聲香味觸縛，而於其中無所愛著。世尊！我今以樂說辯才說諸菩薩少分功德。」

佛告迦葉：「恣汝所說。」

「世尊！譬如大餓空澤有大高牆至無色界，彼大餓空澤唯有一門，而此澤中多有眾生。去澤不遠有一大城，豐樂熾盛端嚴淨妙，若有眾生入彼城中無老病死。向城之道唯廣一[2]尺，其路端直。彼澤眾中有一智人，聰[3]利叡智欻然起心，以大慈悲欲利益安樂一切眾生。此人即於空澤之中高聲唱言：『諸人當知，去此不遠有一大城，豐樂熾盛端嚴淨妙，多有天人所居止處。若有眾生入彼城中，無老病死，亦能說離老病死法。仁等可來當共詣彼，我與諸人作大導師。』彼空澤中有下劣眾生，生悕望心欲得求解，作如是言：『若能令我住此澤中，我當受教；若欲令我出此澤者，則不能受。』有上眾生作如是言：『我當共汝至所去處。』此空澤中薄福眾生聞如是唱，聞已不信不隨智人。世尊！爾時智人從空澤出，四向顧望見有一道，唯廣一[＊]尺迫迮狹小，其道左右有大深坑深百千肘。其智慧人於道左右以板椑之，其人於此匍匐而進不視左右。怨賊在後隨而怖之，其人爾時亦不顧後，其心勇銳不生怖畏。漸得過已遂見彼城，既見城已心無怖畏。入城之後無老病死，亦大利益無量眾生，為說離老病死之法。世尊！大餓空澤者，是生死餓也。有大高牆至無色界者，是無明有愛也。而此澤中多有眾生者，是一切生死凡夫人也。向城之道唯廣一[＊]尺者，一[4]支道也。彼澤眾中有智人者，是菩薩摩訶薩也。下劣眾生悕望欲解於澤不動者，是聲聞緣覺也。有上眾生作如是言，我當共汝至所去處者，是餘菩薩也。薄福眾生聞不信者，是一切邪見外道及其弟子也。大空澤中出者，是勤修一切智心者也。一[＊]尺[5]迮道者，是法性門也。其道左右有大深坑深百千肘者，是聲聞緣覺乘也。於道左右以板椑之者，智慧方便也。匍匐而進者，是菩薩以四攝法攝一切眾生也。怨賊在後而隨怖者，是[A1]魔及魔民、深起六十二見眾生并輕謗菩薩者也。不顧後者，是忍辱波羅蜜專心具足也。不視左右者，是不讚聲聞緣覺乘也。大城者，是一切智心也。漸得過已遂見彼城，既見城已心無怖畏者，是菩薩見佛及佛所行，一心敬佛智慧威德，善學般若波羅蜜，方便漸漸隨宜附近一切眾生無有疑難也。入城無老病死者，是菩薩利益無量眾生離老病死也。說法者，是如來、應供、正遍知也。世尊！我今敬禮一切菩薩。」說是語已，十千人天發阿耨多羅三藐三菩提心。

爾時世尊讚摩訶迦葉言：「善哉善哉。汝能勸發諸菩薩摩訶薩，汝能成就無量功德。菩薩摩訶薩，若業能自害及以害他，終不為之；若有言說能自害害他，亦[6]所不為。」

爾時德增菩薩摩訶薩白佛言：「世尊！若業若言能自害害他，一切菩薩所不為者，世尊！何故昔[7]於迦葉佛時，行菩薩道餘一生在，作大梵志名曰樹提，作如是言：『菩提之道甚為難得。何有禿人能辦此事？我不欲見。』世尊爾時作如是言，有何等義？」

佛告德增菩薩：「善男子！汝於如來、菩薩莫生疑也。何以故？佛及菩薩成就不可思議方便，佛及菩薩住種種方便而教化眾生。善男子！汝今諦聽，善思念之。有經名『方便波羅蜜』，今當為汝說之。爾時菩薩從然燈佛來漸學方便，今亦當為汝少開示分別。善男子！菩薩摩訶薩見然燈佛時即得無生法忍，從是已來無有錯謬、戲笑失念，無不定心、智慧不減。善男子！菩薩摩訶薩如其本願得無生忍七日之後，便能得成阿耨多羅三藐三菩提；若欲百劫亦能得成。菩薩摩訶薩為眾生故受一切有，隨所在處以智力故，隨其所求得畢所願，而後乃成阿耨多羅三藐三菩提。善男子！菩薩摩訶薩以方便力，無量億劫住於世界，亦無憂愁為不厭離。是名菩薩摩訶薩行於方便。

「復次善男子！菩薩摩訶薩所有禪定，若聲聞入者，身心不動，心便自謂入涅槃已。若菩薩入者，身心精進無有懈怠，以四攝法攝取眾生，大慈悲故以六波羅蜜教化眾生。是名菩薩摩訶薩行於方便。

「復次善男子！菩薩如其本願處兜術天宮，能得阿耨多羅三藐三菩提、轉于法輪，非為不能。菩薩於兜術天上如是思惟：『閻浮提人不能至此兜術天上聽受法教，兜術天人能下閻浮提聽法。』是故菩薩捨兜術天，於閻浮提成阿耨多羅三藐三菩提。是名菩薩摩訶薩行於方便。

「復次善男子！菩薩如其本願從兜術天來不入母胎，亦能即成阿耨多羅三藐三菩提。若不入者，諸眾生或當生疑，作如是言：『是菩薩從何處來？若天、若龍、若鬼神、若乾闥婆、若變化作？』如是疑已不能聽法，不能修行斷諸煩惱。是故菩薩摩訶薩非不入母胎，成阿耨多羅三藐三菩提。是名菩薩摩訶薩行於方便。善男子！勿謂菩薩實處母胎，生如是見。何以故？菩薩摩訶薩實不入母胎。所以者何？菩薩入無垢定，不起此定從兜術天下，乃至坐於菩提樹下，兜術天人作如是念：『菩薩命終已，更不還此。』菩薩是時在兜術天實自不動，而現入胎、受於五欲、若生出家及以苦行。一切眾生以之為實，而於菩薩皆是變化。菩薩變化入胎、受欲、現自娛樂、出家苦行，悉是菩薩變化所為。何以故？菩薩爾時所行清淨更不入胎，久以厭離故。是名菩薩摩訶薩行於方便。

「以何緣故，身似白象示入母胎？善男子！於此三千大千世界菩薩最尊，成就白淨法故，現似白象入於母胎，更無天人鬼神能作如是入母胎者。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩處胎足滿十月然後乃出？善男子！有餘眾生或生是心：『若不滿十月，此童子身或不具足。』是故菩薩現處胎中滿足十月。從初入胎至滿十月，於其中間常有諸天來在母邊禮敬圍遶。是時諸天見菩薩身所處高樓，純以七寶莊嚴，非天所有。見是瑞已，有二萬四千天子發阿耨多羅三藐三菩提心。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩從右脇入胎？善男子！或有眾生作如是疑，謂菩薩從父母精和合而生。為斷彼疑、欲現化生，故從脇入。既入脇已無有入處，而摩耶夫人昔來未曾得也如是身心快樂。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩空閑處生，非於家中及以城內？善男子！菩薩先來常樂空閑處、讚嘆空處、讚嘆山林閑靜之處，行於寂滅。菩薩若處家中生者，天、龍、鬼神、乾闥婆等，不持花香末香塗香、[1]諸天百千無量伎樂而來供養。[2]時迦毘羅城所有人民，其心荒迷放逸自高，不能供養菩薩。是故菩薩在空閑處生，不於城內及以家中。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩母仰攀絳賴叉樹枝而生菩薩？善男子！有[3]情生疑，摩耶夫人生菩薩時受諸苦惱如餘女人。示彼眾生受快樂故，仰攀樹枝而生菩薩。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩以正念從右脇出，非餘身分？善男子！菩薩淨行於三千大千世界最尊最勝，不因女根住、不因女根出，是一生菩薩示現如是，非餘梵行人，是故菩薩從右脇出。既出生已亦無出處，如前，後亦如是。是名菩薩摩訶薩行於方便。以何緣故，菩薩初生時釋提桓因以寶衣承取，非餘天人？善男子？釋提桓因昔發此願：『菩薩若生，我當以寶衣承取。』以菩薩善根妙故，增益餘天信敬供養。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩生時即行七步，非六非八？善男子！必定菩薩有大神力勤精進大丈夫相欲示現眾生，餘人不能如是示現。若以七步益餘眾生者，菩薩行於六步；若以八步益餘眾生者，[4]即行七步。是故菩薩無人扶持令行七步，非六非八。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩行七步已，唱如是言：『我於世界中最尊最勝，離老病死。』善男子！爾時眾中釋梵諸天及諸天子心懷憍慢，自言是世界中尊。彼諸天子傲慢自高心無恭敬，爾時菩薩作如是念：『彼諸天子有是慢心，以慢心故長夜墮在三惡道中。』是故菩薩說如是言：『我於世界最尊最勝，離老病死。』菩薩爾時唱如是言，其音遍聞三千大千世界。或有諸天，菩薩生時未來集者，聞此聲已皆悉來集。爾時欲色界天合掌恭敬向菩薩禮，各相謂言：『未曾有也。』是故菩薩行七步已作真實言：『我於世中最尊最勝，離老病死苦。』是名菩薩摩訶薩行於方便。

「以何緣故，行七步已而便大笑？善男子！菩薩不為欲故笑、不為慢故笑、不為輕故笑。爾時菩薩如是思惟：『是諸眾生如本有欲恚癡及諸煩惱，今亦如是。我本已勸令發阿耨多羅三藐三菩提，我今已成，而彼眾生懈怠懶惰，故在生死苦惱海中未斷煩惱。如此眾生與我同時發菩提心，我今已成阿耨多羅三藐三菩提，而彼眾生懈怠懶惰，故在生死苦惱海中。是下劣眾生為利養故，不勤精進求一切智。是諸眾生今猶禮敬供養於我，我於爾時生大悲心，我今已滿所願。』以是因緣菩薩大笑。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩生時身體清淨先無垢穢，釋提桓因及梵天王洗浴菩薩？善男子！菩薩欲令釋梵諸天興供養故，亦以世法如初生嬰兒應洗浴故，是故菩薩雖身無垢而令釋梵洗浴。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩在空閑處時不即至道場而還入宮？善男子！欲令諸根具足故示處宮殿五欲自娛，然後捨四天下而行出家；復為欲化餘人令捨五欲，剃除鬚髮法服出家，故作是示現。是故菩薩復還入家，不於空閑之處即詣道場。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩適生七日，摩耶夫人尋便命終？善男子！此是摩耶夫人命根盡故，非菩薩咎也。菩薩先在兜術天時，以天眼觀摩耶夫人命根，滿十月已餘有七日在，爾時菩薩便從兜術天來。菩薩以方便知摩耶夫人命根欲盡故來下生，非菩薩咎。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩善學書論博弈射御軍策計謀種種[1]伎藝？善男子！學世法故。菩薩於三千大千世界中無有一事而不知者。若偈、若辭辯、若應辯、若呪術、若戲笑、若歌舞作樂、若工巧，菩薩生時已一切善知。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩納妃婇女眷屬？善男子！菩薩不以欲故。何以故？菩薩是離欲丈夫。爾時菩薩若不示現妻婦男女者，眾生當謂菩薩非是男子。眾生若作是疑，得無量罪。欲斷彼疑，故取釋種女，示現有羅睺羅。若人謂羅睺羅是父母和合生者，莫造斯觀。而羅睺羅天上命終來下入胎，非是父母和合故生。又羅睺羅有本願故，若有一生補處菩薩，我當為作子。瞿夷本於然燈佛時作如是言：『從今已後，願為此梵志乃至一生補處，常為我夫、我為其妻。』爾時菩薩即受七[2]枝優鉢羅花已，作如是言：『我雖不受，今當滿此善女人願。』作是願已，不離七花善根，是故菩薩納以為妃。復次一生菩薩成就示現處於宮殿婇女之中。爾時菩薩成就妙色，諸天供養成就出家，釋種女悉見如是眾事具足，其心專一作如是願發菩提心：『願我具足如是眾事。』是故菩薩為令瞿夷發此心故納以為妻。復次有大心眾生處在居家，五欲財寶、僮僕眷屬種種受已，菩薩為彼眾生令捨居家五欲財寶僮僕眷屬而行出家，故示是事。是故菩薩示處居家五欲財寶僮僕眷屬，捨而出家。眾生見已如是思惟：『菩薩所受五欲最妙無上，尚能捨之出家，何況我等而不出家？』復次菩薩所有妻婦男女，皆是本行菩薩道時以諸善法所可化者。此諸眾生亦作是願：『若以此菩薩乃至一生，常當為作妻子眷屬。』亦欲增益如是諸人白淨法故，是故菩薩處妻子眷屬。

「[3]復次菩薩處宮殿者，為欲教化四萬二千婇女令發阿耨多羅三藐三菩提心，亦令餘人不墮惡道，是故菩薩處在宮殿妻子眷屬。復次一切女人盡為欲火所燒，若見菩薩即離婬欲。復次菩薩變作諸身，顏貌脩短與本無異。彼諸女人與化菩薩共相娛樂，各各自謂與實菩薩共相娛樂，彼時菩薩常在禪定修安樂行。如化菩薩受於五欲無有欲想，真實菩薩亦復如是，從然燈佛來乃至一生已離婬欲。是名菩薩摩訶薩行於方便。車匿揵陟本願亦復如是。

「以何緣故，菩薩在閻浮提樹下思惟？善男子！為欲教化七億諸天故。復次菩薩欲令父母知，菩薩必定剃除鬚髮法服出家。復次菩薩欲示現增益智慧，閻浮樹隨蔭菩薩，欲令眾生增益善根故，是故菩薩在閻浮樹下坐禪思惟。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩不以五欲自樂而出城遊觀？善男子！欲示現見老病死人故，令諸眷屬知菩薩畏老病死故出家學道，非為貢高損減眷屬故出家，欲利益眷屬故出家。菩薩見在家過患是故出家。而此菩薩為示一切眾生老病死苦，是故菩薩不樂五欲出城遊觀。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩夜半出家？善男子！欲示現利益眾生善根。菩薩隨所住處增益眾生善根，善男子！亦為白淨法故捨離五欲，不告眷屬而便出家。離諸歡樂終不離於白淨之法，是故菩薩夜半出家。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩以睡眠覆蓋宮人伎女然後出家？善男子！欲令出家之過悉在諸天故。有眷屬諸親或見菩薩出家便生瞋憤之心。若菩薩如是思惟：『是人有惡心於我，便當長夜受苦墮三惡道。』彼眷屬諸親作如是知，此是諸天以睡眠覆故，開門引道昇空而去，非菩薩過也。爾時諸人增益信心，於諸天所生不信心。是故菩薩見如是過，以睡眠覆蓋宮人伎女然後出家。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩遣車匿白馬及寶衣瓔珞而送還家？善男子！欲令眷屬知菩薩不貪在家名衣上服及諸寶瓔。復次菩薩如是觀，我今作如是學，亦令諸人學我捨諸所有，於佛法出家。諸人如是學已，遠離一切所愛之物，持四聖種行；唯不聽父母不放而得出家。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩以刀自下其髮？善男子！於三千大千世界中，無有天、龍、鬼神、乾闥婆、人非人能當近菩薩威德者，何況能與剃髮？復次菩薩示現欲令眾生深信，菩薩欲出家故自持刀下髮。復次菩薩為淨飯王故。爾時淨飯王生於惡心，自恃豪族傲慢而言：『誰剃我子髮，我當誅戮。』爾時淨飯王聞菩薩自持刀下髮，王聞是已惡心即滅。是名菩薩摩訶薩行於方便。

「善男子！汝今善聽。以何緣故，菩薩苦行六年？善男子！非是菩薩宿業餘報受此苦也，欲令眾生於一切惡業報中能生患心歸向菩薩。復次善男子！昔迦葉佛時，菩薩爾時作如是言：『我不欲見此禿頭道人。何有禿人能得菩提？菩提之道甚深難得。』如此之輩亦是菩薩示行方便。此所說者當知其義。以何緣故，菩薩作是麁惡之言？善男子！爾時迦葉佛出於世時，有婆羅門子名曰樹提。有親友五人皆是大婆羅門子，先學大乘。彼時五人久來親近惡知識故，[1]失菩提心。善男子！彼時五人於迦葉佛時奉事外道不信佛法，解外道語不解佛語，解外道法不解佛法。彼時五人事外道師。彼師自言：『我是佛世尊，是一切智。我亦有菩提道。』爾時樹提梵志行於方便，欲誘引五人還成寶器故，欲轉彼五人外道邪心，以方便故至瓦師所，作如是言：『我今欲見禿頭道人。何有禿人能得菩提？菩提之道甚深難得。』善男子！說是語已復經少時，樹提梵志與彼五人在一屏處，爾時瓦師便至其所。至其所已，即向樹提梵志讚迦葉佛如來、應、正遍知，復向樹提作如是言：『汝可與我共至佛所。』善男子！爾時樹提梵志如是思惟：『此五人者善根未熟。若我當讚迦葉佛非外道師者，而此五人心當生疑，若至佛所無有是處。』爾時樹提自護本願故、般若波羅蜜報行方便故，作如是言：『我不欲見此禿頭道人。何有禿人能得菩提？菩提之道甚深難得。云何般若波羅蜜報菩薩行？般若波羅蜜無有菩提想、無有佛想，爾時[2]不見佛、不見菩提，亦不於內見菩提、亦不於外見菩提、亦不於內外見菩提，如是悉知菩提空無有法。』爾時樹提知一切法無所有故，行於方便作如是言：『我不欲見禿頭道人。何有禿人能得菩提？菩提之道甚深難得。』善男子！復於異時，樹提梵志與彼五人至河水邊。爾時瓦師承佛神力，為化五人故復至其所，向樹提梵志作如是言：『汝可共我至於佛所，禮拜供養恭敬尊重讚歎。諸佛世尊出世甚難。』彼樹提梵志聞瓦師歎故不肯去，彼時瓦師尋前以手捉梵志髮，強牽將去向於佛所，彼時五人傾心隨逐樹提梵志遂至佛所。時國常法，若捉他髮，設其告官，捉者應死。爾時[3]五人生邪見，見樹提梵志[4]他捉其髮心傾隨逐。『彼如來法有何功德，乃令瓦師不計死罪，捉樹提髮將至佛所，禮拜供養恭敬尊重讚歎？』爾時五人其心傾向至迦葉佛所。既得見佛，本願還發生信敬心。生信敬心已，即於佛前呵責樹提：『如是世尊有如是威德，如本聞已，何得心不信敬？』善男子！爾時五人見迦葉佛威德又聞辯才，還發阿耨多羅三藐三菩提心。爾時迦葉佛見五人已得專心，為說菩薩藏不退轉輪陀羅尼金剛句無生法忍，次第而說。爾時五人即得無生法忍。善男子！我今已得具足佛智，彼時樹提梵志若當讚歎迦葉佛、不讚外道師，若彼五人到佛所者無有是處，況生信敬心耶。善男子！樹提梵志為化五人學菩薩乘，故以般若波羅蜜果報行於方便，作如是言：『我不欲見禿頭道人。何有禿人能得菩提？菩提之道甚深難得。』善男子！不退菩薩於佛無疑、於菩提無疑、於佛法無疑。是名菩薩摩訶薩行於方便。復次菩薩為教化五人及自示業報，以業障故六年苦行，非如餘眾生不知不見。持戒沙門婆羅門故說如是惡言，若知若不知、若解若不解，彼諸眾生長夜受諸苦惱、不得利益墮三惡道。為彼眾生自現作業亦現受報，是故如來現受是報。菩薩無有一切障礙業報，以有眾生誹謗持戒沙門婆羅門，憂惱覆心不得解脫、不得道果。為除眾生憂惱心故，現受如是業報。彼諸眾生作如是念：『一生菩薩誹謗迦葉佛，而彼菩薩尚得解脫，況我不知而作惡言？是故我今當自悔過，一切惡業更不得作。』復次善男子！為調伏諸外道故六年苦行，非實業障礙。何以故？世間沙門婆羅門，日食一麻一米謂得清淨解脫。菩薩為調伏彼故，示現日食一麻一米。菩薩若食麁澁尚不能得聖道，何況清淨解脫？是故菩薩作如是言：『我不欲見禿頭道人。何有禿人能得菩提？菩提之道甚深難得。』是故菩薩以此緣故現六年苦行，為調伏五十二百千麁行諸天，及外道神仙、麁行菩薩。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩食已得氣力充足至菩提樹，不以羸瘦至菩提樹？善男子！菩薩能不飲食身體羸異成阿耨多羅三藐三菩提，況食麻米耶。爾時菩薩為愍當來眾生故，食此上妙食。何以故？眾生善根未熟，不噉飲食而欲求道，彼諸眾生飢渴苦故不能得智慧。若安樂行能得智慧，照明諸法非苦行也。是故菩薩示眾生行安樂行而得智慧，亦愍當來眾生故，欲令眾生效我食此妙食，是故食修舍佉[1]尼食已，成三十七助菩提法，得阿耨多羅三藐三菩提，施食女人亦成就助菩提法。復次菩薩在一禪中生歡喜心，於百千劫不食能住。是名菩薩摩訶薩行於方便。

「以何緣故，菩薩從吉安天子求草敷座？善男子！過去諸佛敷解脫坐不以[2]綩綖妙物，亦欲成就吉安天子助菩提法。爾時吉安與菩薩草已，發阿耨多羅三藐三菩提心。善男子！今我當與受記：『彼吉安天子於未來世當得成佛，號曰無垢如來、應、正遍知。』是名菩薩摩訶薩行於方便。

「以何緣故，菩薩坐菩提樹下，使惡魔波旬至菩提樹下，不欲令菩薩即成阿耨多羅三藐三菩提？善男子！魔本不能至菩提樹下。若我不召而能來此者，無有是處。善男子！爾時菩薩坐菩提樹下如是思惟：『於四天下誰為最尊第一？此四天下今為屬誰？』菩薩即知惡魔波旬欲界最尊。『今我與魔共鬪，魔若不如，一切欲界所有眾生悉皆不如。爾時當有諸天大眾和合而來到菩提樹下，到已必生信心。魔眾、天眾、諸龍、鬼神、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽，如是一切眾來遶菩提樹。彼諸眾等見菩薩師子遊戲，見已或發阿耨多羅三藐三菩提心，或[3]發[4]菩薩心，或生信心，彼人乃至見菩薩因緣故盡得解脫。』善男子！菩薩如是思惟已，放眉間白毫相光，能令波旬宮殿黑闇。爾時三千大千世界以光明照故普令大明，此光明中出如是聲：『彼釋種子出家學道，今當成阿耨多羅三藐三菩提。過魔境界勝出魔眾，減損當來一切魔眾。今彼菩薩與魔共戰。』善男子！爾時波旬聞是聲已，心大憂愁如箭入心。時魔波旬嚴四種兵滿三十六由旬，一切皆來圍菩提樹，欲為菩薩作大留難。爾時菩薩住大慈悲及大智慧，以智慧[5]執金色之手而以[6]拍地，[＊]拍已一切魔眾尋時散壞。魔眾壞已，八萬四千億天、龍、鬼神、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽、拘槃荼等如是大眾，見菩薩威德身體[7]微妙容顏端嚴威力勇健，發阿耨多羅三藐三菩提心。是名菩薩摩訶薩行於方便。

「以何緣故，如來於七日七夜不捨結[8]加趺坐，仰觀菩提樹目不暫眴？善男子！爾時有色界天行寂滅行，彼諸天等見如來結[＊]加趺坐心生歡喜，生歡喜已如是思惟：『今我當求沙門瞿曇心何所依？』彼諸天人於七日七夜作是求已，不得如來一念依處。彼時諸天倍增喜悅，有三萬二千天子發阿耨多羅三藐三菩提心，作如是願：『我等於未來世當得如是寂滅之行，仰觀菩提樹。』是故如來得成道已，於七日七夜結[＊]加趺坐，仰觀菩提樹目不暫眴。是名如來方便。

「以何緣故，如來本行菩薩道時[1]修無量阿僧祇行願，諸一切眾生與解脫樂。何以方待梵王請然後說法？善男子！如來有如是知，多有天人歸依梵王、尊重梵王。彼諸眾生作如是知：『梵天王化生我等，世界最尊，若除梵王更無有能造世界者。』善男子！爾時如來如是知已——『[2]今我[3]當待梵王勸請。』若彼梵王一傾首者，諸可歸依梵王眾生悉皆歸依。當相謂言：『梵王勸請如來說法，非為不請。』善男子！如來有大威德故，梵王來至我所勸請說法轉於法輪。善男子！若我不以神力令梵王請者，然彼梵王先無有心能來請佛。善男子！由諸眾生依梵王故，欲令眾生離於梵王，待其勸請，以梵王為證故。善男子！爾時梵王勸請如來轉於法輪，彼時六十八百千梵天發阿耨多羅三藐三菩提心，作如是言：『此真是佛，於眾生中最尊最勝。』作如是願言：『我來世得成就如是智慧威德。』是名如來方便。

「善男子！我先於說示現眾生十業因緣，或是菩薩、或是如來，於此十中示現方便，唯有智者能知是義。善男子！不應生念，謂菩薩當有微細之罪。若菩薩成就如[4]是微細不善之法坐於道場成阿耨多羅三藐三菩提者，無有是處。何以故？善男子！如來成就一切善法、斷一切不善法，無有生死業報習氣，若有遺餘不斷滅者，無有是處，何況有障礙業報。善男子！若有眾生謂無業報不信業報，為是眾生示現業報因緣。如來實無業報，我是法王尚受業報，況餘眾生而不受耶？為彼眾生作如是示現，是故如來自現業緣。善男子！如來無有一切業障。譬如書師善學書論教諸幼童，隨諸幼童讚諸書章，非是書師於諸書章有障礙也。書師作如是念：『彼諸幼童當隨我學。』善男子！彼書師非為不達故作如是唱。善男子！如來亦復如是，於一切法善學已，如是說如是示，為餘眾生令行業清淨故。善男子！譬如大藥師，善能療治一切諸病。自無有病，見諸病人而於其前自服苦藥。諸病人見是藥師服苦藥已，然後效服，各得除病。善男子！如來亦復如是，自除一切煩惱病已，於一切法無有障礙，能示現一切法，以是不善業故得如是報。現如是緣，欲令眾生除一切身口意業障行於淨行。善男子！譬如長者子、若居士子，父母愛念與其乳母。時此乳母無有病痛，為嬰兒故自服苦藥，欲令乳得清淨。善男子！如來亦復如是，是一切世界之父，為教化不知業報眾生故，如來無病而為眾生示現作病，以是業故得如是報，以此業故得如是報。眾生聞已心生驚畏，除諸惡業不作惡緣。」

佛復告智勝菩薩：「善男子！乃往過去世[5]遇然燈佛，時有五百賈人為求珍寶入於大海。善男子！時賈人中有一惡人——多懷奸偽，常行惡業初無悔心，善知兵法恒為寇賊，奪他財物以為產業——狀如賈人，共諸賈人同載一船。時彼惡人如是思惟：『此諸賈人大得珍寶，我今當殺此諸賈人，取其珍寶還閻浮提。』如是思惟已欲殺諸人。善男子！爾時有人名曰大悲，於彼眾中作[6]大導師。時彼導師於夜夢中，見海鬼神來作是言：『汝此眾中有一惡人，如是相貌，恒為寇賊劫他財物。彼人今生如是惡心：「我當殺此五百人已，取其財物還閻浮提。」若此惡人得遂本心殺五百人者，作大惡逆業。何以故？此五百人皆是向阿耨多羅三藐三菩提不退轉菩薩。若此惡人殺諸菩薩，以此業緣障礙罪故，一一菩薩從初發心乃至成阿耨多羅三藐三菩提，爾時惡人於其中間常在地獄。汝為導師可作方便，令彼惡人不墮地獄，彼五百菩薩亦復可得全其身命。』善男子！爾時大悲導師如是思惟：『作何方便令彼惡人不墮地獄，五百菩薩全其身命？』作如是思惟已，乃不向一人說是事也。爾時待風，餘有七日當還閻浮提。七日過已如是思惟：『更無方便，唯有除此一惡人者，爾乃可令此五百人得全身命。』復作是念：『若我向餘人說，此五百人當生惡心。生惡心已殺此惡人，彼諸人等當墮惡道。』善男子！大悲導師如是思惟：『我今當自殺之。我以殺此人故，雖百千劫墮惡道中受地獄苦，我能忍之。不令惡人害五百菩薩，作此惡緣受地獄苦。』善男子！爾時大悲導師生哀愍心作是方便，吾護五百人故害此惡人。是時導師即以𥎞[7]矛刺殺惡人，令諸賈人安隱得還至閻浮提。

「善男子！汝勿有疑。爾時導師，則我身是也。五百賈人，此賢劫中五百菩薩是也，當於此劫中成阿耨多羅三藐三菩提。善男子！我於爾時行方便大悲故，即得超越百千劫生死之難。時彼惡人命終之後，生善道天上。善男子！汝今當知，勿謂菩薩有如是障礙業報而得超越百千劫生死之難，即時是菩薩方便力也。

「善男子！如來為一切眾生故而作是方便，示現佉違羅刺。善男子！爾時佉違羅刺刺如來足，善男子！佛神力故令刺入足。何以故？如來金剛之身無能壞者。善男子！昔舍衛城中有二十人，皆是最後邊身。彼二十人更有怨家二十人，各各思惟：『我當為作親友而至其舍，奪其命根，不向人說。』善男子！彼時二十最後身者，及二十怨家人，以佛神力故共至佛所。善男子！如來爾時為調伏是四十人故，於大眾中告大目揵連言：『今此地中出佉違羅刺欲刺吾右足。』未至足之間，此佉違羅刺即從地出長一肘。當出之時，目連白佛言：『世尊！我今當取此刺擲著他方世界。』佛告目連：『非汝所能。此佉違羅刺今在此地，汝不能拔。』爾時目連以大神力前拔此刺，于時三千大千世界皆大震動，一切世界隨刺而舉，不能動刺乃至一毛。善男子！爾時如來以神通力上四天[1]王，彼佉違羅刺亦隨佛去。爾時如來復至三十三天、夜摩天、兜術天、化樂天、他化自在天，刺亦隨去；乃至梵天亦復如是。爾時如來從梵天還至閻浮提舍衛城中本所坐處，刺亦逐還至此地中竪向如來。爾時如來即以右手捉佉違羅刺，左手安地右脚踏之，爾時三千大千世界皆大震動。時尊者阿難即從坐起，偏袒右肩，為佛作禮，合掌向佛而作是言：『世尊！往昔作何等業得如是報？』佛[2]告阿難：『我過去世入大海中，持𥎞刺人斷其命根。阿難！以此業緣得如是報。』善男子！我說是業緣已，彼時二十怨賊欲害二十人者作是思惟：『如來法王尚得如是惡業之報，況我等輩不受此報？』是二十人即從座起，頭面禮佛，作如是言：『我等今日向佛悔過，不敢覆藏。世尊！我先惡[3]心欲害彼人，今重悔過不敢覆藏。』爾時世尊為彼人故，說作業緣及盡業緣。時二十人聞是法已即得正解，及四萬人亦得正解。是故如來示佉違羅刺刺足，是名如來方便。

「以何緣故，如來先無諸病，而從耆域藥王索優鉢羅花嗅之令下。善男子！爾時如來制解脫戒未久，時有五百比丘是最後身，常在餘諸林中修道。彼諸比丘得如是病，陳故之藥所不能治。彼諸比丘敬慎佛戒，不求餘藥不服餘藥。善男子！爾時如來如是思惟：『作何方便聽服餘藥？若我聽者，彼諸比丘當求餘藥當服餘藥。何以故？若如來不聽者，後諸人輩當犯聖法。』是以如來行方便故，從耆域藥師求優鉢羅花嗅之令下。時淨居天即至彼比丘眾中作如是言：『大德！[4]可求餘藥，莫守病而死。』比丘答言：『我等不敢違世尊教，我等不得自在，我等寧死不違佛教，我等不求盈長好藥。』如是說已，淨居天子語諸比丘言：『大德！如來法王求餘好藥、捨陳故藥。諸大德可求餘藥。』諸比丘[5]聞語已，除去疑心更求餘藥，更服餘藥然後除病，除病已不過七日證阿羅漢果。善男子！若如來不求餘藥，彼諸比丘亦不求餘藥。若不求餘藥，能除諸病及斷諸結證於阿羅漢果者，無有是處。是名如來方便。

「以何緣故，如來入城乞食空鉢而出？善男子！如來無有業障，爾時如來矜愍護念當來比丘，或有比丘入於城邑聚落乞食，自無福德乞食不得。彼比丘當作是念：『如來世尊功德成就，入城乞食空鉢而出，何況我等善根微薄？我等不應以乞食不得而生憂惱熱。』是故如來示現入城乞食空鉢而出。善男子！汝若謂惡魔波旬能覆蔽城中長者婆羅門心故，乃至不與一摶食者，善男子！莫作斯觀。何以故？惡魔波旬不能斷絕如來食也。爾時佛神力故，令惡魔波旬覆蔽彼城中人，非是惡魔力之所能。我於爾時都無業障，為化彼眾生故，示現空鉢而出。爾時我及比丘僧不得食已，一切魔天及諸餘天作如是念：『佛及眾僧不得食已，頗有憂耶？』即於其夜見佛及僧，乃至無有一念憂惱，心亦不高亦復不下，如前後亦如是。善男子！爾時有七千天子，傾向如來生信敬心。我於是時即為說法，於一切法得法眼淨。善男子！彼時婆羅門長者，其後不久又聞世尊有大威德，生渴仰心即至佛所，頭面作禮向佛悔過。彼時如來即為其說四聖諦法，一說法時有二萬人於一切法中得法眼淨。是故如來入城乞食空鉢而出，是名如來方便。

「以何緣故，旃遮婆羅門女以木[A1]杅繫腹誹謗如來，而作是言：『由沙門瞿曇令我[1]妊身，應當與我衣被飲食。』善男子！如來於此事中都無業障。若有業障，我能擲此旃遮婆羅門女置恒河沙世界之外。如來以方便故現此業障，為化不知解眾生故。何以故？當來之世有諸比丘於我法中出家學道，爾時或為他人所謗，以是緣故心生慚愧，或不樂佛法捨戒還俗。彼諸比丘若被謗已當念如來，如來成就一切善法具大威德尚被誹謗，而況我等不被誹謗，思念是已則除慚愧，除慚愧已當得修習淨妙梵行。善男子！旃遮婆羅門女常為惡業所覆故性多不信，今此女身於佛法中不得調伏，常為惡業之所覆蔽，乃至夢中亦生誹謗，覺已心喜。此女人中命終當墮地獄。善男子！我能以餘方便除此女人諸不善業，令度生死能為作救。善男子！或時如來不救餘人。何以故？如來於一切眾生無有偏心，是名如來方便。

「以何緣故，諸婆羅門殺婆羅門女孫陀利，埋祇洹園塹中？善男子！如來是時知有是事，捨而不說。如來成就一切智心無有障礙，能以神力可令此刀不入女身。我於爾時知孫陀利女命根將盡必為他殺，以此方便令諸外道不善[2]彰露墮不如處。如此諸事唯佛知之安住是事，令多眾生生清淨心增益善根。爾時如來七日不入舍衛大城。不入城已，爾時調伏六十億天過七日已，諸天世人集會共來至於我所。爾時如來為四眾說法，聞說法已有八萬四千人於諸法中得法眼淨。是名如來方便。

「以何緣故，如來及僧在於婆羅門毘蘭若聚落三月之中食馬麥耶？善男子？我於昔時知此婆羅門，必捨初始請佛僧心不給飲食，而故往受請。何以故？為彼五百馬故。此五百馬於先世中，已學菩薩乘、已曾供養過去諸佛，近惡知識作惡業緣，惡業緣故墮畜生中。五百馬中有一大馬名曰日藏，是大菩薩。是日藏菩薩於過去世在人道中，已曾勸是五百小馬發菩提心，為欲度此五百馬故現生馬中。由大馬威德故，令五百馬自識宿命，本所失心而令還得。善男子！我愍彼五百菩薩墮馬中者，欲令得脫離於畜生，是故如來知故受請。善男子！是時五百馬減所食麥半持施僧，大馬半分奉施如來。爾時大馬為五百馬，以馬音聲而為說法亦教悔過：『今當禮佛及比丘僧。』說此事已復作是言：『汝等當以所食半分供養於僧。』爾時五百馬悔過已，於佛及僧生淨信心。過三月已，其後不久是五百馬命終生於兜術天上。彼五百天子即從天來至於佛所供養如來，爾時如來即為說法，聞說法已必定得成阿耨多羅三藐三菩提。彼時五百馬子善調伏其心，於將來世得辟支佛。彼日藏大馬於當來世供養無量諸佛，得成助菩提法，然後作佛，號曰善調如來、應供、正遍知。善男子！無有世中上妙美味而如來不得。善男子！如來雖食草木土塊瓦礫，三千大千世界中無如是味似如來所食草木土塊瓦礫味者。何以故？善男子！如來大人得味中上味相，若如來以最麁食著[3]口中已，其所得味勝天妙食。善男子！以是故知如來所食最是勝妙。善男子！爾時阿難心生憂惱：『轉輪聖王種出家學道，如下賤人食此馬麥。』我於爾時見阿難心。見阿難心已即與阿難一粒麥，語阿難言：『汝甞此麥味為何如？』阿難甞已生希有心，白佛言：『世尊！我生王家長大王家，未曾得如[4]是之味。』阿難食此麥已，七日七夜更不飲食無飢渴想。善男子！是故當知，是如來方便，非是業障。善男子！有沙門婆羅門持戒如我受他請已，而知請主荒迷不能供給，或不肯住。以是緣故，如來已所許處現必就請，及欲示現業報緣故。善男子！當知如來常法，雖受他請不得供給，不令請主墮於惡道。善男子！若彼五百比丘共如來夏安居食馬麥者，有四百比丘多見淨故生貪欲心。彼諸比丘若食細食增益欲心、若食麁食心則不為貪欲所覆。彼諸比丘過三月已，離婬欲心證阿羅漢果。善男子！為調伏五百比丘、度五百菩薩故，如來以方便力受三月食馬麥，非是業報。是名如來方便。

「以何緣故，如來十五日說戒時，告長老迦葉：『我今背痛。汝今說七覺[5]支法。』善男子！爾時有八千天子以聲聞法而自調伏，在彼眾中和合共坐。善男子！彼諸天子於過[6]去世是大迦葉所教化者，於佛法僧而不放逸。彼諸天子數聞迦葉比丘說七覺法。善男子！此諸天子除迦葉比丘，若百千諸佛為其說法不能令解。爾時迦葉為諸天子廣說七覺法，諸天子從迦葉比丘聞七覺法已得法眼淨。善男子！若有眾生病苦纏身，不能得至於說法之處聽法恭敬。彼諸人等當作是念：『佛是法王，尚聽七覺法而得除病，何況我等不往聽法不恭敬法？』善男子！為調伏諸天除人苦患故，又示現敬重於法，是故如來作如是言：『迦葉！我今背痛。汝當說七覺法。何以故？尊重法故。』如來無有麁重四大之身，何況有病？是名如來方便。

「以何緣故，釋種破時，如來自言我頭痛耶？善男子！或有眾生作如是言：『世尊不能利益親族，亦不矜愍、不欲安隱，而出家已種族意斷不欲救護。』是諸眾生以不知故作如是言。善男子！如來於諸苦本已到其邊，如來知是眾生心所念故，坐舍耶樹下自言頭痛。善男子！吾於爾時尋向阿難說我頭痛。時有斷見三千天子，復有無量好殺生者，皆共集會。為彼斷見天子及好殺者，示現業障故作是言：『吾以眼見他殺生心隨喜故，今得頭痛。』說是法已，七千人天皆得調伏。是名如來方便。

「以何緣故，頗羅墮婆羅門以五百種罵詈佛，如來聞已能忍？善男子！如來能以神力擲此婆羅門置餘世界，亦能以神力令婆羅門乃至不能出於一言罵詈之聲。善男子！時彼眾中多有人天，見如來能忍惡罵不說不答，生於捨[1]心等心利益心堪忍心，前如後、後如前。爾時有四千人發阿耨多羅三藐三菩提心。如來見如是義，又頗羅墮婆羅門以五百種惡罵已，見佛世尊生於捨心。善男子！是婆羅門見如是已生信敬心！歸依佛法僧種解脫根。是名如來方便。

「善男子！提婆達多與菩薩世世共生一處，此輩亦是菩薩方便。何以故？我因提婆達多故具滿六波羅蜜，亦多利益無量眾生。云何知爾？善男子！爾時眾生快樂，不知行施不知受者。菩薩爾時欲教行布施，是時提婆達多起嫉妬心至菩薩所，求國城妻子及頭目手足。爾時菩薩歡喜施與。時有無量眾生見菩薩施心生歡喜信解布施，作如是言：『如菩薩施，我亦如是行[2]於布施，願成[3]菩薩。』善男子！提婆達多或見菩薩持戒清淨知已，欲破菩薩所持之戒。爾時菩薩不毀淨戒。時有無量眾生見菩薩持戒亦效持戒。菩薩持戒或為他人輕毀惡罵不生惡心，爾時具足羼提波羅蜜。有無量眾生見菩薩以忍調心，亦效菩薩行於忍辱。善男子！當知提婆達多大利益菩薩。善男子！如今提婆達多放大醉象欲害如來！亦於耆闍崛山推下大石！俱是如來方便示現非業報罪。何以故？由此方便利益無量眾生。

「善男子！如來總說十業因緣，皆是如來方便示現非是業報。何以故？眾生不知業因所得果報。為眾生故，如來示現如是業報，此業作已得如是報，彼業作已得如是報，作如是業得如是報。眾生聞已，作如是業離如是業，離不善業修習善業。善男子！今說方便已、示現方便已，此諸方便堅持祕藏，不應為下劣之人薄善根者說。何以故？此經非聲聞辟支佛之所行處，況下劣凡夫能信解耶。何以故？此人不能學諸方便。所以者何？此方便經非其所用故，非餘[4]瓦器所能受持，唯有菩薩於此方便法能說能學。善男子！譬如夜闇然大明燈，得見室中一切所有。善男子！菩薩聞如是諸方便已，即見一切菩薩所行之道，於此法中我所應學，於一切如來行及菩薩行已到彼岸，善行菩薩道者不以為難。善男子，我今當說，欲得菩提道諸善法者，所謂善男子善女人，聞過百千由旬有說此方便經處，當往彼聽。何以故？若菩薩聞此方便經已得光明行，一切法中除疑悔心。爾時四眾及諸人天成寶器者，說此經時悉聞悉知；非寶器者，雖在此[5]會不聞不知，於此經中耳尚不聞，況能口說，非寶器故。是以如來說是法時不聞不知，不蒙佛神力故。」

說此經已，七萬二千人發阿耨多羅三藐三菩提心。

爾時尊者阿難白佛言：「世尊！當何名此經？云何奉持？」

佛告阿難：「是經名為『方便波羅[6]蜜』，亦名『轉方便品』，亦名『說方便調伏』，如是奉持。」

佛說是已，智勝菩薩心生歡喜，及學聲聞辟支佛乘、學菩薩乘比丘、比丘尼、優婆塞、優婆夷，并諸天、龍、鬼神、乾闥婆、阿修羅、迦樓羅、緊那羅、摩睺羅伽、人非人等，聞說是已，讚言善哉善哉，今說大乘方便經竟。
