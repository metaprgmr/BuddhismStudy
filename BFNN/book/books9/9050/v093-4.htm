docInfo.writeDBJJ(mvp.ttl, `
${mvp.START()}

如是我聞：

一時佛在王舍城迦蘭陀竹園。爾時有菩薩摩訶薩善男子名曰善臂，來至佛所頭面禮佛足，禮已却坐一面。

爾時世尊告善臂菩薩言：「善男子！是六波羅蜜，菩薩常當具足。何等六？檀波羅蜜、尸波羅蜜、羼提波羅蜜、毘梨耶波羅蜜、禪波羅蜜、般若波羅蜜。善男子！是六波羅蜜，菩薩常當具足。

「善臂！云何菩薩具足行檀波羅蜜？善臂！菩薩於諸聚落，正命求財非邪命求，隨順不逆，不困逼眾生。以求財物而行布施，非為恭敬供養名稱等故而行布施，非羞畏故、非果報故、非生天故、非諛諂故。於持戒毀戒不起毀譽，或是所識或非所識，而於其中以平等心供養恭敬尊重讚歎。亦於持戒毀戒，若親不親、所識不識、若怨非怨，恒以深重敬愛信樂。是菩薩隨其所有常應惠施，有少施少、有多施多、有麁施麁、有細施細、有妙施妙、有不妙施不妙。若以上饌甘饌飲食價直十萬持用施人，或分一錢為十六分持一分用施，其心歡喜，等無差別。善男子！是菩薩於諸乞食者，須食施食，為具足一切智力故。須飲施飲，為斷眾生渴愛力故。須衣施衣，為得無上慚愧衣故。須乘施乘，為得菩薩乘佛乘故。須香施香，為得正覺持戒香故。須華施華，為得如來七覺花故。須末香者施以末香，為得除滅一切眾生不善香故。須塗香者施以塗香，為得無缺戒香身故。須蓋施蓋，為斷眾生煩惱火故。須革簁者施以革簁，為受無量智慧樂故。須床施床，為令眾生得釋梵聖床快樂力故。須坐處者施以坐處，為坐菩提樹下諸魔結使不能壞亂其坐處故。須舍施舍，為令眾生得覆護處無所怖畏得無我力故。以好園觀奉施佛僧，為得無上寂靜禪定力故。持妙供具種種莊嚴施諸佛塔廟，為得三十二相八十種好大丈夫力故。若於佛塔及闇道中然燈施明，為得無量佛眼明故。以種種伎樂供養三寶，為得無量天耳故。以衣鉢施，為得無上端嚴持戒故。以扇澡盥持用施人，為令眾生得涼清淨故。以紙筆墨及高座施，為得無上大智慧故。施病者藥，為除眾生結使病故。以地施他，為令眾生得三乘分甘露界故。造塔形像，為令眾生聽正法故。所有之物速以施人，為得神通捷疾力故。布施清淨，為於無上道中不留難故。常施不絕，為得無斷辯才力故。隨意布施，為令眾生得大悲故。不逼人求財持用布施，為令諸魔外道不能壞亂，自然得成無上道故。菩薩布施，應如上所說而行惠施。若菩薩欲作如上施者，或自無財當生心施，欲得開示無量無邊一切眾生。有力無力如上布施，是我善行、我是妙勝、是我寶物，能令一切世間眾生所有快樂悉得成就，所謂得和合樂。能捨一切無有狐疑，諸所有願悉皆成就得安樂行。若諸世間所有眾生悕望欲得所須之物，我當滿足與之，珍寶金銀衣服錢財猶如山積，飲食之具如大巨海無量無邊。是菩薩於晝夜各三時中，以己所作財施法施所得果報，願與一切眾生共之。令過去未來現在一切有行眾生，生妙國界及出世樂。是人雖作如是布施，終不悕望求其果報。開示如是方便，為化眾生入於善法。

「是菩薩布施時，願令一切眾生得度得解脫，為得一切智具足一切佛法故。若布施布施已，亦願眾生得度得解脫，為得一切智具足一切佛法故。如此布施，若無有力不能學之、不能捨財。是菩薩應如是思惟：『我今當勤加精進，時時漸漸斷除慳貪悋惜之垢。我當勤加精進，時時漸漸學捨財施與，常令我施心增長廣大，乃至生有終不懈怠心常歡喜。』如是菩薩發菩提心、念菩提心、修菩提心、悕望菩提、願求菩提，是名菩薩無量阿僧祇大施大捨大出。何以故？如是布施於諸施中最勝第一。令我未來之世於一切世間所有眾生中，雨法雨、雨甘露雨，施法雨、施甘露雨，出法雨、出甘露雨。

「善臂！菩薩摩訶薩如是行施，不以為難、以為喜樂，速疾具足檀波羅蜜。善男子！菩薩不能自以身體支節施於乞者，若自割、若教他割。何以故？若成是業，令彼乞者於大地獄受無量罪故。菩薩摩訶薩不應自惜身體支節。所以者何？欲令乞者遠離廣大不善業故。若有乞士來從菩薩乞索所須，是時菩薩若自無財，不應強逼父母妻子眷屬親戚奴婢取其財物，令其貧匱持以施人。何以故？菩薩摩訶薩欲於一切眾生中行平等慈心故。若菩薩摩訶薩不逼父母妻子眷屬親戚奴婢財物持用惠施，菩薩爾時於眾生中得慈悲心。善男子！菩薩不應於他眾生有慳悋心，以逼他眾生取財惠施，諸佛世尊所不讚歎，何況自割支節施於他人。是名菩薩具足檀波羅蜜。

「善臂！云何菩薩摩訶薩具足尸波羅蜜？善臂！是菩薩於一切眾生，乃至盡形，自不殺生、教他不殺、願不殺生。自不偷盜、教人不偷盜、願不偷盜。自不邪婬、教人不邪婬、願不邪婬。自不妄語、教人不妄語、願不妄語。乃至盡形，自不飲酒、教人不飲酒、願不飲酒。是菩薩於此五戒中常堅持專念，不緩不缺勤加精進。如是恐怖他人、繫縛囚執鞭杖刑戮，於此事中永斷遠離，及兩舌、惡口、妄語、綺語亦復如是。是菩薩如是思惟：『我應於一切眾生生愛念心，猶如父母愛念一子。若我父母以種種苦事弓箭刀杖加害於我，我於是中終不生報。我於一切眾生應如父母愛念一子。』譬如父母妻子別離既久，一旦相見其心歡喜踊躍無量。如是菩薩見一切眾生，其心歡喜亦復如是。是菩薩持不殺戒，欲令眾生得住無學不殺戒故。是菩薩持不盜戒，欲令眾生得住無學不盜戒故。是菩薩持不邪婬戒，欲令眾生得住無學不婬戒故。是菩薩持不妄語戒，欲令眾生得住無學實語戒故。是菩薩持不飲酒戒，欲令眾生得住無學不飲酒戒故。是菩薩持不恐怖戒，為得成就金剛定故。是菩薩持不繫縛戒，欲令一切眾生斷結使縛故。是菩薩持不囚執戒，欲令眾生出五道故。是菩薩持不鞭杖戒，為欲遠離諸魔結使留難得法定故。是菩薩持不刑戮戒，為令身口意得不護業故。是菩薩持不兩舌戒，為得不壞和合眾故。是菩薩持不惡口戒，為得五種梵音聲故。是菩薩持不綺語戒，為得發言說法無障礙故。是菩薩持求畏死眾生戒，欲令一切眾生脫生老病死憂愁悲惱恐怖斷故。是菩薩愛護他物不令漏失戒，為得無上菩提覺定故。有他眾生婦女妻子或被拘錄，爾時菩薩於中救脫，為得不缺法定故。是菩薩若勸他令放，為得心自在故。是菩薩若自放或勸他令放，為坐菩提樹下破壞一切魔結使故。是菩薩若見繫獄眾生，若自放若勸他令放，為得心自在無障礙故。是菩薩若見眾生當得鞭杖，若自放若勸他令放，為得四無所畏故。是菩薩若見眾生當被刑戮，若自放若勸他令放，為得四種法身故。是菩薩持不誑戒，為坐菩提樹下師子座處，一切魔結使不能留難，得法定故。是菩薩善和鬪諍專生歡喜，為得不壞大聖眾故。是菩薩持愛語戒，欲令一切眾生耳聞好語心得歡喜樂故。是菩薩隨愛語說，欲令言不虛故。是菩薩持讀佛文詞戒，為得聖人威德成就大眾故。是菩薩受持於三時中五體歸命一切世間在在處處過去未來現在無量無邊諸佛法僧菩薩戒，為得菩提樹下師子座處不可破壞，專住信精進念定慧，得法定故。是菩薩受持於三時中掃灑遶塔戒，為得具足一切佛法故。是菩薩持讚法戒，為得轉於無上法輪故。是菩薩持讚僧戒，為得大眾圍遶故。是菩薩持三時歸依三寶戒，欲令一切眾生得無上歸依故。是菩薩受持於三時中願使一切世間常有佛法僧菩薩不空者戒，為得無上菩提樂故。是菩薩受持於三時中勸請一切諸佛一切說法戒，為得十住雨法雨故。是菩薩受持於三時中懺悔諸罪捨出諸惡穢污戒，為得斷滅一切愛習氣故。是菩薩受持於三時中和合一切善根戒，為令一切波羅蜜滿足故。是菩薩受持於三時中念一切世間在在處處過去未來現在諸佛聲聞緣覺聖眾菩薩下至六趣眾生所有善根願戒，為得無上菩提資用故。是菩薩受持於三時中願求菩提戒，為得無上菩提正決定故。是菩薩於三時中受持一切善根無上道戒，為得畢定如來力無所畏故。是菩薩受持供給父母師長戒，為得無勝法定故。是菩薩若見恐畏貧窮之人，受持不恐怖供施戒，為得無破壞難論方便故。是菩薩受持救護縣官盜賊水火戒，為得諸力波羅蜜故。是菩薩若見佛緣覺聲聞菩薩神足變化隨而持戒，為得無上神足力故。是菩薩受持護他心身口意業戒，為得如來無量知他心力故。是菩薩若見放逸失念者，所謂失現在未來三乘義者，願起念持不失故。是菩薩持聽法集法說法戒，為得具足四無礙辯故。是菩薩持一切身口意業善根攝受奉行，欲令一切眾生得度得解脫，為得一切智具足一切佛法故。如是善根，願為一切眾生受行，為令眾生得解脫、得一切智，具足一切佛法故。如是持戒不缺不破不荒。若無力勢能修學者，是菩薩應如是思惟：『今我當勤加精進，時時漸漸遠離殺害諸不善法。我復倍加精進，時時漸漸善學持戒令增長滿足，乃至生有終不懈怠、不生憂愁。』善臂！如是菩薩摩訶薩發起菩提心、念菩提心、修菩提道、悕望菩提、願求菩提，是名無量無邊持戒善根。何以故？如此持戒，一切善戒中最勝第一。受持是戒，欲令一切世間所有眾生發起無漏戒、發起無學戒，生無漏戒、生無學戒。善臂！如是菩薩摩訶薩於此持戒，不以為難、以為喜樂，速疾具足尸波羅蜜。

「善臂！云何菩薩摩訶薩具足羼提波羅蜜？是菩薩若自眷屬若他眾生來奪菩薩命者，菩薩爾時於此事中，終不生於瞋報之心。或有他人來奪菩薩財物乃至妻子，若說兩舌惡口妄言綺語，若有恐怖繫縛囚執鞭杖刑戮，以種種苦加於菩薩。菩薩爾時亦復不生還報之心。若奪命根及一切物乃至妻子，若說兩舌惡口妄言綺語、恐怖繫縛囚執鞭杖刑戮，是菩薩思惟如是諸事，是我惡行不善業報自作自受，或過去世，或現在世，若先作已今受果報。我今云何於自果報而瞋於他？復次善臂！菩薩如是思惟：『若有他人奪我命根及諸財物乃至妻子，若說兩舌惡口妄言綺語，若有恐怖繫縛囚執鞭杖刑戮，我於此中不應瞋害加他繫縛冤家。何以故？我今現世受少苦惱尚不愛憙不可適意，云何生瞋加害於他，於當來世受諸罪報，無量無邊百千萬億苦惱甚多，不喜不愛不可適意諸果報也。』

「復次善臂！菩薩如是思惟：『有命根故斷截命根，有財物故剋奪財物，有妻子故奪其妻子，有耳根故聞兩舌惡口妄言綺語，有此身故有恐怖繫縛囚執鞭杖刑戮。今我自受命根耳根身受苦入，云何以瞋加害於他？』復次善臂！菩薩摩訶薩如是思惟：『眼根即是地大、即是自物、即是法界、即是自性。濕性水、熱性火、動性風，即是己物、即是法界、即是自性。如是一切命，即是壞法、滅法、盡法。如是一切諸根，是苦法、是苦觸法、是受苦法。一切身即是苦法、是苦觸法、是受苦法，即是己物、即是法界、即是己性。我今此命，即是壞法、滅法、盡法、苦法，此六根即是苦觸法、即是惡觸觸。我今云何自於此命壞法滅法盡法，而生瞋恚侵害於他、繫縛冤家？何以故？即是己物、即是法界、即是自性。』復次善臂！菩薩摩訶薩如是思惟：『內眼耳鼻舌身意，非我非我所；外眼耳鼻舌身意，亦非我非我所。云何明智之人，於此六根非我非我所中莊嚴愛著，生於瞋恚加害他人？』復次善臂！菩薩摩訶薩如是思惟：『人中苦少、餓鬼苦多，畜生中苦轉復增多，地獄苦惱無量無邊不可計倍。人中少苦尚不欲受，何況於未來世中受三惡道無量苦惱？是故我今不應生瞋加害於他。』復次善臂！菩薩摩訶薩如是思惟：『我今若能利益一人，尚不應瞋、加害於他、繫縛冤家。何況我當以甚深法義利益一切世間無量眾生發大莊嚴，大莊嚴已得受記別趣於大乘而得具足無上佛法。是佛法中，不應不忍侵害於他、憎嫉鬪訟，此中應行忍辱利益於他，善和鬪訟不懷嫉妬。』善臂！若有善男子善女人乃至阿鼻地獄受諸苦痛，於冤家許尚不應生瞋加害侵毀，何況人中受少苦惱當生瞋害於他？是善男子善女人為他所瞋，罵詈訶責、誹謗輕毀、稱揚惡名，如是諸惡悉應忍之，起慈悲心純淨無垢，欲得如來心故。是菩薩受諸鞭杖恐怖繫縛囚執，於此事中悉應忍之起慈悲心，為於一念中間破一切無明闇障㲉故。是菩薩受行忍辱慈悲心，欲令一切眾生斷愛恚故。若割耳時亦行忍辱起慈悲心，欲令一切眾生聞法信故。若割鼻時亦行忍辱起慈悲心，為受端嚴無上持戒香故。若截足時亦行忍辱起慈悲心，為得如來四神足故。若截手時亦行忍辱起慈悲心，為欲攝取一切眾生得寂靜故。若分解支節時亦行忍辱起慈悲心，為令具足六波羅蜜故。若挑眼時亦行忍辱起慈悲心，為得慧眼故。若斬首時亦行忍辱起慈悲心，為得如來一切智首故。是菩薩如是忍辱趣向思惟，願令一切眾生得度得解脫，為得一切智具足一切佛法故。如是忍辱。我今趣向思惟已，願令一切眾生得度得解脫，為得一切智具足佛法故。如是忍辱，不破不缺不荒，若無力勢不能學者，是時菩薩應如是思惟：『我今當勤加精進，時時漸漸遠離斷滅不忍之法。今我勤加精進，時時漸漸勤學忍辱，令此忍辱增廣具足，乃至生有終不懈怠不生憂愁。』如是菩薩摩訶薩發菩提心、念菩提心、修菩提心，悕望菩提、願求菩提，是菩薩發起正行如是等無量無邊阿僧祇善忍，欲令一切世間所有眾生，發起無漏忍辱、發起無學忍辱，生無漏忍辱、生無學忍辱。善臂！如是菩薩摩訶薩行於忍辱，不以為難、以為喜樂，速疾具足羼提波羅蜜。

「善臂！云何菩薩摩訶薩具足毘梨耶波羅蜜？善臂！是菩薩應如是思惟：『今此十方，一一方面有無量世界，一一世界有無量無邊眾生集聚，無有邊際。我今當發莊嚴，令此眾生得大利益亦令得樂。復次觀知無量眾生利益快樂所緣之法故、發起善根法故，我於無量晝夜，若心放逸、或生餘念、若睡眠時，常念念中增益福德，於一一念中發起無量無邊善根菩提資用。我今當知一一念中發起增益無量善根故，成阿耨多羅三藐三菩提則不為難。今我以此緣故，我見菩薩甚為易得，是故欲得無上道者，乃至盡形不應懈怠。』復次善臂！菩薩摩訶薩如是思惟：『若菩薩於無量無邊世界眾生中，能令一世界眾生得離一切諸苦者，我尚於一一念中發起增益無量善根，何況乃令無量無邊世界眾生遠離斷除生老病死、恩愛別離、冤憎集會、三惡道苦。』復次善臂！菩薩摩訶薩如是思惟：『若菩薩摩訶薩於一念中，欲令無量無邊世界所有眾生遠離斷除一切諸苦者，此菩薩亦於一念之中得發起增益無量善根，況當欲令未來無量無邊阿僧祇劫，無量無邊世界眾生遠離斷除生老病死、恩愛別離、冤憎集會、三惡道苦。』復次善臂！菩薩摩訶薩應如是思惟：『若有人欲得聲聞緣覺法，是人尚得於一一念中發起增益無量無邊善根，何況有善男子善女人欲成就具足佛法無量無邊威德力勢者。善男子善女人四因四緣四境界，於晝夜中若心放逸、或生餘念、若睡眠時，於一一念中修集四無量無邊善根，發起增益菩提資用。我今當知，一一念中發起增益四無量善根，成阿耨多羅三藐三菩提則不為難。以是緣故，我見菩提甚為易得。是故欲得菩提道者，乃至盡形不應懈怠。譬如四大海，若南若北若上若下易得邊際，如是四無量善根大海，菩提資用難得其邊。我今何故不於一一念中發起增益四無量善根大海菩提資用？是故欲成無上道者，乃至盡形不應懈怠。』復次善臂！菩薩摩訶薩如是思惟：『若有師子狐狼、鷲鵲烏鳥、蚊虻蠅蚤，如是等類尚得無上道已，況我今者生於人中而應懈怠？是故欲成無上道者，乃至盡形不應懈怠。』復次善臂！菩薩摩訶薩如是思惟：『乃至百人千人猶尚得成無上道已，而我今者獨不得成。況復十方如恒河沙等現在未來諸佛世尊，已成當成，是故我今乃至盡形不應懈怠。』是菩薩復應如是思惟：『若有法是佛所說、若聲聞說、若菩薩說，乃至狂愚人為佛故說，所謂檀波羅蜜、尸波羅蜜、羼提波羅蜜、毘梨耶波羅蜜、禪波羅蜜、般若波羅蜜。是菩薩為具足佛法，欲成無上道、欲得一切智，於此法中勤加精進如救頭然，學持通利，思惟分別為他解說，智慧精進一心思惟。』是菩薩若一切眾生有說法之處，乃至刀杖之難，要至其所聽其所說。或有眾生修樂報業，若現世樂、若後世樂，菩薩爾時即以善法妙義如法佐助，於此善法亦復勤加精進。是菩薩自以己身施於眾生，令得自在。譬如四大，一切眾生於中自在隨所須用。菩薩摩訶薩以身施人令他自在，亦復如是。智慧精進乃至刀杖之難，常於佛法僧中，及諸師長、羸老病苦、貧窮無護，增益供養恭敬，使令勤加精進如救頭然。隨眾生心，布施、愛語、利益、同事，隨所攝之，欲得聲聞乘者，調伏安置於聲聞乘；欲得緣覺乘者，調伏安置於緣覺乘；欲得菩薩乘者，調伏安置於菩薩乘；智慧精進如救頭然。是菩薩為善法故、六波羅蜜因緣故，不計寒熱飢渴、蚊虻毒螫、風飄日曝、惡觸誹謗罵詈，種種苦惱疲極睡眠，於此事中乃至盡形終不憶念，智慧精進如救頭然，乃至刀杖之難亦不懈怠。是菩薩為無上道因緣故，能受種種苦，所謂阿修羅、人、三惡道苦，不以為難，智慧精進如救頭然。是菩薩牢強精進意勇堅固，欲出於世成佛無上精進之力。是菩薩欲得毘梨耶波羅蜜、趣向毘梨耶波羅蜜，願令眾生得度得解脫故，為得一切智具足一切佛法故。我今趣向毘梨耶波羅蜜已，願令眾生得度得解脫故，為得知一切智具足一切佛法故，如是精進，不破不缺不荒。若無力勢不能具足學者，是菩薩如是思惟：『我今當勤加精進，時時漸漸斷除懈怠嬾惰。復當勤加精進，時時漸漸善學精進，令此精進增廣具足，乃至生有終不懈怠不生憂愁。』如是菩薩發起菩提心、念菩提心，修菩提心、悕望菩提，是名無量無邊阿僧祇善精進波羅蜜。何以故？如是精進，於餘善法精進中最勝第一。欲令一切世間在在處處所有眾生，發起無漏精進、發起無學精進，生無漏精進、生無學精進。善臂！如是菩薩摩訶薩行於精進，不以為難、以為喜樂，速疾具足毘梨耶波羅蜜。

「善臂！云何菩薩摩訶薩具足行禪波羅蜜？菩薩若眼見色不取其相，或時眼根為外緣所牽，應正行守護不令隨緣，不留心於無明貪著世間，護持是戒；爾時具足得眼根戒。耳聞聲、鼻嗅香、舌甞味、身覺觸、意知法，亦如是。是菩薩若行住坐臥，若說法若默然，終不遠離寂定之心，善護手足無有散亂，常懷慚愧善護口業，安詳直視，心常寂靜不憙戲笑，善御身口意業令其寂靜。若屏猥處及現露處，無有異心。於所須物衣服飲食臥具醫藥心常知足，易養易滿易可使令。善行寂靜遠離憒閙，於利衰毀譽稱譏苦樂心無有異，不高不下。命及非命亦無異心，無瞋無愛。等視冤家猶如赤子，於忍不忍心常平等。聖聲凡聲寂聲亂聲，亦復如是。憎愛色中心不高下，離染瞋恚愛不愛者，聲香味觸法亦復如是。是菩薩觀欲如骨璅，邪憶想故發起此心。觀欲如肉團，多怨憎故。觀欲如炬火，染著苦法遠離樂故。觀欲如樹上果，多人愛著故。觀欲如假借，不得自在故。觀欲如夢，念念滅故。觀欲如癰，於苦倒中生樂想故。觀欲如鈎，行諸惡法墮惡道故。觀欲如灰河，增益欲染不知足故。是故菩薩如是觀已，離欲惡不善法，有覺有觀離生喜樂，成初禪行。離覺觀，內淨信，心在一處，無覺無觀，定生喜樂，成二禪行。離喜行捨念正智一心，身行樂諸聖人能行能捨，成三禪行。捨苦樂意，先滅憂喜，行捨念淨，成四禪行。於一切眾生思惟樂想，成就無量無邊慈心。於眾生中思惟苦想，成就無量無邊悲心。於眾生中思惟喜想，成就無量無邊喜心。於眾生中捨苦樂想，成就無量無邊捨心。是菩薩不思惟色想，成就空處寂靜行。不思惟空想，成就識處寂靜行。不思惟識想，成就無所有處寂靜行。不思惟無所有處想，成就非有想非無想處寂靜行。是菩薩於入息出息，若隨若住，長時知長、短時知短，成就入息出息寂靜行。是菩薩思惟觀身不淨想，成就不淨寂靜行。是菩薩思惟無常想生老病過，成就無常想寂靜行。思惟食中起無量過患想，成就食不淨想寂靜行。於諸世界城邑聚落種種嚴飾中，思惟分別必歸壞敗想，成就世間不可樂寂靜行。是菩薩內有色想，外觀色少，若好若醜取其相貌，成就初勝處行。是菩薩內有色想，外觀色多，若好若醜取其相貌，成就二勝處行。是菩薩若死若燒，風吹日曝成為灰土，為水所漂，若碎滅磨滅，若斷三有，是名內無色想觀外色少，若好若醜取其相貌，成就第三勝處行。是菩薩內無色想外觀色多，若好若醜取其相貌，成就第四勝處行。是菩薩內無色相，外觀色青無量無邊，愛樂取相，成就第五勝處行。是菩薩內無色想，外觀色赤無量無邊，愛樂取相，成就第六勝處行。是菩薩內無色相，外觀色黃無量無邊，愛樂取相，成就第七勝處行。是菩薩內無色相，外觀色白無量無邊，愛樂取相，成就第八勝處行。是菩薩入是無量無邊地一切處，不念異相，成就初一切處行。是菩薩入無量無邊水火風青黃赤白虛空識一切處，不念異相，成就十一切入處行。是菩薩入苦法時，心緣一切善根，所謂大慈大悲、攝持正法、不斷三寶、莊嚴佛身、清淨梵音、本昔誓願、教化眾生、淨佛世界、坐菩提樹、轉妙法輪、除斷一切眾生結使，其心所緣境界如是。是菩薩入禪定時，離四識住處，不依地大水大火大風大空大識大，亦不依止今世後世，入如是定都無所依。是菩薩入禪，其心愛樂，為欲入於無上解脫定故。是菩薩修行禪定，願令一切眾生得度得解脫故、為得一切智具足一切佛法故。若思惟若思惟已，願令一切眾生得度得解脫故、為得一切智具足一切佛法故。於此禪定若無力能學，是菩薩應如是思惟：『我今應時時漸漸勤加精進遠離亂心，時時漸漸勤加精進學一心，令此一心增廣具足，乃至生有終不懈怠不生愁憂。』是菩薩發起菩提心、念菩提心、修菩提心，悕望菩提、願求菩提，是名菩薩摩訶薩無量無邊善根禪定，欲令一切世間在在處處所有眾生，發起無漏禪定、發起無學禪定，生無漏禪定、生無學禪定。菩薩摩訶薩行是禪定，不以為難、以為喜樂，速疾具足禪波羅蜜。

「善臂！云何菩薩摩訶薩具足般若波羅蜜？善臂！若有聰明智慧之人，學已能持、聞已誦習，善學諸法甚深相義亦能分別，如所聞法，聞已思義。有如是等者，菩薩爾時則應親近，恭敬供養尊重讚歎，乃至刀杖不應遠離。是菩薩因學問故、因了義故、因思義故、供養恭敬師和上故，乃至近死終不避難諸苦惱事，所謂飢渴寒熱、蚊虻毒螫、風吹日曝、諸惡觸等、罵詈誹謗。是菩薩於正法中起寶聚想，於說法者起寶藏想，於聽法者起難遭想，於問義者起慧命想，於多學者斷除無明起智慧想，於分別諸法起百千生生慧眼想。是菩薩聞是諸法，受持修學、廣分別已，知陰界入、四聖諦、十二因緣、三世三乘，得如是知。

「云何知界？知二界。有為界、無為界，是名二界。云何有為界？若法生住滅者，是名有為界。云何無為界？若法無生住滅，是名無為界。是名知有為、無為界。復次知三界，善界、不善界、無記界。云何善界？若不貪共不貪、若不恚共不恚、若不癡共不癡，是名善界。云何不善界？若貪共貪、若瞋共瞋、若癡共癡，是名不善界。云何無記界？除善不善，若有餘法，是名無記界。復次知三界，所謂欲界、色界、無色界。云何欲界？地獄、畜生、餓鬼、阿修羅、人、四天王天、三十三天、夜摩天、兜率陀天、化樂天、他化自在天。若於此中欲染貪著，瞋恚愚癡悕望，欲得心所作業，是名知欲界。云何色界？梵天、梵輔天、梵眾天、大梵天、光天、少光天、無量光天、光音天、淨天、少淨天、無量淨天、遍淨天、果實天、少果天、廣果天、無量果天、無想天、無熱天、無惱天、善見天、好善見天、阿迦膩吒天。若於此中，色染愚癡悕望，欲得心所作業，是名色界。云何無色界？空處天、識處天、無所有處天、非有想非無想處天。若於此中，無色染污愚癡悕望，欲得心所作業，是名無色界。是名三界。復次知四界，欲界、色界、無色界、無為界，是名知四界。復次知六界，所謂欲界、恚界、害界、出界、不恚界、不害界，是名知六界。復次知六界，所謂地、水、火、風、空、識界，是名六界。觀地大無常變壞，無堅無牢相，若無常即是苦，若是苦即無我。水火風空識大，無常變壞無堅牢相，若無常即苦，若苦即無我。是名知六界。

「是菩薩聞如是法已，受持修學廣分別已，即知五陰。所謂色陰、受想行識陰。色如水沫，即是生滅不得久住。受如水泡，即是生滅不得久住。想如野馬，即是生滅不得久住。行如芭蕉，即是生滅不得久住。識如幻化，即是生滅不得久住。是名知五陰。

「是菩薩聞是法已，受持修學廣分別已，即知內入。所謂眼入、耳鼻舌身意入，是名內六入。眼入即是苦法老法死法、空無我無我所、熾然三毒。生老病死憂悲苦惱亦能熾然諸苦惱法，耳鼻舌身意亦如是，熾然三毒乃至諸苦。是名知內六入。復次知外六入，眼所見色是名外六入，耳所聞聲、鼻所嗅香、舌所甞味、身所覺觸、意所知法，是名外六入。眼所見色是外入，不堅牢性、無所依止、亦無勢力，一切無常，如實非不如實，如幻如化。耳所聞聲、鼻所嗅香、舌所甞味、身所覺觸、意所知法亦如是，是名知外六入。

「是菩薩聞如是法已，受持修學廣分別已，即知四聖諦。所謂苦聖諦、集聖諦、滅聖諦、道聖諦，是名四聖諦。云何苦聖諦？若五陰、六界、內六入、外六入，是名苦。此苦無常，喻如怨賊，如癰如箭、如獄閉繫、如器壞敗，是不自在即是無我。得如是知已，是名知苦聖諦。云何集聖諦？所謂貪恚癡慢我慢專取於我，決定計我常住不壞。我即是色、我異於色。我即是想、我異於想。我是想非想、我異想非想。我即是陰、我異於陰。我中有陰、陰中有我。我即是界入、我異界入。我中有界入、界入中有我。我即是受、我異於受。我即是知、我異於知。我是無受、我異無受。我是色少、我異色少。我是色多、我異色多。我是常、我是無常。我是常無常、我是非常非無常。我是有邊、我是無邊、我是有邊無邊、我是非有邊非無邊。死後如去、死後不如去、死後亦如去亦不如去、死後非如去非不如去。命即是身、身即是命。此眾生從何處來、去至何處？此諸眾生即是斷滅非有相續，自作自受、他作他受。計有我者即有我所，有我所者即是有我。如是攝取我見身見，若結若使、若我我所。我受貪恚癡本，若總身口意業、若福業若罪業、若欲界業、若色無色界業，是名集聖諦。云何滅聖諦？若貪恚癡盡、我我所盡、受取有盡，是名滅聖諦。云何道聖諦？若見苦集盡，思惟一切有為過患，見涅槃寂靜，所作已辦，住如是法時，正見、正思惟、正語、正業、正命、正精進、正念、正定，是名道聖諦。如是知四聖諦，是菩薩分別思惟四聖諦時，見有為法是苦、是無常、是空、是無我。見無為法能為覆護、是舍是依，雖作是觀不證涅槃。如是知四聖諦。

「是菩薩聞如是法已，受持修學廣分別已，即知十二因緣。所謂無明緣行、行緣識、識緣名色、名色緣六入、六入緣觸、觸緣受、受緣愛、愛緣取、取緣有、有緣生、生緣老死，是名十二因緣。若不知不見四聖諦、十二因緣，是名無明。若有身口意業，若福業、若罪業，若欲界繫、色無色界繫，是名行。若有心意識，是名識。若有受想思觸思惟，是名名。若有四大、四大所造色，從歌羅羅乃至化生，若作色、非作色，是名色。名色合故名名色。若眼耳鼻舌身意，是名六入。若眼緣色生眼識，三法和合故生觸，是名觸。若有苦受、樂受、不苦不樂受，是名受。若有愛染，是名愛。若有愛見戒取，是名取。若有色受想行識，是名有。若此有發起，是名生。若此有衰變，是名老。若此有滅壞，是名死。菩薩如是分別思惟十二因緣，見聞覺知地非是我不生愛著，我非地不生愛著，亦非悕望。水火風空識亦如是。見聞覺知涅槃非我不生愛著，我非涅槃不生愛著，亦非悕望。是菩薩見諸法從因緣起，知三解脫門，廣修學見諸法空、無相、無作。是菩薩見諸法從因緣起，知寂滅樂，精勤修學廣分別已，則無明滅。無明滅則行滅，行滅則識滅，識滅則名色滅，名色滅則六入滅，六入滅則觸滅，觸滅則受滅，受滅則愛滅，愛滅則取滅，取滅則有滅，有滅則生滅，生滅則老死滅。如是菩薩雖觀十二因緣起滅而不證於滅。菩薩如是知十二因緣。

「是菩薩聞是法已，一心受持修學，廣分別已即知三世，所謂過去、未來、現在。云何過去世？若法生已滅，是名過去世。云何未來世？若法未生未起，是名未來世。云何現在世？若法生已未滅，是名現在世。是菩薩念過去世諸不善根，輕毀可惡背捨離之。未來不善根，當受不善果報，不喜不愛不可適意。現在不善根，當令不起。是菩薩能攝護身口意業及六情根，常起善業無有中間。於過去善根，是菩薩菩提心，專念菩提、悕望菩提、欲得菩提，以深重愛樂願一切眾生得度得解脫，為得一切智具足一切佛法故。未來世現在世亦如是，常不離是心，終不懈怠失念放逸。若過去世陰界入等，即是滅盡、不實不在、無我無我所。若未來世陰界入等，是未生未起，無我無我所。若現在陰界入，是念念不住。何以故？世法無有一念住者。若有一念，是一念中亦有生住滅，是生住滅亦復不住。如生住滅中有內外陰界入，是內外陰界入亦有生住滅。若如是不住者，即是非我非我所。若過去世滅盡、不實不在、非我非我所。若未來世未生未起，非我非我所。若現在念念不住，是非我非我所。若見三世非我非我所，是名實智慧者。不見我我所、是我我所，是即於諸有行無我無我所，行離欲想、行斷想行滅想，雖作是行不證涅槃。是名知三世。

「是菩薩聞是法已，受持修學廣分別已，即知三乘。所謂天乘、梵乘、聖乘。云何天乘？初禪二禪三禪四禪，是名天乘。云何梵乘？慈悲喜捨是名梵乘。云何聖乘？正見、正思惟、正語、正業、正命、正精進、正念、正定，是名聖乘。是菩薩時時修集天乘梵乘聖乘，教化眾生令住三乘，是時自身不證解脫，是名知三乘。復次知三乘，所謂聲聞乘、緣覺乘、大乘。云何聲聞乘？軟根解脫，於一念中離三有窟宅，樂欲出世欲得涅槃見寂滅處，勤加精進如救頭然。若其未解四聖諦者，欲以智箭射四諦的，欲證欲解以深欲精進，是名聲聞乘。云何辟支佛乘？中根解脫，欲得寂靜獨在一處，而自利益入寂靜定，方便分別十二因緣，欲得緣覺道、欲證緣覺，是名緣覺乘。云何大乘？上根解脫，欲令一切眾生得度得解脫，為得一切智具足一切佛法六波羅蜜，欲利益一切世界，欲斷一切眾生苦惱，於一切世界五欲樂中心尚輕賤，何況世間無量諸苦。欲令眾生持無上戒，欲得聞見大乘經典，受持修學思惟分別，讀誦令利，勤加精進。若有菩薩修四攝法應往親近，欲令眾生攝真智慧安住四攝。常欲得聞諸深法要，受持分別。欲令一切入於禪定，自捨己樂利益眾生，欲以自力隨他所樂令住三乘。雖作是化，常自安住無上道中，不壞不動心如金剛。常願欲得無上菩提，願求菩提是名大乘。是名知三乘。

「是菩薩聞是法已，受持修學廣分別已，即知方便。於佛法僧五體投地以此為業，於其所作願無上道。如是歸依發菩提心，若行若住若坐若臥、若飲食洗浴，於此事中更無餘心，但願無上菩提，常作如是廣博修學。是菩薩若始入定、若入定已，常願一切眾生得度得解脫故，為得一切智具足一切佛法故，欲於世界中尊，欲調伏一切眾生，欲於一切眾生中無能勝者，欲得最勝，欲教誡一切眾生，欲令一切眾生得寂滅，欲於一切法得成正覺。具學是菩薩若一切所作善根，願一切眾生無有恐怖，出三惡道滅無量苦，斷諸煩惱。令現在未來欲得緣覺乘者，願令具足。現在未來欲得大乘者，願令具足。願請一切世間所有現在未來諸佛世尊，住世一劫說法，令聖人眾隨佛在世而得和合。是菩薩如是思惟：『若在在處處，所有眾生所修善根，若欲生人中天上、若住聲聞乘、若住辟支佛乘，若愛語布施利益同事，願令具足。』是菩薩以是法故，於三時中讀誦通利思惟此法。所謂我今歸依一切世間在在處處所有諸佛佛法僧菩薩，頭面禮敬。諸佛威德無能勝者，其相甚妙。菩薩常應作如是念諸佛法僧，願令世間在在處處無有空處，所在方面常有諸佛，令我勸請留住一劫，說微妙法、呵責諸惡。若已作若今作，我今已得離一切惡，乃至一念中間，當願以一切善根令諸眾生壽命無量，住於一切諸善法中。如諸菩薩速轉法輪，令諸聖人得戒定慧解脫解脫知見。願令佛法常住於世利益眾生。生五道者悉得善根乃至敬禮諸佛。常住是願。是諸菩薩所有善願，令他眾生及其己身得妙威德善妙威德。若未來現在一切世間佛法僧寶，令住一劫無諸留難。及諸菩薩寶速令具足六波羅蜜，疾成阿耨多羅三藐三菩提亦無留難。欲令一切眾生斷除苦惱怖畏、行於喜樂，斷一切不善根、成就一切善根，隨如所願成就三乘，速疾成就諸波羅蜜，壽命無量而得解脫成無上道。乃至敬禮諸佛，常作是願。是菩薩欲令一切眾生斷諸苦惱，若一切世間在在處處所有諸佛乃至法身，願我以身奉施彼佛，欲令一切眾生得度成無上道，在所生處信敬三寶。以天香花奉養恒河沙等諸佛世尊，亦供養法僧及諸菩薩，令所奉寶如須彌山。一切世間在在處處所有眾生若有所須，七寶房舍、衣服飲食、醫藥臥具，悉當給與令無所乏。若有樂於忍辱精進持戒者，我當隨其所樂而為解說使成就勝法，令三寶具足修六波羅蜜疾成佛道。離諸惡法，善行實義身口意業，不退菩提樂於菩提，在在處處見佛菩薩常學善根，安止眾生於善法中。是菩薩自知及他所有善根，趣向智慧、思惟智慧，願欲令一切眾生得度得解脫故，為得一切智具足一切佛法故。是菩薩趣向思惟已，願令一切眾生得度得解脫故，為得一切智具足一切佛法故。是菩薩如是智慧，若無力能學，應如是思惟：『我今當勤加精進，時時漸漸斷於無明。我今復當倍加精進，時時漸漸學此智慧，令此智慧增廣具足，乃至生有終不懈怠生於憂愁。』如是菩薩發菩提心、念菩提心、修菩提心、悕望菩提心，是菩薩無量無邊善智慧。何以故？此慧於餘善慧中最勝第一，令一切世間眾生，發起無量智慧、發起無學智慧，生無漏智慧、生無學智慧。善臂！如是菩薩行此智慧，不以為難、以為喜樂，速疾具足般若波羅蜜。」

佛說是經已，善臂菩薩歡喜讚言：「善哉善哉！」信受奉行。
${mvp.END()}`);
