如是我聞：

一時佛在王舍城耆闍崛山中，與大比丘眾八千人俱。菩薩摩訶薩萬六千人，皆不退轉於阿耨多羅三藐三菩提，盡是一生補處，悉從十方諸佛世界而來集會。爾時摩訶迦葉白佛言：「世尊！所言沙門，云何為沙門？」

佛告迦葉：「所謂沙門者，寂滅故，調伏故，受教故，戒身淨故，入禪定故，得智慧故，解如實義得解脫故，於三脫門無所疑故，安住聖人所行法故，善修四念處故，離一切不善法故，安住四正勤故，善修四如意足故，成就信根故，信佛法僧故，成就堅信於佛法僧故，不信餘道法故，勤行離一切煩惱故，善修七菩提分離一切不善，如實修一切善法故，善知正念正智方便故，專念一切諸善法故，善知定慧方便故，成就五力故，不為一切煩惱之所亂故，善修七菩提分故，善知一切法中因緣方便故，善知聖道方便故，善知正見正定方便故，得四辯力不信外道故，依義不依語、依智不依識、依了義經不依不了義經、依法不依人故，離四魔故，善知五陰故，斷一切煩惱故，得最後身故，離生死道故，離一切愛故，勤行知苦斷集證滅修道故，善見四聖諦故，於佛法中不信餘道故，所作已辦故，斷一切漏故，修八背捨故，釋梵天王之所讚故，從本已來專心行道故，樂阿蘭若處故，安住聖法中故，樂佛法儀式故，心不傾動故，不親近出家在家眾故，心樂獨行如犀角故，畏於人眾多惱亂故，樂住獨處故，常怖畏三界故，得實沙門果故，離一切悕望故，離世八法故所謂利衰毀譽稱譏苦樂，堅心不動如地故，護彼我意無所犯故，不濁故，正行故，心行成就如虛空故，於諸形相心無染著如虛空中動手無所礙故。迦葉！若能成就如是行法，是名沙門。」

爾時摩訶迦葉白佛言：「世尊！未曾有也。如來善說沙門德行。世尊！若未來世有諸沙門，非實沙門自言我是沙門、非梵行人自言我有梵行。如是之人，即已侵損如來無量阿僧祇劫所修集阿耨多羅三藐三菩提。」

佛告迦葉：「如是侵損如來菩提之罪，說不可盡。迦葉！我滅度後，汝及餘大弟子等亦皆滅度，又此世界諸大菩薩皆至他方諸佛世界。爾時於我法中，當有比丘於諸所行心多諂曲。迦葉！我今當說沙門之垢、沙門過罪。迦葉！後末法中當有比丘，不修身、不修戒、不修心、不修慧，癡如小兒，向於闇冥而無所知，心不調伏成沙門垢。迦葉！云何沙門垢？迦葉！沙門垢有三十二，出家之人所應遠離。何等三十二？欲覺是沙門垢，瞋覺是沙門垢，惱覺是沙門垢，自讚是沙門垢，毀他是沙門垢，邪求利養是沙門垢，因利求利是沙門垢，損他施福是沙門垢，覆藏罪過是沙門垢，親近在家人是沙門垢，親近出家人是沙門垢，樂於眾閙是沙門垢，未得利養作方便求是沙門垢，於他利養心生悕望是沙門垢，自於利養心不知足是沙門垢，於他利養中心生嫉妬是沙門垢，常求他過是沙門垢，不見己過是沙門垢，於解脫戒而不堅持是沙門垢，不知慚愧是沙門垢，無恭恪意心慢掉動無有羞恥是沙門垢，起諸結使是沙門垢，逆十二因緣是沙門垢，攝取邊見是沙門垢，不寂滅不離欲是沙門垢，樂於生死不樂涅槃是沙門垢，好樂外典是沙門垢，五蓋覆心起諸煩惱是沙門垢，不信業報是沙門垢，畏三脫門是沙門垢，謗深妙法不寂滅行是沙門垢，於三寶中心不尊敬是沙門垢。迦葉！是名沙門三十二垢。若能離此諸垢，是名沙門。

「迦葉！又有八法覆沙門行。何等八？一者不敬順師長；二不尊敬法；三不善思惟；四所未聞法聞已誹謗；五聞無眾生無我無命無人法已心生驚畏；六聞一切行本來無生已，而解有為法不解無為法；七聞說次第法已墮大深處；八聞一切法無生無性無出已而心迷沒。迦葉！是名八法覆於沙門行。如是八法，出家沙門應當遠離。迦葉！我不說剃頭法服名為沙門，所謂有功德儀式具足者乃名為沙門。

「迦葉！沙門身服袈裟，心應遠離貪恚癡行。何以故？心無貪恚癡行，我乃聽著袈裟。迦葉！若心有貪恚癡法而身著袈裟，除專心持戒，餘不持戒人則為燒滅袈裟。何以故？聖人表式，隨順寂滅行慈悲心離欲滅者之所應服。迦葉！汝今聽我說，聖人表式有十二事。何等十二？迦葉！持戒是聖人表式，禪定是聖人表式，智慧是聖人表式，解脫是聖人表式，解脫知見是聖人表式，入四聖諦是聖人表式，能解十二因緣是聖人表式，行四無量心是聖人表式，行於四禪是聖人表式，行四無色定是聖人表式，入四向正定是聖人表式，斷一切漏是聖人表式。迦葉！是名聖人十二表式迦葉。若有比丘不具足聖人十二表式身服袈裟者，我說此比丘是邪法行、非寂滅行、離佛法行，不近涅槃順生死行，為魔所鈎不度生死，於正法退而行邪法。

「迦葉！是故出家比丘身服袈裟時，若未得沙門果者，應以八法敬重袈裟。何等八？於身袈裟，應起塔想、世尊想、寂滅想、慈想、敬如佛想、慚想、愧想、令我來世離貪恚癡具沙門法想。迦葉！是名八法敬重袈裟。迦葉！若有於四聖種不行知足離沙門法，亦不以此八法敬重袈裟者，而彼別有似沙門數墮小地獄。迦葉！彼地獄中似沙門者於中受罪，衣鉢支體皆悉熾然。坐臥之處凡有所用物，亦皆熾然如大火聚。似沙門者受如是罪。何以故？成就不淨身口意業故墮是罪處。

「迦葉！若非沙門自言我是沙門非梵行者、自言我有梵行，若有持戒功德具足人所右遶恭敬尊重者，若破戒比丘受其禮敬供養而不自知惡，彼惡比丘以是不善根故得八輕法。何等八？一作愚癡，二口瘖瘂，三受身矬陋，四顏貌醜惡，其面側戾見者蚩笑，五轉受女人身作貧窮婢使，六其形羸瘦夭損壽命，七人所不敬常有惡名，八不值佛世。迦葉！是破戒比丘受持戒者禮敬供養，得如是八種法。迦葉！破戒比丘聞如是法已，應當不受持戒比丘禮敬供養。迦葉！若有非沙門自言我是沙門、非梵行自言我有梵行，於此大地乃至無有涕唾分處，況舉足下足去來屈伸。何以故？過去大王持此大地施與持戒有行德者，令於中行道。迦葉！是破戒比丘舉足下足處，一切信施不及此人，況僧坊及招提僧舍經行之處。若有房舍床敷園林，所有衣鉢臥具醫藥一切信施，所不應受。迦葉！我今當說。若有非沙門自言我是沙門、非梵行自言我有梵行，不能必報信施如一毛端。何以故？聖眾福田猶如大海最妙最勝，於中若有施主淨心信故，以施種子種福田中，如此施主起無量施想。迦葉！若有破戒比丘，如分一毛以為百分，若惡比丘受信施如一毛分，隨所受毛分即損失施主爾所大海福報之分，不能畢報。迦葉！是故應淨其心受他信施。迦葉！應如是學。」

爾時眾中有淨行少欲離扼比丘二百人，聞說是已捫淚而白世尊：「我今當死，不欲以不得沙門果受他信施乃至一食。」

佛言：「善哉善哉。善男子！汝如是慚愧畏於後世，喻如金剛，即是現世瓔珞。善男子！我今當說。世有二人應受信施。何等二？一者勤行精進，二者得解脫者。」

佛告比丘：「若有比丘得解脫者、行善法者，如我所說堅持戒者，觀一切行無常苦一切法無我者，觀涅槃寂滅願求欲得，如是比丘受他信施摶如須彌，必能報是信施之福。若有比丘受信施主施，令此施主得大利益得大果報。何以故？常生福德。有三種福：一常施食，二僧坊舍，三行慈心。此三福中慈心最勝。」

佛告比丘：「若有比丘從施主受施，若衣鉢臥具飲食湯藥受已，若入無量定，令彼施主得無量福得無量報。迦葉！譬如三千大千世界所有大海尚可竭盡，而此施主所得福報不可得盡。迦葉當知，破戒比丘損於施主爾所福德。若受施主施已，行於惡法損他信施。迦葉！如是說沙門垢、沙門過罪、沙門諂曲、沙門中賊。迦葉！持戒比丘應當專念，遠離如是一切惡法。

「迦葉！所謂沙門者，眼不流色中，耳鼻舌身意不流法中，是故謂之沙門。選擇六入、了達六通、專念六念、安住六敬法、行六重法，是謂沙門。」

${mvp.startInVol('比丘品第二', 'p02', '沙門品第一')}

爾時佛告迦葉：「所言比丘，比丘者能破煩惱，故名比丘。破我想、眾生想、人想、男想、女想，是謂比丘。復次迦葉！有修戒修慧，是名比丘。復次迦葉！離恐畏故、度三有四流故、見有及流諸過患故、離一切有及流故、安處無畏道故，是名比丘。迦葉！若有比丘自知不成就如是之法及餘善法，又離是法行於餘道，迦葉！彼比丘非我弟子、我非彼師。迦葉！多有惡比丘壞我佛法。迦葉！非九十五種外道能壞我法，亦非諸餘外道能壞我法，除我法中所有癡人。此癡人輩能壞我法。迦葉！譬如師子獸中之王，若其死已，虎狼鳥獸無有能得食其肉者。迦葉！師子身中自生諸蟲，還食其肉。迦葉！於我法中出如是等諸惡比丘，貪惜利養為貪利所覆，不滅惡法、不修善法、不離妄語。迦葉！如是比丘能壞我法。

「迦葉！有四法成就，當知是惡比丘。何等四？貪恚癡及我慢者，是名惡比丘。復有四法成就，當知是惡比丘。何等四？傲慢自大、無慚、無愧、不慎口過，是名惡比丘。復有四法成就，當知是惡比丘。何等四？掉動、輕他、貪求利養、多行非法，是名惡比丘。復有四法成就，當知是惡比丘。何等四？多有姦偽、幻惑於人、多行邪命、多說惡言，是名惡比丘。復有四法成就，當知是惡比丘。何等四？現受他恩不知報之、小恩於他責望大報、先受他恩而不憶念、侵損親友，是名惡比丘。復有四法成就，當知是惡比丘。何等四？受人信施失他福報、不善護戒、輕所受戒、不堅持律，是名惡比丘。復有四法成就，當知是惡比丘。何等四？有我論、有眾生論、有命論、有人論，是名惡比丘。復有四法成就，當知是惡比丘。何等四，不敬佛、不敬法、不敬僧、不敬戒，是名惡比丘。復有四法成就，當知是惡比丘。何等四？若僧和合而心不悅、不樂獨處、樂於眾中、常論世俗所有言說，是名惡比丘。復有四法成就，當知是惡比丘。何等四？求於利養、求大名稱、求多知識、不住聖種，是名惡比丘。復有四法成就，當知是惡比丘。何等四？繫屬於魔、為魔所害、多於睡眠、作善不喜，是名惡比丘。復有四法成就，當知是惡比丘。何等四？於佛法中朽敗、心懷諛諂、為煩惱所害、離沙門果，是名惡比丘。復有四法成就，當知是惡比丘。何等四？為婬欲所燒、瞋恚所燒、愚癡所燒、亦為一切煩惱所燒，是名惡比丘。復有四法成就，當知是惡比丘。何等四？多遊婬里不知過惡、不知知足、雖多學問不知知足、於所須物常懷嫉心不能施他，是名惡比丘。復有四法成就，當知是惡比丘。何等四？從闇入闇從癡入癡、不見聖諦多生疑惑、常為生死之所繫縛、閉涅槃門，是名惡比丘。復有四法成就，當知是惡比丘。何等四？身多姦行、口多姦行、意多姦行、儀式多姦行。云何身多姦行？安詳而行是身姦行，不左右視是身姦行，若左右視不過一尋是身姦行，邪命著衣是身姦行。諛諂行於空閑之處，不求空閑所行之法；諛諂乞食不觀乞食相；諛諂著糞掃衣，不知為慚愧故；諛諂行於山窟樹下，不知分別十二緣行；諛諂服於陳故棄藥，不求甘露法藥。迦葉！是名身多姦行。迦葉！云何口多姦行？他識我他請我，如所求我已得，我不求利養而他送與我，細妙供養我皆得，多利養我亦得，我常行善法應受供養，我善問答，我能順法相，我能逆法相，我於一切法解義非義；他若如是問我，我能如是答，答已伏彼令其默然；我說是已能令大眾一切喜悅，亦令一切歎言善哉。令彼眾人請我供養，得供養已復令施主請言數來。迦葉！若有不調伏口而有所說，一切所言皆非正言，是口多姦行。迦葉！是名口多姦行。迦葉！云何意多姦行！心所牽連貪求利養、衣鉢臥具飲食醫藥，而口說言一切利養我所不須，心實多求而詐言知足，是名意多姦行。」

爾時世尊而說偈言。

/gatha/
「心求利養，　口言知足，　邪命求利，　常無快樂。　
　其心多姦，　欺誑一切，　如此之心，　都不清淨。　
　諸天龍神，　有天眼者，　諸佛世尊，　咸共知見。
//

「迦葉！如是惡比丘，離善法儀式、作邪命行，墮三惡道。」

${mvp.startInVol('旃陀羅品第三', 'p03', '比丘品第二')}

佛告迦葉：「云何旃陀羅沙門？迦葉！譬如旃陀羅，常於塚間行求死尸，無慈悲心視於眾生，得見死尸心大喜悅。迦葉！如是沙門，旃陀羅常無慈心，至施主家行不善心，所求得已生貴重心。從施主家受利養已，不教施主佛法毘尼，為利養故親近在家，不為法故亦無慈心常求利養。迦葉！是名沙門旃陀羅。迦葉！如旃陀羅為一切人之所捨離，所謂大臣長者及諸小王、剎利婆羅門并餘庶民，乃至下賤之所遠離，不欲共作知識。迦葉！如是沙門旃陀羅，亦為一切之所遠離。所謂持戒有德人所敬者，比丘、比丘尼、優婆塞、優婆夷，天、龍、鬼神及乾闥婆，知其破戒行惡法故。迦葉！是名沙門旃陀羅。迦葉！如旃陀羅，所有衣服飲食諸所用物，盡非好人之所愛樂亦不受用。迦葉！如是沙門旃陀羅，若有衣鉢所用之物，皆是破戒非法身口意業諛諂所得。持戒沙門婆羅門捨不愛樂亦不受用，於此人所生哀愍心。迦葉！是名沙門旃陀羅。迦葉！如旃陀羅，以愧恥心持所用器從他乞食。迦葉！如是沙門旃陀羅，以愧恥心入於房舍，及至他家或到眾中，亦以愧心至於佛所，亦以愧心禮如來塔，亦以愧心去來屈伸，亦以愧心行住坐臥。一切所行皆有愧心，覆藏惡法故。迦葉！我今當說，旃陀羅人所至之處不到善處。何以故？自行惡法故。迦葉！如是沙門旃陀羅所至之處亦不到善道，多作惡業無遮惡道法故。迦葉！是名沙門旃陀羅。

「迦葉！云何沙門敗壞？迦葉！譬如好酒香味具者，是酒之醍醐接取已盡下有糟滓，人所惡賤無所施用。迦葉！如是敗壞沙門，離於法味取煩惱滓，人所惡賤無所施用。離持戒香嗅諸煩惱，若有至處不能自利亦不益他。迦葉！是名敗壞沙門。迦葉！敗壞者如有所食變為糞穢，臭惡不淨人所厭離。迦葉！如是敗壞沙門猶如糞穢，以身口意業不清淨故。迦葉！是名敗壞沙門。迦葉！譬如敗種種大地中終不生牙實。迦葉！如是敗壞沙門，雖在佛法不生善根，不得沙門果。迦葉！是名敗壞沙門。

「迦葉！云何沙門篋？迦葉！譬如畫篋巧工所成，中盛臭穢種種不淨。迦葉！如是沙門篋，外現成就似沙門行，內有種種垢穢行諸惡業。迦葉！是名沙門篋。

「迦葉！云何沙門构欄荼？迦葉！譬如构欄荼華色貌鮮好，其體堅鞕猶如木石，其氣臭穢猶如糞塗。有智之人若見此華，不近不觸遠避而去。愚人若見，不知過患近而嗅之。迦葉！如是沙門构欄荼，現似沙門行而有麁獷，傲慢自高臭穢不淨，又作破戒無儀式行破於正見。迦葉！如是沙門构欄荼，智者不親近不禮敬右遶，以惡人故而遠離之。迦葉！若有癡如小兒，彼諸癡人之所親近，禮敬右遶信受其語，如构欄荼華為癡人所捉。迦葉！是名沙門构欄荼。

「迦葉！云何沙門求利？迦葉！譬如諛諂之人，心常慳惜為貪所覆，若見他財物悕望欲得，畜利刀杖無慚愧心，無哀愍心常有害心。若行空澤山林聚落發如是心，於他財物希求欲得，常自藏身不令他見。迦葉！如是沙門求利，心常慳惜為貪所覆，於所得利心無知足，於他財物悕望欲得。有所至處聚落城邑，常為利養不為善法。覆藏諸惡，謂善比丘知我破戒，知已若說戒時或驅我出。於善比丘但生恐畏，心常諛諂現行儀式。一切天龍鬼神有天眼者知此比丘，來時賊來、去時賊去、行時賊行、坐時賊坐、臥時賊臥、取衣時賊取衣、著衣時賊著衣、入聚落時賊入聚落、出聚落時賊出聚落、食時賊食、飲時賊飲、剃髮時賊剃髮。迦葉！如是癡人去來儀式，皆為天龍鬼神之所知見，見已訶罵：『如此惡人即為壞滅釋迦牟尼佛法。』作是訶責諸惡比丘。又彼諸天龍鬼神見持戒梵行沙門婆羅門，增益信心禮敬尊重，此人於佛法中應受利養者。迦葉！此沙門求利，於佛法中出家，不能生一念寂滅離欲之心，況得沙門果。若有得者，無有是處。迦葉！是名沙門求利。

「迦葉！云何稗沙門？迦葉！譬如麥田中生稗麥，其形似麥不可分別。爾時田夫作如是念，謂此稗麥盡是好麥。後見穟生爾乃知非，不得名言一切是麥。迦葉！如是稗沙門在於眾中，似是持戒有德行者，施主見時謂盡是沙門。而彼癡人實非沙門言是沙門、非梵行人自言梵行，先來敗壞離於持戒亦不入眾數，於佛法中無智慧命，當墮惡道。猶如稗麥在好麥中。爾時天龍鬼神有天眼者，見彼癡人墮於地獄，見已各相謂言：『此是癡人，先似沙門行不善法，今當墮於大地獄中，從今已後終不能得沙門德行及沙門果。猶如稗麥在好麥中。』迦葉！是名稗沙門。

「迦葉！云何逋生沙門？迦葉！譬如逋生稻苗，以不熟故名為逋生。以無實故風所吹去，無堅重力似稻非稻。迦葉！如是逋生沙門，形似沙門無人教呵，無有德力為魔風所吹，亦無血氣持戒之力，離於多聞損失定力亦遠於智，不能破壞諸煩惱賊，名如是人輕劣無力，繫屬於魔為魔所鉤，沒在一切煩惱之中，為魔風所吹如逋生稻。迦葉！逋生之稻不中為種亦不生牙。迦葉！如是逋生沙門，於佛法中無道種子，於賢聖法中不得解脫。迦葉！逋生沙門者，所謂破戒行惡，是名逋生沙門。

「迦葉！云何似沙門？迦葉！譬如巧工以金塗銅，其色似金價不同金，若揩磨時乃知非金。迦葉！如是似沙門者好自嚴飾，常澡浴身齊整著衣，沙門儀式一切具足，去來屈伸常正儀式。而彼常為貪恚癡所害，亦為利養禮敬讚歎所害，亦為我慢增上慢一切煩惱所害。雖為人所貴無貴重法，常勤嚴身悕望飲食，不求聖法不畏後世，現見尊重非將來尊重，但長肌肥依於利養非依於法。種種繫縛勤作家業，順在家心亦隨受，苦時受苦、樂時受樂，為愛憎所害。於沙門法無心欲行離諸儀式，必當墮於地獄、餓鬼、畜生。彼人無沙門實、無沙門稱，不與沙門等。迦葉！是名似沙門。

「迦葉！云何失沙門血氣？迦葉！譬如男子若女人，若童男若童女，非人飲其血氣，彼人羸瘦無有色力，由失血氣故。迦葉！如是之人失血氣故，諸藥呪術及諸刀杖所不能治，必至於死。迦葉！如是沙門無有持戒、定、慧、解脫、解脫知見血氣，及慈悲喜捨血氣，亦無行施調伏護身口意業血氣，亦無安住四聖種血氣，無有儀式血氣，亦無淨身口意血氣。迦葉！是名沙門失於血氣。迦葉！如失血氣沙門，雖受如來法藥不以自度。法藥者，所謂若起婬欲應觀不淨，若起瞋恚應行慈心，若起愚癡應觀十二因緣，於諸煩惱應正思惟，離於樂眾捨我所有。出家三事應當愛護。三事者，所謂持戒清淨、其心調伏、入定不亂。迦葉！如是法藥我之所說、我所聽服，雖受此藥不以自度。迦葉！又有出世法，所謂空觀無相無作觀、陰界入知、四聖諦及十二因緣。迦葉！如是法藥，彼人亦復不以自度。迦葉！如是沙門臭穢不淨，以破戒故、薄福德故。生極下處，以憍慢故。於此命終不生餘處，必當墮在大地獄中。如人失於血氣必定至死，如是沙門於此命終必墮地獄。迦葉！是名失血氣沙門。」

如是說已，五百比丘捨戒還俗。爾時有諸比丘呵彼比丘言：「若大德於佛法中退還家者，如是非善、如是非法。」

佛告諸比丘：「莫作是語。何以故？若如是者名為順法。若比丘不欲受人信施退還家者，是名順法。彼諸比丘信解心多故生悔心。」

說此語時，彼得聞已作如是念：「我等或能行不淨行受他信施，應生悔心退而還家。」

「迦葉！我今說此諸比丘等，於此命終生兜率天彌勒菩薩所。彌勒如來出於世時，彼諸比丘在初會數中。」

爾時摩訶迦葉白佛言：「世尊！云何比丘能營眾事？」

佛告迦葉：「我聽二種比丘得營眾事。何等二？一者能淨持戒，二者畏於後世喻如金剛。復有二種。何等二？一者識知業報，二者有諸慚愧及以悔心。復有二種。何等二？一者阿羅漢，二者能修八背捨者。迦葉！如是二種比丘，我聽營事自無瘡疣。何以故？迦葉！護他人意此事難故。迦葉！於佛法中種種出家、種種性、種種心、種種解脫、種種斷結，或有阿蘭若、或有乞食、或有樂住山林、或有樂近聚落清淨持戒。或有能離四扼、或有勤修多聞、或有辯說諸法、或有善持戒律、或有善持毘尼儀式、或有遊諸城邑聚落為人說法。有如是等諸比丘僧，營事比丘善取如是諸人心相。迦葉！若阿蘭若比丘樂空閑處，營事比丘一切役使不應令作。有時阿蘭若比丘在比丘僧次役使，而營事比丘應當代作。若自不作，應倩他人令代為之。不應役使阿蘭若比丘，若非行道時可少令作。迦葉！若有乞食比丘，彼營事比丘於乞食比丘應與好食。若有比丘能離四扼，營事比丘隨所須物應當供給，所謂衣服飲食臥具醫藥。若離扼比丘所住之處，營事比丘於其住處不應高聲大喚，亦不令他高聲大喚，欲防護離扼比丘故。營事比丘於離扼比丘應生尊敬如世尊想，生如是念：『如是比丘於佛法中能作法柱，當隨所須而供給之。』迦葉！若有勤修多聞比丘，營事比丘應當勸喻，作如是言：『大德勤修多聞讀誦令利，我當為諸大德供給使令。若諸大德勤修多聞，於比丘僧中是好瓔珞，能昇高座廣說正法，亦自生智慧。』營事比丘不應非時役使，應當擁護令修多聞。迦葉！若有說法比丘，營事比丘應事事供給，應將說法比丘至城邑聚落，勸喻諸人令就聽法，說法之處亦應供給，為說法人敷好高座。若有比丘強自以力欲壞說法者，營事比丘應往和解，亦應數往說法人所稱言善哉。迦葉！若有比丘善持戒律、善持毘尼義，營事比丘應往其所數數問義：『我云何營事令不得罪，自無所損不害於他。』持毘尼義比丘應觀營事者心，隨所營事而為說法，所謂是應作、是不應作。營事比丘於持律人所，一心生信禮敬供養。若比丘僧所有分物，應當隨時供給於僧不應藏舉，隨僧所須，應當分與應與時與，不惡心與、不以非法與、非欲心與、非瞋心與、非癡心與、非畏心與，隨僧法行非隨在家行，隨僧制行非自隨制行。不於僧物生自在想，乃至小事與僧共斷非自在斷。若所用物，所謂常住僧物及與佛物、若招提僧物，彼營事比丘應當分別，常住僧物不應與招提僧，招提僧物不應與常住僧，常住僧物不應與招提僧物共雜，招提僧物不與常住僧物共雜。常住僧物、招提僧物不與佛物共雜，佛物不與常住僧物、招提僧物共雜。若常住僧物多而招提僧有所須者，營事比丘應集僧行籌索欲，若僧和合應以常住僧物分與招提僧。迦葉！若如來塔或有所須、若欲敗壞者，若常住僧物、若招提僧物多，營事比丘應集僧行籌索欲，作如是言：『是佛塔壞，今有所須。此常住僧物招提僧物多，大德僧聽，若僧時到僧忍聽，若僧不惜所得施物，若常住僧物、若招提僧物，我今持用修治佛塔。』若僧和合，營事比丘應以僧物修治佛塔。若僧不和合，營事比丘應餘勸化在家人輩，求索財物修治佛塔。迦葉！若佛物多者，營事比丘不得以佛物分與常住僧及招提僧。何以故？於此物中應生世尊想。佛所有物乃至一線，皆是施主信心施佛，是故諸天世人於此物中生佛塔想，而況寶物。若於佛塔先以衣施，此衣於佛塔中寧令風吹雨爛破盡，不應以此衣貿易寶物。何以故？如來塔物無人能與作價者，又佛無所須故。迦葉！有如是善淨營事人者，三寶之物不應令雜。又於自利養心常知足，三寶物中不生我所有想。迦葉！營事比丘若生瞋心，而於持戒大德人所右遶禮敬之者，以自在故驅令役使。是故營事比丘以瞋心緣故，墮大地獄。若得為人，作他奴僕，常為其主苦驅役使人所鞭打。

「復次迦葉！若營事比丘以自在故更作重制，過僧常限讁罰比丘非時令作。是營事比丘以此不善根故，墮於多釘小地獄中。生此中已，以百千釘釘挓其身，其身熾然出大火焰如大火聚。若於持戒有大德者以重事怖之，以瞋心語故，彼營事比丘生地獄中，其所得舌長五百由旬，以百千釘而釘其舌，一一釘中出大火焰。迦葉！若營事比丘數得僧物慳惜藏舉，或非時與僧、或復難與、或困苦與、或少與或不與、或有與者或不與者。營事比丘以此不善根故，墮穢惡餓鬼常食糞丸。此人命終當生是中，爾時更有餓鬼以食示之而復不與。此鬼爾時悕望欲得，諦視此食目不曾眴，受飢渴苦於百千歲中常不得食，或時得食變為糞屎、或作膿血。何以故？有持戒人人所敬禮，僧所有物以自在故而難與之。迦葉！若營事比丘以常住僧物、若招提僧物及以佛物輒自雜用，得大苦報，若受一劫若過一劫。何以故？以侵三寶物故。迦葉！若營事比丘聞如是罪、知如是罪，而故生瞋心於持戒者。我今說此，諸佛世尊所不能治。迦葉！是故營事比丘聞如是非法罪已，應當善護身口意業，自護亦護他。迦葉！營事比丘寧自噉身肉，終不雜用三寶之物作衣鉢飲食。」

爾時摩訶迦葉白佛言：「世尊！未曾有也。如來自以慈心說如是法，為無慚愧者說無慚愧法，有慚愧者說慚愧法。」

爾時摩訶迦葉白佛言：「世尊！若有比丘自言阿蘭若比丘，世尊！齊幾所名阿蘭若比丘？齊幾所名乞食比丘？齊幾所名畜糞掃衣比丘？齊幾所名樹下比丘？齊幾所名塚間比丘？齊幾所名露處比丘？」

佛告迦葉：「阿蘭若比丘，必樂阿蘭若處、住阿蘭若處。迦葉！若阿蘭若處，所謂無大聲，無眾閙聲，離麞鹿虎狼及諸飛鳥，遠諸賊盜及牧牛羊者。順沙門行處如是阿蘭若處，應於中修行。彼比丘若欲至阿蘭若處，應當思惟八法。何等八？一者我當捨身，二者應當捨命，三者當捨利養，四者離於一切所愛樂處，五者於山間死當如鹿死，六者阿蘭若處當受阿蘭若行，七者當以法自活，八者非以煩惱自活。迦葉！是名八法，阿蘭若比丘所應思惟，思惟已當至阿蘭若處。迦葉！阿蘭若比丘至阿蘭若處已，行阿蘭若法，以八行行慈，於一切眾生生慈心。何等八？一者以慈利益，二者以慈樂，三者無恚慈，四者正慈，五者無異慈，六者順慈，七者觀一切法慈，八者淨如虛空慈。迦葉！以如是八行於諸眾生生慈心。迦葉！阿蘭若比丘至阿蘭若處已，應如是思惟：『我雖至遠處獨無伴侶，若我行善若行不善無人教呵。』復作是念：『此有諸天龍鬼神、諸佛世尊，知我專心，彼為我證。我今在此行阿蘭若法，我不善心不得自在。若我至此極遠之處，獨無伴侶無親近者無我所有，我今當覺欲覺恚覺惱覺，餘不善法亦應當覺。我今不應不異於樂眾者，亦不應不異近聚落人，若如是不異，我即為誑諸天龍鬼神已，諸佛見我亦不歡悅。我今若如阿蘭若法，則諸天龍鬼神不見呵責，諸佛見我即亦歡悅。』迦葉！阿蘭若比丘住阿蘭若處行阿蘭若法，一心堅持解脫禁戒、善護戒眾，淨身口意無諛諂行，淨於正命，心向諸定，如所聞法，應憶念之勤正思惟，趣向離欲寂滅涅槃。畏於生死觀五陰如怨家，觀四大如毒蛇，觀六入如空聚。善知方便，觀十二因緣離斷常見，觀無眾生無我無人無命，解法空相行於無相，漸損所作而行無作。心常驚畏於三界行，常勤修行如救頭然，常行精進終不退轉。觀身實相，應生如是心觀如是法，當知苦本、斷一切集、證於滅盡、勤修於道。行於慈心安住四念處，離不善法入善法門，安住四正勤、入四如意足、護五善根，於五力中而得自在。覺七菩提分、勤行八聖善道分，受持禪定，以慧分別諸法之相。迦葉！說如是法以嚴飾阿蘭若比丘。作是嚴飾已住於山林，初夜後夜勤修諸行不應睡眠，常念欲得出世之法。迦葉！阿蘭若比丘凡所住處常修行道，不自嚴身及諸衣服，拾乾枯草以用敷坐自用坐具，離常住僧及招提僧物。於阿蘭若處，衣服知足趣得覆身，為行聖道故。

「迦葉！阿蘭若比丘若為乞食至城邑聚落，應作是念：『我從阿蘭若處至是城邑聚落，若得食若不得心無憂喜。』若不得食者，應生喜心念宿業報，我今當勤修習福業，又念如來乞食亦不得。彼阿蘭若比丘入於城邑聚落乞食，應以法莊嚴，法莊嚴已然後乞食。云何法莊嚴？若見適意色不應染著，見不適意色亦不生瞋。若聞適意聲不適意聲、若嗅適意香不適意香、適意味不適意味、適意觸不適意觸、適意法不適意法，心無染著亦不生瞋。攝護根門諦視一尋調伏其心，本所思法不令離心，不以食污心而行乞食，應次第乞食。若得食處不應生著，不得食處不應生瞋。若至十家若過十家，不得食者不應生憂，應作是心：『此諸長者及婆羅門，多有諸緣不與我食。又此長者諸婆羅門，乃至未曾生心念我，況與我食。』迦葉！阿蘭若比丘若能如是，於乞食中不生驚畏。迦葉！阿蘭若比丘乞食時，若見眾生若男若女若童男童女，乃至畜生，應於是中生慈悲心：『我行如是精進，作如是願。若眾生見我及與我食者皆生天上。』迦葉！阿蘭若比丘若得麁食若得細食，受是食已應觀四方，此村邑中誰貧窮者，當減此食以施與之。若見貧人所可乞食即分半與，若不見貧者應生是心：『我眼所不見眾生，我所得食於中好者願施與之。我為施主彼為受者。』

「迦葉！阿蘭若比丘乞食，得受食已，持至阿蘭若處淨洗手足，淨沙門儀式具一切淨法，如法取草已結加趺坐，坐已而食，心無愛著亦無貢高，無有瞋心無濁亂心。臨欲食時如是思惟：『今此身中有八萬戶蟲，蟲得此食皆悉安樂，我今以食攝此諸蟲。我得阿耨多羅三藐三菩提時，以法攝取。』迦葉！又時阿蘭若比丘食或不足，應作是念：『我今身輕能修忍辱，斷除諸惡少大小便，得身輕已亦得心輕，又得少睡亦不起欲想。』應作如是思惟。迦葉！阿蘭若比丘若乞食得多，應生知足想。應於食中減取一摶置淨石上，如是思惟：『有諸鳥獸能噉食者，我以施之，彼為受者。』迦葉！阿蘭若比丘食已洗鉢漱口洗手，淨滌應器手拭令乾，舉僧伽梨依阿蘭若處行，不離本所思惟法相。迦葉！阿蘭若比丘行阿蘭若行時，若是凡夫未得沙門果，或時虎狼來至其所，若見不應生畏，作如是念：『我本來至阿蘭若處時已捨身命，我不應驚畏，應修慈心離一切惡亦離怖畏。若諸虎狼斷我命根噉我身肉，當生是念，我得大利，以不堅身當得堅身。此諸虎狼我不與食，今噉我肉已身得安樂。』迦葉！阿蘭若比丘行阿蘭若法，應如是捨身命。

「迦葉！阿蘭若比丘行阿蘭若法，若有非人或作好色、或作惡色來至其所，於此非人不生愛心不生瞋心。迦葉！或有曾見佛諸天來，至阿蘭若所作諸問難。問難已，阿蘭若比丘隨力所能隨所學法為諸天說。或時諸天有深問難，阿蘭若比丘若不能答，不應生於憍慢之心，應作是言：『我不多聞，汝莫輕我。我今當勤修學佛法，或時我得通佛法已，能一切答。』又應勸請諸天：『汝等今當為我說法，我當聽受。』又應如是報謝言：『願勿嫌也。』復次迦葉！阿蘭若比丘行阿蘭若法，善修阿蘭若想。猶如草木瓦石無主無我亦無所屬，此身亦爾，無我無命無人無眾生無諍訟，此法皆從緣合而生。於此法中若善思惟，我當得斷一切諸見，常應思惟空無相無作法。迦葉！阿蘭若比丘行阿蘭若法時，若草藥草及諸樹林，云何和合？云何散滅？如此外物，無主無我無有我所亦無諍訟，自生自滅無生滅者。迦葉！如草木瓦石無我無主亦無所屬，此身亦爾，無我無命無人無眾生無諍訟，從眾緣生緣離則滅，此如實中無有一法若生若滅。迦葉！如是法，阿蘭若比丘至阿蘭若處所應修行。迦葉！阿蘭若比丘行如是法，若學聲聞乘疾得沙門果，若有障法現世不得沙門果者，不過見一佛二佛三佛，必定得斷一切諸漏。若學菩薩乘，現世得無生法忍得無障法，必見未來諸佛，疾成阿耨多羅三藐三菩提。」

說此阿蘭若品時，有五百比丘斷一切漏心得解脫。

佛告迦葉：「云何比丘乞食？迦葉！若有比丘先安住本誓：『我依乞食出家。我今住先誓。』彼比丘專念無有諛諂，離一切請食、離一切僧中供養堅自莊嚴。乞食比丘於一切味中不應生好味想，又於上妙食中自勸其心生如是想：『我如旃陀羅，應淨身心，不應淨飲食。何以故？食好食已，一切為糞。臭穢不淨故，我不應求好食。』如是調伏心已，若入城邑聚落次第乞食，不應生如是想：『男子與我食非女人、女人與我食非男子、童男與我食非童女、童女與我食非童男。應得細食非麁食、應得美食非不美食。時應故與食非不故、應易得食非不易、應速得食非不速。若入人村應得恭敬非不恭敬、應得新食非宿食、應得富家食非貧家食、男子女人眾應來迎我。』迦葉！乞食比丘如是不善法不應思惟。迦葉！乞食比丘應如是自莊嚴，此是乞食常所行法。若乞食時得與不得無有憂喜，不應生於麁細食想。何以故？多有眾生貪著美味，由著味故作諸惡業，惡業因緣故墮於地獄畜生餓鬼。若知足者不貪美味，應捨細食受取麁食，除舌著味其心知足，得極麁食亦當知足。彼若命終生於天上或生人中，生天上已食天美食。迦葉！如是乞食比丘離於味愛以調伏心，若七日噉豆亦不生憂。何以故？趣活身故，我今食已足以修道，以是故食。迦葉！乞食比丘得此食分墮鉢中者，如法所得如法利養，應與梵行比丘共食此食。迦葉！乞食比丘或時有病，無有使人不能乞食，此應如是調伏其心：『我獨無侶一身出家，法是我伴我應念法。今我病苦，如世尊說諸比丘應念於法。我所聞法應善思惟。云何善思惟？如實觀身。如實觀身已有智慧者，若獨一心能得初禪則有是處。』得初禪樂，若一日若二日乃至七日，以禪為食其心歡悅。迦葉！乞食比丘行如是法若不得禪，應如是勤行安住善法中。有多人所知，諸天龍神送食與之，此是離扼報故。迦葉！或乞食比丘值天大雨或大風塵不能乞食，爾時以慈為食而自莊嚴，於所行法安住思惟。若二夜三夜不得食者，應生是念：『有多眾生墮餓鬼中，作惡業故苦惱所切，乃至百歲不得一唾。我今安住諸法門中，應生是念，身心羸劣今我堪忍飢渴，勤修聖道不應退轉。』迦葉！乞食比丘不應親近在家之人，男子女人童男童女。迦葉！若乞食比丘令在家人擇去食中諸不淨物，於坐處坐，應為說法。乃至食淨還受食已，從坐起去。迦葉！乞食比丘不應自現諛諂。云何自現諛諂？若為他人說如是言：『我今乞得麁惡之食，又復不足與多眾共食。我食少，我今飢渴身力羸劣。』迦葉！是名自現諛諂。迦葉！乞食比丘如是之事應當遠離。

「迦葉！乞食比丘於一切事應生捨心。若食墮鉢中，若麁若細、若少若多、若淨若不淨，一切應受心無憂喜。常應淨心觀諸法相，趣得活身為行聖道，是故受食。迦葉！乞食比丘或時入於城邑聚落次第乞食，若不得食空鉢而出，應念如來有大威德，捨轉輪王位而行出家，斷一切惡法成一切善法，入村乞食尚空鉢出。況我薄福不種善根，不空鉢還也？是故不應生憂。何以故？不種善根能得麁食細食，無有是處。我不得食，或自有魔或魔所使，或魔覆蔽諸婆羅門居士，令我乞食不得。我當勤修離於四魔，斷一切煩惱。若我勤修如是道已，非魔波旬非魔所使能作留難。迦葉！乞食比丘應如是受持聖種。」

佛告迦葉：「畜糞掃衣比丘，拾糞掃物作如是想：『為慚愧故，非以衣自嚴飾故，為障風吹日曝蚊虻蟇子諸惡觸故，安住佛教故，非求淨好故，於糞掃中拾取棄物。』取時應生二種想：何等二？一者知足想，二者易養想。復生二想：一者無慢想，二者持聖種想。復生二想：一者不以嚴身，二者令心淨故。迦葉！畜糞掃衣比丘於糞掃中拾取棄物時，若於是處見諸親族知識，見已即止不取，而作是念：『此諸人輩或呵責我言：「汝是不淨人。」』迦葉！我說是比丘不得淨行。何以故？畜糞掃衣比丘心堅如石，外物不入亦不能動故。迦葉！畜糞掃衣比丘拾糞掃中物，應淨浣濯令無垢膩，浣已好染，染已作僧伽梨，善合善綴善縫善受，受已應著莫令綻壞。迦葉！畜糞掃衣比丘安住不淨觀中著糞掃衣，為離欲故。慈心著糞掃衣，為離瞋恚故。觀十二因緣著糞掃衣，為離癡故。正思惟著糞掃衣，為斷一切煩惱故。攝護諸根著糞掃衣，為知六入故。不諛諂著糞掃衣，為令諸天龍神喜悅故。迦葉！何故名糞掃衣？迦葉！譬如死灰，人所不貪、不生我所心，法應除棄。迦葉！如是糞掃衣，非我非我所，是易得、非邪命、不求他、不觀他顏色。捨棄之物糞掃無異，亦無所屬，是故名糞掃衣。迦葉！糞掃衣是法幢，以大仙人故。是姓，以聖人故。是安住，以聖種故。是專念，以善法儀式故。是善護，以戒眾故。是向門，以定眾故。是安住，以慧眾故。是身，以解脫眾故。是順法，以解脫知見眾故。迦葉！如是畜糞掃衣得大福德，無所希求無所貪著，能離慢心能捨重擔。迦葉！若有比丘畜糞掃衣，以知足故，諸天龍鬼神貪樂欲見。迦葉！畜糞掃衣比丘若入禪定，釋梵四天王長跪合掌頭面作禮，況餘小天。迦葉！若有惡比丘勤求衣服以嚴飾身，外現淨行而內具足貪欲恚癡。雖作如是好嚴飾身，而諸天龍神不至其所禮敬供養。何以故？知此比丘勤求衣服以嚴飾身，不除心心數法垢。諸天知故則遠捨去。

「迦葉！汝見周那沙彌拾不淨臭穢糞掃中物，乞食已至阿耨大池欲浣濯之。爾時池邊有常住諸天，皆遠奉迎頭面作禮。彼諸天等皆樂淨潔，而取周那沙彌所捉不淨糞掃衣而為浣之令無垢穢，又取浣汁自以洗身。諸天知周那能持淨戒，入諸禪定有大威德，是故奉迎恭敬作禮。迦葉！汝見須跋陀梵志著淨潔衣乞食已，欲至阿耨大池時，常住諸天於池四面面各五里，遙遮梵志不令近池，恐以不淨食及以殘食污此大池。迦葉！汝今現見此事，以聖人正行威德故得是果。周那沙彌所有不淨糞掃中物，而諸天取之為浣，亦以浣汁自洗其身。須跋陀梵志去池五里不令近之。迦葉！誰聞是已，於聖法中不勤修學？彼諸聖人諸天世人，皆來頭面禮敬供養。迦葉！欲求如是聖德故，畜糞掃衣。迦葉！畜糞掃衣比丘，安住聖種不應生憂，於糞掃衣應生塔想、應生世尊想、應生出世想、應生無我無我所想，如是觀已著糞掃衣，應如是調伏其心。由心淨故得身淨，非身淨故得心淨。迦葉！是故當淨其心，莫嚴飾身。何以故？由心淨故，於佛法中得名梵行。迦葉！如是畜糞掃衣比丘能如是學，則為學我亦學於汝。迦葉！若汝能畜如是麁衣，則便知足行於聖種。迦葉！汝僧伽梨若著床上、若在坐處，著憂多羅僧經行，則有千萬諸天禮汝僧伽梨，此僧伽梨是戒定慧所薰者覆身之衣。迦葉！當知汝衣尚得如是尊重禮敬，況汝身耶。迦葉！我捨轉輪王位出家學道，先所著好上妙繒衣、頭羅衣、好細疊衣、諸上妙衣，一切著已。我今知足行於聖種，為餘人故身捨好服畜塚間衣。若當來比丘聞我此法，即得學我。迦葉！汝本有金縷上衣，我從汝索，汝持與我。迦葉！我愍汝故即為汝受，非以貪故、非以嚴身故。迦葉！有惡比丘，不能學我亦不學汝，為貪所覆，多畜衣鉢積聚飲食藏舉不捨，亦畜金銀琉璃穀米牛羊鷄猪驢馬車乘犁具，家業所須皆求畜之。迦葉！有智之人雖在於家能增善法，非癡人出家得是善分。云何智人在家能增長善法？迦葉！若有出家以袈裟遶項，無沙門行多有緣事，種種繫縛求好衣食。著袈裟已在家人見，禮敬給施衣服飲食臥具湯藥，來去迎送。迦葉！在家之人得如是善法。彼出家人無有是事。何以故？彼出家人多求所須，不能施他故。迦葉！當來有比丘多畜衣鉢多有諸物，時彼比丘多為諸在家人所見禮敬尊重讚歎。何以故？謂是比丘多受他施或持與我，我有所須能時時與。迦葉！或有比丘持戒見世過患，勤修善法離一切漏如救頭然，其心知足少諸緣事，勤修自利離於一切習惡緣者。而彼比丘無人往至其所無親近者，無禮敬尊重讚歎者。何以故？彼在家人輕躁淺薄，見現世利不見後世利。彼在家人生如是心：『此比丘邊不得利益，用親近為？用禮敬尊重讚歎為？』除貧窮人少善根者、宿緣應敬者，迦葉！如是人等親近禮敬尊重讚歎持戒比丘以為善知識。迦葉！如是說已稱可二種人意。何等二？一者若見四聖諦，二者若見生死過患。復有二：一者勤行欲離四扼，二者欲得沙門果。復有二：一者專念業報，二者欲知諸法相義。迦葉！我今閉塞一切懈怠者門，所謂不知業不知業報者，離善儀式者，不見後世過惡喻如金剛、見現世利不見後世利、不生一念向解脫門者。迦葉！我今說彼惡比丘不應希望，若說如是法、若遇如是法。聞如是法已自知所行，不解深法而誹謗之，謂非佛說，是論師作，或魔所說，用教餘人。彼惡比丘如是自害亦復害他，自染垢污亦垢污他。是惡比丘不能自利亦不利他。」

爾時摩訶迦葉白佛言：「世尊！如諸佛大悲故，說專行比丘於諸法中得自在者，如來於此經中已廣說竟。世尊！若有眾生聞此經已，信解讀誦向如實法，當知是諸眾生已為諸佛之所攝取。」

爾時佛告阿難：「若有受持是經者，已於先佛種諸善根故，今欲得此經讀誦通利、欲得解脫，所謂善男子善女人，若出家學若在家學，此法門能斷諸漏亦得涅槃。」

阿難白佛言：「世尊！我欲受持此經。當何名此經？云何受持？」

佛告阿難：「此經名『選擇一切法寶』，亦名『安住聖種儀式』，亦名『攝取持戒者』，亦名『節解破戒者』，亦名『寶梁』，亦名『寶取』，亦名『寶藏』，亦名『諸寶法門』。」

摩訶迦葉問大乘寶梁經竟，諸比丘眾聞佛所說，歡喜奉行。
