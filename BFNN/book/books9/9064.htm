<html>
<head>
<meta http-equiv=Content-Type content="text/html; charset=utf-8">
<link rel="stylesheet" href="../books/book.css">
<script src="../../../env.js"></script>
<script src="../../../util/utils.js"></script>
<script src="../mybfnn.js"></script>
</head>
<body link=blue vlink=purple background="../books/textbackground.jpg" class="Normal">
<div id="stg"></div>
</body></html>

<script>
var SYFTJ = new (class extends SeriesContainer {
  constructor() { super(); }

  loadJS(vol) { addjs(`9064/${to2d(vol||0)}.js`); }

  showPage() {
    var buf = new Buffer(), me = this;
    new (class extends DocInfo {
      constructor() {
        super();
        this.setVolumesInJS(true, true).setBuffer(buf).setXG().reInit(9064, 4);
        this.volNum = me.volNum;
        var ttl = '思益梵天所問經', xlator = '姚秦龜茲國三藏鳩摩羅什譯';
        if (!me.volNum) {
          this.writeStart(ttl)
              .writeBody(`\n/TEXT030C/${xlator}\n${me.text}\n/VOLSEP/`, true);
        } else {
          var zvol = zNumber(me.volNum), juan = ttl + zvol;
          this.writeStart(`${ttl}|（卷${zvol}）`)
              .writeBody(`\n/TEXT030C/${xlator}\n` +
                         `${me.text}\n\n/TEXT339R/${juan}\n/VOLSEP/`, true);
        }
      }
    })(); // class extends DocInfo
    buf.render('stg');
  }

})()
.show(get('vol'), get('pin')); // 卷，品
</script>
