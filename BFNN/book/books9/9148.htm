<html>
<head>
<meta http-equiv=Content-Type content="text/html; charset=utf-8">
<link rel="stylesheet" href="../books/book.css">
<script src="../../../util/utils.js"></script>
<script src="../mybfnn.js"></script>
</head>
<body link=blue vlink=purple background="../books/textbackground.jpg" class="Normal">
<div id="stg"></div>
</body></html>

<script>
var SYFTJ = new (class extends SeriesContainer {
  constructor() { super(); }

  loadJS(vol) { return addjs(`9151/9148-${vol||1}.js`); }

  showPage() {
    var buf = new Buffer(), me = this;
    new (class extends DocInfo {
      constructor() {
        super();
        this.setVolumesInJS(false, true).setBuffer(buf).setXG().reInit(9148, 3);
        this.volNum = me.volNum;
        var ttl = '大乘起信論義記', author = '京兆府魏國西寺沙門釋法藏撰',
            zvol = 上中下(me.volNum);
        this.writeStart(`${ttl}|（卷${zvol}）`)
            .writeBody(`\n/TEXT030C/${author}\n` +
                       `${me.text}\n\n/TEXT339R/${ttl}${zvol}\n/VOLSEP/`, true);
      }
    })(); // class extends DocInfo
    buf.render('stg');
  }

})()
.show(get('vol'), get('pin')); // 卷，品
</script>
