/SECTION:a01/引言

近至民國時，夏蓮居居士再一次會集了《無量壽經》，定名為《佛說大乘無量壽莊嚴清淨平等覺經<red>會集本</red>》。淨空法師刪去「會集本」三字，以經待之，廣宣流布；持修者衆。淨空法師還宣稱，世尊所謂未來「<verse>特留此經止住百歲</verse>」者，就是這部經！這是非常有威勢的宣言。

佛弟子對世尊的愛戴難以言喻，對佛經的恭敬無以復加。當一部新的文字被「擅」定為佛經時，心情之複雜可想而知。捍衛佛經的純正，彰顯了佛弟子的忠誠，實乃值得嘉許之善舉。然而，淨空法師是眼見的大德，凡事陽謀、有據可查。於是，這本「《佛說》之經」是真是僞，牽動極廣。認可會集本真乃佛說之支持者，須得真心實信，不得有半點懷疑。反對此會集本、更不能接受其為「佛說」者，亦當真心實信，不得有半點懷疑，否則將來果報無需贅言、焉可兒戲。

本文之宗正在於尋求<u>《佛說大乘無量壽莊嚴清淨平等覺經》作為佛經</u>之可信度。

依正不二。愛屋及烏。要了解這部文，如果不了解相關人物，是不可能的。要了解人與事，不了解大環境，更是不可能。當代世上有流行詞 Zeitgeist，直譯為「時代精神」。我們的 Zeitgeist 是什麼？佛家講，「末法時代，魔比法強」。所以現在，什麼事情、任何言論、 諸類人等，只能聽聽就好、切莫當真；若事關根本，能信靠者唯有你自己。筆者所為、正為自己，兼為有緣人提供參考、工具，方便自行論證。

<i>Allons-y !</i>

/SECTION:a02/命題與方法論

我們正在研究的課題是：

/BQKaiTi/夏蓮居居士會集的《佛說大乘無量壽莊嚴清淨平等覺經<red>會集本</red>》，淨空法師刪去「會集本」三字、命為佛經，令信衆讀誦、修持、供養，可以嗎？應該嗎？

乍看此問是關於經文，實質是關於這件事。事乃人為，所以，核心問題是人。事依人成，文從事就。《佛說大乘無量壽莊嚴清淨平等覺經》之誕生、推廣，當然是一個精心安排的計畫。各個角色及時登場、各司其職，次第井然。具有很強的時間感，非碌碌之輩所能察。

我們將依如下四論探討：一、論人；二、論事；三、論文；四、論人文。
/TEXT339R/命題與方法論
/VOLSEP/
/SECTION:a03/一、論人

釋迦摩尼佛涅槃後，祂離開我們了嗎？釋迦摩尼佛出生之前，世尊、燃燈佛、阿彌陀佛、觀世音菩薩、地藏菩薩、彌勒菩薩、等等聖人，都不在這裡嗎？每時每刻，在地球上，有多少聖人，你數得過來嗎？還有大小鬼神，亦復如是。實在講，佛菩薩皆盡虛空、遍法界，祂們想逃都無處可去啊。有歎云：

/gatha/
凡夫苦啊凡夫苦
兩隻肉球滴骨圓
左瞧瞧　右瞅瞅
其實啥都看不見
//

佛菩薩、龍天善神的慈悲心不可思議。值此本紀元人類歷史上的最低點，祂們怎麼可能會無動於衷、顧左右而言他呢？

淨空法師及其同僚如夏蓮居、黃念祖等，沒有可能性是凡夫。至於具體身份，可從名號窺探一二。淨空法師俗名徐業鴻，「葉紅」者何？「釋淨空」豈非「佛僧法」之別名？請參考《<a href="9076.htm?vol=2">淨空法師是觀世音菩薩再來</a>》。黃念祖，念佛之祖。夏蓮居，蓮池居者，別號「一翁」。黃念祖是夏蓮居的學生；令人想起另一對師徒：「<verse>我憶往昔恆河沙劫，有佛出世名無量光，十二如來相繼一劫。其最後佛名超日月光，彼佛教我念佛三昧。</verse>」雖凡胎肉眼，若識文字，自當應見。雖不見真，亦勿詆毀，是為明智。無知者無畏；無明者無畏也。又或人在江湖，Zeitgeist；當聽印祖，回家抱孩。

非凡之人常行非凡之事。從聖人的角度，祂們不浪費任何教化衆生的機遇。淨空法師少時隨父打獵、殺生；其父四十五歲即悲慘亡故，如《地藏經》言；其母淡安，晚年念佛往生。又如央掘魔羅，受邪師使、欲殺千人；殺到九百九十九人，無人敢近，惟見其母，輒動殺念；然所有人物皆佛菩薩化身，示現而已。

有傳聞謂，此三者乃西方三聖駕臨娑婆，竊以為可信度高。

/gatha/
汝之心行，汝自當知。
容容虛空，藏無所藏。
萬一三人，真是聖者；
則汝自量，該去何方？
//

/SECTION:a04/二、論事

當今世界，衆業所感，五惡五痛五燒已趨極致，人民對殺盜淫妄全面深入、被貪嗔痴慢長時熏習，根基盡損，導致佛法的土壤嚴重沙漠化。必須以最直接、強力的措施，才可以有討論的意義。無疑，唯有淨土法門尚契此意。實在講，淨土法門對末法惡世衆生而言，也不過是最後一根救命稻草罷了。儻有人還在奢談禪宗天台、其他「妙法」，有智者當揣測其動機。

然，畢竟佛法未到亡時，尚有清信女、清信士內心渴求出離生死、尋求佛國。世界潮流滾滾向前，Zeitgeist 不為人之意志轉移。印光大師明察時務，言：

/BQKaiTi/「今藩籬大撤，在家人研究修習者，其多如林，得利益生西方者，亦常有其事，何得要離親出家乎？此事光絕不贊成。<br>　按實說，當今修行，還是在家人好。何以故？以一切無礙故。<br>　出家人之障礙，比在家人多，是以非真實發道心者，皆成下流坯，無益於法，有玷於佛也。」

/L/淨空法師亦報告，如今在家衆比出家衆成就者多；女衆比男衆成就者多，無論在家出家。

歷來，佛經翻譯年代久遠，時代差異本來客觀存在。且譯者翻譯理念、文學趣向、乃至語言功力各有參差；又，比之其他宗教，佛經浩如煙海。所以常有聖人示現出世，為人作註解、論著，幫助理解、修習。然，淨土法門最關鍵的經典《無量壽經》長期存在多版共存、彼此矛盾、各有欠缺的問題，招致行人多只能委屈於小本《阿彌陀經》、及祖師們的註解。雖然祖師大德的註解都很精彩，畢竟不讀大經是為缺憾。康僧鎧的譯本相對翔實，但比對他本難免有缺，且因時代因素，未盡契機，此為各版通病。

所以，淨土法門的瓶頸在於缺乏一個完整的、堪當重任的《無量壽經》版本。衆生需要的是一部即包含世尊所說的有關淨土法門的要旨、準確反映阿彌陀佛四十八個大願、又契合末法時代當下和未來根基的大經，作為淨土法門最重要的指導綱領。歷史上真心實意修習淨土的賢士們，如王龍舒、彭紹升、魏承貫，都有這個切膚之痛，以至於鋌而走險、啟筆會集。王龍舒的會集本得到廣泛讚譽、引用，證明了淨土學人們的需求。蓮池大師指出了王龍舒會集本的缺陷，致其流通式微。乃至後人繼續，終未成就。但是問題沒有解決，懸而未決。人們只能推崇康僧鎧的譯本；可是，如果康本果真周齊，又何來這一爭議？前輩們又何須大費周章、想要會集呢？淨土急需一部優良的《無量壽經》，這是客觀事實。其結果視其質量而定。

綜觀上下左右、權衡輕重緩急，大智大勇、大慈大悲的聖者們肯定覺得再造一部論著難以解渴，於是決定做一件驚世駭俗的大事：重新寫一部《無量壽經》！咦，不是「會集」麼？何來「重寫」？其實，世上哪裡有「會集本」啊；所謂「會集」就是重寫；礙於名份，以會集本作幌子而已。當然，重寫可以是天馬行空、漫無邊際，也可以是戰戰兢兢、循原文旨、乃至不越雷池一步。按照「四依法」之「依義不依語」法，文可動、義不可變；若加己義，即是改經文了。反之，若刪剔原義，亦屬改動經文。除非原文各版有所矛盾，被迫權衡作某抉擇，事出無奈。同時，體量又必須壓縮。一本好的「會集本」，大致若此。至於追求一本「完美」的會集本，無異於不食人間煙火，根本就是踢館來。

/SECTION/新《無量壽經》之設計

這部新編《無量壽經》將是末法衆生往生西方極樂世界的修行手冊。其成就即是《佛說大乘無量壽莊嚴清淨平等覺經》；自此起，本文常簡稱之為${XB}或${xb}。

淨土法門有三要素，即三資糧：信、願、行。淨土法門必須一生成就，容不得失敗。尤其當今惡世，欲得成就，難度極大。所以需要有二力保障：拉力和推力。都說淨土法門是「易行道」，可是要明白，去西方極樂世界，成就阿惟越致菩薩，就是聖人了，哪裡有那麼容易！好比從芝加哥到洛杉磯的鐵路，跟泥路比當然易行太多了。可是，一列三公里長的貨車，重量超過五千公噸！終究要翻過洛磯山脈，跋涉兩千英里方能抵達西海岸。如今時運不濟，鐵軌濕滑，光靠機車頭在前面拖，必定打滑；須得後面輔以推動機車頭，方有望跨越。

兩千英里遠、五千公噸貨、三千米海拔，尚艱難若此。今君欲求西方極樂世界，相去十萬億佛土，去做阿惟越致菩薩、手持大千世界如菴摩羅果；又背負累劫惡業，此業若有體相、盡虛空界不能容受。寶貝，當體察現實啊。若將這生死大事看得輕巧隨便、三心二意、譬如不如，成算幾何！倘不能捨命相求，不如這輩子勿耽誤了吃喝玩樂，或者求個人天福報，更加現實，這只需孝養父母、尊重師長、行善不作惡，開開心心即可。

確有人覺得現代世界生活便利、旅遊觀光、有魚肉吃，相信真的活在了「最好時光」。或者覺得來日方長，先享受娑婆，然後料理西方，以僥倖遊戲無常。看穿人生需要極高智慧。所以修淨土的拉力是欣求極樂、推力是厭離娑婆。具體如下表。

其次，數代「現代教育」下來，現代人智慧微淺、煩滿胸中、無有定力、缺乏善根、業障深重，經文必須重點極為突出、文字淺顯，好懂易行、針對性強，好似一帖良藥，既準又猛，速克頑疾、增強體質、延年益壽、發奮精進。 

三者，此經必須契合時代需要，不違末世現實，如上所述諸事。

於是，${XB}出世。實質上，這是阿彌陀佛親自用中文為我們末世衆生重寫了這部經；連翻譯都省了。

/SECTION:a05/三、論文

實在講，大乘佛法必須發菩提心；淨土法門就是一向專念佛號。兩句話，一部《無量壽經》已經圓滿了。這兩條都是必要條件，發願裡有也好、無也好，本來已經隱含在內，沒得商量。淨土法門，真的易行如斯。其餘都是文字相，供人消遣。日日讀誦，修戒定慧耳。所以緊抓文字不放者，不乏心懷醉翁之意；否則，執著如是，枉談甚麼佛法。乃至六祖更為徹底，直訓曰：

/gatha/
心平何勞持戒　行直何用修禪
恩則孝養父母　義則上下相憐
讓則尊卑和睦　忍則眾惡無諠
若能鑽木出火　淤泥定生紅蓮
苦口的是良藥　逆耳必是忠言
改過必生智慧　護短心內非賢
日用常行饒益　成道非由施錢
菩提只向心覓　何勞向外求玄
聽說依此修行　西方只在目前
//

/SECTION/夏蓮居會集本與五譯本之對比

${xb}的文字依照漢、吳、魏、唐、宋五部譯本；其他能得到的資料以為參照亦屬必然。在此將夏蓮居和王日休的會集本並五譯本詳細比對，以求親證各版本所具內容，樹立自己的信心。請參看本文末之《<a href="javascript:showTop('stg')">七本內容精細對照</a>》表。

出於好奇，筆者欲知${xb}之文字畢竟採自何經？所以第一件事情就是把五部譯本中與${xb}完全相同的文字標注出來，一目了然。可點擊下表鏈接閱讀各譯本。<ail>（總以觀之，標註還是比較準確的；後期有些類似的表達直接接受了。）</ail>不出所料，${xb}博採諸經文字；非為平等故，為避偏用某經之嫌也。

接下來列舉一些好玩的比較。我們把五部譯本所述之意合為一體，以${xb}為其對立面，兩相比較，重點是關注其差別性；若兩者均有，則不過追究，其細節可慢慢考。

總體印象是，五本譯本的整體結構頗為工整；淨空法師說世尊多次為不同會眾演說此法，差異在具體內容。五部譯本可分為兩組：漢譯和吳譯非常類似，都是二十四願，肯定同源、一前一後。唐、宋本與魏本類似，當出於同源，然譯者顯然有不同取捨，故有些重要段落在某本可以完全沒有；包括願數，唐、魏譯是四十八願，宋本三十六願。

宋本在數個方面與其他譯本不同，除願數外。與會衆人數，通常或是「萬二千」以顯其多、或「千二百五十」以隨《阿彌陀經》；惟宋本是「三萬二千」，或真為另外一會。其對五濁惡世、勸喻策進等內容，或全無、或一句帶過。不過${xb}還是採用了其不少文字。

發大誓願是《無量壽經》的重中之重，也是比較譯本的最關鍵的學術課題。然筆者更關心「發菩提心一向專念」，這個學問就暫擱置了。

在${xb}與五譯本的專項對比中，有幾個明顯展示了前述的時代實用需求：前者除了在一項上多外，其他幾乎都是少、乃至無。

在會衆部分，大都提到了「十六正士」，祂們是其他世界來的菩薩，但都示現為在家衆。${xb}恭恭敬敬列全了十六位名號，及大段菩薩功德。魏、唐本各列十五、十一位；在功德敘述中含有依釋迦牟尼佛生平經歷的八相成道內容，唐本也有，其他均無。其表法之義在於末法時代，在家修行為主流；八相成道等對於平民沒有意義。

在會衆部分，另一方面其他譯本列出二十五至三十一位尊者；${xb}只列了五位意思意思；連王日休都列了十位。大菩薩都是普賢、文殊、彌勒三位，或不列。

及至法藏因地，在法藏的老師世自在王如來之前，各經羅列了至少三十三位古佛、魏本更高達五十三佛；${xb}列了幾位？零。

關於「國無婦女」者，雖然願中有之，${xb}正文未再有提；漢吳兩譯有。蓋末世女衆成就者多，當代更講究平等，多提無趣。

漢吳譯本頗有幾個亮點，對個別具體方面展開描述，在後世譯本和${xb}中沒有；王日休則繼承了不少。最重要者莫過於阿彌陀佛未來般涅槃後，觀世音、大勢至菩薩的補位情況。其次，在經的中間部分，有關於極樂世界境界的詳細描述，他經無有。另外，在阿難尊者的兩次祈請時，第一次是開場時問世尊發瑞相，第二次時詢問極樂世界沒有須彌山、第一和第二地居天依何以住；世尊在第一次問是否有天人教你問；第二次幾乎是直接呵斥，謂阿難似有質疑佛智慧。這些可能是世尊的特殊教學法，但別的譯本沒有。

在他方菩薩來禮敬供養時，阿彌陀佛放光、光繞數週後從頂回入；觀世音菩薩問緣由，世尊解釋阿彌陀佛過去發的願。

其他方面各經多少提到，詳略各異。個別地方充分反應了古印度語的無量無盡的囉嗦和重複，實在浪費篇幅。

/SECTION/總結對夏蓮居會集本的觀感

${xb}的確收納了諸經絕大多數的內容，除了大概三例，留待後面略加深入。

${xb}在序分等處，極大簡化被認為不重要的人物之羅列。除了跟阿彌陀佛以及說法相關的聖者外，十六正士表徵我們在家衆，是${xb}的主要服務對象，所以重點極為突出。

${xb}對二力與三資糧的論述非常翔實、篇幅浩大。這是淨土法門修行的要旨，精準把握要點。

${xb}的經文文字流暢，結構合理，完全避免了重複、囉嗦的部分，其可讀性乃至比及其他佛經，亦為優良，沒有問題。（唯一欠佳處是〈菩薩往生品〉裡的第十二佛、十三佛，因前十一尊佛被簡略而稍顯突兀；看原文才明白。）

關鍵的四十八願完備，與魏譯本有四十五願吻合良好，比之多出三願，也意味著魏本有三願是重複、或不夠完備而當歸入其他。別譯之發願與此二部相去甚遠，文字表述亦常難解；除非專門研究，否則僅偶然作參考用。

${xb}所未收入的三件事情裡，世尊對阿難的態度可能不易理解，會引起誤解，略去並無大礙。詢問阿彌陀佛迴光之問，也是相對獨立的事件，不覺得特別。唯有阿彌陀佛般涅槃、觀音與勢至的補位者屬極樂世界相關事宜。此事在其他佛經裡也有提到，內容相當；但作為描述極樂世界依正莊嚴的本經，感覺不應忽略，除非有更深的意味或緣由、非我凡眼能察。

總而言之，${XB}的品質非常高，個別細節或有補足、整體內容既涵蓋了五部譯本、又未見增添自己見解；四十八願規範、完備；全文對淨土修行的護持、指導意味極為濃厚、妥貼。更幸有王日休會集本以資對比；其文體工整，標題清明，內容涵蓋諸經；然較之${xb}，主觀感覺聖言量稍欠缺。尤其在《<a href="javascript:showTop('stg')">七本內容精細對照</a>》表裡可清晰比對其增減取捨、順序隨意。${xb}則明顯在聖言量、階位、實用性等方面更具作為佛經的威懾力。這不是帶感情色彩的褒揚，而是有客觀、直觀的數據支撐、以及由整體感觀而生之真實信心。難怪佛學大德們當年見到此會集本時，歡喜好樂。

/SECTION:a06/四、論人文

於是，這部新編《無量壽經》成文了。人們會接受嗎？

要讓人接受「<verse>佛說</verse>」「<verse>如是我聞</verse>」「<verse>不得為妄增減經法</verse>」，或許還有心理障礙需要逾越。關鍵是「<verse>增減經法</verse>」；此非「增減經文」。若善男子善女人能夠研究認可，會集本的確沒有增減經法，則不相違背，障礙自除。於我，最耿耿於懷者是關於阿彌陀佛般涅槃沒有錄入。可是仔細想來，阿彌陀佛是無量壽，祂何時將般涅槃？所以此事也有蹊蹺，留待後面再作計較，但橫豎與當下修行毫無關係；如同佛法根本大問等等，未來當面問彌陀不遲。如此，${xb}果真覆蓋五譯本之精髓而沒有實質性增減經法，於是的如阿難尊者所聞、此法亦為我佛所說；於是障礙何由？

（對於改動經法，筆者的確對所有佛經有兩個永恆的疑惑：一者、為什麼各個偈頌都非常不同？哪裡來的這些偈頌文字？二者、為什麼在經的末尾，聽聞佛說經法後總有多少多少衆生得到解脫、成就，可是不同版本的數字都不一樣，何也？此二問亦貫穿此處五部譯本、二部會集本。但這是通問，不關當下議題。）

/SECTION/印光大師反對會集本

印光大師的身高體重幾許，人未盡知；然其在佛界的份量，甚於泰山。其一言九鼎，不是形容。自其批評王龍舒、彭紹升、魏承貫以來，會集本之議堪稱蓋棺論定。筆者曾獨立獲一推斷，謂之曰：「${dj}是僞經、卻是眾生所必須；但是作僞經之風絕不可以姑息。是以印祖竭力呵斥，現護法神相，以阻斷未來愚夫、魔鬼效仿作祟。${dj}群聖則現蓮國佛菩薩相，實推念佛淨修法門。」「${dj}反對者們引用印祖，實則增益了止僞功用。」此思頗釋我懷，無論虛實。近得見淨空法師在《淨土五經讀本序》中之論，幾為同言：「夫節會經典，印光大師所不與，嘗慮以啓人改經之端，致有辟佛之流，籍謂佛經皆後人編造，非從佛國譯來者。」

印祖在一九三四年欽定《淨土五經》，正是${xb}初稿浮現後第三年。內中之《無量壽經》採康僧鎧的魏譯本，呈堅定不移相。反對${xb}者，見之歡欣鼓舞。然則若印祖決意作護法神相，則斯示現真正恰當。佛菩薩智慧深廣難測，無空間斷、無時間絕，當以何身度脫即現何身，何驚之有？央掘魔羅殺九百九十九人、乃至弒母；提婆達多害佛出血；魔界行不污菩薩化現臥具度脫二百婬欲魔女；如此境界不勝枚舉，何驚之有？何欣之得？非我真知印祖義，但哀本居凡夫地。（另外，淨空法師敢於用${xb}替換康本，意思其實很清楚了。）

/SECTION/何佛說耶？

又竊問：「『<verse>佛說</verse>』者，究竟是哪尊佛說？」

先有大德告知，釋迦摩尼佛、毘盧舍那佛、阿彌陀佛本是同佛，在不同世界裡現不同身而已。又，世尊告：「東方去此三萬二千佛土有國名莊嚴，佛號照明莊嚴自在王如來；彼佛身者即是我身，以異名字於彼說法。」又，「過去三佛<ail>（迦葉、拘留孫、拘那含）</ail>即是我釋迦牟尼佛。」

西藏密教視觀世音、大勢至為阿彌陀佛化身。其來有自。阿彌陀佛既然是無量壽，卻又會般涅槃；之後觀世音補位，又將滅、大勢至補；後，此佛不再滅度。若今此二聖本阿彌陀佛化身，不正明表其壽之無量！如此，則觀音、勢至、彌陀、釋迦，本一佛也。

是以，「<verse>佛說</verse>」者，此佛莫非釋迦牟尼？不相違也！縱然他佛，何以慮也！

/SECTION:a07/結語

此七本對比研習，尚在初起。未來，${XB}當有三大方向可深入研習。
/olzh/
四十八願仔細研判。魏本已接近；他本者，文義皆雜，當梳理之。
漢、吳二譯歸為一類，頗有異於他本者，可以賞析。王日休常取之。
魏、唐、宋本歸為一類，各有捨取；除願文外，${xb}與之相去不遠，但關注細節。
至於王集本，竊以為偈頌可資參考，而內容無過與五譯也。
