/SECTION/于淩波居士事略─聖賢居士典範

皈依於台中太平鄉印弘茅蓬懺雲法師座下，法名戒淩；復納贄禮拜於雪盧老人李炳南居士門下授業，修學淨土念佛法門。後來因緣和合，他辭去原有的工作，在炳公老居士領導之下，由菩提樹雜誌對外宣傳，他負責策劃推動，各地捐款源源而來，在臺中大裏市的佛教菩提醫院也開工興建。縱觀于老居士一生，少年投筆從戎，立志報國，歷經抗日、戰亂、徒步轉戰三千里。隨政府來臺以後即行醫救人身命，並從事文化、教育、社會服務工作。學佛以後，弘法講學，著書立說以救人慧命。並為報答學佛恩師李炳南老居士，承繼恩師弘法利生的精神，設立了紀念恩師的基金會，全部身心都奉獻給佛教、奉獻給眾生，把生命力發揮得淋漓盡致，一直做到滴盡最後一滴心血為止！

于老居士著作頗豐，有關佛學之著作，從早年的《向智識分子介紹佛教》以至最後完成的《現代佛教人物辭典》共有三十四種,尤以一九八○年大陸改革開放以後，缺乏初機佛書，當時僅有陳海量居士的《建設佛化家庭》、李圓淨居士的《佛法導論》及《向智識分子介紹佛教》三數種書流通，後來此書各地紛紛翻印，數量在百萬冊以上，成為二十世紀後五十年流通最廣的傳道書。自民國八十年以後，于老居士受請在臺北、臺中的佛學院所授課。最初是聖嚴法師邀他到農禪寺三慧修學院授唯識課，繼而民國八十三年，于老居士應美國「世界宗教研究院」院長沈家楨博士之邀，到紐約沈府作客。沈博士聘他為世界宗教研究院研究員，委託他研究海外佛教發展的過程。此後數年間，他足跡遍及美國、加拿大各大城市，及東南亞各國，訪問寺院社團、高僧大德，蒐集資料，撰寫出《美加華人社會發展史》、《海外弘法人物誌》二書。于老居士因心臟病復發，離開了人間，享壽七十九歲。助念十小時後，面容紅潤、含笑，頭頂微熱，呈諸瑞相，必蒙阿彌陀佛接引，安詳往生佛國。

于凌波居士，博學大家，遍覽群書，融會貫通，下筆字字珠璣，精闢甚微，朗朗大綱條理分明，細節更見清晰，顯見其個人修學甚是嚴謹無有苟且。一生用盡全力，無有虛度，真是大家的好榜樣。

/SECTION/生平：

於淩波老居士，河南省洛陽縣人，1927年出生，逝于 2005年08月29日，享年79歲。生時逢亂世，家道中落，十二歲喪母，依父生活。1943年春在中學讀書時，時當八年抗戰末期，日軍壓境，乃流亡後方，考入軍醫學校西安分校受學。1944年秋季畢業，分派至陸軍基層單位任軍醫，戍守黃河河防。1945年抗戰勝利，渡河隨軍北上，戍守北平。1946年國共內戰覆起，隨軍入察哈爾，參加收覆張垣戰役，及轉戰於北平、津、保三角地區，積功升至少校。

/SECTION/人生經歷 ：

1948年秋，在北平考入上海國防醫學院深造，1949年3月，隨國防醫學院遷校來台，畢業後服務於陸軍醫院及總醫院，歷任醫師、科主任。

1958年退役，繼而受聘馬台灣某公司醫務室主任。在此期間參加公務員特種考試，甲種衛生行政人員及格。此後曾入中華學術院職業醫學研究所研究。

1960年，以續梁啟超著《佛教與群治關系》一書信了佛教。因購佛書因緣結識『菩提樹』雜志發行人朱斐居士。由朱居士之引介，皈依於台中太平鄉印弘茅蓬懺雲法師座下，法名戒□；覆納贄禮拜於雪盧老人李炳南居士門下授業，修學凈土念佛法門。

1961年9月，已受朱斐居士之約，赴獅頭山為閉關的會性法師醫病因緣，發願創辦一所為佛門四眾服務的醫院。後來因緣和合，他辭去原有的工作，在炳公老居士領導之下，由菩提樹雜志對外宣傳，他負責策劃推動，各地捐款源源而來，在台中大裏市的佛教菩提醫院也開工興建。建院之初先設門診部，為佛門四眾及貧民服務。在他擔住院長的三年多時間內，免費醫療貧民一萬七千餘人。到1966年，一所現代化醫院建設完成，開幕之後，他功成身退，辭去院長一職。

於老居士信佛之初，勇猛精進，禮佛誦經，進境甚速，五十年開始撰寫《向智識分子介紹佛教》長文，在菩提樹月刊連載，1962年印單行本發行，深受讀者歡迎，菩提樹月刊連印十餘版，台灣許多道場相繼翻印。以後數十年間，東南亞、美加各地凡有華人之處莫不有此書流通，至今不衰。尤以1980年大陸改革開放以後，缺乏初機佛書，當時僅有陳海量居士的《建設佛化家庭》、李圓凈居士的《佛法導論》及《向智識分子介紹佛教》三數種書流通，後來此書各地紛紛翻印，數量在百萬冊以上，成為二十世紀後五十年流通最廣的傳道書。

於老居士離去菩提醫院後，在台中開設普濟醫院，並創辦開明高級中學、富台幼稚園，也擔任過台中市議員。由於長期免費為貧民醫療服務，設清寒學生獎學金，扶危濟難，熱心公益，膺選為全國好人好事代表。

1981年以後，於老居士謝絕外緣，收斂身心，禮佛讀經，探究法義。以讀經心得，寫出了《般若心經蠡解》、《簡明佛學概論》、《唯識學綱要》、《唯識三論今詮》等著作，許多佛學院都選為教材。1990年兩岸開放，他自公職退休，回大陸探親，發現「十年浩劫」後的大陸佛教，寺廟殘破，經典文物蕩然無存。他是有「歷史癖」的人，於是又發下心願，要搜集資料，補充這一段佛教史上的空白。此後他結束了世俗事業，全力投入佛教文化工作。

1994年，於老居士應美國「世界宗教研究院」院長沈家楨博士之邀，到紐約沈府作客。沈博士聘他為世界宗教研究院研究員，委托他研究海外佛教發展的過程。此後數年間，他足跡遍及美國、加拿大各大城市，及東南亞各國，訪問寺院社團、高僧大德，搜集資料，撰寫出《美加華人社會發展史》、《海外弘法人物志》二書。

於老居士著作頗豐，有關佛學之著作，從早年的《向智識分子介紹佛教》以至最後完成的《現代佛教人物辭典》共有三十四種；世俗雜學方面之著作，有《健康長壽手冊》、《古今藝文志趣》等十多種；其他散見各佛教雜志及一般報刊者則不計其數。

自1991年以後，於老居士受請在台北、台中的佛學院所授課。最初是聖嚴法師邀他到農禪寺三慧修學院授唯識課，繼而在慧炬佛學會、慕欽講堂、華藏講堂、曼殊講堂等處開設佛學講座。後來在中華佛學研究所、慈明佛學研究所、佛光山叢林學院、玄奘學術研究院、中華佛教學院、海明佛學院等院所授課，課程以唯識學論典為主。

1994年，為繼承雪廬老人遺志，發揚老人弘法利生的精神，於老居士捐資成立了「財團法人李炳南居士紀念文教基金會」。基金會的宗旨為：

一、促進雪廬老人受業弟子聯誼，舉辦各種文教活動。

二、舉辦佛、儒學術講座，接引知識青年研究佛學。

三、發行刊物、叢書、弘揚佛陀正法。

為了基金會有一個固定的會址，他在台中市學府路199號七樓公寓中，買下了二、三層，二樓提供基金會使用，三樓自己居住。基金會成立翌年，開始發行「弘法資訊」月刊，月印四千份，免費贈閱佛教各寺院、社團。繼而成立「雪廬講堂印經功德會」，編印佛學書籍，贈送結緣。

迄今刊物發行一二二期，印出叢書七十種，開設佛學講座五期(每期三、四月)，及論語、書法、國畫等研習班，並敦請侯秋東中醫師每月在雪廬講堂義診，同時在中華慧炬佛學會設置「李炳南居士獎學金」，慧炬佛學會中區分會也設在本會，每月還寄送大批佛書到大陸各寺廟、團體。

于老居士自皈依三寶以來，持誦佛號從未間斷。由於深究「唯識」，對於「妄心」深切了解，起一念貪愛、一念瞋恚，即洞察無遺，煩惱自然消失，心境平靜怡悅，恒時充滿著法喜。他極少生病，也極少吃藥，包括任何補藥、補品都不吃。雖然他說健康的秘訣只是「飲食有節，起居有常」，實則學佛後「心無煩惱」大有關。

但是人的肉體終究會敗壞，「生、住、異、滅」是必經的過程，一期的人生終有落幕之時，二00五年八月二十九日下午二時，於老居士因心臟病覆發，離開了人間，享壽七十九歲。臨終前交代不必急救，並從容囑咐家人及基金會幹部，了無掛礙的放下娑婆，迎向極樂。家屬、基金會、慧炬佛學會及台中蓮社蓮友在身旁助念佛號，助念十小時後，面容紅潤、含笑，頭頂微熱，呈諸瑞相，必蒙阿彌陀佛接引，安詳往生佛國。

縱觀於老居士一生，少年投筆從戎，立志報國，歷經抗日、戰亂、徒步轉戰三千裏。隨政府來台以後即行醫救人身命，並從事文化、教育、社會服務工作。學佛以後，弘法講學，著書立說以救人慧命。並為報答學佛恩師李炳南老居士，承繼恩師弘法利生的精神，設立了紀念恩師的基金會，全部身心都奉獻給佛教、奉獻給眾生，把生命力發揮得淋漓盡致，一直做到滴盡最後一滴心血為止！

于凌波居士，佛教學者，河南省洛陽縣人，民國十六年（公元一九二七年）出生。生逢亂世，家道中落，十二歲喪母，依父以活。民國三十二年春在中學讀書時，時當八年抗戰末期，暴敵壓境，乃流亡後方，考入軍醫學校西安分校受學，三十三年秋季畢業，分派至陸軍基層單位任軍醫，戍守黃河河防。翌年抗戰勝利，渡河隨軍北上，戍守北平。三十五年國共內戰復起，隨軍入察哈爾，參加收復張垣戰役，及轉戰於河北平、津、保三角地區，積功升至少校。

三十七年秋，在北平考入上海國防醫學院深造，三十八年三月，隨國防醫學院遷校來臺，畢業後服務於陸軍醫院及總醫院，歷任醫師、科主任。四十七年退役，繼而受聘為臺灣糖業公司醫務室主任。在此期間參公務員特種考試，甲種衛生行政人員及格。此後曾入中華學術院職業醫學研究所研究。

民國四十九年，以讀梁啟超著《佛教與群治關係》一書信了佛教，以購佛書因緣結識得「菩提樹」雜誌發行人朱斐居士。由朱居士之引介，皈依於臺中太平鄉印弘茅篷懺雲法師座下，法名戒凌；復納贄禮拜於雪廬老人李炳南居士門下受業，修學淨土念佛法門。

民國五十年九月，以受朱斐居士之約，赴獅頭山為閉關的會性法師醫病因緣，發願創辦一所為佛門四眾服務的醫院。後來因緣和合，他辭去原有的工作，在李炳老居士領導之下，由菩提樹雜誌對外宣傳，于凌波負責策劃推動，世界各地捐款源源而來，在臺中大里市的佛教菩提醫院也開工興建。建院之初先設門診部，為佛門四眾及貧民服務。在于凌波擔院長的三年多時間內，免費醫療貧民一萬七千餘人。到五十五年，一所現代化醫院建設完成，開幕之後，于凌波功成身退，辭去院長一職。

于凌波信佛之初，勇猛精進，禮佛誦經，進境甚速，五十年開始撰寫《向智識分子介紹佛教》長文，在菩提樹月刊連載，五十一年印出發行，深受讀者歡迎，菩提樹月刊連印十餘版，臺灣許多道場相繼翻印。以後數十年間，東南亞、美加各地凡有華人之處莫不有此書流通。尤以一九八○年開革開放以後，大陸缺乏初機佛書，當時僅有陳海量居的《建設佛化家庭》、李圓淨居士的《佛法導論》、及《向智識分子介紹佛教》三數種書流通，後來各地紛紛翻印，數量在百萬冊以上，成為二十世紀後五十年流通最廣的傳道書。

于凌波退出菩提醫院以後，感於佛教中人事糾葛不亞於世俗社會，他學佛之心由懈怠而退轉，終至離開佛教，重入紅塵，他在臺中開設普濟醫院，創辦開明高級中學、富臺幼稚院，參與社會各種活動，擔任臺中市議員，追名逐利，在五欲六塵的社會中隨緣沉浮，前後十餘年之久。直到民國七十年以後，他冷靜反省，他想：「我信佛，信的是佛陀的真理，不是佛教中的事相。佛門四眾，人人都信佛，人人都學佛，但究竟還是在信和學的階段，誰也沒有成佛，都是凡夫。既是凡夫，就有凡夫執著與煩惱，因此，佛門中的人事糾葛與社會人士沒有差別，也就不足為怪了。」

他想通了這一點以後，終於迷途知返，自迷惑困惑的網中解脫出來，重回佛陀座下。此後他謝絕外緣，收歛身心，禮佛讀經，探究法義。以後數年間，他以讀經心得，寫出了《般若心經蠡解》、《簡明佛學概論》、《唯識學綱要》、《唯識三論今詮》等著作，由臺北東大圖書公司出版。民國七十九年兩岸開放，他自公職退休，回大陸探親，發現「十年浩劫」後的大陸佛教，寺廟殘破，經典文物蕩然無存。他是有「歷史癖」的人，他又發下心願，要蒐集資料，補充這一段佛教史上的空白。此後他結束了世俗事業，全力投入佛教文化工作。他每年一次或兩次返大陸，訪問佛教寺院，佛門人士，蒐集資料，數年之間，寫出了五冊近百萬字的《近代佛門人物誌》。

民國八十三年，于凌波應美國「世界宗教研究院」院長沈家楨博士之邀，到紐約沈府作客。沈博士聘他為世界宗教研究院研究員，委託他研究海外佛教發展的過程。此後數年間，他足跡遍及美國、加拿大各大城市，及東南亞各國，訪問寺院社團、高僧大德，蒐集資料，撰寫出《美加華人社會發展史》、《海外弘法人物誌》二書。

同時，自民國八十年以後，于居士受請在臺北、臺中的佛學院所授課。最初是聖嚴法師邀他到農禪寺三慧修學院授唯識課，繼而在慧炬佛學會、慕欽講堂、華藏講堂、曼殊講堂等處開設佛講座。後來在中華佛學研究所、慈明佛學研究所、佛光山叢林學院、玄奘學術研究院、中華佛教學院、海明佛學院等院所授課，課程以唯識學一系論典為主。

同在民國八十三年，于凌波居士捐資成立了「財團法人李炳南居士紀念文教基金會」，基金會的宗旨為：
/olzh/
促進李炳南居士之直接或間接受業弟子聯誼。
舉辦各種文教活動及講座。
刊物、叢書及視聽作品等軟、硬體之出版及發行。
優秀清寒學生之獎助及蓮友之急難救濟。
舉辦文化、學術工作之獎助、研究，並促進其之交流。
舉辦其他與文教相關之各種公益活動或事業。
//
至二十一世紀之初的十餘年間，其工作成果為：
/olzh/
發行『弘法資訊』月刊，創刊來已出了一百餘期。
舉辦學佛學講座，十餘年間已舉辦近二十次 (每次四個月 )。講過《般若心經》、《八大人覺經》、《唯識三十論》、《唯識二　　　　十論》《大乘五蘊論》等大乘經論。
與臺中市慈光圖書館合辦文化座談會六次。
設置「李炳南居士獎學金」，委託中華慧炬佛學會代為徵文評審及頒發。
印製佛教經典及初機佛書，普贈各方結緣。並委託佛陀教育基金會，運至大陸及美、加、東南亞各國分贈華人社全會寺廟社團。十餘年來，已印出了百種（每種三千冊），總數約三十數萬冊。
自八十七年起，基金會推動「寄佛書到大陸專案」，在各方大德的支持下，七、八年來，往大陸寄運出兩萬餘件(箱、包)佛經通俗佛書。同時並與與大陸佛教寺廟及社團合作，在當地印簡體字的經典及佛書，普遍贈閱結緣，以促進大陸佛教的復興與發展。
于凌波居士勤於著述，民國七十年以後，著作佛學書籍近三十種，其中由臺灣東大圖書公司出版的，有《唯識學綱》、《唯識三論今詮》、《釋迦牟尼及原始佛教》、《改變歷史的佛教高僧》，及四十餘萬字的《簡明佛學概論》。由慧炬出版社出版的，為《近代佛門人物誌》五集、《唯識學十二講》、《海外弘法人物誌》，及《曲折迂迴菩提路》四種。由新文豐出版公司出版的有《美加華人社會佛教發展史》、《楊仁山居士評傳》、《唯識名相新釋》三種。圓明出版社出版的有《般若心經蠡解》、《人間佛陀及其基本教理》、《八大人覺經講記》、《唯識三十頌新釋》、《唯識二十頌、觀所緣緣論合刊》、《八識規矩頌講記》六種。慧明出版社出版有《民國高僧傳》一至四集。此外尚有《大乘五蘊論講記》、《百法明門論講記》、《佛法與生活》、《唯識與淨土》等多種。而其最主要的著作，則為獨力編纂一百八十萬言的《二十世紀佛教人物辭》，收錄二十世紀佛門緇素人物一千六百餘人，於二〇〇四年由佛光山文化事業公司出版。
//
近十餘年來，于凌波居士每年返回大陸一、二次，朝禮天下名山，如東南西北中五嶽、佛教四大道場，三大石窟及各地叢林寺院，旅遊兼以蒐集資料。他足跡所到之處，東至普陀山，西至烏魯木齊，南至廣東羅浮山，北至大同、五台。二十世紀之末，年屆坐七望八之年，仍每日工作十餘小時，著述、講學，南北授課，從不懈怠。誠所謂發憤忘食，樂以忘憂，埋首於佛學研究中，不知老之將至。
