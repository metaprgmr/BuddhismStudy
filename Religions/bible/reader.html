<html>
<head>
<meta charset="utf8">
<link rel="stylesheet" href="../resources/styles.css">
<script src="../../env.js"></script>
<script src="../resources/parallel-reader.js"></script>
</head>

<script>

function readBible(readParams) {
  var bkObj = getGlobal("theBook"); // theBook should be set by the dynamically loaded script.
  bkObj.render(readParams);

  // customize the footer
  var links = [ bkObj.chapterNavLinks ];
  var lineCnt = bkObj.getCurChapterLineCount();
  if (lineCnt != null)
    links.push('<font size="-1">(' + lineCnt  + ' verses)</font>');
  links.push('<font size="-1" title="Book Stats">' + bkObj.bookStatsLinks + '</font>');
  links.push('<a href="index.html"><i>Bible</i> Home</a>');
  links.push('<a href="../index.html" target="allbooks">All Books</a>');
  setContent("footer", links.join(NAVDIV));
}

var rp = getReadParams();

loadScriptsInOrder([ `data/book_${rp.bookName}.js` ])
  .then(result => { 
          loadScriptsInOrder([ `notes/book_${rp.bookName}-NOTES.js`, ])
            .then(result => readBible(rp), error => readBible(rp))
        });

</script>

</html>
