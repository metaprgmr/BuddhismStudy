<!DOCTYPE html>

<head>
<meta charset="utf-8">

li     { font-family: "KaiTi", "楷体", STKaiti, "华文楷体"; font-size:18px; color:red; padding-bottom:10px }

.big   { background-color:#ffd0d0 }

<title>直心道場</title>

</head>
<body bgcolor="#ffe680" style="margin:0px" title="佛修道場">
 <table cellpadding=0 cellspacing=0><tr>
 <td id=toc nowrap align=center valign=top><h2 id=lbl></h2><div id=prgm></div></td>
 <td id=pic align=center></td>
 <td id=ifrm valign=top><iframe id=view name=view></iframe></td>
 </tr></table>
</body></html>

<script>
const TARGET = 'view';
const LEVEL = 1;
const EXT = 'xview';
const 十小咒 = '../陀羅尼/十小咒.html';
const 大悲咒 = '../陀羅尼/大悲咒.html';
var curEID = 0, lastEID = null, lastLink = null;

class ImageMap {
  constructor() {
    this.imgMap = {
          '爐香讚.png': '釋迦牟尼佛.jpg',
          '三寶佛.png': '釋迦牟尼佛.jpg',
  '普賢菩薩十大願.jpg': '釋迦牟尼佛.jpg',
  '普賢懺悔滅罪偈.png': '釋迦牟尼佛.jpg',
        '四宏誓願.jpg': '釋迦牟尼佛.jpg',
          '回向偈.png': '釋迦牟尼佛.jpg',
      '極樂世界圖.png': '極樂世界三聖.jpg',
    };
    this.notes = {
      '極樂世界三聖.jpg': '邱麗華老師 恭繪',
      '極樂世界圖.png': '作者待查',
    };
  }
  getImgW(img) {
    var x = getGlobal('MY_IMAGES') ? img : this.imgMap[img];
    switch (x || img) {
    case '釋迦牟尼佛.jpg':  return '500px';
    case '觀世音菩薩1.jpg': return '450px';
    }
    return '600px';
  }
  getImgSrc(img) {
    if (img.indexOf('/') > 0) return img;
    var myimgs = getGlobal('MY_IMAGES'), mapped = this.imgMap[img];
    if (!myimgs)
      return `../images/${mapped || img}`;
    else
      return mapped ? `${myimgs}${img}` : `../images/${img}`;
  }
  toImgTag(img) {
    var note = this.notes[img];
    if (note) note = ` title="${note}"`;
    return `<img src="${this.getImgSrc(img)}" style="max-width:${this.getImgW(img)}"${note}>`;
  }
}
var im = new ImageMap();
var diff = 0;
function openURL(url, img, imgw) {
  e('pic').innerHTML = im.toImgTag(img);
  window.open(url, EXT);
}
function openLnk(eid, js, anchor, img, imgw) {
  if (js) {
    var lnk;
    if (js.indexOf('/') < 0) {
      anchor = !anchor ? '' : ('#' + anchor);
      lnk = `gdhreader.html?s=content/${js}${anchor}`;
    } else {
      if (anchor == 'jingyu') anchor = '?i=random&ts=' + (++diff); // to force iframe to reload.
      else anchor = !anchor ? '' : ('?' + anchor);
      lnk = js + anchor;
    }
    if (lnk != lastLink) {
      console.log(lnk);
      window.open(lnk, TARGET);
      lastLink = lnk;
    }
  }
  var el;
  if (img) {
    el = e('pic');
    el && (el.innerHTML = im.toImgTag(img));
  }
  if (lastEID) { el = e(lastEID); el && (el.style.border = 'none'); }
  if (eid) { el = e(eid); el && (el.style.border = '2px red solid'); }
  lastEID = eid;
}

class DojoBuffer extends Buffer {
  constructor(a, b, c) { super(a, b, c); }
  wBeginning(lead) {
    return this.wIf(lead, lead)
               .w('<ol>')
               .lnk ('《香讚》',        'various.js', '_1', '爐香讚.png')
               .lnk ('南無三寶',        'various.js', '_3', '三寶佛.png')
               .lnk ('南無 釋迦牟尼佛', 'various.js', '_4', '釋迦牟尼佛.jpg')
               .lnk ('《開經偈》',      'various.js', '_4', '釋迦牟尼佛.jpg');
  }
  wFinishing() {
    return this.lnk ('《普賢十願》',       'various.js', '_11', '普賢菩薩十大願.jpg')
               .lnk ('《懺悔滅罪偈》',     'various.js', '_11', '普賢懺悔滅罪偈.png')
               .lnk ('《發四宏願》',       'various.js', '_11', '四宏誓願.jpg')
               .lnkS('《迴向偈。普願文》', 'various.js', '_14', '回向偈.png')
               .lnk ('《三自皈依》',       'various.js', '_10', '三寶佛.png')
               .lnkS('《迴向補闕圓滿真⾔》', null, null, '三寶佛.png');
  }
  renderIt(asis) {
    if (!asis && !this.text().endsWith('</ol>')) this.w('</ol>');
    return this.render('prgm');
  }
  mainlnkS(name, js, anchor, img)     { return this.lnk(name, js, anchor, img, true, true); }
  mainlnk (name, js, anchor, img)     { return this.lnk(name, js, anchor, img, true); }
  lnkS(name, js, anchor, img, isMain) { return this.lnk(name, js, anchor, img, isMain, true); }
  lnk (name, js, anchor, img, isMain, isSmall) {
    img = !img ? '' : `, '${img}'`;
    js = !js ? 'null' : `'${js}'`;
    anchor = !anchor ? ', null' : `, '${anchor}'`;
    var eid = '_' + (++curEID),
        cls = isMain ? 'class="big"' : '',
        liCls = isSmall ? 'class=sm' : '',
        atag = `<a href="javascript:openLnk('${eid}',${js}${anchor}${img})">`;
    return this.w(`<li ${liCls}><div id="${eid}" ${cls}>${atag}${name}</a></div></li>`);
  }
  xlnk(name, url, img) {
    img = !img ? '' : `, '${img}'`;
    var atag = `<a href="javascript:openURL('${url}'${img})">`;
    return this.w(`<li><div id="_${++curEID}" class="big">${atag}${name}</a></div></li>`);
  }

  StartSession(refresh) {
    this.w(
`<p style="font-size:18px; margin-top:90px">
<a href="javascript:dojo.PureLandSession()" class="major">淨土日課</a><br>&nbsp;<br>
<a href="javascript:dojo.AmtbSession()" class="major">無量壽經</a><br>&nbsp;<br>
<a href="javascript:dojo.ShurangDharaniSession()">楞嚴咒誦</a><br>&nbsp;<br>
<a href="javascript:dojo.DiZangSession()">地藏法門</a><br>&nbsp;<br>
<a href="javascript:dojo.GuanShiYinSession()">觀音法門</a><br>&nbsp;<br>
<a href="javascript:dojo.VajraSession()">金剛經誦</a><br>&nbsp;<br>
<a href="../佛學基礎/《占察善惡業報經》/占察懺.html" class="major">占察懺法</a><br>&nbsp;<br>
<a href="../util/BaiFo.html?n=sk">釋迦如來</a><br>
<a href="../util/BaiFo.html?n=0">阿彌陀佛</a><br>
<a href="../util/BaiFo.html?n=dz">地藏菩薩</a><br>
<a href="../util/BaiFo.html">拜佛一節</a><br>
<a href="../util/BaiFo.html?n=2">拜佛二節</a><br>
<a href="../util/BaiFo.html?n=3">拜佛三節</a><br>
<a href="../util/BaiFo.html?n=4">拜佛四節</a>
</p>`);
    this.renderIt(true);
    if (refresh)
      openLnk(null, '../陀羅尼/諸真言.html', null, '爐香讚.png');
  }

  PureLandSession() {
    this.wBeginning()
        .lnk('《蓮池讚》', 'various.js', '_6', '極樂世界圖.png')
        .lnk('南無極樂三聖', 'various.js', '_6', '極樂世界三聖.jpg')
        .mainlnk('《佛說阿彌陀經》', 'amtb.js', null, '極樂世界圖.png')
        .mainlnkS('阿彌陀佛四十八願', '../淨土宗/《無量壽經》/48.html', null, '極樂世界圖.png')
        .lnkS('拔一切業障根本<br>得生淨土陀羅尼')
        .lnk('《阿彌陀佛頌》', 'various.js', '_7', '南無阿彌陀佛.jpg')
        .mainlnk('《發願文》', 'vow.js', null, '南無阿彌陀佛.jpg')
        .lnk('《無量壽佛讚》', 'various.js', '_8', '南無阿彌陀佛.jpg')
        .lnk('《西方迴向偈》', 'various.js', '_9', '極樂世界圖.png')
        .lnk('《觀經三福》', 'various.js', '_71', '南無阿彌陀佛.jpg')
        .mainlnk('《心經》', 'xinjing.js', null, '真誠清淨平等正覺慈悲看破放下自在隨緣念佛.jpg')
        .lnk('十咒語', 十小咒, null, '三寶佛.png')
        .lnk('大悲咒', 大悲咒, null, '觀世音菩薩1.jpg')
        .wFinishing()
        .lnkS('◎地藏菩薩論念佛號◎', 'various.js', '_43', '南無地藏王菩薩1.jpg')
        .lnkS('◎淨明空誨法言師教◎', '../淨土宗/西方二聖開示/JK-teachings.html', 'jingyu', '慈悲看破自在念佛.jpg')
        .lnkS('◎印光大師文鈔精錄◎', '../淨土宗/西方二聖開示/印光大師文鈔菁華錄.html', 'm=r', '慈悲看破自在念佛.jpg')
        .lnkS('《南無阿彌陀佛歌讚》', '../images/南無阿彌陀佛_華藏淨宗學會.mp3', null, '南無阿彌陀佛.jpg')
        .renderIt();
  }

  AmtbSession() {
    this.wBeginning('<p>&nbsp;</p>')
        .lnk ('《蓮池讚》', 'various.js', '_6', '極樂世界圖.png')
        .lnk ('《蓮池讚》', 'various.js', '_6', '極樂世界圖.png')
        .lnk ('南無 極樂三聖', 'various.js', '_6', '極樂世界三聖.jpg')
        .mainlnkS('《佛說大乘無量壽<br>莊嚴清淨平等覺經》', `wlsj.js&level=${LEVEL}&noaudio=1`, '_1', '極樂世界圖.png')
        .lnk ('拔一切業障根本<br>得生淨土陀羅尼')
        .lnk ('《阿彌陀佛頌》', 'various.js', '_7', '南無阿彌陀佛.jpg')
        .mainlnk('《發願文》', 'vow.js', null, '南無阿彌陀佛.jpg')
        .lnk ('《西方迴向偈》', 'various.js', '_9', '極樂世界圖.png')
        .wFinishing()
        .lnkS('◎淨明空誨法言師教◎', '../淨土宗/西方二聖開示/JK-teachings.html', 'jingyu', '慈悲看破自在念佛.jpg')
        .lnkS('◎印光大師文鈔精錄◎', '../淨土宗/西方二聖開示/印光大師文鈔菁華錄.html', 'm=r', '慈悲看破自在念佛.jpg')
        .renderIt();
  }
  VajraSession() {
    this.wBeginning('<p>&nbsp;</p>')
        .lnk ('《奉請八金剛》', 'various.js', '_38', '釋迦牟尼佛.jpg')
        .lnk ('《奉請四金剛菩薩》', 'various.js', '_39', '釋迦牟尼佛.jpg')
        .lnk ('《金剛經發願文》', 'various.js', '_40', '釋迦牟尼佛.jpg')
        .lnk ('《云何梵》', 'various.js', '_41', '釋迦牟尼佛.jpg')
        .lnk ('南無 大悲觀世音菩薩', null, null, '觀世音菩薩1.jpg')
        .lnkS('南無 大願地藏王菩薩<br>南無 護法　諸天菩薩', null, null, '南無地藏王菩薩1.jpg')
        .mainlnkS('《金剛般若波羅蜜經》', `jingangjing.js&level=${LEVEL}`, null, '釋迦牟尼佛.jpg')
        .lnk ('《般若無盡藏真言》<br>《金剛心真言》<br>《普迴向真言》<br>《法華補闕真⾔》<br>《補闕圓滿真⾔》',
              '../陀羅尼/諸真言.html', null, '回向偈.png')
        .lnk ('《金剛讚》', 'various.js', '_42', '回向偈.png')
        .lnk ('《十小咒》', 十小咒, null, '三寶佛.png')
        .wFinishing()
        .renderIt();
  }
  DiZangSession() {
    this.wBeginning('<p>&nbsp;</p>')
        .lnk('《覺林菩薩偈》', 'various.js', '_19', '三寶佛.png')
        .lnk('《地藏菩薩讚》', 'various.js', '_27', '南無地藏王菩薩1.jpg')
        .mainlnk('《地藏菩薩本願經》', `dzj.js&level=${LEVEL}`, null, '南無地藏王菩薩1.jpg')
        .mainlnk('《占察善惡業報經》', `ZhanCha-2nd-part.js&level=${LEVEL}`, null, '南無地藏王菩薩1.jpg')
        .lnk('《地藏王讚》', 'various.js', '_28', '南無地藏王菩薩1.jpg')
        .lnk('《地藏王歌讚》', '../images/南無地藏王菩薩聖號-7min.mp3', null, '南無地藏王菩薩1.jpg')
        .wFinishing()
        .renderIt();
  }
  ShurangDharaniSession() {
    this.wBeginning('<p>&nbsp;</p>')
        .lnk('《首楞嚴咒祈禱文》', 'various.js', '_36', '釋迦牟尼佛.jpg')
        .lnk('《首楞嚴咒》', '../陀羅尼/楞嚴咒/Shurangama-mantra-信裹.html?l=s', '_28', '釋迦牟尼佛.jpg')
        .lnk('《首楞嚴咒迴向法》', 'various.js', '_37', '釋迦牟尼佛.jpg')
        .lnk('《十小咒》', 十小咒, null, '三寶佛.png')
        .lnk('大悲咒', 大悲咒, null, '觀世音菩薩1.jpg')
        .wFinishing()
        .renderIt();
  }
  GuanShiYinSession() {
    this.wBeginning('<p>&nbsp;</p>')
        .lnk('南無 觀世音菩薩','../陀羅尼/大悲咒.html', null, '觀世音菩薩1.jpg')
        .mainlnk('《普門品》', `guanshiyin.js&level=${LEVEL}`, null, '觀世音菩薩1.jpg')
        .mainlnk('《耳根圓通章》', `guanshiyin2.js&level=${LEVEL}`, null, '觀世音菩薩1.jpg')
        .mainlnk('《善財童子之參》', `guanshiyin3.js&level=${LEVEL}`, null, '觀世音菩薩1.jpg')
        .lnk('《大悲咒發願文》', 'various.js', '_33', '觀世音菩薩1.jpg')
        .lnk('《大悲咒》','../陀羅尼/大悲咒.html', null, '觀世音菩薩1.jpg')
        .lnk('《觀世音菩薩讚》', 'various.js', '_32', '觀世音菩薩1.jpg')
        .lnk('《南無觀世音菩薩歌讚》', '../images/南無觀世音菩薩x7.mp3', null, '觀世音菩薩1.jpg')
        .lnk('十小咒', 十小咒, null, '極樂世界三聖.jpg')
        .wFinishing()
        .renderIt();
  }

  show(sess) {
    if (!sess) sess = '';
    if (sess.startsWith('dz'))         dojo.DiZangSession();     // 地藏菩薩
    else if (sess.startsWith('amtb'))  dojo.AmtbSession();       // 佛說大乘無量壽莊嚴清淨平等覺
    else if (sess.startsWith('vaj'))   dojo.VajraSession();      // 金剛經
    else if (sess.startsWith('guan'))  dojo.GuanShiYinSession(); // 觀世音菩薩
    else if (sess.startsWith('daily')) dojo.PureLandSession();   // 淨土
    else                               dojo.StartSession();
  }

} // end of DojoBuffer.

loadNongLiYear(null, null, true);

var dayInfo = getDayInfo(yyyymmdd(new Date())),
    is齋日 = dayInfo && dayInfo.is齋日, is齋日1 = dayInfo && dayInfo.is齋日1,
    dojo = new DojoBuffer();

dojo.w(
`<sup id="齋日1" ${is齋日1 ? '' : 'style="opacity:0"'}>明齋日</sup>&nbsp;
 <a href="javascript:dojo.StartSession(true)" style="color:yellow">直心道場</a>
 &nbsp;<sup id="齋日" ${is齋日 ? '' : 'style="opacity:0"'}>今齋日</sup>`).render('lbl');
dojo.w(`<img src="${im.getImgSrc('爐香讚.png')}">`).render('pic');

dojo.show(get('type'));
setTimeout(() => openLnk(null, '../陀羅尼/諸真言.html'), 500); // iframe issue?
</script>
