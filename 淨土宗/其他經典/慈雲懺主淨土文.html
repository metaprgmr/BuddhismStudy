<h2 style="margin-left:29pt">慈雲懺主淨土文</h2>

<p>一心皈命，極樂世界，阿彌陀佛。</p>

<p>願以淨光照我，慈誓攝我。</p>

<p>我今正念，稱如來名，為菩提道，求生淨土。</p>

<p>佛昔本誓，若有眾生，欲生我國，志心信樂，乃至十念，若不生者，不取正覺。</p>

<p>以此念佛因緣，得入如來，大誓海中。</p>

<p>承佛慈力，眾罪消滅，善根增長。</p>

<p>若臨命終，自知時至，身無病苦，心不貪戀，意不顛倒，如入禪定。</p>

<p>佛及聖眾，手執金臺，來迎接我，於一念頃，生極樂國。</p>

<p>花開見佛，即聞佛乘，頓開佛慧，廣度眾生，滿菩提願。</p>
