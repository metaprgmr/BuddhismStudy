<h1>有感</h1>

<div class="content">

<blockquote class="gatha">
甲子瞬息浮漚搖<br>
馬來恍覩龍脈老<br>
妙國蓮臺巍巍坐<br>
三世幻夢俱了了
</blockquote>

<p>&nbsp;</p>
<p align="right">&mdash;丙午孟夏初八於(37.42, -122)</p>
